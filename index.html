<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yolkapp</title>
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/yolk6767.jpg">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
    :root {
      --bg:#0a0a0a; --bg-panel:#0f0f0f; --text:#fff; --text-secondary:#ccc;
      --soft:#1a1a1a; --border:#2a2a2a; --accent:#d4af37; --accent-soft:#2a2418;
      --message-me:#1e2a3a; --message-other:#1a1a1a; --header:#0a0a0a; --shadow:rgba(0,0,0,0.5);
      --danger:#ff4444; --success:#4CAF50; --input-bg:rgba(0,0,0,0.5);
      --glass-bg:rgba(10,10,15,0.75); --glass-border:rgba(255,255,255,0.10);
      --hover-bg:rgba(212,175,55,0.18); --hover-border:rgba(212,175,55,0.45);
    }
    body.light-theme {
      --bg:#ffffff; --bg-panel:#f8f9fa; --text:#1a1a1a; --text-secondary:#4a4a4a;
      --soft:#e9ecef; --border:#dee2e6; --accent:#b8860b; --accent-soft:#fff3cd;
      --message-me:#e3f2fd; --message-other:#f1f3f4; --header:#fff; --shadow:rgba(0,0,0,0.08);
      --input-bg:rgba(0,0,0,0.03); --glass-bg:rgba(255,255,255,0.92); --glass-border:rgba(0,0,0,0.1);
      --hover-bg:rgba(184,134,11,0.10); --hover-border:rgba(184,134,11,0.30);
    }
    body {
      min-height:100vh; display:flex; justify-content:center; align-items:center;
      background:var(--bg); padding:0; margin:0; transition:background 0.2s ease;
    }
    #app {
      width:100%; max-width:100%; height:100vh; max-height:100vh;
      background:var(--bg-panel); box-shadow:0 0 30px var(--shadow);
      display:flex; flex-direction:column; overflow:hidden; border:none;
      position:relative; z-index:1; transition:background 0.2s ease;
    }
    .chat-area, .sidebar, .chat-header, .input-area, .auth-box, .profile-modal,
    .message, .chat-item, .search-add, .feed-container, .post-card, .comments-modal {
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      background:var(--glass-bg); border:1px solid var(--glass-border);
      box-shadow:0 8px 32px var(--shadow); transition:background 0.2s ease,border-color 0.2s ease,box-shadow 0.2s ease;
    }
    .chat-item:hover, .chat-item.active, .btn:hover, .icon-btn:hover, .send-btn:hover,
    .profile-btn:hover, .tab:hover, .nav-item:hover, .nav-item.active {
      background:var(--hover-bg); border-color:var(--hover-border);
      box-shadow:0 0 24px rgba(212,175,55,0.25);
    }
    .chat-area, .feed-container { background-color:transparent!important; position:relative; }
    body:not(.light-theme) .chat-area, body:not(.light-theme) .feed-container { background-color:#050505!important; }
    body.light-theme .chat-area, body.light-theme .feed-container { background-color:#ffffff!important; }
    .messages-container { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; background:transparent; position:relative; z-index:1; }
    .message { max-width:85%; padding:10px 14px; border-radius:18px; background:var(--message-other); color:var(--text); align-self:flex-start; word-break:break-word; border:1px solid var(--glass-border); box-shadow:0 2px 8px var(--shadow); position:relative; animation:fadeIn 0.2s ease; }
    .message.me { align-self:flex-end; background:var(--message-me); border:1px solid rgba(212,175,55,0.3); }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
    .message-text { color:var(--text); }
    .message .time { font-size:10px; opacity:0.6; margin-top:4px; text-align:right; color:var(--text-secondary); }
    .message small { color:var(--text-secondary); }
    .typing-indicator { display:flex; align-items:center; gap:6px; padding:8px 12px; background:var(--message-other); border-radius:18px; width:fit-content; margin-bottom:8px; border:1px solid var(--glass-border); color:var(--text-secondary); font-size:13px; }
    .typing-dots { display:flex; gap:3px; }
    .typing-dots span { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:typingBounce 1.4s infinite ease-in-out; }
    .typing-dots span:nth-child(1){animation-delay:0s;} .typing-dots span:nth-child(2){animation-delay:0.2s;} .typing-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0);opacity:0.4;} 30%{transform:translateY(-6px);opacity:1;} }
    .loading-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; justify-content:center; align-items:center; z-index:9999; transition:opacity 0.4s ease; }
    .loading-screen.hide { opacity:0; pointer-events:none; }
    .loading-text { color:var(--text); font-size:32px; font-weight:500; letter-spacing:4px; }
    .loading-dots { display:inline-block; }
    .loading-dots span { animation:dotPulse 1.4s ease-in-out infinite; display:inline-block; }
    .loading-dots span:nth-child(2){animation-delay:0.2s;} .loading-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes dotPulse { 0%,100%{opacity:0.3;transform:translateY(0);} 50%{opacity:1;transform:translateY(-5px);} }
    .icon-btn, .send-btn, .file-label, .tiny-btn, .profile-btn, .subscribe-btn, .unsubscribe-btn,
    .like-btn, .dislike-btn, .settings-icon, .delete-chat-icon, .tab, .msg-actions button, .back-btn,
    .create-nft-btn, .change-username-btn, .toggle-password, .resend-link, .close-btn, .nav-item,
    .post-like, .post-dislike, .post-comment, .post-delete, .create-post-btn { transition:all 0.2s ease; }
    .icon-btn:hover, .send-btn:hover, .file-label:hover, .tiny-btn:hover, .profile-btn:hover, .btn:hover,
    .subscribe-btn:hover, .unsubscribe-btn:hover, .like-btn:hover, .dislike-btn:hover, .settings-icon:hover,
    .delete-chat-icon:hover, .tab:hover, .msg-actions button:hover, .nav-item:hover, .post-like:hover,
    .post-dislike:hover, .post-comment:hover, .post-delete:hover, .create-post-btn:hover { filter:brightness(1.05); }
    .tab.active, .btn:active, .icon-btn:active, .send-btn:active, .nav-item.active { color:var(--accent); }
    .profile-banner-wrapper { position:relative; width:100%; margin-bottom:20px; }
    .banner-container { width:100%; height:150px; border-radius:20px; overflow:hidden; border:1px solid var(--glass-border); background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%); }
    .banner-image { width:100%; height:100%; object-fit:cover; }
    .banner-placeholder { width:100%; height:100%; background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 100%); display:flex; align-items:center; justify-content:center; color:#888; font-size:14px; }
    body.light-theme .banner-placeholder { background:#f0f0f0; color:#aaa; } body.light-theme .banner-container { background:#f0f0f0; }
    .profile-avatar-overlay { position:absolute; bottom:-40px; left:20px; z-index:10; }
    .profile-avatar-overlay .avatar-large { width:100px; height:100px; border-radius:50%; background:#2a2a2a; display:flex; align-items:center; justify-content:center; font-size:40px; color:var(--text); overflow:hidden; box-shadow:0 4px 20px var(--shadow); }
    body.light-theme .profile-avatar-overlay .avatar-large { background:#e0e0e0; }
    .profile-avatar-overlay .avatar-large img { width:100%; height:100%; object-fit:cover; }
    .profile-name-section { margin-top:50px; padding-left:20px; margin-bottom:20px; display:flex; flex-direction:column; gap:4px; }
    .settings-icon { cursor:pointer; font-size:24px; padding:8px; border-radius:50%; transition:0.2s; background:none; border:none; color:var(--text); }
    .settings-icon:hover { background:rgba(255,255,255,0.1); transform:rotate(90deg); }
    .settings-icon-img { width:28px; height:28px; object-fit:contain; cursor:pointer; }
    .toggle-switch { display:flex; align-items:center; gap:10px; cursor:pointer; }
    .toggle-switch .toggle-label { font-size:14px; color:var(--text); }
    .toggle-switch .toggle-checkbox { width:40px; height:20px; background:#2a2a2a; border-radius:20px; position:relative; transition:0.2s; border:1px solid var(--glass-border); }
    .toggle-switch .toggle-checkbox::after { content:""; width:16px; height:16px; background:#ffffff; border-radius:50%; position:absolute; top:1px; left:2px; transition:0.2s; }
    .toggle-switch.active .toggle-checkbox { background:var(--accent); }
    .toggle-switch.active .toggle-checkbox::after { left:20px; }
    .auth-container, .main-container { width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }
    .auth-container { background:radial-gradient(circle at 50% 0%,#1a1a2e 0%,#0a0a0a 70%); justify-content:center; align-items:center; }
    .auth-box { max-width:380px; background:rgba(20,20,30,0.9); backdrop-filter:blur(30px); padding:36px 28px; border-radius:28px; border:1px solid rgba(255,255,255,0.08); box-shadow:0 25px 50px rgba(0,0,0,0.7); width:92%; animation:fadeIn 0.4s ease; text-align:center; }
    .auth-box h2 { color:var(--accent); margin-bottom:10px; font-weight:600; font-size:30px; letter-spacing:2px; }
    .auth-subtitle { color:var(--text-secondary); margin-bottom:30px; font-size:14px; }
    .input-group { margin-bottom:20px; text-align:left; }
    .input-group label { display:block; margin-bottom:6px; color:var(--text-secondary); font-size:13px; font-weight:500; }
    .input-group input, .input-group select, .input-group textarea { width:100%; padding:14px 18px; background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.1); border-radius:14px; color:#fff; font-size:15px; outline:none; transition:0.2s; }
    .input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(212,175,55,0.2); }
    .btn { background:var(--accent); color:#000; border:none; padding:14px; border-radius:14px; font-size:16px; font-weight:600; width:100%; cursor:pointer; transition:0.2s; margin-top:8px; }
    .btn-secondary { background:rgba(255,255,255,0.1); color:var(--text); border:1px solid var(--glass-border); }
    .btn:hover { transform:translateY(-2px); } .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
    .auth-error { color:#ff6666; margin-top:12px; font-size:14px; text-align:center; font-weight:bold; }
    .auth-switch { margin-top:20px; display:flex; gap:10px; }
    .main-container { flex-direction:row; position:relative; flex:1; overflow:hidden; }
    .sidebar { width:280px; background:var(--glass-bg); border-right:1px solid var(--glass-border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; position:absolute; left:0; top:0; bottom:0; z-index:10; transform:translateX(-100%); transition:transform 0.3s ease; }
    .sidebar.open { transform:translateX(0); }
    .chat-area { flex:1; display:flex; flex-direction:column; background:var(--glass-bg); position:relative; z-index:5; width:100%; }
    .back-btn { background:rgba(255,255,255,0.1); border:1px solid var(--glass-border); color:#6b7280; font-size:24px; cursor:pointer; margin-right:10px; display:none; width:40px; height:40px; border-radius:12px; }
    .back-btn.visible { display:block; } .back-btn:hover { background:var(--hover-bg); }
    @media (min-width:768px) {
      .sidebar { position:relative; transform:translateX(0); width:300px; }
      .back-btn { display:none!important; }
      .bottom-nav { display:flex!important; }
      .bottom-nav .nav-chats { display:none; }
    }
    .user-profile { padding:16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--glass-border); background:var(--glass-bg); }
    .avatar { width:48px; height:48px; background:rgba(212,175,55,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--text); font-weight:500; overflow:hidden; flex-shrink:0; }
    .avatar-img { width:48px; height:48px; border-radius:50%; object-fit:cover; }
    .username-display { font-weight:600; color:var(--text); display:flex; align-items:center; gap:2px; flex-wrap:wrap; }
    .search-add { padding:12px; border-bottom:1px solid var(--glass-border); display:flex; gap:8px; background:var(--glass-bg); }
    .search-add input { flex:1; background:var(--input-bg); border:1px solid var(--glass-border); border-radius:12px; padding:10px 15px; color:var(--text); outline:none; }
    .search-add input::placeholder { color:var(--text-secondary); }
    .icon-btn { background:rgba(212,175,55,0.2); border:1px solid var(--glass-border); color:#6b7280; width:40px; height:40px; border-radius:12px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .icon-btn:hover { background:rgba(212,175,55,0.3); }
    .chats-list { flex:1; overflow-y:auto; padding:8px; }
    .chat-item { padding:12px 16px; border-radius:16px; margin-bottom:4px; display:flex; align-items:center; gap:12px; cursor:pointer; color:var(--text); background:var(--glass-bg); border:1px solid var(--glass-border); transition:all 0.2s; }
    .chat-item.active { background:rgba(212,175,55,0.2); border:1px solid var(--accent); }
    .chat-avatar { width:40px; height:40px; background:rgba(212,175,55,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; flex-shrink:0; border:1px solid var(--glass-border); color:var(--text); }
    .chat-avatar-img { width:40px; height:40px; border-radius:50%; object-fit:cover; }
    .delete-chat-icon { margin-left:auto; color:#6b7280; font-size:14px; cursor:pointer; display:inline-flex; align-items:center; }
    .delete-chat-icon img { width:20px; height:20px; object-fit:contain; } .delete-chat-icon:hover { opacity:0.8; }
    .chat-header { padding:12px 16px; background:var(--glass-bg); border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center; color:var(--text); }
    .chat-header-info { display:flex; flex-direction:column; align-items:flex-start; gap:2px; }
    .chat-header-info strong { color:var(--text); font-size:16px; display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
    .chat-user-status { font-size:11px; color:#4CAF50; font-weight:normal; margin-top:2px; } .chat-user-status.offline { color:#888; }
    .chat-actions { display:flex; gap:8px; align-items:center; }
    .tiny-btn { background:rgba(255,255,255,0.1); border:1px solid var(--glass-border); padding:6px 12px; border-radius:12px; cursor:pointer; font-size:12px; color:#6b7280; font-weight:500; }
    .tiny-btn:hover { background:rgba(212,175,55,0.2); }
    .subscribe-btn { background:#DBBA00; border:none; padding:6px 12px; border-radius:12px; cursor:pointer; font-size:12px; color:#000; font-weight:500; } .subscribe-btn:hover { filter:brightness(1.1); }
    .unsubscribe-btn { background:#818181; border:1px solid var(--glass-border); padding:6px 12px; border-radius:12px; cursor:pointer; font-size:12px; color:#fff; font-weight:500; } .unsubscribe-btn:hover { background:#6a6a6a; }
    .system-message { background:rgba(40,40,45,0.7); border:1px solid var(--glass-border); color:#aaa; font-style:italic; }
    .msg-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }

    .msg-actions button:hover { background:#ff4444; color:white; }

    .like-btn.liked, .dislike-btn.disliked { color:var(--accent); } .like-btn.liked { color:#4CAF50; } .dislike-btn.disliked { color:#ff6666; }
    .like-btn:hover, .dislike-btn:hover { background:rgba(212,175,55,0.2); }
    .media-preview { max-width:200px; max-height:200px; border-radius:12px; margin-top:4px; border:1px solid var(--glass-border); cursor:pointer; }
    video.media-preview { max-width:200px; max-height:200px; }
    .message-username { cursor:pointer; font-weight:600; display:inline-flex; align-items:center; gap:2px; color:var(--accent); }
    .message-username:hover { text-decoration:underline; }
    .input-area { display:flex; gap:8px; padding:12px; background:var(--glass-bg); border-top:1px solid var(--glass-border); align-items:center; flex-wrap:wrap; z-index:2; position:relative; }

    .input-area input[type="text"]::placeholder { color:var(--text-secondary); }

    .file-label { background:rgba(255,255,255,0.1); border:1px solid var(--glass-border); padding:8px 16px; border-radius:24px; color:#6b7280; cursor:pointer; font-size:14px; font-weight:500; }

    .send-btn:hover { background:rgba(212,175,55,0.3); }
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:3000; animation:fadeIn 0.2s ease; backdrop-filter:blur(8px); }

    .profile-actions { display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; }
    .profile-btn { background:rgba(212,175,55,0.2); border:1px solid var(--glass-border); color:#6b7280; padding:12px; border-radius:12px; font-size:14px; font-weight:600; flex:1; cursor:pointer; text-align:center; }
    .profile-btn.secondary { background:rgba(255,255,255,0.1); color:#6b7280; }
    .profile-btn.logout { background:#ff4444; color:#fff; }

    .profile-btn:hover { transform:translateY(-2px); }
    .currency-label { font-size:13px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; display:block; }

    .notification { position:fixed; top:20px; right:20px; background:var(--glass-bg); color:var(--text); padding:12px 24px; border-radius:16px; z-index:10000; animation:slideIn 0.3s ease; border:1px solid var(--glass-border); font-weight:500; backdrop-filter:blur(8px); }

    .nav-item img { width:28px; height:28px; object-fit:contain; } .nav-item.active { background:rgba(212,175,55,0.2); }

    .feed-filters { position:sticky; top:0; background:var(--glass-bg); backdrop-filter:blur(12px); padding:12px 16px; display:flex; gap:10px; z-index:10; border-bottom:1px solid var(--glass-border); }

    .post-stats { display:flex; gap:16px; margin-top:12px; border-top:1px solid var(--glass-border); padding-top:12px; align-items:center; }
    .post-stats button { background:rgba(212,175,55,0.12); border:1px solid rgba(212,175,55,0.25); border-radius:30px; padding:8px 16px; font-size:14px; font-weight:500; backdrop-filter:blur(4px); transition:all 0.2s ease; cursor:pointer; display:inline-flex; align-items:center; gap:6px; color:#d4af37; }
    .post-stats button:hover { transform:translateY(-2px); background:rgba(212,175,55,0.25); border-color:#d4af37; box-shadow:0 4px 12px rgba(212,175,55,0.2); }

    .post-delete { background:rgba(255,68,68,0.12)!important; border-color:rgba(255,68,68,0.3)!important; color:#ff6666!important; padding:8px 12px!important; }
    .create-post-btn { position:fixed; bottom:80px; right:20px; background:var(--accent); color:#000; border:none; width:56px; height:56px; border-radius:50%; font-size:28px; cursor:pointer; box-shadow:0 4px 12px var(--shadow); z-index:30; display:flex; align-items:center; justify-content:center; }
    .comments-modal { background:var(--glass-bg); border-radius:24px; width:90%; max-width:400px; padding:20px; max-height:80vh; overflow-y:auto; }
    .comment-item { padding:8px 0; border-bottom:1px solid var(--glass-border); }

    .comment-time { font-size:10px; color:var(--text-secondary); margin-top:2px; }
    .add-comment { margin-top:16px; display:flex; gap:8px; }

    @media (max-width:768px) { .main-container { margin-bottom:60px; } .create-post-btn { bottom:70px; } }
    .badge-icon { display:inline-block; width:28px; height:28px; vertical-align:middle; margin-left:4px; }
    .media-btn-icon { width:28px; height:28px; object-fit:contain; cursor:pointer; background:rgba(212,175,55,0.2); border:1px solid var(--glass-border); border-radius:50%; padding:6px; }
    .nickname-btn-icon { width:28px; height:28px; object-fit:contain; cursor:pointer; background:rgba(212,175,55,0.2); border:1px solid var(--glass-border); border-radius:50%; padding:4px; }
    .bot-btn { background:#2a2a2a; color:#d4af37; border:1px solid #d4af37; padding:8px 16px; border-radius:20px; margin:4px 4px 0 0; cursor:pointer; font-weight:600; transition:0.2s; }
    .bot-btn:hover { background:#d4af37; color:#000; }
    .post-creation-modal { background:var(--glass-bg); border-radius:28px; width:90%; max-width:420px; padding:24px; border:1px solid var(--glass-border); box-shadow:0 25px 50px rgba(0,0,0,0.7); }
    .post-creation-modal textarea { width:100%; background:var(--input-bg); border:1px solid var(--glass-border); border-radius:16px; padding:14px; color:var(--text); resize:none; margin-bottom:16px; font-size:15px; }
    .post-creation-modal .media-preview-small { max-width:100%; max-height:200px; border-radius:12px; margin-top:8px; }
    .post-creation-modal .btn { margin-top:0; }

<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  function setCookie(n,v,d){ var e=""; if(d){ var t=new Date(); t.setTime(t.getTime()+d*864e5); e="; expires="+t.toUTCString(); } document.cookie=n+"="+(v||"")+e+"; path=/; SameSite=Lax"; }
  function getCookie(n){ var ne=n+"=", ca=document.cookie.split(';'); for(var i=0;i<ca.length;i++){ var c=ca[i]; while(c.charAt(0)===' ') c=c.substring(1,c.length); if(c.indexOf(ne)===0) return c.substring(ne.length,c.length); } return null; }
  function eraseCookie(n){ document.cookie=n+'=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT; SameSite=Lax'; }

  const SUPABASE_URL='https://hxzgckmnnjabahpmowdw.supabase.co';
  const SUPABASE_KEY='sb_publishable_KiD6FCtXOn47And5Wu3THA_AYuKNxtb';
  const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{db:{schema:'public'},realtime:{params:{eventsPerSecond:10}}});

  const App={
    users:{},chats:{},currentUser:null,activeChat:null,blocked:{},sidebarOpen:false,
    dataLoaded:false,tempPhoto:null,tempVideo:null,privacySettings:{},posts:[],activeTab:'feed',
    lastPostTime:{},feedFilter:'all',allPostsShuffled:[],allPostsIndex:0,soundEnabled:true,
    localNicknames:{},botBuilderStates:{}
  };
  const ADMIN='@durov';
  const CLICK_BOT='@click_bot';
  const CREATE_BOT='@create_bot';
  const CLICK_BOT_AVATAR='https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/ooox.jpg';
  const CREATE_BOT_AVATAR='https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/wwjd.jpg';
  const ICONS={
    LIKE_OFF:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/a1%20(1).png',
    LIKE_ON:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/%D0%B02.png',
    COMMENT:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/a90UQ0sM4Rgn0HOlEUTZAYNmjCpfJhhqHxGE-YpNGsu36NbJmBWG6mYc7ldbIQqVgA7knkI2UYeEkhxYfE3Iyzfy.png',
    DELETE:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/HLq3zE1ksOa0lU7rN7AVF_yeYF80CczJ_Q-6OkO95XPsNnHcitq3vb5Hz0F_JXad_V64dfE8KrylYjRuK_DcNzdX.png',
    BADGE1:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/IMG_1542.png',
    BADGE2:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/IMG_1543.png',
    BADGE3:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/%D0%B0%D1%83%D1%81%D1%83%D1%81%D1%862.png',
    MEDIA_BTN:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/%D1%81%D1%83%D1%81.png',
    NICKNAME_BTN:'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/rra.png'
  };
  const DEFAULT_AVATAR='https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/%D1%80%D1%80%D1%80.jpg';
  const STATE_ID=1;

  async function loadState(){ let{data,error}=await supabase.from('app_state').select('data').eq('id',STATE_ID).single(); if(error)return null; return data?.data||null; }
  async function saveState(d){ await supabase.from('app_state').upsert({id:STATE_ID,data:d},{onConflict:'id'}); }
  function subscribeState(){ supabase.channel('state').on('postgres_changes',{event:'*',schema:'public',table:'app_state',filter:`id=eq.${STATE_ID}`},async p=>{ let nd=p.new?.data; if(nd){ if(nd.users)App.users=nd.users; if(nd.chats)App.chats=nd.chats; if(nd.blocked)App.blocked=nd.blocked; if(nd.privacySettings)App.privacySettings=nd.privacySettings; if(nd.posts)App.posts=nd.posts; if(nd.localNicknames)App.localNicknames=nd.localNicknames; localStorage.setItem('yolk_cache',JSON.stringify({users:App.users,chats:App.chats,blocked:App.blocked,localNicknames:App.localNicknames})); if(App.currentUser){updateUI();updateSidebar();applyWallpaper();if(App.activeTab==='chats'&&App.activeChat)renderMessages(App.activeChat);updateChatList();} } }).subscribe(); }
  async function saveToDB(){ if(!App.dataLoaded)return; let s={users:App.users,chats:App.chats,blocked:App.blocked,privacySettings:App.privacySettings,posts:App.posts,localNicknames:App.localNicknames}; try{await saveState(s); localStorage.setItem('yolk_cache',JSON.stringify({users:App.users,chats:App.chats,blocked:App.blocked,localNicknames:App.localNicknames}));}catch(e){} }

  function initBots(){
    if(!App.users[CLICK_BOT]) App.users[CLICK_BOT]={password:'',avatar:CLICK_BOT_AVATAR,lastSeen:Date.now(),followers:[],following:[],displayName:'Click Bot',email:'click_bot@yo',isBot:true};
    if(!App.users[CREATE_BOT]) App.users[CREATE_BOT]={password:'',avatar:CREATE_BOT_AVATAR,lastSeen:Date.now(),followers:[],following:[],displayName:'Create Bot',email:'create_bot@yo',isBot:true};
  }

  async function loadFromDB(){
    try{ let s=await loadState(); if(s){ if(s.users)App.users=s.users; if(s.chats)App.chats=s.chats; if(s.blocked)App.blocked=s.blocked; if(s.privacySettings)App.privacySettings=s.privacySettings; if(s.posts)App.posts=s.posts; if(s.localNicknames)App.localNicknames=s.localNicknames; localStorage.setItem('yolk_cache',JSON.stringify({users:App.users,chats:App.chats,blocked:App.blocked,localNicknames:App.localNicknames})); } }catch(e){}
    initBots();
    let savedUser=getCookie('yolk_current_user'), savedChat=getCookie('yolk_active_chat'), savedTab=getCookie('yolk_active_tab');
    if(savedUser&&App.users[savedUser]){ App.currentUser=savedUser; App.activeTab=savedTab||'feed'; App.activeChat=(savedChat&&App.users[savedChat])?savedChat:null; loadPrivacy(); if(App.lastSeenInterval)clearInterval(App.lastSeenInterval); App.lastSeenInterval=setInterval(()=>updateLastSeen(App.currentUser),30000); updateLastSeen(App.currentUser); }
    App.dataLoaded=true; render();
  }
  function updateLastSeen(u){ if(App.users[u]&&u===App.currentUser){App.users[u].lastSeen=Date.now();saveToDB();} }
  let loadStart=Date.now(), MIN_LOAD=1000;
  function getUserBadge(u){ let b=App.users[u]?.badge; if(b===3)return ICONS.BADGE3; if(b===2)return ICONS.BADGE2; if(b===1)return ICONS.BADGE1; return null; }
  function getDisplayName(u){ let user=App.users[u]; if(!user)return u; if(App.localNicknames?.[u]?.[App.currentUser])return App.localNicknames[u][App.currentUser]; return user.displayName?.trim()||u.substring(1); }
  function formatName(u){ let d=getDisplayName(u); let b=getUserBadge(u); return b?`${d} <img src="${b}" class="badge-icon">`:d; }
  function applyTheme(t){ document.body.classList.toggle('light-theme',t==='light'); setCookie('yolk_theme',t,365); }
  function loadTheme(){ applyTheme(getCookie('yolk_theme')==='light'?'light':'dark'); }
  function canMessage(f,t){ if(f===t||App.users[t]?.isBot)return true; let p=App.privacySettings[t]; if(!p?.blockNewMessages)return true; let cid=[f,t].sort().join('_'); return !!(App.chats[cid]?.messages?.length); }
  function updatePrivacy(v){ App.privacySettings[App.currentUser]=App.privacySettings[App.currentUser]||{}; App.privacySettings[App.currentUser].blockNewMessages=v; localStorage.setItem('yolk_privacy',JSON.stringify(App.privacySettings)); if(App.dataLoaded)saveToDB(); showNotification(v?'Strangers blocked':'Everyone can message'); }
  function loadPrivacy(){ App.privacySettings=JSON.parse(localStorage.getItem('yolk_privacy')||'{}'); }
  function findMain(i){ if(!i)return null; if(App.users[i])return i; for(let m in App.users)if(App.users[m].additionalUsernames?.includes(i))return m; return null; }
  function isEmailTaken(e,ex){ if(!e)return false; let le=e.toLowerCase(); for(let u in App.users){if(u===ex)continue; if(App.users[u]?.email?.toLowerCase()===le)return true;} return false; }

  // боты
  function getClickData(u){ if(!App.users[u].clickBotData) App.users[u].clickBotData={balance:0,incomePerClick:1,upgradeCost:10}; return App.users[u].clickBotData; }
  function handleClickBot(cmd){
    let data=getClickData(App.currentUser), reply='';
    if(cmd==='!click'){ data.balance+=data.incomePerClick; reply=`💎 +${data.incomePerClick}$\nБаланс: ${data.balance}$`; }
    else if(cmd==='!upgrade'){ if(data.balance>=data.upgradeCost){ data.balance-=data.upgradeCost; data.incomePerClick+=1; data.upgradeCost=Math.floor(data.upgradeCost*1.5); reply=`🚀 Улучшено! Доход за клик: ${data.incomePerClick}$\nСлед. стоимость: ${data.upgradeCost}$`; }else reply=`❌ Недостаточно средств. Нужно ${data.upgradeCost}$, у вас ${data.balance}$`; }
    else if(cmd==='!balance'){ reply=`💰 Баланс: ${data.balance}$\n⚡ Доход за клик: ${data.incomePerClick}$\n🔧 Улучшение стоит: ${data.upgradeCost}$`; }
    else reply='Используйте кнопки.';
    return reply+'\n\n'+genClickBtns();
  }
  function genClickBtns(){ let d=getClickData(App.currentUser); return `<button class="bot-btn" onclick="window.clickAct('!click')">💎 Клик (+${d.incomePerClick}$)</button><button class="bot-btn" onclick="window.clickAct('!upgrade')">🚀 Улучшить (${d.upgradeCost}$)</button><button class="bot-btn" onclick="window.clickAct('!balance')">💰 Баланс</button>`; }
  window.clickAct=function(c){ if(App.activeChat!==CLICK_BOT)return; document.getElementById('messageText').value=''; handleClickBot(c); };

  function customBotWelcome(bot){
    let type=bot.customBot.type;
    if(type==='clicker'){
      let cd=bot.customBot.clickerData||{incomePerClick:1,upgradeCost:10,maxUpgrades:10};
      return `💎 Кликер-бот\nДоход за клик: ${cd.incomePerClick}$\nУлучшение: ${cd.upgradeCost}$\nМакс. уровень: ${cd.maxUpgrades}\n\n<button class="bot-btn" onclick="window.customAct('${botUsername(bot)}','!click')">💎 Клик</button><button class="bot-btn" onclick="window.customAct('${botUsername(bot)}','!upgrade')">🚀 Улучшить</button><button class="bot-btn" onclick="window.customAct('${botUsername(bot)}','!balance')">💰 Баланс</button>`;
    }else if(type==='random'){
      let rd=bot.customBot.randomData||{min:1,max:100};
      return `🎲 Рандом от ${rd.min} до ${rd.max}\n\n<button class="bot-btn" onclick="window.customAct('${botUsername(bot)}','!roll')">🎲 Бросить</button>`;
    }else if(type==='shop'){
      let items=bot.customBot.shopData?.items||[];
      let itemList=items.map(i=>`<button class="bot-btn" onclick="window.customAct('${botUsername(bot)}','!buy ${i.name}')">${i.name} - ${i.price}$</button>`).join('');
      return `🛒 Магазин\nТовары:\n${itemList}\n\n<button class="bot-btn" onclick="window.customAct('${botUsername(bot)}','!balance')">💰 Баланс</button>\nСоздатель: @${bot.customBot.owner?.substring(1)||'unknown'}`;
    }
    return 'Привет!';
  }
  function botUsername(bot){ for(let k in App.users)if(App.users[k]===bot)return k; return ''; }
  window.customAct=function(botName,cmd){
    if(App.activeChat!==botName)return;
    document.getElementById('messageText').value='';
    handleCustomMsg(botName,cmd);
  };
  function handleCustomMsg(botUsername,text){
    let bot=App.users[botUsername];
    if(!bot?.customBot)return;
    let type=bot.customBot.type;
    let userData=App.users[App.currentUser].customBotProgress?.[botUsername];
    if(!userData){ if(!App.users[App.currentUser].customBotProgress)App.users[App.currentUser].customBotProgress={}; userData=App.users[App.currentUser].customBotProgress[botUsername]={balance:0,upgradeLevel:0}; }
    let reply='';
    if(type==='clicker'){
      let cd=bot.customBot.clickerData||{incomePerClick:1,upgradeCost:10,maxUpgrades:10};
      if(text==='!click'){ userData.balance+=cd.incomePerClick; reply=`💎 +${cd.incomePerClick}$\nБаланс: ${userData.balance}$`; }
      else if(text==='!upgrade'){ if(userData.upgradeLevel>=cd.maxUpgrades)reply='❌ Максимальный уровень.'; else if(userData.balance>=cd.upgradeCost){ userData.balance-=cd.upgradeCost; userData.upgradeLevel++; cd.upgradeCost=Math.floor(cd.upgradeCost*1.5); reply=`🚀 Уровень ${userData.upgradeLevel}!\nДоход: ${cd.incomePerClick}$`; }else reply=`❌ Недостаточно средств.`; }
      else if(text==='!balance'){ reply=`💰 Баланс: ${userData.balance}$\n⚡ Доход: ${cd.incomePerClick}$\n🔧 Уровень: ${userData.upgradeLevel}/${cd.maxUpgrades}`; }
    }else if(type==='random'){
      let rd=bot.customBot.randomData||{min:1,max:100};
      if(text==='!roll'){ let num=Math.floor(Math.random()*(rd.max-rd.min+1))+rd.min; reply=`🎲 ${num}`; }
    }else if(type==='shop'){
      let items=bot.customBot.shopData?.items||[];
      if(text.startsWith('!buy ')){ let itemName=text.substring(5).trim(); let item=items.find(i=>i.name===itemName); if(!item)reply='Товар не найден.'; else if(userData.balance>=item.price){ userData.balance-=item.price; reply=`✅ Куплено: ${item.name} за ${item.price}$`; }else reply=`❌ Недостаточно средств.`; }
      else if(text==='!balance'){ reply=`💰 Баланс: ${userData.balance}$`; }
    }
    let msg={from:botUsername,text:reply+'\n\n'+customBotWelcome(bot),time:Date.now(),photo:null,isVideo:false,likes:{},dislikes:{}};
    let cid=[App.currentUser,botUsername].sort().join('_');
    if(!App.chats[cid])App.chats[cid]={user1:App.currentUser,user2:botUsername,messages:[]};
    App.chats[cid].messages.push(msg);
    saveToDB(); renderMessages(botUsername);
  }

  // create bot
  function handleCreateMsg(text,media){
    let user=App.currentUser;
    if(!App.botBuilderStates[user])App.botBuilderStates[user]={step:'idle',data:{}};
    let state=App.botBuilderStates[user];
    let addMsg=(txt)=>{ let msg={from:CREATE_BOT,text:txt,time:Date.now(),photo:null,isVideo:false,likes:{},dislikes:{}}; let cid=[user,CREATE_BOT].sort().join('_'); if(!App.chats[cid])App.chats[cid]={user1:user,user2:CREATE_BOT,messages:[]}; App.chats[cid].messages.push(msg); saveToDB(); renderMessages(CREATE_BOT); };
    let step=state.step;
    if(step==='idle'){ state.step='choose_theme'; addMsg('👋 Создадим бота! Выбери тему:\n<button class="bot-btn" onclick="window.createTheme(\'random\')">🎲 Рандом</button><button class="bot-btn" onclick="window.createTheme(\'clicker\')">💎 Кликер</button><button class="bot-btn" onclick="window.createTheme(\'shop\')">🛒 Магазин</button>'); }
    else if(step==='choose_theme'){
      if(text==='random'||text==='clicker'||text==='shop'){ state.data.type=text;
        if(text==='random'){ state.step='random_min'; addMsg('🎲 Минимум:'); }
        else if(text==='clicker'){ state.step='clicker_income'; addMsg('💎 Доход за клик:'); }
        else{ state.step='shop_items'; addMsg('🛒 Товары через запятую (название цена):'); }
      }else addMsg('Выбери тему кнопками.');
    }else if(step==='random_min'){ let v=parseInt(text); if(!isNaN(v)){ state.data.randomMin=v; state.step='random_max'; addMsg('Максимум:'); }else addMsg('❌ Число.'); }
    else if(step==='random_max'){ let v=parseInt(text); if(!isNaN(v)){ state.data.randomMax=v; state.step='enter_name'; addMsg('✅ Имя бота (оканчивается на _bot):'); }else addMsg('❌ Число.'); }
    else if(step==='clicker_income'){ let v=parseInt(text); if(!isNaN(v)){ state.data.clickerIncome=v; state.step='clicker_cost'; addMsg('💎 Стоимость улучшения:'); }else addMsg('❌ Число.'); }
    else if(step==='clicker_cost'){ let v=parseInt(text); if(!isNaN(v)){ state.data.clickerCost=v; state.step='clicker_levels'; addMsg('📊 Макс. уровень:'); }else addMsg('❌ Число.'); }
    else if(step==='clicker_levels'){ let v=parseInt(text); if(!isNaN(v)){ state.data.clickerLevels=v; state.step='enter_name'; addMsg('✅ Имя бота (_bot):'); }else addMsg('❌ Число.'); }
    else if(step==='shop_items'){ let items=text.split(',').map(s=>s.trim()).filter(s=>s); let parsed=items.map(it=>{ let parts=it.split(' '); let price=parseInt(parts.pop()); let name=parts.join(' '); return {name,price:isNaN(price)?1:price}; }); state.data.shopItems=parsed; state.step='enter_name'; addMsg('✅ Имя бота (_bot):'); }
    else if(step==='enter_name'){
      let name=text.trim().toLowerCase(); if(!name.startsWith('@'))name='@'+name;
      if(!name.endsWith('_bot')||!/^@[a-z][a-z0-9_]*$/.test(name)){ addMsg('❌ Имя должно заканчиваться на _bot (латиница).'); return; }
      if(App.users[name]){ addMsg('❌ Имя занято.'); return; }
      state.data.botName=name; state.step='enter_avatar'; addMsg('🖼️ Прикрепи аватарку (через 📎).');
    }else if(step==='enter_avatar'){

  function createBotFromState(state){

    if(state.data.type==='clicker') bot.customBot.clickerData={incomePerClick:state.data.clickerIncome||1,upgradeCost:state.data.clickerCost||10,maxUpgrades:state.data.clickerLevels||10};
    else if(state.data.type==='random') bot.customBot.randomData={min:state.data.randomMin||1,max:state.data.randomMax||100};

    document.body.insertAdjacentHTML('beforeend',html);

    document.getElementById('themeTog').onclick=()=>{ let is=document.getElementById('themeTog').classList.contains('active'); pendingTheme=is?'dark':'light'; document.getElementById('themeTog').classList.toggle('active',!is); document.getElementById('themeTog').querySelector('.toggle-label').textContent=pendingTheme==='light'?'Light':'Dark'; };

      let em=document.getElementById('sEmail').value.trim(); if(em&&!/^\S+@\S+\.\S+$/.test(em)){showNotification('Invalid email','error');return;} if(em&&isEmailTaken(em,App.currentUser)){showNotification('Email taken','error');return;} if(em)App.users[App.currentUser].email=em;

  function applyWallpaper(){let ca=document.querySelector('.chat-area');if(!ca)return;let w=App.users[App.currentUser]?.chatWallpaper||'';ca.style.backgroundImage=w&&w.startsWith('data:image')?`url('${w}')`:'none';ca.style.backgroundSize='cover';}
  function showNotification(m,t='success'){let n=document.createElement('div');n.className='notification'+(t==='error'?' error':'');n.textContent=m;document.body.appendChild(n);setTimeout(()=>n.remove(),3000);}
  function compress(d,mw,mh,q,cb){let img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>mw){h=(h*mw)/w;w=mw;}if(h>mh){w=(w*mh)/h;h=mh;}let cnv=document.createElement('canvas');cnv.width=w;cnv.height=h;cnv.getContext('2d').drawImage(img,0,0,w,h);cb(cnv.toDataURL('image/jpeg',q));};img.src=d;}
  function updateSidebar(){let ud=App.users[App.currentUser];if(!ud)return;let d=document.querySelector('.user-profile .username-display');if(d)d.innerHTML=formatName(App.currentUser);let a=document.querySelector('.user-profile .avatar');if(a)a.innerHTML=ud.avatar?`<img src="${ud.avatar}" class="avatar-img">`:`<img src="${DEFAULT_AVATAR}" class="avatar-img">`;}
  function updateUI(){updateSidebar();applyWallpaper();}

  function openProfileModal(u){
    if(App.users[u]?.isBot){showNotification('Bot profiles are not available.','error');return;}
    let ud=App.users[u]||{};
    let html=`<div class="modal-overlay" id="profOverlay"><div class="profile-modal"><h3>${getDisplayName(u)}</h3>
      <div class="profile-banner-wrapper"><div class="banner-container">${ud.banner?`<img src="${ud.banner}" class="banner-image">`:'<div class="banner-placeholder">No banner</div>'}</div><div class="profile-avatar-overlay"><div class="avatar-large">${ud.avatar?`<img src="${ud.avatar}">`:`<img src="${DEFAULT_AVATAR}">`}</div></div></div>
      <div class="profile-name-section"><div style="font-size:20px;">${formatName(u)}</div><div style="font-size:14px;color:var(--text-secondary);">${(ud.followers||[]).length} followers · ${(ud.following||[]).length} following</div></div>
      <div class="profile-actions"><button class="profile-btn secondary" id="closeProf">Close</button>${u===App.currentUser?`<button class="profile-btn" id="editProf">Edit</button><button class="profile-btn logout" id="logoutProf">Logout</button>`:''}</div></div></div>`;
    document.body.insertAdjacentHTML('beforeend',html);
    document.getElementById('closeProf').onclick=()=>document.getElementById('profOverlay').remove();
    if(u===App.currentUser){
      document.getElementById('editProf').onclick=()=>{document.getElementById('profOverlay').remove();openProfileSettings();};

  function render(){
    let root=document.getElementById('app');
    if(!App.dataLoaded){root.innerHTML='<div class="loading-screen"><div class="loading-text">YOLKAPP<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div></div></div>';return;}
    if(!App.currentUser){root.innerHTML=renderAuth();attachAuth();}
    else{ root.innerHTML=renderMain(); setTimeout(()=>{ attachMain(); if(App.activeTab==='chats'&&App.activeChat)renderMessages(App.activeChat); else if(App.activeTab==='feed')initFeed(); updateChatList();updateSidebar();applyWallpaper(); },100); }
  }
  function renderAuth(){ return `<div class="auth-container"><div class="auth-box"><h2>Yolkapp</h2><div class="auth-subtitle">Sign in</div><div id="authForms"><div id="loginF"><div class="input-group"><label>Username</label><input id="lUser"></div><div class="input-group"><label>Email</label><input id="lEmail"></div><div class="input-group"><label>Password</label><input id="lPass" type="password"></div><button class="btn" id="lBtn">Login</button></div><div class="auth-switch" id="toReg">Don't have an account? Sign up</div><div id="regF" style="display:none;"><div class="input-group"><label>Username</label><input id="rUser"></div><div class="input-group"><label>Email</label><input id="rEmail"></div><div class="input-group"><label>Password</label><input id="rPass" type="password"></div><button class="btn" id="rBtn">Sign up</button><div class="auth-switch"><button class="btn btn-secondary" id="toLogin">← Back</button></div></div><div id="authErr" class="auth-error"></div></div></div></div>`; }
  function attachAuth(){
    let err=document.getElementById('authErr');
    document.getElementById('toReg').onclick=()=>{document.getElementById('loginF').style.display='none';document.getElementById('regF').style.display='block';};
    document.getElementById('toLogin').onclick=()=>{document.getElementById('regF').style.display='none';document.getElementById('loginF').style.display='block';};
    document.getElementById('lBtn').onclick=()=>{
      let u=document.getElementById('lUser').value.trim().toLowerCase(), e=document.getElementById('lEmail').value.trim(), p=document.getElementById('lPass').value.trim();
      if(!/^[a-z][a-z0-9]{2,8}$/.test(u)){err.innerText='Invalid username';return;}
      if(!e||!/^\S+@\S+\.\S+$/.test(e)){err.innerText='Valid email required';return;}
      let clean='@'+u; let main=findMain(clean)||(App.users[clean]?clean:null);
      if(!main||!App.users[main]||App.users[main].password!==p||(App.users[main].email&&App.users[main].email.toLowerCase()!==e.toLowerCase())){err.innerText='Invalid credentials';return;}
      App.currentUser=main; App.activeTab='feed'; App.activeChat=null;
      setCookie('yolk_current_user',main,365);setCookie('yolk_active_tab','feed',365);eraseCookie('yolk_active_chat');
      loadPrivacy();if(App.lastSeenInterval)clearInterval(App.lastSeenInterval);App.lastSeenInterval=setInterval(()=>updateLastSeen(main),30000);updateLastSeen(main);
      render();
    };
    document.getElementById('rBtn').onclick=()=>{
      let u=document.getElementById('rUser').value.trim().toLowerCase(), e=document.getElementById('rEmail').value.trim(), p=document.getElementById('rPass').value.trim();
      if(!/^[a-z][a-z0-9]{2,8}$/.test(u)){err.innerText='Invalid username';return;}
      if(!e||!/^\S+@\S+\.\S+$/.test(e)){err.innerText='Valid email required';return;}
      if(!p){err.innerText='Enter password';return;} if(!/^[A-Za-z0-9]+$/.test(p)){err.innerText='Password Latin letters/digits only';return;}
      let clean='@'+u; if(App.users[clean]||findMain(clean)){err.innerText='Username taken';return;} if(isEmailTaken(e)){err.innerText='Email already used';return;}
      App.users[clean]={password:p,avatar:null,banner:null,badge:null,lastSeen:Date.now(),chatWallpaper:'',followers:[],following:[],additionalUsernames:[],displayName:u,email:e};
      App.currentUser=clean; App.activeTab='feed'; App.activeChat=null;
      setCookie('yolk_current_user',clean,365);setCookie('yolk_active_tab','feed',365);eraseCookie('yolk_active_chat');
      saveToDB().then(()=>{render();showNotification('Account created!');}).catch(()=>{err.innerText='Server error';});
    };
  }

  function renderMain(){
    let isChat=App.activeTab==='chats', partner=App.activeChat, isBot=partner&&App.users[partner]?.isBot;
    return `<div class="main-container">${isChat?`
      <div class="sidebar ${App.sidebarOpen?'open':''}">
        <div class="search-add"><input placeholder="@username" id="searchUser"><button class="icon-btn" id="addUserBtn">+</button></div>
        <div class="chats-list" id="chatsList"></div>

      </div>`:`
      <div class="feed-container">
        <div class="feed-filters"><button class="feed-filter-btn active" id="fAll">All posts</button><button class="feed-filter-btn" id="fLiked">Liked</button><button class="feed-filter-btn" id="fMy">My</button></div>

    </div>
    <div class="bottom-nav">
      <div class="nav-item ${App.activeTab==='feed'?'active':''}" data-tab="feed"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v1.png"></div>
      <div class="nav-item nav-chats ${App.activeTab==='chats'?'active':''}" data-tab="chats"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v2.png"></div>
      <div class="nav-item" id="settTab"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v4.png"></div>
    </div>`;

  function attachMain(){
    document.getElementById('backBtn')?.addEventListener('click',()=>{App.sidebarOpen=true;document.querySelector('.sidebar').classList.add('open');});
    document.getElementById('viewProfBtn')?.addEventListener('click',()=>{if(App.activeChat)openProfileModal(App.activeChat);});

    document.getElementById('addUserBtn')?.addEventListener('click',addUser);
    document.getElementById('msgText')?.addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();sendMessage();}});

        document.getElementById('closeNick').onclick=()=>document.getElementById('nickModal').remove();
        let r=document.getElementById('remNick'); if(r)r.onclick=()=>{if(App.localNicknames[App.activeChat])delete App.localNicknames[App.activeChat][App.currentUser];saveToDB();document.getElementById('nickModal').remove();render();};
      });

  function sendMessage(){
    let text=document.getElementById('msgText')?.value.trim()||'';
    if(!text&&!App.tempPhoto&&!App.tempVideo){showNotification('Empty message','error');return;}
    let to=App.activeChat; if(!to)return;
    if(to===CLICK_BOT){ handleClickBot(text); document.getElementById('msgText').value=''; App.tempPhoto=App.tempVideo=null; document.getElementById('mediaUp').value=''; return; }
    if(to===CREATE_BOT){ handleCreateMsg(text,App.tempPhoto||App.tempVideo); document.getElementById('msgText').value=''; App.tempPhoto=App.tempVideo=null; document.getElementById('mediaUp').value=''; return; }
    if(App.users[to]?.isBot){ handleCustomMsg(to,text); document.getElementById('msgText').value=''; App.tempPhoto=App.tempVideo=null; document.getElementById('mediaUp').value=''; return; }
    if(!canMessage(App.currentUser,to)){showNotification('Cannot message','error');return;}
    let media=null, isVid=false;
    if(App.tempVideo){media=App.tempVideo;isVid=true;}else if(App.tempPhoto){media=App.tempPhoto;}
    let msg={from:App.currentUser,text,time:Date.now(),photo:media,isVideo:isVid,likes:{},dislikes:{}};
    let cid=[App.currentUser,to].sort().join('_');
    if(!App.chats[cid])App.chats[cid]={user1:App.currentUser,user2:to,messages:[]};
    App.chats[cid].messages.push(msg);
    saveToDB();renderMessages(to);playSound();
    document.getElementById('msgText').value=''; App.tempPhoto=App.tempVideo=null; document.getElementById('mediaUp').value=''; updateChatList();
  }
  function renderMessages(partner){
    let cont=document.getElementById('msgList'); if(!cont)return;
    let cid=[App.currentUser,partner].sort().join('_');
    let msgs=App.chats[cid]?.messages||[];
    if(msgs.length===0){
      if(partner===CLICK_BOT){
        let wMsg={from:CLICK_BOT,text:'Привет! Я кликер-бот.\n'+handleClickBot('!balance'),time:Date.now(),photo:null,isVideo:false,likes:{},dislikes:{}};
        if(!App.chats[cid])App.chats[cid]={user1:App.currentUser,user2:partner,messages:[]};
        App.chats[cid].messages.push(wMsg); msgs=App.chats[cid].messages; saveToDB();
      }else if(partner===CREATE_BOT){
        let wMsg={from:CREATE_BOT,text:'👋 Привет! Я помогу создать бота.\n<button class="bot-btn" onclick="window.createTheme(\'random\')">🎲 Рандом</button><button class="bot-btn" onclick="window.createTheme(\'clicker\')">💎 Кликер</button><button class="bot-btn" onclick="window.createTheme(\'shop\')">🛒 Магазин</button>',time:Date.now(),photo:null,isVideo:false,likes:{},dislikes:{}};
        if(!App.chats[cid])App.chats[cid]={user1:App.currentUser,user2:partner,messages:[]};
        App.chats[cid].messages.push(wMsg); msgs=App.chats[cid].messages; saveToDB();
      }else if(App.users[partner]?.isBot){
        let wMsg={from:partner,text:customBotWelcome(App.users[partner]),time:Date.now(),photo:null,isVideo:false,likes:{},dislikes:{}};
        if(!App.chats[cid])App.chats[cid]={user1:App.currentUser,user2:partner,messages:[]};
        App.chats[cid].messages.push(wMsg); msgs=App.chats[cid].messages; saveToDB();
      }
    }
    cont.innerHTML=msgs.map((m,i)=>renderMsg(m,i,partner)).join('');
    setTimeout(()=>cont.scrollTop=cont.scrollHeight,100);
    updateChatHeader(partner);
  }
  function renderMsg(m,idx,partner){
    let isMe=m.from===App.currentUser, isBot=App.users[m.from]?.isBot;
    let fromD=m.from==='SYSTEM'?'SYSTEM':formatName(m.from);
    let mediaHtml=m.photo?(m.isVideo?`<video controls class="media-preview" src="${m.photo}"></video>`:`<img src="${m.photo}" class="media-preview" onclick="window.openImg('${m.photo}')">`):'';
    return `<div class="message ${isMe?'me':''} ${m.from==='SYSTEM'?'system-message':''}">
      ${!isMe&&m.from!=='SYSTEM'?`<small><span class="message-username" onclick="${isBot?'':`openProfileModal('${m.from}')`}">${fromD}</span></small><br>`:''}
      ${m.from==='SYSTEM'?'<small>🔔 SYSTEM</small><br>':''}
      <div class="message-text">${m.text.replace(/\n/g,'<br>')}</div>${mediaHtml}
      <div class="time">${new Date(m.time).toLocaleString()}</div>
      ${isMe?`<div class="msg-actions"><button onclick="window.delMsg('${partner}',${idx})">Delete</button></div>`:''}
    </div>`;
  }
  function updateChatList(){
    let c=document.getElementById('chatsList'); if(!c)return;
    let list=[]; Object.keys(App.chats||{}).forEach(k=>{let ch=App.chats[k];if(ch.user1===App.currentUser)list.push(ch.user2);if(ch.user2===App.currentUser)list.push(ch.user1);});
    c.innerHTML=list.map(u=>`<div class="chat-item ${u===App.activeChat?'active':''}" data-chat="${u}"><div class="chat-avatar">${App.users[u]?.avatar?`<img src="${App.users[u].avatar}" class="chat-avatar-img">`:`<img src="${DEFAULT_AVATAR}" class="chat-avatar-img">`}</div><div style="flex:1;">${formatName(u)}</div><span class="delete-chat-icon" onclick="window.delChat('${u}',event)"><img src="${ICONS.DELETE}" style="width:20px;"></span></div>`).join('');
    document.querySelectorAll('.chat-item').forEach(el=>el.addEventListener('click',e=>{if(e.target.closest('.delete-chat-icon'))return;let chat=el.dataset.chat;if(App.activeChat===chat){if(window.innerWidth<768){App.sidebarOpen=false;document.querySelector('.sidebar').classList.remove('open');}return;}App.activeChat=chat;setCookie('yolk_active_chat',chat,365);if(window.innerWidth<768){App.sidebarOpen=false;document.querySelector('.sidebar').classList.remove('open');}render();}));
  }
  function handleMedia(e){let f=e.target.files[0];if(!f)return;if(f.type.startsWith('image/')){let r=new FileReader();r.onload=ev=>compress(ev.target.result,800,800,0.6,c=>{App.tempPhoto=c;App.tempVideo=null;showNotification('Photo added');});r.readAsDataURL(f);}else if(f.type.startsWith('video/')){if(f.size>20*1024*1024){showNotification('Max 20MB','error');return;}let r=new FileReader();r.onload=ev=>{App.tempVideo=ev.target.result;App.tempPhoto=null;showNotification('Video added');};r.readAsDataURL(f);}}
  function addUser(){let q=document.getElementById('searchUser').value.trim().toLowerCase();if(!q)return showNotification('Enter username','error');if(!q.startsWith('@'))q='@'+q;let m=findMain(q)||(App.users[q]?q:null);if(!m)return showNotification('User not found','error');if(m===App.currentUser)return showNotification('That is you','error');if(!canMessage(App.currentUser,m))return showNotification('Cannot message','error');let cid=[App.currentUser,m].sort().join('_');if(!App.chats[cid])App.chats[cid]={user1:App.currentUser,user2:m,messages:[]};App.activeChat=m;setCookie('yolk_active_chat',m,365);document.getElementById('searchUser').value='';render();}
  window.delChat=function(u,e){e.stopPropagation();if(!confirm(`Delete chat with ${getDisplayName(u)}?`))return;let cid=[App.currentUser,u].sort().join('_');if(App.chats[cid])delete App.chats[cid];if(App.activeChat===u){App.activeChat=null;eraseCookie('yolk_active_chat');}saveToDB();render();};
  window.delMsg=function(p,i){let cid=[App.currentUser,p].sort().join('_');let ms=App.chats[cid]?.messages;if(ms?.[i]){ms.splice(i,1);saveToDB();renderMessages(p);showNotification('Deleted');}};
  window.openImg=function(s){let m=document.createElement('div');m.className='modal-overlay';m.onclick=()=>m.remove();m.innerHTML=`<div style="max-width:90%;max-height:90%;"><img src="${s}" style="max-width:100%;max-height:100%;border-radius:12px;"></div>`;document.body.appendChild(m);};
  function updateChatHeader(u){
    let h=document.querySelector('.chat-header-info'); if(!h)return;
    let s=h.querySelector('.chat-user-status'); if(s)s.remove();
    let strong=h.querySelector('strong'); if(strong)strong.innerHTML=formatName(u);
    if(App.users[u]?.isBot){let d=document.createElement('div');d.className='chat-user-status';d.textContent='online';h.appendChild(d);return;}
    let online=(Date.now()-App.users[u]?.lastSeen)<300000;
    let d=document.createElement('div');d.className='chat-user-status'+(online?'':' offline');d.textContent=online?'online':`last seen ${formatLastSeen(App.users[u]?.lastSeen)}`;h.appendChild(d);
  }
  function formatLastSeen(ls){if(!ls)return'long ago';let d=Date.now()-ls,m=Math.floor(d/6e4),h=Math.floor(d/36e5),dd=Math.floor(d/864e5);if(m<1)return'just now';if(m<5)return'5 min ago';if(m<15)return'15 min ago';if(m<30)return'30 min ago';if(m<60)return'1 hour ago';if(h<24)return`${h}h ago`;return`${dd}d ago`;}
  function playSound(){if(!App.soundEnabled)return;try{if(!App.audioCtx)App.audioCtx=new(window.AudioContext||window.webkitAudioContext)();let o=App.audioCtx.createOscillator(),g=App.audioCtx.createGain();o.connect(g);g.connect(App.audioCtx.destination);g.gain.value=0.2;o.frequency.value=880;o.start();g.gain.exponentialRampToValueAtTime(0.0001,App.audioCtx.currentTime+0.3);o.stop(App.audioCtx.currentTime+0.3);}catch(e){}}

  function initFeed(){
    let posts=App.posts||[];
    if(App.feedFilter==='all'){ App.allPostsShuffled=shuffle([...posts.filter(p=>p.author!==App.currentUser)]); App.allPostsIndex=0; let c=document.getElementById('feedPosts');if(c)c.innerHTML=''; renderFeed(); }
    else if(App.feedFilter==='liked') renderStatic(posts.filter(p=>p.likes?.[App.currentUser]).sort((a,b)=>b.time-a.time));
    else renderStatic(posts.filter(p=>p.author===App.currentUser).sort((a,b)=>b.time-a.time));
  }
  function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  function renderFeed(){ let fc=document.getElementById('feedPosts'); if(!fc||App.feedFilter!=='all')return;
    let add=()=>{if(!App.allPostsShuffled.length)return;let h='';for(let i=0;i<10;i++){if(App.allPostsIndex>=App.allPostsShuffled.length){App.allPostsShuffled=shuffle([...App.allPostsShuffled]);App.allPostsIndex=0;}let p=App.allPostsShuffled[App.allPostsIndex++];h+=genPostHTML(p);}fc.insertAdjacentHTML('beforeend',h);};
    let s=0; while((fc.scrollHeight<=fc.clientHeight+100)&&s<50){add();s++;} fc.onscroll=()=>{if(fc.scrollTop+fc.clientHeight>=fc.scrollHeight-100)add();};
  }
  function renderStatic(arr){let fc=document.getElementById('feedPosts');if(!fc)return;if(!arr.length){fc.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-secondary);">No posts.</div>';return;}fc.innerHTML=arr.map(genPostHTML).join('');}
  function genPostHTML(p){let a=App.users[p.author]||{};let av=a.avatar?`<img src="${a.avatar}" class="post-avatar-img">`:`<img src="${DEFAULT_AVATAR}" class="post-avatar-img">`;let m=p.media?(p.isVideo?`<video controls class="post-media" src="${p.media}"></video>`:`<img src="${p.media}" class="post-media" onclick="window.openImg('${p.media}')">`):'';let likes=Object.keys(p.likes||{}).length,comms=(p.comments||[]).length,liked=p.likes?.[App.currentUser];let canDel=p.author===App.currentUser||App.currentUser===ADMIN;
    let sub=isFollowing(App.currentUser,p.author); let subBtn=p.author!==App.currentUser?`<button class="${sub?'unsubscribe-btn':'subscribe-btn'}" onclick="window.toggleSub('${p.id}','${p.author}')" style="margin-left:auto;">${sub?'UNFOLLOW':'FOLLOW'}</button>`:'';
    return `<div class="post-card" data-id="${p.id}"><div class="post-header" onclick="openProfileModal('${p.author}')"><div class="post-avatar">${av}</div><div style="flex:1;"><div class="post-author">${formatName(p.author)}</div><div class="post-time">${new Date(p.time).toLocaleString()}</div></div>${subBtn}</div><div class="post-text">${p.text.replace(/\n/g,'<br>')}</div>${m}<div class="post-stats"><button class="post-like ${liked?'active':''}" onclick="window.toggleLike('${p.id}')"><img src="${liked?ICONS.LIKE_ON:ICONS.LIKE_OFF}" style="width:24px;"> <span>${likes}</span></button><button class="post-comment" onclick="window.openComm('${p.id}')"><img src="${ICONS.COMMENT}" style="width:24px;"> <span>${comms}</span></button>${canDel?`<button class="post-delete" onclick="window.delPost('${p.id}')"><img src="${ICONS.DELETE}" style="width:24px;"></button>`:''}</div></div>`;
  }
  window.toggleLike=function(id){let p=App.posts.find(x=>x.id===id);if(!p)return;if(!p.likes)p.likes={};p.likes[App.currentUser]?delete p.likes[App.currentUser]:p.likes[App.currentUser]=true;saveToDB();updatePostStats(id);};
  function updatePostStats(id){let p=App.posts.find(x=>x.id===id);if(!p)return;document.querySelectorAll(`.post-card[data-id="${id}"]`).forEach(c=>{let lb=c.querySelector('.post-like');if(lb){lb.classList.toggle('active',p.likes?.[App.currentUser]);lb.querySelector('img').src=p.likes?.[App.currentUser]?ICONS.LIKE_ON:ICONS.LIKE_OFF;lb.querySelector('span').textContent=Object.keys(p.likes||{}).length;}let cb=c.querySelector('.post-comment span');if(cb)cb.textContent=(p.comments||[]).length;});}
  window.openComm=function(id){let p=App.posts.find(x=>x.id===id);if(!p)return;let list=(p.comments||[]).map(c=>`<div class="comment-item"><div class="comment-author" onclick="openProfileModal('${c.author}')">${formatName(c.author)}</div><div class="comment-text">${c.text}</div><div class="comment-time">${new Date(c.time).toLocaleString()}</div></div>`).join('')||'<div>No comments</div>';
    let h=`<div class="modal-overlay" id="commModal"><div class="comments-modal"><h3>Comments</h3><div style="max-height:300px;overflow-y:auto;">${list}</div><div class="add-comment"><input id="newCommText" placeholder="Write..."><button class="profile-btn" id="sendComm">Send</button></div><div style="margin-top:12px;"><button class="profile-btn secondary" id="closeComm">Close</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend',h);
    document.getElementById('sendComm').onclick=()=>{if(App.users[App.currentUser]?.bannedFromCommenting){showNotification('Banned from commenting','error');return;}let t=document.getElementById('newCommText').value.trim();if(!t)return;if(!p.comments)p.comments=[];p.comments.push({author:App.currentUser,text:t,time:Date.now()});saveToDB();document.getElementById('commModal').remove();updatePostStats(id);};
    document.getElementById('closeComm').onclick=()=>document.getElementById('commModal').remove();
  };
  window.delPost=function(id){if(!confirm('Delete?'))return;let i=App.posts.findIndex(p=>p.id===id);if(i!==-1&&(App.posts[i].author===App.currentUser||App.currentUser===ADMIN)){App.posts.splice(i,1);saveToDB();initFeed();showNotification('Deleted');}};
  window.toggleSub=function(pid,author){if(author===App.currentUser)return;let is=isFollowing(App.currentUser,author);if(is)unfollow(App.currentUser,author);else follow(App.currentUser,author);document.querySelectorAll(`.post-card[data-id="${pid}"]`).forEach(c=>{let b=c.querySelector('.subscribe-btn,.unsubscribe-btn');if(b){b.textContent=is?'FOLLOW':'UNFOLLOW';b.className=is?'subscribe-btn':'unsubscribe-btn';}});};
  function isFollowing(a,b){if(a===b)return false;let ua=App.users[a];return ua?.following?.includes(b)||false;}
  function follow(a,b){if(a===b)return;let ua=App.users[a];if(!ua.following)ua.following=[];ua.following.push(b);let ub=App.users[b];if(!ub.followers)ub.followers=[];ub.followers.push(a);saveToDB();}
  function unfollow(a,b){let ua=App.users[a];if(ua?.following){let i=ua.following.indexOf(b);if(i!==-1)ua.following.splice(i,1);}let ub=App.users[b];if(ub?.followers){let i=ub.followers.indexOf(a);if(i!==-1)ub.followers.splice(i,1);}saveToDB();}

  function openCreatePost(){
    let h=`<div class="modal-overlay" id="createPostOverlay"><div class="post-creation-modal"><h3 style="margin-bottom:16px;">new post</h3><textarea id="postText" rows="3" placeholder="what's new?"></textarea><div style="margin:12px 0;"><button class="change-file-btn" id="addMediaBtn">add photo / video</button><input type="file" id="postMediaFile" accept="image/*,video/*" style="display:none;"></div><div id="mediaPreview" style="margin-bottom:12px;"></div><div class="profile-actions"><button class="profile-btn" id="publishPost">publish</button><button class="profile-btn secondary" id="cancelPost">cancel</button></div></div></div>`;
    document.body.insertAdjacentHTML('beforeend',h);
    let tmpMedia=null, isVid=false;
    document.getElementById('addMediaBtn').onclick=()=>document.getElementById('postMediaFile').click();
    document.getElementById('postMediaFile').onchange=e=>{let f=e.target.files[0];if(!f)return;if(f.type.startsWith('image/')){let r=new FileReader();r.onload=ev=>compress(ev.target.result,800,800,0.7,c=>{tmpMedia=c;isVid=false;document.getElementById('mediaPreview').innerHTML=`<img src="${c}" class="media-preview-small">`;});r.readAsDataURL(f);}else if(f.type.startsWith('video/')){if(f.size>20*1024*1024){showNotification('Max 20MB','error');return;}let r=new FileReader();r.onload=ev=>{tmpMedia=ev.target.result;isVid=true;document.getElementById('mediaPreview').innerHTML=`<video controls class="media-preview-small" src="${ev.target.result}"></video>`;};r.readAsDataURL(f);}};
    document.getElementById('publishPost').onclick=()=>{let t=document.getElementById('postText').value.trim();if(!t&&!tmpMedia){showNotification('Text or media','error');return;}if(!canCreatePost())return;let p={id:Date.now()+'_'+Math.random().toString(36),author:App.currentUser,text:t,media:tmpMedia||null,isVideo:isVid,time:Date.now(),likes:{},dislikes:{},comments:[]};App.posts.unshift(p);App.lastPostTime[App.currentUser]=Date.now();saveToDB();document.getElementById('createPostOverlay').remove();initFeed();showNotification('Post published!');};
    document.getElementById('cancelPost').onclick=()=>document.getElementById('createPostOverlay').remove();
  }
  function canCreatePost(){if(App.users[App.currentUser]?.bannedFromPosting){showNotification('Banned','error');return false;}let now=Date.now(),last=App.lastPostTime[App.currentUser]||0;if(now-last<180000){showNotification('Wait '+Math.ceil((180000-(now-last))/1000)+'s','error');return false;}return true;}

  window.addEventListener('load',()=>{loadStart=Date.now();loadFromDB();subscribeState();loadTheme();});
})();
</script>
</body>
</html>
