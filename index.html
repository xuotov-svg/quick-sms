<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/yolk6767.jpg">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg: #0a0a0a;
            --bg-panel: #0f0f0f;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --soft: #1a1a1a;
            --border: #2a2a2a;
            --accent: #d4af37;
            --accent-soft: #2a2418;
            --message-me: #1e2a3a;
            --message-other: #1a1a1a;
            --header: #0a0a0a;
            --shadow: rgba(0,0,0,0.5);
            --danger: #ff4444;
            --success: #4CAF50;
            --input-bg: rgba(0,0,0,0.5);
            --glass-bg: rgba(10, 10, 15, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(212, 175, 55, 0.15);
            --hover-border: rgba(212, 175, 55, 0.4);
        }
        
        body.light-theme {
            --bg: #ffffff;
            --bg-panel: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --soft: #e9ecef;
            --border: #dee2e6;
            --accent: #b8860b;
            --accent-soft: #fff3cd;
            --message-me: #e3f2fd;
            --message-other: #f1f3f4;
            --header: #ffffff;
            --shadow: rgba(0,0,0,0.08);
            --input-bg: rgba(0,0,0,0.03);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(184, 134, 11, 0.08);
            --hover-border: rgba(184, 134, 11, 0.25);
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            padding: 0;
            margin: 0;
            transition: background 0.2s ease;
        }
        
        #app {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            background: var(--bg-panel);
            box-shadow: 0 0 20px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            position: relative;
            z-index: 1;
            transition: background 0.2s ease;
        }
        
        .chat-area,
        .sidebar,
        .chat-header,
        .input-area,
        .auth-box,
        .profile-modal,
        .message,
        .chat-item,
        .user-profile,
        .search-add,
        .two-factor-box,
        .feed-container,
        .post-card,
        .comments-modal,
        .music-container,
        .track-card {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        
        .chat-item:hover,
        .chat-item.active,
        .btn:hover,
        .icon-btn:hover,
        .send-btn:hover,
        .profile-btn:hover,
        .tab:hover,
        .tab.active,
        .nav-item:hover,
        .nav-item.active {
            background: var(--hover-bg);
            border-color: var(--hover-border);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        
        .chat-area, .feed-container, .music-container {
            background-color: transparent !important;
            position: relative;
        }
        
        body:not(.light-theme) .chat-area,
        body:not(.light-theme) .feed-container,
        body:not(.light-theme) .music-container {
            background-color: #0a0a0a !important;
        }
        
        body.light-theme .chat-area,
        body.light-theme .feed-container,
        body.light-theme .music-container {
            background-color: #ffffff !important;
        }
        
        .verified-icon {
            display: inline-block;
            width: 32px;
            height: 32px;
            background-image: url('https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/bot%20(1).png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-left: 4px;
            vertical-align: middle;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: transparent;
            position: relative;
            z-index: 1;
        }
        
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--message-other);
            color: var(--text);
            align-self: flex-start;
            word-break: break-word;
            border: 1px solid var(--glass-border);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        
        .message.me {
            align-self: flex-end;
            background: var(--message-me);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @keyframes albumenCharGlow {
            0% { text-shadow: 0 0 0 #0066cc; color: #0066cc; opacity: 0.8; }
            15% { text-shadow: 0 0 8px #88ccff, 0 0 3px #aaddff; color: #3399ff; opacity: 1; }
            30% { text-shadow: 0 0 12px #88ccff, 0 0 5px #66bbff; color: #0066cc; opacity: 1; }
            50% { text-shadow: 0 0 5px #88ccff; color: #2277dd; opacity: 0.9; }
            100% { text-shadow: 0 0 0 #0066cc; color: #0066cc; opacity: 0.8; }
        }
        
        .albumen-name {
            font-weight: bold;
            display: inline-flex;
            flex-wrap: wrap;
        }
        
        .albumen-char {
            display: inline-block;
            animation: albumenCharGlow 3s ease-in-out infinite;
        }
        
        .message-text { color: var(--text); }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; color: var(--text-secondary); }
        .message small { color: var(--text-secondary); }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--message-other);
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 8px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 13px;
        }
        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span {
            width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }
        .loading-text {
            color: var(--text);
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 4px;
        }
        .loading-dots {
            display: inline-block;
        }
        .loading-dots span {
            animation: dotPulse 1.4s ease-in-out infinite;
            display: inline-block;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
        }
        
        body.light-theme .icon-btn,
        body.light-theme .send-btn,
        body.light-theme .file-label,
        body.light-theme .tiny-btn,
        body.light-theme .inline-btn,
        body.light-theme .profile-btn,
        body.light-theme .subscribe-btn,
        body.light-theme .unsubscribe-btn,
        body.light-theme .like-btn,
        body.light-theme .dislike-btn,
        body.light-theme .settings-icon,
        body.light-theme .delete-chat-icon,
        body.light-theme .tab,
        body.light-theme .msg-actions button,
        body.light-theme .back-btn,
        body.light-theme .change-username-btn,
        body.light-theme .toggle-password,
        body.light-theme .resend-link,
        body.light-theme .close-btn,
        body.light-theme .nav-item,
        body.light-theme .post-like,
        body.light-theme .post-dislike,
        body.light-theme .post-comment,
        body.light-theme .post-delete,
        body.light-theme .create-post-btn,
        body.light-theme .create-track-btn {
            filter: none !important;
        }
        
        .icon-btn,
        .send-btn,
        .file-label,
        .tiny-btn,
        .inline-btn,
        .profile-btn,
        .subscribe-btn,
        .unsubscribe-btn,
        .like-btn,
        .dislike-btn,
        .settings-icon,
        .delete-chat-icon,
        .tab,
        .msg-actions button,
        .back-btn,
        .create-nft-btn,
        .change-username-btn,
        .toggle-password,
        .resend-link,
        .close-btn,
        .nav-item,
        .post-like,
        .post-dislike,
        .post-comment,
        .post-delete,
        .create-post-btn,
        .create-track-btn {
            transition: all 0.2s ease;
        }
        
        .icon-btn:hover,
        .send-btn:hover,
        .file-label:hover,
        .tiny-btn:hover,
        .inline-btn:hover,
        .profile-btn:hover,
        .btn:hover,
        .subscribe-btn:hover,
        .unsubscribe-btn:hover,
        .like-btn:hover,
        .dislike-btn:hover,
        .settings-icon:hover,
        .delete-chat-icon:hover,
        .tab:hover,
        .msg-actions button:hover,
        .nav-item:hover,
        .post-like:hover,
        .post-dislike:hover,
        .post-comment:hover,
        .post-delete:hover,
        .create-post-btn:hover,
        .create-track-btn:hover {
            filter: brightness(1.05);
        }
        
        .tab.active,
        .btn:active,
        .icon-btn:active,
        .send-btn:active,
        .nav-item.active {
            color: var(--accent);
        }
        
        .profile-banner-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .banner-container { width: 100%; height: 150px; border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .banner-image { width: 100%; height: 100%; object-fit: cover; }
        .banner-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; }
        body.light-theme .banner-placeholder { background: #f0f0f0; color: #aaa; }
        body.light-theme .banner-container { background: #f0f0f0; }
        
        .profile-avatar-overlay { position: absolute; bottom: -40px; left: 20px; z-index: 10; }
        .profile-avatar-overlay .avatar-large { width: 100px; height: 100px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--text); overflow: hidden; box-shadow: 0 4px 20px var(--shadow); }
        body.light-theme .profile-avatar-overlay .avatar-large { background: #e0e0e0; }
        .profile-avatar-overlay .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-name-section { margin-top: 50px; padding-left: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 4px; }
        
        .settings-icon { cursor: pointer; font-size: 24px; padding: 8px; border-radius: 50%; transition: 0.2s; background: none; border: none; color: var(--text); }
        .settings-icon:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
        .settings-icon-img { width: 28px; height: 28px; object-fit: contain; cursor: pointer; }
        
        .toggle-switch { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle-switch .toggle-label { font-size: 14px; color: var(--text); }
        .toggle-switch .toggle-checkbox { width: 40px; height: 20px; background: #2a2a2a; border-radius: 20px; position: relative; transition: 0.2s; border: 1px solid var(--glass-border); }
        .toggle-switch .toggle-checkbox::after { content: ""; width: 16px; height: 16px; background: #ffffff; border-radius: 50%; position: absolute; top: 1px; left: 2px; transition: 0.2s; }
        .toggle-switch.active .toggle-checkbox { background: var(--accent); }
        .toggle-switch.active .toggle-checkbox::after { left: 20px; }
        
        .auth-container, .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .auth-box { max-width: 400px; margin: auto; background: var(--glass-bg); padding: 30px 24px; border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px var(--shadow); width: 90%; animation: fadeIn 0.3s ease; }
        .auth-box h2 { color: var(--accent); margin-bottom: 16px; font-weight: 500; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text); font-size: 15px; outline: none; transition: all 0.2s; }
        .input-group input:focus, .input-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2); }
        
        .btn { background: var(--accent); color: #000000; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--glass-border); }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .auth-error { color: #ff6666; margin-top: 12px; font-size: 14px; text-align: center; font-weight: bold; }
        .auth-switch { margin-top: 20px; display: flex; gap: 10px; }
        
        .two-factor-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 10000; animation: fadeIn 0.3s ease; backdrop-filter: blur(8px); }
        .two-factor-box { background: var(--glass-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--glass-border); max-width: 400px; width: 90%; text-align: center; }
        .two-factor-box h3 { color: var(--accent); margin-bottom: 20px; }
        .two-factor-box p { margin-bottom: 20px; color: var(--text); }
        .code-input { font-size: 24px; letter-spacing: 10px; text-align: center; padding: 15px; border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 20px; width: 100%; background: var(--input-bg); color: var(--text); }
        .resend-link { color: var(--accent); cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
        
        .main-container { flex-direction: row; position: relative; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--glass-bg); position: relative; z-index: 5; width: 100%; }
        
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #6b7280; font-size: 24px; cursor: pointer; margin-right: 10px; display: none; width: 40px; height: 40px; border-radius: 12px; }
        .back-btn.visible { display: block; }
        .back-btn:hover { background: var(--hover-bg); }
        
        @media (min-width: 768px) { .sidebar { position: relative; transform: translateX(0); width: 300px; } .back-btn { display: none !important; } }
        
        .user-profile { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); background: var(--glass-bg); cursor: default; }
        .avatar { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text); font-weight: 500; overflow: hidden; flex-shrink: 0; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .username-display { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 2px; flex-wrap: wrap; }
        
        .search-add { padding: 12px; border-bottom: 1px solid var(--glass-border); display: flex; gap: 8px; background: var(--glass-bg); }
        .search-add input { flex: 1; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 15px; color: var(--text); outline: none; }
        .search-add input::placeholder { color: var(--text-secondary); }
        
        .icon-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--glass-border); color: #6b7280; width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: rgba(212, 175, 55, 0.3); }
        
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item { padding: 12px 16px; border-radius: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); background: var(--glass-bg); border: 1px solid var(--glass-border); transition: all 0.2s; }
        .chat-item:hover { background: var(--hover-bg); border-color: var(--hover-border); }
        .chat-item.active { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--accent); }
        
        .chat-avatar { width: 40px; height: 40px; background: rgba(212, 175, 55, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--glass-border); color: var(--text); }
        .chat-avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .delete-chat-icon { margin-left: auto; color: #6b7280; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; }
        .delete-chat-icon img { width: 20px; height: 20px; object-fit: contain; }
        .delete-chat-icon:hover { opacity: 0.8; }
        
        .chat-header { padding: 12px 16px; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .chat-header-info { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .chat-header-info strong { color: var(--text); font-size: 16px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .chat-user-status { font-size: 11px; color: #4CAF50; font-weight: normal; margin-top: 2px; }
        .chat-user-status.offline { color: #888; }
        
        .chat-actions { display: flex; gap: 8px; align-items: center; }
        .tiny-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #6b7280; font-weight: 500; }
        .tiny-btn:hover { background: rgba(212, 175, 55, 0.2); }
        
        .subscribe-btn { background: #DBBA00; border: none; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #000000; font-weight: 500; }
        .subscribe-btn:hover { filter: brightness(1.1); }
        .unsubscribe-btn { background: #818181; border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #ffffff; font-weight: 500; }
        .unsubscribe-btn:hover { background: #6a6a6a; }
        
        .system-message { background: rgba(40, 40, 45, 0.7); border: 1px solid var(--glass-border); color: #aaaaaa; font-style: italic; }
        
        .msg-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
        .msg-actions button { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #6b7280; cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 500; }
        .msg-actions button:hover { background: #ff4444; color: white; }
        
        .like-btn, .dislike-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: #6b7280; display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 20px; transition: 0.2s; }
        .like-btn.liked, .dislike-btn.disliked { color: var(--accent); }
        .like-btn.liked { color: #4CAF50; }
        .dislike-btn.disliked { color: #ff6666; }
        .like-btn:hover, .dislike-btn:hover { background: rgba(212, 175, 55, 0.2); }

            function formatLastSeen(lastSeen, chatPartner) {
                if (!lastSeen) return 'long ago';
                const now = Date.now();
                const diff = now - lastSeen;
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);
                if (minutes < 1) return 'just now';
                if (minutes < 5) return `${minutes} min ago`;
                if (minutes < 15) return '5 min ago';
                if (minutes < 30) return '15 min ago';
                if (minutes < 60) return '30 min ago';
                if (hours < 2) return '1 hour ago';
                if (hours < 5) return `${hours} hours ago`;
                if (hours < 24) return `${hours} hours ago`;
                if (days === 1) return '1 day ago';
                if (days < 5) return `${days} days ago`;
                return `${days} days ago`;
            }

            function playHappySound() { if (!App.soundEnabled) return; try { if (!App.audioCtx) { App.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); App.audioCtx.resume(); } const ctx = App.audioCtx; const now = ctx.currentTime; const osc1 = ctx.createOscillator(); const gain = ctx.createGain(); osc1.connect(gain); gain.connect(ctx.destination); gain.gain.value = 0.2; osc1.frequency.value = 880; osc1.start(); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3); osc1.stop(now + 0.3); } catch(e) { console.log('Sound error:', e); } }
            function showConfetti() { const confettiDiv = document.createElement('div'); confettiDiv.className = 'confetti'; for (let i = 0; i < 50; i++) { const piece = document.createElement('div'); piece.className = 'confetti-piece'; piece.style.left = Math.random() * 100 + '%'; piece.style.animationDelay = Math.random() * 2 + 's'; piece.style.background = ['#ffd700', '#ffb347', '#ff8c00', '#d4af37'][Math.floor(Math.random() * 4)]; confettiDiv.appendChild(piece); } document.body.appendChild(confettiDiv); setTimeout(() => confettiDiv.remove(), 3000); }
            function showNotification(message, type = 'success') { const notification = document.createElement('div'); notification.className = 'notification' + (type === 'error' ? ' error' : ''); notification.textContent = message; document.body.appendChild(notification); setTimeout(() => notification.remove(), 3000); }
            function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) { const img = new Image(); img.onload = () => { let width = img.width; let height = img.height; if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; } if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; } const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height); const compressedDataUrl = canvas.toDataURL('image/jpeg', quality); callback(compressedDataUrl); }; img.src = dataUrl; }
            function generateId() { return Date.now() + '_' + Math.random().toString(36).substr(2, 9); }

            function applyWallpaper() { const chatArea = document.querySelector('.chat-area'); if (!chatArea) return; const wallpaper = App.users[App.currentUser]?.chatWallpaper || ''; if (wallpaper && wallpaper.startsWith('data:image')) { chatArea.style.backgroundImage = `url('${wallpaper}')`; chatArea.style.backgroundSize = 'cover'; chatArea.style.backgroundPosition = 'center'; chatArea.style.backgroundRepeat = 'no-repeat'; } else { chatArea.style.backgroundImage = 'none'; chatArea.style.backgroundColor = 'rgba(5, 5, 5, 0.85)'; } }

            function ensureChat(userA, userB) { if (!userA || !userB || userA === userB) return; const chatId = [userA, userB].sort().join('_'); if (!App.chats[chatId]) { App.chats[chatId] = { user1: userA, user2: userB, messages: [] }; saveToSupabase(); } return chatId; }

            function ensureUserFollowData(username) {
                if (!App.users[username]) return;
                if (!App.users[username].followers) App.users[username].followers = [];
                if (!App.users[username].following) App.users[username].following = [];
            }
            
            function isFollowing(currentUser, targetUser) {
                if (currentUser === targetUser) return false;
                ensureUserFollowData(currentUser);
                ensureUserFollowData(targetUser);
                return App.users[currentUser].following.includes(targetUser);
            }
            
            function subscribeToUser(currentUser, targetUser) {
                if (currentUser === targetUser) {
                    showNotification('Cannot follow yourself', 'error');
                    return false;
                }
                ensureUserFollowData(currentUser);
                ensureUserFollowData(targetUser);
                if (App.users[currentUser].following.includes(targetUser)) {
                    showNotification('Already following', 'error');
                    return false;
                }
                App.users[currentUser].following.push(targetUser);
                App.users[targetUser].followers.push(currentUser);
                saveToSupabase();
                showNotification(`Followed ${getDisplayName(targetUser)}`);
                return true;
            }
            
            function unsubscribeFromUser(currentUser, targetUser) {
                ensureUserFollowData(currentUser);
                ensureUserFollowData(targetUser);
                const idxFollowing = App.users[currentUser].following.indexOf(targetUser);
                if (idxFollowing !== -1) App.users[currentUser].following.splice(idxFollowing, 1);
                const idxFollower = App.users[targetUser].followers.indexOf(currentUser);
                if (idxFollower !== -1) App.users[targetUser].followers.splice(idxFollower, 1);
                saveToSupabase();
                showNotification(`Unfollowed ${getDisplayName(targetUser)}`);
                return true;
            }

                const shuffled = [...App.posts];
                for (let i = shuffled.length - 1; i > 0; i--) {

                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];

                return shuffled;
            }

                feedPage = 0;
                feedPosts = App.posts.length > 0 ? getShuffledPosts() : [];

                    const likesCount = Object.keys(post.likes || {}).length;

            window.toggleLikePost = function(postId) {
                const post = App.posts.find(p => p.id === postId);
                if (!post) return;
                if (!post.likes) post.likes = {};
                if (!post.dislikes) post.dislikes = {};

                if (post.likes[user]) delete post.likes[user];

                    post.likes[user] = true;
                }
                saveToSupabase();
                updatePostStats(postId);

            function updatePostStats(postId) {
                const post = App.posts.find(p => p.id === postId);
                if (!post) return;
                const postCards = document.querySelectorAll(`.post-card[data-post-id="${postId}"]`);
                if (postCards.length === 0) return;
                const likesCount = Object.keys(post.likes || {}).length;
                const commentsCount = post.comments?.length || 0;
                const userLiked = post.likes && post.likes[App.currentUser];
                
                postCards.forEach(postCard => {
                    const likeBtn = postCard.querySelector('.post-like');
                    const commentBtn = postCard.querySelector('.post-comment');

                        likeBtn.classList.toggle('active', userLiked);

                        if (commentSpan) commentSpan.textContent = commentsCount;

            function canCreatePost() {
                const now = Date.now();
                const last = App.lastPostTime[App.currentUser] || 0;
                const diff = now - last;
                const cooldown = 3 * 60 * 1000;
                if (diff < cooldown) {
                    const remaining = Math.ceil((cooldown - diff) / 1000);
                    showNotification(`Next post in ${remaining} sec.`, 'error');
                    return false;
                }
                return true;
            }

            window.togglePlayPause = function(trackId) {
                const track = App.tracks.find(t => t.id === trackId);
                if (!track) return;
                
                if (App.currentAudio && App.currentTrackId === trackId) {
                    if (App.currentAudio.paused) {
                        App.currentAudio.play();
                        updatePlayPauseIcon(trackId, true);
                    } else {
                        App.currentAudio.pause();
                        updatePlayPauseIcon(trackId, false);
                    }
                } else {
                    if (App.currentAudio) {
                        App.currentAudio.pause();
                        if (App.currentTrackId) updatePlayPauseIcon(App.currentTrackId, false);
                    }
                    const audio = new Audio(track.audio);
                    App.currentAudio = audio;
                    App.currentTrackId = trackId;
                    
                    audio.addEventListener('loadedmetadata', () => {
                        updateTimeDisplay(trackId, audio);
                    });
                    audio.addEventListener('timeupdate', () => {
                        updateProgress(trackId, audio);
                        updateTimeDisplay(trackId, audio);
                    });
                    audio.addEventListener('ended', () => {
                        updatePlayPauseIcon(trackId, false);
                        App.currentAudio = null;
                        App.currentTrackId = null;
                    });
                    audio.play();
                    updatePlayPauseIcon(trackId, true);
                }
            };

            function updatePlayPauseIcon(trackId, isPlaying) {
                const btn = document.querySelector(`.play-pause-btn[data-track-id="${trackId}"] img`);
                if (btn) btn.src = isPlaying ? ICONS.PAUSE : ICONS.PLAY;
            }

            function updateProgress(trackId, audio) {
                const fill = document.getElementById(`progress-${trackId}`);
                if (fill && audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    fill.style.width = percent + '%';
                }
            }

            function updateTimeDisplay(trackId, audio) {
                const display = document.getElementById(`time-${trackId}`);
                if (display) {
                    const current = formatTime(audio.currentTime);
                    const total = formatTime(audio.duration);
                    display.textContent = `${current} / ${total}`;
                }
            }

            function formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            window.seekTrack = function(trackId, percent) {
                if (App.currentAudio && App.currentTrackId === trackId) {
                    App.currentAudio.currentTime = percent * App.currentAudio.duration;
                }
            };

            window.deleteTrack = function(trackId) {

                const canDelete = (track.author === App.currentUser || App.currentUser === ADMIN_USER);
                if (!canDelete) {

                    return;
                }
                if (!confirm('Delete track?')) return;
                const index = App.tracks.findIndex(t => t.id === trackId);
                if (index !== -1) {
                    if (App.currentTrackId === trackId && App.currentAudio) {
                        App.currentAudio.pause();
                        App.currentAudio = null;
                        App.currentTrackId = null;
                    }
                    App.tracks.splice(index, 1);
                    saveToSupabase();
                    renderMusic();
                    showNotification('Track deleted');
                }
            };

                    const email = document.getElementById('loginEmail').value.trim();
                    const pass = document.getElementById('loginPassword').value.trim(); 
                    if (!isValidUsername(username)) { errorDiv.innerText = '! Invalid username format'; return; } 
                    if (!email || !/^\S+@\S+\.\S+$/.test(email)) { errorDiv.innerText = '! Enter a valid email'; return; }
                    const clean = '@' + username;
                    
                    let mainUsername = findMainUsername(clean);
                    if (!mainUsername) {
                        if (App.users[clean]) mainUsername = clean;
                    }
                    
                    if (!mainUsername || !App.users[mainUsername] || App.users[mainUsername].password !== pass || (App.users[mainUsername].email && App.users[mainUsername].email.toLowerCase() !== email.toLowerCase())) { 
                        errorDiv.innerText = '! Invalid username, email or password'; 
                        return; 
                    } 
                    const user = App.users[mainUsername]; 
                    App.currentUser = mainUsername; 
                    App.activeTab = 'feed';
                    localStorage.setItem('yolk_current_user', mainUsername); 
                    loadPrivacySettings(); 
                    if (App.lastSeenInterval) clearInterval(App.lastSeenInterval); 
                    App.lastSeenInterval = setInterval(() => { updateLastSeen(mainUsername); }, 30000); 
                    updateLastSeen(mainUsername); 
                    render(); 
                }); 
                document.getElementById('registerBtn')?.addEventListener('click', () => { 
                    let username = document.getElementById('regUsername').value.trim().toLowerCase(); 
                    const email = document.getElementById('regEmail').value.trim();
                    const pass = document.getElementById('regPassword').value.trim(); 
                    if (!isValidUsername(username)) { errorDiv.innerText = '! Invalid username format'; return; } 
                    if (!email || !/^\S+@\S+\.\S+$/.test(email)) { errorDiv.innerText = '! Enter a valid email'; return; }
                    if (!pass) { errorDiv.innerText = '! Enter password'; return; } 
                    if (!isValidPassword(pass)) { errorDiv.innerText = '! Password must contain only Latin letters and digits'; return; } 
                    const clean = '@' + username; 
                    if (App.users[clean] || App.systemBots.includes(clean) || findMainUsername(clean)) { errorDiv.innerText = '! Username already taken'; return; } 
                    if (isEmailTaken(email)) { errorDiv.innerText = '! Email already used'; return; }
                    const newUser = { password: pass, avatar: null, banner: null, verified: false, status: null, age: 14, lastSeen: Date.now(), chatWallpaper: '', followers: [], following: [], additionalUsernames: [], displayName: username, email: email, premium: false }; 
                    App.users[clean] = newUser;
                    App.currentUser = clean; 
                    App.activeTab = 'feed';
                    localStorage.setItem('yolk_current_user', clean); 
                    saveToSupabase().then(() => {
                        render(); 
                        showNotification('✅ Account created!'); 
                    }).catch((err) => { console.error('❌ Error saving user:', err); errorDiv.innerText = '! Server error, try later'; setTimeout(() => { errorDiv.innerText = ''; }, 3000); }); 
                }); 
            }

            function renderMain() { 
                const user = App.currentUser; 
                const userData = App.users[user] || {}; 
                const isChatsActive = App.activeTab === 'chats'; 
                const isFeedActive = App.activeTab === 'feed';
                const isMusicActive = App.activeTab === 'music';
                let blockedMessage = '';
                if (App.activeChat && !canUserMessage(user, App.activeChat)) {
                    blockedMessage = 'This user does not accept messages from strangers';
                }
                
                const chatTitle = formatUserNameWithStatus(App.activeChat);
                const followersCount = (userData.followers || []).length;
                const followingCount = (userData.following || []).length;
                
                return `
                    <div class="main-container">
                        ${isChatsActive ? `
                        <div class="sidebar ${App.sidebarOpen ? 'open' : ''}">
                            <div class="user-profile">
                                <div class="avatar">${userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : (getDisplayName(user)[0]?.toUpperCase() || '?')}</div>
                                <div style="flex:1;">
                                    <div class="username-display">${formatUserNameWithStatus(user)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div>
                                    <div class="followers-info" style="font-size:12px; color: var(--text-secondary);">${followersCount} followers · ${followingCount} following</div>
                                </div>
                            </div>
                            <div class="search-add"><input type="text" placeholder="SEARCH @username" id="searchUserInput"><button class="icon-btn" id="addUserBtn">+</button></div>
                            <div class="chats-list" id="chatsList"></div>
                        </div>
                        <div class="chat-area">
                            <div class="chat-header">
                                <div class="chat-header-info"><button class="back-btn ${window.innerWidth < 768 ? 'visible' : ''}" id="backBtn">←</button><strong>${chatTitle}${App.users[App.activeChat]?.verified ? '<span class="verified-icon"></span>' : ''}</strong></div>
                                <div class="chat-actions"><button class="tiny-btn" id="viewProfileBtn">PROFILE</button></div>
                            </div>
                            <div class="messages-container" id="messageList"></div>
                            ${canUserMessage(user, App.activeChat) ? `<div class="input-area"><input type="text" id="messageText" placeholder="MESSAGE..." autofocus oninput="sendTypingIndicator('${App.activeChat}')"><label for="fileUpload" class="file-label">PHOTO</label><label for="videoUpload" class="file-label">VIDEO</label><input type="file" id="fileUpload" accept="image/*"><input type="file" id="videoUpload" accept="video/*"><button class="send-btn" id="sendMsgBtn">➤</button></div>` : `<div class="input-area" style="justify-content:center;"><div class="blocked-message" style="color: var(--text);">${blockedMessage}</div></div>`}
                        </div>
                        ` : (isFeedActive ? `
                        <div class="feed-container" id="feedContainer"></div>
                        <button class="create-post-btn" id="createPostBtn">+</button>
                        ` : (isMusicActive ? `
                        <div class="music-container" id="musicContainer"></div>
                        ${userData.premium ? `<button class="create-track-btn" id="createTrackBtn">+</button>` : ''}
                        ` : ''))}
                    </div>
                    <div class="bottom-nav">
                        <div class="nav-item ${App.activeTab === 'feed' ? 'active' : ''}" data-tab="feed"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v1.png" alt="Feed"></div>
                        <div class="nav-item ${App.activeTab === 'chats' ? 'active' : ''}" data-tab="chats"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v2.png" alt="Chats"></div>
                        <div class="nav-item ${App.activeTab === 'music' ? 'active' : ''}" data-tab="music"><img src="${ICONS.MUSIC_TAB}" alt="Music"></div>
                        <div class="nav-item" id="premiumTab"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v3.png" alt="Premium"></div>
                        <div class="nav-item" id="settingsTab"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v4.png" alt="Settings"></div>
                    </div>
                `; 
            }

            function attachMainEvents() { 
                const backBtn = document.getElementById('backBtn'); if (backBtn) backBtn.addEventListener('click', () => { App.sidebarOpen = true; document.querySelector('.sidebar').classList.add('open'); });
                const viewProfileBtn = document.getElementById('viewProfileBtn'); if (viewProfileBtn) viewProfileBtn.addEventListener('click', () => { if (App.activeChat) { openProfileModal(App.activeChat); } });
                const sendBtn = document.getElementById('sendMsgBtn'); if (sendBtn) sendBtn.addEventListener('click', sendMessage);
                const fileUpload = document.getElementById('fileUpload'); const videoUpload = document.getElementById('videoUpload'); if (fileUpload) fileUpload.addEventListener('change', handleFileSelect); if (videoUpload) videoUpload.addEventListener('change', handleVideoSelect);
                const addUserBtn = document.getElementById('addUserBtn'); if (addUserBtn) addUserBtn.addEventListener('click', addUserBySearch);
                const messageText = document.getElementById('messageText'); if (messageText) messageText.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
                
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', (e) => {
                        const tab = item.dataset.tab;
                        if (tab === 'chats') {
                            App.activeTab = 'chats';
                            if (window.innerWidth < 768) App.sidebarOpen = false;
                            render();
                        } else if (tab === 'feed') {
                            App.activeTab = 'feed';
                            render();
                            setTimeout(() => initFeed(), 50);
                        } else if (tab === 'music') {
                            App.activeTab = 'music';
                            render();
                            setTimeout(() => renderMusic(), 50);
                        }
                    });
                });
                
                document.getElementById('premiumTab')?.addEventListener('click', () => {
                    const modalHtml = `
                        <div class="modal-overlay" id="premiumModal">
                            <div class="profile-modal">
                                <h3>PREMIUM STATUS</h3>
                                <p style="margin-bottom: 16px;">PERMANENT PREMIUM SUBSCRIPTION, INCLUDES:</p>
                                <ul style="margin-left: 20px; margin-bottom: 20px; color: var(--text);">
                                    <li>1. BLUE NICK</li>
                                    <li>2. YOUR POSTS WILL BE MORE OFTEN IN RECOMMENDATIONS</li>
                                    <li>3. UPLOAD MUSIC TRACKS</li>
                                </ul>
                                <p style="margin-bottom: 8px;">Send 2 TON to:</p>
                                <div class="profile-input-group">
                                    <input type="text" value="${TON_ADDRESS}" readonly onclick="this.select();document.execCommand('copy');showNotification('Address copied!')">
                                </div>
                                <p style="font-size: 14px; margin-top: 8px;">After payment, please wait 1-2 days for activation.</p>
                                <div class="profile-actions">
                                    <button class="profile-btn secondary" id="closePremiumModal">CLOSE</button>
                                </div>
                            </div>
                        </div>
                    `;
                    document.body.insertAdjacentHTML('beforeend', modalHtml);
                    document.getElementById('closePremiumModal').addEventListener('click', () => document.getElementById('premiumModal').remove());
                });
                
                document.getElementById('settingsTab')?.addEventListener('click', () => {
                    openProfileSettings();
                });
                
                const createPostBtn = document.getElementById('createPostBtn');
                if (createPostBtn) createPostBtn.addEventListener('click', openCreatePostModal);
                const createTrackBtn = document.getElementById('createTrackBtn');
                if (createTrackBtn) createTrackBtn.addEventListener('click', openUploadTrackModal);
            }

            function sendMessage() { 
                const textInput = document.getElementById('messageText'); 
                const text = textInput ? textInput.value.trim() : ''; 
                if (!text && !App.tempPhoto && !App.tempVideo) { showNotification('Enter message or select file', 'error'); return; } 
                const from = App.currentUser; 
                const to = App.activeChat; 
                if (!to) { showNotification('Select a chat', 'error'); return; } 
                if (!canUserMessage(from, to)) { showNotification('You cannot message this user', 'error'); return; } 
                try { 
                    let mediaData = null; 
                    let isVideoMsg = false; 
                    if (App.tempVideo) { mediaData = App.tempVideo; isVideoMsg = true; } 
                    else if (App.tempPhoto) { mediaData = App.tempPhoto; } 
                    const message = { from, text: text || '', time: Date.now(), photo: mediaData, isVideo: isVideoMsg, likes: {}, dislikes: {} };
                    const chatId = [from, to].sort().join('_'); 
                    if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] }; 
                    App.chats[chatId].messages.push(message); 
                    saveToSupabase(); 
                    renderMessages(to); 
                    playHappySound(); 
                    if (textInput) textInput.value = ''; 
                    App.tempPhoto = null; 
                    App.tempVideo = null; 
                    const fileInput = document.getElementById('fileUpload'); 
                    const videoInput = document.getElementById('videoUpload'); 
                    if (fileInput) fileInput.value = ''; 
                    if (videoInput) videoInput.value = ''; 
                    updateChatList(); 
                } catch (error) { console.error('Send error:', error); showNotification('Send error', 'error'); } 
            }

            function renderMessages(chatPartner) { 
                const messagesContainer = document.getElementById('messageList'); 
                if (!messagesContainer) return; 
                let messages = []; 
                const chatId = [App.currentUser, chatPartner].sort().join('_'); 
                const chat = App.chats[chatId]; 
                messages = chat ? chat.messages : []; 
                let html = ''; 
                if (messages && messages.length > 0) messages.forEach((msg, idx) => { html += renderMessage(msg, idx, App.currentUser, chatPartner); }); 
                else html = '<div style="text-align:center; color: var(--text-secondary); margin-top:20px; padding:20px;">No messages</div>'; 
                messagesContainer.innerHTML = html; 
                setTimeout(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 100); 
                updateChatHeaderStatus(chatPartner); 
            }

            function renderMessage(msg, idx, currentUser, chatPartner) { 
                const isMe = msg.from === currentUser; 
                const isSystem = msg.from === 'SYSTEM'; 
                const fromUserDisplay = isSystem ? 'SYSTEM' : formatUserNameWithStatus(msg.from);
                let canDelete = isMe; 
                let mediaHtml = ''; 
                if (msg.photo) { if (msg.isVideo) { mediaHtml = `<video controls class="media-preview"><source src="${msg.photo}" type="video/mp4"></video>`; } else { mediaHtml = `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`; } } 
                let messageText = msg.text || ''; 
                const messageClass = isMe ? 'me' : ''; 
                const fullDate = new Date(msg.time).toLocaleString();
                
                return `<div class="message ${messageClass} ${isSystem ? 'system-message' : ''}">${!isMe && !isSystem ? `<small><span class="message-username" onclick="window.openProfileModal('${msg.from}')">${fromUserDisplay}${App.users[msg.from]?.verified ? '<span class="verified-icon"></span>' : ''}</span></small><br>` : ''}${isSystem ? `<small>🔔 SYSTEM</small><br>` : ''}<div class="message-text">${messageText}</div>${mediaHtml}<div class="time">${fullDate}</div><div style="display: flex; justify-content: flex-end; margin-top: 4px;">${canDelete ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">DELETE</button></div>` : ''}</div></div>`; 
            }

            function updateChatList() { 
                const chatsContainer = document.getElementById('chatsList'); 
                if (!chatsContainer || !App.currentUser) return; 
                let chatsList = getChatListForUser(App.currentUser); 
                let html = ''; 
                chatsList.forEach(chat => { html += renderChatItem(chat, chat === App.activeChat, App.currentUser); }); 
                chatsContainer.innerHTML = html; 
                document.querySelectorAll('.chat-item').forEach(el => { el.addEventListener('click', (e) => { if (e.target.closest('.delete-chat-icon')) return; const chatId = el.dataset.chat; if (App.activeChat === chatId) { if (window.innerWidth < 768) { App.sidebarOpen = false; document.querySelector('.sidebar').classList.remove('open'); } return; } App.activeChat = chatId; localStorage.setItem('yolk_active_chat', chatId); if (window.innerWidth < 768) { App.sidebarOpen = false; document.querySelector('.sidebar').classList.remove('open'); } document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(); }); }); 
            }

            function renderChatItem(u, active, currentUser) { 
                let display = formatUserNameWithStatus(u);
                let avatarHtml = '<div class="chat-avatar">👤</div>'; 
                const avatarUrl = App.users[u]?.avatar; 
                avatarHtml = avatarUrl ? `<div class="chat-avatar"><img src="${avatarUrl}" class="chat-avatar-img"></div>` : `<div class="chat-avatar">${getDisplayName(u)[0]?.toUpperCase() || '@'}</div>`; 
                const userData = App.users[u] || {}; 
                return `<div class="chat-item ${active ? 'active' : ''}" data-chat="${u}">${avatarHtml}<div style="flex:1;"><div class="username-display" style="display: flex; align-items: center; gap: 2px; flex-wrap: wrap;">${display}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div></div><span class="delete-chat-icon" onclick="window.deleteChat('${u}', event)"><img src="${ICONS.DELETE}" style="width:20px;height:20px;"></span></div>`; 
            }

            function getChatListForUser(user) { 
                let set = new Set(); 
                Object.keys(App.chats || {}).forEach(key => { 
                    const c = App.chats[key]; 
                    if (c) { 
                        if (c.user1 === user) set.add(c.user2); 
                        if (c.user2 === user) set.add(c.user1); 
                    } 
                }); 
                return Array.from(set); 
            }
            
            function handleFileSelect(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { compressImage(ev.target.result, 800, 800, 0.6, (compressed) => { App.tempPhoto = compressed; showNotification('Photo added, write text and send'); }); }; reader.readAsDataURL(file); }
            function handleVideoSelect(e) { const file = e.target.files[0]; if (!file) return; if (file.size > 20 * 1024 * 1024) { showNotification('Video max 20 MB', 'error'); return; } const reader = new FileReader(); reader.onload = (ev) => { App.tempVideo = ev.target.result; showNotification('Video added, write text and send'); }; reader.readAsDataURL(file); }
            
            function addUserBySearch() { 
                let query = document.getElementById('searchUserInput').value.trim().toLowerCase(); 
                if (!query) { showNotification('Enter username', 'error'); return; } 
                if (!query.startsWith('@')) query = '@' + query; 
                let mainUser = findMainUsername(query);
                if (!mainUser) {
                    if (App.users[query]) mainUser = query;
                }
                if (!mainUser || !App.users[mainUser]) { showNotification('User not found', 'error'); return; } 
                if (mainUser === App.currentUser) { showNotification('This is you', 'error'); return; } 
                if (!canUserMessage(App.currentUser, mainUser)) { showNotification('This user does not accept messages from strangers', 'error'); return; } 
                ensureChat(App.currentUser, mainUser); 
                App.activeChat = mainUser; 
                localStorage.setItem('yolk_active_chat', mainUser); 
                if (window.innerWidth < 768) App.sidebarOpen = false; 
                document.getElementById('searchUserInput').value = ''; 
                render(); 
                showNotification(`Chat with ${getDisplayName(mainUser)} created`); 
            }
            
            window.deleteChat = function(chat, event) { 
                event.stopPropagation(); 
                if (!confirm(`Delete chat with ${getDisplayName(chat)}?`)) return; 
                const user = App.currentUser; 
                const chatId = [user, chat].sort().join('_'); 
                if (App.chats[chatId]) delete App.chats[chatId]; 
                if (App.activeChat === chat) { 
                    App.activeChat = null; 
                    localStorage.removeItem('yolk_active_chat'); 
                } 
                saveToSupabase(); 
                render(); 
                showNotification('Chat deleted'); 
            };
            
            window.deleteMessage = function(chatPartner, idx) { 
                const from = App.currentUser; 
                try { 
                    const chatId = [from, chatPartner].sort().join('_'); 
                    const msgs = App.chats[chatId]?.messages; 
                    if (msgs && msgs[idx]) { 
                        msgs.splice(idx, 1); 
                        saveToSupabase(); 
                        showNotification('Deleted'); 
                        renderMessages(chatPartner); 
                    } 
                } catch (error) { console.error('Delete error:', error); showNotification('Delete error', 'error'); } 
            };
            
            window.openImageModal = function(src) { 
                const modalHtml = `<div class="modal-overlay" id="imageModal" onclick="this.remove()"><div style="max-width:90%; max-height:90%; display:flex; justify-content:center; align-items:center;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div></div>`; 
                document.body.insertAdjacentHTML('beforeend', modalHtml); 
            };

            function updateChatHeaderStatus(username) { 
                const headerInfo = document.querySelector('.chat-header-info'); 
                if (!headerInfo) return; 
                const existingStatus = headerInfo.querySelector('.chat-user-status'); 
                if (existingStatus) existingStatus.remove(); 
                const existingNameStrong = headerInfo.querySelector('strong'); 
                if (existingNameStrong) { 
                    existingNameStrong.innerHTML = formatUserNameWithStatus(username) + (App.users[username]?.verified ? '<span class="verified-icon"></span>' : '');
                } 
                const isOnline = isUserOnline(username); 
                const lastSeenText = formatLastSeen(App.users[username]?.lastSeen, username); 
                const statusDiv = document.createElement('div'); 
                statusDiv.className = 'chat-user-status' + (isOnline ? '' : ' offline'); 
                statusDiv.textContent = isOnline ? 'online' : `last seen ${lastSeenText}`; 
                headerInfo.appendChild(statusDiv); 
            }

            function initBots() { App.systemBots = []; saveToSupabase(); }

            // === INITIALIZATION ===
            window.addEventListener('load', () => { 
                loadingStartTime = Date.now();
                initBots(); 
                loadFromSupabase(); 
                subscribeToAppState();
                loadTheme(); 
                // set default premium for admin
                if (App.users[ADMIN_USER]) App.users[ADMIN_USER].premium = true;
            });
        })();
    </script>
</body>
</html>
