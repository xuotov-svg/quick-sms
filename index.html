<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f0c840'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        :root {
            --gold: #f0c840;
            --gold-soft: #fae56a;
            --gold-deep: #c9a020;
            --gold-glow: rgba(240, 200, 64, 0.4);
            --gold-glow-intense: rgba(245, 210, 70, 0.6);
            --bg: #060608;
            --bg-soft: #0c0c12;
            --panel: #0f0f16;
            --panel-elevated: #14141e;
            --text: #f0ede8;
            --text-bright: #ffffff;
            --text-secondary: #9a9790;
            --text-muted: #6b6760;
            --border: #22202a;
            --border-light: #2e2b38;
            --glass: rgba(18, 16, 24, 0.65);
            --glass-strong: rgba(22, 20, 30, 0.92);
            --glass-reflect: rgba(255, 255, 255, 0.02);
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.65);
            --shadow-gold: 0 0 40px rgba(240, 200, 64, 0.15), 0 4px 20px rgba(0, 0, 0, 0.4);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 20px;
            --radius-xl: 26px;
            --radius-full: 50%;
            --backdrop-blur: 32px;
            --backdrop-blur-heavy: 48px;
            --transition-fast: 0.18s cubic-bezier(0.33, 0, 0.2, 1);
            --transition-smooth: 0.28s cubic-bezier(0.4, 0, 0.15, 1);
            --transition-bounce: 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            --font-mono: 'SF Mono', 'Fira Code', monospace;
            --grid-color: rgba(255, 255, 255, 0.018);
            --grid-size: 40px;
            --shimmer-color-1: #ffe564;
            --shimmer-color-2: #ffd700;
            --shimmer-color-3: #ffea70;
            --shimmer-color-4: #ffb800;
            --shimmer-color-5: #ffcc33;
            --liquid-glass-color-1: rgba(240, 200, 64, 0.15);
            --liquid-glass-color-2: rgba(255, 215, 80, 0.08);
            --liquid-glass-color-3: rgba(220, 170, 40, 0.12);
            --liquid-glass-border-1: rgba(240, 200, 64, 0.3);
            --liquid-glass-border-2: rgba(255, 220, 90, 0.15);
        }
        .light-theme {
            --bg: #f2f0ec;
            --bg-soft: #faf8f4;
            --panel: #ffffff;
            --panel-elevated: #fdfcf9;
            --text: #1c1a16;
            --text-bright: #0a0a0a;
            --text-secondary: #5c5852;
            --text-muted: #8c8880;
            --border: #e2dfd6;
            --border-light: #f0ede5;
            --glass: rgba(255, 254, 250, 0.68);
            --glass-strong: rgba(255, 254, 250, 0.94);
            --glass-reflect: rgba(0, 0, 0, 0.015);
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.14);
            --shadow-gold: 0 0 32px rgba(200, 160, 30, 0.1), 0 4px 18px rgba(0, 0, 0, 0.08);
            --grid-color: rgba(0, 0, 0, 0.022);
            --shimmer-color-1: #b8860b;
            --shimmer-color-2: #d9a520;
            --shimmer-color-3: #c99814;
            --shimmer-color-4: #a0740a;
            --shimmer-color-5: #cca520;
            --liquid-glass-color-1: rgba(200, 160, 30, 0.1);
            --liquid-glass-color-2: rgba(210, 170, 40, 0.05);
            --liquid-glass-color-3: rgba(180, 140, 20, 0.08);
            --liquid-glass-border-1: rgba(200, 160, 30, 0.25);
            --liquid-glass-border-2: rgba(210, 170, 40, 0.1);
        }
        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            -webkit-tap-highlight-color: transparent;
            color: var(--text);
            transition: background 0.45s ease, color 0.45s ease;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
            opacity: 0.7;
            transition: background-image 0.45s ease;
        }
        body::after {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 140%;
            height: 180%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(240, 200, 64, 0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(230, 180, 40, 0.03) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 80%, rgba(220, 170, 35, 0.04) 0%, transparent 50%);
            animation: ambientShift 20s ease-in-out infinite;
            transition: background 0.45s ease;
        }
        @keyframes ambientShift {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(1%, -0.5%) rotate(1deg);
            }
            50% {
                transform: translate(-0.5%, 1%) rotate(-0.8deg);
            }
            75% {
                transform: translate(-1%, -0.3%) rotate(0.5deg);
            }
        }
        #app {
            width: 100%;
            max-width: 640px;
            background: transparent;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }
        .header {
            background: var(--glass);
            backdrop-filter: blur(var(--backdrop-blur));
            -webkit-backdrop-filter: blur(var(--backdrop-blur));
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 20;
            transition: background 0.45s ease, border-color 0.45s ease, box-shadow 0.35s ease;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.02) inset, var(--shadow-sm);
        }
        .logo {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, var(--shimmer-color-1) 0%, var(--shimmer-color-2) 25%, var(--shimmer-color-3) 50%, var(--shimmer-color-4) 75%, var(--shimmer-color-5) 100%);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(240, 200, 64, 0.5)) drop-shadow(0 0 3px rgba(255, 220, 100, 0.3));
            animation: logoShimmer 3.5s ease-in-out infinite;
            cursor: default;
            position: relative;
        }
        @keyframes logoShimmer {
            0%,
            100% {
                background-position: 0% center;
                filter: drop-shadow(0 0 12px rgba(240, 200, 64, 0.5)) drop-shadow(0 0 3px rgba(255, 220, 100, 0.3));
            }
            25% {
                filter: drop-shadow(0 0 18px rgba(250, 210, 70, 0.65)) drop-shadow(0 0 6px rgba(255, 230, 120, 0.4));
            }
            50% {
                background-position: 150% center;
                filter: drop-shadow(0 0 22px rgba(240, 195, 55, 0.7)) drop-shadow(0 0 8px rgba(250, 220, 90, 0.45));
            }
            75% {
                filter: drop-shadow(0 0 14px rgba(220, 175, 45, 0.55)) drop-shadow(0 0 4px rgba(240, 200, 70, 0.35));
            }
        }
        .search-box {
            flex: 1;
            background: var(--glass-reflect);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 7px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: border-color 0.25s, background 0.45s, box-shadow 0.25s;
            position: relative;
        }
        .search-box:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(240, 200, 64, 0.15), 0 0 0 3px rgba(240, 200, 64, 0.04);
            background: rgba(255, 255, 255, 0.03);
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            width: 100%;
            font-size: 14px;
            font-weight: 450;
            letter-spacing: 0.2px;
        }
        .search-box input::placeholder {
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }
        .profile-thumb {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-full);
            background: var(--border);
            cursor: pointer;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: border-color 0.25s, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.25s;
            box-shadow: var(--shadow-xs);
        }
        .profile-thumb:hover {
            border-color: var(--gold);
            transform: scale(1.08);
            box-shadow: 0 0 20px var(--gold-glow);
        }
        .profile-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .tabs {
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(var(--backdrop-blur));
            -webkit-backdrop-filter: blur(var(--backdrop-blur));
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 54px;
            z-index: 15;
            transition: background 0.45s, border-color 0.45s;
            gap: 0;
            padding: 4px 4px 0;
            border-radius: 0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 13px 8px;
            font-weight: 550;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.25s, border-color 0.25s, letter-spacing 0.25s, background 0.3s;
            font-size: 14px;
            letter-spacing: 0.4px;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 18px 18px 0 0;
            margin: 0 2px;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.2) inset, 0 0 0 1px rgba(255, 255, 255, 0.03);
        }
        .tab:hover {
            color: var(--text);
            letter-spacing: 0.6px;
            background: rgba(255, 255, 255, 0.05);
        }
        .tab.active {
            background: linear-gradient(135deg, rgba(255, 220, 80, 0.12) 0%, rgba(255, 230, 110, 0.06) 25%, rgba(245, 200, 60, 0.1) 50%, rgba(255, 215, 80, 0.06) 100%);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            color: transparent;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(135deg, var(--shimmer-color-1) 0%, var(--shimmer-color-2) 30%, var(--shimmer-color-3) 60%, var(--shimmer-color-4) 100%);
            background-size: 200% auto;
            animation: tabShimmer 2.8s ease-in-out infinite;
            font-weight: 650;
            border-bottom-color: var(--gold);
        }
        @keyframes tabShimmer {
            0%,
            100% {
                background-position: 0% center;
            }
            50% {
                background-position: 180% center;
            }
        }
        .feed-container {
            flex: 1;
            padding: 14px 16px 160px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            max-height: calc(100vh - 110px);
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            position: relative;
            z-index: 2;
        }
        .feed-container::-webkit-scrollbar {
            width: 5px;
        }
        .feed-container::-webkit-scrollbar-track {
            background: transparent;
            margin: 8px 0;
        }
        .feed-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(240, 200, 64, 0.25), rgba(200, 160, 40, 0.45), rgba(240, 200, 64, 0.25));
            border-radius: 10px;
            transition: background 0.3s;
        }
        .feed-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, rgba(245, 210, 70, 0.5), rgba(220, 170, 35, 0.7), rgba(245, 210, 70, 0.5));
        }

        /* Эффект жидкого стекла для карточек постов */
        .post-card {
            background: var(--glass);
            backdrop-filter: blur(var(--backdrop-blur));
            -webkit-backdrop-filter: blur(var(--backdrop-blur));
            border-radius: var(--radius-lg);
            padding: 18px;
            border: 1px solid transparent;
            box-shadow: var(--shadow);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s, background 0.45s, box-shadow 0.35s;
            animation: cardFadeIn 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
            position: relative;
            word-wrap: break-word;
            overflow: hidden;
            z-index: 1;
        }
        .post-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: calc(var(--radius-lg) + 2px);
            background: linear-gradient(135deg,
                    var(--liquid-glass-border-1) 0%,
                    var(--liquid-glass-border-2) 20%,
                    var(--liquid-glass-color-1) 40%,
                    var(--liquid-glass-border-1) 60%,
                    var(--liquid-glass-color-2) 80%,
                    var(--liquid-glass-border-2) 100%);
            background-size: 300% 300%;
            z-index: -2;
            animation: liquidGlassBorder 8s ease-in-out infinite;
            opacity: 0.7;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .post-card::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            right: 1px;
            bottom: 1px;
            background: var(--glass);
            backdrop-filter: blur(var(--backdrop-blur));
            -webkit-backdrop-filter: blur(var(--backdrop-blur));
            border-radius: var(--radius-lg);
            z-index: -1;
            pointer-events: none;
            transition: background 0.45s ease;
        }
        .post-card:hover::before {
            opacity: 1;
            animation-duration: 4s;
        }
        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-gold), var(--shadow-lg);
        }
        @keyframes liquidGlassBorder {
            0% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 100% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            75% {
                background-position: 0% 100%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }
        .post-avatar {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-full);
            background: #2a2835;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--border);
            flex-shrink: 0;
            transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
        }
        .post-header:hover .post-avatar {
            border-color: rgba(240, 200, 64, 0.5);
            box-shadow: 0 0 18px var(--gold-glow);
            transform: scale(1.04);
        }
        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-author-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .post-author {
            font-weight: 650;
            font-size: 14.5px;
            letter-spacing: 0.2px;
        }
        .post-time {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }
        .post-text {
            margin: 10px 0;
            line-height: 1.6;
            word-break: break-word;
            font-size: 14.5px;
            color: var(--text);
            letter-spacing: 0.15px;
            position: relative;
            z-index: 1;
        }
        .hashtag {
            background: linear-gradient(135deg, var(--shimmer-color-1), var(--shimmer-color-2), var(--shimmer-color-3));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: hashtagShimmer 3s linear infinite;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: rgba(240, 200, 64, 0.35);
            transition: text-decoration-color 0.25s, filter 0.25s;
            font-weight: 550;
        }
        .hashtag:hover {
            text-decoration-color: var(--gold);
            filter: drop-shadow(0 0 6px var(--gold-glow));
        }
        @keyframes hashtagShimmer {
            0%,
            100% {
                background-position: 0% center;
                filter: brightness(1);
            }
            25% {
                filter: brightness(1.1);
            }
            50% {
                background-position: 180% center;
                filter: brightness(1.2);
            }
            75% {
                filter: brightness(1.05);
            }
        }
        .atuser {
            color: #7eb8e8;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
            text-decoration-color: rgba(126, 184, 232, 0.3);
            transition: text-decoration-color 0.25s, color 0.25s, filter 0.25s;
            font-weight: 550;
        }
        .atuser:hover {
            text-decoration-color: #a0d0f8;
            color: #a8d4f8;
            filter: drop-shadow(0 0 4px rgba(126, 184, 232, 0.5));
        }
        .post-media img,
        .post-media video {
            max-width: 100%;
            max-height: 420px;
            border-radius: var(--radius);
            margin-top: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 1;
        }
        .post-media img:hover,
        .post-media video:hover {
            transform: scale(1.015);
            box-shadow: var(--shadow);
            border-color: rgba(240, 200, 64, 0.3);
        }
        .post-actions {
            display: flex;
            gap: 18px;
            margin-top: 14px;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            align-items: center;
            flex-wrap: wrap;
            transition: border-color 0.45s;
            position: relative;
            z-index: 1;
        }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 13.5px;
            color: var(--text-secondary);
            transition: all 0.22s cubic-bezier(0.33, 0, 0.2, 1);
            padding: 7px 12px;
            border-radius: 22px;
            min-height: 36px;
            flex-shrink: 0;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            transform: translateY(-1px);
        }
        .action-btn:active {
            transform: scale(0.94);
            transition: transform 0.1s ease;
        }
        .action-btn img {
            width: 21px;
            height: 21px;
            object-fit: contain;
            flex-shrink: 0;
            transition: filter 0.25s, transform 0.2s;
        }
        .action-btn.liked img,
        .action-btn.reposted img {
            filter: drop-shadow(0 0 8px var(--gold-glow)) brightness(1.3);
            animation: iconPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes iconPop {
            0% {
                transform: scale(0.7);
            }
            60% {
                transform: scale(1.25);
            }
            100% {
                transform: scale(1);
            }
        }
        .action-btn.liked,
        .action-btn.reposted {
            color: var(--gold);
            font-weight: 600;
        }
        .action-btn.danger:hover {
            color: #ff5c5c;
            background: rgba(255, 80, 80, 0.08);
        }
        .views-display {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13.5px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.2px;
            padding: 7px 10px;
            flex-shrink: 0;
            min-height: 36px;
            cursor: default;
            user-select: none;
        }
        .views-display img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .post-card:hover .views-display img {
            opacity: 0.9;
        }
        .repost-block {
            background: rgba(240, 200, 64, 0.05);
            border-left: 3px solid var(--gold);
            padding: 13px 16px;
            margin: 14px 0 10px;
            border-radius: var(--radius-sm);
            transition: border-color 0.3s, background 0.45s;
            position: relative;
            z-index: 1;
            word-wrap: break-word;
        }
        .repost-block:hover {
            border-left-color: #fae56a;
            background: rgba(240, 200, 64, 0.08);
        }
        .repost-block .original-author {
            font-weight: 650;
            color: var(--gold);
            cursor: pointer;
            margin-bottom: 7px;
            transition: color 0.25s;
        }
        .repost-block .original-author:hover {
            color: #ffe680;
            text-decoration: underline;
        }
        .repost-block .original-text {
            color: var(--text-secondary);
            font-size: 13px;

                var e = "";
                if (d) { var t = new Date();
                    t.setTime(t.getTime() + 864e5 * d);

                document.cookie = n + "=" + (v || "") + e + "; path=/; SameSite=Lax";
            }

            function getCookie(n) {
                var ne = n + "=";

                    1); if (c.indexOf(ne) === 0) return c.substring(ne.length); }

            function eraseCookie(n) {
                document.cookie = n + '=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT; SameSite=Lax';
            }

            function compressImage(file, maxWidth = 600, quality = 0.6) {
                return new Promise((resolve, reject) => {
                    if (!file.type.startsWith('image/')) { reject(new Error('Not an image')); return; }
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            let w = img.width,
                                h = img.height;
                            if (w > maxWidth) { h = Math.round(h * (maxWidth / w));
                                w = maxWidth; }
                            if (h > maxWidth) { w = Math.round(w * (maxWidth / h));
                                h = maxWidth; }
                            const canvas = document.createElement('canvas');
                            canvas.width = w;
                            canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', quality));
                        };
                        img.onerror = () => resolve(e.target.result);
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            function processMediaFile(file) {
                return new Promise((resolve, reject) => {
                    if (!file) { resolve(null); return; }
                    if (file.type.startsWith('image/')) {
                        compressImage(file).then(dataURL => resolve({ dataURL, isVideo: false }))
                            .catch(err => {
                                const reader = new FileReader();
                                reader.onload = (e) => resolve({ dataURL: e.target.result, isVideo: false });
                                reader.onerror = reject;
                                reader.readAsDataURL(file);
                            });
                    } else if (file.type.startsWith('video/')) {
                        if (file.size > MAX_VIDEO_SIZE) {
                            const sizeMB = (file.size / 1024 / 1024).toFixed(1);
                            if (!confirm(
                                    `Video is ${sizeMB}MB. Videos larger than 1.5MB may NOT be saved permanently and could disappear after refresh.\n\nContinue anyway?`
                                    )) {
                                reject(new Error('Video too large – cancelled by user'));
                                return;
                            }
                        }
                        const reader = new FileReader();
                        reader.onload = (e) => resolve({ dataURL: e.target.result, isVideo: true });
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    } else { reject(new Error('Unsupported file type')); }
                });
            }

                setTimeout(() => { toast.style.opacity = '0';

                setTimeout(() => toast.remove(), duration + 500);

            function extractHashtags(text) {
                if (!text) return [];
                const matches = text.match(/#[a-zA-Z0-9_]+/g);

            }

            function extractAtUsers(text) {
                if (!text) return [];
                const matches = text.match(/@[a-zA-Z][a-zA-Z0-9_]{0,14}/g);
                return matches ? [...new Set(matches.map(t => t.toLowerCase()))] : [];
            }

            function normalizePosts(arr) {
                arr.forEach(p => {
                    if (!p.hashtags) p.hashtags = extractHashtags(p.text || '');
                    if (!p.likes) p.likes = {};
                    if (!p.comments) p.comments = [];
                    if (typeof p.isVideo === 'undefined') p.isVideo = (p.media && p.media.startsWith(
                        'data:video'));
                    if (typeof p.isRepost === 'undefined') p.isRepost = false;
                    if (p.repostCount === undefined) p.repostCount = 0;
                    if (!p.repostedBy) p.repostedBy = [];
                    if (typeof p.views === 'undefined') p.views = 0;
                    if (!p.viewedBy) p.viewedBy = [];
                });
            }

                feedIndex = 0;
                searchQuery = '';
                render();
            }

            function logout() {
                currentUser = null;
                eraseCookie('yolk_user');
                viewedProfile = null;
                activeTab = 'feed';
                feedShuffled = [];
                feedIndex = 0;
                searchQuery = '';
                render();
            }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function weightedRandomSort(postsArray) {
                const now = Date.now();
                const HOUR_MS = 60 * 60 * 1000;
                const weighted = postsArray.map(post => {
                    const ageMs = Math.max(0, now - (post.time || now));
                    const ageHours = ageMs / HOUR_MS;
                    const baseWeight = 1 / (ageHours + 1);
                    const randomFactor = 0.4 + Math.random() * 1.2;
                    const weight = baseWeight * randomFactor;
                    return { post, weight };
                });
                weighted.sort((a, b) => b.weight - a.weight);
                return weighted.map(item => item.post);
            }

            function getFeedPosts() {
                let filtered = posts;
                if (searchQuery.startsWith('#')) {
                    const tag = searchQuery.toLowerCase().trim();
                    filtered = posts.filter(p => p.hashtags?.includes(tag));
                } else if (searchQuery.startsWith('@')) {
                    return [];
                } else if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = posts.filter(p => p.text.toLowerCase().includes(q));
                }
                return filtered;
            }

            function searchUsers(query) {
                if (!query.startsWith('@')) return [];
                const q = query.toLowerCase().trim();
                if (q.length < 2) return [];
                const results = [];
                Object.keys(users).forEach(u => {
                    if (u.toLowerCase().includes(q)) {
                        results.push(u);
                    } else {
                        const dn = (users[u]?.displayName || '').toLowerCase();
                        if (dn.includes(q.substring(1))) results.push(u);
                    }
                });
                return results;
            }

            function trackPostView(post) {
                if (!currentUser) return false;
                if (post.author === currentUser) return false;
                if (!post.viewedBy) post.viewedBy = [];
                if (!post.viewedBy.includes(currentUser)) {
                    post.viewedBy.push(currentUser);
                    post.views = (post.views || 0) + 1;
                    return true;
                }
                return false;
            }

            function loadMoreFeed() {
                const container = document.getElementById('feedContainer');
                if (!container || activeTab !== 'feed') return;
                if (searchQuery.startsWith('@')) return;
                const filtered = getFeedPosts();
                if (filtered.length === 0) {
                    if (container.innerHTML === '' || container.querySelector('.no-posts-msg')) {
                        container.innerHTML =
                            '<div class="no-posts-msg" style="text-align:center;color:#888;padding:40px;">No posts found. Try a different search or <span style="color:var(--gold);cursor:pointer;" onclick="window.clearSearch()">clear search</span>.</div>';
                    }
                    return;
                }
                if (feedShuffled.length === 0 || feedShuffled._sourceId !== filtered.map(p => p.id).join(',')) {
                    feedShuffled = weightedRandomSort([...filtered]);
                    feedShuffled._sourceId = filtered.map(p => p.id).join(',');
                    feedIndex = 0;
                    if (container) container.innerHTML = '';
                }
                let stateChanged = false;
                const renderedIds = [];
                for (let i = 0; i < BATCH_SIZE; i++) {
                    if (feedIndex >= feedShuffled.length) {
                        feedShuffled = weightedRandomSort([...filtered]);
                        feedShuffled._sourceId = filtered.map(p => p.id).join(',');
                        feedIndex = 0;
                    }
                    const post = feedShuffled[feedIndex++];
                    if (trackPostView(post)) stateChanged = true;
                    renderedIds.push(post.id);
                    container.insertAdjacentHTML('beforeend', renderPostCard(post, true));
                }
                if (stateChanged) markStateDirty();
            }

            function resetFeed() { feedShuffled = [];
                feedIndex = 0; const c = document.getElementById('feedContainer'); if (c) { c.innerHTML = '';
                    loadMoreFeed(); } }

            function saveFeedScroll() { const el = document.getElementById('feedContainer'); if (el) feedScrollPos = el
                    .scrollTop; }

            function restoreFeedScroll() { setTimeout(() => { const el = document.getElementById('feedContainer'); if (el)
                        el.scrollTop = feedScrollPos; }, 80); }

            function addPost(text, media = null, isVideo = false) {
                if (!currentUser) return;
                const post = {
                    id: generateId(),
                    author: currentUser,
                    text: text.trim(),
                    media,
                    isVideo,
                    hashtags: extractHashtags(text),
                    time: Date.now(),
                    likes: {},
                    comments: [],
                    isRepost: false,
                    repostCount: 0,
                    repostedBy: [],
                    views: 0,
                    viewedBy: []
                };
                posts.unshift(post);
                saveState();
                feedShuffled = [];
                feedIndex = 0;
                render();
            }

            function repostPost(originalPostId, userText) {
                if (!currentUser) return;
                const original = posts.find(p => p.id === originalPostId);
                if (!original) return;
                const newPost = {
                    id: generateId(),
                    author: currentUser,
                    text: userText.trim(),
                    media: null,
                    isVideo: null,
                    hashtags: extractHashtags(userText),
                    time: Date.now(),
                    likes: {},
                    comments: [],
                    isRepost: true,
                    repostAuthor: original.author,
                    repostText: original.text,
                    repostMedia: original.media,
                    repostIsVideo: original.isVideo,
                    repostCount: 0,
                    repostedBy: [],
                    views: 0,
                    viewedBy: []
                };
                posts.unshift(newPost);
                if (!original.repostedBy.includes(currentUser)) {
                    original.repostedBy.push(currentUser);
                    original.repostCount = (original.repostCount || 0) + 1;
                }
                saveState();
                feedShuffled = [];
                feedIndex = 0;
                render();
                showToast('Post reposted to your wall!');
            }

            function deletePost(id) {
                const post = posts.find(p => p.id === id);
                if (!post) return;
                if (post.author !== currentUser && currentUser !== ADMIN_USER) return;
                posts = posts.filter(p => p.id !== id);
                saveState();
                feedShuffled = [];
                feedIndex = 0;
                render();
            }

            function toggleLike(postId) {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                if (post.likes[currentUser]) delete post.likes[currentUser];
                else post.likes[currentUser] = true;
                saveState();
                updatePostStatsInDOM(postId);
            }

            function addComment(postId, text) {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                post.comments.push({ author: currentUser, text, time: Date.now() });
                saveState();
                updatePostStatsInDOM(postId);
            }

            function isFollowing(target) {
                if (!currentUser || !users[currentUser] || !users[target]) return false;
                return users[currentUser].following?.includes(target) || false;
            }

            function toggleFollow(target) {
                if (!currentUser || currentUser === target) return;
                if (!users[currentUser].following) users[currentUser].following = [];
                if (!users[target].followers) users[target].followers = [];
                if (isFollowing(target)) {
                    users[currentUser].following = users[currentUser].following.filter(u => u !== target);
                    users[target].followers = users[target].followers.filter(u => u !== currentUser);
                } else {
                    users[currentUser].following.push(target);
                    users[target].followers.push(currentUser);
                }
                saveState();
                render();
            }

            function giveBadge(targetUser, badgeNum) {
                if (currentUser !== ADMIN_USER) return;
                if (!users[targetUser]) return;
                if (!users[targetUser].badges) users[targetUser].badges = [];
                if (!users[targetUser].badges.includes(badgeNum)) {
                    users[targetUser].badges.push(badgeNum);
                    saveState();
                    render();
                    showToast(`Badge ${badgeNum} given`);
                }
            }

            function removeBadges(targetUser) {

                if (!users[targetUser]) return;

                saveState();
                render();
                showToast('Badges removed');

            function togglePremium(targetUser) {

            function renderPostCard(post, showAuthor = true) {
                const author = users[post.author] || {};
                const avatar = author.avatar || DEFAULT_AVATAR;
                const likes = Object.keys(post.likes || {}).length;
                const comments = (post.comments || []).length;
                const liked = post.likes?.[currentUser] || false;
                const reposted = post.repostedBy?.includes(currentUser) || false;
                const reposts = post.repostCount || 0;
                const views = post.views || 0;

                let repostHTML = '';
                if (post.isRepost && post.repostAuthor) {
                    const origAuthor = users[post.repostAuthor] || {};
                    const origName = getDisplayName(post.repostAuthor);
                    const origPremium = origAuthor.premium ? 'premium-nick' : 'normal-nick';
                    let origMediaHTML = '';
                    if (post.repostMedia) {
                        origMediaHTML = post.repostIsVideo ?
                            `<div class="post-media"><video controls preload="metadata" src="${post.repostMedia}" style="max-width:100%;max-height:200px;border-radius:8px;"></video></div>` :
                            `<div class="post-media"><img src="${post.repostMedia}" style="max-width:100%;max-height:200px;border-radius:8px;" loading="lazy" onclick="window.openImage('${post.repostMedia.replace(/'/g, "\\'")}')"></div>`;
                    }
                    repostHTML = `
                <div class="repost-block">
                    <div class="original-author" onclick="event.stopPropagation();window.openUserProfile('${post.repostAuthor}')">
                        Repost from <span class="${origPremium}">${escapeHTML(origName)} @${escapeHTML(post.repostAuthor.substring(1))}</span>
                    </div>
                    <div class="original-text">${escapeHTML(post.repostText || '')}</div>
                    ${origMediaHTML}
                </div>`;
                }

                const mediaHtml = post.media ? (post.isVideo ?
                    `<div class="post-media"><video controls preload="metadata" src="${post.media}" style="max-width:100%;max-height:300px;border-radius:12px;"></video></div>` :
                    `<div class="post-media"><img src="${post.media}" style="max-width:100%;max-height:300px;border-radius:12px;" loading="lazy" onclick="window.openImage('${post.media.replace(/'/g, "\\'")}')"></div>`) :
                    '';

                let textHTML = escapeHTML(post.text || '');
                textHTML = textHTML.replace(/#[a-zA-Z0-9_]+/g,
                    '<span class="hashtag" onclick="event.stopPropagation();window.searchByHashtag(\'$&\')">$&</span>');
                textHTML = textHTML.replace(/@[a-zA-Z][a-zA-Z0-9_]{0,14}/g, function(match) {
                    const u = match.toLowerCase();
                    if (users[u])
                        return `<span class="atuser" onclick="event.stopPropagation();window.openUserProfile('${u}')">${match}</span>`;
                    return match;
                });

                const canDelete = (post.author === currentUser) || (currentUser === ADMIN_USER);
                return `
            <div class="post-card" id="post-${post.id}">
                ${showAuthor ? `
                <div class="post-header" onclick="window.openUserProfile('${post.author}')">
                    <div class="post-avatar"><img src="${avatar}" alt="avatar" loading="lazy"></div>
                    <div class="post-author-info">
                        <div class="post-author">${formatUsernameForPost(post.author)} ${getUserBadges(post.author)}</div>
                        <div class="post-time">${new Date(post.time).toLocaleString()}</div>
                    </div>
                </div>` : ''}
                ${post.text ? `<div class="post-text">${textHTML}</div>` : ''}
                ${mediaHtml}
                ${repostHTML}
                <div class="post-actions">
                    <button class="action-btn ${liked?'liked':''}" onclick="event.stopPropagation();window.toggleLike('${post.id}')">
                        <img src="${liked?ICONS.LIKE_ON:ICONS.LIKE_OFF}" alt="like"> <span>${likes}</span>
                    </button>
                    <button class="action-btn" onclick="event.stopPropagation();window.openComments('${post.id}')">
                        <img src="${ICONS.COMMENT}" alt="comment"> <span>${comments}</span>
                    </button>
                    <button class="action-btn ${reposted?'reposted':''}" onclick="event.stopPropagation();window.openRepost('${post.id}')">
                        <img src="${ICONS.REPOST}" alt="repost"> <span>${reposts}</span>
                    </button>
                    <span class="views-display" id="views-${post.id}">
                        <img src="${ICONS.VIEWS}" alt="views"> <span>${views}</span>
                    </span>
                    ${canDelete ? `<button class="action-btn danger" onclick="event.stopPropagation();window.deletePostById('${post.id}')"><img src="${ICONS.DELETE}" alt="delete"></button>` : ''}
                </div>
            </div>`;
            }

            function updatePostStatsInDOM(postId) {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                const card = document.getElementById('post-' + postId);
                if (!card) return;
                const likeBtn = card.querySelector('.action-btn:first-of-type');
                if (likeBtn) {
                    const liked = post.likes?.[currentUser] || false;
                    likeBtn.classList.toggle('liked', liked);
                    likeBtn.innerHTML =
                        `<img src="${liked?ICONS.LIKE_ON:ICONS.LIKE_OFF}" alt="like"> <span>${Object.keys(post.likes||{}).length}</span>`;
                }
                const commentBtn = card.querySelector('.action-btn:nth-of-type(2)');
                if (commentBtn) commentBtn.innerHTML =
                    `<img src="${ICONS.COMMENT}" alt="comment"> <span>${(post.comments||[]).length}</span>`;
                const repostBtn = card.querySelector('.action-btn:nth-of-type(3)');
                if (repostBtn) {
                    const reposted = post.repostedBy?.includes(currentUser) || false;
                    repostBtn.classList.toggle('reposted', reposted);
                    repostBtn.innerHTML =
                        `<img src="${ICONS.REPOST}" alt="repost"> <span>${post.repostCount || 0}</span>`;
                }
                const viewsEl = document.getElementById('views-' + postId);
                if (viewsEl) {
                    const spanEl = viewsEl.querySelector('span');
                    if (spanEl) spanEl.textContent = post.views || 0;
                }
            }

                        </div>
                    </div>
                    <h3 style="margin-bottom:4px;color:var(--gold);font-size:16px;">My wall</h3>
                    ${renderProfileWall(currentUser)}
                </div>`;
                } else if (activeTab === 'userProfile') {
                    const isSub = isFollowing(profileUser);
                    const regDateStr = formatRegistrationDate(profile.registeredAt);
                    contentHtml = `
                <div class="profile-wall">
                    <div class="profile-card">
                        ${profile.banner ? `<div class="profile-banner"><img src="${profile.banner}" alt="banner" loading="lazy"></div>` : '<div class="profile-banner"></div>'}
                        <div class="profile-avatar-large"><img src="${profile.avatar || DEFAULT_AVATAR}" alt="avatar" loading="lazy"></div>
                        <div class="profile-name">
                            <span class="${premiumClassFn(profileUser)}">${escapeHTML(getDisplayName(profileUser))} @${escapeHTML(profileUser.substring(1))}</span> ${getUserBadges(profileUser)}
                        </div>
                        <div class="profile-bio">${escapeHTML(profile.bio || 'No bio yet')}</div>
                        ${regDateStr ? `<div class="profile-registered">${regDateStr}</div>` : ''}
                        <div class="profile-stats">
                            <div><span onclick="window.openFollowersList('${profileUser}')">${(profile.followers||[]).length}</span> followers</div>
                            <div><span onclick="window.openFollowingList('${profileUser}')">${(profile.following||[]).length}</span> following</div>
                        </div>
                        <button class="follow-btn ${isSub?'unfollow':''}" onclick="window.toggleFollowUser('${profileUser}')">${isSub?'Unfollow':'Follow'}</button>
                        ${currentUser === ADMIN_USER ? `
                            <div class="badge-admin-row" style="margin-top:10px;">
                                <button class="btn small secondary" onclick="window.giveBadge('${profileUser}',1)">Badge 1</button>
                                <button class="btn small secondary" onclick="window.giveBadge('${profileUser}',2)">Badge 2</button>
                                <button class="btn small secondary" onclick="window.giveBadge('${profileUser}',3)">Badge 3</button>
                                <button class="btn small secondary" onclick="window.giveBadge('${profileUser}',4)">Badge 4</button>
                                <button class="btn small warning" onclick="window.removeBadges('${profileUser}')">Remove all</button>
                                <button class="btn small ${users[profileUser].premium ? 'warning' : 'secondary'}" onclick="window.togglePremiumUser('${profileUser}')">${users[profileUser].premium ? 'Remove Premium' : 'Give Premium'}</button>
                            </div>
                        ` : ''}
                    </div>
                    <h3 style="margin-bottom:4px;color:var(--gold);font-size:16px;">${escapeHTML(getDisplayName(profileUser))}'s wall</h3>
                    ${renderProfileWall(profileUser)}
                </div>`;
                }

                document.getElementById('app').innerHTML = headerHtml + tabsHtml + contentHtml +
                    `<div class="create-post-btn" onclick="window.openCreatePost()" title="New post">+</div>`;
                applyTheme();

                const searchInput = document.getElementById('searchInput');
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        const val = e.target.value;
                        searchQuery = val;
                        if (searchTimeout) clearTimeout(searchTimeout);
                        searchTimeout = setTimeout(() => {
                            if (searchQuery.startsWith('@')) {
                                if (searchQuery.length >= 2) {
                                    if (activeTab !== 'feed') {
                                        activeTab = 'feed';
                                        feedShuffled = [];
                                        feedIndex = 0;
                                    }
                                    render();
                                } else if (searchQuery.length < 2) {
                                    if (activeTab === 'feed') render();
                                }
                            } else {
                                if (activeTab !== 'feed') {
                                    activeTab = 'feed';
                                    feedShuffled = [];
                                    feedIndex = 0;
                                    render();
                                } else {
                                    resetFeed();
                                }
                            }
                        }, 400);
                    });
                    searchInput.addEventListener('keydown', (e) => {
                        if (e.key === 'Escape') {
                            searchQuery = '';
                            searchInput.value = '';
                            if (searchTimeout) clearTimeout(searchTimeout);
                            if (activeTab === 'feed') resetFeed();
                            else render();
                        }
                    });
                }

                if (activeTab === 'feed' && !searchQuery.startsWith('@')) {
                    const container = document.getElementById('feedContainer');
                    if (container && container.innerHTML === '') resetFeed();
                    restoreFeedScroll();
                }

                const feedEl = document.getElementById('feedContainer');
                if (feedEl && !feedEl._scrollBound) {
                    feedEl._scrollBound = true;
                    feedEl.addEventListener('scroll', handleFeedScroll);
                }
            }

            function handleFeedScroll() {
                const el = document.getElementById('feedContainer');
                if (!el) return;
                if (searchQuery.startsWith('@')) return;
                if (el.scrollTop + el.clientHeight >= el.scrollHeight - 180) loadMoreFeed();
            }

            function renderAuth() {
                return `
            <div class="auth-container"><div class="auth-box">
                <h2>Yolkapp</h2><div class="auth-subtitle">Sign in to continue</div>
                <div id="loginForm">
                    <div class="input-group"><label>Username</label><input id="loginUsername" placeholder="without @"></div>
                    <div class="input-group"><label>Email</label><input id="loginEmail" placeholder="example@mail.com"></div>
                    <div class="input-group"><label>Password</label><input id="loginPassword" type="password" placeholder="Enter password"></div>
                    <button class="btn" id="loginBtn" style="width:100%;">Log in</button>
                    <div class="auth-switch" id="showRegister">Don't have an account? <b>Sign up</b></div>
                </div>
                <div id="registerForm" style="display:none;">
                    <div class="input-group"><label>Username (English only, 1-15 chars, letters/numbers/_ )</label><input id="regUsername" placeholder="yourname"></div>
                    <div class="input-group"><label>Email</label><input id="regEmail" placeholder="example@mail.com"></div>
                    <div class="input-group"><label>Password</label><input id="regPassword" type="password" placeholder="Create password"></div>
                    <button class="btn" id="registerBtn" style="width:100%;">Sign up</button>
                    <div class="auth-switch" id="showLogin">Back to login</div>
                </div>
                <div id="authError" class="auth-error"></div>
            </div></div>`;
            }

            function attachAuthEvents() {
                const errDiv = document.getElementById('authError');
                document.getElementById('showRegister')?.addEventListener('click', () => {
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('registerForm').style.display = 'block';
                    if (errDiv) errDiv.textContent = '';
                });
                document.getElementById('showLogin')?.addEventListener('click', () => {
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block';
                    if (errDiv) errDiv.textContent = '';
                });
                document.getElementById('loginBtn')?.addEventListener('click', () => {
                    const rawUsername = document.getElementById('loginUsername').value.trim().toLowerCase();
                    const u = '@' + rawUsername;
                    const e = document.getElementById('loginEmail').value.trim();
                    const p = document.getElementById('loginPassword').value;
                    if (!users[u] || users[u].password !== p || users[u].email !== e) {
                        if (errDiv) errDiv.textContent = 'Invalid credentials';
                        return;
                    }
                    loginUser(u);
                });
                document.getElementById('registerBtn')?.addEventListener('click', async () => {
                    const raw = document.getElementById('regUsername').value.trim();
                    if (!isValidUsername(raw)) {
                        if (errDiv) errDiv.textContent =
                            'Username: 1-15 characters, English letters only (a-z, A-Z), numbers and underscores allowed. Must start with a letter.';
                        return;
                    }
                    const u = '@' + raw.toLowerCase();
                    if (users[u]) { if (errDiv) errDiv.textContent = 'Username already taken'; return; }
                    const e = document.getElementById('regEmail').value.trim();
                    const p = document.getElementById('regPassword').value;
                    if (!e || !p) { if (errDiv) errDiv.textContent = 'Fill all fields'; return; }
                    users[u] = { password: p, email: e, avatar: null, banner: null, bio: '', displayName: raw,
                        followers: [], following: [], badges: [], premium: false, registeredAt: Date.now() };
                    saveToLocalStorage();
                    if (dataLoaded) {
                        try {
                            await supabase.from('app_state').upsert({ id: STATE_ID, data: { users,
                                    posts } }, { onConflict: 'id' });
                        } catch (e) {}
                    }
                    loginUser(u);
                });
                document.getElementById('regUsername')?.addEventListener('input', function() {
                    const val = this.value;
                    if (val && !/^[a-zA-Z][a-zA-Z0-9_]*$/.test(val) && val.length > 0) {
                        this.style.borderColor = '#ff6b6b';
                    } else {
                        this.style.borderColor = '';
                    }
                });
            }

            window.switchTab = (tab) => { saveFeedScroll();
                activeTab = tab;
                viewedProfile = null;
                searchQuery = '';
                feedShuffled = [];
                feedIndex = 0; if (searchTimeout) clearTimeout(searchTimeout);
                render(); };
            window.goToMyProfile = () => { saveFeedScroll();
                activeTab = 'profile';
                viewedProfile = null;
                searchQuery = '';
                render(); };
            window.openUserProfile = (u) => { saveFeedScroll();
                activeTab = 'userProfile';
                viewedProfile = u;
                searchQuery = '';
                render(); };
            window.toggleLike = (id) => toggleLike(id);
            window.deletePostById = (id) => { if (confirm('Delete this post?')) deletePost(id); };
            window.openComments = (postId) => {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
            <div class="modal"><h3>Comments</h3>
                <div class="comments-section">${(post.comments||[]).map(c=>{
                    const comAuthor = users[c.author] || {};
                    const comPremiumClass = comAuthor.premium ? 'premium-nick' : 'normal-nick';
                    return `<div class="comment"><span class="comment-author" onclick="window.openUserProfile('${c.author}');this.closest('.modal-overlay').remove()"><span class="${comPremiumClass}">${escapeHTML(getDisplayName(c.author))} @${escapeHTML(c.author.substring(1))}</span></span>: ${escapeHTML(c.text)}</div>`;
                }).join('')||'<div style="color:#888;text-align:center;padding:12px;">No comments yet</div>'}</div>
                <div class="field-group"><input id="commentText" placeholder="Write a comment..."></div>
                <div class="btn-row">
                    <button class="btn secondary" onclick="this.closest('.modal-overlay').remove()">Close</button>
                    <button class="btn" id="submitComment">Send</button>
                </div>
            </div>`;
                document.body.appendChild(modal);
                modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
                document.getElementById('submitComment').onclick = () => {
                    const text = document.getElementById('commentText').value.trim();
                    if (text) { addComment(postId, text);
                        modal.remove(); }
                };
                document.getElementById('commentText')?.addEventListener('keydown', (e) => { if (e.key === 'Enter')
                        document.getElementById('submitComment')?.click(); });
            };
            window.openRepost = (postId) => {
                const post = posts.find(p => p.id === postId);
                if (!post) return;
                const originalAuthorName = getDisplayName(post.author);
                const origPremium = users[post.author]?.premium ? 'premium-nick' : 'normal-nick';
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
            <div class="modal">
                <h3>Repost</h3>
                <div style="margin-bottom:12px; padding:10px; background:rgba(240,200,64,0.06); border-left:3px solid var(--gold); border-radius:8px;">
                    <div style="font-weight:600;color:var(--gold);"><span class="${origPremium}">${escapeHTML(originalAuthorName)} @${escapeHTML(post.author.substring(1))}</span></div>
                    <div style="color:#ccc;font-size:13px;margin-top:4px;">${escapeHTML(post.text || '')}</div>
                    ${post.media ? (post.isVideo ? `<video controls src="${post.media}" style="max-width:100%;max-height:150px;margin-top:6px;border-radius:6px;"></video>` : `<img src="${post.media}" style="max-width:100%;max-height:150px;margin-top:6px;border-radius:6px;">`) : ''}
                </div>
                <div class="field-group">
                    <label>Add your comment (optional)</label>
                    <textarea id="repostText" rows="3" placeholder="What do you think?"></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="btn" id="doRepost">Repost</button>
                </div>
            </div>`;
                document.body.appendChild(modal);
                modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
                document.getElementById('doRepost').onclick = () => {
                    const text = document.getElementById('repostText').value;
                    repostPost(postId, text);
                    modal.remove();
                };
            };
            window.openCreatePost = () => {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.innerHTML = `
            <div class="modal"><h3>New post</h3>
                <div class="field-group"><label>What's on your mind?</label><textarea id="postText" rows="4" placeholder="Write something... #hashtag @mention"></textarea></div>
                <div class="field-group" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <label class="custom-file-btn" style="margin:0;">Choose media<input type="file" id="mediaFile" accept="image/*,video/*" style="display:none;" onchange="document.getElementById('fileNameLabel').textContent = this.files[0]?.name || ''"></label>
                    <span id="fileNameLabel" class="file-name"></span>
                </div>
                <div class="btn-row">
                    <button class="btn secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="btn" id="publishBtn">Publish</button>
                </div>
            </div>`;
                document.body.appendChild(modal);
                modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
                document.getElementById('publishBtn').onclick = () => {
                    const text = document.getElementById('postText').value.trim();
                    const file = document.getElementById('mediaFile').files[0];
                    if (!text && !file) return;
                    const publishBtn = document.getElementById('publishBtn');
                    if (publishBtn) publishBtn.disabled = true;
                    if (file) {
                        processMediaFile(file).then(result => { addPost(text || '', result.dataURL, result
                                .isVideo);
                                modal.remove(); })
                            .catch(err => { if (publishBtn) publishBtn.disabled = false; if (!err.message
                                    ?.includes('cancelled')) showToast('Error: ' + err.message, 3000); });
                    } else { addPost(text);
                        modal.remove(); }
                };
            };
            window.toggleFollowUser = (target) => toggleFollow(target);
            window.searchByHashtag = (tag) => {
                searchQuery = tag;
                const input = document.getElementById('searchInput');
                if (input) input.value = tag;
                if (searchTimeout) clearTimeout(searchTimeout);
                if (activeTab === 'feed') {
                    feedShuffled = [];
                    feedIndex = 0;
                    const container = document.getElementById('feedContainer');
                    if (container) { container.innerHTML = '';
                        loadMoreFeed(); }
                } else {
                    activeTab = 'feed';
                    feedShuffled = [];
                    feedIndex = 0;
                    render();
                }
            };
            window.clearSearch = () => {
                searchQuery = '';
                const input = document.getElementById('searchInput');
                if (input) input.value = '';
                if (searchTimeout) clearTimeout(searchTimeout);
                if (activeTab === 'feed') resetFeed();
                else { activeTab = 'feed';
                    feedShuffled = [];
                    feedIndex = 0;
                    render(); }
            };
            window.openImage = (src) => {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.style.cursor = 'zoom-out';
                modal.onclick = () => modal.remove();
                modal.innerHTML =
                    `<img src="${src}" style="max-width:92%;max-height:88%;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.7);">`;
                document.body.appendChild(modal);
            };
            window.openEditProfile = () => {
                const user = users[currentUser];
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                const isLight = document.body.classList.contains('light-theme');
                modal.innerHTML = `
            <div class="modal" style="max-width:460px;">
                <h3>Edit Profile</h3>
                <div class="field-group">
                    <label>Display name</label>
                    <input id="editDisplayName" value="${escapeHTML(user.displayName||'')}" placeholder="Your name">
                </div>
                <div class="field-group">
                    <label>Bio</label>
                    <input id="editBio" value="${escapeHTML(user.bio||'')}" placeholder="A few words about you">
                </div>
                <div class="field-group">
                    <label>Email</label>
                    <input id="editEmail" value="${escapeHTML(user.email||'')}" placeholder="your@email.com">
                </div>
                <div class="field-group">
                    <label>New password (leave blank to keep current)</label>
                    <input id="editPassword" type="password" placeholder="New password">
                </div>
                <div class="field-group" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                    <label class="custom-file-btn" style="margin:0;">Avatar<input type="file" id="editAvatar" accept="image/*" style="display:none;"></label>
                    <label class="custom-file-btn" style="margin:0;">Banner<input type="file" id="editBanner" accept="image/*" style="display:none;"></label>
                </div>
                <div class="theme-toggle">
                    <span>Theme</span>
                    <label class="switch">
                        <input type="checkbox" id="themeSwitch" ${isLight ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                    <span style="font-size:12px;">${isLight ? 'Light' : 'Dark'}</span>
                </div>
                <div class="btn-row">
                    <button class="btn secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="btn" id="saveProfileBtn">Save</button>
                </div>
            </div>`;
                document.body.appendChild(modal);
                modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
                document.getElementById('themeSwitch').addEventListener('change', toggleTheme);
                document.getElementById('saveProfileBtn').onclick = () => {
                    const dn = document.getElementById('editDisplayName').value.trim();
                    const bio = document.getElementById('editBio').value.trim();
                    const email = document.getElementById('editEmail').value.trim();
                    const pass = document.getElementById('editPassword').value;
                    if (dn) users[currentUser].displayName = dn;
                    if (bio !== undefined) users[currentUser].bio = bio;
                    if (email) users[currentUser].email = email;
                    if (pass) users[currentUser].password = pass;
                    const avatarFile = document.getElementById('editAvatar').files[0];
                    const bannerFile = document.getElementById('editBanner').files[0];
                    const saveBtn = document.getElementById('saveProfileBtn');
                    if (saveBtn) saveBtn.disabled = true;
                    const processImages = (cb) => {
                        let tasks = 0;
                        const checkDone = () => { tasks--; if (tasks <= 0) cb(); };
                        if (avatarFile) { tasks++;
                            compressImage(avatarFile, 300, 0.7).then(dataURL => { users[currentUser].avatar =
                                    dataURL;
                                checkDone(); }).catch(() => { const r = new FileReader();
                                r.onload = (e) => { users[currentUser].avatar = e.target.result;
                                    checkDone(); };
                                r.onerror = checkDone;
                                r.readAsDataURL(avatarFile); }); }
                        if (bannerFile) { tasks++;
                            compressImage(bannerFile, 800, 0.6).then(dataURL => { users[currentUser].banner =
                                    dataURL;
                                checkDone(); }).catch(() => { const r = new FileReader();
                                r.onload = (e) => { users[currentUser].banner = e.target.result;
                                    checkDone(); };
                                r.onerror = checkDone;
                                r.readAsDataURL(bannerFile); }); }
                        if (tasks === 0) cb();
                    };
                    processImages(() => { saveState();
                        modal.remove();
                        render();
                        showToast('Profile updated!'); });
                };
            };
            window.giveBadge = (target, num) => giveBadge(target, num);
            window.removeBadges = (target) => removeBadges(target);
            window.togglePremiumUser = (target) => togglePremium(target);
            window.logout = () => logout();
            window.handleFeedScroll = handleFeedScroll;
            window.openPremiumModal = openPremiumModal;
            window.openFollowersList = openFollowersList;
            window.openFollowingList = openFollowingList;

            loadState();
        })();
    </script>
</body>
</html>
