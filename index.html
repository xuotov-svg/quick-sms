<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yolkapp · messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --bg-dark: #050505;
            --bg-card: #0a0a0a;
            --bg-panel: #0f0f0f;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --text-muted: #888888;
            --border: #2a2a2a;
            --border-light: #1a1a1a;
            --accent: #d4af37;
            --accent-soft: #2a2418;
            --message-me: #1e2a3a;
            --message-other: #1a1a1a;
            --glass-bg: rgba(10, 10, 15, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        body { background: var(--bg-dark); }
        
        #app { 
            width: 100%; 
            height: 100vh; 
            background: var(--bg-panel); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* Эффект стекла */
        .chat-area, .sidebar, .chat-header, .input-area, .auth-box, .profile-modal, .message, .chat-item, .user-profile, .search-add, .post-card, .create-post-area {
            backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages-container { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        
        .message { 
            max-width: 85%; 
            padding: 10px 14px; 
            border-radius: 18px; 
            background: var(--message-other); 
            color: var(--text); 
            align-self: flex-start; 
            border: 1px solid var(--border); 
        }
        .message.me { align-self: flex-end; background: var(--message-me); border: 1px solid rgba(212, 175, 55, 0.3); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .gold-name { color: #ffd700; font-weight: bold; }
        .ruby-name { color: #ff4444; font-weight: bold; }
        .emerald-name { color: #44ff44; font-weight: bold; }
        .amethyst-name { color: #aa66ff; font-weight: bold; }
        
        .message-text { color: var(--text); }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; color: var(--text-secondary); }
        
        .verified-icon { display: inline-block; width: 18px; height: 18px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23389df2" d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/><path fill="white" d="M9.5 12.5L11.5 14.5L15.5 9.5" stroke="white" stroke-width="2" fill="none"/></svg>'); background-size: contain; vertical-align: middle; margin-left: 4px; }
        
        /* Кнопки с темно-серыми эмодзи */
        .icon-btn, .send-btn, .file-label, .tiny-btn, .profile-btn, .btn, .like-btn, .settings-icon, .delete-chat-icon, .tab, .gift-item, .nft-item, .msg-actions button, .back-btn, .post-like-btn, .post-comment-btn, .nav-tab, .feed-tab {
            filter: grayscale(0.6) brightness(0.7);
            transition: all 0.2s ease;
            color: #9ca3af;
        }
        
        .icon-btn:hover, .send-btn:hover, .file-label:hover, .tiny-btn:hover, .profile-btn:hover, .btn:hover, .like-btn:hover, .settings-icon:hover, .delete-chat-icon:hover, .tab:hover, .gift-item:hover, .nft-item:hover, .msg-actions button:hover, .post-like-btn:hover, .post-comment-btn:hover, .nav-tab:hover, .feed-tab:hover {
            filter: grayscale(0.3) brightness(0.85);
            color: #d4af37;
        }
        
        .nav-tab.active, .feed-tab.active {
            filter: grayscale(0);
            color: #d4af37;
            background: rgba(212, 175, 55, 0.2);
        }
        
        .yc-currency { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: var(--border); border-radius: 50%; margin-right: 2px; }
        .yc-currency::before { content: "YC"; position: absolute; font-size: 8px; font-weight: bold; color: var(--text); }
        .star-balance { display: inline-flex; align-items: center; gap: 4px; color: var(--text); font-weight: 600; margin-top: 4px; }
        
        /* Лента */
        .feed-container { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .feed-tabs { display: flex; gap: 8px; margin-bottom: 12px; padding: 0 12px; }
        .feed-tab { flex: 1; text-align: center; padding: 8px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 13px; background: var(--border-light); border: none; }
        .post-card { background: var(--glass-bg); border-radius: 20px; padding: 14px; border: 1px solid var(--border); position: relative; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; border: 2px solid var(--accent); cursor: pointer; flex-shrink: 0; }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-author { flex: 1; }
        .post-author-name { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .post-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .post-text { color: var(--text); font-size: 14px; line-height: 1.4; margin-bottom: 10px; }
        .post-media { max-width: 100%; border-radius: 14px; margin-bottom: 10px; }
        .post-media img, .post-media video { width: 100%; max-height: 250px; object-fit: cover; border-radius: 14px; cursor: pointer; }
        .post-actions { display: flex; gap: 20px; padding-top: 10px; border-top: 1px solid var(--border-light); }
        .post-like-btn, .post-comment-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 14px; padding: 6px 12px; border-radius: 20px; }
        .post-like-btn.liked { color: #ff4444; filter: grayscale(0); }
        .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }
        .comment { display: flex; gap: 8px; margin-bottom: 8px; padding: 8px; background: var(--border-light); border-radius: 12px; }
        .comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; cursor: pointer; }
        .comment-content { flex: 1; }
        .comment-author { font-weight: 600; font-size: 12px; color: var(--text); }
        .comment-text { font-size: 12px; color: var(--text); }
        .comment-time { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .add-comment { display: flex; gap: 8px; margin-top: 10px; }
        .add-comment input { flex: 1; padding: 8px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); outline: none; }
        .add-comment button { padding: 8px 16px; border-radius: 20px; border: none; background: var(--accent); color: #000; font-weight: 600; cursor: pointer; }
        .create-post-area { border-radius: 20px; padding: 14px; margin-bottom: 12px; }
        .create-post-text { width: 100%; padding: 12px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); resize: none; margin-bottom: 10px; }
        .create-post-actions { display: flex; gap: 8px; justify-content: flex-end; }
        
        /* Навигация */
        .nav-tabs { display: flex; background: var(--glass-bg); border-bottom: 1px solid var(--border); padding: 8px 12px; gap: 8px; }
        .nav-tab { flex: 1; text-align: center; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; background: transparent; border: none; }
        
        /* Остальные стили */
        .sidebar { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); transition: transform 0.3s ease; background: var(--glass-bg); backdrop-filter: blur(12px); }
        .sidebar.open { transform: translateX(0); }
        @media (min-width: 768px) { .sidebar { position: relative; transform: translateX(0); width: 300px; } .back-btn { display: none !important; } }
        
        .back-btn { background: var(--border-light); border: 1px solid var(--border); font-size: 24px; cursor: pointer; margin-right: 10px; display: none; width: 40px; height: 40px; border-radius: 12px; }
        .back-btn.visible { display: block; }
        
        .user-profile { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .avatar { width: 48px; height: 48px; background: var(--accent-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid var(--accent); overflow: hidden; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .username-display { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 2px; flex-wrap: wrap; }
        .age-badge { color: var(--text-muted); font-size: 12px; margin-left: 5px; }
        
        .search-add { padding: 12px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
        .search-add input { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 10px; color: var(--text); }
        .icon-btn { background: var(--accent-soft); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; }
        
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item { padding: 12px 16px; border-radius: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .chat-item:hover { background: var(--accent-soft); }
        .chat-item.active { background: var(--accent-soft); border: 2px solid var(--accent); }
        .chat-avatar { width: 40px; height: 40px; background: var(--accent-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; }
        .chat-avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .delete-chat-icon { margin-left: auto; cursor: pointer; }
        
        .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--glass-bg); backdrop-filter: blur(12px); }
        .chat-header-info strong { color: var(--text); }
        .chat-user-status { font-size: 11px; color: #4CAF50; }
        .chat-user-status.offline { color: var(--text-muted); }
        
        .tiny-btn { background: var(--border-light); border: 1px solid var(--border); padding: 6px 12px; border-radius: 12px; cursor: pointer; }
        
        .input-area { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); background: var(--glass-bg); backdrop-filter: blur(12px); }
        .input-area input[type="text"] { flex: 2; background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 12px; color: var(--text); }
        .file-label { background: var(--border-light); border: 1px solid var(--border); padding: 8px 16px; border-radius: 24px; cursor: pointer; }
        .send-btn { background: var(--accent-soft); border: 1px solid var(--border); width: 44px; height: 44px; border-radius: 50%; cursor: pointer; }
        
        .auth-box { max-width: 400px; margin: auto; padding: 30px; border-radius: 24px; background: var(--glass-bg); backdrop-filter: blur(12px); }
        .auth-box h2 { color: var(--text); margin-bottom: 16px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { color: var(--text-secondary); font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); }
        .btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-secondary { background: var(--border-light); color: var(--text); border: 1px solid var(--border); }
        
        .profile-modal { background: var(--glass-bg); backdrop-filter: blur(12px); border-radius: 24px; width: 90%; max-width: 400px; padding: 24px; max-height: 80vh; overflow-y: auto; }
        .profile-modal h3 { color: var(--text); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .profile-input-group { margin-bottom: 16px; }
        .profile-input-group label { color: var(--text-secondary); font-size: 13px; display: block; margin-bottom: 6px; }
        .profile-input-group input, .profile-input-group textarea { width: 100%; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(4px); }
        .notification { position: fixed; top: 20px; right: 20px; background: var(--bg-card); color: var(--text); padding: 12px 24px; border-radius: 16px; z-index: 10000; border: 1px solid var(--border); }
        .notification.error { background: #ff4444; color: white; }
        
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px; z-index: 9999; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid #2a2a2a; border-top: 3px solid #d4af37; border-radius: 50%; animation: spin 1s linear infinite; }
        
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 4px; background: var(--border-light); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // ========== FIREBASE ==========
        const firebaseConfig = { 
            apiKey: "AIzaSyDHddUllNs1CllRVOoR8MDP9qo3bfZnqM4", 
            authDomain: "quick-sms-772c4.firebaseapp.com", 
            databaseURL: "https://quick-sms-772c4-default-rtdb.firebaseio.com", 
            projectId: "quick-sms-772c4", 
            storageBucket: "quick-sms-772c4.firebasestorage.app", 
            messagingSenderId: "722370764251", 
            appId: "1:722370764251:web:1f93437108ee3d54f15bfe" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ========== ПЕРЕМЕННЫЕ ==========
        const ADMIN_USER = '@durov';
        const App = { 
            users: {}, chats: {}, currentUser: null, activeChat: null, 
            channels: {}, sidebarOpen: false, dataLoaded: false, 
            tempPhoto: null, tempVideo: null, savedMessages: {}, 
            posts: {}, currentView: 'chats', feedFilter: 'all'
        };
        App.systemBots = ['@game_bot', '@tap_bot', '@random_bot'];
        App.gameSymbols = ['🐣', '🛩️', '7️⃣', '🍳', '🥚', '🔥', '🌊', '🍭', '🍬'];

        // ========== ПОСТЫ ==========
        function createPost(text, imageData, videoData) {
            if (!text && !imageData && !videoData) {
                showNotification('Введите текст', 'error');
                return;
            }
            const post = {
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                author: App.currentUser,
                text: text || '',
                image: imageData || null,
                video: videoData || null,
                time: Date.now(),
                likes: {},
                comments: {}
            };
            App.posts[post.id] = post;
            saveToFirebase();
            renderFeed();
            showNotification('Пост опубликован!');
        }
        
        function likePost(postId) {
            const post = App.posts[postId];
            if (!post) return;
            if (post.likes[App.currentUser]) {
                delete post.likes[App.currentUser];
            } else {
                post.likes[App.currentUser] = true;
            }
            saveToFirebase();
            renderFeed();
        }
        
        function addComment(postId, commentText) {
            if (!commentText.trim()) return;
            const post = App.posts[postId];
            if (!post) return;
            const commentId = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
            if (!post.comments) post.comments = {};
            post.comments[commentId] = {
                id: commentId,
                author: App.currentUser,
                text: commentText,
                time: Date.now()
            };
            saveToFirebase();
            renderFeed();
            showNotification('Комментарий добавлен');
        }
        
        function deletePost(postId) {
            const post = App.posts[postId];
            if (!post) return;
            if (post.author !== App.currentUser && App.currentUser !== ADMIN_USER) {
                showNotification('Нельзя удалить чужой пост', 'error');
                return;
            }
            delete App.posts[postId];
            saveToFirebase();
            renderFeed();
            showNotification('Пост удален');
        }
        
        function deleteComment(postId, commentId) {
            const post = App.posts[postId];
            if (!post || !post.comments[commentId]) return;
            if (post.comments[commentId].author !== App.currentUser && App.currentUser !== ADMIN_USER) {
                showNotification('Нельзя удалить чужой комментарий', 'error');
                return;
            }
            delete post.comments[commentId];
            saveToFirebase();
            renderFeed();
            showNotification('Комментарий удален');
        }
        
        function getAllPostsRandom() {
            const posts = Object.values(App.posts);
            for (let i = posts.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [posts[i], posts[j]] = [posts[j], posts[i]];
            }
            return posts;
        }
        
        function getMyPosts() {
            return Object.values(App.posts).filter(p => p.author === App.currentUser).sort((a, b) => b.time - a.time);
        }

        // ========== СТАТУСЫ ==========
        function getUserStatus(username) {
            const user = App.users[username];
            if (!user) return null;
            if (user.status === 'RUBY') return { class: 'ruby-name' };
            if (user.status === 'EMERALD') return { class: 'emerald-name' };
            if (user.status === 'AMETHYST') return { class: 'amethyst-name' };
            if (user.status === 'GOLD') return { class: 'gold-name' };
            return null;
        }
        
        function formatUserNameWithStatus(username) {
            const status = getUserStatus(username);
            if (status) return `<span class="${status.class}">${username}</span>`;
            return username;
        }

        // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
        function generateId() { return Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
        function isValidUsername(str) { return /^[a-z0-9]{4,15}$/.test(str); }
        function showNotification(msg, type = 'success') { 
            const n = document.createElement('div'); 
            n.className = 'notification' + (type === 'error' ? ' error' : ''); 
            n.textContent = msg; 
            document.body.appendChild(n); 
            setTimeout(() => n.remove(), 3000); 
        }
        function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) { 
            const img = new Image(); 
            img.onload = () => { 
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
                if (h > maxHeight) { w = (w * maxHeight) / h; h = maxHeight; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                callback(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = dataUrl;
        }
        
        function saveToFirebase() { 
            if (!App.dataLoaded) return;
            database.ref().set({ 
                users: App.users, chats: App.chats, channels: App.channels, 
                savedMessages: App.savedMessages, posts: App.posts 
            }).catch(e => console.error(e));
        }
        
        function updateUserInterface() { 
            const userData = App.users[App.currentUser];
            if (!userData) return;
            document.querySelectorAll('.star-balance').forEach(el => {
                el.innerHTML = `<span class="yc-currency"></span> ${userData.stars || 0} YC`;
            });
        }

        // ========== ПРОФИЛЬ ==========
        function openProfileModal(username) {
            const userData = App.users[username] || { avatar: null, bio: '', stars: 0, verified: false, status: null, age: 14 };
            const isOwn = username === App.currentUser;
            
            const modalHtml = `
                <div class="modal-overlay" id="profileModalOverlay">
                    <div class="profile-modal">
                        <h3>${isOwn ? 'МОЙ ПРОФИЛЬ' : 'ПРОФИЛЬ ' + username}</h3>
                        <div style="text-align: center; margin-bottom: 16px;">
                            <div class="avatar" style="width: 80px; height: 80px; margin: 0 auto;">
                                ${userData.avatar ? `<img src="${userData.avatar}" style="width:100%; height:100%; object-fit:cover;">` : (username[1] || '🍳')}
                            </div>
                            <div class="username-display" style="justify-content: center; margin-top: 8px;">${formatUserNameWithStatus(username)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div>
                            <div class="age-badge">${userData.age || 14} лет</div>
                        </div>
                        <div class="profile-input-group"><label>ОПИСАНИЕ</label><div>${userData.bio || '—'}</div></div>
                        <div class="profile-input-group"><label>ВАЛЮТА</label><div><span class="yc-currency"></span> ${userData.stars || 0} YC</div></div>
                        <div class="profile-actions" style="display: flex; gap: 12px; margin-top: 16px;">
                            <button class="profile-btn secondary" id="closeProfileModalBtn">ЗАКРЫТЬ</button>
                            ${isOwn ? `<button class="profile-btn logout" id="logoutBtn">ВЫЙТИ</button>` : ''}
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('closeProfileModalBtn')?.addEventListener('click', () => {
                document.getElementById('profileModalOverlay')?.remove();
            });
            if (isOwn) {
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    document.getElementById('profileModalOverlay')?.remove();
                    App.currentUser = null;
                    localStorage.removeItem('yolk_current_user');
                    render();
                });
            }
        }

        // ========== РЕНДЕР ЛЕНТЫ ==========
        function renderFeed() {
            const container = document.getElementById('messageList');
            if (!container) return;

                    <div class="feed-tab ${App.feedFilter === 'my' ? 'active' : ''}" data-filter="my">МОИ ПОСТЫ</div>

                        <label class="file-label" style="margin:0;">🎥 Видео</label>
                        <input type="file" id="postImageUpload" accept="image/*" style="display:none;">
                        <input type="file" id="postVideoUpload" accept="video/*" style="display:none;">

            // Посты

                feedContainer.innerHTML = posts.map(post => {

                    const commentsCount = post.comments ? Object.keys(post.comments).length : 0;
                    const userData = App.users[post.author] || {};
                    const deleteBtn = (post.author === App.currentUser || App.currentUser === ADMIN_USER) ? 
                        `<button class="tiny-btn" onclick="window.deletePost('${post.id}')" style="position:absolute; right:10px; top:10px;">🗑️</button>` : '';
                    
                    let commentsHtml = `<div class="comments-section" id="comments_${post.id}">
                        <div class="add-comment">
                            <input type="text" id="commentInput_${post.id}" placeholder="Написать комментарий...">
                            <button onclick="window.addComment('${post.id}')">➤</button>
                        </div>
                    </div>`;
                    
                    if (post.comments && Object.keys(post.comments).length > 0) {
                        commentsHtml = `<div class="comments-section" id="comments_${post.id}">
                            ${Object.values(post.comments).map(c => `
                                <div class="comment">
                                    <div class="comment-avatar" onclick="openProfileModal('${c.author}')">${c.author[1] || '@'}</div>
                                    <div class="comment-content">
                                        <div class="comment-author">${formatUserNameWithStatus(c.author)}</div>
                                        <div class="comment-text">${escapeHtml(c.text)}</div>
                                        <div class="comment-time">${new Date(c.time).toLocaleTimeString().slice(0,5)}</div>
                                    </div>
                                    ${(c.author === App.currentUser || App.currentUser === ADMIN_USER) ? `<button class="tiny-btn" onclick="window.deleteComment('${post.id}', '${c.id}')" style="padding:2px 6px;">🗑️</button>` : ''}
                                </div>
                            `).join('')}
                            <div class="add-comment">
                                <input type="text" id="commentInput_${post.id}" placeholder="Написать комментарий...">
                                <button onclick="window.addComment('${post.id}')">➤</button>
                            </div>
                        </div>`;
                    }
                    
                    return `
                        <div class="post-card" style="position:relative">
                            ${deleteBtn}
                            <div class="post-header">
                                <div class="post-avatar" onclick="openProfileModal('${post.author}')">${userData.avatar ? `<img src="${userData.avatar}">` : (post.author[1] || '🍳')}</div>
                                <div class="post-author">
                                    <div class="post-author-name">${formatUserNameWithStatus(post.author)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div>
                                    <div class="post-time">${formatTime(post.time)}</div>
                                </div>
                            </div>
                            <div class="post-text">${escapeHtml(post.text)}</div>
                            ${post.image ? `<img src="${post.image}" class="post-media" onclick="window.openImageModal('${post.image}')">` : ''}
                            ${post.video ? `<video controls class="post-media"><source src="${post.video}"></video>` : ''}
                            <div class="post-actions">
                                <button class="post-like-btn ${isLiked ? 'liked' : ''}" onclick="window.likePost('${post.id}')">❤️ <span>${likesCount}</span></button>
                                <button class="post-comment-btn" onclick="window.toggleComments('${post.id}')">💬 <span>${commentsCount}</span></button>

                            ${commentsHtml}

            // Обработчики для создания поста

            document.getElementById('postImageUpload')?.addEventListener('change', (e) => {

                if (!file) return;

                reader.onload = (ev) => compressImage(ev.target.result, 800, 800, 0.7, (c) => { postPhoto = c; showNotification('Фото добавлено'); });

            });
            document.getElementById('postVideoUpload')?.addEventListener('change', (e) => {

                if (!file) return;
                if (file.size > 20 * 1024 * 1024) { showNotification('Видео не более 20 МБ', 'error'); return; }

                reader.readAsDataURL(file);
            });
            document.querySelectorAll('.file-label').forEach(l => {
                l.addEventListener('click', () => {
                    if (l.textContent.includes('📷')) document.getElementById('postImageUpload')?.click();
                    else document.getElementById('postVideoUpload')?.click();
                });
            });
            document.getElementById('publishPostBtn')?.addEventListener('click', () => {
                const text = document.getElementById('newPostText')?.value.trim() || '';
                if (!text && !postPhoto && !postVideo) { showNotification('Введите текст', 'error'); return; }
                createPost(text, postPhoto, postVideo);
                document.getElementById('newPostText').value = '';
                postPhoto = postVideo = null;
                document.getElementById('postImageUpload').value = '';
                document.getElementById('postVideoUpload').value = '';

        function formatTime(timestamp) {
            const diff = Date.now() - timestamp;
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (mins < 1) return 'только что';
            if (mins < 60) return mins + ' мин назад';
            if (hours < 24) return hours + ' ч назад';
            if (days === 1) return 'вчера';
            return days + ' д назад';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.likePost = likePost;
        window.addComment = function(postId) {
            const input = document.getElementById('commentInput_' + postId);
            if (input && input.value.trim()) {
                addComment(postId, input.value.trim());
                input.value = '';
            }
        };
        window.toggleComments = function(postId) {
            const div = document.getElementById('comments_' + postId);
            if (div) div.style.display = div.style.display === 'none' ? 'block' : 'none';
        };
        window.deletePost = deletePost;
        window.deleteComment = deleteComment;
        window.openImageModal = function(src) {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.onclick = () => modal.remove();
            modal.innerHTML = `<div style="max-width:90%; max-height:90%;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div>`;
            document.body.appendChild(modal);
        };

        // ========== ЧАТЫ ==========
        function sendMessage() {
            const input = document.getElementById('messageText');
            const text = input ? input.value.trim() : '';
            if (!text && !App.tempPhoto && !App.tempVideo) { showNotification('Введите сообщение', 'error'); return; }
            const to = App.activeChat;
            if (!to || to === 'yolk') return;
            
            const message = { from: App.currentUser, text: text || '', time: Date.now(), photo: App.tempPhoto, isVideo: !!App.tempVideo };
            
            if (to === 'saved') {
                if (!App.savedMessages[App.currentUser]) App.savedMessages[App.currentUser] = [];
                App.savedMessages[App.currentUser].push(message);
                saveToFirebase();
                renderMessages('saved');
            } else if (App.channels[to]) {
                if (!App.channels[to].messages) App.channels[to].messages = [];
                App.channels[to].messages.push(message);
                saveToFirebase();
                renderMessages(to);
            } else {
                const chatId = [App.currentUser, to].sort().join('_');
                if (!App.chats[chatId]) App.chats[chatId] = { user1: App.currentUser, user2: to, messages: [] };
                App.chats[chatId].messages.push(message);
                saveToFirebase();
                renderMessages(to);
            }
            if (input) input.value = '';
            App.tempPhoto = null;
            App.tempVideo = null;
            updateChatList();
        }
        
        function renderMessages(chatPartner) {
            const container = document.getElementById('messageList');
            if (!container) return;
            let messages = [];
            if (chatPartner === 'saved') messages = App.savedMessages[App.currentUser] || [];
            else if (App.channels[chatPartner]) messages = App.channels[chatPartner].messages || [];
            else {
                const chatId = [App.currentUser, chatPartner].sort().join('_');
                messages = App.chats[chatId]?.messages || [];
            }
            
            let html = '';
            messages.forEach((msg, idx) => {
                const isMe = msg.from === App.currentUser;
                html += `
                    <div class="message ${isMe ? 'me' : ''}">
                        ${!isMe ? `<small><span class="message-username" onclick="openProfileModal('${msg.from}')">${formatUserNameWithStatus(msg.from)}</span></small><br>` : ''}
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        ${msg.photo ? (msg.isVideo ? `<video controls class="media-preview"><source src="${msg.photo}"></video>` : `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`) : ''}
                        <div class="time">${new Date(msg.time).toLocaleTimeString().slice(0,5)}</div>
                        ${isMe ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">УДАЛИТЬ</button></div>` : ''}
                    </div>
                `;
            });
            if (messages.length === 0) html = '<div style="text-align:center; color:#888; padding:20px;">Нет сообщений</div>';
            container.innerHTML = html;
            setTimeout(() => container.scrollTop = container.scrollHeight, 100);
        }
        
        window.deleteMessage = function(chatPartner, idx) {
            if (chatPartner === 'saved') {
                App.savedMessages[App.currentUser].splice(idx, 1);
                saveToFirebase();
                renderMessages('saved');
            } else if (App.channels[chatPartner]) {
                App.channels[chatPartner].messages.splice(idx, 1);
                saveToFirebase();
                renderMessages(chatPartner);
            } else {
                const chatId = [App.currentUser, chatPartner].sort().join('_');
                App.chats[chatId].messages.splice(idx, 1);
                saveToFirebase();
                renderMessages(chatPartner);
            }
            showNotification('Удалено');
        };
        
        function updateChatList() {
            const container = document.getElementById('chatsList');
            if (!container) return;
            
            let chats = new Set(['saved']);
            Object.keys(App.chats || {}).forEach(key => {
                const c = App.chats[key];
                if (c.user1 === App.currentUser) chats.add(c.user2);
                if (c.user2 === App.currentUser) chats.add(c.user1);
            });
            Object.keys(App.channels || {}).forEach(ch => {
                if (App.channels[ch].subscribers?.includes(App.currentUser)) chats.add(ch);
            });
            
            let html = '';
            Array.from(chats).forEach(chat => {
                const active = chat === App.activeChat;
                let name = chat === 'saved' ? 'ИЗБРАННОЕ' : chat;
                let avatar = chat === 'saved' ? '📁' : (chat[1] || '@');
                html += `
                    <div class="chat-item ${active ? 'active' : ''}" data-chat="${chat}">
                        <div class="chat-avatar">${avatar}</div>
                        <div style="flex:1;"><div class="username-display">${name}</div></div>
                        ${chat !== 'saved' ? `<span class="delete-chat-icon" onclick="window.deleteChat('${chat}', event)">🗑️</span>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
            
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-chat-icon')) return;
                    const chat = el.dataset.chat;
                    App.activeChat = chat;
                    localStorage.setItem('yolk_active_chat', chat);
                    if (window.innerWidth < 768) App.sidebarOpen = false;
                    document.querySelector('.sidebar')?.classList.remove('open');
                    document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                    el.classList.add('active');
                    render();
                });
            });
        }
        
        window.deleteChat = function(chat, event) {
            event.stopPropagation();
            if (!confirm(`Удалить чат ${chat}?`)) return;
            const chatId = [App.currentUser, chat].sort().join('_');
            delete App.chats[chatId];
            if (App.channels[chat] && App.channels[chat].subscribers) {
                App.channels[chat].subscribers = App.channels[chat].subscribers.filter(s => s !== App.currentUser);
            }
            if (App.activeChat === chat) App.activeChat = 'saved';
            saveToFirebase();
            render();
        };
        
        function addUserBySearch() {
            let query = document.getElementById('searchUserInput')?.value.trim().toLowerCase();
            if (!query) { showNotification('Введите имя', 'error'); return; }
            if (!query.startsWith('@')) query = '@' + query;
            if (query === App.currentUser) { showNotification('Это вы', 'error'); return; }
            if (!App.users[query] && !App.channels[query]) { showNotification('Не найдено', 'error'); return; }
            
            if (App.channels[query]) {
                if (!App.channels[query].subscribers) App.channels[query].subscribers = [];
                if (!App.channels[query].subscribers.includes(App.currentUser)) {
                    App.channels[query].subscribers.push(App.currentUser);
                    saveToFirebase();
                }
            } else {
                const chatId = [App.currentUser, query].sort().join('_');
                if (!App.chats[chatId]) App.chats[chatId] = { user1: App.currentUser, user2: query, messages: [] };
                saveToFirebase();
            }
            App.activeChat = query;
            localStorage.setItem('yolk_active_chat', query);
            if (window.innerWidth < 768) App.sidebarOpen = false;
            document.querySelector('.sidebar')?.classList.remove('open');
            document.getElementById('searchUserInput').value = '';
            render();
        }

                document.getElementById('registerForm').style.display = 'block';
            });
            document.getElementById('showLoginBtn')?.addEventListener('click', () => {
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';

                let username = document.getElementById('loginUsername').value.trim().toLowerCase();

                localStorage.setItem('yolk_current_user', clean);
                render();
            });

                let username = document.getElementById('regUsername').value.trim().toLowerCase();

                if (!isValidUsername(username)) { document.getElementById('authError').innerText = 'Неверный формат'; return; }
                if (!pass) { document.getElementById('authError').innerText = 'Введите пароль'; return; }
                const clean = '@' + username;
                if (App.users[clean]) { document.getElementById('authError').innerText = 'Уже существует'; return; }
                App.users[clean] = { password: pass, avatar: null, stars: 0, bio: '', verified: false, age: 14 };
                saveToFirebase();
                App.currentUser = clean;
                localStorage.setItem('yolk_current_user', clean);
                render();
                showNotification('Аккаунт создан!');
            });

        function loadFromFirebase() {
            database.ref().get().then(snapshot => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.users) App.users = data.users;
                    if (data.chats) App.chats = data.chats;
                    if (data.channels) App.channels = data.channels;
                    if (data.savedMessages) App.savedMessages = data.savedMessages;
                    if (data.posts) App.posts = data.posts;
                }
                const savedUser = localStorage.getItem('yolk_current_user');
                const savedChat = localStorage.getItem('yolk_active_chat');
                if (savedUser && App.users[savedUser]) {
                    App.currentUser = savedUser;
                    App.activeChat = savedChat || 'saved';
                }
                App.dataLoaded = true;
                render();
            }).catch(() => {
                const savedUser = localStorage.getItem('yolk_current_user');
                if (savedUser && App.users[savedUser]) App.currentUser = savedUser;
                App.dataLoaded = true;
                render();
            });
        }
        
        function render() {
            const root = document.getElementById('app');
            if (!App.dataLoaded) {
                root.innerHTML = '<div class="loading-screen"><div class="loading-spinner"></div><div>Загрузка...</div></div>';
                return;
            }
            if (!App.currentUser) {
                root.innerHTML = renderAuth();
                attachAuthEvents();
            } else {
                root.innerHTML = renderMain();
                setTimeout(() => {
                    attachMainEvents();
                    if (App.currentView === 'chats') {
                        if (App.activeChat) renderMessages(App.activeChat);
                        updateChatList();
                    } else if (App.currentView === 'feed') {
                        renderFeed();
                    }
                }, 50);
            }
        }
        
        window.openProfileModal = openProfileModal;
        window.addEventListener('load', () => loadFromFirebase());
    </script>
</body>
</html>
