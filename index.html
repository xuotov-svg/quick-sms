<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp</title>

    <style>
        /* Все стили без изменений — они были в предыдущих версиях, здесь для краткости не дублирую, но в финальном коде они есть */

</head>
<body>
    <div id="app"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <script>
        // ========== FIREBASE ==========
        const firebaseConfig = { apiKey: "AIzaSyDHddUllNs1CllRVOoR8MDP9qo3bfZnqM4", authDomain: "quick-sms-772c4.firebaseapp.com", databaseURL: "https://quick-sms-772c4-default-rtdb.firebaseio.com", projectId: "quick-sms-772c4", storageBucket: "quick-sms-772c4.firebasestorage.app", messagingSenderId: "722370764251", appId: "1:722370764251:web:1f93437108ee3d54f15bfe" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        const ADMIN_USER = '@durov';
        const TON_ADDRESS = 'UQAR2F00H7mfSjtFwX9eXr_Qu1Vg8M3PKj4_bNyY5dC2niez';
        
        const App = { users: {}, chats: {}, currentUser: null, activeChat: null, blocked: {}, channels: {}, sidebarOpen: false, dataLoaded: false, tempPhoto: null, tempVideo: null, tempAvatar: null, tempBanner: null, tempWallpaper: null, pending2FA: null, savedMessages: {}, tapBalances: {}, tapUpgrades: {}, yolkChatMessages: {}, userListeners: {}, chatWallpaper: '', soundEnabled: true, audioCtx: null, streaks: {}, privacySettings: {} };
        App.systemBots = []; // ботов нет
        const tapUpgradeLevels = [{ cost: 0, reward: 1, nextCost: 10, name: "Базовый" }, { cost: 10, reward: 2, nextCost: 100, name: "Уровень 2" }, { cost: 100, reward: 4, nextCost: 1000, name: "Уровень 3" }, { cost: 1000, reward: 8, nextCost: 10000, name: "Уровень 4" }, { cost: 10000, reward: 500, nextCost: null, name: "МАКСИМУМ!" }];

        // === FEED GLOBALS ===
        let activeTab = 'chats';
        let feedPosts = [];
        let feedLoading = false;
        let feedHasMore = true;
        let feedLastTimestamp = null;
        let feedListener = null;

        // ========== СТАТУСЫ ==========
        const STATUS_TYPES = {
            GOLD: { name: 'GOLD', class: 'gold-name' },
            RUBY: { name: 'RUBY', class: 'ruby-name' },
            EMERALD: { name: 'EMERALD', class: 'emerald-name' },
            AMETHYST: { name: 'AMETHYST', class: 'amethyst-name' }
        };
        
        function getUserStatus(username) {
            const user = App.users[username];
            if (!user) return null;
            if (user.status === 'RUBY') return STATUS_TYPES.RUBY;
            if (user.status === 'EMERALD') return STATUS_TYPES.EMERALD;
            if (user.status === 'AMETHYST') return STATUS_TYPES.AMETHYST;
            if (user.status === 'GOLD') return STATUS_TYPES.GOLD;
            return null;
        }
        
        function formatUserNameWithStatus(username) {
            const status = getUserStatus(username);
            if (status) {
                return `<span class="${status.class}">${username}</span>`;
            }
            return username;
        }

        function isUserAdult(username) {
            const user = App.users[username];
            if (!user) return false;
            return (user.age || 14) >= 18;
        }

        // ========== ПРИВАТНОСТЬ ==========
        function canUserMessage(fromUser, toUser) {
            if (fromUser === toUser) return true;
            if (App.systemBots.includes(toUser)) return true;
            if (App.channels[toUser]) return true;
            const privacy = App.privacySettings[toUser];
            if (!privacy || !privacy.blockNewMessages) return true;
            const chatId = [fromUser, toUser].sort().join('_');
            const chat = App.chats[chatId];
            if (chat && chat.messages && chat.messages.length > 0) return true;
            return false;
        }
        
        function updatePrivacySetting(value) {
            App.privacySettings[App.currentUser] = App.privacySettings[App.currentUser] || {};
            App.privacySettings[App.currentUser].blockNewMessages = value;
            savePrivacySettings();
            showNotification(value ? '✅ Включено: новые пользователи не могут писать первыми' : '❌ Выключено: все могут писать вам');
        }
        
        function savePrivacySettings() {
            localStorage.setItem('yolk_privacy', JSON.stringify(App.privacySettings));
            if (App.dataLoaded) database.ref('privacySettings').set(App.privacySettings).catch(e => console.error(e));
        }
        
        function loadPrivacySettings() {
            const saved = localStorage.getItem('yolk_privacy');
            if (saved) { try { App.privacySettings = JSON.parse(saved); } catch(e) { App.privacySettings = {}; } }
            else { App.privacySettings = {}; }
        }

        // ========== КАНАЛЫ ==========
        function createChannel() {
            const user = App.currentUser;
            if (App.users[user].stars < 50) { showNotification('Недостаточно YC! Нужно 50 YC для создания канала', 'error'); return; }
            const modalHtml = `<div class="modal-overlay" id="createChannelModal"><div class="profile-modal"><h3>📢 СОЗДАНИЕ КАНАЛА</h3><div class="profile-input-group"><label>@ЮЗЕРНЕЙМ КАНАЛА (только англ буквы и цифры)</label><input type="text" id="channelUsername" placeholder="например: mychannel"></div><div class="profile-actions"><button class="profile-btn" id="confirmCreateChannelBtn">СОЗДАТЬ (50 YC)</button><button class="profile-btn secondary" id="closeChannelCreateBtn">ОТМЕНА</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('confirmCreateChannelBtn').addEventListener('click', () => {
                let channelName = document.getElementById('channelUsername').value.trim().toLowerCase();
                if (!channelName || !/^[a-z0-9]{4,15}$/.test(channelName)) { showNotification('Название только англ буквы и цифры, 4-15 символов', 'error'); return; }
                const fullChannelName = '@' + channelName;
                if (App.channels[fullChannelName]) { showNotification('Канал с таким именем уже существует', 'error'); return; }
                App.users[user].stars -= 50;
                App.channels[fullChannelName] = { name: fullChannelName, owner: user, description: '', subscribers: [user], messages: [], avatar: null, createdAt: Date.now() };
                saveToFirebase();
                updateUserInterface();
                document.getElementById('createChannelModal').remove();
                showNotification(`✅ Канал ${fullChannelName} создан!`);
                render();
            });
            document.getElementById('closeChannelCreateBtn').addEventListener('click', () => { document.getElementById('createChannelModal').remove(); });
        }
        
        function openChannelModal(channelName) {
            const channel = App.channels[channelName];
            if (!channel) return;
            const isOwner = channel.owner === App.currentUser;
            if (isOwner) {
                const modalHtml = `<div class="modal-overlay" id="channelModalOverlay"><div class="profile-modal"><h3>📢 КАНАЛ ${channelName}</h3><div class="profile-avatar-overlay" style="position: relative; bottom: 0; left: 0; margin-bottom: 20px; text-align: center;"><div class="avatar-large" style="margin: 0 auto;">${channel.avatar ? `<img src="${channel.avatar}">` : '📢'}</div></div><div class="profile-name-section" style="margin-top: 20px; text-align: center;"><div class="username-display" style="font-size:20px; justify-content: center;">${formatUserNameWithStatus(channelName)}</div></div><div class="profile-input-group"><label>АВАТАР КАНАЛА</label><input type="file" id="channelAvatarUpload" accept="image/*"></div><div class="profile-actions"><button class="profile-btn warning" id="deleteChannelBtn">🗑️ УДАЛИТЬ КАНАЛ</button><button class="profile-btn secondary" id="closeChannelModalBtn">ЗАКРЫТЬ</button></div></div></div>`;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                let tempAvatar = null;
                document.getElementById('channelAvatarUpload')?.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        compressImage(ev.target.result, 200, 200, 0.7, (compressed) => {
                            document.querySelector('#channelModalOverlay .avatar-large').innerHTML = `<img src="${compressed}">`;
                            tempAvatar = compressed;
                            App.channels[channelName].avatar = tempAvatar;
                            saveToFirebase();
                            showNotification('Аватар канала обновлен');
                        });
                    };
                    reader.readAsDataURL(file);
                });
                document.getElementById('deleteChannelBtn')?.addEventListener('click', () => {
                    if (confirm(`Удалить канал ${channelName}?`)) {
                        delete App.channels[channelName];
                        if (App.activeChat === channelName) { App.activeChat = 'saved'; localStorage.setItem('yolk_active_chat', 'saved'); }
                        saveToFirebase();
                        document.getElementById('channelModalOverlay').remove();
                        render();
                        showNotification('Канал удален');
                    }
                });
                document.getElementById('closeChannelModalBtn').addEventListener('click', () => { document.getElementById('channelModalOverlay').remove(); });
            } else {
                const isSubscribed = channel.subscribers?.includes(App.currentUser);
                const modalHtml = `<div class="modal-overlay" id="channelModalOverlay"><div class="profile-modal"><h3>📢 КАНАЛ ${channelName}</h3><div class="profile-avatar-overlay" style="position: relative; bottom: 0; left: 0; margin-bottom: 20px; text-align: center;"><div class="avatar-large" style="margin: 0 auto;">${channel.avatar ? `<img src="${channel.avatar}">` : '📢'}</div></div><div class="profile-name-section" style="margin-top: 20px; text-align: center;"><div class="username-display" style="font-size:20px; justify-content: center;">${formatUserNameWithStatus(channelName)}</div><div class="star-balance" style="justify-content: center; margin-top: 8px;">👥 ${channel.subscribers?.length || 0} подписчиков</div></div><div class="profile-actions"><button class="${isSubscribed ? 'unsubscribe-btn' : 'subscribe-btn'}" id="subscribeChannelBtn">${isSubscribed ? 'ОТПИСАТЬСЯ' : 'ПОДПИСАТЬСЯ'}</button><button class="profile-btn secondary" id="closeChannelModalBtn">ЗАКРЫТЬ</button></div></div></div>`;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                document.getElementById('subscribeChannelBtn')?.addEventListener('click', () => {
                    if (!channel.subscribers) channel.subscribers = [];
                    if (channel.subscribers.includes(App.currentUser)) {
                        channel.subscribers = channel.subscribers.filter(s => s !== App.currentUser);
                        showNotification(`Вы отписались от канала ${channelName}`);
                    } else {
                        channel.subscribers.push(App.currentUser);
                        showNotification(`Вы подписались на канал ${channelName}`);
                    }
                    saveToFirebase();
                    document.getElementById('channelModalOverlay').remove();
                    render();
                });
                document.getElementById('closeChannelModalBtn').addEventListener('click', () => { document.getElementById('channelModalOverlay').remove(); });
            }
        }

        // ========== СИСТЕМА STREAK ==========
        function updateStreak(chatPartner) {
            const user = App.currentUser;
            if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk' || App.systemBots.includes(chatPartner) || App.channels[chatPartner]) return 0;
            const chatId = [user, chatPartner].sort().join('_');
            const today = new Date().toDateString();
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();
            if (!App.streaks[chatId]) App.streaks[chatId] = { streak: 0, lastMessageDate: null, lastUpdateDate: null, users: {} };
            [user, chatPartner].forEach(u => { if (!App.streaks[chatId].users[u]) App.streaks[chatId].users[u] = { lastMessageDate: null, streak: 0 }; });
            const userData = App.streaks[chatId].users[user];
            const partnerData = App.streaks[chatId].users[chatPartner];
            userData.lastMessageDate = today;
            const partnerWroteToday = partnerData.lastMessageDate === today;
            if (partnerWroteToday) {
                const lastCommonDay = App.streaks[chatId].lastMessageDate;
                if (lastCommonDay === yesterdayStr) { App.streaks[chatId].streak++; userData.streak = App.streaks[chatId].streak; partnerData.streak = App.streaks[chatId].streak; }
                else if (lastCommonDay !== today) { App.streaks[chatId].streak = 1; userData.streak = 1; partnerData.streak = 1; }
                else { userData.streak = App.streaks[chatId].streak; partnerData.streak = App.streaks[chatId].streak; }
                App.streaks[chatId].lastMessageDate = today;
                App.streaks[chatId].lastUpdateDate = today;
            } else {
                const currentStreak = App.streaks[chatId].streak;
                userData.streak = currentStreak;
                partnerData.streak = currentStreak;
            }
            const lastUpdate = App.streaks[chatId].lastUpdateDate;
            if (lastUpdate && lastUpdate !== today && lastUpdate !== yesterdayStr) { App.streaks[chatId].streak = 0; userData.streak = 0; partnerData.streak = 0; App.streaks[chatId].lastMessageDate = null; }
            saveStreaks();
            return App.streaks[chatId].streak;
        }
        
        function getStreak(chatPartner) {
            const user = App.currentUser;
            if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk' || App.systemBots.includes(chatPartner) || App.channels[chatPartner]) return 0;
            const chatId = [user, chatPartner].sort().join('_');
            const today = new Date().toDateString();
            const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();
            if (!App.streaks[chatId]) return 0;
            const streakData = App.streaks[chatId];
            const lastUpdate = streakData.lastUpdateDate;
            if (lastUpdate && lastUpdate !== today && lastUpdate !== yesterdayStr) {
                if (streakData.streak > 0) { streakData.streak = 0; if (streakData.users[user]) streakData.users[user].streak = 0; if (streakData.users[chatPartner]) streakData.users[chatPartner].streak = 0; saveStreaks(); }
                return 0;
            }
            return streakData.streak || 0;
        }
        
        function saveStreaks() { localStorage.setItem('yolk_streaks', JSON.stringify(App.streaks)); if (App.dataLoaded) database.ref('streaks').set(App.streaks).catch(e => console.error(e)); }
        function loadStreaks() { const saved = localStorage.getItem('yolk_streaks'); if (saved) { try { App.streaks = JSON.parse(saved); } catch(e) { App.streaks = {}; } } else { App.streaks = {}; } }

        // ========== АДМИН-ПАНЕЛЬ ==========
        function openAdminPanel() {
            const usersList = Object.keys(App.users).filter(u => !App.systemBots.includes(u));
            const giftsList = ['🔥', '🌊', '🍭', '🍬', '🥚', '🍳'];
            const statusList = ['GOLD', 'RUBY', 'EMERALD', 'AMETHYST'];
            const modalHtml = `<div class="modal-overlay" id="adminModalOverlay"><div class="profile-modal" style="max-width: 500px;"><h3>👑 АДМИН-ПАНЕЛЬ (@durov)</h3><div class="admin-give-form"><h4>🎁 ВЫДАТЬ ПРЕДМЕТ</h4><div class="input-group"><label>ПОЛЬЗОВАТЕЛЬ</label><select id="adminTargetUser"><option value="">Выберите пользователя</option>${usersList.map(u => `<option value="${u}">${u}</option>`).join('')}</select></div><div class="input-group"><label>ТИП ПРЕДМЕТА</label><select id="adminItemType"><option value="yc">YC (валюта)</option><option value="gift">Подарок (эмодзи)</option><option value="status">СТАТУС</option><option value="verified">VERIFIED СТАТУС</option></select></div><div id="adminYcAmount" class="input-group"><label>КОЛИЧЕСТВО YC</label><input type="number" id="adminYcValue" value="100" min="1"></div><div id="adminGiftSelect" class="input-group hidden"><label>ВЫБЕРИТЕ ПОДАРОК</label><select id="adminGiftValue">${giftsList.map(g => `<option value="${g}">${g}</option>`).join('')}</select></div><div id="adminStatusSelect" class="input-group hidden"><label>ВЫБЕРИТЕ СТАТУС</label><select id="adminStatusValue">${statusList.map(s => `<option value="${s}">${s}</option>`).join('')}</select></div><button class="profile-btn" id="adminGiveBtn">✅ ВЫДАТЬ</button></div><div class="profile-actions"><button class="profile-btn secondary" id="closeAdminModal">ЗАКРЫТЬ</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const itemType = document.getElementById('adminItemType');
            const ycDiv = document.getElementById('adminYcAmount');
            const giftDiv = document.getElementById('adminGiftSelect');
            const statusDiv = document.getElementById('adminStatusSelect');
            itemType.addEventListener('change', () => { ycDiv.classList.add('hidden'); giftDiv.classList.add('hidden'); statusDiv.classList.add('hidden'); if (itemType.value === 'yc') ycDiv.classList.remove('hidden'); else if (itemType.value === 'gift') giftDiv.classList.remove('hidden'); else if (itemType.value === 'status') statusDiv.classList.remove('hidden'); });
            document.getElementById('adminGiveBtn').addEventListener('click', () => {
                const targetUser = document.getElementById('adminTargetUser').value;
                const type = document.getElementById('adminItemType').value;
                if (!targetUser || !App.users[targetUser]) { showNotification('Пользователь не найден', 'error'); return; }
                if (type === 'yc') {
                    const amount = parseInt(document.getElementById('adminYcValue').value);
                    if (isNaN(amount) || amount <= 0) { showNotification('Введите корректное количество YC', 'error'); return; }
                    App.users[targetUser].stars = (App.users[targetUser].stars || 0) + amount;
                    showNotification(`✅ Выдано ${amount} YC пользователю ${targetUser}`);
                } else if (type === 'gift') {
                    const gift = document.getElementById('adminGiftValue').value;
                    if (!App.users[targetUser].gifts) App.users[targetUser].gifts = [];
                    App.users[targetUser].gifts.push(gift);
                    showNotification(`✅ Выдан подарок ${gift} пользователю ${targetUser}`);
                } else if (type === 'status') {
                    const status = document.getElementById('adminStatusValue').value;
                    App.users[targetUser].status = status;
                    showNotification(`✨ СТАТУС ${status} выдан пользователю ${targetUser}! ✨`);
                    updateUserInterface();
                    if (App.activeChat && App.activeChat !== 'saved' && !App.channels[App.activeChat]) renderMessages(App.activeChat);
                    updateChatList();
                } else if (type === 'verified') {
                    App.users[targetUser].verified = true;
                    showNotification(`✅ VERIFIED СТАТУС выдан пользователю ${targetUser}!`);
                    updateUserInterface();
                    if (App.activeChat && App.activeChat !== 'saved' && !App.channels[App.activeChat]) renderMessages(App.activeChat);
                    updateChatList();
                }
                saveToFirebase();
                updateUserInterface();
                document.getElementById('adminModalOverlay').remove();
            });
            document.getElementById('closeAdminModal').addEventListener('click', () => { document.getElementById('adminModalOverlay').remove(); });
        }

        // ========== НАСТРОЙКИ ПРОФИЛЯ ==========
        function openProfileSettings() {
            const userData = App.users[App.currentUser];
            const currentPrivacy = App.privacySettings[App.currentUser]?.blockNewMessages || false;
            const currentWallpaper = userData.chatWallpaper || '';
            const modalHtml = `<div class="modal-overlay" id="settingsModalOverlay"><div class="profile-modal"><h3>⚙️ НАСТРОЙКИ</h3><div class="profile-input-group"><label>ПАРОЛЬ</label><div class="password-wrapper"><input type="password" id="settingsPassword" value="${userData.password || ''}"><button class="toggle-password" onclick="window.toggleSettingsPassword()">👁️</button></div></div><div class="profile-input-group"><label>ОПИСАНИЕ</label><textarea id="settingsBio" maxlength="50">${userData.bio || ''}</textarea></div><div class="profile-input-group"><label>ВОЗРАСТ</label><input type="number" id="settingsAge" min="5" max="99" value="${userData.age || 14}"></div><div class="profile-input-group"><label>АВАТАР</label><input type="file" id="settingsAvatar" accept="image/*"></div><div class="profile-input-group"><label>БАННЕР</label><input type="file" id="settingsBanner" accept="image/*"></div><div class="profile-input-group"><label>ФОН ЧАТА</label><div id="settingsWallpaperPreview" class="wallpaper-preview" style="background-image: ${currentWallpaper ? `url('${currentWallpaper}')` : 'none'}; background-size: cover; background-position: center;"></div><input type="file" id="settingsWallpaper" accept="image/*"></div><div class="profile-input-group"><label>🔒 КОНФИДЕНЦИАЛЬНОСТЬ</label><div class="toggle-switch ${currentPrivacy ? 'active' : ''}" id="privacyToggle"><div class="toggle-checkbox"></div><span class="toggle-label">${currentPrivacy ? '☑️ Незнакомцы не могут писать первыми' : '❌ Все могут писать первыми'}</span></div><small style="color:#888; display:block; margin-top:5px;">Если включено: только те, с кем у вас уже есть чат, могут писать вам.</small></div><div class="profile-input-group"><label>ДОПОЛНИТЕЛЬНАЯ ЗАЩИТА (2FA)</label><div class="toggle-switch ${userData.twoFA ? 'active' : ''}" id="settingsTwoFAToggle"><div class="toggle-checkbox"></div><span class="toggle-label">${userData.twoFA ? '☑️ Включена' : '❌ Выключена'}</span></div></div><div class="profile-actions"><button class="profile-btn" id="saveSettingsBtn">СОХРАНИТЬ</button><button class="profile-btn secondary" id="closeSettingsBtn">ОТМЕНА</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            window.toggleSettingsPassword = function() {
                const passInput = document.getElementById('settingsPassword');
                const btn = document.querySelector('#settingsModalOverlay .toggle-password');
                if (passInput.type === 'password') { passInput.type = 'text'; btn.textContent = '🙈'; } else { passInput.type = 'password'; btn.textContent = '👁️'; }
            };
            let tempAvatar = null, tempBanner = null, tempWallpaper = null;

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function formatLastSeen(lastSeen, chatPartner) {
            if (chatPartner === 'saved' || chatPartner === 'yolk') return '';
            if (!lastSeen) return 'очень давно';
            const now = Date.now();
            const diff = now - lastSeen;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (minutes < 1) return 'только что';
            if (minutes < 5) return `${minutes} мин назад`;
            if (minutes < 15) return '5 мин назад';
            if (minutes < 30) return '15 мин назад';
            if (minutes < 60) return '30 мин назад';
            if (hours < 2) return '1 час назад';
            if (hours < 5) return `${hours} часа назад`;
            if (hours < 24) return `${hours} часов назад`;
            if (days === 1) return '1 день назад';
            if (days < 5) return `${days} дня назад`;
            return `${days} дней назад`;
        }

        function playHappySound() { if (!App.soundEnabled) return; try { if (!App.audioCtx) { App.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); App.audioCtx.resume(); } const ctx = App.audioCtx; const now = ctx.currentTime; const osc1 = ctx.createOscillator(); const gain = ctx.createGain(); osc1.connect(gain); gain.connect(ctx.destination); gain.gain.value = 0.2; osc1.frequency.value = 880; osc1.start(); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3); osc1.stop(now + 0.3); } catch(e) { console.log('Sound error:', e); } }
        function showConfetti() { const confettiDiv = document.createElement('div'); confettiDiv.className = 'confetti'; for (let i = 0; i < 50; i++) { const piece = document.createElement('div'); piece.className = 'confetti-piece'; piece.style.left = Math.random() * 100 + '%'; piece.style.animationDelay = Math.random() * 2 + 's'; piece.style.background = ['#ffd700', '#ffb347', '#ff8c00', '#d4af37'][Math.floor(Math.random() * 4)]; confettiDiv.appendChild(piece); } document.body.appendChild(confettiDiv); setTimeout(() => confettiDiv.remove(), 3000); }

        function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) { const img = new Image(); img.onload = () => { let width = img.width; let height = img.height; if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; } if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; } const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height); const compressedDataUrl = canvas.toDataURL('image/jpeg', quality); callback(compressedDataUrl); }; img.src = dataUrl; }

        function saveToFirebase() {

            const updates = {};
            if (App.users) updates['/users'] = App.users;

        async function createNft(grid, owner) {
            if (!App.users[owner]) return false;
            if (App.users[owner].stars < 50) { showNotification('Недостаточно YC (нужно 50)', 'error'); return false; }
            const nftObj = { grid: grid, createdAt: Date.now() };
            if (!App.users[owner].nfts) App.users[owner].nfts = [];
            App.users[owner].nfts.push(nftObj);
            App.users[owner].stars -= 50;
            saveToFirebase();
            updateUserInterface();
            showNotification('Открытка создана!');

        }
        
        function openNftCreator() { if (App.users[App.currentUser].stars < 50) { showNotification('Не хватает 50 YC для создания открытки', 'error'); return; } const modalHtml = `<div class="modal-overlay" id="nftCreatorModal"><div class="profile-modal" style="max-width: 500px;"><h3>🎨 СОЗДАТЬ ОТКРЫТКУ (10x10)</h3><div class="pixel-canvas" id="pixelCanvas" style="display: grid; grid-template-columns: repeat(10, 30px); grid-template-rows: repeat(10, 30px); gap: 1px; background: #2a2a2a;"></div><div class="color-palette" id="colorPalette"></div><button class="create-nft-btn" id="confirmCreateNftBtn">СОЗДАТЬ (50 YC)</button><div class="profile-actions"><button class="profile-btn secondary" id="closeNftCreator">ОТМЕНА</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); let grid = Array(10).fill().map(() => Array(10).fill('#ffffff')); let currentColor = '#000000'; const canvasDiv = document.getElementById('pixelCanvas'); const paletteDiv = document.getElementById('colorPalette'); const colors = ['#000000', '#ffffff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#800080']; colors.forEach(col => { const btn = document.createElement('div'); btn.className = `color-option ${col === currentColor ? 'active' : ''}`; btn.style.backgroundColor = col; btn.addEventListener('click', () => { currentColor = col; document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active')); btn.classList.add('active'); }); paletteDiv.appendChild(btn); }); function renderCanvas() { canvasDiv.innerHTML = ''; for (let i = 0; i < 10; i++) { for (let j = 0; j < 10; j++) { const pixel = document.createElement('div'); pixel.className = 'pixel'; pixel.style.backgroundColor = grid[i][j]; pixel.style.width = '30px'; pixel.style.height = '30px'; pixel.addEventListener('click', () => { grid[i][j] = currentColor; renderCanvas(); }); canvasDiv.appendChild(pixel); } } } renderCanvas(); document.getElementById('confirmCreateNftBtn').addEventListener('click', async () => { const success = await createNft(grid, App.currentUser); if (success) document.getElementById('nftCreatorModal').remove(); }); document.getElementById('closeNftCreator').addEventListener('click', () => { document.getElementById('nftCreatorModal').remove(); }); }

                            if (!App.users[user].gifts) App.users[user].gifts = [];
                            App.users[user].gifts.push(gift);
                            saveToFirebase();
                            updateUserInterface();
                            document.getElementById('profileModalOverlay').remove();
                            openProfileModal(user);
                            showNotification(`Куплен подарок ${gift}`);
                        } else { showNotification('Недостаточно YC', 'error'); }

                        const ton = parseFloat(e.target.dataset.ton);

                document.querySelectorAll('.status-donate-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {

                        document.getElementById('profileModalOverlay')?.remove();
                    });
                });
                document.getElementById('createChannelBtn')?.addEventListener('click', () => { document.getElementById('profileModalOverlay').remove(); createChannel(); });
                document.querySelectorAll('.view-channel-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const channelName = e.target.dataset.channel;
                        document.getElementById('profileModalOverlay').remove();
                        openChannelModal(channelName);
                    });
                });
                document.getElementById('createNftBtn')?.addEventListener('click', () => { document.getElementById('profileModalOverlay').remove(); openNftCreator(); });
                document.getElementById('closeProfileModalBtn').addEventListener('click', () => { document.getElementById('profileModalOverlay').remove(); });
                if (isAdmin) {
                    setTimeout(() => {
                        const adminBtn = document.createElement('button');
                        adminBtn.className = 'profile-btn';
                        adminBtn.style.background = '#ff9800';
                        adminBtn.style.color = '#000000';
                        adminBtn.textContent = '👑 АДМИН-ПАНЕЛЬ';
                        adminBtn.onclick = () => { document.getElementById('profileModalOverlay')?.remove(); openAdminPanel(); };
                        const actionsDiv = document.querySelector('#profileModalOverlay .profile-actions');
                        if (actionsDiv && !document.querySelector('#adminPanelBtn')) {
                            adminBtn.id = 'adminPanelBtn';
                            actionsDiv.insertBefore(adminBtn, actionsDiv.firstChild);
                        }
                    }, 100);
                }
                return;
            }
            const modalHtml = `<div class="modal-overlay" id="profileModalOverlay"><div class="profile-modal"><h3>ПРОФИЛЬ ${username}${userData.verified ? '<span class="verified-icon" style="width:22px;height:22px;"></span>' : ''}</h3><div class="profile-banner-wrapper"><div class="banner-container">${userData.banner ? `<img src="${userData.banner}" class="banner-image">` : '<div class="banner-placeholder">Нет баннера</div>'}</div><div class="profile-avatar-overlay"><div class="avatar-large">${userData.avatar ? `<img src="${userData.avatar}">` : '🍳'}</div></div></div><div class="profile-name-section"><div class="username-display" style="font-size:20px;">${formatUserNameWithStatus(username)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div></div><div class="profile-input-group"><label>ОПИСАНИЕ</label><div>${userData.bio || '—'}</div></div><div class="profile-input-group"><label>ВОЗРАСТ</label><div>${userData.age || 14} лет</div></div><div class="profile-input-group"><span class="currency-label">ВАЛЮТА</span><div class="star-balance-large"><span class="yc-currency"></span> ${userData.stars || 0} YC</div></div><div class="profile-input-group"><label>ПОДАРКИ</label><div class="gifts-collection">${giftsList || 'НЕТ ПОДАРКОВ'}</div></div><div class="profile-input-group"><label>ОТКРЫТКИ</label><div class="nft-collection">${nftsList || 'НЕТ ОТКРЫТОК'}</div></div><div class="profile-actions"><button class="profile-btn secondary" id="closeProfileModalBtn">ЗАКРЫТЬ</button></div></div></div>`; 
            document.body.insertAdjacentHTML('beforeend', modalHtml); 
            document.getElementById('closeProfileModalBtn').addEventListener('click', () => { document.getElementById('profileModalOverlay').remove(); }); 
        }

        // ========== ДОНАТ ==========
        function openDonationModal(pack) { 
            const modalHtml = `<div class="modal-overlay" id="donationModalOverlay"><div class="profile-modal"><h3>💸 ПОПОЛНЕНИЕ YC</h3><div class="qr-code" id="donationQrCode"></div><div class="profile-input-group"><label>📤 АДРЕС КОШЕЛЬКА TON</label><input type="text" value="${TON_ADDRESS}" readonly onclick="this.select();document.execCommand('copy');showNotification('Адрес скопирован!')"></div><div class="profile-input-group"><label>💰 СУММА</label><input type="text" value="${pack.ton} TON" readonly></div><div class="profile-input-group"><label>📝 ВАШ ЮЗЕРНЕЙМ (обязательно!)</label><input type="text" id="donationComment" placeholder="Например: @durov" value="${App.currentUser}"></div><div class="profile-input-group"><label>🔗 TXID (хеш транзакции)</label><input type="text" id="donationTxid" placeholder="Вставьте TXID из TON Keeper"></div><div class="profile-actions"><button class="profile-btn" id="submitDonationBtn">✅ Я ОТПРАВИЛ TON</button><button class="profile-btn secondary" id="closeDonationModal">ОТМЕНА</button></div><small style="display:block; text-align:center; margin-top:12px;">⚠️ В комментарии к переводу ОБЯЗАТЕЛЬНО укажите свой юзернейм с @</small></div></div>`; 
            document.body.insertAdjacentHTML('beforeend', modalHtml); 
            setTimeout(() => { const qrDiv = document.getElementById('donationQrCode'); if (qrDiv) { qrDiv.innerHTML = ''; new QRCode(qrDiv, { text: TON_ADDRESS, width: 200, height: 200 }); } }, 100); 
            document.getElementById('submitDonationBtn')?.addEventListener('click', () => { 
                const txid = document.getElementById('donationTxid')?.value.trim(); 
                const comment = document.getElementById('donationComment')?.value.trim(); 
                if (!txid) { showNotification('Введите TXID транзакции', 'error'); return; } 
                if (!comment || !comment.startsWith('@')) { showNotification('Укажите ваш юзернейм с @ в комментарии', 'error'); return; } 
                const requestId = generateId(); 
                if (!App.donationRequests) App.donationRequests = {};
                App.donationRequests[requestId] = { id: requestId, user: App.currentUser, username: comment, yc: pack.yc, ton: pack.ton, txid: txid, status: 'pending', createdAt: Date.now(), giftEmoji: pack.giftEmoji || null, statusType: pack.status || null }; 
                saveToFirebase(); 
                document.getElementById('donationModalOverlay')?.remove(); 
                showNotification(`✅ Заявка отправлена! Ожидайте начисления. ID: ${requestId.slice(-6)}`); 
            }); 
            document.getElementById('closeDonationModal')?.addEventListener('click', () => { document.getElementById('donationModalOverlay')?.remove(); }); 
        }
        
        window.confirmDonation = function(requestId) { 
            const request = App.donationRequests[requestId]; 
            if (!request || request.status !== 'pending') return; 
            const targetUser = request.user; 
            if (App.users[targetUser]) { 
                if (request.statusType) { 
                    App.users[targetUser].status = request.statusType; 
                    showNotification(`✨ СТАТУС ${request.statusType} активирован для ${request.username}! ✨`); 
                    updateUserInterface(); 
                    if (App.activeChat && App.activeChat !== 'saved' && !App.channels[App.activeChat]) { renderMessages(App.activeChat); updateChatList(); } 
                } else if (request.giftEmoji) { 
                    if (!App.users[targetUser].gifts) App.users[targetUser].gifts = []; 
                    App.users[targetUser].gifts.push(request.giftEmoji); 
                    showNotification(`✅ Подарок ${request.giftEmoji} отправлен ${request.username}`); 
                    updateUserInterface(); 
                } else { 
                    App.users[targetUser].stars = (App.users[targetUser].stars || 0) + request.yc; 
                    showNotification(`✅ Начислено ${request.yc} YC пользователю ${request.username}`); 
                    updateUserInterface(); 
                } 
                request.status = 'completed'; 
                request.completedAt = Date.now(); 
                saveToFirebase(); 
                if (!App.yolkChatMessages[targetUser]) App.yolkChatMessages[targetUser] = []; 
                let messageText = request.statusType ? `✨ Вы получили СТАТУС ${request.statusType} НАВСЕГДА! ✨` : (request.giftEmoji ? `🎁 Вам отправили подарок ${request.giftEmoji}!` : `✅ Пополнение баланса!\n💰 +${request.yc} YC\nСпасибо за поддержку!`); 
                App.yolkChatMessages[targetUser].push({ from: 'SYSTEM', text: messageText, time: Date.now() }); 
                saveToFirebase(); 
                if (App.currentUser === ADMIN_USER) { document.getElementById('adminModalOverlay')?.remove(); openAdminPanel(); } 
            } 
        };
        
        window.cancelDonation = function(requestId) { 
            if (!confirm('Вы уверены, что хотите отменить эту заявку?')) return; 
            const request = App.donationRequests[requestId]; 
            if (!request || request.status !== 'pending') return; 
            delete App.donationRequests[requestId]; 
            saveToFirebase(); 
            showNotification(`❌ Заявка отменена`); 
            if (App.currentUser === ADMIN_USER) { document.getElementById('adminModalOverlay')?.remove(); openAdminPanel(); } 
        };

        // ========== ОБНОВЛЕНИЕ СТАТУСА В ЧАТЕ ==========
        function updateChatHeaderStatus(username) { 
            if (App.channels[username]) return;
            const headerInfo = document.querySelector('.chat-header-info'); 
            if (!headerInfo) return; 
            const existingStatus = headerInfo.querySelector('.chat-user-status'); 
            if (existingStatus) existingStatus.remove(); 
            const existingStreak = headerInfo.querySelector('.streak-badge');
            if (existingStreak) existingStreak.remove();
            const existingNameStrong = headerInfo.querySelector('strong'); 
            if (existingNameStrong) { existingNameStrong.innerHTML = formatUserNameWithStatus(username) + (App.users[username]?.verified ? '<span class="verified-icon"></span>' : ''); } 
            const streak = getStreak(username);
            if (streak > 0) {
                const streakDiv = document.createElement('span');
                streakDiv.className = 'streak-badge';
                streakDiv.innerHTML = `🔥 ${streak}`;
                existingNameStrong?.appendChild(streakDiv);
            }
            if (username === 'saved' || username === 'yolk') return;
            const isOnline = isUserOnline(username); 
            const lastSeenText = formatLastSeen(App.users[username]?.lastSeen, username); 
            const statusDiv = document.createElement('div'); 
            statusDiv.className = 'chat-user-status' + (isOnline ? '' : ' offline'); 
            statusDiv.textContent = isOnline ? 'в сети' : `был(а) ${lastSeenText}`; 
            headerInfo.appendChild(statusDiv); 
        }

        // ========== РЕНДЕР И ОСНОВНЫЕ ФУНКЦИИ ==========
        function render() { 
            const root = document.getElementById('app'); 
            if (!App.dataLoaded) { root.innerHTML = '<div class="loading-screen"><div class="loading-spinner"></div></div>'; return; } 
            if (!App.currentUser) { root.innerHTML = renderAuth(); attachAuthEvents(); } 
            else { root.innerHTML = renderMain(); setTimeout(() => { attachMainEvents(); if (activeTab === 'chats') { if (App.activeChat) loadMessages(App.activeChat); updateChatList(); updateSidebarUser(); applyWallpaper(); } else { renderFeed(); } }, 100); } 
        }
        
        function renderAuth() { 
            return `<div class="auth-container"><div class="auth-box"><h2>Yolkapp</h2><div id="authForms"><div id="loginForm"><div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="loginUsername" type="text" placeholder="только англ буквы и цифры, 4-15 символов"></div><div class="input-group"><label>ПАРОЛЬ</label><input id="loginPassword" type="password" placeholder="только англ буквы и цифры"></div><button class="btn" id="loginBtn">ВОЙТИ</button></div><div class="auth-switch"><button class="btn btn-secondary" id="showRegisterBtn">СОЗДАТЬ</button></div></div><div id="registerForm" style="display: none;"><div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="regUsername" type="text" placeholder="только англ буквы и цифры, 4-15 символов"></div><div class="input-group"><label>ПАРОЛЬ</label><input id="regPassword" type="password" placeholder="только англ буквы и цифры"></div><button class="btn" id="registerBtn">СОЗДАТЬ</button><div class="auth-switch"><button class="btn btn-secondary" id="showLoginBtn">← НАЗАД</button></div></div><div id="authError" class="auth-error"></div></div></div>`; 
        }
        
        function attachAuthEvents() { 
            const loginForm = document.getElementById('loginForm'); 
            const regForm = document.getElementById('registerForm'); 
            const errorDiv = document.getElementById('authError'); 
            document.getElementById('showRegisterBtn')?.addEventListener('click', () => { loginForm.style.display = 'none'; regForm.style.display = 'block'; }); 
            document.getElementById('showLoginBtn')?.addEventListener('click', () => { regForm.style.display = 'none'; loginForm.style.display = 'block'; }); 
            document.getElementById('loginBtn')?.addEventListener('click', () => { 
                let username = document.getElementById('loginUsername').value.trim().toLowerCase(); 
                const pass = document.getElementById('loginPassword').value.trim(); 
                if (!isValidUsername(username)) { errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ И ЦИФРЫ, 4-15 СИМВОЛОВ'; return; } 
                const clean = '@' + username; 
                if (!App.users[clean] || App.users[clean].password !== pass) { errorDiv.innerText = '! НЕВЕРНЫЙ ЛОГИН ИЛИ ПАРОЛЬ'; return; } 
                const user = App.users[clean]; 
                function loginSuccess() { 
                    App.currentUser = clean; 
                    localStorage.setItem('yolk_current_user', clean); 
                    loadSavedMessages(); 
                    loadTapBalances(); 
                    loadYolkChatMessages(); 
                    loadStreaks(); 
                    loadPrivacySettings(); 
                    setupUserListener(clean); 
                    if (App.lastSeenInterval) clearInterval(App.lastSeenInterval); 
                    App.lastSeenInterval = setInterval(() => { updateLastSeen(clean); }, 30000); 
                    updateLastSeen(clean); 
                    render(); 
                } 
                if (user.twoFA) { 
                    send2FACode(clean); 
                    const modalHtml = `<div class="two-factor-screen" id="twoFactorScreen"><div class="two-factor-box"><h3>🔐 Двухфакторная аутентификация</h3><p>Код подтверждения отправлен в ваш личный чат <strong>YOLK</strong></p><input type="text" class="code-input" id="twoFactorCode" maxlength="6" placeholder="------" autofocus><button class="btn" id="verify2FABtn">ПОДТВЕРДИТЬ</button><div class="resend-link" id="resend2FACode">Отправить код повторно</div><div id="twoFactorError" class="auth-error"></div></div></div>`; 
                    document.body.insertAdjacentHTML('beforeend', modalHtml); 
                    document.getElementById('verify2FABtn').addEventListener('click', () => { 
                        const inputCode = document.getElementById('twoFactorCode').value.trim(); 
                        if (!inputCode) { document.getElementById('twoFactorError').textContent = 'Введите код'; return; } 
                        if (verify2FACode(clean, inputCode)) { document.getElementById('twoFactorScreen').remove(); loginSuccess(); } 
                        else { document.getElementById('twoFactorError').textContent = 'Неверный или истекший код'; } 
                    }); 
                    document.getElementById('resend2FACode').addEventListener('click', () => { send2FACode(clean); showNotification('Новый код отправлен в ваш личный чат YOLK', 'success'); }); 
                } else { loginSuccess(); } 
            }); 
            document.getElementById('registerBtn')?.addEventListener('click', () => { 
                let username = document.getElementById('regUsername').value.trim().toLowerCase(); 
                const pass = document.getElementById('regPassword').value.trim(); 
                if (!isValidUsername(username)) { errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ И ЦИФРЫ, 4-15 СИМВОЛОВ'; return; } 
                if (!pass) { errorDiv.innerText = '! ВВЕДИТЕ ПАРОЛЬ'; return; } 
                if (!/^[a-zA-Z0-9]+$/.test(pass)) { errorDiv.innerText = '! ПАРОЛЬ ТОЛЬКО АНГЛ БУКВЫ И ЦИФРЫ'; return; }
                const clean = '@' + username; 
                if (App.users[clean] || App.systemBots.includes(clean)) { errorDiv.innerText = '! УЖЕ ЕСТЬ'; return; } 
                const newUser = { password: pass, avatar: null, banner: null, stars: 0, gifts: [], nfts: [], bio: '', verified: false, status: null, age: 14, twoFA: false, lastSeen: Date.now(), chatWallpaper: '' }; 
                database.ref('users/' + clean).set(newUser).then(() => { 
                    App.users[clean] = newUser; 
                    App.currentUser = clean; 
                    App.savedMessages[clean] = []; 
                    saveSavedMessages(); 
                    localStorage.setItem('yolk_current_user', clean); 
                    saveToFirebase(); 
                    setupUserListener(clean); 
                    render(); 
                    showNotification('✅ Аккаунт создан!'); 
                }).catch((err) => { console.error('❌ Ошибка сохранения пользователя:', err); errorDiv.innerText = '! Ошибка сервера, попробуйте позже'; setTimeout(() => { errorDiv.innerText = ''; }, 3000); }); 
            }); 
        }
        
        function renderMain() { 
            const user = App.currentUser; 
            const userData = App.users[user] || {}; 
            const chatPartner = App.activeChat || 'saved'; 
            const isChannel = App.channels[chatPartner] ? true : false; 
            const isYolk = chatPartner === 'yolk'; 
            const isBotChat = App.systemBots.includes(chatPartner); 
            const canWrite = canUserMessage(user, chatPartner) || chatPartner === 'saved' || isChannel || isBotChat || chatPartner === 'yolk';
            const isSubscribed = isChannel && App.channels[chatPartner]?.subscribers?.includes(user);
            const isOwner = isChannel && App.channels[chatPartner]?.owner === user;
            const showInputArea = !isYolk && canWrite && !isChannel;
            
            const tabsHtml = `<div class="tabs" style="margin: 8px 16px 0 16px;"><div class="tab ${activeTab === 'chats' ? 'active' : ''}" data-tab="chats">ЧАТЫ</div><div class="tab ${activeTab === 'feed' ? 'active' : ''}" data-tab="feed">ЛЕНТА</div></div>`;
            
            if (activeTab === 'feed') {
                return `<div class="main-container" style="flex-direction: column;"><div class="chat-header"><div class="chat-header-info"><strong>Глобальная лента</strong></div></div>${tabsHtml}<div class="feed-container" id="feedContainer"></div></div>`;
            } else {
                return `<div class="main-container"><div class="sidebar ${App.sidebarOpen ? 'open' : ''}"><div class="user-profile" id="openProfileBtn"><div class="avatar">${userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : (user[1] ? user[1].toUpperCase() : '?')}</div><div><div class="username-display">${formatUserNameWithStatus(user)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div>${userData.age ? `<div class="age-badge">${userData.age} лет</div>` : ''}<div class="star-balance"><span class="yc-currency"></span> ${userData.stars || 0} YC</div></div></div><div class="search-add"><input type="text" placeholder="ПОИСК @юзернейм" id="searchUserInput"><button class="icon-btn" id="addUserBtn">+</button></div><div class="chats-list" id="chatsList"></div></div><div class="chat-area"><div class="chat-header"><div class="chat-header-info"><button class="back-btn ${window.innerWidth < 768 ? 'visible' : ''}" id="backBtn">←</button><strong>${isChannel ? formatUserNameWithStatus(chatPartner) : formatUserNameWithStatus(chatPartner === 'saved' ? 'ИЗБРАННОЕ' : (chatPartner === 'yolk' ? 'YOLK' : chatPartner))}${!isChannel && App.users[chatPartner]?.verified ? '<span class="verified-icon"></span>' : ''}</strong></div><div class="chat-actions">${chatPartner !== 'saved' && chatPartner !== 'yolk' && !isBotChat && !isChannel ? `<button class="tiny-btn" id="viewProfileBtn">ПРОФИЛЬ</button>` : ''}${isChannel ? `<button class="${isSubscribed ? 'unsubscribe-btn' : 'subscribe-btn'}" id="subscribeBtn">${isSubscribed ? 'ОТПИСАТЬСЯ' : 'ПОДПИСАТЬСЯ'}</button>` : ''}${chatPartner !== 'saved' && chatPartner !== 'yolk' && !isChannel && !App.systemBots.includes(chatPartner) && canWrite ? `<button class="tiny-btn" id="giftBtn">ПОДАРИТЬ</button>` : ''}</div></div><div class="messages-container" id="messageList"></div>${!isYolk ? (showInputArea ? `<div class="input-area"><input type="text" id="messageText" placeholder="${chatPartner === 'saved' ? 'ЗАМЕТКА...' : 'СООБЩЕНИЕ...'}" autofocus><label for="fileUpload" class="file-label">ФОТО</label><label for="videoUpload" class="file-label">ВИДЕО</label><input type="file" id="fileUpload" accept="image/*"><input type="file" id="videoUpload" accept="video/*"><button class="send-btn" id="sendMsgBtn">➤</button></div>` : (isChannel ? (isOwner ? `<div class="input-area"><input type="text" id="messageText" placeholder="ПОСТ..." autofocus><label for="fileUpload" class="file-label">ФОТО</label><label for="videoUpload" class="file-label">ВИДЕО</label><input type="file" id="fileUpload" accept="image/*"><input type="file" id="videoUpload" accept="video/*"><button class="send-btn" id="sendMsgBtn">➤</button></div>` : `<div class="input-area" style="justify-content:center; color:#888;"><small>Только владелец канала может писать</small></div>`) : `<div class="input-area" style="justify-content:center;"><div class="blocked-message">🔒 ЭТОМУ ЧЕЛОВЕКУ НЕЛЬЗЯ ПИСАТЬ</div></div>`)) : '<div class="input-area" style="justify-content:center; color:#888;"><small>Это системный чат, отправлять сообщения нельзя</small></div>'}</div></div>${tabsHtml}</div>`;
            }
        }
        
        function attachMainEvents() { 
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    const newTab = e.target.dataset.tab;
                    if (newTab === activeTab) return;
                    activeTab = newTab;
                    localStorage.setItem('yolk_active_tab', activeTab);
                    render();
                });
            });
            if (activeTab === 'chats') {
                const backBtn = document.getElementById('backBtn');
                if (backBtn) backBtn.addEventListener('click', () => { App.sidebarOpen = true; document.querySelector('.sidebar').classList.add('open'); });
                const openProfileBtn = document.getElementById('openProfileBtn');
                if (openProfileBtn) openProfileBtn.addEventListener('click', () => openProfileModal(App.currentUser));
                const viewProfileBtn = document.getElementById('viewProfileBtn');
                if (viewProfileBtn) viewProfileBtn.addEventListener('click', () => { if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'yolk' && !App.systemBots.includes(App.activeChat) && !App.channels[App.activeChat]) { openProfileModal(App.activeChat); } else if (App.channels[App.activeChat]) { openChannelModal(App.activeChat); } });
                const giftBtn = document.getElementById('giftBtn');
                if (giftBtn) giftBtn.addEventListener('click', openGiftMenu);
                const subscribeBtn = document.getElementById('subscribeBtn');
                if (subscribeBtn) subscribeBtn.addEventListener('click', toggleSubscribe);
                const sendBtn = document.getElementById('sendMsgBtn');
                if (sendBtn) sendBtn.addEventListener('click', sendMessage);
                const fileUpload = document.getElementById('fileUpload');
                const videoUpload = document.getElementById('videoUpload');
                if (fileUpload) fileUpload.addEventListener('change', handleFileSelect);
                if (videoUpload) videoUpload.addEventListener('change', handleVideoSelect);
                const addUserBtn = document.getElementById('addUserBtn');
                if (addUserBtn) addUserBtn.addEventListener('click', addUserBySearch);
                const messageText = document.getElementById('messageText');
                if (messageText) messageText.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
            } else if (activeTab === 'feed') {
                renderFeed();
            }
        }
        
        function sendMessage() { 
            const textInput = document.getElementById('messageText'); 
            const text = textInput ? textInput.value.trim() : ''; 
            if (!text && !App.tempPhoto && !App.tempVideo) { showNotification('Введите сообщение или выберите файл', 'error'); return; } 
            const from = App.currentUser; 
            const to = App.activeChat; 
            if (!to || to === 'yolk') { showNotification('Сюда нельзя писать', 'error'); return; } 
            if (!canUserMessage(from, to) && !App.channels[to]) { showNotification('Вы не можете писать этому пользователю', 'error'); return; } 
            if (App.channels[to] && App.channels[to].owner !== from) { showNotification('Только владелец канала может писать', 'error'); return; } 
            try { 
                let mediaData = null; 
                let isVideoMsg = false; 
                if (App.tempVideo) { mediaData = App.tempVideo; isVideoMsg = true; } 
                else if (App.tempPhoto) { mediaData = App.tempPhoto; } 
                const message = { from, text: text || '', time: Date.now(), photo: mediaData, gift: false, isVideo: isVideoMsg }; 
                if (to === 'saved') { 
                    if (!App.savedMessages[from]) App.savedMessages[from] = []; 
                    App.savedMessages[from].push(message); 
                    saveSavedMessages(); 
                    showNotification('Сохранено в избранное'); 
                    renderMessages('saved'); 
                    playHappySound(); 
                } else if (App.channels[to]) { 
                    if (!App.channels[to].messages) App.channels[to].messages = []; 
                    App.channels[to].messages.push(message); 
                    saveToFirebase(); 
                    renderMessages(to); 
                    playHappySound(); 
                } else if (App.systemBots.includes(to)) { 
                    // ботов нет
                } else { 
                    const chatId = [from, to].sort().join('_'); 
                    if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] }; 
                    App.chats[chatId].messages.push(message); 
                    saveToFirebase(); 
                    renderMessages(to); 
                    playHappySound(); 
                    updateStreak(to); 
                } 
                if (textInput) textInput.value = ''; 
                App.tempPhoto = null; 
                App.tempVideo = null; 
                const fileInput = document.getElementById('fileUpload'); 
                const videoInput = document.getElementById('videoUpload'); 
                if (fileInput) fileInput.value = ''; 
                if (videoInput) videoInput.value = ''; 
                updateChatList(); 
            } catch (error) { console.error('Ошибка отправки:', error); showNotification('Ошибка отправки', 'error'); } 
        }
        
        function renderMessages(chatPartner) { 
            const messagesContainer = document.getElementById('messageList'); 
            if (!messagesContainer) return; 
            let messages = []; 
            if (chatPartner === 'saved') messages = App.savedMessages[App.currentUser] || []; 
            else if (chatPartner === 'yolk') messages = App.yolkChatMessages[App.currentUser] || []; 
            else if (App.channels[chatPartner]) messages = App.channels[chatPartner].messages || []; 
            else { const chatId = [App.currentUser, chatPartner].sort().join('_'); const chat = App.chats[chatId]; messages = chat ? chat.messages : []; } 
            let html = ''; 
            if (messages && messages.length > 0) messages.forEach((msg, idx) => { html += renderMessage(msg, idx, App.currentUser, chatPartner); }); 
            else { 
                if (chatPartner === 'yolk') html = '<div style="text-align:center; color:#888; margin-top:20px; padding:20px;">Здесь будут приходить коды для входа</div>'; 
                else html = '<div style="text-align:center; color:#888; margin-top:20px; padding:20px;">Нет сообщений</div>'; 
            } 
            messagesContainer.innerHTML = html; 
            setTimeout(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 100); 
            if (!App.channels[chatPartner]) updateChatHeaderStatus(chatPartner); 
        }
        
        function renderMessage(msg, idx, currentUser, chatPartner) { 
            const isMe = msg.from === currentUser || (chatPartner === 'saved' && msg.from === currentUser); 
            const isChannel = App.channels[chatPartner] ? true : false; 
            const isGift = msg.gift ? true : false; 
            const isBotMsg = App.systemBots.includes(msg.from); 
            const isSystem = msg.from === 'SYSTEM'; 
            const fromUserStatusClass = getUserStatus(msg.from)?.class || ''; 
            let canDelete = false; 
            if (isChannel) canDelete = App.channels[chatPartner]?.owner === currentUser; 
            else if (chatPartner === 'saved') canDelete = true; 
            else if (chatPartner === 'yolk') canDelete = false; 
            else if (App.systemBots.includes(chatPartner)) canDelete = false; 
            else canDelete = isMe; 
            let mediaHtml = ''; 
            if (msg.photo) { 
                if (msg.isVideo) { mediaHtml = `<video controls class="media-preview"><source src="${msg.photo}" type="video/mp4"></video>`; } 
                else { mediaHtml = `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`; } 
            } 
            let messageText = msg.text || ''; 
            if (isGift && messageText.startsWith('🎁 ')) messageText = messageText.substring(2); 
            let buttonsHtml = ''; 
            if (isBotMsg && msg.buttons && msg.buttons.length > 0) buttonsHtml = `<div class="inline-buttons">${msg.buttons.map(btn => `<button class="inline-btn" onclick="window.sendBotCommand('${chatPartner}', '${btn}')">${btn}</button>`).join('')}</div>`; 
            const displayName = fromUserStatusClass ? `<span class="${fromUserStatusClass}">${msg.from}</span>` : msg.from; 
            const messageClass = isMe ? 'me' : ''; 
            return `<div class="message ${messageClass} ${isGift ? 'gift-message' : ''} ${isBotMsg ? 'bot-message' : ''} ${isSystem ? 'system-message' : ''}">${!isMe && !isSystem ? `<small><span class="message-username" onclick="window.openProfileModal('${msg.from}')">${displayName}${App.users[msg.from]?.verified ? '<span class="verified-icon"></span>' : ''}</span></small><br>` : ''}${isSystem ? `<small>🔔 СИСТЕМА</small><br>` : ''}<div class="message-text">${messageText}</div>${mediaHtml}${buttonsHtml}<div class="time">${new Date(msg.time).toLocaleTimeString().slice(0, 5)}</div>${canDelete ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">УДАЛИТЬ</button></div>` : ''}</div>`; 
        }

che.chats; if (cache.blocked) App.blocked = cache.blocked; if (cache.channels) App.channels = cache.channels; console.log('📦 Загружено из кэша:', Object.keys(App.users).length); } catch(e) { } } const savedUser = localStorage.getItem('yolk_current_user'); if (savedUser && App.users[savedUser]) { App.currentUser = savedUser; App.activeChat = localStorage.getItem('yolk_active_chat') || 'saved'; loadSavedMessages(); loadTapBalances(); loadYolkChatMessages(); loadStreaks(); loadPrivacySettings(); setupUserListener(App.currentUser); } App.dataLoaded = true; render(); }); } catch (error) { console.error('❌ Ошибка Firebase:', error); } }

        async function createFeedPost(text, mediaData, mediaType) {
            if (!isUserAdult(App.currentUser)) { showNotification('❌ Доступно только для пользователей 18+', 'error'); return false; }
            if (!text && !mediaData) { showNotification('Напишите текст или добавьте медиа', 'error'); return false; }
            if (text && text.length > 500) { showNotification('Текст не более 500 символов', 'error'); return false; }
            const postId = generateId();
            const post = {
                id: postId,
                author: App.currentUser,
                authorAge: App.users[App.currentUser].age || 14,
                text: text || '',
                media: mediaData ? { type: mediaType, url: mediaData } : null,
                timestamp: Date.now(),
                comments: []
            };
            try { await database.ref('feedPosts/' + postId).set(post); showNotification('✅ Пост опубликован'); return true; } catch (error) { console.error(error); showNotification('Ошибка публикации', 'error'); return false; }
        }
        
        async function deleteFeedPost(postId, postAuthor) {
            const currentUser = App.currentUser;
            if (currentUser !== postAuthor && currentUser !== ADMIN_USER) { showNotification('У вас нет прав на удаление', 'error'); return false; }
            if (confirm('🗑️ Удалить пост?')) { try { await database.ref('feedPosts/' + postId).remove(); showNotification('🗑️ Пост удален'); return true; } catch (error) { showNotification('Ошибка удаления', 'error'); return false; } }
            return false;
        }
        
        async function addCommentToPost(postId, commentText) {
            if (!isUserAdult(App.currentUser)) { showNotification('❌ Комментарии доступны только для пользователей 18+', 'error'); return false; }
            if (!commentText.trim()) return false;
            const comment = { author: App.currentUser, authorAge: App.users[App.currentUser].age || 14, text: commentText.trim(), timestamp: Date.now() };
            try { const postRef = database.ref('feedPosts/' + postId); const snapshot = await postRef.once('value'); const post = snapshot.val(); if (!post) return false; const comments = post.comments || []; comments.push(comment); await postRef.child('comments').set(comments); return true; } catch (error) { console.error(error); return false; }
        }
        
        async function loadInitialFeed() {
            feedPosts = [];
            feedLoading = false;
            feedHasMore = true;
            feedLastTimestamp = null;
            try {
                const query = database.ref('feedPosts').orderByChild('timestamp').limitToLast(10);
                const snapshot = await query.once('value');
                const items = [];
                snapshot.forEach(child => { items.push({ id: child.key, ...child.val() }); });
                items.sort((a,b) => b.timestamp - a.timestamp);
                feedPosts = items;
                if (items.length === 10) { feedHasMore = true; feedLastTimestamp = items[items.length-1].timestamp; }
                else { feedHasMore = false; }
                renderFeedPosts();
            } catch (error) { console.error(error); }
        }
        
        async function loadMoreFeed() {
            if (feedLoading || !feedHasMore) return; feedLoading = true;
            try {
                let query = database.ref('feedPosts').orderByChild('timestamp');
                if (feedLastTimestamp) { query = query.endAt(feedLastTimestamp - 1); }
                query = query.limitToLast(10);
                const snapshot = await query.once('value');
                const items = [];
                snapshot.forEach(child => { items.push({ id: child.key, ...child.val() }); });
                items.sort((a,b) => b.timestamp - a.timestamp);
                const existingIds = new Set(feedPosts.map(p => p.id));
                const newItems = items.filter(p => !existingIds.has(p.id));
                if (newItems.length > 0) {
                    feedPosts.push(...newItems);
                    feedPosts.sort((a,b) => b.timestamp - a.timestamp);
                    feedLastTimestamp = feedPosts[feedPosts.length-1]?.timestamp;
                }
                if (items.length < 10) feedHasMore = false;
                renderFeedPosts();
            } catch (error) { console.error(error); } finally { feedLoading = false; }
        }
        
        function setupFeedListener() {
            if (feedListener) feedListener.off();
            feedListener = database.ref('feedPosts').on('value', (snapshot) => {
                const items = [];
                snapshot.forEach(child => { items.push({ id: child.key, ...child.val() }); });
                items.sort((a,b) => b.timestamp - a.timestamp);
                feedPosts = items;
                renderFeedPosts();
                // после загрузки сбрасываем пагинацию
                feedHasMore = true;
                if (items.length === 10) feedLastTimestamp = items[items.length-1].timestamp;
                else feedHasMore = false;
            });
        }
        
        function renderFeed() {
            const container = document.getElementById('feedContainer'); if (!container) return;
            const isAdult = isUserAdult(App.currentUser);
            let createFormHtml = '';
            if (isAdult) {
                createFormHtml = `<div class="feed-form"><textarea id="feedPostText" placeholder="Что нового? (макс 500 символов)" maxlength="500" rows="3"></textarea><div class="feed-media-buttons"><label class="feed-media-upload" for="feedPhotoInput">ФОТО</label><label class="feed-media-upload" for="feedVideoInput">ВИДЕО</label><input type="file" id="feedPhotoInput" accept="image/*" style="display:none"><input type="file" id="feedVideoInput" accept="video/*" style="display:none"></div><div id="feedMediaPreview" class="feed-media-preview"></div><button class="profile-btn" id="publishFeedBtn">Опубликовать</button></div>`;
            } else {
                createFormHtml = `<div class="feed-age-warning">🔞 Лента доступна только для пользователей 18+</div>`;
            }
            container.innerHTML = createFormHtml + `<div id="feedPostsList"></div>`;
            if (isAdult) {
                let tempMediaData = null, tempMediaType = null;
                const photoInput = document.getElementById('feedPhotoInput'), videoInput = document.getElementById('feedVideoInput'), previewDiv = document.getElementById('feedMediaPreview');
                photoInput.addEventListener('change', (e) => { const file = e.target.files[0]; if (!file) return; compressImage(URL.createObjectURL(file), 800, 800, 0.7, (compressed) => { tempMediaData = compressed; tempMediaType = 'image'; previewDiv.innerHTML = `<img src="${compressed}" style="max-width:100%; max-height:200px; border-radius:12px;">`; previewDiv.style.display = 'block'; }); });
                videoInput.addEventListener('change', (e) => { const file = e.target.files[0]; if (!file) return; if (file.size > 20 * 1024 * 1024) { showNotification('Видео не более 20 МБ', 'error'); return; } const reader = new FileReader(); reader.onload = (ev) => { tempMediaData = ev.target.result; tempMediaType = 'video'; previewDiv.innerHTML = `<video controls style="max-width:100%; max-height:200px;"><source src="${tempMediaData}" type="video/mp4"></video>`; previewDiv.style.display = 'block'; }; reader.readAsDataURL(file); });
                document.getElementById('publishFeedBtn').addEventListener('click', async () => { const text = document.getElementById('feedPostText').value.trim(); if (!text && !tempMediaData) { showNotification('Напишите текст или добавьте медиа', 'error'); return; } await createFeedPost(text, tempMediaData, tempMediaType); document.getElementById('feedPostText').value = ''; tempMediaData = null; tempMediaType = null; previewDiv.innerHTML = ''; previewDiv.style.display = 'none'; photoInput.value = ''; videoInput.value = ''; });
            }
            if (!feedListener) setupFeedListener();
            loadInitialFeed(); // всегда загружаем свежие данные
            const feedContainerDiv = container;
            feedContainerDiv.addEventListener('scroll', () => { if (feedContainerDiv.scrollTop + feedContainerDiv.clientHeight >= feedContainerDiv.scrollHeight - 100) { loadMoreFeed(); } });
        }
        
        function renderFeedPosts() {
            const postsList = document.getElementById('feedPostsList'); if (!postsList) return;
            if (feedPosts.length === 0) { postsList.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">Пока нет постов. Будьте первым!</div>'; return; }
            const isAdult = isUserAdult(App.currentUser);
            let html = '';
            feedPosts.forEach(post => {
                const authorData = App.users[post.author] || { avatar: null, verified: false };
                const avatarHtml = authorData.avatar ? `<img src="${authorData.avatar}">` : (post.author[1] || '@');
                const statusClass = getUserStatus(post.author)?.class || '';
                const verifiedBadge = authorData.verified ? '<span class="verified-icon"></span>' : '';
                const timeAgo = formatTimeAgo(post.timestamp);
                const commentsCount = post.comments ? post.comments.length : 0;
                const canDelete = (post.author === App.currentUser || App.currentUser === ADMIN_USER);
                let mediaHtml = '';
                if (post.media) {
                    if (post.media.type === 'image') mediaHtml = `<img src="${post.media.url}" class="feed-media" onclick="window.openImageModal('${post.media.url}')">`;
                    else if (post.media.type === 'video') mediaHtml = `<video controls class="feed-media"><source src="${post.media.url}" type="video/mp4"></video>`;
                }
                html += `<div class="feed-post" data-post-id="${post.id}"><div class="feed-post-header"><div class="feed-avatar" onclick="openProfileModal('${post.author}')">${avatarHtml}</div><div class="feed-author"><div class="feed-author-name" onclick="openProfileModal('${post.author}')"><span class="${statusClass}">${post.author}</span>${verifiedBadge}</div><div class="feed-time">${timeAgo}</div></div>${canDelete ? `<button class="feed-delete-btn" onclick="window.deleteFeedPost('${post.id}', '${post.author}')">🗑️</button>` : ''}</div><div class="feed-text">${escapeHtml(post.text)}</div>${mediaHtml}<div class="feed-actions"><button class="feed-comment-btn" onclick="window.openCommentsModal('${post.id}')">💬 <span>${commentsCount}</span></button></div></div>`;
            });
            postsList.innerHTML = html;
            if (!isAdult) { document.querySelectorAll('.feed-comment-btn').forEach(btn => { btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; }); }
        }
        
        function formatTimeAgo(timestamp) { const seconds = Math.floor((Date.now() - timestamp) / 1000); if (seconds < 60) return `${seconds} сек назад`; const minutes = Math.floor(seconds / 60); if (minutes < 60) return `${minutes} мин назад`; const hours = Math.floor(minutes / 60); if (hours < 24) return `${hours} ч назад`; const days = Math.floor(hours / 24); return `${days} дн назад`; }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
        
        window.deleteFeedPost = async function(postId, author) { await deleteFeedPost(postId, author); };
        window.openCommentsModal = function(postId) {
            const post = feedPosts.find(p => p.id === postId); if (!post) return;
            const isAdult = isUserAdult(App.currentUser);
            let commentsHtml = '';
            if (post.comments && post.comments.length) { commentsHtml = post.comments.map(com => `<div class="comment-item"><div class="comment-author" onclick="openProfileModal('${com.author}')">${com.author}</div><div class="comment-text">${escapeHtml(com.text)}</div><div class="comment-time">${formatTimeAgo(com.timestamp)}</div></div>`).join(''); } else { commentsHtml = '<div style="text-align:center; color:#888;">Нет комментариев</div>'; }
            const modalHtml = `<div class="modal-overlay" id="commentsModal"><div class="profile-modal" style="max-width: 500px;"><h3>💬 Комментарии</h3><div class="feed-post" style="margin-bottom:16px;"><div class="feed-post-header"><div class="feed-avatar" onclick="openProfileModal('${post.author}')">${App.users[post.author]?.avatar ? `<img src="${App.users[post.author].avatar}">` : (post.author[1] || '@')}</div><div class="feed-author"><div class="feed-author-name" onclick="openProfileModal('${post.author}')">${post.author}</div><div class="feed-time">${formatTimeAgo(post.timestamp)}</div></div></div><div class="feed-text">${escapeHtml(post.text)}</div>${post.media ? (post.media.type === 'image' ? `<img src="${post.media.url}" class="feed-media" style="max-width:100%;">` : `<video controls style="max-width:100%;"><source src="${post.media.url}"></video>`) : ''}</div><div class="comment-list">${commentsHtml}</div>${isAdult ? `<div class="input-group"><textarea id="newCommentText" placeholder="Ваш комментарий..." rows="2" style="width:100%; background:rgba(0,0,0,0.5); border-radius:12px; padding:8px; color:#fff;"></textarea><button class="profile-btn" id="submitCommentBtn">Отправить</button></div>` : '<div class="feed-age-warning">🔞 Только для 18+</div>'}<div class="profile-actions"><button class="profile-btn secondary" id="closeCommentsModal">Закрыть</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            if (isAdult) { 
                document.getElementById('submitCommentBtn').addEventListener('click', async () => { 
                    const commentText = document.getElementById('newCommentText').value.trim(); 
                    if (!commentText) return; 
                    const success = await addCommentToPost(postId, commentText); 
                    if (success) { 
                        document.getElementById('commentsModal').remove(); 
                        loadInitialFeed(); // обновляем ленту, чтобы показать новый комментарий
                    } 
                }); 
            }
            document.getElementById('closeCommentsModal').addEventListener('click', () => { document.getElementById('commentsModal').remove(); });
        };
        
        const savedTab = localStorage.getItem('yolk_active_tab'); if (savedTab === 'feed' || savedTab === 'chats') activeTab = savedTab;
        
        window.addEventListener('load', () => { initBots(); loadFromFirebase(); });
    </script>
</body>
</html>
