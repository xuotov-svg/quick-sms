ddEventListener('click', () => { document.getElementById('channelModalOverlay').remove(); }); } }
    function openGiftMenu() { const target = App.activeChat; if (!target || target === 'saved' || target === 'yolk' || App.channels[target]) { showNotification('Нельзя отправить подарок сюда', 'error'); return; } const gifts = App.users[App.currentUser].gifts || []; const nfts = App.users[App.currentUser].nfts || []; const hasNfts = nfts.length > 0; const giftList = gifts.map(g => `<div class="gift-item" onclick="window.sendGiftToUser('${target}', '${g}')">${g}</div>`).join(''); const nftListHtml = hasNfts ? `<div class="nft-collection" style="margin-top:10px;">${nfts.map((nft, idx) => { const canvas = document.createElement('canvas'); canvas.width = 32; canvas.height = 32; const ctx = canvas.getContext('2d'); for (let i = 0; i < 10; i++) for (let j = 0; j < 10; j++) ctx.fillStyle = nft.grid[i][j], ctx.fillRect(j * 3.2, i * 3.2, 3.2, 3.2); return `<div class="nft-item" data-nft-index="${idx}"><img src="${canvas.toDataURL()}" style="width:100%; height:100%; image-rendering: crisp-edges;"></div>`; }).join('')}</div>` : '<div>Нет открыток для подарка</div>'; const modalHtml = `<div class="modal-overlay" id="giftModalOverlay"><div class="profile-modal"><h3>🎁 ВЫБЕРИТЕ ПОДАРОК</h3><div class="tabs" style="margin-bottom:8px;"><div class="tab active" data-tab="emoji">ПОДАРКИ</div><div class="tab" data-tab="nft">ОТКРЫТКИ</div></div><div id="emojiTab" class="tab-content">${giftList || 'Нет подарков'}</div><div id="nftTab" class="tab-content hidden">${nftListHtml}</div><div class="profile-actions"><button class="profile-btn secondary" id="closeGiftModal">ОТМЕНА</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); tab.classList.add('active'); if (tab.dataset.tab === 'emoji') { document.getElementById('emojiTab').classList.remove('hidden'); document.getElementById('nftTab').classList.add('hidden'); } else { document.getElementById('emojiTab').classList.add('hidden'); document.getElementById('nftTab').classList.remove('hidden'); } }); }); if (hasNfts) { document.querySelectorAll('.nft-item').forEach(el => { el.addEventListener('click', (e) => { const idx = parseInt(el.dataset.nftIndex); const nft = nfts[idx]; if (!nft) return; const fromUser = App.currentUser; const toUser = target; App.users[fromUser].nfts.splice(idx, 1); if (!App.users[toUser].nfts) App.users[toUser].nfts = []; App.users[toUser].nfts.push(nft); saveToFirebase(); const chatId = [fromUser, toUser].sort().join('_'); if (!App.chats[chatId]) App.chats[chatId] = { user1: fromUser, user2: toUser, messages: [] }; App.chats[chatId].messages.push({ from: fromUser, text: `ПОДАРОК ОТКРЫТКА 🖼️ ОТ ${fromUser}`, time: Date.now(), gift: true, nftData: nft }); saveToFirebase(); showConfetti(); playHappySound(); if (App.activeChat === toUser) renderMessages(toUser); updateUserInterface(); document.getElementById('giftModalOverlay').remove(); showNotification(`Открытка подарена ${toUser}!`); }); }); } document.getElementById('closeGiftModal').addEventListener('click', () => { document.getElementById('giftModalOverlay').remove(); }); }
    window.sendGiftToUser = function(toUser, giftEmoji) { const fromUser = App.currentUser; const userGifts = [...(App.users[fromUser].gifts || [])]; const hasGift = userGifts.includes(giftEmoji); if (!hasGift) { showNotification('У вас нет такого подарка!', 'error'); return; } const indexToRemove = userGifts.indexOf(giftEmoji); if (indexToRemove !== -1) userGifts.splice(indexToRemove, 1); App.users[fromUser].gifts = userGifts; if (!App.users[toUser].gifts) App.users[toUser].gifts = []; App.users[toUser].gifts.push(giftEmoji); const chatId = ensureChat(fromUser, toUser); if (chatId && App.chats[chatId]) { App.chats[chatId].messages.push({ from: fromUser, text: `ПОДАРОК ${giftEmoji} ОТ ${fromUser}`, time: Date.now(), gift: true }); showConfetti(); playHappySound(); } saveToFirebase(); if (App.activeChat === toUser) renderMessages(toUser); updateUserInterface(); const giftModal = document.getElementById('giftModalOverlay'); if (giftModal) giftModal.remove(); showNotification(`Подарок ${giftEmoji} отправлен ${toUser}!`); };
    function openProfileModal(username) { const userData = { ...(App.users[username] || { avatar: null, banner: null, stars: 0, gifts: [], bio: '', verified: false, status: null, age: 14, nfts: [] }) }; const isOwn = (username === App.currentUser); const giftsList = (userData.gifts || []).map(g => `<div class="gift-item">${g}</div>`).join(''); const nftsList = (userData.nfts || []).map((nft, idx) => { const canvas = document.createElement('canvas'); canvas.width = 48; canvas.height = 48; const ctx = canvas.getContext('2d'); for (let i = 0; i < 10; i++) for (let j = 0; j < 10; j++) ctx.fillStyle = nft.grid[i][j], ctx.fillRect(j * 4.8, i * 4.8, 4.8, 4.8); return `<div class="nft-item"><img src="${canvas.toDataURL()}" style="width:100%; height:100%; image-rendering: crisp-edges;"></div>`; }).join(''); const modalHtml = `<div class="modal-overlay" id="profileModalOverlay"><div class="profile-modal"><h3>${isOwn ? 'МОЙ ПРОФИЛЬ' : 'ПРОФИЛЬ '+username}</h3><div class="profile-banner-wrapper"><div class="banner-container">${userData.banner ? `<img src="${userData.banner}" class="banner-image">` : '<div class="banner-placeholder">Нет баннера</div>'}</div><div class="profile-avatar-overlay"><div class="avatar-large">${userData.avatar ? `<img src="${userData.avatar}">` : '🍳'}</div></div></div><div class="profile-name-section"><div class="username-display" style="font-size:20px;">${formatUserNameWithStatus(username)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div></div><div class="profile-input-group"><label>ОПИСАНИЕ</label><div>${userData.bio || '—'}</div></div><div class="profile-input-group"><label>ВОЗРАСТ</label><div>${userData.age || 14} лет</div></div><div class="profile-input-group"><span class="currency-label">ВАЛЮТА</span><div class="star-balance-large"><span class="yc-currency"></span> ${userData.stars || 0} YC</div></div><div class="profile-input-group"><label>ПОДАРКИ</label><div class="gifts-collection">${giftsList || 'НЕТ ПОДАРКОВ'}</div></div><div class="profile-input-group"><label>ОТКРЫТКИ</label><div class="nft-collection">${nftsList || 'НЕТ ОТКРЫТОК'}</div></div><div class="profile-actions"><button class="profile-btn secondary" id="closeProfileModalBtn">ЗАКРЫТЬ</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); document.getElementById('closeProfileModalBtn').addEventListener('click', () => { document.getElementById('profileModalOverlay').remove(); }); if (isOwn && App.currentUser === ADMIN_USER) { setTimeout(() => { const adminBtn = document.createElement('button'); adminBtn.className = 'profile-btn'; adminBtn.style.background = '#ff9800'; adminBtn.style.color = '#000000'; adminBtn.textContent = '👑 АДМИН-ПАНЕЛЬ'; adminBtn.onclick = () => { document.getElementById('profileModalOverlay')?.remove(); openAdminPanel(); }; const actionsDiv = document.querySelector('#profileModalOverlay .profile-actions'); if (actionsDiv && !document.querySelector('#adminPanelBtn')) { adminBtn.id = 'adminPanelBtn'; actionsDiv.insertBefore(adminBtn, actionsDiv.firstChild); } }, 100); } }
    function openAdminPanel() { const usersList = Object.keys(App.users).filter(u => !App.systemBots.includes(u)); const giftsList = ['🔥', '🌊', '🍭', '🍬', '🥚', '🍳']; const statusList = ['GOLD', 'RUBY', 'EMERALD', 'AMETHYST']; const modalHtml = `<div class="modal-overlay" id="adminModalOverlay"><div class="profile-modal" style="max-width: 500px;"><h3>👑 АДМИН-ПАНЕЛЬ (@durov)</h3><div class="admin-give-form"><h4>🎁 ВЫДАТЬ ПРЕДМЕТ</h4><div class="input-group"><label>ПОЛЬЗОВАТЕЛЬ</label><select id="adminTargetUser"><option value="">Выберите пользователя</option>${usersList.map(u => `<option value="${u}">${u}</option>`).join('')}</select></div><div class="input-group"><label>ТИП ПРЕДМЕТА</label><select id="adminItemType"><option value="yc">YC (валюта)</option><option value="gift">Подарок (эмодзи)</option><option value="status">СТАТУС</option><option value="verified">VERIFIED СТАТУС</option></select></div><div id="adminYcAmount" class="input-group"><label>КОЛИЧЕСТВО YC</label><input type="number" id="adminYcValue" value="100" min="1"></div><div id="adminGiftSelect" class="input-group hidden"><label>ВЫБЕРИТЕ ПОДАРОК</label><select id="adminGiftValue">${giftsList.map(g => `<option value="${g}">${g}</option>`).join('')}</select></div><div id="adminStatusSelect" class="input-group hidden"><label>ВЫБЕРИТЕ СТАТУС</label><select id="adminStatusValue">${statusList.map(s => `<option value="${s}">${s}</option>`).join('')}</select></div><button class="profile-btn" id="adminGiveBtn">✅ ВЫДАТЬ</button></div><div class="profile-actions"><button class="profile-btn secondary" id="closeAdminModal">ЗАКРЫТЬ</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); const itemType = document.getElementById('adminItemType'); const ycDiv = document.getElementById('adminYcAmount'); const giftDiv = document.getElementById('adminGiftSelect'); const statusDiv = document.getElementById('adminStatusSelect'); itemType.addEventListener('change', () => { ycDiv.classList.add('hidden'); giftDiv.classList.add('hidden'); statusDiv.classList.add('hidden'); if (itemType.value === 'yc') ycDiv.classList.remove('hidden'); else if (itemType.value === 'gift') giftDiv.classList.remove('hidden'); else if (itemType.value === 'status') statusDiv.classList.remove('hidden'); }); document.getElementById('adminGiveBtn').addEventListener('click', () => { const targetUser = document.getElementById('adminTargetUser').value; const type = document.getElementById('adminItemType').value; if (!targetUser) { showNotification('Выберите пользователя', 'error'); return; } if (!App.users[targetUser]) { showNotification('Пользователь не найден', 'error'); return; } if (type === 'yc') { const amount = parseInt(document.getElementById('adminYcValue').value); if (isNaN(amount) || amount <= 0) { showNotification('Введите корректное количество YC', 'error'); return; } App.users[targetUser].stars = (App.users[targetUser].stars || 0) + amount; showNotification(`✅ Выдано ${amount} YC пользователю ${targetUser}`); } else if (type === 'gift') { const gift = document.getElementById('adminGiftValue').value; if (!App.users[targetUser].gifts) App.users[targetUser].gifts = []; App.users[targetUser].gifts.push(gift); showNotification(`✅ Выдан подарок ${gift} пользователю ${targetUser}`); } else if (type === 'status') { const status = document.getElementById('adminStatusValue').value; App.users[targetUser].status = status; showNotification(`✨ СТАТУС ${status} выдан пользователю ${targetUser}! ✨`); updateUserInterface(); if (App.activeChat && App.activeChat !== 'saved' && !App.channels[App.activeChat]) renderMessages(App.activeChat); updateChatList(); } else if (type === 'verified') { App.users[targetUser].verified = true; showNotification(`✅ VERIFIED СТАТУС выдан пользователю ${targetUser}!`); updateUserInterface(); if (App.activeChat && App.activeChat !== 'saved' && !App.channels[App.activeChat]) renderMessages(App.activeChat); updateChatList(); } saveToFirebase(); updateUserInterface(); document.getElementById('adminModalOverlay').remove(); }); document.getElementById('closeAdminModal').addEventListener('click', () => { document.getElementById('adminModalOverlay').remove(); }); }
    function playHappySound() { if (!App.soundEnabled) return; try { if (!App.audioCtx) { App.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); App.audioCtx.resume(); } const ctx = App.audioCtx; const now = ctx.currentTime; const osc1 = ctx.createOscillator(); const gain = ctx.createGain(); osc1.connect(gain); gain.connect(ctx.destination); gain.gain.value = 0.2; osc1.frequency.value = 880; osc1.start(); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3); osc1.stop(now + 0.3); } catch(e) { } }
    function showConfetti() { const confettiDiv = document.createElement('div'); confettiDiv.className = 'confetti'; for (let i = 0; i < 50; i++) { const piece = document.createElement('div'); piece.className = 'confetti-piece'; piece.style.left = Math.random() * 100 + '%'; piece.style.animationDelay = Math.random() * 2 + 's'; piece.style.background = ['#ffd700', '#ffb347', '#ff8c00', '#d4af37'][Math.floor(Math.random() * 4)]; confettiDiv.appendChild(piece); } document.body.appendChild(confettiDiv); setTimeout(() => confettiDiv.remove(), 3000); }

    // ========== РЕНДЕР ОСНОВНОГО ИНТЕРФЕЙСА ==========
    function render() { const root = document.getElementById('app'); if (!App.dataLoaded) { root.innerHTML = '<div class="loading-screen"><div class="loading-spinner"></div></div>'; return; } if (!App.currentUser) { root.innerHTML = renderAuth(); attachAuthEvents(); return; } root.innerHTML = `<div class="main-nav"><button class="nav-btn ${currentView==='chats'?'active':''}" data-view="chats">ЧАТЫ</button><button class="nav-btn ${currentView==='feed'?'active':''}" data-view="feed">ЛЕНТА</button></div><div id="chatsPanel" class="main-container" style="flex:1; ${currentView!=='chats'?'display:none':''}"><div class="sidebar ${App.sidebarOpen?'open':''}"><div class="user-profile" id="openProfileBtn"><div class="avatar">${App.users[App.currentUser]?.avatar?`<img src="${App.users[App.currentUser].avatar}" class="avatar-img">`:(App.currentUser[1]||'?')}</div><div><div class="username-display">${formatUserNameWithStatus(App.currentUser)}${App.users[App.currentUser]?.verified?'<span class="verified-icon"></span>':''}</div><div class="star-balance"><span class="yc-currency"></span> ${App.users[App.currentUser]?.stars||0} YC</div></div></div><div class="search-add"><input type="text" id="searchUserInput" placeholder="ПОИСК @юзернейм"><button class="icon-btn" id="addUserBtn">+</button></div><div class="chats-list" id="chatsList"></div></div><div class="chat-area"><div class="chat-header"><div class="chat-header-info"><button class="back-btn ${window.innerWidth<768?'visible':''}" id="backBtn">←</button><strong>${App.activeChat==='saved'?'ИЗБРАННОЕ':(App.activeChat||'Чат')}</strong></div><div class="chat-actions"><button class="tiny-btn" id="viewProfileBtn">👤</button><button class="tiny-btn" id="giftBtn">🎁</button></div></div><div class="messages-container" id="messageList"></div><div class="input-area"><input type="text" id="messageText" placeholder="СООБЩЕНИЕ..."><label for="fileUpload" class="file-label">📷</label><label for="videoUpload" class="file-label">🎥</label><input type="file" id="fileUpload" accept="image/*"><input type="file" id="videoUpload" accept="video/*"><button class="send-btn" id="sendMsgBtn">➤</button></div></div></div><div id="feedPanel" style="flex:1; display:flex; flex-direction:column; overflow:hidden; ${currentView!=='feed'?'display:none':''}"><div style="padding:12px; display:flex; gap:12px; align-items:center; justify-content:space-between;"><div class="feed-tabs" style="flex:1;"><button id="feedRecommendBtn" class="feed-tab active">РЕКОМЕНДАЦИИ</button><button id="feedMyPostsBtn" class="feed-tab">МОИ ПОСТЫ</button></div><button id="createPostBtn" style="background:var(--accent); border:none; padding:8px 16px; border-radius:30px; font-weight:bold; cursor:pointer; color:white;">+ НОВЫЙ ПОСТ</button></div><div id="feedContainer" class="feed-container"></div></div>`; attachNavEvents(); if(currentView === 'chats') { updateChatList(); if(App.activeChat) renderMessages(App.activeChat); else { App.activeChat = localStorage.getItem('yolk_active_chat') || 'saved'; renderMessages(App.activeChat); } attachChatEvents(); } else { renderFeed(currentFeedMode); document.getElementById('feedRecommendBtn')?.addEventListener('click',()=>{ document.getElementById('feedRecommendBtn').classList.add('active'); document.getElementById('feedMyPostsBtn').classList.remove('active'); renderFeed(false); }); document.getElementById('feedMyPostsBtn')?.addEventListener('click',()=>{ document.getElementById('feedMyPostsBtn').classList.add('active'); document.getElementById('feedRecommendBtn').classList.remove('active'); renderFeed(true); }); document.getElementById('createPostBtn')?.addEventListener('click', openCreatePostModal); } updateUserInterface(); }
    function attachNavEvents() { document.querySelectorAll('.nav-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ currentView = btn.dataset.view; render(); }); }); }

    // ========== АВТОРИЗАЦИЯ ==========
    function renderAuth() { return `<div class="auth-container"><div class="auth-box"><h2>Yolkapp · Чаты + Лента</h2><div id="loginForm"><div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="loginUsername" placeholder="только англ, 4-15"></div><div class="input-group"><label>ПАРОЛЬ</label><input id="loginPassword" type="password"></div><button class="btn" id="loginBtn">ВОЙТИ</button></div><div class="auth-switch"><button class="btn btn-secondary" id="showRegisterBtn">СОЗДАТЬ АККАУНТ</button></div><div id="registerForm" style="display:none;"><div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="regUsername"></div><div class="input-group"><label>ПАРОЛЬ</label><input id="regPassword" type="password"></div><button class="btn" id="registerBtn">СОЗДАТЬ</button><button class="btn btn-secondary" id="showLoginBtn">НАЗАД</button></div><div id="authError" class="auth-error"></div></div></div>`; }
    function attachAuthEvents() { document.getElementById('showRegisterBtn')?.addEventListener('click',()=>{ document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; }); document.getElementById('showLoginBtn')?.addEventListener('click',()=>{ document.getElementById('registerForm').style.display='none'; document.getElementById('loginForm').style.display='block'; }); document.getElementById('loginBtn')?.addEventListener('click',()=>{ let u=document.getElementById('loginUsername').value.trim().toLowerCase(); let p=document.getElementById('loginPassword').value.trim(); if(!isValidUsername(u)){ document.getElementById('authError').innerText='Неверный формат'; return; } let full='@'+u; if(App.users[full] && App.users[full].password===p){ App.currentUser=full; localStorage.setItem('yolk_current_user',full); App.activeChat=localStorage.getItem('yolk_active_chat')||'saved'; render(); } else document.getElementById('authError').innerText='Неверный логин/пароль'; }); document.getElementById('registerBtn')?.addEventListener('click',()=>{ let u=document.getElementById('regUsername').value.trim().toLowerCase(); let p=document.getElementById('regPassword').value.trim(); if(!isValidUsername(u)){ document.getElementById('authError').innerText='Только англ буквы/цифры 4-15'; return; } let full='@'+u; if(App.users[full]){ document.getElementById('authError').innerText='Уже существует'; return; } App.users[full]={ password:p, avatar:null, stars:100, gifts:[], nfts:[], bio:'', verified:false, status:null, age:14, twoFA:false, lastSeen:Date.now() }; saveToFirebase(); App.currentUser=full; localStorage.setItem('yolk_current_user',full); App.activeChat='saved'; render(); }); }

    // ========== ЗАГРУЗКА ИЗ FIREBASE ==========
    function loadFromFirebase() { database.ref().get().then(snap=>{ if(snap.exists()){ let d=snap.val(); if(d.users) App.users=d.users; if(d.chats) App.chats=d.chats; if(d.channels) App.channels=d.channels; if(d.feedPosts) App.feedPosts=d.feedPosts; if(d.tapBalances) App.tapBalances=d.tapBalances; if(d.tapUpgrades) App.tapUpgrades=d.tapUpgrades; if(d.yolkChatMessages) App.yolkChatMessages=d.yolkChatMessages; if(d.streaks) App.streaks=d.streaks; if(d.privacySettings) App.privacySettings=d.privacySettings; } if(!App.feedPosts) App.feedPosts=[]; let savedUser=localStorage.getItem('yolk_current_user'); if(savedUser && App.users[savedUser]) App.currentUser=savedUser; App.activeChat=localStorage.getItem('yolk_active_chat')||'saved'; App.dataLoaded=true; render(); }).catch(e=>{ console.warn(e); let cache=localStorage.getItem('yolk_cache'); if(cache){ let c=JSON.parse(cache); if(c.users) App.users=c.users; if(c.feedPosts) App.feedPosts=c.feedPosts; } App.dataLoaded=true; render(); }); }
    window.addEventListener('load', ()=>{ loadFromFirebase(); });
</script>
