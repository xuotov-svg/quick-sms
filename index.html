<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/yolk6767.jpg">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg: #0a0a0a;
            --bg-panel: #0f0f0f;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --soft: #1a1a1a;
            --border: #2a2a2a;
            --accent: #d4af37;
            --accent-soft: #2a2418;
            --message-me: #1e2a3a;
            --message-other: #1a1a1a;
            --header: #0a0a0a;
            --shadow: rgba(0,0,0,0.5);
            --danger: #ff4444;
            --success: #4CAF50;
            --input-bg: rgba(0,0,0,0.5);
            --glass-bg: rgba(10, 10, 15, 0.75);
            --glass-border: rgba(255, 255, 255, 0.10);
            --hover-bg: rgba(212, 175, 55, 0.18);
            --hover-border: rgba(212, 175, 55, 0.45);
        }
        
        body.light-theme {
            --bg: #ffffff;
            --bg-panel: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --soft: #e9ecef;
            --border: #dee2e6;
            --accent: #b8860b;
            --accent-soft: #fff3cd;
            --message-me: #e3f2fd;
            --message-other: #f1f3f4;
            --header: #ffffff;
            --shadow: rgba(0,0,0,0.08);
            --input-bg: rgba(0,0,0,0.03);
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(184, 134, 11, 0.10);
            --hover-border: rgba(184, 134, 11, 0.30);
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            padding: 0;
            margin: 0;
            transition: background 0.2s ease;
        }
        
        #app {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            background: var(--bg-panel);
            box-shadow: 0 0 30px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            position: relative;
            z-index: 1;
            transition: background 0.2s ease;
        }
        
        .chat-area,
        .sidebar,
        .chat-header,
        .input-area,
        .auth-box,
        .profile-modal,
        .message,
        .chat-item,
        .user-profile,
        .search-add,
        .two-factor-box,
        .feed-container,
        .post-card,
        .comments-modal {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        
        .chat-item:hover,
        .chat-item.active,
        .btn:hover,
        .icon-btn:hover,
        .send-btn:hover,
        .profile-btn:hover,
        .tab:hover,
        .tab.active,
        .nav-item:hover,
        .nav-item.active {
            background: var(--hover-bg);
            border-color: var(--hover-border);
            box-shadow: 0 0 24px rgba(212, 175, 55, 0.25);
        }
        
        .chat-area, .feed-container {
            background-color: transparent !important;
            position: relative;
        }
        
        body:not(.light-theme) .chat-area,
        body:not(.light-theme) .feed-container {
            background-color: #050505 !important;
        }
        
        body.light-theme .chat-area,
        body.light-theme .feed-container {
            background-color: #ffffff !important;
        }
        
        .verified-icon { display: none; }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: transparent;
            position: relative;
            z-index: 1;
        }
        
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--message-other);
            color: var(--text);
            align-self: flex-start;
            word-break: break-word;
            border: 1px solid var(--glass-border);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        
        .message.me {
            align-self: flex-end;
            background: var(--message-me);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .message-text { color: var(--text); }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; color: var(--text-secondary); }
        .message small { color: var(--text-secondary); }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--message-other);
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 8px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 13px;
        }
        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span {
            width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .loading-screen.hide { opacity: 0; pointer-events: none; }
        .loading-text { color: var(--text); font-size: 32px; font-weight: 500; letter-spacing: 4px; }
        .loading-dots { display: inline-block; }
        .loading-dots span {
            animation: dotPulse 1.4s ease-in-out infinite;
            display: inline-block;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
        }
        
        body.light-theme .icon-btn,
        body.light-theme .send-btn,
        body.light-theme .file-label,
        body.light-theme .tiny-btn,
        body.light-theme .inline-btn,
        body.light-theme .profile-btn,
        body.light-theme .subscribe-btn,
        body.light-theme .unsubscribe-btn,
        body.light-theme .like-btn,
        body.light-theme .dislike-btn,
        body.light-theme .settings-icon,
        body.light-theme .delete-chat-icon,
        body.light-theme .tab,
        body.light-theme .msg-actions button,
        body.light-theme .back-btn,
        body.light-theme .change-username-btn,
        body.light-theme .toggle-password,
        body.light-theme .resend-link,
        body.light-theme .close-btn,
        body.light-theme .nav-item,
        body.light-theme .post-like,
        body.light-theme .post-dislike,
        body.light-theme .post-comment,
        body.light-theme .post-delete,
        body.light-theme .create-post-btn,
        body.light-theme .feed-filter-btn {
            filter: none !important;
        }
        
        .icon-btn,
        .send-btn,
        .file-label,
        .tiny-btn,
        .inline-btn,
        .profile-btn,
        .subscribe-btn,
        .unsubscribe-btn,
        .like-btn,
        .dislike-btn,
        .settings-icon,
        .delete-chat-icon,
        .tab,
        .msg-actions button,
        .back-btn,
        .create-nft-btn,
        .change-username-btn,
        .toggle-password,
        .resend-link,
        .close-btn,
        .nav-item,
        .post-like,
        .post-dislike,
        .post-comment,
        .post-delete,
        .create-post-btn {
            transition: all 0.2s ease;
        }
        
        .icon-btn:hover,
        .send-btn:hover,
        .file-label:hover,
        .tiny-btn:hover,
        .inline-btn:hover,
        .profile-btn:hover,
        .btn:hover,
        .subscribe-btn:hover,
        .unsubscribe-btn:hover,
        .like-btn:hover,
        .dislike-btn:hover,
        .settings-icon:hover,
        .delete-chat-icon:hover,
        .tab:hover,
        .msg-actions button:hover,
        .nav-item:hover,
        .post-like:hover,
        .post-dislike:hover,
        .post-comment:hover,
        .post-delete:hover,
        .create-post-btn:hover {
            filter: brightness(1.05);
        }
        
        .tab.active,
        .btn:active,
        .icon-btn:active,
        .send-btn:active,
        .nav-item.active {
            color: var(--accent);
        }
        
        .profile-banner-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .banner-container { width: 100%; height: 150px; border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .banner-image { width: 100%; height: 100%; object-fit: cover; }
        .banner-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; }
        body.light-theme .banner-placeholder { background: #f0f0f0; color: #aaa; }
        body.light-theme .banner-container { background: #f0f0f0; }
        
        .profile-avatar-overlay { position: absolute; bottom: -40px; left: 20px; z-index: 10; }
        .profile-avatar-overlay .avatar-large { width: 100px; height: 100px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--text); overflow: hidden; box-shadow: 0 4px 20px var(--shadow); }
        body.light-theme .profile-avatar-overlay .avatar-large { background: #e0e0e0; }
        .profile-avatar-overlay .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-name-section { margin-top: 50px; padding-left: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 4px; }
        
        .settings-icon { cursor: pointer; font-size: 24px; padding: 8px; border-radius: 50%; transition: 0.2s; background: none; border: none; color: var(--text); }
        .settings-icon:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
        .settings-icon-img { width: 28px; height: 28px; object-fit: contain; cursor: pointer; }
        
        .toggle-switch { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle-switch .toggle-label { font-size: 14px; color: var(--text); }
        .toggle-switch .toggle-checkbox { width: 40px; height: 20px; background: #2a2a2a; border-radius: 20px; position: relative; transition: 0.2s; border: 1px solid var(--glass-border); }
        .toggle-switch .toggle-checkbox::after { content: ""; width: 16px; height: 16px; background: #ffffff; border-radius: 50%; position: absolute; top: 1px; left: 2px; transition: 0.2s; }
        .toggle-switch.active .toggle-checkbox { background: var(--accent); }
        .toggle-switch.active .toggle-checkbox::after { left: 20px; }
        
        .auth-container, .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .auth-container {
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0a 70%);
            justify-content: center;
            align-items: center;
        }
        .auth-box {
            max-width: 380px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(30px);
            padding: 36px 28px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            width: 92%;
            animation: fadeIn 0.4s ease;
            text-align: center;
        }
        .auth-box h2 {
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 30px;
            letter-spacing: 2px;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 13px; font-weight: 500; }
        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        
        .btn { background: var(--accent); color: #000000; border: none; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--glass-border); }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .auth-error { color: #ff6666; margin-top: 12px; font-size: 14px; text-align: center; font-weight: bold; }
        .auth-switch { margin-top: 20px; display: flex; gap: 10px; }
        
        .main-container { flex-direction: row; position: relative; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--glass-bg); position: relative; z-index: 5; width: 100%; }
        
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #6b7280; font-size: 24px; cursor: pointer; margin-right: 10px; display: none; width: 40px; height: 40px; border-radius: 12px; }
        .back-btn.visible { display: block; }
        .back-btn:hover { background: var(--hover-bg); }
        
        @media (min-width: 768px) { .sidebar { position: relative; transform: translateX(0); width: 300px; } .back-btn { display: none !important; } }
        
        .user-profile { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); background: var(--glass-bg); cursor: default; }
        .avatar { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text); font-weight: 500; overflow: hidden; flex-shrink: 0; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .username-display { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 2px; flex-wrap: wrap; }
        
        .search-add { padding: 12px; border-bottom: 1px solid var(--glass-border); display: flex; gap: 8px; background: var(--glass-bg); }
        .search-add input { flex: 1; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 15px; color: var(--text); outline: none; }
        .search-add input::placeholder { color: var(--text-secondary); }
        
        .icon-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--glass-border); color: #6b7280; width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: rgba(212, 175, 55, 0.3); }
        
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item { padding: 12px 16px; border-radius: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); background: var(--glass-bg); border: 1px solid var(--glass-border); transition: all 0.2s; }
        .chat-item:hover { background: var(--hover-bg); border-color: var(--hover-border); }
        .chat-item.active { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--accent); }
        
        .chat-avatar { width: 40px; height: 40px; background: rgba(212, 175, 55, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--glass-border); color: var(--text); }
        .chat-avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .delete-chat-icon { margin-left: auto; color: #6b7280; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; }
        .delete-chat-icon img { width: 20px; height: 20px; object-fit: contain; }
        .delete-chat-icon:hover { opacity: 0.8; }
        
        .chat-header { padding: 12px 16px; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .chat-header-info { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .chat-header-info strong { color: var(--text); font-size: 16px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .chat-user-status { font-size: 11px; color: #4CAF50; font-weight: normal; margin-top: 2px; }
        .chat-user-status.offline { color: #888; }
        
        .chat-actions { display: flex; gap: 8px; align-items: center; }
        .tiny-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #6b7280; font-weight: 500; }
        .tiny-btn:hover { background: rgba(212, 175, 55, 0.2); }
        
        .subscribe-btn { background: #DBBA00; border: none; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #000000; font-weight: 500; }
        .subscribe-btn:hover { filter: brightness(1.1); }
        .unsubscribe-btn { background: #818181; border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #ffffff; font-weight: 500; }
        .unsubscribe-btn:hover { background: #6a6a6a; }
        
        .system-message { background: rgba(40, 40, 45, 0.7); border: 1px solid var(--glass-border); color: #aaaaaa; font-style: italic; }
        
        .msg-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
        .msg-actions button { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #6b7280; cursor: pointer; font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 500; }
        .msg-actions button:hover { background: #ff4444; color: white; }
        
        .like-btn, .dislike-btn { background: none; border: none; cursor: pointer; font-size: 14px; color: #6b7280; display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 20px; transition: 0.2s; }
        .like-btn.liked, .dislike-btn.disliked { color: var(--accent); }
        .like-btn.liked { color: #4CAF50; }
        .dislike-btn.disliked { color: #ff6666; }
        .like-btn:hover, .dislike-btn:hover { background: rgba(212, 175, 55, 0.2); }
        
        .media-preview { max-width: 200px; max-height: 200px; border-radius: 12px; margin-top: 4px; border: 1px solid var(--glass-border); cursor: pointer; }
        video.media-preview { max-width: 200px; max-height: 200px; }
        
        .message-username { cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 2px; color: var(--accent); }
        .message-username:hover { text-decoration: underline; }
        
        .input-area { display: flex; gap: 8px; padding: 12px; background: var(--glass-bg); border-top: 1px solid var(--glass-border); align-items: center; flex-wrap: wrap; z-index: 2; position: relative; }
        .input-area input[type="text"] { flex: 2; min-width: 120px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 24px; padding: 12px 16px; color: var(--text); font-family: inherit; outline: none; font-size: 14px; }
        .input-area input[type="text"]::placeholder { color: var(--text-secondary); }
        .input-area input[type="file"] { display: none; }
        .file-label { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 8px 16px; border-radius: 24px; color: #6b7280; cursor: pointer; font-size: 14px; font-weight: 500; }
        .file-label:hover { background: rgba(212, 175, 55, 0.2); }
        .send-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--glass-border); width: 44px; height: 44px; border-radius: 50%; color: #6b7280; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .send-btn:hover { background: rgba(212, 175, 55, 0.3); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 3000; animation: fadeIn 0.2s ease; backdrop-filter: blur(8px); }

<body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function(){
            const SUPABASE_URL = 'https://hxzgckmnnjabahpmowdw.supabase.co';
            const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_KiD6FCtXOn47And5Wu3THA_AYuKNxtb';
            
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
                db: { schema: 'public' },
                realtime: { params: { eventsPerSecond: 10 } }
            });

            const App = { 
                users: {}, chats: {}, currentUser: null, activeChat: null, blocked: {}, sidebarOpen: false, dataLoaded: false,
                tempPhoto: null, tempVideo: null, tempAvatar: null, tempBanner: null, tempWallpaper: null,
                privacySettings: {}, posts: [], activeTab: 'feed', tempPostPhoto: null, tempPostVideo: null,
                typingTimeouts: {}, lastPostTime: {}, feedFilter: 'all', allPostsShuffled: [], allPostsIndex: 0,
                soundEnabled: true
            };
            App.systemBots = [];
            
            const ADMIN_USER = '@durov';
            const ICONS = {
                LIKE_OFF: 'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/a1%20(1).png',
                LIKE_ON: 'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/%D0%B02.png',
                COMMENT: 'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/a90UQ0sM4Rgn0HOlEUTZAYNmjCpfJhhqHxGE-YpNGsu36NbJmBWG6mYc7ldbIQqVgA7knkI2UYeEkhxYfE3Iyzfy.png',
                DELETE: 'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/HLq3zE1ksOa0lU7rN7AVF_yeYF80CczJ_Q-6OkO95XPsNnHcitq3vb5Hz0F_JXad_V64dfE8KrylYjRuK_DcNzdX.png',
                BADGE1: 'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/IMG_1542.png',
                BADGE2: 'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/IMG_1543.png'
            };
            const DEFAULT_AVATAR = 'https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/%D1%80%D1%80%D1%80.jpg';

            const STATE_ROW_ID = 1;
            async function loadAppState() {
                const { data, error } = await supabase
                    .from('app_state')
                    .select('data')
                    .eq('id', STATE_ROW_ID)
                    .single();
                if (error) { console.warn('Error loading state, creating new:', error); return null; }
                return data?.data || null;
            }
            
            async function saveAppState(stateData) {
                const { error } = await supabase
                    .from('app_state')
                    .upsert({ id: STATE_ROW_ID, data: stateData }, { onConflict: 'id' });
                if (error) console.error('Error saving state:', error);
            }
            
            function subscribeToAppState() {
                supabase
                    .channel('app_state_changes')
                    .on('postgres_changes', 
                        { event: '*', schema: 'public', table: 'app_state', filter: `id=eq.${STATE_ROW_ID}` },
                        async (payload) => {
                            const newData = payload.new?.data;
                            if (newData) {
                                if (newData.users) {
                                    App.users = newData.users;
                                    Object.keys(App.users).forEach(u => {
                                        if (!App.users[u].followers) App.users[u].followers = [];
                                        if (!App.users[u].following) App.users[u].following = [];
                                        if (!App.users[u].displayName) App.users[u].displayName = u.substring(1);
                                        if (!App.users[u].email) App.users[u].email = `${u.substring(1)}@yolkapp.com`;
                                    });
                                }
                                if (newData.chats) App.chats = newData.chats;
                                if (newData.blocked) App.blocked = newData.blocked;
                                if (newData.privacySettings) App.privacySettings = newData.privacySettings;
                                if (newData.posts) App.posts = newData.posts;
                                
                                localStorage.setItem('yolk_cache', JSON.stringify({
                                    users: App.users, chats: App.chats, blocked: App.blocked
                                }));
                                
                                if (App.currentUser) {
                                    updateUserInterface();
                                    updateSidebarUser();
                                    applyWallpaper();
                                    applyWallpaperToFeed();
                                    if (App.activeTab === 'chats' && App.activeChat) renderMessages(App.activeChat);
                                    if (App.activeTab === 'feed') initFeed();
                                    updateChatList();
                                }
                            }
                        })
                    .subscribe();
            }

            async function saveToSupabase() {
                if (!App.dataLoaded) return;
                const state = {
                    users: App.users,
                    chats: App.chats,
                    blocked: App.blocked,
                    privacySettings: App.privacySettings,
                    posts: App.posts
                };
                try {
                    await saveAppState(state);
                    localStorage.setItem('yolk_cache', JSON.stringify({
                        users: App.users, chats: App.chats, blocked: App.blocked
                    }));
                } catch (e) { console.error('Error saving to Supabase:', e); }
            }

            async function loadFromSupabase() {
                console.log('🔄 Loading data from Supabase...');
                try {
                    const state = await loadAppState();
                    if (state) {
                        if (state.users) {
                            App.users = state.users;
                            Object.keys(App.users).forEach(u => {
                                if (!App.users[u].followers) App.users[u].followers = [];
                                if (!App.users[u].following) App.users[u].following = [];
                                if (!App.users[u].displayName) App.users[u].displayName = u.substring(1);
                                if (!App.users[u].email) App.users[u].email = `${u.substring(1)}@yolkapp.com`;
                            });
                        }
                        if (state.chats) App.chats = state.chats;
                        if (state.blocked) App.blocked = state.blocked;
                        if (state.privacySettings) App.privacySettings = state.privacySettings;
                        if (state.posts) App.posts = state.posts;
                        
                        localStorage.setItem('yolk_cache', JSON.stringify({
                            users: App.users, chats: App.chats, blocked: App.blocked
                        }));
                        if (state.privacySettings) savePrivacySettings();
                    } else { console.warn('⚠️ Could not load data from Supabase. Using cache.'); }
                } catch (error) { console.error('❌ Supabase connection error:', error); }
                
                const cachedData = localStorage.getItem('yolk_cache');
                if (cachedData) {
                    try {
                        const cache = JSON.parse(cachedData);
                        if (cache.users) {
                            App.users = cache.users;
                            Object.keys(App.users).forEach(u => {
                                if (!App.users[u].followers) App.users[u].followers = [];
                                if (!App.users[u].following) App.users[u].following = [];
                                if (!App.users[u].displayName) App.users[u].displayName = u.substring(1);
                                if (!App.users[u].email) App.users[u].email = `${u.substring(1)}@yolkapp.com`;
                            });
                        }
                        if (cache.chats) App.chats = cache.chats;
                        if (cache.blocked) App.blocked = cache.blocked;
                        console.log('📦 Data loaded from local cache');
                    } catch(e) { console.error('Cache read error:', e); }
                }
                
                const savedUser = localStorage.getItem('yolk_current_user');
                const savedChat = localStorage.getItem('yolk_active_chat');
                const savedTab = localStorage.getItem('yolk_active_tab');
                
                if (savedUser && App.users[savedUser]) {
                    App.currentUser = savedUser;
                    App.activeTab = savedTab || 'feed';
                    App.activeChat = (savedChat && App.users[savedChat]) ? savedChat : null;
                    loadPrivacySettings();
                    if (App.lastSeenInterval) clearInterval(App.lastSeenInterval);
                    App.lastSeenInterval = setInterval(() => { updateLastSeen(App.currentUser); }, 30000);
                    updateLastSeen(App.currentUser);
                }
                App.dataLoaded = true;
                render();
            }

            function updateLastSeen(username) {
                if (App.users[username] && username === App.currentUser) {
                    App.users[username].lastSeen = Date.now();
                    saveToSupabase();
                }
            }

            let loadingStartTime = Date.now();
            const MIN_LOADING_TIME = 1000;
            
            function getUserBadge(username) {
                const user = App.users[username];
                if (!user) return null;
                if (user.badge === 2) return ICONS.BADGE2;
                if (user.badge === 1) return ICONS.BADGE1;
                return null;
            }

            function getDisplayName(username) {
                const user = App.users[username];
                if (!user) return username;
                if (user.displayName && user.displayName.trim().length > 0) return user.displayName.trim();
                return username.substring(1);
            }
            
            function formatUserNameWithBadge(username) {
                const display = getDisplayName(username);
                const badge = getUserBadge(username);
                let html = display;
                if (badge) html += ` <img src="${badge}" class="badge-icon">`;
                return html;
            }

            function applyTheme(theme) {
                if (theme === 'light') document.body.classList.add('light-theme');
                else document.body.classList.remove('light-theme');
                localStorage.setItem('yolk_theme', theme);
            }
            
            function loadTheme() {
                const savedTheme = localStorage.getItem('yolk_theme');
                applyTheme(savedTheme === 'light' ? 'light' : 'dark');
            }
            
            function canUserMessage(fromUser, toUser) {
                if (fromUser === toUser) return true;
                const privacy = App.privacySettings[toUser];
                if (!privacy || !privacy.blockNewMessages) return true;
                const chatId = [fromUser, toUser].sort().join('_');
                const chat = App.chats[chatId];
                return !!(chat && chat.messages && chat.messages.length > 0);
            }
            
            function updatePrivacySetting(value) {
                App.privacySettings[App.currentUser] = App.privacySettings[App.currentUser] || {};
                App.privacySettings[App.currentUser].blockNewMessages = value;
                savePrivacySettings();
                showNotification(value ? 'Enabled: new users cannot message first' : 'Disabled: everyone can message first');
            }
            
            function savePrivacySettings() {
                localStorage.setItem('yolk_privacy', JSON.stringify(App.privacySettings));
                if (App.dataLoaded) saveToSupabase();
            }
            
            function loadPrivacySettings() {
                const saved = localStorage.getItem('yolk_privacy');
                App.privacySettings = saved ? JSON.parse(saved) : {};
            }

            function sendTypingIndicator(toUser) {
                if (!toUser) return;
                const chatId = [App.currentUser, toUser].sort().join('_');
                if (App.typingTimeouts[chatId]) clearTimeout(App.typingTimeouts[chatId]);
                App.typingTimeouts[chatId] = setTimeout(() => {}, 2000);
            }

            function findMainUsername(inputUsername) {
                if (!inputUsername) return null;
                if (App.users[inputUsername]) return inputUsername;
                for (let mainName in App.users) {
                    if (App.users[mainName].additionalUsernames?.includes(inputUsername)) return mainName;
                }
                return null;
            }
            
            function isEmailTaken(email, excludeUsername = null) {
                if (!email) return false;
                const lowerEmail = email.toLowerCase();
                for (let username in App.users) {
                    if (excludeUsername && username === excludeUsername) continue;
                    if (App.users[username]?.email?.toLowerCase() === lowerEmail) return true;
                }
                return false;
            }
            
            function openProfileSettings() {
                const userData = App.users[App.currentUser];
                const followersCount = (userData.followers || []).length;
                const followingCount = (userData.following || []).length;
                const currentPrivacy = App.privacySettings[App.currentUser]?.blockNewMessages || false;
                const currentTheme = localStorage.getItem('yolk_theme') === 'light' ? 'light' : 'dark';
                
                let pendingTheme = currentTheme;
                let pendingPrivacy = currentPrivacy;
                let pendingDisplayName = userData.displayName || getDisplayName(App.currentUser);
                let pendingEmail = userData.email || `${App.currentUser.substring(1)}@yolkapp.com`;
                
                const modalHtml = `
                    <div class="modal-overlay" id="settingsModalOverlay">
                        <div class="profile-modal">
                            <h3>SETTINGS</h3>
                            <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 16px;">
                                <div class="avatar-large" style="width: 60px; height: 60px; font-size: 24px;">${userData.avatar ? `<img src="${userData.avatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : `<img src="${DEFAULT_AVATAR}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`}</div>
                                <div>
                                    <div style="font-weight: bold; font-size: 18px;">${formatUserNameWithBadge(App.currentUser)}</div>
                                    <div style="color: var(--text-secondary);">${followersCount} followers · ${followingCount} following</div>
                                </div>
                            </div>
                            <div class="profile-input-group"><label>USERNAME</label><input type="text" value="${App.currentUser}" readonly disabled style="background: rgba(0,0,0,0.2);"></div>

            function formatLastSeen(lastSeen) {

                if (minutes < 1) return 'just now';
                if (minutes < 5) return `${minutes} min ago`;
                if (minutes < 15) return '5 min ago';
                if (minutes < 30) return '15 min ago';
                if (minutes < 60) return '30 min ago';
                if (hours < 2) return '1 hour ago';
                if (hours < 5) return `${hours} hours ago`;
                if (hours < 24) return `${hours} hours ago`;

            function showNotification(message, type = 'success') { const n = document.createElement('div'); n.className = 'notification' + (type === 'error' ? ' error' : ''); n.textContent = message; document.body.appendChild(n); setTimeout(() => n.remove(), 3000); }
            function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) { const img = new Image(); img.onload = () => { let w = img.width, h = img.height; if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; } if (h > maxHeight) { w = (w * maxHeight) / h; h = maxHeight; } const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h); callback(canvas.toDataURL('image/jpeg', quality)); }; img.src = dataUrl; }
            function generateId() { return Date.now() + '_' + Math.random().toString(36).substr(2, 9); }

            function updateUserInterface() { updateSidebarUser(); applyWallpaper(); applyWallpaperToFeed(); }
            function ensureChat(a, b) { if (!a || !b || a === b) return; const id = [a, b].sort().join('_'); if (!App.chats[id]) { App.chats[id] = { user1: a, user2: b, messages: [] }; saveToSupabase(); } return id; }

            function isFollowing(a, b) { if (a === b) return false; ensureUserFollowData(a); ensureUserFollowData(b); return App.users[a].following.includes(b); }

            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {

                return array;
            }

                let postsToShow = [];

                    const text = document.getElementById('newCommentText').value.trim(); if (!text) return;
                    if (!post.comments) post.comments = [];
                    post.comments.push({ author: App.currentUser, text, time: Date.now() });
                    saveToSupabase(); document.getElementById('commentsModal').remove(); updatePostStats(id); showNotification('Comment added');
                });
                document.getElementById('closeCommentsModal').addEventListener('click', () => document.getElementById('commentsModal').remove());
                document.getElementById('commentsModal').addEventListener('click', (e) => { if (e.target.classList.contains('modal-overlay')) document.getElementById('commentsModal').remove(); });
            };
            window.deletePost = function(id) {
                if (!confirm('Delete post?')) return;
                const idx = App.posts.findIndex(p => p.id === id);
                if (idx !== -1 && (App.posts[idx].author === App.currentUser || App.currentUser === ADMIN_USER)) {
                    App.posts.splice(idx, 1); saveToSupabase(); initFeed(); showNotification('Post deleted');
                } else showNotification('Cannot delete', 'error');
            };
            window.toggleFeedSubscription = function(postId, author) {
                if (author === App.currentUser) return;
                const isSub = isFollowing(App.currentUser, author);
                if (isSub) unsubscribeFromUser(App.currentUser, author); else subscribeToUser(App.currentUser, author);
                document.querySelectorAll(`.post-card[data-post-id="${postId}"]`).forEach(card => {
                    const btn = card.querySelector('.subscribe-btn, .unsubscribe-btn');
                    if (btn) { btn.textContent = isSub ? 'FOLLOW' : 'UNFOLLOW'; btn.className = isSub ? 'subscribe-btn' : 'unsubscribe-btn'; }
                });
            };
            function canCreatePost() {
                const now = Date.now(), last = App.lastPostTime[App.currentUser] || 0;
                if (now - last < 180000) { showNotification('Next post in ' + Math.ceil((180000 - (now - last))/1000) + ' sec.', 'error'); return false; }
                return true;
            }
            function createPost(text, media, isVideo) {
                if (!text.trim() && !media) { showNotification('Write text or attach media', 'error'); return; }
                if (!canCreatePost()) return;
                const post = { id: generateId(), author: App.currentUser, text: text.trim(), media: media || null, isVideo: !!isVideo, time: Date.now(), likes: {}, dislikes: {}, comments: [] };
                App.posts.unshift(post); App.lastPostTime[App.currentUser] = Date.now();
                saveToSupabase(); initFeed(); showNotification('Post published!');
            }
            function openCreatePostModal() {
                const modalHtml = `<div class="modal-overlay" id="createPostModal"><div class="profile-modal"><h3>CREATE POST</h3><div class="profile-input-group"><label>TEXT</label><textarea id="postText" rows="3" placeholder="What's new?"></textarea></div><div class="profile-input-group"><label>ADD PHOTO/VIDEO</label><button class="change-file-btn" id="addPostMediaBtn">ADD</button><input type="file" id="postMediaFile" accept="image/*,video/*" style="display:none;"></div><div class="profile-actions"><button class="profile-btn" id="confirmCreatePostBtn">PUBLISH</button><button class="profile-btn secondary" id="closeCreatePostModal">CANCEL</button></div></div></div>`;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                let tempMedia = null, isVideo = false;
                document.getElementById('addPostMediaBtn').addEventListener('click', () => document.getElementById('postMediaFile').click());
                document.getElementById('postMediaFile').addEventListener('change', (e) => {
                    const file = e.target.files[0]; if (!file) return;
                    if (file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (ev) => compressImage(ev.target.result, 800, 800, 0.7, (compressed) => { tempMedia = compressed; isVideo = false; showNotification('Image added'); });
                        reader.readAsDataURL(file);
                    } else if (file.type.startsWith('video/')) {
                        if (file.size > 20*1024*1024) { showNotification('Video max 20 MB', 'error'); return; }
                        const reader = new FileReader();
                        reader.onload = (ev) => { tempMedia = ev.target.result; isVideo = true; showNotification('Video added'); };
                        reader.readAsDataURL(file);
                    }
                });
                document.getElementById('confirmCreatePostBtn').addEventListener('click', () => {
                    const text = document.getElementById('postText').value.trim();
                    if (!text && !tempMedia) { showNotification('Enter text or attach media', 'error'); return; }
                    createPost(text, tempMedia, isVideo); document.getElementById('createPostModal').remove();
                });
                document.getElementById('closeCreatePostModal').addEventListener('click', () => document.getElementById('createPostModal').remove());
            }

            function render() {
                const root = document.getElementById('app');
                if (!App.dataLoaded) { root.innerHTML = `<div class="loading-screen" id="loadingScreen"><div class="loading-text">YOLKAPP<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div></div></div>`; return; }
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    loadingScreen.classList.add('hide');
                    const remaining = Math.max(0, MIN_LOADING_TIME - (Date.now() - loadingStartTime));
                    setTimeout(() => {
                        if (!App.currentUser) { root.innerHTML = renderAuth(); attachAuthEvents(); }
                        else { root.innerHTML = renderMain(); setTimeout(() => { attachMainEvents(); if (App.activeTab === 'chats' && App.activeChat) renderMessages(App.activeChat); else if (App.activeTab === 'feed') initFeed(); updateChatList(); updateSidebarUser(); applyWallpaper(); applyWallpaperToFeed(); }, 100); }
                    }, remaining);
                } else {
                    if (!App.currentUser) { root.innerHTML = renderAuth(); attachAuthEvents(); }
                    else { root.innerHTML = renderMain(); setTimeout(() => { attachMainEvents(); if (App.activeTab === 'chats' && App.activeChat) renderMessages(App.activeChat); else if (App.activeTab === 'feed') initFeed(); updateChatList(); updateSidebarUser(); applyWallpaper(); applyWallpaperToFeed(); }, 100); }
                }
            }

            function renderAuth() {
                return `<div class="auth-container"><div class="auth-box"><h2>Yolkapp</h2><div class="auth-subtitle">Sign in to continue</div><div id="authForms"><div id="loginForm"><div class="input-group"><label>USERNAME</label><input id="loginUsername" type="text" placeholder="lowercase letters and digits, 4-15 chars"></div><div class="input-group"><label>EMAIL</label><input id="loginEmail" type="email" placeholder="example@mail.com"></div><div class="input-group"><label>PASSWORD</label><input id="loginPassword" type="password" placeholder="Latin letters and digits"></div><button class="btn" id="loginBtn">LOGIN</button></div><div class="auth-switch" id="showRegisterLink" style="cursor:pointer; color: var(--accent); font-weight: bold; text-align: center; margin-top: 20px;">Don't have an account? Sign up</div></div><div id="registerForm" style="display: none;"><div class="input-group"><label>USERNAME</label><input id="regUsername" type="text" placeholder="lowercase letters and digits, 4-15 chars"></div><div class="input-group"><label>EMAIL</label><input id="regEmail" type="email" placeholder="example@mail.com"></div><div class="input-group"><label>PASSWORD</label><input id="regPassword" type="password" placeholder="Latin letters and digits"></div><button class="btn" id="registerBtn">SIGN UP</button><div class="auth-switch"><button class="btn btn-secondary" id="showLoginBtn">← BACK</button></div></div><div id="authError" class="auth-error"></div></div></div>`;
            }

            function attachAuthEvents() {
                const errorDiv = document.getElementById('authError');
                document.getElementById('showRegisterLink')?.addEventListener('click', () => {
                    document.getElementById('loginForm').style.display='none';
                    document.getElementById('registerForm').style.display='block';
                });
                document.getElementById('showLoginBtn')?.addEventListener('click', () => { document.getElementById('registerForm').style.display='none'; document.getElementById('loginForm').style.display='block'; });
                document.getElementById('loginBtn')?.addEventListener('click', () => {
                    let username = document.getElementById('loginUsername').value.trim().toLowerCase();
                    const email = document.getElementById('loginEmail').value.trim(), pass = document.getElementById('loginPassword').value.trim();
                    if (!isValidUsername(username)) { errorDiv.innerText = '! Invalid username format'; return; }
                    if (!email || !/^\S+@\S+\.\S+$/.test(email)) { errorDiv.innerText = '! Enter a valid email'; return; }
                    const clean = '@' + username;
                    let main = findMainUsername(clean) || (App.users[clean] ? clean : null);
                    if (!main || !App.users[main] || App.users[main].password !== pass || (App.users[main].email && App.users[main].email.toLowerCase() !== email.toLowerCase())) { errorDiv.innerText = '! Invalid username, email or password'; return; }
                    App.currentUser = main; App.activeTab = 'feed'; App.activeChat = null;
                    localStorage.setItem('yolk_current_user', main); localStorage.setItem('yolk_active_tab', 'feed'); localStorage.removeItem('yolk_active_chat');
                    loadPrivacySettings();
                    if (App.lastSeenInterval) clearInterval(App.lastSeenInterval);
                    App.lastSeenInterval = setInterval(() => updateLastSeen(main), 30000); updateLastSeen(main);
                    render();
                });
                document.getElementById('registerBtn')?.addEventListener('click', () => {
                    let username = document.getElementById('regUsername').value.trim().toLowerCase();
                    const email = document.getElementById('regEmail').value.trim(), pass = document.getElementById('regPassword').value.trim();
                    if (!isValidUsername(username)) { errorDiv.innerText = '! Invalid username format'; return; }
                    if (!email || !/^\S+@\S+\.\S+$/.test(email)) { errorDiv.innerText = '! Enter a valid email'; return; }
                    if (!pass) { errorDiv.innerText = '! Enter password'; return; }
                    if (!isValidPassword(pass)) { errorDiv.innerText = '! Password must contain only Latin letters and digits'; return; }
                    const clean = '@' + username;
                    if (App.users[clean] || App.systemBots.includes(clean) || findMainUsername(clean)) { errorDiv.innerText = '! Username already taken'; return; }
                    if (isEmailTaken(email)) { errorDiv.innerText = '! Email already used'; return; }
                    const newUser = { password: pass, avatar: null, banner: null, badge: null, status: null, age: 14, lastSeen: Date.now(), chatWallpaper: '', followers: [], following: [], additionalUsernames: [], displayName: username, email: email };
                    App.users[clean] = newUser; App.currentUser = clean; App.activeTab = 'feed'; App.activeChat = null;
                    localStorage.setItem('yolk_current_user', clean); localStorage.setItem('yolk_active_tab', 'feed'); localStorage.removeItem('yolk_active_chat');
                    saveToSupabase().then(() => { render(); showNotification('✅ Account created!'); }).catch(() => { errorDiv.innerText = '! Server error, try later'; setTimeout(() => errorDiv.innerText = '', 3000); });
                });
            }

            function renderMain() {
                const user = App.currentUser, userData = App.users[user] || {};
                const isChatsActive = App.activeTab === 'chats';
                let blockedMessage = '';
                if (App.activeChat && !canUserMessage(user, App.activeChat)) blockedMessage = 'This user does not accept messages from strangers';
                const chatTitle = formatUserNameWithBadge(App.activeChat);
                const followersCount = (userData.followers || []).length, followingCount = (userData.following || []).length;
                return `
                    <div class="main-container">
                        ${isChatsActive ? `
                        <div class="sidebar ${App.sidebarOpen ? 'open' : ''}">
                            <div class="user-profile">
                                <div class="avatar">${userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : `<img src="${DEFAULT_AVATAR}" class="avatar-img">`}</div>
                                <div style="flex:1;"><div class="username-display">${formatUserNameWithBadge(user)}</div><div class="followers-info" style="font-size:12px; color: var(--text-secondary);">${followersCount} followers · ${followingCount} following</div></div>
                            </div>
                            <div class="search-add"><input type="text" placeholder="SEARCH @username" id="searchUserInput"><button class="icon-btn" id="addUserBtn">+</button></div>
                            <div class="chats-list" id="chatsList"></div>
                        </div>
                        <div class="chat-area">
                            <div class="chat-header"><div class="chat-header-info"><button class="back-btn ${window.innerWidth < 768 ? 'visible' : ''}" id="backBtn">←</button><strong>${chatTitle}</strong></div><div class="chat-actions"><button class="tiny-btn" id="viewProfileBtn">PROFILE</button></div></div>
                            <div class="messages-container" id="messageList"></div>
                            ${canUserMessage(user, App.activeChat) ? `<div class="input-area"><input type="text" id="messageText" placeholder="MESSAGE..." autofocus oninput="sendTypingIndicator('${App.activeChat}')"><label for="fileUpload" class="file-label">PHOTO</label><label for="videoUpload" class="file-label">VIDEO</label><input type="file" id="fileUpload" accept="image/*"><input type="file" id="videoUpload" accept="video/*"><button class="send-btn" id="sendMsgBtn">➤</button></div>` : `<div class="input-area" style="justify-content:center;"><div class="blocked-message">${blockedMessage}</div></div>`}
                        </div>
                        ` : `
                        <div class="feed-container">
                            <div class="feed-filters">
                                <button class="feed-filter-btn active" id="filterAllBtn">ALL POSTS</button>
                                <button class="feed-filter-btn" id="filterLikedBtn">LIKED POSTS</button>
                                <button class="feed-filter-btn" id="filterMyBtn">MY POSTS</button>
                            </div>
                            <div id="feedPostsContainer"></div>
                        </div>
                        <button class="create-post-btn" id="createPostBtn">+</button>
                        `}
                    </div>
                    <div class="bottom-nav">
                        <div class="nav-item ${App.activeTab === 'feed' ? 'active' : ''}" data-tab="feed"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v1.png" alt="Feed"></div>
                        <div class="nav-item ${App.activeTab === 'chats' ? 'active' : ''}" data-tab="chats"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v2.png" alt="Chats"></div>
                        <div class="nav-item" id="settingsTab"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v4.png" alt="Settings"></div>
                    </div>
                `;
            }

            function attachMainEvents() {
                document.getElementById('backBtn')?.addEventListener('click', () => { App.sidebarOpen = true; document.querySelector('.sidebar').classList.add('open'); });
                document.getElementById('viewProfileBtn')?.addEventListener('click', () => { if (App.activeChat) openProfileModal(App.activeChat); });
                document.getElementById('sendMsgBtn')?.addEventListener('click', sendMessage);
                document.getElementById('fileUpload')?.addEventListener('change', handleFileSelect);
                document.getElementById('videoUpload')?.addEventListener('change', handleVideoSelect);
                document.getElementById('addUserBtn')?.addEventListener('click', addUserBySearch);
                document.getElementById('messageText')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
                document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', (e) => {
                    const tab = item.dataset.tab;
                    if (tab === 'chats') { App.activeTab = 'chats'; localStorage.setItem('yolk_active_tab', 'chats'); if (window.innerWidth < 768) App.sidebarOpen = false; render(); }
                    else if (tab === 'feed') { App.activeTab = 'feed'; localStorage.setItem('yolk_active_tab', 'feed'); render(); setTimeout(() => initFeed(), 50); }
                }));
                document.getElementById('settingsTab')?.addEventListener('click', openProfileSettings);
                document.getElementById('createPostBtn')?.addEventListener('click', openCreatePostModal);
                
                document.getElementById('filterAllBtn')?.addEventListener('click', () => {
                    App.feedFilter = 'all';
                    initFeed();
                });
                document.getElementById('filterLikedBtn')?.addEventListener('click', () => {
                    App.feedFilter = 'liked';
                    initFeed();
                });
                document.getElementById('filterMyBtn')?.addEventListener('click', () => {
                    App.feedFilter = 'my';
                    initFeed();
                });
            }

            function sendMessage() { 
                const textInput = document.getElementById('messageText'); 
                const text = textInput ? textInput.value.trim() : ''; 
                if (!text && !App.tempPhoto && !App.tempVideo) { showNotification('Enter message or select file', 'error'); return; } 
                const from = App.currentUser; const to = App.activeChat; 
                if (!to) { showNotification('Select a chat', 'error'); return; } 
                if (!canUserMessage(from, to)) { showNotification('You cannot message this user', 'error'); return; } 
                try { 
                    let mediaData = null; let isVideoMsg = false; 
                    if (App.tempVideo) { mediaData = App.tempVideo; isVideoMsg = true; } 
                    else if (App.tempPhoto) { mediaData = App.tempPhoto; } 
                    const message = { from, text: text || '', time: Date.now(), photo: mediaData, isVideo: isVideoMsg, likes: {}, dislikes: {} };
                    const chatId = [from, to].sort().join('_'); 
                    if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] }; 
                    App.chats[chatId].messages.push(message); 
                    saveToSupabase(); renderMessages(to); playHappySound(); 
                    if (textInput) textInput.value = ''; App.tempPhoto = null; App.tempVideo = null; 
                    document.getElementById('fileUpload').value = ''; document.getElementById('videoUpload').value = ''; 
                    updateChatList(); 
                } catch (error) { console.error('Send error:', error); showNotification('Send error', 'error'); } 
            }

            function renderMessages(chatPartner) { 
                const container = document.getElementById('messageList'); if (!container) return; 
                const chatId = [App.currentUser, chatPartner].sort().join('_'); 
                const messages = (App.chats[chatId] && App.chats[chatId].messages) || []; 
                let html = ''; 
                if (messages.length) messages.forEach((msg, idx) => { html += renderMessage(msg, idx, App.currentUser, chatPartner); }); 
                else html = '<div style="text-align:center; color: var(--text-secondary); margin-top:20px;">No messages</div>'; 
                container.innerHTML = html; 
                setTimeout(() => { container.scrollTop = container.scrollHeight; }, 100); 
                updateChatHeaderStatus(chatPartner); 
            }

            function renderMessage(msg, idx, currentUser, chatPartner) { 
                const isMe = msg.from === currentUser; 
                const isSystem = msg.from === 'SYSTEM'; 
                const fromUserDisplay = isSystem ? 'SYSTEM' : formatUserNameWithBadge(msg.from);
                let canDelete = isMe; 
                let mediaHtml = ''; 
                if (msg.photo) { 
                    if (msg.isVideo) mediaHtml = `<video controls class="media-preview"><source src="${msg.photo}" type="video/mp4"></video>`; 
                    else mediaHtml = `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`; 
                } 
                const messageClass = isMe ? 'me' : ''; 
                const fullDate = new Date(msg.time).toLocaleString(); 
                return `<div class="message ${messageClass} ${isSystem ? 'system-message' : ''}">${!isMe && !isSystem ? `<small><span class="message-username" onclick="window.openProfileModal('${msg.from}')">${fromUserDisplay}</span></small><br>` : ''}${isSystem ? `<small>🔔 SYSTEM</small><br>` : ''}<div class="message-text">${msg.text || ''}</div>${mediaHtml}<div class="time">${fullDate}</div><div style="display: flex; justify-content: flex-end; margin-top: 4px;">${canDelete ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">DELETE</button></div>` : ''}</div></div>`; 
            }

            function updateChatList() { 
                const container = document.getElementById('chatsList'); if (!container || !App.currentUser) return; 
                const list = getChatListForUser(App.currentUser); 
                let html = ''; 
                list.forEach(chat => { html += renderChatItem(chat, chat === App.activeChat); }); 
                container.innerHTML = html; 
                document.querySelectorAll('.chat-item').forEach(el => { 
                    el.addEventListener('click', (e) => { 
                        if (e.target.closest('.delete-chat-icon')) return; 
                        const chatId = el.dataset.chat; 
                        if (App.activeChat === chatId) { if (window.innerWidth < 768) { App.sidebarOpen = false; document.querySelector('.sidebar').classList.remove('open'); } return; } 
                        App.activeChat = chatId; localStorage.setItem('yolk_active_chat', chatId); 
                        if (window.innerWidth < 768) { App.sidebarOpen = false; document.querySelector('.sidebar').classList.remove('open'); } 
                        document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); 
                        render(); 
                    }); 
                }); 
            }

            function renderChatItem(u, active) { 
                const display = formatUserNameWithBadge(u); 
                const avatarUrl = App.users[u]?.avatar; 
                const avatarHtml = avatarUrl ? `<div class="chat-avatar"><img src="${avatarUrl}" class="chat-avatar-img"></div>` : `<div class="chat-avatar"><img src="${DEFAULT_AVATAR}" class="chat-avatar-img"></div>`; 
                return `<div class="chat-item ${active ? 'active' : ''}" data-chat="${u}">${avatarHtml}<div style="flex:1;"><div class="username-display">${display}</div></div><span class="delete-chat-icon" onclick="window.deleteChat('${u}', event)"><img src="${ICONS.DELETE}" style="width:20px;height:20px;"></span></div>`; 
            }

            function getChatListForUser(user) { 
                const set = new Set(); 
                Object.keys(App.chats || {}).forEach(key => { 
                    const c = App.chats[key]; 
                    if (c) { if (c.user1 === user) set.add(c.user2); if (c.user2 === user) set.add(c.user1); } 
                }); 
                return Array.from(set); 
            }

            function handleFileSelect(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => compressImage(ev.target.result, 800, 800, 0.6, (compressed) => { App.tempPhoto = compressed; showNotification('Photo added, write text and send'); }); reader.readAsDataURL(file); }
            function handleVideoSelect(e) { const file = e.target.files[0]; if (!file) return; if (file.size > 20*1024*1024) { showNotification('Video max 20 MB', 'error'); return; } const reader = new FileReader(); reader.onload = (ev) => { App.tempVideo = ev.target.result; showNotification('Video added, write text and send'); }; reader.readAsDataURL(file); }

            function addUserBySearch() { 
                let query = document.getElementById('searchUserInput').value.trim().toLowerCase(); 
                if (!query) { showNotification('Enter username', 'error'); return; } 
                if (!query.startsWith('@')) query = '@' + query; 
                let main = findMainUsername(query) || (App.users[query] ? query : null); 
                if (!main || !App.users[main]) { showNotification('User not found', 'error'); return; } 
                if (main === App.currentUser) { showNotification('This is you', 'error'); return; } 
                if (!canUserMessage(App.currentUser, main)) { showNotification('This user does not accept messages from strangers', 'error'); return; } 
                ensureChat(App.currentUser, main); 
                App.activeChat = main; localStorage.setItem('yolk_active_chat', main); 
                if (window.innerWidth < 768) App.sidebarOpen = false; 
                document.getElementById('searchUserInput').value = ''; 
                render(); 
                showNotification(`Chat with ${getDisplayName(main)} created`); 
            }

            window.deleteChat = function(chat, event) { 
                event.stopPropagation(); 
                if (!confirm(`Delete chat with ${getDisplayName(chat)}?`)) return; 
                const user = App.currentUser; const chatId = [user, chat].sort().join('_'); 
                if (App.chats[chatId]) delete App.chats[chatId]; 
                if (App.activeChat === chat) { App.activeChat = null; localStorage.removeItem('yolk_active_chat'); } 
                saveToSupabase(); render(); 
                showNotification('Chat deleted'); 
            };

            window.deleteMessage = function(chatPartner, idx) { 
                const from = App.currentUser; 
                try { 
                    const chatId = [from, chatPartner].sort().join('_'); 
                    const msgs = App.chats[chatId]?.messages; 
                    if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveToSupabase(); renderMessages(chatPartner); showNotification('Deleted'); } 
                } catch (error) { console.error('Delete error:', error); showNotification('Delete error', 'error'); } 
            };

            window.openImageModal = function(src) { 
                const modalHtml = `<div class="modal-overlay" id="imageModal" onclick="this.remove()"><div style="max-width:90%; max-height:90%; display:flex; justify-content:center; align-items:center;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div></div>`; 
                document.body.insertAdjacentHTML('beforeend', modalHtml); 
            };

            function updateChatHeaderStatus(username) { 
                const headerInfo = document.querySelector('.chat-header-info'); 
                if (!headerInfo) return; 
                const existingStatus = headerInfo.querySelector('.chat-user-status'); 
                if (existingStatus) existingStatus.remove(); 
                const existingNameStrong = headerInfo.querySelector('strong'); 
                if (existingNameStrong) existingNameStrong.innerHTML = formatUserNameWithBadge(username);
                const isOnline = isUserOnline(username); 
                const lastSeenText = formatLastSeen(App.users[username]?.lastSeen); 
                const statusDiv = document.createElement('div'); 
                statusDiv.className = 'chat-user-status' + (isOnline ? '' : ' offline'); 
                statusDiv.textContent = isOnline ? 'online' : `last seen ${lastSeenText}`; 
                headerInfo.appendChild(statusDiv); 
            }

            function initBots() { App.systemBots = []; saveToSupabase(); }

            window.addEventListener('load', () => {
                loadingStartTime = Date.now();
                initBots();
                loadFromSupabase();
                subscribeToAppState();
                loadTheme();
            });
        })();
    </script>
</body>
</html>
