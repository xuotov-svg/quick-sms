        function show2FAScreen(email, username, onSuccess) {
            const code = generateCode();
            
            App.pending2FA = {
                email: email,
                code: code,
                username: username,
                timestamp: Date.now()
            };

            sendEmailCode(email, code, username, 'login');

            const modalHtml = `
                <div class="two-factor-screen" id="twoFactorScreen">
                    <div class="two-factor-box">
                        <h3>🔐 Двухфакторная аутентификация</h3>
                        <p>Код подтверждения отправлен на<br><strong>${email}</strong></p>
                        <input type="text" class="code-input" id="twoFactorCode" maxlength="6" placeholder="------" autofocus>
                        <button class="btn" id="verify2FABtn">ПОДТВЕРДИТЬ</button>
                        <div class="resend-link" id="resend2FACode">Отправить код повторно</div>
                        <div id="twoFactorError" class="auth-error"></div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modalHtml);

            document.getElementById('verify2FABtn').addEventListener('click', () => {
                const inputCode = document.getElementById('twoFactorCode').value.trim();
                
                if (!inputCode) {
                    document.getElementById('twoFactorError').textContent = 'Введите код';
                    return;
                }

                if (inputCode === App.pending2FA.code && (Date.now() - App.pending2FA.timestamp) < 600000) {
                    document.getElementById('twoFactorScreen').remove();
                    App.pending2FA = null;
                    onSuccess();
                } else {
                    document.getElementById('twoFactorError').textContent = 'Неверный или истекший код';
                }
            });

            document.getElementById('resend2FACode').addEventListener('click', () => {
                if (App.pending2FA) {
                    const newCode = generateCode();
                    App.pending2FA.code = newCode;
                    App.pending2FA.timestamp = Date.now();
                    sendEmailCode(App.pending2FA.email, newCode, App.pending2FA.username, 'login');
                }
            });

            document.getElementById('twoFactorCode').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('verify2FABtn').click();
                }
            });
        }

        // ========== БОТЫ ==========
        function handleGameBot(message, fromUser) {
            // Проверяем, есть ли текст и содержит ли он команду
            const isSpin = message.text && message.text.includes('КРУТИТЬ');
            
            if (isSpin) {
                if (App.users[fromUser].stars < 5) {
                    return { text: `❌ Недостаточно 🐣! Нужно 5 🐣 для игры.\n\n[?][?][?]`, buttons: ['КРУТИТЬ (5🐣)'] };
                }
                
                App.users[fromUser].stars -= 5;
                
                const results = [];
                for (let i = 0; i < 3; i++) {
                    results.push(App.gameSymbols[Math.floor(Math.random() * App.gameSymbols.length)]);
                }
                
                let win = 0;
                if (results[0] === results[1] && results[1] === results[2]) {
                    win = 10;
                    App.users[fromUser].stars += win;
                }
                
                saveToFirebase();
                
                const resultText = `[${results[0]}] [${results[1]}] [${results[2]}]`;
                if (win > 0) {
                    return { text: `${resultText}\n\n✨ ВЫИГРЫШ! +${win} 🐣 ✨\nБаланс: ${App.users[fromUser].stars} 🐣`, buttons: ['КРУТИТЬ (5🐣)'] };
                } else {
                    return { text: `${resultText}\n\n😢 ПРОИГРЫШ...\nБаланс: ${App.users[fromUser].stars} 🐣`, buttons: ['КРУТИТЬ (5🐣)'] };
                }
            }
            
            return { text: `🎰 ИГРОВОЙ АВТОМАТ 🎰\n\n[?][?][?]\n\nПравила: нажми "КРУТИТЬ (5🐣)" и выиграй 10🐣 если выпадут 3 одинаковых символа!\n\nДоступные символы: ${App.gameSymbols.join(' ')}\n\n🐣 Баланс: ${App.users[fromUser].stars} 🐣`, buttons: ['КРУТИТЬ (5🐣)'] };
        }
        
        function handleTapBot(message, fromUser) {
            if (!App.tapBalances[fromUser]) App.tapBalances[fromUser] = 0;
            if (!App.tapUpgrades[fromUser]) App.tapUpgrades[fromUser] = 0;
            
            const currentLevel = App.tapUpgrades[fromUser] || 0;
            const currentReward = getTapReward(fromUser);
            const nextCost = getNextUpgradeCost(fromUser);
            const nextReward = currentLevel < 4 ? tapUpgradeLevels[currentLevel + 1].reward : null;
            
            if (message.text && message.text.includes('ТАПНУТЬ')) {
                const increase = currentReward;
                App.tapBalances[fromUser] += increase;
                saveTapBalances();
                return { 
                    text: `👆 ВЫ ТАПНУЛИ! +${increase} 💲\n\n💰 Баланс: ${App.tapBalances[fromUser]} 💲\n📈 За клик: ${currentReward} 💲`, 
                    buttons: ['ТАПНУТЬ (👆)', nextCost !== null ? `ПРОКАЧАТЬ (${nextCost}💲 → ${nextReward}💲/клик)` : 'МАКСИМУМ!']
                };
            }
            
            if (message.text && message.text.includes('ПРОКАЧАТЬ')) {
                if (canUpgradeTap(fromUser)) {
                    upgradeTap(fromUser);
                    const newLevel = App.tapUpgrades[fromUser] || 0;
                    const newReward = getTapReward(fromUser);
                    const newNextCost = getNextUpgradeCost(fromUser);
                    const newNextReward = newLevel < 4 ? tapUpgradeLevels[newLevel + 1].reward : null;
                    saveTapBalances();
                    return { 
                        text: `✨ ПРОКАЧКА УСПЕШНА! ✨\n\nТеперь за клик: +${newReward} 💲\n💰 Баланс: ${App.tapBalances[fromUser]} 💲`, 
                        buttons: ['ТАПНУТЬ (👆)', newNextCost !== null ? `ПРОКАЧАТЬ (${newNextCost}💲 → ${newNextReward}💲/клик)` : 'МАКСИМУМ!']
                    };
                } else {
                    const needed = nextCost - (App.tapBalances[fromUser] || 0);
                    return { 
                        text: `❌ НЕДОСТАТОЧНО 💲!\nНужно еще ${needed} 💲 для прокачки\n\n💰 Баланс: ${App.tapBalances[fromUser]} 💲\n📈 За клик: ${currentReward} 💲`, 
                        buttons: ['ТАПНУТЬ (👆)', nextCost !== null ? `ПРОКАЧАТЬ (${nextCost}💲 → ${nextReward}💲/клик)` : 'МАКСИМУМ!']
                    };
                }
            }
            
            return { 
                text: `🤖 TAP БОТ 🤖\n\n💰 Баланс: ${App.tapBalances[fromUser]} 💲\n📈 За клик: ${currentReward} 💲\n\n${nextCost !== null ? `⬆️ Следующий уровень: ${nextCost} 💲 → +${nextReward} 💲/клик` : '🏆 МАКСИМАЛЬНЫЙ УРОВЕНЬ ДОСТИГНУТ!'}\n\nНажми на кнопку, чтобы тапнуть!`, 
                buttons: ['ТАПНУТЬ (👆)', nextCost !== null ? `ПРОКАЧАТЬ (${nextCost}💲 → ${nextReward}💲/клик)` : 'МАКСИМУМ!']
            };
        }

        // ========== ОСНОВНОЙ РЕНДЕР ==========
        function render() {
            const root = document.getElementById('app');
            
            if (!App.dataLoaded) {
                root.innerHTML = '<div class="loading-screen"><div class="loading-spinner"></div></div>';
                return;
            }
            
            if (!App.currentUser) {
                root.innerHTML = renderAuth();
                attachAuthEvents();
            } else {
                initUserStars(App.currentUser);
                root.innerHTML = renderMain();
                setTimeout(() => {
                    attachMainEvents();
                    if (App.activeChat) {
                        loadMessages(App.activeChat);
                    }
                    updateChatList();
                }, 100);
            }
        }

        // ========== АВТОРИЗАЦИЯ ==========
        function renderAuth() {
            return `<div class="auth-container">
                <div class="auth-box">
                    <h2>Yolk</h2>
                    <div id="authForms">
                        <div id="loginForm">
                            <div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="loginUsername" type="text" placeholder="только англ буквы, минимум 4"></div>
                            <div class="input-group"><label>ПАРОЛЬ</label><input id="loginPassword" type="password" placeholder="••••••"></div>
                            <button class="btn" id="loginBtn">ВОЙТИ</button>
                            <div class="forgot-password">
                                <a id="forgotPasswordBtn">Забыли пароль?</a>
                            </div>
                        </div>
                        <div class="auth-switch">
                            <button class="btn btn-secondary" id="showRegisterBtn">СОЗДАТЬ</button>
                        </div>
                    </div>
                    <div id="registerForm" style="display: none;">
                        <div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="regUsername" type="text" placeholder="jake"></div>
                        <div class="input-group"><label>ПАРОЛЬ</label><input id="regPassword" type="password" placeholder="••••••"></div>
                        <button class="btn" id="registerBtn">СОЗДАТЬ</button>
                        <div class="auth-switch"><button class="btn btn-secondary" id="showLoginBtn">← НАЗАД</button></div>
                    </div>
                    <div id="authError" class="auth-error"></div>
                </div>
            </div>`;
        }

        function attachAuthEvents() {
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');
            const errorDiv = document.getElementById('authError');

            document.getElementById('showRegisterBtn')?.addEventListener('click', () => {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
            });
            
            document.getElementById('showLoginBtn')?.addEventListener('click', () => {
                regForm.style.display = 'none';
                loginForm.style.display = 'block';
            });

            document.getElementById('forgotPasswordBtn')?.addEventListener('click', () => {
                showPasswordResetScreen();
            });

            document.getElementById('loginBtn')?.addEventListener('click', () => {
                let username = document.getElementById('loginUsername').value.trim();
                const pass = document.getElementById('loginPassword').value.trim();
                
                if (!isValidUsername(username)) { 
                    errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ, МИНИМУМ 4'; 
                    return; 
                }
                
                const clean = '@' + username;
                
                if (!App.users[clean] || App.users[clean].password !== pass) {
                    errorDiv.innerText = '! НЕВЕРНЫЙ ЛОГИН ИЛИ ПАРОЛЬ';
                    return;
                }

                const user = App.users[clean];
                
                function loginSuccess() {
                    App.currentUser = clean;
                    localStorage.setItem('yolk_current_user', clean);
                    loadSavedMessages();
                    loadGlobalMessages();
                    loadTapBalances();
                    render();
                }
                
                if (user.email && user.emailVerified) {
                    show2FAScreen(user.email, clean, loginSuccess);
                } else {
                    loginSuccess();
                }
            });

            document.getElementById('registerBtn')?.addEventListener('click', () => {
                let username = document.getElementById('regUsername').value.trim();
                const pass = document.getElementById('regPassword').value.trim();
                
                if (!isValidUsername(username)) { 
                    errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ, МИНИМУМ 4'; 
                    return; 
                }
                
                if (!pass) { 
                    errorDiv.innerText = '! ВВЕДИТЕ ПАРОЛЬ'; 
                    return; 
                }
                
                const clean = '@' + username;
                
                if (App.users[clean] || App.systemBots.includes(clean)) { 
                    errorDiv.innerText = '! УЖЕ ЕСТЬ'; 
                    return; 
                }
                
                App.users[clean] = { 
                    password: pass, 
                    avatar: null, 
                    stars: 0, 
                    gifts: [], 
                    bio: '', 
                    verified: false,
                    email: '',
                    emailVerified: false,
                    age: 14
                };
                
                App.currentUser = clean;
                App.savedMessages[clean] = [];
                saveSavedMessages();
                
                localStorage.setItem('yolk_current_user', clean);
                saveToFirebase();
                render();
            });
        }

        // ========== ОСНОВНОЙ ИНТЕРФЕЙС ==========
        function renderMain() {
            const user = App.currentUser;
            const userData = App.users[user] || {};
            const chatPartner = App.activeChat || 'saved';
            const isChannel = App.channels[chatPartner] ? true : false;
            const isGlobal = chatPartner === 'global';
            const isBotChat = App.systemBots.includes(chatPartner);

            return `<div class="main-container">
                <div class="sidebar ${App.sidebarOpen ? 'open' : ''}">
                    <div class="user-profile" id="openProfileBtn">
                        <div class="avatar">
                            ${userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : (user[1] ? user[1].toUpperCase() : '?')}
                        </div>
                        <div>
                            <div class="username-display">${user}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div>
                            ${userData.emailVerified ? '<div class="email-badge">📧 подтвержден</div>' : ''}
                            ${userData.age ? `<div class="age-badge">${userData.age} лет</div>` : ''}
                            <div class="star-balance">🐣 ${userData.stars || 0}</div>
                        </div>
                    </div>
                    <div class="search-add">
                        <input type="text" placeholder="ПОИСК @юзернейм" id="searchUserInput">
                        <button class="icon-btn" id="addUserBtn">+</button>
                    </div>
                    <div class="chats-list" id="chatsList"></div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <div class="chat-header-info">
                            <button class="back-btn ${window.innerWidth < 768 ? 'visible' : ''}" id="backBtn">←</button>
                            <strong>${chatPartner === 'saved' ? '📎 ИЗБРАННОЕ' : (chatPartner === 'global' ? '🌍 ГЛОБАЛЬНЫЙ ЧАТ' : chatPartner)}${App.users[chatPartner]?.verified ? '<span class="verified-icon"></span>' : ''}</strong>
                            ${isChannel ? `<small style="color:#666;">👥 ${App.channels[chatPartner]?.subscribers?.length || 0}</small>` : ''}
                        </div>
                        <div class="chat-actions">
                            ${chatPartner !== 'saved' && chatPartner !== 'global' && !isBotChat ? `
                                <button class="tiny-btn" id="viewProfileBtn">👤</button>
                            ` : ''}
                            ${isChannel && chatPartner !== 'saved' ? 
                                `<button class="tiny-btn" id="subscribeBtn">${App.channels[chatPartner]?.subscribers?.includes?.(user) ? '🔕' : '🔔'}</button>` : ''}
                            ${chatPartner !== 'saved' && chatPartner !== 'global' && !isChannel && !isBot(chatPartner) ? 
                                `<button class="tiny-btn" id="giftBtn">🎁</button>` : ''}
                        </div>
                    </div>
                    <div class="messages-container" id="messageList"></div>
                    <div class="input-area">
                        <input type="text" id="messageText" placeholder="${chatPartner === 'saved' ? 'ЗАМЕТКА...' : (chatPartner === 'global' ? 'СООБЩЕНИЕ ВСЕМ...' : (isChannel ? 'ПОСТ...' : 'СООБЩЕНИЕ...'))}" autofocus>
                        <label for="fileUpload" class="file-label">📷</label>
                        <input type="file" id="fileUpload" accept="image/*">
                        <button class="send-btn" id="sendMsgBtn">➤</button>
                    </div>
                </div>
            </div>`;
        }

        function renderChatItem(u, active, currentUser) {
            let name = u === 'saved' ? '📎 ИЗБРАННОЕ' : (u === 'global' ? '🌍 ГЛОБАЛЬНЫЙ ЧАТ' : u);
            const isPinned = App.pinnedChats.includes(u);
            let avatarHtml = '<div class="chat-avatar">📁</div>';
            
            if (u === 'global') {
                avatarHtml = '<div class="chat-avatar">🌍</div>';
            } else if (u !== 'saved') {
                if (App.channels[u]) {
                    const channelAvatar = App.channels[u]?.avatar;
                    avatarHtml = channelAvatar ? 
                        `<div class="chat-avatar"><img src="${channelAvatar}" class="chat-avatar-img"></div>` : 
                        '<div class="chat-avatar">📢</div>';
                } else if (App.systemBots.includes(u)) {
                    if (u === '@game_bot') avatarHtml = '<div class="chat-avatar">🎰</div>';
                    else if (u === '@tap_bot') avatarHtml = '<div class="chat-avatar">👆</div>';
                    else avatarHtml = '<div class="chat-avatar">🤖</div>';
                } else {
                    const avatarUrl = App.users[u]?.avatar;
                    avatarHtml = avatarUrl ? 
                        `<div class="chat-avatar"><img src="${avatarUrl}" class="chat-avatar-img"></div>` : 
                        `<div class="chat-avatar">${u[1] || '@'}</div>`;
                }
            }
            
            const userData = App.users[u] || {};
            
            return `<div class="chat-item ${active ? 'active' : ''} ${isPinned ? 'pinned' : ''}" data-chat="${u}">
                ${avatarHtml}
                <div style="flex:1; color:#000000;">
                    <div class="username-display" style="display: flex; align-items: center; gap: 2px;">${name}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div>
                    ${userData.age ? `<div style="font-size:10px; color:#666;">${userData.age} лет</div>` : ''}
                </div>
                ${u !== 'saved' && u !== 'global' ? `
                    <span class="pin-icon" onclick="window.togglePinChat('${u}', event)">📌</span>
                    <span class="delete-chat-icon" onclick="window.deleteChat('${u}', event)">🗑️</span>
                ` : ''}
            </div>`;
        }

        function renderMessage(msg, idx, currentUser, chatPartner) {
            const isMe = msg.from === currentUser || (chatPartner === 'saved' && msg.from === currentUser);
            const isGlobal = chatPartner === 'global';
            const isChannel = App.channels[chatPartner] ? true : false;
            const isGift = msg.gift ? true : false;
            const isBotMsg = App.systemBots.includes(msg.from);
            
            let canDelete = false;
            if (isGlobal) {
                canDelete = (msg.from === currentUser) || hasVerifiedBadge(currentUser);
            } else if (isChannel) {
                canDelete = App.channels[chatPartner]?.owner === currentUser;
            } else if (chatPartner === 'saved') {
                canDelete = true;
            } else if (App.systemBots.includes(chatPartner)) {
                canDelete = false;
            } else {
                canDelete = isMe;
            }
            
            const mediaHtml = msg.photo ? `<img src="${msg.photo}" class="media-preview">` : '';
            const likesCount = msg.likes ? Object.keys(msg.likes).length : 0;
            const userLiked = msg.likes && msg.likes[currentUser];
            
            let senderName = msg.from;
            
            let messageText = msg.text || '';
            if (isGift && messageText.startsWith('🎁 ')) {
                messageText = messageText.substring(2);
            }
            
            let buttonsHtml = '';
            if (isBotMsg && msg.buttons && msg.buttons.length > 0) {
                buttonsHtml = `<div class="inline-buttons">${msg.buttons.map(btn => `<button class="inline-btn" onclick="window.sendBotCommand('${chatPartner}', '${btn}')">${btn}</button>`).join('')}</div>`;
            }
            
            return `<div class="message ${isMe ? 'me' : ''} ${isGift ? 'gift-message' : ''} ${isGlobal ? 'global-message' : ''} ${isBotMsg ? 'bot-message' : ''}">
                ${!isMe ? `<small><span class="message-username" onclick="window.openProfileModal('${msg.from}')">${senderName}${App.users[msg.from]?.verified ? '<span class="verified-icon"></span>' : ''}</span></small><br>` : ''}
                <div style="color:#000000;">${messageText}${mediaHtml}</div>
                ${buttonsHtml}
                <div class="time">${new Date(msg.time).toLocaleTimeString().slice(0,5)}</div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                    ${(isGlobal || isChannel) ? `
                        <button class="like-btn ${userLiked ? 'liked' : ''}" onclick="window.toggleLike('${chatPartner}', ${idx}, event)">
                            ❤️ <span>${likesCount}</span>
                        </button>
                    ` : '<div></div>'}
                    ${canDelete ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">УДАЛИТЬ</button></div>` : ''}
                </div>
            </div>`;
        }

        function updateChatList() {
            const chatsContainer = document.getElementById('chatsList');
            if (!chatsContainer || !App.currentUser) return;
            
            let chatsList = getChatListForUser(App.currentUser);
            
            const pinned = App.pinnedChats.filter(p => chatsList.includes(p));
            const unpinned = chatsList.filter(c => !App.pinnedChats.includes(c) && c !== 'saved' && c !== 'global');
            const saved = chatsList.includes('saved') ? ['saved'] : [];
            const global = chatsList.includes('global') ? ['global'] : [];
            const orderedList = [...saved, ...global, ...pinned, ...unpinned];
            
            let html = '';
            orderedList.forEach(chat => {
                html += renderChatItem(chat, chat === App.activeChat, App.currentUser);
            });
            chatsContainer.innerHTML = html;
            
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.pin-icon') || e.target.closest('.delete-chat-icon')) return;
                    
                    const chatId = el.dataset.chat;
                    
                    if (App.activeChat === chatId) {
                        if (window.innerWidth < 768) {
                            App.sidebarOpen = false;
                            document.querySelector('.sidebar').classList.remove('open');
                        }
                        return;
                    }
                    
                    App.activeChat = chatId;
                    localStorage.setItem('yolk_active_chat', chatId);
                    
                    if (window.innerWidth < 768) {
                        App.sidebarOpen = false;
                        document.querySelector('.sidebar').classList.remove('open');
                    }
                    
                    document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                    el.classList.add('active');
                    
                    render();
                });
            });
        }

        function loadMessages(chatPartner) {
            const messagesContainer = document.getElementById('messageList');
            if (!messagesContainer) return;
            
            let messages = [];
            
            if (chatPartner === 'saved') {
                messages = App.savedMessages[App.currentUser] || [];
            } else if (chatPartner === 'global') {
                messages = App.globalMessages || [];
            } else if (App.channels[chatPartner]) {
                messages = App.channels[chatPartner].messages || [];
            } else {
                const chatId = [App.currentUser, chatPartner].sort().join('_');
                const chat = App.chats[chatId];
                messages = chat ? chat.messages : [];
            }
            
            let html = '';
            if (messages && messages.length > 0) {
                messages.forEach((msg, idx) => {
                    html += renderMessage(msg, idx, App.currentUser, chatPartner);
                });
            } else {
                if (chatPartner === '@game_bot') {
                    const botMsg = handleGameBot({ text: '' }, App.currentUser);
                    html = renderMessage({ from: '@game_bot', text: botMsg.text, time: Date.now(), buttons: botMsg.buttons }, 0, App.currentUser, chatPartner);
                } else if (chatPartner === '@tap_bot') {
                    const botMsg = handleTapBot({ text: '' }, App.currentUser);
                    html = renderMessage({ from: '@tap_bot', text: botMsg.text, time: Date.now(), buttons: botMsg.buttons }, 0, App.currentUser, chatPartner);
                } else {
                    html = '<div style="text-align:center; color:#666; margin-top:20px; padding:20px;">Нет сообщений</div>';
                }
            }
            
            messagesContainer.innerHTML = html;
            
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
        }

        // ========== ЛАЙКИ ==========
        window.toggleLike = function(chatPartner, messageIdx, event) {
            event.stopPropagation();
            
            if (chatPartner === 'global') {
                if (!App.globalMessages[messageIdx]) return;
                const msg = App.globalMessages[messageIdx];
                if (!msg.likes) msg.likes = {};
                
                if (msg.likes[App.currentUser]) {
                    delete msg.likes[App.currentUser];
                } else {
                    msg.likes[App.currentUser] = true;
                }
                
                saveGlobalMessages();
                saveToFirebase();
                loadMessages('global');
            } else if (App.channels[chatPartner]) {
                if (!App.channels[chatPartner].messages[messageIdx]) return;
                const msg = App.channels[chatPartner].messages[messageIdx];
                if (!msg.likes) msg.likes = {};
                
                if (msg.likes[App.currentUser]) {
                    delete msg.likes[App.currentUser];
                } else {
                    msg.likes[App.currentUser] = true;
                }
                
                saveToFirebase();
                loadMessages(chatPartner);
            }
        };

        // ========== КОМАНДЫ БОТОВ ==========
        window.sendBotCommand = function(botName, command) {
            let response;
            
            if (botName === '@game_bot') {
                response = handleGameBot({ text: command }, App.currentUser);
            } else if (botName === '@tap_bot') {
                response = handleTapBot({ text: command }, App.currentUser);
            }
            
            if (response) {
                const botMessage = {
                    from: botName,
                    text: response.text,
                    time: Date.now(),
                    buttons: response.buttons
                };
                
                const chatId = [App.currentUser, botName].sort().join('_');
                if (!App.chats[chatId]) {
                    App.chats[chatId] = { user1: App.currentUser, user2: botName, messages: [] };
                }
                App.chats[chatId].messages.push(botMessage);
                saveToFirebase();
                loadMessages(botName);
            }
        };

        // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
        function attachMainEvents() {
            const backBtn = document.getElementById('backBtn');
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    App.sidebarOpen = true;
                    document.querySelector('.sidebar').classList.add('open');
                });
            }

            const openProfileBtn = document.getElementById('openProfileBtn');
            if (openProfileBtn) {
                openProfileBtn.addEventListener('click', () => openProfileModal(App.currentUser));
            }
            
            const viewProfileBtn = document.getElementById('viewProfileBtn');
            if (viewProfileBtn) {
                viewProfileBtn.addEventListener('click', () => {
                    if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'global' && !App.systemBots.includes(App.activeChat)) {
                        if (App.channels[App.activeChat]) {
                            openChannelModal(App.activeChat);
                        } else {
                            openProfileModal(App.activeChat);
                        }
                    }
                });
            }
            
            const giftBtn = document.getElementById('giftBtn');
            if (giftBtn) {
                giftBtn.addEventListener('click', openGiftMenu);
            }
            
            const subscribeBtn = document.getElementById('subscribeBtn');
            if (subscribeBtn) {
                subscribeBtn.addEventListener('click', toggleSubscribe);
            }
            
            const sendBtn = document.getElementById('sendMsgBtn');
            if (sendBtn) {
                sendBtn.addEventListener('click', sendMessage);
            }
            
            const fileUpload = document.getElementById('fileUpload');
            if (fileUpload) {
                fileUpload.addEventListener('change', handleFileSelect);
            }
            
            const addUserBtn = document.getElementById('addUserBtn');
            if (addUserBtn) {
                addUserBtn.addEventListener('click', addUserBySearch);
            }
            
            const messageText = document.getElementById('messageText');
            if (messageText) {
                messageText.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                App.tempPhoto = ev.target.result;
                sendMessage();
            };
            reader.readAsDataURL(file);
        }

        function sendMessage() {
            const textInput = document.getElementById('messageText');
            const text = textInput ? textInput.value.trim() : '';
            
            if (!text && !App.tempPhoto) {
                showNotification('Введите сообщение', 'error');
                return;
            }
            
            const from = App.currentUser;
            const to = App.activeChat;
            
            if (!to) {
                showNotification('Выберите чат', 'error');
                return;
            }
            
            try {
                const message = { 
                    from, 
                    text: text || '', 
                    time: Date.now(), 
                    photo: App.tempPhoto || null,
                    gift: false
                };
                
                if (to === 'saved') {
                    if (!App.savedMessages[from]) App.savedMessages[from] = [];
                    App.savedMessages[from].push(message);
                    saveSavedMessages();
                    showNotification('Сохранено в избранное');
                } else if (to === 'global') {
                    App.globalMessages.push(message);
                    saveGlobalMessages();
                    saveToFirebase();
                    showNotification('Сообщение отправлено в глобальный чат');
                } else if (App.channels[to]) {
                    if (App.channels[to].owner !== from) {
                        showNotification('Только владелец может писать в канал', 'error');
                        return;
                    }
                    if (!App.channels[to].messages) App.channels[to].messages = [];
                    App.channels[to].messages.push(message);
                    saveToFirebase();
                } else if (App.systemBots.includes(to)) {
                    let response;
                    if (to === '@game_bot') {
                        response = handleGameBot({ text: text }, from);
                    } else if (to === '@tap_bot') {
                        response = handleTapBot({ text: text }, from);
                    }
                    
                    if (response) {
                        const botMessage = {
                            from: to,
                            text: response.text,
                            time: Date.now(),
                            buttons: response.buttons
                        };
                        
                        const chatId = [from, to].sort().join('_');
                        if (!App.chats[chatId]) {
                            App.chats[chatId] = { user1: from, user2: to, messages: [] };
                        }
                        App.chats[chatId].messages.push(botMessage);
                        saveToFirebase();
                        loadMessages(to);
                    }
                } else {
                    const chatId = [from, to].sort().join('_');
                    if (!App.chats[chatId]) {
                        App.chats[chatId] = { user1: from, user2: to, messages: [] };
                    }
                    App.chats[chatId].messages.push(message);
                    saveToFirebase();
                }
                
                if (textInput) textInput.value = '';
                App.tempPhoto = null;
                const fileInput = document.getElementById('fileUpload');
                if (fileInput) fileInput.value = '';
                
                if (!App.systemBots.includes(to)) {
                    loadMessages(to);
                }
                updateChatList();
                
            } catch (error) {
                console.error('❌ Ошибка отправки:', error);
                showNotification('Ошибка отправки', 'error');
            }
        }

        window.deleteMessage = function(chatPartner, idx) {
            const from = App.currentUser;
            
            try {
                if (chatPartner === 'saved') {
                    const msgs = App.savedMessages[from];
                    if (msgs && msgs[idx]) {
                        msgs.splice(idx, 1);
                        saveSavedMessages();
                        showNotification('Удалено');
                    }
                } else if (chatPartner === 'global') {
                    const msgs = App.globalMessages;
                    if (msgs && msgs[idx]) {
                        if (msgs[idx].from === from || hasVerifiedBadge(from)) {
                            msgs.splice(idx, 1);
                            saveGlobalMessages();
                            saveToFirebase();
                            showNotification('Удалено');
                        } else {
                            showNotification('Нет прав на удаление', 'error');
                            return;
                        }
                    }
                } else if (App.channels[chatPartner]) {
                    if (App.channels[chatPartner].owner !== from) {
                        showNotification('Только владелец может удалять', 'error');
                        return;
                    }
                    const msgs = App.channels[chatPartner].messages;
                    if (msgs && msgs[idx]) {
                        msgs.splice(idx, 1);
                        saveToFirebase();
                        showNotification('Удалено');
                    }
                } else {
                    const chatId = [from, chatPartner].sort().join('_');
                    const msgs = App.chats[chatId]?.messages;
                    if (msgs && msgs[idx]) {
                        msgs.splice(idx, 1);
                        saveToFirebase();
                        showNotification('Удалено');
                    }
                }
                
                loadMessages(chatPartner);
                
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showNotification('Ошибка удаления', 'error');
            }
        };

        function addUserBySearch() {
            let query = document.getElementById('searchUserInput').value.trim();
            if (!query) {
                showNotification('Введите имя пользователя', 'error');
                return;
            }
            
            if (!query.startsWith('@')) {
                query = '@' + query;
            }
            
            if (App.systemBots.includes(query)) {
                ensureChat(App.currentUser, query);
                App.activeChat = query;
                localStorage.setItem('yolk_active_chat', query);
                
                if (window.innerWidth < 768) App.sidebarOpen = false;
                document.getElementById('searchUserInput').value = '';
                render();
                return;
            }
            
            if (App.channels[query]) {
                if (!App.channels[query].subscribers) App.channels[query].subscribers = [];
                if (!App.channels[query].subscribers.includes(App.currentUser)) {
                    App.channels[query].subscribers.push(App.currentUser);
                    saveToFirebase();
                }
                
                App.activeChat = query;
                localStorage.setItem('yolk_active_chat', query);
                
                if (window.innerWidth < 768) App.sidebarOpen = false;
                document.getElementById('searchUserInput').value = '';
                render();
                return;
            }
            
            if (!App.users[query]) { 
                showNotification('Пользователь не найден', 'error');
                return; 
            }
            if (query === App.currentUser) { 
                showNotification('Это вы', 'error');
                return; 
            }
            
            ensureChat(App.currentUser, query);
            App.activeChat = query;
            localStorage.setItem('yolk_active_chat', query);
            
            if (window.innerWidth < 768) {
                App.sidebarOpen = false;
            }
            
            document.getElementById('searchUserInput').value = '';
            render();
            showNotification(`Чат с ${query} создан`);
        }

        function toggleSubscribe() {
            const user = App.currentUser;
            const channel = App.activeChat;
            if (!App.channels[channel]) return;
            
            if (!App.channels[channel].subscribers) App.channels[channel].subscribers = [];
            
            if (!App.channels[channel].subscribers.includes(user)) {
                App.channels[channel].subscribers.push(user);
                showNotification('Вы подписались на канал');
            } else {
                App.channels[channel].subscribers = App.channels[channel].subscribers.filter(s => s !== user);
                showNotification('Вы отписались от канала');
            }
            saveToFirebase();
            render();
        }

        window.togglePinChat = function(chat, event) {
            event.stopPropagation();
            if (App.pinnedChats.includes(chat)) {
                App.pinnedChats = App.pinnedChats.filter(c => c !== chat);
                showNotification('Чат откреплен');
            } else {
                if (App.pinnedChats.length >= 3) {
                    showNotification('Максимум 3 закрепленных чата', 'error');
                    return;
                }
                App.pinnedChats.push(chat);
                showNotification('Чат закреплен');
            }
            saveToFirebase();
            updateChatList();
        };

        window.deleteChat = function(chat, event) {
            event.stopPropagation();
            if (!confirm(`Удалить чат ${chat}?`)) return;
            
            const user = App.currentUser;
            
            if (App.pinnedChats.includes(chat)) {
                App.pinnedChats = App.pinnedChats.filter(c => c !== chat);
            }
            
            const chatId = [user, chat].sort().join('_');
            if (App.chats[chatId]) {
                delete App.chats[chatId];
            }
            
            if (App.channels[chat] && App.channels[chat].subscribers) {
                App.channels[chat].subscribers = App.channels[chat].subscribers.filter(s => s !== user);
            }
            
            if (App.activeChat === chat) {
                App.activeChat = 'saved';
                localStorage.setItem('yolk_active_chat', 'saved');
            }
            
            saveToFirebase();
            render();
            showNotification('Чат удален');
        };

        function openGiftMenu() {
            const user = App.currentUser;
            const target = App.activeChat;
            const gifts = App.users[user].gifts || [];
            
            if (gifts.length === 0) {
                showNotification('У вас нет подарков', 'error');
                return;
            }
            
            const giftList = gifts.map(g => 
                `<div class="gift-item" onclick="window.sendGiftToUser('${target}', '${g}')">${g}</div>`
            ).join('');
            
            const modalHtml = `<div class="modal-overlay" id="giftModalOverlay">
                <div class="profile-modal">
                    <h3>🎁 ВЫБЕРИТЕ ПОДАРОК</h3>
                    <div class="gifts-collection">
                        ${giftList}
                    </div>
                    <div class="profile-actions">
                        <button class="profile-btn secondary" id="closeGiftModal">ОТМЕНА</button>
                    </div>
                </div>
            </div>`;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            document.getElementById('closeGiftModal').addEventListener('click', () => {
                document.getElementById('giftModalOverlay').remove();
            });
        }

        window.sendGiftToUser = function(toUser, giftEmoji) {
            document.getElementById('giftModalOverlay')?.remove();
            
            const fromUser = App.currentUser;
            const userGifts = App.users[fromUser].gifts || [];
            
            if (!userGifts.includes(giftEmoji)) {
                showNotification('Подарок не найден', 'error');
                return;
            }
            
            // Забираем подарок у отправителя
            App.users[fromUser].gifts = userGifts.filter(g => g !== giftEmoji);
            
            // Добавляем получателю
            if (!App.users[toUser].gifts) App.users[toUser].gifts = [];
            App.users[toUser].gifts.push(giftEmoji);
            
            // Создаем сообщение
            const chatId = ensureChat(fromUser, toUser);
            if (chatId && App.chats[chatId]) {
                App.chats[chatId].messages.push({
                    from: fromUser,
                    text: `ПОДАРОК ${giftEmoji} ОТ ${fromUser}`,
                    time: Date.now(),
                    gift: true
                });
            }
            
            saveToFirebase();
            
            if (App.activeChat === toUser) loadMessages(toUser);
            
            showNotification(`Подарок ${giftEmoji} отправлен ${toUser}!`);
        };

        // ========== СБРОС ПАРОЛЯ ==========
        function showPasswordResetScreen() {
            const modalHtml = `
                <div class="two-factor-screen" id="passwordResetScreen">
                    <div class="two-factor-box">
                        <h3>🔐 Сброс пароля</h3>
                        <p>Введите email, привязанный к аккаунту</p>
                        <input type="email" class="code-input" id="resetEmailInput" placeholder="your@email.com" style="letter-spacing:normal;">
                        <button class="btn" id="sendResetCodeBtn">ОТПРАВИТЬ КОД</button>
                        <div class="resend-link" id="backToLogin">← Вернуться к входу</div>
                        <div id="resetError" class="auth-error"></div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modalHtml);

            document.getElementById('sendResetCodeBtn').addEventListener('click', async () => {
                const email = document.getElementById('resetEmailInput').value.trim();
                
                if (!email) {
                    document.getElementById('resetError').textContent = 'Введите email';
                    return;
                }

                let foundUser = null;
                for (let username in App.users) {
                    if (App.users[username].email === email && App.users[username].emailVerified) {
                        foundUser = username;
                        break;
                    }
                }

                if (!foundUser) {
                    document.getElementById('resetError').textContent = 'Email не найден или не подтвержден';
                    return;
                }

                const code = generateCode();
                
                App.pendingPasswordReset = {
                    email: email,
                    code: code,
                    username: foundUser,
                    timestamp: Date.now()
                };

                await sendEmailCode(email, code, foundUser, 'reset');
                
                document.getElementById('passwordResetScreen').innerHTML = `
                    <div class="two-factor-box">
                        <h3>🔐 Сброс пароля</h3>
                        <p>Код отправлен на<br><strong>${email}</strong></p>
                        <input type="text" class="code-input" id="resetCodeInput" maxlength="6" placeholder="------" autofocus>
                        <input type="password" class="code-input" id="newPasswordInput" placeholder="Новый пароль" style="letter-spacing:normal; margin-top:10px;">
                        <button class="btn" id="verifyResetCodeBtn">СБРОСИТЬ ПАРОЛЬ</button>
                        <div class="resend-link" id="resendResetCode">Отправить код повторно</div>
                        <div id="resetError" class="auth-error"></div>
                    </div>
                `;

                document.getElementById('verifyResetCodeBtn').addEventListener('click', () => {
                    const inputCode = document.getElementById('resetCodeInput').value.trim();
                    const newPassword = document.getElementById('newPasswordInput').value.trim();
                    
                    if (!inputCode || !newPassword) {
                        document.getElementById('resetError').textContent = 'Заполните все поля';
                        return;
                    }

                    if (inputCode === App.pendingPasswordReset.code && (Date.now() - App.pendingPasswordReset.timestamp) < 600000) {
                        App.users[App.pendingPasswordReset.username].password = newPassword;
                        saveToFirebase();
                        
                        document.getElementById('passwordResetScreen').remove();
                        App.pendingPasswordReset = null;
                        showNotification('Пароль успешно изменен!', 'success');
                    } else {
                        document.getElementById('resetError').textContent = 'Неверный или истекший код';
                    }
                });

                document.getElementById('resendResetCode').addEventListener('click', async () => {
                    if (App.pendingPasswordReset) {
                        const newCode = generateCode();
                        App.pendingPasswordReset.code = newCode;
                        App.pendingPasswordReset.timestamp = Date.now();
                        await sendEmailCode(App.pendingPasswordReset.email, newCode, App.pendingPasswordReset.username, 'reset');
                        showNotification('Новый код отправлен', 'success');
                    }
                });
            });

            document.getElementById('backToLogin').addEventListener('click', () => {
                document.getElementById('passwordResetScreen').remove();
            });
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        function initBots() {
            App.systemBots.forEach(bot => {
                if (!App.users[bot]) {
                    App.users[bot] = { 
                        password: 'bot', 
                        avatar: null, 
                        stars: 0, 
                        gifts: [], 
                        bio: bot === '@game_bot' ? '🎰 Игровой автомат! Крути и выигрывай!' : '👆 Тапай и зарабатывай 💲!',
                        isBot: true,
                        verified: true,
                        email: `${bot}@yolk.com`,
                        emailVerified: true,
                        age: 99
                    };
                }
            });
            saveToFirebase();
        }

        // Глобальные функции
        window.togglePinChat = window.togglePinChat || function() {};
        window.deleteChat = window.deleteChat || function() {};
        window.openProfileModal = window.openProfileModal || function() {};
        window.deleteMessage = window.deleteMessage || function() {};
        window.sendGiftToUser = window.sendGiftToUser || function() {};
        window.toggleLike = window.toggleLike || function() {};
        window.sendBotCommand = window.sendBotCommand || function() {};

        // Запуск
        window.addEventListener('load', () => {
            showLoading();
            initBots();
            loadFromFirebase();
            setTimeout(hideLoading, 1000);
        });
    })();
</script>
</body>
</html>
