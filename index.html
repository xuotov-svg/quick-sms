// Функция определения языка (простая)
function detectLanguage(text) {
    const cyrillicPattern = /[а-яё]/i;
    const latinPattern = /[a-z]/i;
    
    const cyrillicCount = (text.match(cyrillicPattern) || []).length;
    const latinCount = (text.match(latinPattern) || []).length;
    
    if (cyrillicCount > latinCount) return 'ru';
    if (latinCount > cyrillicCount) return 'en';
    return 'unknown';
}

// Функция перевода через бесплатный API (LibreTranslate)
async function translateText(text, targetLang = 'ru') {
    if (!text || text.length === 0) return text;
    
    const sourceLang = detectLanguage(text);
    
    // Если уже на русском, не переводим
    if (sourceLang === 'ru' && targetLang === 'ru') {
        return { translated: text, from: 'ru', to: 'ru', alreadyRussian: true };
    }
    
    try {
        // Вариант 1: Бесплатный API LibreTranslate (без ключа, но с ограничениями)
        const response = await fetch('https://translate.astian.org/translate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                q: text,
                source: sourceLang === 'unknown' ? 'auto' : sourceLang,
                target: targetLang,
                format: 'text'
            })
        });
        
        if (!response.ok) throw new Error('Translation failed');
        
        const data = await response.json();
        return {
            translated: data.translatedText,
            from: sourceLang,
            to: targetLang,
            original: text
        };
    } catch (error) {
        console.error('Translation error:', error);
        
        // Вариант 2: Fallback - MyMemory API (если первый не работает)
        try {
            const fallbackResponse = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`);
            const fallbackData = await fallbackResponse.json();
            return {
                translated: fallbackData.responseData.translatedText,
                from: sourceLang,
                to: targetLang,
                original: text
            };
        } catch (fallbackError) {
            console.error('Fallback translation error:', fallbackError);
            return { translated: text, from: sourceLang, to: targetLang, error: true };
        }
    }
}

// Функция для отображения перевода под сообщением
function addTranslateButton(messageId, text, messageElement) {
    const translateBtn = document.createElement('button');
    translateBtn.className = 'translate-btn';
    translateBtn.innerHTML = '🌐 ПЕРЕВЕСТИ';
    translateBtn.style.cssText = `
        background: none;
        border: 1px solid #000;
        border-radius: 4px;
        padding: 2px 8px;
        font-size: 10px;
        cursor: pointer;
        margin-left: 8px;
        color: #000;
    `;
    
    let translationShown = false;
    let translationElement = null;
    
    translateBtn.onclick = async () => {
        if (translationShown && translationElement) {
            translationElement.remove();
            translationShown = false;
            translateBtn.innerHTML = '🌐 ПЕРЕВЕСТИ';
            return;
        }
        
        translateBtn.innerHTML = '⏳ ПЕРЕВОД...';
        translateBtn.disabled = true;
        
        const result = await translateText(text);
        
        translateBtn.innerHTML = '🌐 СКРЫТЬ';
        translateBtn.disabled = false;
        
        translationElement = document.createElement('div');
        translationElement.className = 'translation';
        translationElement.style.cssText = `
            margin-top: 8px;
            padding: 6px 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            border-left: 3px solid #d4af37;
        `;
        
        if (result.error) {
            translationElement.innerHTML = `❌ Ошибка перевода. Язык: ${result.from === 'ru' ? 'русский' : (result.from === 'en' ? 'английский' : 'неизвестный')}`;
        } else if (result.alreadyRussian) {
            translationElement.innerHTML = `📖 Сообщение уже на русском языке`;
        } else {
            translationElement.innerHTML = `
                <strong>📝 Перевод с ${result.from === 'ru' ? 'русского' : (result.from === 'en' ? 'английского' : 'другого')}:</strong><br>
                ${result.translated}
                ${result.original !== result.translated ? `<small style="display:block; margin-top:4px; color:#666;">🔤 Оригинал: ${result.original.substring(0, 50)}${result.original.length > 50 ? '...' : ''}</small>` : ''}
            `;
        }
        
        const actionsDiv = messageElement.querySelector('.msg-actions') || messageElement;
        actionsDiv.parentNode.insertBefore(translationElement, actionsDiv.nextSibling);
        translationShown = true;
    };
    
    // Добавляем кнопку в контейнер с действиями
    const actionsDiv = messageElement.querySelector('.msg-actions');

    } else {
        const timeDiv = messageElement.querySelector('.time');
        if (timeDiv) {
            timeDiv.parentNode.insertBefore(translateBtn, timeDiv.nextSibling);
        }
    }
}

        // ========== ИСПРАВЛЕННАЯ СИСТЕМА STREAK ==========
function updateStreak(chatPartner) {
    const user = App.currentUser;
    if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk' || 
        App.systemBots.includes(chatPartner) || App.channels[chatPartner]) return 0;
    
    const chatId = [user, chatPartner].sort().join('_');
    const today = new Date().toDateString();
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toDateString();
    
    // Инициализация структуры streak для чата
    if (!App.streaks[chatId]) {
        App.streaks[chatId] = {
            streak: 0,
            lastMessageDate: null,
            lastUpdateDate: null,  // Дата последнего обновления streak
            users: {}
        };
    }
    
    // Инициализация данных для каждого пользователя
    [user, chatPartner].forEach(u => {
        if (!App.streaks[chatId].users[u]) {
            App.streaks[chatId].users[u] = {
                lastMessageDate: null,
                streak: 0
            };
        }
    });
    
    const userData = App.streaks[chatId].users[user];
    const partnerData = App.streaks[chatId].users[chatPartner];
    
    // Запоминаем, что текущий пользователь написал сегодня
    userData.lastMessageDate = today;
    
    // Проверяем, писал ли собеседник сегодня
    const partnerWroteToday = partnerData.lastMessageDate === today;
    
    // Если оба написали сегодня
    if (partnerWroteToday) {
        // Проверяем, был ли вчера последний общий день
        const lastCommonDay = App.streaks[chatId].lastMessageDate;
        
        if (lastCommonDay === yesterdayStr) {
            // Если вчера был общий день, увеличиваем счетчик
            App.streaks[chatId].streak++;
            userData.streak = App.streaks[chatId].streak;
            partnerData.streak = App.streaks[chatId].streak;
        } else if (lastCommonDay !== today) {
            // Если не было общего дня вчера, начинаем новую серию
            App.streaks[chatId].streak = 1;
            userData.streak = 1;
            partnerData.streak = 1;
        } else {
            // Если уже сегодня обновляли, синхронизируем значения
            userData.streak = App.streaks[chatId].streak;
            partnerData.streak = App.streaks[chatId].streak;
        }
        
        // Обновляем дату последнего общего дня
        App.streaks[chatId].lastMessageDate = today;
        App.streaks[chatId].lastUpdateDate = today;
    } else {
        // Если сегодня писал только один пользователь, не обновляем streak
        // Но синхронизируем значения, если они различаются
        const currentStreak = App.streaks[chatId].streak;
        userData.streak = currentStreak;
        partnerData.streak = currentStreak;
    }
    
    // Проверка на следующий день - сброс, если не писали оба
    const lastUpdate = App.streaks[chatId].lastUpdateDate;
    if (lastUpdate && lastUpdate !== today && lastUpdate !== yesterdayStr) {
        // Если прошло больше дня без общих сообщений, сбрасываем streak
        App.streaks[chatId].streak = 0;
        userData.streak = 0;
        partnerData.streak = 0;
        App.streaks[chatId].lastMessageDate = null;
    }
    
    // Сохраняем изменения
    saveStreaks();
    
    // Возвращаем текущий streak для отображения
    return App.streaks[chatId].streak;
}

// Функция для получения streak (синхронизированного)
function getStreak(chatPartner) {
    const user = App.currentUser;
    if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk' || 
        App.systemBots.includes(chatPartner) || App.channels[chatPartner]) return 0;
    
    const chatId = [user, chatPartner].sort().join('_');
    const today = new Date().toDateString();
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayStr = yesterday.toDateString();
    
    if (!App.streaks[chatId]) return 0;
    
    const streakData = App.streaks[chatId];
    const lastUpdate = streakData.lastUpdateDate;
    
    // Проверяем, не истекла ли серия
    if (lastUpdate && lastUpdate !== today && lastUpdate !== yesterdayStr) {
        // Если последнее обновление было больше дня назад, серия прервана
        if (streakData.streak > 0) {
            streakData.streak = 0;
            if (streakData.users[user]) streakData.users[user].streak = 0;
            if (streakData.users[chatPartner]) streakData.users[chatPartner].streak = 0;
            saveStreaks();
        }
        return 0;
    }
    
    // Возвращаем синхронизированное значение
    const userStreak = streakData.users[user]?.streak || 0;
    const partnerStreak = streakData.users[chatPartner]?.streak || 0;
    
    // Если значения различаются, синхронизируем
    if (userStreak !== partnerStreak && streakData.streak > 0) {
        const maxStreak = Math.max(userStreak, partnerStreak, streakData.streak);
        streakData.streak = maxStreak;
        streakData.users[user].streak = maxStreak;
        streakData.users[chatPartner].streak = maxStreak;
        saveStreaks();
        return maxStreak;
    }
    
    return streakData.streak;
}

// Функция для синхронизации streak между пользователями при загрузке
function syncStreak(chatPartner) {
    const user = App.currentUser;
    if (!user || !chatPartner) return;
    
    const chatId = [user, chatPartner].sort().join('_');
    if (!App.streaks[chatId]) return;
    
    const streakData = App.streaks[chatId];
    const userStreak = streakData.users[user]?.streak || 0;
    const partnerStreak = streakData.users[chatPartner]?.streak || 0;
    const commonStreak = streakData.streak || 0;
    
    // Синхронизируем все три значения
    const maxStreak = Math.max(userStreak, partnerStreak, commonStreak);
    streakData.streak = maxStreak;
    if (streakData.users[user]) streakData.users[user].streak = maxStreak;
    if (streakData.users[chatPartner]) streakData.users[chatPartner].streak = maxStreak;
    
    saveStreaks();
}

// Обновляем функцию renderMessages, чтобы синхронизировать streak при отображении
// Добавляем вызов syncStreak при загрузке чата
function loadMessages(chatPartner) {
    if (chatPartner === 'saved' || chatPartner === 'yolk') {
        renderMessages(chatPartner);
        return;
    }
    if (chatPartner === '@game_bot' || chatPartner === '@tap_bot' || chatPartner === '@random_bot') {
        renderMessages(chatPartner);
        return;
    }
    if (App.channels[chatPartner]) {
        renderMessages(chatPartner);
        return;
    }
    
    // Синхронизируем streak при загрузке чата
    syncStreak(chatPartner);
    
    const chatId = [App.currentUser, chatPartner].sort().join('_');
    setupRealtimeListener(chatId, chatPartner);
    renderMessages(chatPartner);
    setupUserListener(chatPartner);
    updateChatHeaderStatus(chatPartner);
}

// Обновляем функцию getStreakForDisplay для отображения в чате
function getStreakForDisplay(chatPartner) {
    const streak = getStreak(chatPartner);
    return streak > 0 ? streak : 0;
}

// Обновляем функцию renderChatItem для отображения синхронизированного streak

// Обновляем функцию renderMessage для отображения streak в хедере чата
function updateChatHeaderStatus(username) {
    if (App.channels[username]) return;
    
    const headerInfo = document.querySelector('.chat-header-info');
    if (!headerInfo) return;
    
    const existingStatus = headerInfo.querySelector('.chat-user-status');
    if (existingStatus) existingStatus.remove();
    
    const existingStreak = headerInfo.querySelector('.streak-badge');
    if (existingStreak) existingStreak.remove();
    
    const existingNameStrong = headerInfo.querySelector('strong');
    if (existingNameStrong) {
        existingNameStrong.innerHTML = formatUserNameWithStatus(username) + 
            (App.users[username]?.verified ? '<span class="verified-icon"></span>' : '');
    }
    
    // Получаем синхронизированный streak
    const streak = getStreakForDisplay(username);
    if (streak > 0) {
        const streakDiv = document.createElement('span');
        streakDiv.className = 'streak-badge';
        streakDiv.innerHTML = `🔥 ${streak}`;
        existingNameStrong?.appendChild(streakDiv);
    }
    
    if (username === 'saved' || username === 'yolk') return;
    
    const isOnline = isUserOnline(username);
    const lastSeenText = formatLastSeen(App.users[username]?.lastSeen, username);
    const statusDiv = document.createElement('div');
    statusDiv.className = 'chat-user-status' + (isOnline ? '' : ' offline');
    statusDiv.textContent = isOnline ? 'в сети' : `был(а) ${lastSeenText}`;
    headerInfo.appendChild(statusDiv);
}

// Также обновляем функцию saveStreaks для сохранения в Firebase
function saveStreaks() {
    localStorage.setItem('yolk_streaks', JSON.stringify(App.streaks));
    if (App.dataLoaded) {
        database.ref('streaks').set(App.streaks).catch(e => console.error(e));
    }
}

// Обновляем функцию loadStreaks для загрузки из Firebase
function loadStreaks() {
    const saved = localStorage.getItem('yolk_streaks');
    if (saved) {
        try {
            App.streaks = JSON.parse(saved);
            // Синхронизируем все чаты при загрузке
            if (App.currentUser) {
                const chats = getChatListForUser(App.currentUser);
                chats.forEach(chat => {
                    if (chat !== 'saved' && chat !== 'yolk' && !App.systemBots.includes(chat) && !App.channels[chat]) {
                        syncStreak(chat);
                    }
                });
            }
        } catch(e) {
            App.streaks = {};
        }
    } else {
        App.streaks = {};
    }
}

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function formatLastSeen(lastSeen, chatPartner) {
            if (chatPartner === 'saved' || chatPartner === 'yolk') return '';
            if (!lastSeen) return 'очень давно';
            const now = Date.now();
            const diff = now - lastSeen;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (minutes < 1) return 'только что';
            if (minutes < 5) return `${minutes} мин назад`;
            if (minutes < 15) return '5 мин назад';
            if (minutes < 30) return '15 мин назад';
            if (minutes < 60) return '30 мин назад';
            if (hours < 2) return '1 час назад';
            if (hours < 5) return `${hours} часа назад`;
            if (hours < 24) return `${hours} часов назад`;
            if (days === 1) return '1 день назад';
            if (days < 5) return `${days} дня назад`;
            return `${days} дней назад`;
        }

        async function createNft(grid, owner) {
            if (!App.users[owner]) return false;
            if (App.users[owner].stars < 50) { showNotification('Недостаточно YC (нужно 50)', 'error'); return false; }
            const nftObj = { grid: grid, createdAt: Date.now() };
            if (!App.users[owner].nfts) App.users[owner].nfts = [];
            App.users[owner].nfts.push(nftObj);
            App.users[owner].stars -= 50;
            saveToFirebase();
            updateUserInterface();
            showNotification('Открытка создана!');
            return true;
        }

).addEventListener('click', async () => { const success = await createNft(grid, App.currentUser); if (success) document.getElementById('nftCreatorModal').remove(); }); document.getElementById('closeNftCreator').addEventListener('click', () => { document.getElementById('nftCreatorModal').remove(); }); }

        window.sendGiftToUser = function(toUser, giftEmoji) { 
            const fromUser = App.currentUser; 
            const userGifts = [...(App.users[fromUser].gifts || [])];
            const hasGift = userGifts.includes(giftEmoji);
            if (!hasGift) {
                showNotification('У вас нет такого подарка!', 'error');
                return;
            }
            const indexToRemove = userGifts.indexOf(giftEmoji); 
            if (indexToRemove !== -1) userGifts.splice(indexToRemove, 1); 
            App.users[fromUser].gifts = userGifts; 
            if (!App.users[toUser].gifts) App.users[toUser].gifts = []; 
            App.users[toUser].gifts.push(giftEmoji); 
            const chatId = ensureChat(fromUser, toUser); 
            if (chatId && App.chats[chatId]) { 
                App.chats[chatId].messages.push({ from: fromUser, text: `ПОДАРОК ${giftEmoji} ОТ ${fromUser}`, time: Date.now(), gift: true }); 
                showConfetti(); 
                playHappySound(); 
            } 
            saveToFirebase(); 
            if (App.activeChat === toUser) renderMessages(toUser); 
            updateUserInterface(); 
            const giftModal = document.getElementById('giftModalOverlay');
            if (giftModal) giftModal.remove();
            showNotification(`Подарок ${giftEmoji} отправлен ${toUser}!`); 
        };

        // ========== СМЕНА ЮЗЕРНЕЙМА ==========
        function changeUsername(newUsername) {
            const oldUsername = App.currentUser;
            const newName = '@' + newUsername.toLowerCase();
            
            if (!isValidUsername(newUsername)) {
                showNotification('Юзернейм должен содержать только англ буквы и цифры (4-15 символов)', 'error');
                return false;
            }
            
            if (App.users[newName]) {
                showNotification('Пользователь с таким именем уже существует', 'error');
                return false;
            }
            
            if (App.systemBots.includes(newName)) {
                showNotification('Это имя занято системой', 'error');
                return false;
            }
            
            if (App.users[oldUsername].stars < 1500) {
                showNotification('Недостаточно YC! Нужно 1500 YC для смены имени', 'error');
                return false;
            }
            
            App.users[oldUsername].stars -= 1500;
            
            const userData = { ...App.users[oldUsername] };
            delete userData.password;
            
            App.users[newName] = { ...userData, password: App.users[oldUsername].password };
            
            const oldChats = Object.keys(App.chats);
            for (let chatId of oldChats) {
                const chat = App.chats[chatId];
                if (chat.user1 === oldUsername || chat.user2 === oldUsername) {
                    const newUser1 = chat.user1 === oldUsername ? newName : chat.user1;
                    const newUser2 = chat.user2 === oldUsername ? newName : chat.user2;
                    const newChatId = [newUser1, newUser2].sort().join('_');
                    App.chats[newChatId] = { ...chat, user1: newUser1, user2: newUser2 };
                    delete App.chats[chatId];
                }
            }
            
            if (App.savedMessages[oldUsername]) {
                App.savedMessages[newName] = App.savedMessages[oldUsername];
                delete App.savedMessages[oldUsername];
                saveSavedMessages();
            }
            
            if (App.yolkChatMessages[oldUsername]) {
                App.yolkChatMessages[newName] = App.yolkChatMessages[oldUsername];
                delete App.yolkChatMessages[oldUsername];
                saveYolkChatMessages();
            }
            
            for (let channelId in App.channels) {
                const channel = App.channels[channelId];
                if (channel.owner === oldUsername) {
                    channel.owner = newName;
                }
                if (channel.subscribers) {
                    const index = channel.subscribers.indexOf(oldUsername);
                    if (index !== -1) channel.subscribers[index] = newName;
                }
            }
            
            delete App.users[oldUsername];
            App.currentUser = newName;
            localStorage.setItem('yolk_current_user', newName);
            
            saveToFirebase();
            updateUserInterface();
            render();
            showNotification(`✅ Имя успешно изменено на ${newName}! Снято 1500 YC`);
            return true;
        }

            document.body.insertAdjacentHTML('beforeend', modalHtml); 
            setTimeout(() => { const qrDiv = document.getElementById('donationQrCode'); if (qrDiv) { qrDiv.innerHTML = ''; new QRCode(qrDiv, { text: TON_ADDRESS, width: 200, height: 200 }); } }, 100); 
            document.getElementById('submitDonationBtn')?.addEventListener('click', () => { 
                const txid = document.getElementById('donationTxid')?.value.trim(); 
                const comment = document.getElementById('donationComment')?.value.trim(); 
                if (!txid) { showNotification('Введите TXID транзакции', 'error'); return; } 
                if (!comment || !comment.startsWith('@')) { showNotification('Укажите ваш юзернейм с @ в комментарии', 'error'); return; } 
                const requestId = generateId(); 
                if (!App.donationRequests) App.donationRequests = {};
                App.donationRequests[requestId] = { id: requestId, user: App.currentUser, username: comment, yc: pack.yc, ton: pack.ton, txid: txid, status: 'pending', createdAt: Date.now(), giftEmoji: pack.giftEmoji || null, statusType: pack.status || null }; 
                saveToFirebase(); 
                document.getElementById('donationModalOverlay')?.remove(); 
                showNotification(`✅ Заявка отправлена! Ожидайте начисления. ID: ${requestId.slice(-6)}`); 
            }); 
            document.getElementById('closeDonationModal')?.addEventListener('click', () => { document.getElementById('donationModalOverlay')?.remove(); }); 
        }
        
        window.confirmDonation = function(requestId) { 
            const request = App.donationRequests[requestId]; 
            if (!request || request.status !== 'pending') return; 
            const targetUser = request.user; 
            if (App.users[targetUser]) { 
                if (request.statusType) { 
                    App.users[targetUser].status = request.statusType; 
                    showNotification(`✨ СТАТУС ${request.statusType} активирован для ${request.username}! ✨`); 
                    updateUserInterface(); 
                    if (App.activeChat && App.activeChat !== 'saved' && !App.channels[App.activeChat]) { 
                        renderMessages(App.activeChat); 
                        updateChatList(); 
                    } 
                } else if (request.giftEmoji) { 
                    if (!App.users[targetUser].gifts) App.users[targetUser].gifts = []; 
                    App.users[targetUser].gifts.push(request.giftEmoji); 
                    showNotification(`✅ Подарок ${request.giftEmoji} отправлен ${request.username}`); 
                    updateUserInterface(); 
                } else { 
                    App.users[targetUser].stars = (App.users[targetUser].stars || 0) + request.yc; 
                    showNotification(`✅ Начислено ${request.yc} YC пользователю ${request.username}`); 
                    updateUserInterface(); 
                } 
                request.status = 'completed'; 
                request.completedAt = Date.now(); 
                saveToFirebase(); 
                if (!App.yolkChatMessages[targetUser]) App.yolkChatMessages[targetUser] = []; 
                let messageText = request.statusType ? `✨ Вы получили СТАТУС ${request.statusType} НАВСЕГДА! ✨` : (request.giftEmoji ? `🎁 Вам отправили подарок ${request.giftEmoji}!` : `✅ Пополнение баланса!\n💰 +${request.yc} YC\nСпасибо за поддержку!`); 
                App.yolkChatMessages[targetUser].push({ from: 'SYSTEM', text: messageText, time: Date.now() }); 
                saveToFirebase(); 
                if (App.currentUser === ADMIN_USER) { 
                    document.getElementById('adminModalOverlay')?.remove(); 
                    openAdminPanel(); 
                } 
            } 
        };
        
        window.cancelDonation = function(requestId) { 
            if (!confirm('Вы уверены, что хотите отменить эту заявку?')) return; 
            const request = App.donationRequests[requestId]; 
            if (!request || request.status !== 'pending') return; 
            delete App.donationRequests[requestId]; 
            saveToFirebase(); 
            showNotification(`❌ Заявка отменена`); 
            if (App.currentUser === ADMIN_USER) { 
                document.getElementById('adminModalOverlay')?.remove(); 
                openAdminPanel(); 
            } 
        };

            if (existingStatus) existingStatus.remove();

            if (existingStreak) existingStreak.remove();

            if (existingNameStrong) {

        }

        window.sendBotCommand = function(botName, command) { let response; if (botName === '@game_bot') response = handleGameBot({ text: command }, App.currentUser); else if (botName === '@tap_bot') response = handleTapBot({ text: command }, App.currentUser); else if (botName === '@random_bot') response = handleRandomBot({ text: command }, App.currentUser); if (response) { const botMessage = { from: botName, text: response.text, time: Date.now(), buttons: response.buttons }; const chatId = [App.currentUser, botName].sort().join('_'); if (!App.chats[chatId]) App.chats[chatId] = { user1: App.currentUser, user2: botName, messages: [] }; App.chats[chatId].messages.push(botMessage); saveToFirebase(); renderMessages(botName); } };
        window.openImageModal = function(src) { const modalHtml = `<div class="modal-overlay" id="imageModal" onclick="this.remove()"><div style="max-width:90%; max-height:90%; display:flex; justify-content:center; align-items:center;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); };
        function initBots() { App.systemBots.forEach(bot => { if (!App.users[bot]) App.users[bot] = { password: 'bot', avatar: null, banner: null, stars: 0, gifts: [], nfts: [], bio: bot === '@game_bot' ? '🎰 Игровой автомат!' : (bot === '@tap_bot' ? '👆 Тапай!' : '🎲 Загадай число от 0 до 10!'), isBot: true, verified: true, status: 'GOLD', age: 99, twoFA: false, lastSeen: Date.now(), chatWallpaper: '' }; }); saveToFirebase(); }
        function loadFromFirebase() { console.log('🔄 Загрузка данных из Firebase...'); try { database.ref().get().then(snapshot => { if (snapshot.exists()) { const data = snapshot.val(); if (data.users) App.users = data.users; if (data.chats) App.chats = data.chats; if (data.blocked) App.blocked = data.blocked; if (data.channels) App.channels = data.channels; if (data.tapBalances) App.tapBalances = data.tapBalances; if (data.tapUpgrades) App.tapUpgrades = data.tapUpgrades; if (data.yolkChatMessages) App.yolkChatMessages = data.yolkChatMessages; if (data.streaks) App.streaks = data.streaks; if (data.privacySettings) App.privacySettings = data.privacySettings; localStorage.setItem('yolk_cache', JSON.stringify({ users: App.users, chats: App.chats, blocked: App.blocked, channels: App.channels })); if (data.tapBalances || data.tapUpgrades) saveTapBalances(); if (data.yolkChatMessages) saveYolkChatMessages(); if (data.streaks) saveStreaks(); if (data.privacySettings) savePrivacySettings(); } else { console.log('⚠️ База данных пуста'); } const savedUser = localStorage.getItem('yolk_current_user'); const savedChat = localStorage.getItem('yolk_active_chat'); if (savedUser && App.users[savedUser]) { App.currentUser = savedUser; App.activeChat = savedChat && (savedChat === 'saved' || savedChat === 'yolk' || App.users[savedChat] || App.channels[savedChat]) ? savedChat : 'saved'; loadSavedMessages(); loadTapBalances(); loadYolkChatMessages(); loadStreaks(); loadPrivacySettings(); setupUserListener(App.currentUser); if (App.lastSeenInterval) clearInterval(App.lastSeenInterval); App.lastSeenInterval = setInterval(() => { updateLastSeen(App.currentUser); }, 30000); updateLastSeen(App.currentUser); } App.dataLoaded = true; render(); }).catch(error => { console.error('❌ Ошибка Firebase:', error); const cachedData = localStorage.getItem('yolk_cache'); if (cachedData) { try { const cache = JSON.parse(cachedData); if (cache.users) App.users = cache.users; if (cache.chats) App.chats = cache.chats; if (cache.blocked) App.blocked = cache.blocked; if (cache.channels) App.channels = cache.channels; console.log('📦 Загружено из кэша:', Object.keys(App.users).length); } catch(e) { } } const savedUser = localStorage.getItem('yolk_current_user'); if (savedUser && App.users[savedUser]) { App.currentUser = savedUser; App.activeChat = localStorage.getItem('yolk_active_chat') || 'saved'; loadSavedMessages(); loadTapBalances(); loadYolkChatMessages(); loadStreaks(); loadPrivacySettings(); setupUserListener(App.currentUser); } App.dataLoaded = true; render(); }); } catch (error) { console.error('❌ Ошибка Firebase:', error); } }
        window.addEventListener('load', () => { initBots(); loadFromFirebase(); });
    </script>
