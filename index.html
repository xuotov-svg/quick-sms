    <script>
        const firebaseConfig = { apiKey: "AIzaSyDHddUllNs1CllRVOoR8MDP9qo3bfZnqM4", authDomain: "quick-sms-772c4.firebaseapp.com", databaseURL: "https://quick-sms-772c4-default-rtdb.firebaseio.com", projectId: "quick-sms-772c4", storageBucket: "quick-sms-772c4.firebasestorage.app", messagingSenderId: "722370764251", appId: "1:722370764251:web:1f93437108ee3d54f15bfe" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const ADMIN_USER = '@xuotov';
        const TON_ADDRESS = 'UQAR2F00H7mfSjtFwX9eXr_Qu1Vg8M3PKj4_bNyY5dC2niez';
        const DONATION_PACKS = [{ yc: 100, ton: 1.41 }, { yc: 200, ton: 2.64 }, { yc: 500, ton: 6.3 }];
        const DONATION_GIFTS = [{ emoji: '🥚', ton: 0.5 }, { emoji: '🍳', ton: 1.5 }];
        
        const App = { users: {}, chats: {}, currentUser: null, activeChat: null, pinnedChats: [], dataLoaded: false, tempPhoto: null, tempAvatar: null, tempBanner: null, tempWallpaper: null, savedMessages: {}, donationRequests: {}, userListeners: {}, soundEnabled: true, audioCtx: null, systemBots: ['@game_bot', '@tap_bot', '@random_bot'], gameSymbols: ['🐣', '🛩️', '7️⃣', '🍳', '🥚', '🔥', '🌊', '🍭', '🍬'], tapBalances: {}, tapUpgrades: {}, yolkChatMessages: {} };
        
        function formatLastSeen(ts) { if(!ts) return 'очень давно'; let d = Math.floor((Date.now() - ts) / 86400000); if(d === 1) return '1 день назад'; if(d > 1 && d < 5) return `${d} дня назад`; if(d >= 5) return `${d} дней назад`; let h = Math.floor((Date.now() - ts) / 3600000); if(h === 1) return '1 час назад'; if(h > 1 && h < 5) return `${h} часа назад`; if(h < 24) return `${h} часов назад`; return 'очень давно'; }
        function hasGold(u) { return App.users[u]?.gold === true; }
        function formatUserName(u, g) { return g ? `<span class="gold-name">${u}</span>` : u; }
        function isUserOnline(u) { let ls = App.users[u]?.lastSeen; return ls && (Date.now() - ls) < 300000; }
        function playSound() { if(!App.soundEnabled) return; try { if(!App.audioCtx) App.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); let ctx = App.audioCtx, o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); g.gain.value = 0.2; o.frequency.value = 880; o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3); o.stop(ctx.currentTime + 0.3); ctx.resume(); } catch(e) {} }
        function showConfetti() { for(let i=0;i<40;i++){ let d=document.createElement('div'); d.style.position='fixed'; d.style.left=Math.random()*100+'%'; d.style.top='0'; d.style.width='8px'; d.style.height='8px'; d.style.background=['#ffd700','#ffb347','#ff8c00'][Math.floor(Math.random()*3)]; d.style.animation='slideIn 0.5s ease-out forwards'; document.body.appendChild(d); setTimeout(()=>d.remove(),3000);} }
        function showNotify(msg, type='success'){ let n=document.createElement('div'); n.className='notification'+(type==='error'?' error':''); n.textContent=msg; document.body.appendChild(n); setTimeout(()=>n.remove(),3000); }
        function compressImg(d,w,h,q,cb){ let i=new Image(); i.onload=()=>{ let c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(i,0,0,w,h); cb(c.toDataURL('image/jpeg',q)); }; i.src=d; }
        function saveToFB() { if(!App.dataLoaded) return; db.ref().set({ users:App.users, chats:App.chats, pinnedChats:App.pinnedChats, savedMessages:App.savedMessages, donationRequests:App.donationRequests, tapBalances:App.tapBalances, tapUpgrades:App.tapUpgrades, yolkChatMessages:App.yolkChatMessages }); }
        function updateUI() { let ud = App.users[App.currentUser]; document.querySelectorAll('.star-balance').forEach(e=>e.innerHTML=`<span class="yc-currency"></span> ${ud?.stars||0} YC`); let av=document.querySelector('.user-profile .avatar'); if(av) av.innerHTML=ud?.avatar?`<img src="${ud.avatar}" class="avatar-img">`:(App.currentUser[1]||'?'); let un=document.querySelector('.user-profile .username-display'); if(un) un.innerHTML=formatUserName(App.currentUser, hasGold(App.currentUser))+(ud?.verified?'<span class="verified-icon"></span>':''); let wall=ud?.chatWallpaper; document.querySelector('.chat-area').style.backgroundImage=wall?`url('${wall}')`:'none'; }
        function ensureChat(a,b) { if(!a||!b||a===b) return; let id=[a,b].sort().join('_'); if(!App.chats[id]) App.chats[id]={user1:a,user2:b,messages:[]}; return id; }
        
        // NFT FUNCTIONS - с жесткой проверкой уникальности
        async function hashGrid(grid) { return Array.from(new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(JSON.stringify(grid))))).map(b=>b.toString(16).padStart(2,'0')).join(''); }
        async function isNftGlobalUnique(grid, excludeUser = null) { 
            let h = await hashGrid(grid); 
            for(let u in App.users) { 
                if(excludeUser && u === excludeUser) continue; 
                let nfts = App.users[u]?.nfts || []; 
                if(nfts.some(n => n.hash === h)) return false; 
            } 
            return true; 
        }
        async function createNft(grid, owner) {
            if(App.users[owner].stars < 50) { showNotify('Не хватает 50 YC','error'); return false; }
            if(!await isNftGlobalUnique(grid, owner)) { showNotify('❌ Такая NFT уже существует! Измените хотя бы один пиксель.','error'); return false; }
            let hash = await hashGrid(grid);
            if(!App.users[owner].nfts) App.users[owner].nfts = [];
            App.users[owner].nfts.push({ grid, hash, createdAt: Date.now() });
            App.users[owner].stars -= 50;
            saveToFB(); updateUI(); showNotify('✅ NFT создан! Теперь его можно подарить.');
            return true;
        }
        function openNftCreator() {
            if(App.users[App.currentUser].stars < 50) { showNotify('Нужно 50 YC','error'); return; }
            let html = `<div class="modal-overlay" id="nftCreateModal"><div class="profile-modal"><h3>🎨 СОЗДАТЬ NFT (10x10)</h3><div class="pixel-canvas" id="pixelCanvas"></div><div class="color-palette" id="colorPalette"></div><button class="create-nft-btn" id="createNftBtn">СОЗДАТЬ (50 YC)</button><div class="profile-actions"><button class="profile-btn secondary" id="closeNftCreate">ОТМЕНА</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', html);
            let grid = Array(10).fill().map(()=>Array(10).fill('#ffffff'));
            let curColor = '#000000';
            let canvas = document.getElementById('pixelCanvas');
            let palette = document.getElementById('colorPalette');
            let colors = ['#000000','#ffffff','#ff0000','#00ff00','#0000ff','#ffff00','#ff00ff','#00ffff','#ffa500','#800080'];
            colors.forEach(c => { let btn = document.createElement('div'); btn.className = `color-option ${c===curColor?'active':''}`; btn.style.backgroundColor = c; btn.onclick = () => { curColor = c; document.querySelectorAll('.color-option').forEach(x=>x.classList.remove('active')); btn.classList.add('active'); }; palette.appendChild(btn); });
            function renderCanvas() { canvas.innerHTML = ''; for(let i=0;i<10;i++) for(let j=0;j<10;j++) { let p = document.createElement('div'); p.className = 'pixel'; p.style.backgroundColor = grid[i][j]; p.onclick = () => { grid[i][j] = curColor; renderCanvas(); }; canvas.appendChild(p); } }
            renderCanvas();
            document.getElementById('createNftBtn').onclick = async () => { if(await createNft(grid, App.currentUser)) document.getElementById('nftCreateModal').remove(); };
            document.getElementById('closeNftCreate').onclick = () => document.getElementById('nftCreateModal').remove();
        }
        
        // Открытие меню подарков - фикс бесконечной передачи
        function openGiftMenu() {
            let target = App.activeChat;
            if(!target || target==='saved' || target==='yolk') { showNotify('Нельзя отправить подарок сюда','error'); return; }
            let gifts = App.users[App.currentUser].gifts || [];
            let nfts = App.users[App.currentUser].nfts || [];
            let giftHtml = gifts.map(g => `<div class="gift-item" data-gift="${g}">${g}</div>`).join('');
            let nftHtml = nfts.map((n,idx) => { let c=document.createElement('canvas'); c.width=32;c.height=32; let ctx=c.getContext('2d'); for(let i=0;i<10;i++)for(let j=0;j<10;j++)ctx.fillStyle=n.grid[i][j],ctx.fillRect(j*3.2,i*3.2,3.2,3.2); return `<div class="nft-item" data-nft-idx="${idx}"><img src="${c.toDataURL()}"></div>`; }).join('');

                sendGift(target, emoji); 
                document.getElementById('giftMenuModal').remove(); 
            });
            document.querySelectorAll('.nft-item').forEach(el=>el.onclick=()=>{ 
                let idx = parseInt(el.dataset.nftIdx); 
                let nft = nfts[idx]; 
                if(nft){ 
                    App.users[App.currentUser].nfts.splice(idx,1); 
                    if(!App.users[target].nfts) App.users[target].nfts=[]; 
                    App.users[target].nfts.push(nft);

                    let cid = [App.currentUser,target].sort().join('_'); 
                    if(!App.chats[cid]) App.chats[cid]={user1:App.currentUser,user2:target,messages:[]}; 
                    App.chats[cid].messages.push({from:App.currentUser,text:`🎁 ПОДАРОК NFT 🖼️`,time:Date.now(),gift:true}); 
                    saveToFB(); 
                    showConfetti(); 
                    playSound(); 
                    if(App.activeChat===target) renderMsgs(target); 
                    updateUI(); 
                    showNotify(`✅ NFT подарен ${target}!`); 
                    document.getElementById('giftMenuModal').remove(); 
                } 
            });
            document.getElementById('closeGiftMenu').onclick = () => document.getElementById('giftMenuModal').remove();
        }
        
        // Отправка подарка - с удалением ОДНОГО экземпляра
        function sendGift(to, emoji) {
            let from = App.currentUser;
            let idx = App.users[from].gifts.indexOf(emoji);
            if(idx !== -1) {
                App.users[from].gifts.splice(idx, 1);
                if(!App.users[to].gifts) App.users[to].gifts = [];
                App.users[to].gifts.push(emoji);
                let cid = [from,to].sort().join('_');
                if(!App.chats[cid]) App.chats[cid] = { user1:from, user2:to, messages:[] };
                App.chats[cid].messages.push({ from, text:`🎁 ПОДАРОК ${emoji}`, time:Date.now(), gift:true });
                saveToFB();
                showConfetti();
                playSound();
                if(App.activeChat===to) renderMsgs(to);
                updateUI();
                showNotify(`✅ Подарок ${emoji} отправлен ${to}`);
            } else {
                showNotify('Ошибка: подарок не найден','error');
            }
        }
        
        // Смена юзернейма
        function changeUsername(newUsername) {
            newUsername = '@' + newUsername.toLowerCase().replace(/^@/, '');
            if(!/^@[a-z0-9]{4,15}$/.test(newUsername)) { showNotify('Юзернейм: 4-15 англ букв/цифр','error'); return false; }
            if(App.users[newUsername]) { showNotify('Такой юзернейм уже занят','error'); return false; }
            if(App.users[App.currentUser].stars < 25) { showNotify('Нужно 25 YC для смены юзернейма','error'); return false; }
            let oldUser = App.currentUser;
            let userData = App.users[oldUser];
            userData.stars -= 25;
            delete App.users[oldUser];
            userData.oldUsername = oldUser;
            App.users[newUsername] = userData;
            for(let chatId in App.chats) {
                let chat = App.chats[chatId];
                if(chat.user1 === oldUser) chat.user1 = newUsername;
                if(chat.user2 === oldUser) chat.user2 = newUsername;
            }
            if(App.activeChat === oldUser) App.activeChat = newUsername;
            App.currentUser = newUsername;
            localStorage.setItem('yolk_current_user', newUsername);
            saveToFB();
            render();
            showNotify(`✅ Юзернейм изменен на ${newUsername}`);
            return true;
        }

t="image/*"></div></div>`:''}<div class="profile-actions"><button class="profile-btn" id="saveProfileBtn">СОХРАНИТЬ</button><button class="profile-btn secondary" id="closeProfileBtn">ЗАКРЫТЬ</button>${isOwn?'<button class="profile-btn logout" id="logoutBtn">ВЫЙТИ</button>':''}</div></div></div>`;

            document.getElementById('regBtn')?.addEventListener('click',()=>{ let u='@'+document.getElementById('regUser').value.trim().toLowerCase(), p=document.getElementById('regPass').value; if(!/^@[a-z0-9]{4,15}$/.test(u)){ document.getElementById('authErr').innerText='Только англ буквы и цифры, 4-15 символов'; return; } if(App.users[u]){ document.getElementById('authErr').innerText='Пользователь уже существует'; return; } App.users[u]={password:p,stars:0,gifts:[],nfts:[],bio:'',age:14,verified:false,gold:false,avatar:null,banner:null,chatWallpaper:'',twoFA:false,lastSeen:Date.now()}; saveToFB(); App.currentUser=u; localStorage.setItem('yolk_user',u); App.activeChat='saved'; render(); });
        }
        
        function renderMain(){ return `<div class="main-container"><div class="sidebar ${App.sidebarOpen?'open':''}"><div class="user-profile" id="openProfile"><div class="avatar">${App.users[App.currentUser]?.avatar?`<img src="${App.users[App.currentUser].avatar}" class="avatar-img">`:(App.currentUser[1]||'?')}</div><div><div class="username-display">${formatUserName(App.currentUser, hasGold(App.currentUser))}${App.users[App.currentUser]?.verified?'<span class="verified-icon"></span>':''}</div><div class="star-balance"><span class="yc-currency"></span> ${App.users[App.currentUser]?.stars||0} YC</div></div></div><div class="search-add"><input id="searchUser" placeholder="ПОИСК @юзернейм"><button class="icon-btn" id="addUserBtn">+</button></div><div class="chats-list" id="chatsList"></div></div><div class="chat-area"><div class="chat-header"><div class="chat-header-info"><button class="back-btn ${window.innerWidth<768?'visible':''}" id="backBtn">←</button><strong>${App.activeChat==='saved'?'ИЗБРАННОЕ':(App.activeChat==='yolk'?'YOLK':App.activeChat||'')}</strong></div><div class="chat-actions">${App.activeChat && App.activeChat!=='saved' && App.activeChat!=='yolk'?`<button class="tiny-btn" id="giftBtnChat">🎁</button><button class="tiny-btn" id="viewProfileChat">👤</button>`:''}</div></div><div class="messages-container" id="messageList"></div><div class="input-area"><input type="text" id="msgText" placeholder="Сообщение..."><label class="file-label" for="fileUp">📷</label><input type="file" id="fileUp" accept="image/*" style="display:none"><button class="send-btn" id="sendMsg">➤</button></div></div></div>`; }
        
        function attachMain(){
            document.getElementById('backBtn')?.addEventListener('click',()=>{ App.sidebarOpen=true; document.querySelector('.sidebar').classList.add('open'); });
            document.getElementById('openProfile')?.addEventListener('click',()=>openProfileModal(App.currentUser));
            document.getElementById('viewProfileChat')?.addEventListener('click',()=>{ if(App.activeChat && App.activeChat!=='saved' && App.activeChat!=='yolk') openProfileModal(App.activeChat); });
            document.getElementById('giftBtnChat')?.addEventListener('click',openGiftMenu);
            document.getElementById('sendMsg')?.addEventListener('click',sendMsg);
            document.getElementById('msgText')?.addEventListener('keypress',e=>{ if(e.key==='Enter') sendMsg(); });
            document.getElementById('addUserBtn')?.addEventListener('click',()=>{ let q=document.getElementById('searchUser').value.trim().toLowerCase(); if(!q.startsWith('@')) q='@'+q; if(App.users[q]){ App.activeChat=q; localStorage.setItem('yolk_active',q); render(); } else showNotify('Пользователь не найден','error'); });
            document.getElementById('fileUp')?.addEventListener('change',e=>{ let f=e.target.files[0]; if(f){ let r=new FileReader(); r.onload=ev=>{ compressImg(ev.target.result,800,800,0.6,c=>{ App.tempPhoto=c; sendMsg(); }); }; r.readAsDataURL(f); } });
        }
        
        function sendMsg(){
            let txt = document.getElementById('msgText')?.value.trim();
            if(!txt && !App.tempPhoto) return;
            let msg = { from:App.currentUser, text:txt||'', time:Date.now(), photo:App.tempPhoto||null };
            if(App.activeChat === 'saved'){
                if(!App.savedMessages[App.currentUser]) App.savedMessages[App.currentUser]=[];
                App.savedMessages[App.currentUser].push(msg);
                localStorage.setItem('yolk_saved',JSON.stringify(App.savedMessages[App.currentUser]));
                renderMsgs('saved');
            }else{
                let cid = [App.currentUser, App.activeChat].sort().join('_');
                if(!App.chats[cid]) App.chats[cid] = { user1:App.currentUser, user2:App.activeChat, messages:[] };
                App.chats[cid].messages.push(msg);
                saveToFB();
                renderMsgs(App.activeChat);
            }
            document.getElementById('msgText').value = '';
            App.tempPhoto = null;
            playSound();
            updateChatList();
        }
        
        function loadMsgs(chat){ if(chat==='saved') renderMsgs('saved'); else renderMsgs(chat); if(chat!=='saved' && chat!=='yolk') updateChatHeaderStatus(chat); }
        
        function renderMsgs(chat){
            let msgs = [];
            if(chat==='saved') msgs = App.savedMessages[App.currentUser] || [];
            else if(App.chats[[App.currentUser,chat].sort().join('_')]) msgs = App.chats[[App.currentUser,chat].sort().join('_')].messages || [];
            let html = msgs.map((m,i)=>`<div class="message ${m.from===App.currentUser?'me':''} ${m.gift?'gift-message':''}"><small>${m.from!==App.currentUser?`<span class="message-username" onclick="openProfileModal('${m.from}')">${formatUserName(m.from, hasGold(m.from))}</span><br>`:''}</small><div>${m.text||''}</div>${m.photo?`<img src="${m.photo}" class="media-preview" onclick="window.open(this.src)">`:''}<div class="time">${new Date(m.time).toLocaleTimeString().slice(0,5)}</div>${(m.from===App.currentUser || chat==='saved')?`<div class="msg-actions"><button onclick="deleteMsg('${chat}',${i})">УДАЛИТЬ</button></div>`:''}</div>`).join('') || '<div style="text-align:center;color:#666;padding:20px">Нет сообщений</div>';
            document.getElementById('messageList').innerHTML = html;
            setTimeout(()=>document.getElementById('messageList').scrollTop=document.getElementById('messageList').scrollHeight,100);
        }
        
        window.deleteMsg = function(chat,idx){
            if(chat==='saved'){ App.savedMessages[App.currentUser].splice(idx,1); localStorage.setItem('yolk_saved',JSON.stringify(App.savedMessages[App.currentUser])); renderMsgs('saved'); }
            else{ let cid=[App.currentUser,chat].sort().join('_'); if(App.chats[cid]?.messages) App.chats[cid].messages.splice(idx,1); saveToFB(); renderMsgs(chat); }
        };
        
        function updateChatList(){
            let list = ['saved'];
            for(let c in App.chats){
                if(App.chats[c].user1 === App.currentUser) list.push(App.chats[c].user2);
                if(App.chats[c].user2 === App.currentUser) list.push(App.chats[c].user1);
            }
            list = [...new Set(list)];
            let html = list.map(c=>`<div class="chat-item ${c===App.activeChat?'active':''} ${App.pinnedChats.includes(c)?'pinned':''}" data-chat="${c}"><div class="chat-avatar">${c==='saved'?'📁':c[1]||'@'}</div><div>${c==='saved'?'ИЗБРАННОЕ':c}</div><span class="pin-icon" onclick="event.stopPropagation();togglePin('${c}')">📌</span><span class="delete-chat-icon" onclick="event.stopPropagation();deleteChat('${c}')">🗑️</span></div>`).join('');
            document.getElementById('chatsList').innerHTML = html;
            document.querySelectorAll('.chat-item').forEach(el=>el.addEventListener('click',()=>{ App.activeChat=el.dataset.chat; localStorage.setItem('yolk_active',App.activeChat); if(window.innerWidth<768) App.sidebarOpen=false; render(); }));
        }
        
        window.togglePin = function(c){
            if(App.pinnedChats.includes(c)) App.pinnedChats = App.pinnedChats.filter(x=>x!==c);
            else if(App.pinnedChats.length < 2) App.pinnedChats.push(c);
            else showNotify('Максимум 2 закрепленных чата','error');
            saveToFB(); updateChatList();
        };
        
        window.deleteChat = function(c){
            if(confirm(`Удалить чат ${c}?`)){
                let cid = [App.currentUser,c].sort().join('_');
                delete App.chats[cid];
                if(App.activeChat === c) App.activeChat = 'saved';
                saveToFB(); render();
            }
        };
        
        window.openProfileModal = openProfileModal;
        window.openGiftMenu = openGiftMenu;
        
        function loadData(){
            db.ref().get().then(s=>{ if(s.exists()){ let d=s.val(); if(d.users) App.users=d.users; if(d.chats) App.chats=d.chats; if(d.pinnedChats) App.pinnedChats=d.pinnedChats; if(d.savedMessages) App.savedMessages=d.savedMessages; if(d.donationRequests) App.donationRequests=d.donationRequests; } let u=localStorage.getItem('yolk_user'); if(u && App.users[u]){ App.currentUser=u; App.activeChat=localStorage.getItem('yolk_active')||'saved'; if(!App.savedMessages[App.currentUser]) App.savedMessages[App.currentUser]=[]; } App.dataLoaded=true; render(); }).catch(()=>{ let u=localStorage.getItem('yolk_user'); if(u && App.users[u]){ App.currentUser=u; App.activeChat='saved'; App.savedMessages[App.currentUser]=[]; } App.dataLoaded=true; render(); });
        }
        
        loadData();
    </script>
</body>
</html>
