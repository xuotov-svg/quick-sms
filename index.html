        function attachAuthEvents() {
            const errDiv = document.getElementById('authError');
            document.getElementById('showRegister')?.addEventListener('click', () => {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                if (errDiv) errDiv.textContent = '';
            });
            document.getElementById('showLogin')?.addEventListener('click', () => {
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('loginForm').style.display = 'block';
                if (errDiv) errDiv.textContent = '';
            });
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                const rawUsername = document.getElementById('loginUsername').value.trim().toLowerCase();
                const u = '@' + rawUsername;
                const e = document.getElementById('loginEmail').value.trim();
                const p = document.getElementById('loginPassword').value;
                if (!users[u] || users[u].password !== p || users[u].email !== e) {
                    if (errDiv) errDiv.textContent = 'Invalid credentials';
                    return;
                }
                loginUser(u);
            });
            document.getElementById('registerBtn')?.addEventListener('click', async () => {
                const raw = document.getElementById('regUsername').value.trim();
                if (!isValidUsername(raw)) {
                    if (errDiv) errDiv.textContent = 'Username: 1-15 characters, English letters only (a-z, A-Z), numbers and underscores allowed. Must start with a letter.';
                    return;
                }
                const u = '@' + raw.toLowerCase();
                if (users[u]) { if (errDiv) errDiv.textContent = 'Username already taken'; return; }
                const e = document.getElementById('regEmail').value.trim();
                const p = document.getElementById('regPassword').value;
                if (!e || !p) { if (errDiv) errDiv.textContent = 'Fill all fields'; return; }
                users[u] = { password: p, email: e, avatar: null, banner: null, bio: '', displayName: raw, followers: [], following: [], badges: [], premium: false };
                saveToLocalStorage();
                if (dataLoaded) {
                    try { await supabase.from('app_state').upsert({ id: STATE_ID, data: { users, posts } }, { onConflict: 'id' }); } catch (e) {}
                }
                loginUser(u);
            });
            document.getElementById('regUsername')?.addEventListener('input', function() {
                const val = this.value;
                if (val && !/^[a-zA-Z][a-zA-Z0-9_]*$/.test(val) && val.length > 0) {
                    this.style.borderColor = '#ff6b6b';
                } else {
                    this.style.borderColor = '';
                }
            });
        }

        window.switchTab = (tab) => { saveFeedScroll(); activeTab = tab; viewedProfile = null; searchQuery = ''; feedShuffled = []; feedIndex = 0; if (searchTimeout) clearTimeout(searchTimeout); render(); };
        window.goToMyProfile = () => { saveFeedScroll(); activeTab = 'profile'; viewedProfile = null; searchQuery = ''; render(); };
        window.openUserProfile = (u) => { saveFeedScroll(); activeTab = 'userProfile'; viewedProfile = u; searchQuery = ''; render(); };
        window.toggleLike = (id) => toggleLike(id);
        window.deletePostById = (id) => { if (confirm('Delete this post?')) deletePost(id); };
        window.openComments = (postId) => {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
            <div class="modal"><h3>Comments</h3>
                <div class="comments-section">${(post.comments||[]).map(c=>{
                    const comAuthor = users[c.author] || {};
                    const comPremiumClass = comAuthor.premium ? 'premium-nick' : 'normal-nick';
                    return `<div class="comment"><span class="comment-author" onclick="window.openUserProfile('${c.author}');this.closest('.modal-overlay').remove()"><span class="${comPremiumClass}">${escapeHTML(getDisplayName(c.author))} @${escapeHTML(c.author.substring(1))}</span></span>: ${escapeHTML(c.text)}</div>`;
                }).join('')||'<div style="color:#888;text-align:center;padding:12px;">No comments yet</div>'}</div>
                <div class="field-group"><input id="commentText" placeholder="Write a comment..."></div>
                <div class="btn-row">
                    <button class="btn secondary" onclick="this.closest('.modal-overlay').remove()">Close</button>
                    <button class="btn" id="submitComment">Send</button>
                </div>
            </div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
            document.getElementById('submitComment').onclick = () => {
                const text = document.getElementById('commentText').value.trim();
                if (text) { addComment(postId, text); modal.remove(); }
            };
            document.getElementById('commentText')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('submitComment')?.click(); });
        };
        window.openRepost = (postId) => {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            const originalAuthorName = getDisplayName(post.author);
            const origPremium = users[post.author]?.premium ? 'premium-nick' : 'normal-nick';
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
            <div class="modal">
                <h3>Repost</h3>
                <div style="margin-bottom:12px; padding:10px; background:rgba(212,175,55,0.06); border-left:3px solid var(--gold); border-radius:8px;">
                    <div style="font-weight:600;color:var(--gold);"><span class="${origPremium}">${escapeHTML(originalAuthorName)} @${escapeHTML(post.author.substring(1))}</span></div>
                    <div style="color:#ccc;font-size:13px;margin-top:4px;">${escapeHTML(post.text || '')}</div>
                    ${post.media ? (post.isVideo ? `<video controls src="${post.media}" style="max-width:100%;max-height:150px;margin-top:6px;border-radius:6px;"></video>` : `<img src="${post.media}" style="max-width:100%;max-height:150px;margin-top:6px;border-radius:6px;">`) : ''}
                </div>
                <div class="field-group">
                    <label>Add your comment (optional)</label>
                    <textarea id="repostText" rows="3" placeholder="What do you think?"></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="btn" id="doRepost">Repost</button>
                </div>
            </div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
            document.getElementById('doRepost').onclick = () => {
                const text = document.getElementById('repostText').value;
                repostPost(postId, text);
                modal.remove();
            };
        };
        window.openCreatePost = () => {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
            <div class="modal"><h3>New post</h3>
                <div class="field-group"><label>What's on your mind?</label><textarea id="postText" rows="4" placeholder="Write something... #hashtag @mention"></textarea></div>
                <div class="field-group" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <label class="custom-file-btn" style="margin:0;">Choose media<input type="file" id="mediaFile" accept="image/*,video/*" style="display:none;" onchange="document.getElementById('fileNameLabel').textContent = this.files[0]?.name || ''"></label>
                    <span id="fileNameLabel" class="file-name"></span>
                </div>
                <div class="btn-row">
                    <button class="btn secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="btn" id="publishBtn">Publish</button>
                </div>
            </div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
            document.getElementById('publishBtn').onclick = () => {
                const text = document.getElementById('postText').value.trim();
                const file = document.getElementById('mediaFile').files[0];
                if (!text && !file) return;
                const publishBtn = document.getElementById('publishBtn');
                if (publishBtn) publishBtn.disabled = true;
                if (file) {
                    processMediaFile(file).then(result => { addPost(text || '', result.dataURL, result.isVideo); modal.remove(); })
                        .catch(err => { if (publishBtn) publishBtn.disabled = false; if (!err.message?.includes('cancelled')) showToast('Error: ' + err.message, 3000); });
                } else { addPost(text); modal.remove(); }
            };
        };
        window.toggleFollowUser = (target) => toggleFollow(target);
        window.searchByHashtag = (tag) => {
            searchQuery = tag;
            const input = document.getElementById('searchInput');
            if (input) input.value = tag;
            if (searchTimeout) clearTimeout(searchTimeout);
            if (activeTab === 'feed') {
                feedShuffled = [];
                feedIndex = 0;
                const container = document.getElementById('feedContainer');
                if (container) { container.innerHTML = ''; loadMoreFeed(); }
            } else {
                activeTab = 'feed';
                feedShuffled = [];
                feedIndex = 0;
                render();
            }
        };
        window.clearSearch = () => {
            searchQuery = '';
            const input = document.getElementById('searchInput');
            if (input) input.value = '';
            if (searchTimeout) clearTimeout(searchTimeout);
            if (activeTab === 'feed') resetFeed();
            else { activeTab = 'feed'; feedShuffled = []; feedIndex = 0; render(); }
        };
        window.openImage = (src) => {
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.style.cursor = 'zoom-out';
            modal.onclick = () => modal.remove();
            modal.innerHTML = `<img src="${src}" style="max-width:92%;max-height:88%;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.7);">`;
            document.body.appendChild(modal);
        };
        window.openEditProfile = () => {
            const user = users[currentUser];
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            const isLight = document.body.classList.contains('light-theme');
            modal.innerHTML = `
            <div class="modal" style="max-width:460px;">
                <h3>Edit Profile</h3>
                <div class="field-group">
                    <label>Display name</label>
                    <input id="editDisplayName" value="${escapeHTML(user.displayName||'')}" placeholder="Your name">
                </div>
                <div class="field-group">
                    <label>Bio</label>
                    <input id="editBio" value="${escapeHTML(user.bio||'')}" placeholder="A few words about you">
                </div>
                <div class="field-group">
                    <label>Email</label>
                    <input id="editEmail" value="${escapeHTML(user.email||'')}" placeholder="your@email.com">
                </div>
                <div class="field-group">
                    <label>New password (leave blank to keep current)</label>
                    <input id="editPassword" type="password" placeholder="New password">
                </div>
                <div class="field-group" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
                    <label class="custom-file-btn" style="margin:0;">Avatar<input type="file" id="editAvatar" accept="image/*" style="display:none;"></label>
                    <label class="custom-file-btn" style="margin:0;">Banner<input type="file" id="editBanner" accept="image/*" style="display:none;"></label>
                </div>
                <div class="theme-toggle">
                    <span>Theme</span>
                    <label class="switch">
                        <input type="checkbox" id="themeSwitch" ${isLight ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                    <span style="font-size:12px;">${isLight ? 'Light' : 'Dark'}</span>
                </div>
                <div class="btn-row">
                    <button class="btn secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                    <button class="btn" id="saveProfileBtn">Save</button>
                </div>
            </div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
            document.getElementById('themeSwitch').addEventListener('change', toggleTheme);
            document.getElementById('saveProfileBtn').onclick = () => {
                const dn = document.getElementById('editDisplayName').value.trim();
                const bio = document.getElementById('editBio').value.trim();
                const email = document.getElementById('editEmail').value.trim();
                const pass = document.getElementById('editPassword').value;
                if (dn) users[currentUser].displayName = dn;
                if (bio !== undefined) users[currentUser].bio = bio;
                if (email) users[currentUser].email = email;
                if (pass) users[currentUser].password = pass;
                const avatarFile = document.getElementById('editAvatar').files[0];
                const bannerFile = document.getElementById('editBanner').files[0];
                const saveBtn = document.getElementById('saveProfileBtn');
                if (saveBtn) saveBtn.disabled = true;
                const processImages = (cb) => {
                    let tasks = 0;
                    const checkDone = () => { tasks--; if (tasks <= 0) cb(); };
                    if (avatarFile) { tasks++; compressImage(avatarFile, 300, 0.7).then(dataURL => { users[currentUser].avatar = dataURL; checkDone(); }).catch(() => { const r = new FileReader(); r.onload = (e) => { users[currentUser].avatar = e.target.result; checkDone(); }; r.onerror = checkDone; r.readAsDataURL(avatarFile); }); }
                    if (bannerFile) { tasks++; compressImage(bannerFile, 800, 0.6).then(dataURL => { users[currentUser].banner = dataURL; checkDone(); }).catch(() => { const r = new FileReader(); r.onload = (e) => { users[currentUser].banner = e.target.result; checkDone(); }; r.onerror = checkDone; r.readAsDataURL(bannerFile); }); }
                    if (tasks === 0) cb();
                };
                processImages(() => { saveState(); modal.remove(); render(); showToast('Profile updated!'); });
            };
        };
        window.giveBadge = (target, num) => giveBadge(target, num);
        window.removeBadges = (target) => removeBadges(target);
        window.togglePremiumUser = (target) => togglePremium(target);
        window.logout = () => logout();
        window.handleFeedScroll = handleFeedScroll;
        window.openPremiumModal = openPremiumModal;
        window.openFollowersList = openFollowersList;
        window.openFollowingList = openFollowingList;

        loadState();
    })();
</script>
</body>
</html>
