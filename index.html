            window.togglePinChat = function(chat, e) { e.stopPropagation(); if (App.pinnedChats.includes(chat)) { App.pinnedChats = App.pinnedChats.filter(c => c !== chat); showNotification('Чат откреплен'); } else { if (App.pinnedChats.length >= 3) { showNotification('Максимум 3 закрепленных чата', 'error'); return; } App.pinnedChats.push(chat); showNotification('Чат закреплен'); } saveToFirebase(); updateChatList(); };
            window.deleteChat = function(chat, e) { e.stopPropagation(); if (!confirm(`Удалить чат ${chat}?`)) return; const user = App.currentUser; if (App.pinnedChats.includes(chat)) App.pinnedChats = App.pinnedChats.filter(c => c !== chat); const id = [user, chat].sort().join('_'); if (App.chats[id]) delete App.chats[id]; if (App.channels[chat] && App.channels[chat].subscribers) App.channels[chat].subscribers = App.channels[chat].subscribers.filter(s => s !== user); if (App.activeChat === chat) { App.activeChat = 'saved'; localStorage.setItem('yolk_active_chat', 'saved'); } saveToFirebase(); render(); showNotification('Чат удален'); };

            function openGiftMenu() { const u = App.currentUser, target = App.activeChat, gifts = App.users[u].gifts || []; if (!gifts.length) { showNotification('У вас нет подарков', 'error'); return; } const list = gifts.map(g => `<div class="gift-item" onclick="window.sendGiftToUser('${target}', '${g}')">${g}</div>`).join(''); const html = `<div class="modal-overlay" id="giftModalOverlay"><div class="profile-modal"><h3>🎁 ВЫБЕРИТЕ ПОДАРОК</h3><div class="gifts-collection">${list}</div><div class="profile-actions"><button class="profile-btn secondary" id="closeGiftModal">ОТМЕНА</button></div></div></div>`; document.body.insertAdjacentHTML('beforeend', html); document.getElementById('closeGiftModal').addEventListener('click', () => { document.getElementById('giftModalOverlay').remove(); }); }
            window.sendGiftToUser = function(to, gift) { document.getElementById('giftModalOverlay')?.remove(); const from = App.currentUser; const uGifts = [...(App.users[from].gifts || [])]; const idx = uGifts.indexOf(gift); if (idx !== -1) uGifts.splice(idx, 1); App.users[from].gifts = uGifts; if (!App.users[to].gifts) App.users[to].gifts = []; App.users[to].gifts.push(gift); const cid = ensureChat(from, to); if (cid && App.chats[cid]) { App.chats[cid].messages.push({ from, text: `ПОДАРОК ${gift} ОТ ${from}`, time: Date.now(), gift: true }); showConfetti(); playHappySound(); } saveToFirebase(); if (App.activeChat === to) renderMessages(to); updateUserInterface(); if (document.getElementById('profileModalOverlay')) { const prof = document.getElementById('profileModalOverlay'), gc = prof.querySelector('.gifts-collection'); if (gc && App.users[from].gifts) { gc.innerHTML = App.users[from].gifts.map(g => `<div class="gift-item">${g}</div>`).join('') || 'НЕТ ПОДАРКОВ'; } } showNotification(`Подарок ${gift} отправлен ${to}!`); };

            // === ЗВОНКИ (ФИНАЛЬНАЯ ВЕРСИЯ) ===
            async function startCall(targetUser) {
                if (App.call.active) { showNotification('Уже есть активный звонок', 'error'); return; }
                if (!App.currentUser || !targetUser) return;
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const peer = new RTCPeerConnection(configuration);
                    stream.getTracks().forEach(track => peer.addTrack(track, stream));
                    peer.ontrack = (event) => {
                        if (event.streams && event.streams[0]) {
                            App.call.remoteStream = event.streams[0];
                            const audio = new Audio();
                            audio.srcObject = event.streams[0];
                            audio.autoplay = true;
                            audio.play().catch(e => console.log(e));
                        }
                    };
                    peer.onicecandidate = (event) => {
                        if (event.candidate) {
                            database.ref('calls/' + targetUser + '/candidate').set(JSON.stringify(event.candidate));
                        }
                    };
                    const offer = await peer.createOffer();
                    await peer.setLocalDescription(offer);
                    const callData = { from: App.currentUser, to: targetUser, offer: { type: offer.type, sdp: offer.sdp }, status: 'ringing', timestamp: Date.now() };
                    await database.ref('calls/' + targetUser).set(callData);
                    App.call.active = true;
                    App.call.peer = peer;
                    App.call.localStream = stream;
                    App.call.target = targetUser;
                    App.call.startTime = Date.now();
                    showCallUI(targetUser, 'outgoing');
                    const timeout = setTimeout(() => { if (App.call.active && App.call.target === targetUser) { endCall(); showNotification('Собеседник не ответил', 'error'); } }, 30000);
                    const statusRef = database.ref('calls/' + targetUser + '/status');
                    const answerListener = statusRef.on('value', async (snap) => {
                        const status = snap.val();
                        if (status === 'answered') {
                            clearTimeout(timeout);
                            statusRef.off();
                            showCallUI(targetUser, 'connected');
                            startCallTimer();
                        } else if (status === 'declined' || status === 'ended') {
                            clearTimeout(timeout);
                            endCall();
                            showNotification('Звонок отклонен', 'error');
                            statusRef.off();
                        }
                    });
                    const candidateRef = database.ref('calls/' + targetUser + '/candidate');
                    const candidateListener = candidateRef.on('value', async (snap) => {
                        const cand = snap.val();
                        if (cand && App.call.peer && App.call.peer.remoteDescription) {
                            try {
                                await App.call.peer.addIceCandidate(new RTCIceCandidate(JSON.parse(cand)));
                                candidateRef.off();
                            } catch(e) {}
                        }
                    });
                } catch (err) { console.error(err); showNotification('Не удалось начать звонок. Проверьте микрофон', 'error'); endCall(); }
            }

            async function acceptCall(callData) {
                if (App.call.active) { database.ref('calls/' + callData.from + '/status').set('busy'); return; }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const peer = new RTCPeerConnection(configuration);
                    stream.getTracks().forEach(track => peer.addTrack(track, stream));
                    peer.ontrack = (event) => {
                        if (event.streams && event.streams[0]) {
                            App.call.remoteStream = event.streams[0];
                            const audio = new Audio();
                            audio.srcObject = event.streams[0];
                            audio.autoplay = true;
                            audio.play().catch(e => console.log(e));
                        }
                    };
                    peer.onicecandidate = (event) => {
                        if (event.candidate) database.ref('calls/' + callData.from + '/candidate').set(JSON.stringify(event.candidate));
                    };
                    await peer.setRemoteDescription(new RTCSessionDescription(callData.offer));
                    const answer = await peer.createAnswer();
                    await peer.setLocalDescription(answer);
                    await database.ref('calls/' + callData.from).update({ answer: { type: answer.type, sdp: answer.sdp }, status: 'answered' });
                    App.call.active = true;
                    App.call.peer = peer;
                    App.call.localStream = stream;
                    App.call.target = callData.from;
                    App.call.startTime = Date.now();
                    showCallUI(callData.from, 'connected');
                    startCallTimer();
                    const candidateRef = database.ref('calls/' + callData.from + '/candidate');
                    candidateRef.on('value', async (snap) => {
                        const cand = snap.val();
                        if (cand && App.call.peer && App.call.peer.remoteDescription) {
                            try {
                                await App.call.peer.addIceCandidate(new RTCIceCandidate(JSON.parse(cand)));
                                candidateRef.off();
                            } catch(e) {}
                        }
                    });
                } catch (err) { console.error(err); endCall(); }
            }

            function endCall() {
                if (App.call.localStream) { App.call.localStream.getTracks().forEach(t => t.stop()); App.call.localStream = null; }
                if (App.call.peer) { App.call.peer.close(); App.call.peer = null; }
                if (App.call.target) database.ref('calls/' + App.call.target).remove();
                if (App.call.timer) clearInterval(App.call.timer);
                App.call.active = false;
                App.call.target = null;
                App.call.startTime = null;
                const overlay = document.getElementById('callOverlay');
                if (overlay) overlay.remove();
            }

            function showCallUI(target, state) {
                const existing = document.getElementById('callOverlay');
                if (existing) existing.remove();
                const targetData = App.users[target] || {};
                const avatarHtml = targetData.avatar ? `<img src="${targetData.avatar}">` : (target[1] ? target[1].toUpperCase() : '?');
                const name = formatUserName(target, hasGoldStatus(target));
                let statusText = '', buttonsHtml = '';
                if (state === 'outgoing') { statusText = 'Вызов...'; buttonsHtml = `<button class="call-btn end" id="endCallBtn">🔴</button>`; }
                else if (state === 'incoming') { statusText = 'Входящий вызов...'; buttonsHtml = `<button class="call-btn" id="acceptCallBtn">📞</button><button class="call-btn decline" id="declineCallBtn">❌</button>`; }
                else if (state === 'connected') { statusText = 'Разговор'; buttonsHtml = `<button class="call-btn end" id="endCallBtn">🔴</button>`; }
                const modal = document.createElement('div'); modal.id = 'callOverlay'; modal.className = 'call-overlay';
                modal.innerHTML = `<div class="call-container"><div class="call-avatar">${avatarHtml}</div><div class="call-name">${name}</div><div class="call-status" id="callStatus">${statusText}</div><div id="callTimer" class="timer" style="${state === 'connected' ? '' : 'display:none'}">00:00</div><div class="call-buttons">${buttonsHtml}</div></div>`;
                document.body.appendChild(modal);
                if (state === 'incoming') {
                    document.getElementById('acceptCallBtn')?.addEventListener('click', () => {
                        const callRef = database.ref('calls/' + target);
                        callRef.once('value', snap => { const data = snap.val(); if (data && data.offer) acceptCall(data); });
                        modal.remove();
                    });
                    document.getElementById('declineCallBtn')?.addEventListener('click', () => { database.ref('calls/' + target + '/status').set('declined'); modal.remove(); });
                }
                if (state !== 'incoming') {
                    document.getElementById('endCallBtn')?.addEventListener('click', () => { endCall(); });
                }
            }

            function startCallTimer() {
                if (App.call.timer) clearInterval(App.call.timer);
                App.call.timer = setInterval(() => {
                    if (!App.call.active || !App.call.startTime) return;
                    const elapsed = Math.floor((Date.now() - App.call.startTime) / 1000);
                    const mins = Math.floor(elapsed / 60);
                    const secs = elapsed % 60;
                    const timerEl = document.getElementById('callTimer');
                    if (timerEl) timerEl.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                }, 1000);
            }

            function setupIncomingCallListener() {
                if (!App.currentUser) return;
                if (App.call.incomingCallRef) database.ref('calls/' + App.currentUser).off();
                const callRef = database.ref('calls/' + App.currentUser);
                App.call.incomingCallRef = callRef;
                callRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data && data.status === 'ringing' && data.to === App.currentUser && !App.call.active) {
                        playRingSound();
                        showCallUI(data.from, 'incoming');
                    }
                });
            }

            // ==================== ПРОФИЛЬ, КАНАЛЫ, ДОНАТ, АДМИН ====================
            function openDonationModal(pack) {
                const modalHtml = `<div class="modal-overlay" id="donationModalOverlay"><div class="profile-modal"><h3>💸 ПОПОЛНЕНИЕ YC</h3><div class="qr-code" id="donationQrCode"></div><div class="profile-input-group"><label>📤 АДРЕС КОШЕЛЬКА TON</label><input type="text" value="${TON_ADDRESS}" readonly onclick="this.select();document.execCommand('copy');showNotification('Адрес скопирован!')"></div><div class="profile-input-group"><label>💰 СУММА</label><input type="text" value="${pack.ton} TON" readonly></div><div class="profile-input-group"><label>📝 ВАШ ЮЗЕРНЕЙМ (обязательно!)</label><input type="text" id="donationComment" placeholder="Например: @xuotov" value="${App.currentUser}"></div><div class="profile-input-group"><label>🔗 TXID (хеш транзакции)</label><input type="text" id="donationTxid" placeholder="Вставьте TXID из TON Keeper"></div><div class="profile-actions"><button class="profile-btn" id="submitDonationBtn">✅ Я ОТПРАВИЛ TON</button><button class="profile-btn secondary" id="closeDonationModal">ОТМЕНА</button></div><small style="display:block; text-align:center; margin-top:12px;">⚠️ В комментарии к переводу ОБЯЗАТЕЛЬНО укажите свой юзернейм с @</small></div></div>`;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                setTimeout(() => { const qrDiv = document.getElementById('donationQrCode'); if (qrDiv) { qrDiv.innerHTML = ''; new QRCode(qrDiv, { text: TON_ADDRESS, width: 200, height: 200 }); } }, 100);
                document.getElementById('submitDonationBtn')?.addEventListener('click', () => {
                    const txid = document.getElementById('donationTxid')?.value.trim();
                    const comment = document.getElementById('donationComment')?.value.trim();
                    if (!txid) { showNotification('Введите TXID транзакции', 'error'); return; }
                    if (!comment || !comment.startsWith('@')) { showNotification('Укажите ваш юзернейм с @ в комментарии', 'error'); return; }
                    const requestId = generateId();
                    App.donationRequests[requestId] = { id: requestId, user: App.currentUser, username: comment, yc: pack.yc, ton: pack.ton, txid: txid, status: 'pending', createdAt: Date.now(), giftEmoji: pack.giftEmoji || null, isGold: pack.isGold || false };
                    saveDonationRequests();
                    document.getElementById('donationModalOverlay')?.remove();
                    showNotification(`✅ Заявка отправлена! Ожидайте начисления. ID: ${requestId.slice(-6)}`);
                    if (App.currentUser === ADMIN_USER) render();
                });
                document.getElementById('closeDonationModal')?.addEventListener('click', () => { document.getElementById('donationModalOverlay')?.remove(); });
            }

            function openAdminPanel() {
                const pending = Object.values(App.donationRequests).filter(r => r.status === 'pending');
                const completed = Object.values(App.donationRequests).filter(r => r.status === 'completed').slice(-10);
                const modalHtml = `<div class="modal-overlay" id="adminModalOverlay"><div class="profile-modal" style="max-width: 500px;"><h3>🔧 АДМИН-ПАНЕЛЬ (только для @xuotov)</h3><div style="max-height: 60vh; overflow-y: auto;"><h4>⏳ ОЖИДАЮТ ПОДТВЕРЖДЕНИЯ (${pending.length})</h4>${pending.length === 0 ? '<p style="color:#666;">Нет заявок</p>' : pending.map(req => `<div class="donation-item pending"><div><strong>👤 ${req.username}</strong> (${req.user})</div><div>💰 ${req.isGold ? 'GOLD СТАТУС' : (req.giftEmoji ? `Подарок ${req.giftEmoji}` : `${req.yc} YC`)} (${req.ton} TON)</div><div class="txid-input">🔗 TXID: ${req.txid}</div><div>📅 ${new Date(req.createdAt).toLocaleString()}</div><div style="display: flex; gap: 8px; margin-top: 8px;"><button class="tiny-btn" style="background:#4CAF50; color:white;" onclick="window.confirmDonation('${req.id}')">✅ ПОДТВЕРДИТЬ И НАЧИСЛИТЬ</button><button class="tiny-btn" style="background:#ff4444; color:white;" onclick="window.cancelDonation('${req.id}')">❌ ОТМЕНИТЬ</button></div></div>`).join('')}<h4 style="margin-top:16px;">✅ ВЫПОЛНЕННЫЕ</h4>${completed.length === 0 ? '<p style="color:#666;">Нет выполненных</p>' : completed.map(req => `<div class="donation-item completed"><div><strong>👤 ${req.username}</strong> (${req.user})</div><div>${req.isGold ? 'GOLD СТАТУС' : (req.giftEmoji ? `Подарок ${req.giftEmoji}` : `${req.yc} YC`)}</div><div>📅 ${new Date(req.createdAt).toLocaleString()}</div></div>`).join('')}</div><div class="profile-actions"><button class="profile-btn secondary" id="closeAdminModal">ЗАКРЫТЬ</button></div></div></div>`;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                document.getElementById('closeAdminModal')?.addEventListener('click', () => { document.getElementById('adminModalOverlay')?.remove(); });
            }

            window.confirmDonation = function(requestId) {
                const request = App.donationRequests[requestId];
                if (!request || request.status !== 'pending') return;
                const targetUser = request.user;
                if (App.users[targetUser]) {
                    if (request.isGold) {
                        App.users[targetUser].gold = true;
                        showNotification(`✨ GOLD СТАТУС активирован для ${request.username}! ✨\nВаш ник теперь золотой, сообщения мерцают!`);
                        updateUserInterface(); updateSidebarUser();
                        if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'yolk') { renderMessages(App.activeChat); updateChatList(); }
                    } else if (request.giftEmoji) {
                        if (!App.users[targetUser].gifts) App.users[targetUser].gifts = [];
                        App.users[targetUser].gifts.push(request.giftEmoji);
                        showNotification(`✅ Подарок ${request.giftEmoji} отправлен ${request.username}`);
                        updateUserInterface();
                    } else {
                        App.users[targetUser].stars = (App.users[targetUser].stars || 0) + request.yc;
                        showNotification(`✅ Начислено ${request.yc} YC пользователю ${request.username}`);
                        updateUserInterface();
                    }
                    request.status = 'completed';
                    request.completedAt = Date.now();
                    saveDonationRequests(); saveToFirebase();
                    if (!App.yolkChatMessages[targetUser]) App.yolkChatMessages[targetUser] = [];
                    App.yolkChatMessages[targetUser].push({ from: 'SYSTEM', text: request.isGold ? `✨ Вы получили GOLD СТАТУС НАВСЕГДА! ✨\nВаш ник теперь золотой, а сообщения мерцают!` : (request.giftEmoji ? `🎁 Вам отправили подарок ${request.giftEmoji}!` : `✅ Пополнение баланса!\n💰 +${request.yc} YC\nСпасибо за поддержку!`), time: Date.now() });
                    saveYolkChatMessages();
                    if (App.currentUser === ADMIN_USER) { document.getElementById('adminModalOverlay')?.remove(); openAdminPanel(); }
                }
            };

            window.cancelDonation = function(requestId) {
                if (!confirm('Вы уверены, что хотите отменить эту заявку?')) return;
                const request = App.donationRequests[requestId];
                if (!request || request.status !== 'pending') return;
                delete App.donationRequests[requestId];
                saveDonationRequests();
                showNotification(`❌ Заявка отменена`);
                if (App.currentUser === ADMIN_USER) { document.getElementById('adminModalOverlay')?.remove(); openAdminPanel(); }
            };

            function openChannelModal(channelName) { /* упрощённо */ const ch = App.channels[channelName]; if (!ch) return; const isOwner = ch.owner === App.currentUser; const modalHtml = `<div class="modal-overlay" id="channelModalOverlay"><div class="profile-modal"><h3>📢 КАНАЛ ${channelName}</h3>... (аналогично предыдущей версии) ...</div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); /* заглушка */ }

            function openProfileModal(username) {
                // полная функция как в предыдущем коде, для краткости опускаю, но она должна быть.
                // В реальном коде здесь полное отображение профиля с вкладками Магазин, Донат, Обои.
                // Так как код очень большой, я приведу её в финальной версии полностью.
                // В данном сообщении уже превышен лимит, поэтому финальный код будет в следующем сообщении.
            }

            function initBots() { App.systemBots.forEach(b => { if (!App.users[b]) App.users[b] = { password: 'bot', avatar: null, banner: null, stars: 0, gifts: [], bio: b === '@game_bot' ? '🎰 Игровой автомат!' : (b === '@tap_bot' ? '👆 Тапай!' : '🎲 Загадай число от 0 до 10!'), isBot: true, verified: true, gold: true, age: 99, twoFA: false, lastSeen: Date.now(), chatWallpaper: '' }; }); saveToFirebase(); }

            window.togglePinChat = window.togglePinChat || function() {};
            window.deleteChat = window.deleteChat || function() {};
            window.openProfileModal = window.openProfileModal || function() {};
            window.deleteMessage = window.deleteMessage || function() {};
            window.sendGiftToUser = window.sendGiftToUser || function() {};
            window.toggleLike = window.toggleLike || function() {};
            window.sendBotCommand = window.sendBotCommand || function() {};
            window.openChannelModal = window.openChannelModal || function() {};
            window.confirmDonation = window.confirmDonation || function() {};
            window.cancelDonation = window.cancelDonation || function() {};
            window.openImageModal = window.openImageModal || function() {};

            window.addEventListener('load', () => { showLoading(); initBots(); loadFromFirebase(); setTimeout(hideLoading, 1000); });
        })();
    </script>
</body>
</html>
