<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Рисовалка</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0b0c0e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    .launcher {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, #1a1e29, #030406);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.8s, visibility 0.8s;
    }
    .launcher.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .launcher h1 {
      font-size: clamp(3rem, 10vw, 6rem);
      font-weight: 900;
      background: linear-gradient(135deg, #ff6ec7, #7b2fff, #00e5ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px #7b2fff88);
      letter-spacing: 2px;
      margin-bottom: 2rem;
    }
    .launcher button {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      color: #eee;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 1rem 3rem;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 0 30px #7b2fff66;
      transition: 0.3s;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #2a1f4c, #141124);
    }
    .launcher button:hover {
      box-shadow: 0 0 50px #ff6ec7aa;
      border-color: #ff6ec7;
      transform: scale(1.05);
    }
    .app {
      display: none;
      width: 100vw;
      height: 100vh;
      flex-direction: column;
      background: #12131c;
    }
    .app.active {
      display: flex;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(15, 16, 25, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid #2e2e4a;
      align-items: center;
      z-index: 20;
      min-height: 56px;
    }
    .tool-group {
      display: flex;
      gap: 4px;
      align-items: center;
      background: #1e1f2e;
      padding: 4px 8px;
      border-radius: 30px;
    }
    button, select, input {
      background: transparent;
      border: none;
      color: #cdd6f4;
      font-size: 0.9rem;
      padding: 8px 14px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
      font-weight: 500;
      white-space: nowrap;
    }
    button:hover, select:hover {
      background: #313256;
      color: white;
    }
    .active-tool {
      background: #7b2fff !important;
      box-shadow: 0 0 18px #7b2fffcc;
      color: white;
    }
    input[type="color"] {
      width: 40px;
      height: 34px;
      padding: 2px;
      border-radius: 20px;
      background: #27283c;
      border: 1px solid #4f4f7a;
    }
    input[type="range"] {
      width: 80px;
      accent-color: #c084fc;
    }
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #1a1b26;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      position: absolute;
      cursor: crosshair;
      image-rendering: auto;
    }
    .layers-panel {
      position: absolute;
      right: 10px;
      top: 70px;
      background: rgba(20, 21, 35, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid #3a3b5c;
      border-radius: 16px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 30;
      min-width: 180px;
      max-height: 50vh;
      overflow-y: auto;
    }
    .layer-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: #2a2b40;
      border-radius: 20px;
      color: #cdd6f4;
      font-size: 0.85rem;
      cursor: pointer;
      border: 2px solid transparent;
      gap: 8px;
    }
    .layer-item.active {
      border-color: #7b2fff;
      box-shadow: 0 0 12px #7b2fff66;
    }
    .layer-item button {
      padding: 2px 8px;
      font-size: 0.8rem;
      background: #4a3b6e;
    }
    .layer-opacity {
      width: 60px;
      accent-color: #7b2fff;
    }
    .zoom-info {
      color: #9aa5ce;
      font-size: 0.8rem;
      margin-left: 12px;
    }
    .color-palette {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .preset-color {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: 0.2s;
    }
    .preset-color:hover {
      border-color: white;
      transform: scale(1.15);
    }
  </style>
</head>
<body>
<div class="launcher" id="launcher">
  <h1>РИСОВАЛКА</h1>
  <button id="startBtn">НАЧАТЬ РИСОВАТЬ</button>
</div>

<div class="app" id="app">
  <div class="toolbar">
    <div class="tool-group">
      <button id="brushBtn" class="active-tool">Кисть</button>
      <button id="neonBrushBtn">Неон</button>
      <button id="pencilBtn">Карандаш</button>
      <button id="sprayBtn">Распылитель</button>
      <button id="eraserBtn">Ластик</button>
      <button id="fillBtn">Заливка</button>
      <button id="eyedropperBtn">Пипетка</button>
    </div>
    <div class="tool-group">
      <input type="color" id="colorPicker" value="#ff6ec7">
      <div class="color-palette" id="colorPalette"></div>
      <input type="range" id="sizeSlider" min="1" max="80" value="12">
      <span id="sizeValue" style="color:#cdd6f4;">12px</span>
    </div>
    <div class="tool-group">
      <select id="blendMode">
        <option value="normal">Обычный</option>
        <option value="multiply">Умножение</option>
        <option value="screen">Осветление</option>
        <option value="overlay">Перекрытие</option>
        <option value="soft-light">Мягкий свет</option>
        <option value="color-burn">Затемнение</option>
        <option value="color-dodge">Осветл. основы</option>
      </select>
      <button id="undoBtn">Отменить</button>
      <button id="redoBtn">Вернуть</button>
    </div>
    <div class="tool-group">
      <button id="addLayerBtn">+ Слой</button>
      <button id="duplicateLayerBtn">Копия слоя</button>
      <button id="mergeDownBtn">Слить вниз</button>
      <button id="flipHorizBtn">↔</button>
      <button id="flipVertBtn">↕</button>
    </div>
    <div class="tool-group">
      <button id="zoomInBtn">+</button>
      <span class="zoom-info" id="zoomLevel">100%</span>
      <button id="zoomOutBtn">-</button>
      <button id="zoomResetBtn">Сброс</button>
    </div>
    <div class="tool-group">
      <button id="downloadBtn">Скачать PNG</button>
      <button id="loadImageBtn">Загрузить</button>
      <button id="newCanvasBtn">Новый холст</button>
    </div>
  </div>
  <div class="canvas-container" id="canvasContainer">
    <canvas id="canvas"></canvas>
  </div>
  <div class="layers-panel" id="layersPanel"></div>
</div>

<input type="file" id="imageLoader" accept="image/*" style="display:none;">

<script>
  (function() {
    const launcher = document.getElementById('launcher');
    const app = document.getElementById('app');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const container = document.getElementById('canvasContainer');

    let drawing = false;
    let currentTool = 'brush';
    let currentColor = '#ff6ec7';
    let lineWidth = 12;
    let globalCompositeOp = 'normal';
    let points = [];

    let layers = [];
    let activeLayerIndex = 0;
    let zoom = 1;
    let panX = 0, panY = 0;
    let canvasDrawWidth = 800;
    let canvasDrawHeight = 600;

    let undoStack = [];
    let redoStack = [];
    const MAX_UNDO = 50;

    const PRESET_COLORS = [
      '#ff6ec7', '#7b2fff', '#00e5ff', '#ff4444', '#ff8800',
      '#ffdd00', '#44ff44', '#ffffff', '#aaaaaa', '#555555',
      '#000000', '#8b4513', '#ff69b4', '#00ff88', '#4488ff'
    ];

    const brushBtn = document.getElementById('brushBtn');
    const neonBrushBtn = document.getElementById('neonBrushBtn');
    const pencilBtn = document.getElementById('pencilBtn');
    const sprayBtn = document.getElementById('sprayBtn');
    const eraserBtn = document.getElementById('eraserBtn');
    const fillBtn = document.getElementById('fillBtn');
    const eyedropperBtn = document.getElementById('eyedropperBtn');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const colorPicker = document.getElementById('colorPicker');
    const sizeSlider = document.getElementById('sizeSlider');
    const sizeValue = document.getElementById('sizeValue');
    const blendSelect = document.getElementById('blendMode');
    const addLayerBtn = document.getElementById('addLayerBtn');
    const duplicateLayerBtn = document.getElementById('duplicateLayerBtn');
    const mergeDownBtn = document.getElementById('mergeDownBtn');
    const flipHorizBtn = document.getElementById('flipHorizBtn');
    const flipVertBtn = document.getElementById('flipVertBtn');
    const layersPanel = document.getElementById('layersPanel');
    const downloadBtn = document.getElementById('downloadBtn');
    const loadImageBtn = document.getElementById('loadImageBtn');
    const imageLoader = document.getElementById('imageLoader');
    const newCanvasBtn = document.getElementById('newCanvasBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomResetBtn = document.getElementById('zoomResetBtn');
    const zoomLevelSpan = document.getElementById('zoomLevel');
    const colorPaletteDiv = document.getElementById('colorPalette');

    function initColorPalette() {
      colorPaletteDiv.innerHTML = '';
      PRESET_COLORS.forEach(color => {
        const dot = document.createElement('div');
        dot.className = 'preset-color';
        dot.style.backgroundColor = color;
        dot.addEventListener('click', () => {
          currentColor = color;
          colorPicker.value = color;
        });
        colorPaletteDiv.appendChild(dot);
      });
    }

    function initLayers() {
      const baseCanvas = document.createElement('canvas');
      baseCanvas.width = canvasDrawWidth;
      baseCanvas.height = canvasDrawHeight;
      const baseCtx = baseCanvas.getContext('2d');
      baseCtx.fillStyle = '#ffffff';
      baseCtx.fillRect(0, 0, baseCanvas.width, baseCanvas.height);
      layers = [{ canvas: baseCanvas, visible: true, opacity: 1 }];
      activeLayerIndex = 0;
      undoStack = [];
      redoStack = [];
      saveUndoState();
      renderLayersPanel();
    }

    function saveUndoState() {
      const activeCanvas = layers[activeLayerIndex]?.canvas;
      if (!activeCanvas) return;
      const snapshot = document.createElement('canvas');
      snapshot.width = activeCanvas.width;
      snapshot.height = activeCanvas.height;
      const snapCtx = snapshot.getContext('2d');
      snapCtx.drawImage(activeCanvas, 0, 0);
      undoStack.push({ canvas: snapshot, layerIndex: activeLayerIndex });
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      redoStack = [];
    }

    function undo() {
      if (undoStack.length === 0) return;
      const activeCanvas = layers[activeLayerIndex]?.canvas;
      if (!activeCanvas) return;
      const currentSnapshot = document.createElement('canvas');
      currentSnapshot.width = activeCanvas.width;
      currentSnapshot.height = activeCanvas.height;
      const snapCtx = currentSnapshot.getContext('2d');
      snapCtx.drawImage(activeCanvas, 0, 0);
      redoStack.push({ canvas: currentSnapshot, layerIndex: activeLayerIndex });

      const last = undoStack.pop();
      if (last && layers[last.layerIndex]) {
        const layerCanvas = layers[last.layerIndex].canvas;
        const layerCtx = layerCanvas.getContext('2d');
        layerCtx.clearRect(0, 0, layerCanvas.width, layerCanvas.height);
        layerCtx.drawImage(last.canvas, 0, 0);
        composeAndRender();
      }
    }

    function redo() {
      if (redoStack.length === 0) return;
      const activeCanvas = layers[activeLayerIndex]?.canvas;
      if (!activeCanvas) return;
      const currentSnapshot = document.createElement('canvas');
      currentSnapshot.width = activeCanvas.width;
      currentSnapshot.height = activeCanvas.height;
      const snapCtx = currentSnapshot.getContext('2d');
      snapCtx.drawImage(activeCanvas, 0, 0);
      undoStack.push({ canvas: currentSnapshot, layerIndex: activeLayerIndex });

      const next = redoStack.pop();
      if (next && layers[next.layerIndex]) {
        const layerCanvas = layers[next.layerIndex].canvas;
        const layerCtx = layerCanvas.getContext('2d');
        layerCtx.clearRect(0, 0, layerCanvas.width, layerCanvas.height);
        layerCtx.drawImage(next.canvas, 0, 0);
        composeAndRender();
      }
    }

    function getCompositeImage() {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvasDrawWidth;
      tempCanvas.height = canvasDrawHeight;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.fillStyle = '#ffffff';
      tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
      layers.forEach(layer => {
        if (layer.visible) {
          tempCtx.globalAlpha = layer.opacity || 1;
          tempCtx.drawImage(layer.canvas, 0, 0);
          tempCtx.globalAlpha = 1;
        }
      });
      return tempCanvas;
    }

    function composeAndRender() {
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      const composite = getCompositeImage();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(panX, panY);
      ctx.scale(zoom, zoom);
      ctx.drawImage(composite, 0, 0);
      ctx.restore();
    }

    function downloadImage() {
      const composite = getCompositeImage();
      const dataUrl = composite.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = 'рисунок_' + new Date().toISOString().slice(0,19).replace(/:/g, '-') + '.png';
      link.href = dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function floodFill(startX, startY, fillColor) {
      const layerCanvas = layers[activeLayerIndex].canvas;
      const layerCtx = layerCanvas.getContext('2d');
      const imageData = layerCtx.getImageData(0, 0, layerCanvas.width, layerCanvas.height);
      const data = imageData.data;
      const w = layerCanvas.width;
      const h = layerCanvas.height;

      const sx = Math.round(startX);
      const sy = Math.round(startY);
      if (sx < 0 || sx >= w || sy < 0 || sy >= h) return;

      const idx = (sy * w + sx) * 4;
      const targetR = data[idx];
      const targetG = data[idx + 1];
      const targetB = data[idx + 2];
      const targetA = data[idx + 3];

      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = 1;
      tempCanvas.height = 1;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.fillStyle = fillColor;
      tempCtx.fillRect(0, 0, 1, 1);
      const fillData = tempCtx.getImageData(0, 0, 1, 1).data;
      const fillR = fillData[0];
      const fillG = fillData[1];
      const fillB = fillData[2];
      const fillA = fillData[3];

      if (targetR === fillR && targetG === fillG && targetB === fillB && targetA === fillA) return;

      const stack = [[sx, sy]];
      const visited = new Uint8Array(w * h);

      while (stack.length > 0) {
        const [cx, cy] = stack.pop();
        const cidx = (cy * w + cx) * 4;
        if (cx < 0 || cx >= w || cy < 0 || cy >= h) continue;
        if (visited[cy * w + cx]) continue;
        if (data[cidx] !== targetR || data[cidx+1] !== targetG || data[cidx+2] !== targetB || data[cidx+3] !== targetA) continue;

        visited[cy * w + cx] = 1;
        data[cidx] = fillR;
        data[cidx+1] = fillG;
        data[cidx+2] = fillB;
        data[cidx+3] = fillA;

        stack.push([cx+1, cy]);
        stack.push([cx-1, cy]);
        stack.push([cx, cy+1]);
        stack.push([cx, cy-1]);
      }

      layerCtx.putImageData(imageData, 0, 0);
    }

    function renderLayersPanel() {
      layersPanel.innerHTML = '';
      layers.forEach((layer, idx) => {
        const div = document.createElement('div');
        div.className = 'layer-item' + (idx === activeLayerIndex ? ' active' : '');
        div.innerHTML = `<span>Слой ${idx+1}</span>`;

        const opacityInput = document.createElement('input');
        opacityInput.type = 'range';
        opacityInput.className = 'layer-opacity';
        opacityInput.min = '0';
        opacityInput.max = '1';
        opacityInput.step = '0.05';
        opacityInput.value = layer.opacity || 1;
        opacityInput.addEventListener('input', (e) => {
          e.stopPropagation();
          layer.opacity = parseFloat(e.target.value);
          composeAndRender();
        });
        div.appendChild(opacityInput);

        const delBtn = document.createElement('button');
        delBtn.textContent = 'X';
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (layers.length <= 1) return;
          layers.splice(idx, 1);
          if (activeLayerIndex >= layers.length) activeLayerIndex = layers.length - 1;
          renderLayersPanel();
          composeAndRender();
        });
        div.appendChild(delBtn);

        div.addEventListener('click', () => {
          activeLayerIndex = idx;
          renderLayersPanel();
        });
        layersPanel.appendChild(div);
      });
    }

    function addLayer() {
      const newCanvas = document.createElement('canvas');
      newCanvas.width = canvasDrawWidth;
      newCanvas.height = canvasDrawHeight;
      const newCtx = newCanvas.getContext('2d');
      newCtx.clearRect(0, 0, newCanvas.width, newCanvas.height);
      layers.push({ canvas: newCanvas, visible: true, opacity: 1 });
      activeLayerIndex = layers.length - 1;
      saveUndoState();
      renderLayersPanel();
      composeAndRender();
    }

    function duplicateLayer() {
      const source = layers[activeLayerIndex].canvas;
      const newCanvas = document.createElement('canvas');
      newCanvas.width = canvasDrawWidth;
      newCanvas.height = canvasDrawHeight;
      const newCtx = newCanvas.getContext('2d');
      newCtx.drawImage(source, 0, 0);
      layers.push({ canvas: newCanvas, visible: true, opacity: layers[activeLayerIndex].opacity || 1 });
      activeLayerIndex = layers.length - 1;
      saveUndoState();
      renderLayersPanel();
      composeAndRender();
    }

    function mergeDown() {
      if (activeLayerIndex <= 0) return;
      const upperCanvas = layers[activeLayerIndex].canvas;
      const lowerCanvas = layers[activeLayerIndex - 1].canvas;
      const lowerCtx = lowerCanvas.getContext('2d');
      lowerCtx.globalAlpha = layers[activeLayerIndex].opacity || 1;
      lowerCtx.drawImage(upperCanvas, 0, 0);
      lowerCtx.globalAlpha = 1;
      layers.splice(activeLayerIndex, 1);
      activeLayerIndex = activeLayerIndex - 1;
      saveUndoState();
      renderLayersPanel();
      composeAndRender();
    }

    function flipLayer(horizontal) {
      const layerCanvas = layers[activeLayerIndex].canvas;
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = layerCanvas.width;
      tempCanvas.height = layerCanvas.height;
      const tempCtx = tempCanvas.getContext('2d');
      if (horizontal) {
        tempCtx.translate(tempCanvas.width, 0);
        tempCtx.scale(-1, 1);
      } else {
        tempCtx.translate(0, tempCanvas.height);
        tempCtx.scale(1, -1);
      }
      tempCtx.drawImage(layerCanvas, 0, 0);
      const layerCtx = layerCanvas.getContext('2d');
      layerCtx.clearRect(0, 0, layerCanvas.width, layerCanvas.height);
      layerCtx.drawImage(tempCanvas, 0, 0);
      saveUndoState();
      composeAndRender();
    }

    function newCanvas() {
      if (confirm('Создать новый холст? Все несохранённые данные будут потеряны.')) {
        initLayers();
        composeAndRender();
      }
    }

    function loadImageToLayer(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const newCanvas = document.createElement('canvas');
          newCanvas.width = canvasDrawWidth;
          newCanvas.height = canvasDrawHeight;
          const newCtx = newCanvas.getContext('2d');
          const scale = Math.min(canvasDrawWidth / img.width, canvasDrawHeight / img.height);
          const w = img.width * scale;
          const h = img.height * scale;
          const x = (canvasDrawWidth - w) / 2;
          const y = (canvasDrawHeight - h) / 2;
          newCtx.drawImage(img, x, y, w, h);
          layers.push({ canvas: newCanvas, visible: true, opacity: 1 });
          activeLayerIndex = layers.length - 1;
          saveUndoState();
          renderLayersPanel();
          composeAndRender();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      const screenX = clientX - rect.left;
      const screenY = clientY - rect.top;
      const canvasX = (screenX - panX) / zoom;
      const canvasY = (screenY - panY) / zoom;
      return { x: canvasX, y: canvasY };
    }

    function getColorAtPixel(x, y) {
      const composite = getCompositeImage();
      const compCtx = composite.getContext('2d');
      const px = Math.round(x);
      const py = Math.round(y);
      if (px < 0 || px >= canvasDrawWidth || py < 0 || py >= canvasDrawHeight) return null;
      const pixel = compCtx.getImageData(px, py, 1, 1).data;
      return `#${pixel[0].toString(16).padStart(2,'0')}${pixel[1].toString(16).padStart(2,'0')}${pixel[2].toString(16).padStart(2,'0')}`;
    }

    function startDraw(e) {
      e.preventDefault();
      if (currentTool === 'fill') {
        const pos = getPos(e);
        saveUndoState();
        floodFill(pos.x, pos.y, currentColor);
        composeAndRender();
        return;
      }
      if (currentTool === 'eyedropper') {
        const pos = getPos(e);
        const color = getColorAtPixel(pos.x, pos.y);
        if (color) {
          currentColor = color;
          colorPicker.value = color;
        }
        return;
      }
      drawing = true;
      saveUndoState();
      const pos = getPos(e);
      points = [pos];
      if (currentTool === 'spray') {
        sprayAtPos(pos);
      } else {
        drawDot(pos);
      }
    }

    function draw(e) {
      if (!drawing) return;
      e.preventDefault();
      const pos = getPos(e);
      if (currentTool === 'spray') {
        sprayAtPos(pos);
        return;
      }
      points.push(pos);
      if (points.length > 3) points.shift();
      if (points.length >= 2) {
        smoothLine(points[points.length - 2], points[points.length - 1]);
      }
    }

    function endDraw(e) {
      drawing = false;
      points = [];
      ctx.beginPath();
    }

    function sprayAtPos(pos) {
      const layerCanvas = layers[activeLayerIndex].canvas;
      const layerCtx = layerCanvas.getContext('2d');
      const density = Math.floor(lineWidth * 1.5);
      layerCtx.fillStyle = currentColor;
      for (let i = 0; i < density; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * lineWidth;
        const dx = pos.x + Math.cos(angle) * dist;
        const dy = pos.y + Math.sin(angle) * dist;
        layerCtx.fillRect(dx, dy, 1.5, 1.5);
      }
      composeAndRender();
    }

    function drawDot(pos) {
      const layerCanvas = layers[activeLayerIndex].canvas;
      const layerCtx = layerCanvas.getContext('2d');
      layerCtx.beginPath();
      layerCtx.arc(pos.x, pos.y, lineWidth / 2, 0, Math.PI * 2);
      layerCtx.fillStyle = (currentTool === 'eraser') ? '#ffffff' : currentColor;
      layerCtx.fill();
      composeAndRender();
    }

    function smoothLine(p1, p2) {
      const layerCanvas = layers[activeLayerIndex].canvas;
      const layerCtx = layerCanvas.getContext('2d');
      layerCtx.beginPath();
      layerCtx.moveTo(p1.x, p1.y);
      layerCtx.lineTo(p2.x, p2.y);
      layerCtx.strokeStyle = (currentTool === 'eraser') ? '#ffffff' : currentColor;
      layerCtx.lineWidth = (currentTool === 'pencil') ? Math.max(1, lineWidth * 0.5) : lineWidth;
      layerCtx.lineCap = 'round';
      layerCtx.lineJoin = 'round';
      layerCtx.globalCompositeOperation = (currentTool === 'eraser') ? 'destination-out' : globalCompositeOp;
      layerCtx.stroke();

      if (currentTool === 'neon') {
        layerCtx.save();
        layerCtx.globalCompositeOperation = 'lighter';
        layerCtx.strokeStyle = currentColor;
        layerCtx.lineWidth = lineWidth * 0.4;
        layerCtx.shadowColor = currentColor;
        layerCtx.shadowBlur = 10;
        layerCtx.stroke();
        layerCtx.restore();
      }
      composeAndRender();
    }

    function updateZoom() {
      zoomLevelSpan.textContent = Math.round(zoom * 100) + '%';
      composeAndRender();
    }

    function setActiveTool(tool) {
      currentTool = tool;
      [brushBtn, neonBrushBtn, pencilBtn, sprayBtn, eraserBtn, fillBtn, eyedropperBtn].forEach(btn => {
        btn.classList.remove('active-tool');
      });
      const btnMap = {
        brush: brushBtn, neon: neonBrushBtn, pencil: pencilBtn,
        spray: sprayBtn, eraser: eraserBtn, fill: fillBtn, eyedropper: eyedropperBtn
      };
      if (btnMap[tool]) btnMap[tool].classList.add('active-tool');

      if (tool === 'eyedropper') {
        canvas.style.cursor = 'crosshair';
      } else if (tool === 'fill') {
        canvas.style.cursor = 'crosshair';
      } else if (tool === 'eraser') {
        canvas.style.cursor = 'cell';
      } else {
        canvas.style.cursor = 'crosshair';
      }
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      launcher.classList.add('hidden');
      app.classList.add('active');
      initLayers();
      initColorPalette();
      composeAndRender();
    });

    brushBtn.addEventListener('click', () => setActiveTool('brush'));
    neonBrushBtn.addEventListener('click', () => setActiveTool('neon'));
    pencilBtn.addEventListener('click', () => setActiveTool('pencil'));
    sprayBtn.addEventListener('click', () => setActiveTool('spray'));
    eraserBtn.addEventListener('click', () => setActiveTool('eraser'));
    fillBtn.addEventListener('click', () => setActiveTool('fill'));
    eyedropperBtn.addEventListener('click', () => setActiveTool('eyedropper'));

    undoBtn.addEventListener('click', undo);
    redoBtn.addEventListener('click', redo);
    colorPicker.addEventListener('input', (e) => currentColor = e.target.value);
    sizeSlider.addEventListener('input', (e) => {
      lineWidth = parseInt(e.target.value);
      sizeValue.textContent = lineWidth + 'px';
    });
    blendSelect.addEventListener('change', (e) => globalCompositeOp = e.target.value);
    addLayerBtn.addEventListener('click', addLayer);
    duplicateLayerBtn.addEventListener('click', duplicateLayer);
    mergeDownBtn.addEventListener('click', mergeDown);
    flipHorizBtn.addEventListener('click', () => flipLayer(true));
    flipVertBtn.addEventListener('click', () => flipLayer(false));
    downloadBtn.addEventListener('click', downloadImage);
    newCanvasBtn.addEventListener('click', newCanvas);
    loadImageBtn.addEventListener('click', () => imageLoader.click());
    imageLoader.addEventListener('change', (e) => {
      if (e.target.files[0]) loadImageToLayer(e.target.files[0]);
      imageLoader.value = '';
    });

    zoomInBtn.addEventListener('click', () => { zoom = Math.min(zoom * 1.2, 5); updateZoom(); });
    zoomOutBtn.addEventListener('click', () => { zoom = Math.max(zoom / 1.2, 0.2); updateZoom(); });
    zoomResetBtn.addEventListener('click', () => { zoom = 1; panX = 0; panY = 0; updateZoom(); });

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    window.addEventListener('resize', composeAndRender);

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
      if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
      if (e.ctrlKey && e.key === 's') { e.preventDefault(); downloadImage(); }
    });
  })();
</script>
</body>
</html>
