<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp · next gen messenger</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* MODERN DESIGN SYSTEM */
        :root {
            /* Colors */
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1e1e1e;
            --bg-chat: #0c0c0c;
            --bg-message-me: #2b2b2b;
            --bg-message-other: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #d4af37;
            --accent-hover: #e6c556;
            --accent-glow: rgba(212, 175, 55, 0.3);
            --danger: #ff4444;
            --success: #4caf50;
            --border: rgba(255, 255, 255, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Glassmorphism */
            --glass-bg: rgba(30, 30, 30, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
        }

        #app {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            max-height: 95vh;
            background: var(--bg-primary);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            position: relative;
            border: 1px solid var(--border);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--accent); }
            50% { box-shadow: 0 0 20px var(--accent); }
            100% { box-shadow: 0 0 5px var(--accent); }
        }

        /* STATUS GLOW EFFECTS */
        .gold-name { background: linear-gradient(135deg, #ffd700, #ffb347); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .ruby-name { background: linear-gradient(135deg, #ff4444, #ff6666); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; text-shadow: 0 0 10px rgba(255, 68, 68, 0.5); }
        .emerald-name { background: linear-gradient(135deg, #44ff44, #66ff66); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; text-shadow: 0 0 10px rgba(68, 255, 68, 0.5); }
        .amethyst-name { background: linear-gradient(135deg, #aa66ff, #cc88ff); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; text-shadow: 0 0 10px rgba(170, 102, 255, 0.5); }

        /* MAIN CONTAINER */
        .main-container {
            display: flex;
            height: 100%;
            overflow: hidden;
        }

        /* SIDEBAR MODERN */
        .sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                width: 280px;
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }

        /* USER PROFILE */
        .user-profile {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05) 0%, transparent 100%);
        }
        .user-profile:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 600;
            overflow: hidden;
            position: relative;
        }
        .avatar::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(135deg, var(--accent), transparent);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-info {
            flex: 1;
        }
        .username-display {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .verified-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#389df2"/><stop offset="100%" stop-color="#1a73e8"/></linearGradient></defs><path fill="url(%23grad)" d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/><path fill="white" d="M9.5 12.5L11.5 14.5L15.5 9.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>');
            background-size: contain;
        }
        .age-badge {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .star-balance {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
            margin-top: 4px;
        }
        .yc-currency {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border-radius: 50%;
            position: relative;
        }
        .yc-currency::after {
            content: "YC";
            font-size: 8px;
            font-weight: bold;
            color: #000;
        }

        /* SEARCH */
        .search-add {
            padding: 16px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .search-add input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 14px;
            transition: var(--transition);
        }
        .search-add input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* CHATS LIST */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item {
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        .chat-item:hover {
            background: var(--bg-tertiary);
        }
        .chat-item.active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), transparent);
            border-left: 3px solid var(--accent);
        }
        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .chat-avatar-img, .channel-avatar-small {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .chat-subscribers {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .streak-badge {
            font-size: 10px;
            background: rgba(255, 107, 0, 0.2);
            padding: 2px 6px;
            border-radius: 20px;
            color: #ff8c00;
        }
        .delete-chat-icon {
            color: var(--danger);
            font-size: 14px;
            opacity: 0.5;
            transition: var(--transition);
            cursor: pointer;
        }
        .delete-chat-icon:hover {
            opacity: 1;
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            position: relative;
        }
        .chat-header {
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: none;
        }
        .back-btn.visible {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-header-info strong {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chat-user-status {
            font-size: 12px;
            color: var(--success);
            margin-top: 4px;
        }
        .chat-user-status.offline {
            color: var(--text-secondary);
        }
        .chat-actions {
            display: flex;
            gap: 10px;
        }
        .tiny-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            transition: var(--transition);
        }
        .tiny-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .subscribe-btn {
            background: linear-gradient(135deg, var(--success), #45a049);
            border: none;
            padding: 8px 14px;
            border-radius: 24px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        .unsubscribe-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* MESSAGES */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 20px;
            background: var(--bg-message-other);
            color: var(--text-primary);
            align-self: flex-start;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
            position: relative;
        }
        .message.me {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--bg-message-me), #2a2a2a);
            border-bottom-right-radius: 4px;
        }
        .message.gift-message {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.05));
            border: 1px solid var(--accent);
            animation: glow 2s infinite;
        }
        .message.bot-message {
            background: linear-gradient(135deg, #2a2418, #1e1a10);
        }
        .message.system-message {
            background: rgba(100, 100, 100, 0.3);
            font-style: italic;
            text-align: center;
            max-width: 90%;
            align-self: center;
        }
        .message-username {
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }
        .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }
        .media-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .inline-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .inline-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
        }
        .inline-btn:hover {
            background: var(--accent);
            color: #000;
        }
        .like-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
        }
        .like-btn.liked {
            color: var(--danger);
        }
        .msg-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 6px;
        }
        .msg-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            opacity: 0.5;
        }
        .msg-actions button:hover {
            opacity: 1;
            color: var(--danger);
        }

        /* INPUT AREA */
        .input-area {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            align-items: center;
        }
        .input-area input[type="text"] {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 12px 18px;
            color: var(--text-primary);
            font-size: 14px;
            transition: var(--transition);
        }
        .input-area input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }
        .file-label {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 10px 14px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }
        .file-label:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        input[type="file"] {
            display: none;
        }

        /* AUTH */
        .auth-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
        }
        .auth-box {
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border);
            animation: fadeIn 0.3s ease;
        }
        .auth-box h2 {
            font-size: 32px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 24px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 14px;
            transition: var(--transition);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border: none;
            padding: 12px;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: var(--transition);
            color: #000;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--accent-glow);
        }
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .auth-switch {
            margin-top: 20px;
            display: flex;
            gap: 12px;
        }
        .auth-error {
            color: var(--danger);
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
        }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }
        .profile-modal {
            background: var(--bg-secondary);
            border-radius: 28px;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            border: 1px solid var(--border);
            animation: slideInRight 0.3s ease;
        }
        .profile-modal h3 {
            font-size: 22px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .profile-banner-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .banner-container {
            width: 100%;
            height: 120px;
            border-radius: 20px;
            overflow: hidden;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
        }
        .banner-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-avatar-overlay {
            position: absolute;
            bottom: -40px;
            left: 20px;
        }
        .avatar-large {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            border: 3px solid var(--bg-secondary);
            overflow: hidden;
        }
        .profile-name-section {
            margin-top: 50px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile-input-group {
            margin-bottom: 16px;
        }
        .profile-input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
        }
        .profile-input-group input, .profile-input-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .profile-actions {
            display: flex;
            gap: 12px;

        function showConfetti() {
            // Простая конфетти анимация через canvas
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '9999';
            document.body.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${Math.random() * 60 + 40}, 100%, 60%)`,
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * Math.PI * 2
                });
            }
            
            let animation;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let allDead = true;
                for (let p of particles) {
                    p.y += p.speed;
                    if (p.y < canvas.height + p.size) allDead = false;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
                if (allDead) {
                    cancelAnimationFrame(animation);
                    canvas.remove();
                } else {
                    animation = requestAnimationFrame(animate);
                }
            }
            animate();
            setTimeout(() => {
                cancelAnimationFrame(animation);
                canvas.remove();
            }, 3000);
        }

        function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) {
            const img = new Image();
            img.onload = () => {
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }
                if (height > maxHeight) {
                    width = (width * maxHeight) / height;
                    height = maxHeight;
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = dataUrl;
        }

                loadSavedMessages();
                loadTapBalances();
                loadYolkChatMessages();
                loadStreaks();
                loadPrivacySettings();
                setupUserListener(clean);
                if (App.lastSeenInterval) clearInterval(App.lastSeenInterval);

            document.getElementById('registerBtn')?.addEventListener('click', () => {

                if (!pass) {
                    errorDiv.innerText = 'Введите пароль';
                    return;
                }
                const clean = '@' + username;

                    errorDiv.innerText = 'Пользователь уже существует';

                    avatar: null, 
                    banner: null,

                    gifts: [], 
                    nfts: [], 
                    bio: '', 
                    verified: false, 
                    status: null, 
                    age: 14, 
                    twoFA: false, 
                    lastSeen: Date.now(), 
                    chatWallpaper: '' 
                };
                database.ref('users/' + clean).set(newUser).then(() => {

                    App.currentUser = clean;

                    saveToFirebase();
                    setupUserListener(clean);

                    errorDiv.innerText = 'Ошибка сервера';

        function attachMainEvents() {
            const backBtn = document.getElementById('backBtn');
            if (backBtn) backBtn.addEventListener('click', () => {
                App.sidebarOpen = true;
                document.getElementById('sidebar')?.classList.add('open');
            });
            const openProfileBtn = document.getElementById('openProfileBtn');
            if (openProfileBtn) openProfileBtn.addEventListener('click', () => openProfileModal(App.currentUser));
            const viewProfileBtn = document.getElementById('viewProfileBtn');
            if (viewProfileBtn) viewProfileBtn.addEventListener('click', () => {
                if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'yolk' && !App.systemBots.includes(App.activeChat)) {
                    openProfileModal(App.activeChat);
                } else if (App.channels[App.activeChat]) {
                    openChannelModal(App.activeChat);
                }
            });
            const giftBtn = document.getElementById('giftBtn');
            if (giftBtn) giftBtn.addEventListener('click', () => openGiftMenu());
            const subscribeBtn = document.getElementById('subscribeBtn');
            if (subscribeBtn) subscribeBtn.addEventListener('click', () => toggleSubscribe());
            const sendBtn = document.getElementById('sendMsgBtn');
            if (sendBtn) sendBtn.addEventListener('click', () => sendMessage());
            const fileUpload = document.getElementById('fileUpload');
            const videoUpload = document.getElementById('videoUpload');
            if (fileUpload) fileUpload.addEventListener('change', handleFileSelect);
            if (videoUpload) videoUpload.addEventListener('change', handleVideoSelect);
            const addUserBtn = document.getElementById('addUserBtn');
            if (addUserBtn) addUserBtn.addEventListener('click', addUserBySearch);
            const messageText = document.getElementById('messageText');
            if (messageText) messageText.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();

            });
            
            // Клик вне сайдбара для закрытия на мобилке
            document.addEventListener('click', (e) => {
                if (window.innerWidth < 768) {
                    const sidebar = document.getElementById('sidebar');
                    if (sidebar && !sidebar.contains(e.target) && !e.target.closest('.back-btn')) {
                        App.sidebarOpen = false;
                        sidebar.classList.remove('open');
                    }
                }
            });
        }
        
        function sendMessage() {
            const textInput = document.getElementById('messageText');
            const text = textInput ? textInput.value.trim() : '';
            if (!text && !App.tempPhoto && !App.tempVideo) {
                showNotification('Введите сообщение или выберите файл', 'error');
                return;
            }
            const from = App.currentUser;
            const to = App.activeChat;
            if (!to || to === 'yolk') {
                showNotification('Сюда нельзя писать', 'error');
                return;
            }
            if (!canUserMessage(from, to) && !App.channels[to]) {
                showNotification('Вы не можете писать этому пользователю', 'error');
                return;
            }
            if (App.channels[to] && App.channels[to].owner !== from) {
                showNotification('Только владелец канала может писать', 'error');
                return;
            }
            
            try {
                let mediaData = null;
                let isVideoMsg = false;
                if (App.tempVideo) {
                    mediaData = App.tempVideo;
                    isVideoMsg = true;
                } else if (App.tempPhoto) {
                    mediaData = App.tempPhoto;
                }
                
                const message = { from, text: text || '', time: Date.now(), photo: mediaData, gift: false, isVideo: isVideoMsg };
                
                if (to === 'saved') {
                    if (!App.savedMessages[from]) App.savedMessages[from] = [];
                    App.savedMessages[from].push(message);
                    saveSavedMessages();
                    showNotification('Сохранено в избранное');
                    renderMessages('saved');
                    playHappySound();
                } else if (App.channels[to]) {
                    if (!App.channels[to].messages) App.channels[to].messages = [];
                    App.channels[to].messages.push(message);
                    saveToFirebase();
                    renderMessages(to);
                    playHappySound();
                } else if (App.systemBots.includes(to)) {
                    let response;
                    if (to === '@game_bot') response = handleGameBot({ text: text }, from);
                    else if (to === '@tap_bot') response = handleTapBot({ text: text }, from);
                    else if (to === '@random_bot') response = handleRandomBot({ text: text }, from);
                    if (response) {
                        const botMessage = { from: to, text: response.text, time: Date.now(), buttons: response.buttons };
                        const chatId = [from, to].sort().join('_');
                        if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] };
                        App.chats[chatId].messages.push(botMessage);
                        saveToFirebase();
                        renderMessages(to);
                        playHappySound();
                    }
                } else {
                    const chatId = [from, to].sort().join('_');
                    if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] };
                    App.chats[chatId].messages.push(message);
                    saveToFirebase();
                    renderMessages(to);
                    playHappySound();
                    updateStreak(to);
                }
                
                if (textInput) textInput.value = '';
                App.tempPhoto = null;
                App.tempVideo = null;
                const fileInput = document.getElementById('fileUpload');
                const videoInput = document.getElementById('videoUpload');
                if (fileInput) fileInput.value = '';
                if (videoInput) videoInput.value = '';
                updateChatList();
            } catch (error) {
                console.error('Ошибка отправки:', error);
                showNotification('Ошибка отправки', 'error');
            }
        }
        
        function renderMessages(chatPartner) {
            const messagesContainer = document.getElementById('messageList');
            if (!messagesContainer) return;
            
            let messages = [];
            if (chatPartner === 'saved') messages = App.savedMessages[App.currentUser] || [];
            else if (chatPartner === 'yolk') messages = App.yolkChatMessages[App.currentUser] || [];
            else if (App.channels[chatPartner]) messages = App.channels[chatPartner].messages || [];
            else {
                const chatId = [App.currentUser, chatPartner].sort().join('_');
                const chat = App.chats[chatId];
                messages = chat ? chat.messages : [];
            }
            
            let html = '';
            if (messages && messages.length > 0) {
                messages.forEach((msg, idx) => {
                    html += renderMessage(msg, idx, App.currentUser, chatPartner);
                });
            } else {
                if (chatPartner === '@game_bot') {
                    const botMsg = handleGameBot({ text: '' }, App.currentUser);
                    html = renderMessage({ from: '@game_bot', text: botMsg.text, time: Date.now(), buttons: botMsg.buttons }, 0, App.currentUser, chatPartner);
                } else if (chatPartner === '@tap_bot') {
                    const botMsg = handleTapBot({ text: '' }, App.currentUser);
                    html = renderMessage({ from: '@tap_bot', text: botMsg.text, time: Date.now(), buttons: botMsg.buttons }, 0, App.currentUser, chatPartner);
                } else if (chatPartner === '@random_bot') {
                    const botMsg = handleRandomBot({ text: '' }, App.currentUser);
                    html = renderMessage({ from: '@random_bot', text: botMsg.text, time: Date.now(), buttons: botMsg.buttons }, 0, App.currentUser, chatPartner);
                } else if (chatPartner === 'yolk') {
                    html = '<div style="text-align:center; color:var(--text-secondary); margin-top:40px; padding:20px;">🥚 Здесь будут коды для входа</div>';
                } else {
                    html = '<div style="text-align:center; color:var(--text-secondary); margin-top:40px; padding:20px;">💬 Нет сообщений. Напишите что-нибудь!</div>';
                }
            }
            messagesContainer.innerHTML = html;
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
            
            if (!App.channels[chatPartner]) updateChatHeaderStatus(chatPartner);
        }
        
        function renderMessage(msg, idx, currentUser, chatPartner) {
            const isMe = msg.from === currentUser || (chatPartner === 'saved' && msg.from === currentUser);
            const isChannel = App.channels[chatPartner] ? true : false;
            const isGift = msg.gift ? true : false;
            const isBotMsg = App.systemBots.includes(msg.from);
            const isSystem = msg.from === 'SYSTEM';
            const fromUserStatusClass = getUserStatus(msg.from)?.class || '';
            
            let canDelete = false;
            if (isChannel) canDelete = App.channels[chatPartner]?.owner === currentUser;
            else if (chatPartner === 'saved') canDelete = true;
            else if (chatPartner === 'yolk') canDelete = false;
            else if (App.systemBots.includes(chatPartner)) canDelete = false;
            else canDelete = isMe;
            
            let mediaHtml = '';
            if (msg.photo) {
                if (msg.isVideo) {
                    mediaHtml = `<video controls class="media-preview"><source src="${msg.photo}" type="video/mp4"></video>`;
                } else {
                    mediaHtml = `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`;
                }
            }
            
            const likesCount = msg.likes ? Object.keys(msg.likes).length : 0;
            const userLiked = msg.likes && msg.likes[currentUser];
            let messageText = msg.text || '';
            if (isGift && messageText.startsWith('🎁 ')) messageText = messageText.substring(2);
            
            let buttonsHtml = '';
            if (isBotMsg && msg.buttons && msg.buttons.length > 0) {
                buttonsHtml = `<div class="inline-buttons">${msg.buttons.map(btn => `<button class="inline-btn" onclick="window.sendBotCommand('${chatPartner}', '${btn}')">${btn}</button>`).join('')}</div>`;
            }
            
            const displayName = fromUserStatusClass ? `<span class="${fromUserStatusClass}">${msg.from}</span>` : msg.from;
            const messageClass = isMe ? 'me' : '';
            
            return `<div class="message ${messageClass} ${isGift ? 'gift-message' : ''} ${isBotMsg ? 'bot-message' : ''} ${isSystem ? 'system-message' : ''}">
                        ${!isMe && !isSystem ? `<small><span class="message-username" onclick="window.openProfileModal('${msg.from}')">${displayName}${App.users[msg.from]?.verified ? '<span class="verified-icon"></span>' : ''}</span></small><br>` : ''}
                        ${isSystem ? `<small>🔔 СИСТЕМА</small><br>` : ''}
                        <div class="message-text">${messageText}</div>
                        ${mediaHtml}
                        ${buttonsHtml}
                        <div class="time">${new Date(msg.time).toLocaleTimeString().slice(0, 5)}</div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                            ${isChannel ? `<button class="like-btn ${userLiked ? 'liked' : ''}" onclick="window.toggleLike('${chatPartner}', ${idx}, event)">❤️ <span>${likesCount}</span></button>` : '<div></div>'}
                            ${canDelete ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">🗑️</button></div>` : ''}
                        </div>
                    </div>`;
        }
        
        function updateChatList() {
            const chatsContainer = document.getElementById('chatsList');
            if (!chatsContainer || !App.currentUser) return;
            
            let chatsList = getChatListForUser(App.currentUser);
            const saved = chatsList.includes('saved') ? ['saved'] : [];
            const yolk = chatsList.includes('yolk') ? ['yolk'] : [];
            const other = chatsList.filter(c => c !== 'saved' && c !== 'yolk');
            const orderedList = [...saved, ...yolk, ...other];
            
            let html = '';
            orderedList.forEach(chat => {
                html += renderChatItem(chat, chat === App.activeChat, App.currentUser);
            });
            chatsContainer.innerHTML = html;
            
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-chat-icon')) return;
                    const chatId = el.dataset.chat;
                    if (App.activeChat === chatId) {
                        if (window.innerWidth < 768) {
                            App.sidebarOpen = false;
                            document.getElementById('sidebar')?.classList.remove('open');
                        }
                        return;
                    }
                    App.activeChat = chatId;
                    localStorage.setItem('yolk_active_chat', chatId);
                    if (window.innerWidth < 768) {
                        App.sidebarOpen = false;
                        document.getElementById('sidebar')?.classList.remove('open');
                    }
                    document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                    el.classList.add('active');
                    render();
                });
            });
        }
        
        function renderChatItem(u, active, currentUser) {
            let name = u === 'saved' ? '📁 ИЗБРАННОЕ' : (u === 'yolk' ? '🥚 YOLK' : u);
            let avatarHtml = '<div class="chat-avatar">📁</div>';
            
            if (u === 'yolk') avatarHtml = '<div class="chat-avatar">🥚</div>';
            else if (u !== 'saved') {
                if (App.channels[u]) {
                    const channelAvatar = App.channels[u]?.avatar;
                    avatarHtml = channelAvatar ? `<div class="chat-avatar"><img src="${channelAvatar}" class="channel-avatar-small"></div>` : '<div class="chat-avatar">📢</div>';
                } else if (App.systemBots.includes(u)) {
                    if (u === '@game_bot') avatarHtml = '<div class="chat-avatar">🎰</div>';
                    else if (u === '@tap_bot') avatarHtml = '<div class="chat-avatar">👆</div>';
                    else if (u === '@random_bot') avatarHtml = '<div class="chat-avatar">🎲</div>';
                    else avatarHtml = '<div class="chat-avatar">🤖</div>';
                } else {
                    const avatarUrl = App.users[u]?.avatar;
                    avatarHtml = avatarUrl ? `<div class="chat-avatar"><img src="${avatarUrl}" class="chat-avatar-img"></div>` : `<div class="chat-avatar">${u[1] || '@'}</div>`;
                }
            }
            
            const userData = App.users[u] || {};
            const displayName = formatUserNameWithStatus(name);
            const streak = getStreak(u);
            const streakHtml = streak > 0 && !App.channels[u] ? `<span class="streak-badge">🔥${streak}</span>` : '';
            
            // Показываем подписчиков для каналов (включая владельца)
            let subscribersHtml = '';
            if (App.channels[u]) {
                const subsCount = App.channels[u]?.subscribers?.length || 0;
                subscribersHtml = `<div class="chat-subscribers">📢 ${subsCount} подписчиков</div>`;
            } else if (userData.age) {
                subscribersHtml = `<div class="chat-subscribers">${userData.age} лет</div>`;
            }
            
            return `<div class="chat-item ${active ? 'active' : ''}" data-chat="${u}">
                        ${avatarHtml}
                        <div class="chat-info">
                            <div class="chat-name">${displayName}${!App.channels[u] && userData.verified ? '<span class="verified-icon"></span>' : ''}${streakHtml}</div>
                            ${subscribersHtml}
                        </div>
                        ${u !== 'saved' && u !== 'yolk' ? `<span class="delete-chat-icon" onclick="window.deleteChat('${u}', event)">🗑️</span>` : ''}
                    </div>`;
        }
        
        function getChatListForUser(user) {
            let set = new Set(['saved', 'yolk']);
            Object.keys(App.chats || {}).forEach(key => {
                const c = App.chats[key];
                if (c) {
                    if (c.user1 === user && c.user2 !== 'saved') set.add(c.user2);
                    if (c.user2 === user && c.user1 !== 'saved') set.add(c.user1);
                }
            });
            Object.keys(App.channels || {}).forEach(channel => {
                if (App.channels[channel].subscribers?.includes(user)) set.add(channel);
            });
            return Array.from(set);
        }
        
        function updateChatHeaderStatus(username) {
            if (App.channels[username]) return;
            const statusDiv = document.getElementById('chatUserStatus');
            if (!statusDiv) return;
            
            if (username === 'saved' || username === 'yolk') {
                statusDiv.textContent = '';
                return;
            }
            
            const isOnline = isUserOnline(username);
            const lastSeenText = formatLastSeen(App.users[username]?.lastSeen, username);
            statusDiv.textContent = isOnline ? '🟢 в сети' : `⚫ был(а) ${lastSeenText}`;
            statusDiv.className = 'chat-user-status' + (isOnline ? '' : ' offline');
        }
        
        function loadMessages(chatPartner) {
            if (chatPartner === 'saved' || chatPartner === 'yolk') {
                renderMessages(chatPartner);
                return;
            }
            if (chatPartner === '@game_bot' || chatPartner === '@tap_bot' || chatPartner === '@random_bot') {
                renderMessages(chatPartner);
                return;
            }
            if (App.channels[chatPartner]) {
                renderMessages(chatPartner);
                return;
            }
            const chatId = [App.currentUser, chatPartner].sort().join('_');
            setupRealtimeListener(chatId, chatPartner);
            renderMessages(chatPartner);
            setupUserListener(chatPartner);
            updateChatHeaderStatus(chatPartner);
        }
        
        function setupRealtimeListener(chatId, chatPartner) {
            const chatRef = database.ref('chats/' + chatId);
            chatRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (!App.chats[chatId]) App.chats[chatId] = data;
                    else App.chats[chatId].messages = data.messages || [];
                    if (App.activeChat === chatPartner) {
                        renderMessages(chatPartner);
                    }
                }
            });
        }
        
        function setupUserListener(username) {
            if (App.userListeners[username]) return;
            const userRef = database.ref('users/' + username);
            userRef.on('value', (snapshot) => {
                const userData = snapshot.val();
                if (userData) {
                    App.users[username] = { ...App.users[username], ...userData };
                    if (username === App.currentUser) {
                        updateUserInterface();
                        updateSidebarUser();
                        applyWallpaper();
                    }
                    if (App.activeChat === username || (App.activeChat && App.chats[App.activeChat] && 
                        (App.chats[App.activeChat].user1 === username || App.chats[App.activeChat].user2 === username))) {
                        updateChatHeaderStatus(username);
                        updateChatList();
                    }
                }
            });
            App.userListeners[username] = true;
        }
        
        function updateLastSeen(username) {
            if (App.users[username] && username === App.currentUser) {
                App.users[username].lastSeen = Date.now();
                database.ref('users/' + username + '/lastSeen').set(Date.now());
            }
        }
        
        function loadSavedMessages() {
            if (!App.currentUser) return;
            const saved = localStorage.getItem('yolk_saved_' + App.currentUser);
            if (saved) {
                try { App.savedMessages[App.currentUser] = JSON.parse(saved); } 
                catch(e) { App.savedMessages[App.currentUser] = []; }
            } else { App.savedMessages[App.currentUser] = []; }
        }
        
        function saveSavedMessages() {
            if (App.currentUser) {
                localStorage.setItem('yolk_saved_' + App.currentUser, JSON.stringify(App.savedMessages[App.currentUser] || []));
            }
        }
        
        function loadTapBalances() {
            const balances = localStorage.getItem('yolk_tap_balances');
            if (balances) { try { App.tapBalances = JSON.parse(balances); } catch(e) { App.tapBalances = {}; } }
            else { App.tapBalances = {}; }
            const upgrades = localStorage.getItem('yolk_tap_upgrades');
            if (upgrades) { try { App.tapUpgrades = JSON.parse(upgrades); } catch(e) { App.tapUpgrades = {}; } }
            else { App.tapUpgrades = {}; }
        }
        
        function loadYolkChatMessages() {
            const saved = localStorage.getItem('yolk_chat_messages');
            if (saved) { try { App.yolkChatMessages = JSON.parse(saved); } catch(e) { App.yolkChatMessages = {}; } }
            else { App.yolkChatMessages = {}; }
        }
        
        function saveYolkChatMessages() {
            localStorage.setItem('yolk_chat_messages', JSON.stringify(App.yolkChatMessages));
            if (App.dataLoaded) database.ref('yolkChatMessages').set(App.yolkChatMessages).catch(e => console.error(e));
        }
        
        function loadPrivacySettings() {
            const saved = localStorage.getItem('yolk_privacy');
            if (saved) { try { App.privacySettings = JSON.parse(saved); } catch(e) { App.privacySettings = {}; } }
            else { App.privacySettings = {}; }
        }
        
        function savePrivacySettings() {
            localStorage.setItem('yolk_privacy', JSON.stringify(App.privacySettings));
            if (App.dataLoaded) database.ref('privacySettings').set(App.privacySettings).catch(e => console.error(e));
        }
        
        // ========== БОТЫ ==========
        function handleGameBot(message, fromUser) {
            const isSpin = message.text && message.text.includes('КРУТИТЬ');
            if (isSpin) {
                if (App.users[fromUser].stars < 5) {
                    return { text: `❌ Недостаточно YC! Нужно 5 YC для игры.\n\n[?][?][?]`, buttons: ['КРУТИТЬ (5 YC)'] };
                }
                App.users[fromUser].stars -= 5;
                const results = [];
                for (let i = 0; i < 3; i++) results.push(App.gameSymbols[Math.floor(Math.random() * App.gameSymbols.length)]);
                let win = 0;
                if (results[0] === results[1] && results[1] === results[2]) {
                    win = 10;
                    App.users[fromUser].stars += win;
                }
                saveToFirebase();
                updateUserInterface();
                const resultText = `[${results[0]}] [${results[1]}] [${results[2]}]`;
                if (win > 0) {
                    return { text: `${resultText}\n\n✨ ВЫИГРЫШ! +${win} YC ✨\nБаланс: ${App.users[fromUser].stars} YC`, buttons: ['КРУТИТЬ (5 YC)'] };
                } else {
                    return { text: `${resultText}\n\n😢 ПРОИГРЫШ...\nБаланс: ${App.users[fromUser].stars} YC`, buttons: ['КРУТИТЬ (5 YC)'] };
                }
            }
            return { text: `🎰 ИГРОВОЙ АВТОМАТ 🎰\n\n[?][?][?]\n\nПравила: нажми "КРУТИТЬ (5 YC)" и выиграй 10 YC если выпадут 3 одинаковых символа!\n\nДоступные символы: ${App.gameSymbols.join(' ')}\n\nYC Баланс: ${App.users[fromUser].stars} YC`, buttons: ['КРУТИТЬ (5 YC)'] };
        }
        
        function handleTapBot(message, fromUser) {
            if (!App.tapBalances[fromUser]) App.tapBalances[fromUser] = 0;
            if (!App.tapUpgrades[fromUser]) App.tapUpgrades[fromUser] = 0;
            const currentLevel = App.tapUpgrades[fromUser] || 0;
            const currentReward = tapUpgradeLevels[currentLevel].reward;
            const nextCost = tapUpgradeLevels[currentLevel].nextCost;
            const nextReward = currentLevel < 4 ? tapUpgradeLevels[currentLevel + 1].reward : null;
            
            if (message.text && message.text.includes('ТАПНУТЬ')) {
                App.tapBalances[fromUser] += currentReward;
                saveTapBalances();
                updateUserInterface();
                return { text: `👆 ВЫ ТАПНУЛИ! +${currentReward} 💲\n\n💰 Баланс: ${App.tapBalances[fromUser]} 💲\n📈 За клик: ${currentReward} 💲`, buttons: ['ТАПНУТЬ (👆)', nextCost !== null ? `ПРОКАЧАТЬ (${nextCost}💲 → ${nextReward}💲/клик)` : 'МАКСИМУМ!'] };
            }
            if (message.text && message.text.includes('ПРОКАЧАТЬ')) {
                if (canUpgradeTap(fromUser)) {
                    upgradeTap(fromUser);
                    const newLevel = App.tapUpgrades[fromUser] || 0;
                    const newReward = tapUpgradeLevels[newLevel].reward;
                    const newNextCost = tapUpgradeLevels[newLevel].nextCost;
                    const newNextReward = newLevel < 4 ? tapUpgradeLevels[newLevel + 1].reward : null;
                    saveTapBalances();
                    updateUserInterface();
                    return { text: `✨ ПРОКАЧКА УСПЕШНА! ✨\n\nТеперь за клик: +${newReward} 💲\n💰 Баланс: ${App.tapBalances[fromUser]} 💲`, buttons: ['ТАПНУТЬ (👆)', newNextCost !== null ? `ПРОКАЧАТЬ (${newNextCost}💲 → ${newNextReward}💲/клик)` : 'МАКСИМУМ!'] };
                } else {
                    const needed = nextCost - (App.tapBalances[fromUser] || 0);
                    return { text: `❌ НЕДОСТАТОЧНО 💲!\nНужно еще ${needed} 💲 для прокачки\n\n💰 Баланс: ${App.tapBalances[fromUser]} 💲\n📈 За клик: ${currentReward} 💲`, buttons: ['ТАПНУТЬ (👆)', nextCost !== null ? `ПРОКАЧАТЬ (${nextCost}💲 → ${nextReward}💲/клик)` : 'МАКСИМУМ!'] };
                }
            }
            return { text: `🤖 TAP БОТ 🤖\n\n💰 Баланс: ${App.tapBalances[fromUser]} 💲\n📈 За клик: ${currentReward} 💲\n\n${nextCost !== null ? `⬆️ Следующий уровень: ${nextCost} 💲 → +${nextReward} 💲/клик` : '🏆 МАКСИМАЛЬНЫЙ УРОВЕНЬ ДОСТИГНУТ!'}\n\nНажми на кнопку, чтобы тапнуть!`, buttons: ['ТАПНУТЬ (👆)', nextCost !== null ? `ПРОКАЧАТЬ (${nextCost}💲 → ${nextReward}💲/клик)` : 'МАКСИМУМ!'] };
        }
        
        function handleRandomBot(message, fromUser) {
            const range0_10 = message.text && message.text.includes('от 0 до 10');
            if (range0_10) {
                const random = Math.floor(Math.random() * 11);
                return { text: `🎲 СЛУЧАЙНОЕ ЧИСЛО:\n\n${random}\n\nЗагадать еще?`, buttons: ['от 0 до 10'] };
            }
            return { text: `🎲 RANDOM БОТ 🎲\n\nЯ могу загадать случайное число от 0 до 10!\n\nНажми на кнопку:`, buttons: ['от 0 до 10'] };
        }
        
        function getTapReward(username) {
            const level = App.tapUpgrades[username] || 0;
            return tapUpgradeLevels[level].reward;
        }
        
        function canUpgradeTap(username) {
            const level = App.tapUpgrades[username] || 0;
            const cost = tapUpgradeLevels[level].nextCost;
            if (cost === null) return false;
            return (App.tapBalances[username] || 0) >= cost;
        }
        
        function upgradeTap(username) {
            const level = App.tapUpgrades[username] || 0;
            const cost = tapUpgradeLevels[level].nextCost;
            if (cost === null) return false;
            if ((App.tapBalances[username] || 0) >= cost) {
                App.tapBalances[username] -= cost;
                App.tapUpgrades[username] = level + 1;
                saveTapBalances();
                updateUserInterface();
                return true;
            }
            return false;
        }

            localStorage.setItem('yolk_tap_balances', JSON.stringify(App.tapBalances));
            localStorage.setItem('yolk_tap_upgrades', JSON.stringify(App.tapUpgrades));
            if (App.dataLoaded) {
                database.ref('tapBalances').set(App.tapBalances).catch(e => console.error(e));

                        msgs.splice(idx, 1);

                        renderMessages(chatPartner);

        function loadFromFirebase() {
            console.log('🔄 Загрузка данных...');
            try {
                database.ref().get().then(snapshot => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        if (data.users) App.users = data.users;
                        if (data.chats) App.chats = data.chats;
                        if (data.blocked) App.blocked = data.blocked;
                        if (data.channels) App.channels = data.channels;
                        if (data.tapBalances) App.tapBalances = data.tapBalances;
                        if (data.tapUpgrades) App.tapUpgrades = data.tapUpgrades;
                        if (data.yolkChatMessages) App.yolkChatMessages = data.yolkChatMessages;
                        if (data.streaks) App.streaks = data.streaks;
                        if (data.privacySettings) App.privacySettings = data.privacySettings;
                        localStorage.setItem('yolk_cache', JSON.stringify({ users: App.users, chats: App.chats, blocked: App.blocked, channels: App.channels }));
                        if (data.tapBalances || data.tapUpgrades) saveTapBalances();
                        if (data.yolkChatMessages) saveYolkChatMessages();
                        if (data.streaks) saveStreaks();
                        if (data.privacySettings) savePrivacySettings();
                    }
                    const savedUser = localStorage.getItem('yolk_current_user');
                    const savedChat = localStorage.getItem('yolk_active_chat');
                    if (savedUser && App.users[savedUser]) {
                        App.currentUser = savedUser;
                        App.activeChat = savedChat && (savedChat === 'saved' || savedChat === 'yolk' || App.users[savedChat] || App.channels[savedChat]) ? savedChat : 'saved';
                        loadSavedMessages();
                        loadTapBalances();
                        loadYolkChatMessages();
                        loadStreaks();
                        loadPrivacySettings();
                        setupUserListener(App.currentUser);
                        if (App.lastSeenInterval) clearInterval(App.lastSeenInterval);
                        App.lastSeenInterval = setInterval(() => { updateLastSeen(App.currentUser); }, 30000);
                        updateLastSeen(App.currentUser);
                    }
                    App.dataLoaded = true;
                    render();
                }).catch(error => {
                    console.error('Ошибка Firebase:', error);
                    const cachedData = localStorage.getItem('yolk_cache');
                    if (cachedData) {
                        try {
                            const cache = JSON.parse(cachedData);
                            if (cache.users) App.users = cache.users;
                            if (cache.chats) App.chats = cache.chats;
                            if (cache.blocked) App.blocked = cache.blocked;
                            if (cache.channels) App.channels = cache.channels;
                        } catch(e) {}
                    }
                    const savedUser = localStorage.getItem('yolk_current_user');
                    if (savedUser && App.users[savedUser]) {
                        App.currentUser = savedUser;
                        App.activeChat = localStorage.getItem('yolk_active_chat') || 'saved';
                        loadSavedMessages();
                        loadTapBalances();
                        loadYolkChatMessages();
                        loadStreaks();
                        loadPrivacySettings();
                        setupUserListener(App.currentUser);
                    }
                    App.dataLoaded = true;
                    render();
                });
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        window.addEventListener('load', () => {
            initBots();
            loadFromFirebase();
        });
    </script>
</body>
</html>
