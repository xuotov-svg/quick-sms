<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/logo.jpg">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        /* ===== ВЕСЬ СТИЛЬ ОСТАЁТСЯ БЕЗ ИЗМЕНЕНИЙ (НЕ ТРОГАЕМ) ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg: #0a0a0a;
            --bg-panel: #0f0f0f;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --soft: #1a1a1a;
            --border: #2a2a2a;
            --accent: #d4af37;
            --accent-soft: #2a2418;
            --message-me: #1e2a3a;
            --message-other: #1a1a1a;
            --header: #0a0a0a;
            --shadow: rgba(0,0,0,0.5);
            --danger: #ff4444;
            --success: #4CAF50;
            --input-bg: rgba(0,0,0,0.5);
            --glass-bg: rgba(10, 10, 15, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(212, 175, 55, 0.15);
            --hover-border: rgba(212, 175, 55, 0.4);
        }
        
        body.light-theme {
            --bg: #ffffff;
            --bg-panel: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --soft: #e9ecef;
            --border: #dee2e6;
            --accent: #b8860b;
            --accent-soft: #fff3cd;
            --message-me: #e3f2fd;
            --message-other: #f1f3f4;
            --header: #ffffff;
            --shadow: rgba(0,0,0,0.08);
            --input-bg: rgba(0,0,0,0.03);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(184, 134, 11, 0.08);
            --hover-border: rgba(184, 134, 11, 0.25);
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            padding: 0;
            margin: 0;
            transition: background 0.2s ease;
        }
        
        #app {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            background: var(--bg-panel);
            box-shadow: 0 0 20px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            position: relative;
            z-index: 1;
            transition: background 0.2s ease;
        }
        
        .chat-area,
        .sidebar,
        .chat-header,
        .input-area,
        .auth-box,
        .profile-modal,
        .message,
        .chat-item,
        .user-profile,
        .search-add,
        .two-factor-box,
        .shop-section,
        .feed-container,
        .post-card,
        .comments-modal {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        
        .chat-item:hover,
        .chat-item.active,
        .btn:hover,
        .icon-btn:hover,
        .send-btn:hover,
        .profile-btn:hover,
        .tab:hover,
        .tab.active,
        .nav-item:hover,
        .nav-item.active {
            background: var(--hover-bg);
            border-color: var(--hover-border);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        
        .chat-area, .feed-container {
            background-color: transparent !important;
            position: relative;
        }
        
        body:not(.light-theme) .chat-area,
        body:not(.light-theme) .feed-container {
            background-color: #0a0a0a !important;
        }
        
        body.light-theme .chat-area,
        body.light-theme .feed-container {
            background-color: #ffffff !important;
        }
        
        .yc-currency {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background-image: url('https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/wpzqwSbImbdyjUJ2s0oSvqLdaEE6_dmPD-8nhrp7NeMfIbWcP8KWCEuET5rKHB4FzkmtnwvQzrzI-T-931kLpPBv.png');
            background-size: cover;
            background-position: center;
            margin-right: 4px;
            position: relative;
        }
        
        .star-balance-large {
            font-size: 24px;
            background: var(--glass-bg);
            padding: 12px 16px;
            border-radius: 16px;
            justify-content: center;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .star-balance-large .yc-currency {
            width: 32px;
            height: 32px;
            margin-right: 0;
            flex-shrink: 0;
        }
        .verified-icon {
            display: inline-block;
            width: 32px;
            height: 32px;
            background-image: url('https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/bot%20(1).png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-left: 0px;
            vertical-align: middle;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: transparent;
            position: relative;
            z-index: 1;
        }
        
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--message-other);
            color: var(--text);
            align-self: flex-start;
            word-break: break-word;
            border: 1px solid var(--glass-border);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        
        .message.me {
            align-self: flex-end;
            background: var(--message-me);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @keyframes albumenCharGlow {
            0% { text-shadow: 0 0 0 #0066cc; color: #0066cc; opacity: 0.8; }
            15% { text-shadow: 0 0 8px #88ccff, 0 0 3px #aaddff; color: #3399ff; opacity: 1; }
            30% { text-shadow: 0 0 12px #88ccff, 0 0 5px #66bbff; color: #0066cc; opacity: 1; }
            50% { text-shadow: 0 0 5px #88ccff; color: #2277dd; opacity: 0.9; }
            100% { text-shadow: 0 0 0 #0066cc; color: #0066cc; opacity: 0.8; }
        }
        
        .albumen-name {
            font-weight: bold;
            display: inline-flex;
            flex-wrap: wrap;
        }
        
        .albumen-char {
            display: inline-block;
            animation: albumenCharGlow 3s ease-in-out infinite;
        }
        
        .message-text { color: var(--text); }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; color: var(--text-secondary); }
        .message small { color: var(--text-secondary); }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--message-other);
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 8px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 13px;
        }
        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span {
            width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }
        .loading-text {
            color: var(--text);
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 4px;
        }
        .loading-dots {
            display: inline-block;
        }
        .loading-dots span {
            animation: dotPulse 1.4s ease-in-out infinite;
            display: inline-block;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
        }
        
        .icon-btn,
        .send-btn,
        .file-label,
        .tiny-btn,
        .inline-btn,
        .profile-btn,
        .subscribe-btn,
        .unsubscribe-btn,
        .like-btn,
        .dislike-btn,
        .settings-icon,
        .delete-chat-icon,
        .tab,
        .msg-actions button,
        .back-btn,
        .change-username-btn,
        .toggle-password,
        .resend-link,
        .shop-item button,
        .close-btn,
        .nav-item,
        .post-like,
        .post-dislike,
        .post-comment,
        .post-delete,
        .create-post-btn {
            transition: all 0.2s ease;
        }
        
        .gift-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0;
            padding: 12px;
            background: var(--glass-bg);
            border-radius: 16px;
            justify-content: flex-start;
            border: 1px solid var(--glass-border);
        }
        .gift-item {
            background: rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            width: 80px;
            cursor: grab;
            transition: all 0.1s ease;
            text-align: center;
            user-select: none;
        }
        .gift-item:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .gift-item.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
        .gift-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            pointer-events: none;
        }
        .gift-price {
            font-size: 12px;
            color: var(--accent);
            margin-top: 4px;
        }
        .gift-source {
            font-size: 9px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .shop-section { background: var(--glass-bg); border-radius: 16px; padding: 16px; margin: 16px 0; border: 1px solid var(--glass-border); }
        .shop-section h4 { color: var(--text); margin-bottom: 12px; }
        .shop-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--glass-border); color: var(--text); }
        .shop-item button { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--glass-border); color: #6b7280; padding: 6px 12px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 12px; }
        .shop-item button:hover { background: rgba(212, 175, 55, 0.4); }
        
        .profile-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        .profile-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--glass-border); color: #6b7280; padding: 12px; border-radius: 12px; font-size: 14px; font-weight: 600; flex: 1; cursor: pointer; text-align: center; }
        .profile-btn.secondary { background: rgba(255,255,255,0.1); color: #6b7280; }
        .profile-btn.logout { background: #ff4444; color: #ffffff; }
        .profile-btn.warning { background: #ff9800; color: #000000; }
        .profile-btn:hover { transform: translateY(-2px); }
        
        .currency-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: block; }
        .hidden { display: none; }
        
        ::-webkit-scrollbar { width: 4px; background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        
        .notification { position: fixed; top: 20px; right: 20px; background: var(--glass-bg); color: var(--text); padding: 12px 24px; border-radius: 16px; z-index: 10000; animation: slideIn 0.3s ease; border: 1px solid var(--glass-border); font-weight: 500; backdrop-filter: blur(8px); }
        .notification.error { background: #ff4444; color: white; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 20;
        }
        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px;
            color: #6b7280;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border-radius: 12px;
            margin: 0 8px;
            transition: all 0.2s;
        }
        .nav-item.active {
            color: var(--accent);
            background: rgba(212, 175, 55, 0.2);
        }
        
        .feed-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--glass-bg);
            position: relative;
            z-index: 5;
            width: 100%;
        }
        .post-card {
            background: var(--glass-bg);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--glass-border);
            transition: transform 0.2s;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
        }
        .post-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-author {
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .post-time {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .post-text {
            margin-bottom: 12px;
            color: var(--text);
            word-break: break-word;
        }
        .post-media {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .post-stats {
            display: flex;
            gap: 16px;
            margin-top: 12px;
            border-top: 1px solid var(--glass-border);
            padding-top: 12px;
            align-items: center;
        }
        .post-stats button {
            background: rgba(212, 175, 55, 0.12);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #d4af37;
        }
        .post-stats button:hover {
            transform: translateY(-2px);
            background: rgba(212, 175, 55, 0.25);
            border-color: #d4af37;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
        }
        .post-stats button:active {
            transform: scale(0.96);
        }
        .post-like.active, .post-dislike.active {
            background: rgba(212, 175, 55, 0.35);
            border-color: #d4af37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.4);
        }
        .post-like img, .post-comment img, .post-delete img {
            width: 24px;
            height: 24px;
            object-fit: contain;
        }
        .post-delete {
            background: rgba(255, 68, 68, 0.12) !important;
            border-color: rgba(255, 68, 68, 0.3) !important;
            color: #ff6666 !important;
            padding: 8px 12px !important;
        }
        .post-delete:hover {
            background: rgba(255, 68, 68, 0.25) !important;
            border-color: #ff4444 !important;
        }
        
        .create-post-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: var(--accent);
            color: #000000;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--shadow);
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .create-post-btn:hover {
            transform: scale(1.05);
        }
        .comments-modal {
            background: var(--glass-bg);
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .comment-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--glass-border);
        }
        .comment-author {
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
        }
        .comment-text {
            color: var(--text);
            margin-top: 4px;
        }
        .comment-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .add-comment {
            margin-top: 16px;
            display: flex;
            gap: 8px;
        }
        .add-comment input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 8px 12px;
            color: var(--text);
        }
        
        @media (max-width: 768px) {
            .main-container { margin-bottom: 60px; }
            .create-post-btn { bottom: 70px; }
        }
        .bottom-nav {
            display: none;
        }
        @media (max-width: 768px) {
            .bottom-nav {
                display: flex;
            }
        }

        /* Additional layout fixes */
        .profile-banner-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .banner-container { width: 100%; height: 150px; border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .banner-image { width: 100%; height: 100%; object-fit: cover; }
        .banner-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; }
        body.light-theme .banner-placeholder { background: #f0f0f0; color: #aaa; }
        body.light-theme .banner-container { background: #f0f0f0; }
        
        .profile-avatar-overlay { position: absolute; bottom: -40px; left: 20px; z-index: 10; }
        .profile-avatar-overlay .avatar-large { width: 100px; height: 100px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--text); overflow: hidden; box-shadow: 0 4px 20px var(--shadow); }
        body.light-theme .profile-avatar-overlay .avatar-large { background: #e0e0e0; }
        .profile-avatar-overlay .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-name-section { margin-top: 50px; padding-left: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 4px; }
        
        .settings-icon { cursor: pointer; font-size: 24px; padding: 8px; border-radius: 50%; transition: 0.2s; background: none; border: none; color: var(--text); }
        .settings-icon:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
        .settings-icon-img { width: 28px; height: 28px; object-fit: contain; cursor: pointer; }
        
        .toggle-switch { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle-switch .toggle-label { font-size: 14px; color: var(--text); }
        .toggle-switch .toggle-checkbox { width: 40px; height: 20px; background: #2a2a2a; border-radius: 20px; position: relative; transition: 0.2s; border: 1px solid var(--glass-border); }
        .toggle-switch .toggle-checkbox::after { content: ""; width: 16px; height: 16px; background: #ffffff; border-radius: 50%; position: absolute; top: 1px; left: 2px; transition: 0.2s; }
        .toggle-switch.active .toggle-checkbox { background: var(--accent); }
        .toggle-switch.active .toggle-checkbox::after { left: 20px; }
        
        .auth-container, .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .auth-box { max-width: 400px; margin: auto; background: var(--glass-bg); padding: 30px 24px; border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px var(--shadow); width: 90%; animation: fadeIn 0.3s ease; }
        .auth-box h2 { color: var(--accent); margin-bottom: 16px; font-weight: 500; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }

                    .single();
                    
                if (error) {
                    console.warn('Error loading state, creating new:', error);

                const { error } = await supabase

                    .upsert({ id: STATE_ROW_ID, data: stateData }, { onConflict: 'id' });
                if (error) console.error('Error saving state:', error);
            }
            
            function subscribeToAppState() {
                supabase
                    .channel('app_state_changes')
                    .on('postgres_changes',

                                    users: App.users, chats: App.chats, blocked: App.blocked

                                    applyWallpaper();
                                    applyWallpaperToFeed();

                                }
                            }

                } catch (e) {
                    console.error('Error saving to Supabase:', e);
                }

                            Object.keys(App.users).forEach(u => {
                                if (!App.users[u].followers) App.users[u].followers = [];
                                if (!App.users[u].following) App.users[u].following = [];
                                if (!App.users[u].gifts) App.users[u].gifts = [];

            function formatLastSeen(lastSeen, chatPartner) {
                if (chatPartner === 'saved' || chatPartner === 'yolk') return '';
                if (!lastSeen) return 'long ago';
                const now = Date.now();
                const diff = now - lastSeen;
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);
                if (minutes < 1) return 'just now';
                if (minutes < 5) return `${minutes} min ago`;
                if (minutes < 15) return '5 min ago';
                if (minutes < 30) return '15 min ago';
                if (minutes < 60) return '30 min ago';
                if (hours < 2) return '1 hour ago';
                if (hours < 5) return `${hours} hours ago`;
                if (hours < 24) return `${hours} hours ago`;
                if (days === 1) return '1 day ago';
                if (days < 5) return `${days} days ago`;
                return `${days} days ago`;
            }

            function playHappySound() { if (!App.soundEnabled) return; try { if (!App.audioCtx) { App.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); App.audioCtx.resume(); } const ctx = App.audioCtx; const now = ctx.currentTime; const osc1 = ctx.createOscillator(); const gain = ctx.createGain(); osc1.connect(gain); gain.connect(ctx.destination); gain.gain.value = 0.2; osc1.frequency.value = 880; osc1.start(); gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3); osc1.stop(now + 0.3); } catch(e) { console.log('Sound error:', e); } }
            function showConfetti() { const confettiDiv = document.createElement('div'); confettiDiv.className = 'confetti'; for (let i = 0; i < 50; i++) { const piece = document.createElement('div'); piece.className = 'confetti-piece'; piece.style.left = Math.random() * 100 + '%'; piece.style.animationDelay = Math.random() * 2 + 's'; piece.style.background = ['#ffd700', '#ffb347', '#ff8c00', '#d4af37'][Math.floor(Math.random() * 4)]; confettiDiv.appendChild(piece); } document.body.appendChild(confettiDiv); setTimeout(() => confettiDiv.remove(), 3000); }
            function showNotification(message, type = 'success') { const notification = document.createElement('div'); notification.className = 'notification' + (type === 'error' ? ' error' : ''); notification.textContent = message; document.body.appendChild(notification); setTimeout(() => notification.remove(), 3000); }
            function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) { const img = new Image(); img.onload = () => { let width = img.width; let height = img.height; if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; } if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; } const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height); const compressedDataUrl = canvas.toDataURL('image/jpeg', quality); callback(compressedDataUrl); }; img.src = dataUrl; }

            function subscribeToUser(currentUser, targetUser) {

                ensureUserFollowData(currentUser);

                const idxFollower = App.users[targetUser].followers.indexOf(currentUser);
                if (idxFollower !== -1) App.users[targetUser].followers.splice(idxFollower, 1);
                saveToSupabase();
                showNotification(`You unfollowed ${getDisplayName(targetUser)}`);
                return true;

            function formatSubscribers(count) {

            function setupGiftDragDrop(container, username) {
                if (!container) return;
                const items = container.querySelectorAll('.gift-item');
                let dragSrcElement = null;
                
                function handleDragStart(e) {
                    dragSrcElement = this;
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/html', this.innerHTML);
                    this.classList.add('dragging');
                }
                
                function handleDragOver(e) {
                    if (e.preventDefault) e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    return false;
                }
                
                function handleDrop(e) {
                    if (e.stopPropagation) e.stopPropagation();
                    if (dragSrcElement !== this) {
                        const parent = this.parentNode;
                        const srcIndex = Array.from(parent.children).indexOf(dragSrcElement);
                        const targetIndex = Array.from(parent.children).indexOf(this);
                        
                        if (srcIndex < targetIndex) {
                            parent.insertBefore(dragSrcElement, this.nextSibling);
                        } else {
                            parent.insertBefore(dragSrcElement, this);
                        }
                        
                        const gifts = App.users[username].gifts;
                        if (gifts && srcIndex !== -1 && targetIndex !== -1) {
                            const temp = gifts[srcIndex];
                            gifts[srcIndex] = gifts[targetIndex];
                            gifts[targetIndex] = temp;
                            saveToSupabase();
                        }
                    }
                    return false;
                }
                
                function handleDragEnd(e) {
                    this.classList.remove('dragging');
                    items.forEach(item => item.classList.remove('dragging'));
                }
                
                items.forEach(item => {
                    item.setAttribute('draggable', true);
                    item.addEventListener('dragstart', handleDragStart);
                    item.addEventListener('dragover', handleDragOver);
                    item.addEventListener('drop', handleDrop);
                    item.addEventListener('dragend', handleDragEnd);
                });
            }

                        function attachAuthEvents() { 
                const loginForm = document.getElementById('loginForm'); 
                const regForm = document.getElementById('registerForm'); 
                const errorDiv = document.getElementById('authError'); 
                document.getElementById('showRegisterBtn')?.addEventListener('click', () => { loginForm.style.display = 'none'; regForm.style.display = 'block'; }); 
                document.getElementById('showLoginBtn')?.addEventListener('click', () => { regForm.style.display = 'none'; loginForm.style.display = 'block'; }); 
                document.getElementById('loginBtn')?.addEventListener('click', () => { 
                    let username = document.getElementById('loginUsername').value.trim().toLowerCase(); 
                    const email = document.getElementById('loginEmail').value.trim();
                    const pass = document.getElementById('loginPassword').value.trim(); 
                    if (!isValidUsername(username)) { errorDiv.innerText = '! Invalid username format'; return; } 
                    if (!email || !/^\S+@\S+\.\S+$/.test(email)) { errorDiv.innerText = '! Invalid email'; return; }
                    const clean = '@' + username;
                    
                    let mainUsername = findMainUsername(clean);
                    if (!mainUsername) {
                        if (App.users[clean]) mainUsername = clean;
                    }
                    
                    if (!mainUsername || !App.users[mainUsername] || App.users[mainUsername].password !== pass || (App.users[mainUsername].email && App.users[mainUsername].email.toLowerCase() !== email.toLowerCase())) { 
                        errorDiv.innerText = '! Incorrect username, email or password'; 
                        return; 
                    } 
                    const user = App.users[mainUsername]; 
                    function loginSuccess() { 
                        App.currentUser = mainUsername; 
                        localStorage.setItem('yolk_current_user', mainUsername); 
                        loadSavedMessages(); 
                        loadYolkChatMessages(); 
                        loadStreaks(); 
                        loadPrivacySettings(); 
                        if (App.lastSeenInterval) clearInterval(App.lastSeenInterval); 
                        App.lastSeenInterval = setInterval(() => { updateLastSeen(mainUsername); }, 30000); 
                        updateLastSeen(mainUsername); 
                        render();

                        <button class="create-post-btn" id="createPostBtn">+</button>
                        `}
                    </div>
                    <div class="bottom-nav">
                        <div class="nav-item ${App.activeTab === 'chats' ? 'active' : ''}" data-tab="chats">CHATS</div>
                        <div class="nav-item ${App.activeTab === 'feed' ? 'active' : ''}" data-tab="feed">FEED</div>
                    </div>
                `; 
            }

            function attachMainEvents() { 
                const backBtn = document.getElementById('backBtn'); if (backBtn) backBtn.addEventListener('click', () => { App.sidebarOpen = true; document.querySelector('.sidebar').classList.add('open'); });
                const openProfileBtn = document.getElementById('openProfileBtn'); if (openProfileBtn) openProfileBtn.addEventListener('click', () => openProfileModal(App.currentUser));
                const viewProfileBtn = document.getElementById('viewProfileBtn'); if (viewProfileBtn) viewProfileBtn.addEventListener('click', () => { if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'yolk') { openProfileModal(App.activeChat); } });
                const giftBtn = document.getElementById('giftBtn'); if (giftBtn) giftBtn.addEventListener('click', openGiftMenu);
                const sendBtn = document.getElementById('sendMsgBtn'); if (sendBtn) sendBtn.addEventListener('click', sendMessage);
                const fileUpload = document.getElementById('fileUpload'); const videoUpload = document.getElementById('videoUpload'); if (fileUpload) fileUpload.addEventListener('change', handleFileSelect); if (videoUpload) videoUpload.addEventListener('change', handleVideoSelect);
                const addUserBtn = document.getElementById('addUserBtn'); if (addUserBtn) addUserBtn.addEventListener('click', addUserBySearch);
                const messageText = document.getElementById('messageText'); if (messageText) messageText.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
                
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const tab = item.dataset.tab;
                        if (tab === 'chats') {
                            App.activeTab = 'chats';
                            if (window.innerWidth < 768) App.sidebarOpen = false;
                        } else if (tab === 'feed') {
                            App.activeTab = 'feed';
                        }
                        render();
                        if (App.activeTab === 'feed') {
                            setTimeout(() => initFeed(), 50);
                        }
                    });
                });
                
                const createPostBtn = document.getElementById('createPostBtn');
                if (createPostBtn) createPostBtn.addEventListener('click', openCreatePostModal);
            }

            function sendMessage() { 
                const textInput = document.getElementById('messageText'); 
                const text = textInput ? textInput.value.trim() : ''; 
                if (!text && !App.tempPhoto && !App.tempVideo) { showNotification('Enter message or select file', 'error'); return; } 
                const from = App.currentUser; 
                const to = App.activeChat; 
                if (!to || to === 'yolk') { showNotification('Cannot send here', 'error'); return; } 
                if (!canUserMessage(from, to)) { showNotification('Cannot message this user', 'error'); return; } 
                try { 
                    let mediaData = null; 
                    let isVideoMsg = false; 
                    if (App.tempVideo) { mediaData = App.tempVideo; isVideoMsg = true; } 
                    else if (App.tempPhoto) { mediaData = App.tempPhoto; } 
                    const message = { from, text: text || '', time: Date.now(), photo: mediaData, gift: false, isVideo: isVideoMsg, likes: {}, dislikes: {} };
                    if (to === 'saved') { 
                        if (!App.savedMessages[from]) App.savedMessages[from] = []; 
                        App.savedMessages[from].push(message); 
                        saveSavedMessages(); 
                        showNotification('Saved to notes'); 
                        renderMessages('saved'); 
                        playHappySound(); 
                    } else { 
                        const chatId = [from, to].sort().join('_'); 
                        if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] }; 
                        App.chats[chatId].messages.push(message); 
                        saveToSupabase(); 
                        renderMessages(to); 
                        playHappySound(); 
                        updateStreak(to); 
                    } 
                    if (textInput) textInput.value = ''; 
                    App.tempPhoto = null; 
                    App.tempVideo = null; 
                    const fileInput = document.getElementById('fileUpload'); 
                    const videoInput = document.getElementById('videoUpload'); 
                    if (fileInput) fileInput.value = ''; 
                    if (videoInput) videoInput.value = ''; 
                    updateChatList(); 
                } catch (error) { console.error('Send error:', error); showNotification('Send error', 'error'); } 
            }

            function renderMessages(chatPartner) { 
                const messagesContainer = document.getElementById('messageList'); 
                if (!messagesContainer) return; 
                let messages = []; 
                if (chatPartner === 'saved') messages = App.savedMessages[App.currentUser] || []; 
                else if (chatPartner === 'yolk') messages = App.yolkChatMessages[App.currentUser] || []; 
                else { const chatId = [App.currentUser, chatPartner].sort().join('_'); const chat = App.chats[chatId]; messages = chat ? chat.messages : []; } 
                let html = ''; 
                if (messages && messages.length > 0) messages.forEach((msg, idx) => { html += renderMessage(msg, idx, App.currentUser, chatPartner); }); 
                else { if (chatPartner === 'yolk') html = '<div style="text-align:center; color: var(--text-secondary); margin-top:20px; padding:20px;">Login codes will appear here</div>'; else html = '<div style="text-align:center; color: var(--text-secondary); margin-top:20px; padding:20px;">No messages</div>'; } 
                messagesContainer.innerHTML = html; 
                setTimeout(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 100); 
                if (chatPartner !== 'saved' && chatPartner !== 'yolk') updateChatHeaderStatus(chatPartner); 
            }

            function renderMessage(msg, idx, currentUser, chatPartner) { 
                const isMe = msg.from === currentUser || (chatPartner === 'saved' && msg.from === currentUser); 
                const isGift = msg.gift ? true : false; 
                const isSystem = msg.from === 'SYSTEM'; 
                const fromUserDisplay = isSystem ? 'SYSTEM' : formatUserNameWithStatus(msg.from);
                let canDelete = false; 
                if (chatPartner === 'saved') canDelete = true; 
                else if (chatPartner === 'yolk') canDelete = false; 
                else canDelete = isMe; 
                let mediaHtml = ''; 
                if (msg.photo) { if (msg.isVideo) { mediaHtml = `<video controls class="media-preview"><source src="${msg.photo}" type="video/mp4"></video>`; } else { mediaHtml = `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`; } } 
                let messageText = msg.text || ''; 
                if (isGift && msg.giftType) {
                    const gift = GIFTS[msg.giftType];
                    mediaHtml = `<img src="${gift.icon}" class="media-preview" style="max-width:100px;">`;
                }
                const messageClass = isMe ? 'me' : ''; 
                const fullDate = new Date(msg.time).toLocaleString();
                
                return `<div class="message ${messageClass} ${isGift ? 'gift-message' : ''} ${isSystem ? 'system-message' : ''}">${!isMe && !isSystem ? `<small><span class="message-username" onclick="window.openProfileModal('${msg.from}')">${fromUserDisplay}${App.users[msg.from]?.verified ? '<span class="verified-icon"></span>' : ''}</span></small><br>` : ''}${isSystem ? `<small>🔔 SYSTEM</small><br>` : ''}<div class="message-text">${messageText}</div>${mediaHtml}<div class="time">${fullDate}</div><div style="display: flex; justify-content: flex-end; margin-top: 4px;">${canDelete ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">DELETE</button></div>` : ''}</div></div>`; 
            }

            function updateChatList() { 
                const chatsContainer = document.getElementById('chatsList'); 
                if (!chatsContainer || !App.currentUser) return; 
                let chatsList = getChatListForUser(App.currentUser); 
                const saved = chatsList.includes('saved') ? ['saved'] : []; 
                const yolk = chatsList.includes('yolk') ? ['yolk'] : []; 
                const other = chatsList.filter(c => c !== 'saved' && c !== 'yolk'); 
                const orderedList = [...saved, ...yolk, ...other]; 
                let html = ''; 
                orderedList.forEach(chat => { html += renderChatItem(chat, chat === App.activeChat, App.currentUser); }); 
                chatsContainer.innerHTML = html; 
                document.querySelectorAll('.chat-item').forEach(el => { el.addEventListener('click', (e) => { if (e.target.closest('.delete-chat-icon')) return; const chatId = el.dataset.chat; if (App.activeChat === chatId) { if (window.innerWidth < 768) { App.sidebarOpen = false; document.querySelector('.sidebar').classList.remove('open'); } return; } App.activeChat = chatId; localStorage.setItem('yolk_active_chat', chatId); if (window.innerWidth < 768) { App.sidebarOpen = false; document.querySelector('.sidebar').classList.remove('open'); } document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(); }); }); 
            }

            function getChatListForUser(user) { let set = new Set(['saved', 'yolk']); Object.keys(App.chats || {}).forEach(key => { const c = App.chats[key]; if (c) { if (c.user1 === user && c.user2 !== 'saved') set.add(c.user2); if (c.user2 === user && c.user1 !== 'saved') set.add(c.user1); } }); return Array.from(set); }
            
            function loadMessages(chatPartner) { if (chatPartner === 'saved' || chatPartner === 'yolk') { renderMessages(chatPartner); return; } const chatId = [App.currentUser, chatPartner].sort().join('_'); renderMessages(chatPartner); updateChatHeaderStatus(chatPartner); }
            
            function loadSavedMessages() { if (!App.currentUser) return; const saved = localStorage.getItem('yolk_saved_' + App.currentUser); if (saved) { try { App.savedMessages[App.currentUser] = JSON.parse(saved); } catch(e) { App.savedMessages[App.currentUser] = []; } } else { App.savedMessages[App.currentUser] = []; } }
            
            function saveSavedMessages() { if (App.currentUser) { localStorage.setItem('yolk_saved_' + App.currentUser, JSON.stringify(App.savedMessages[App.currentUser] || [])); } }
            
            function loadYolkChatMessages() { const saved = localStorage.getItem('yolk_chat_messages'); if (saved) { try { App.yolkChatMessages = JSON.parse(saved); } catch(e) { App.yolkChatMessages = {}; } } else { App.yolkChatMessages = {}; } }
            
            function send2FACode(username) { const code = Math.floor(100000 + Math.random() * 900000).toString(); const pendingCode = { code: code, username: username, timestamp: Date.now() }; localStorage.setItem('pending_2fa_' + username, JSON.stringify(pendingCode)); if (!App.yolkChatMessages[username]) App.yolkChatMessages[username] = []; App.yolkChatMessages[username].push({ from: 'SYSTEM', text: `🔐 Verification code: ${code}\nEnter this code to log into ${username}\nCode valid for 5 minutes.`, time: Date.now(), isCode: true }); saveYolkChatMessages(); return pendingCode; }
            
            function verify2FACode(username, inputCode) { const saved = localStorage.getItem('pending_2fa_' + username); if (!saved) return false; const pending = JSON.parse(saved); if (pending.code === inputCode && (Date.now() - pending.timestamp) < 300000) { localStorage.removeItem('pending_2fa_' + username); return true; } return false; }
            
            function saveYolkChatMessages() { localStorage.setItem('yolk_chat_messages', JSON.stringify(App.yolkChatMessages)); if (App.dataLoaded) { saveToSupabase(); } }
            
            function handleFileSelect(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { compressImage(ev.target.result, 800, 800, 0.6, (compressed) => { App.tempPhoto = compressed; showNotification('Photo added, type message and send'); }); }; reader.readAsDataURL(file); }
            
            function handleVideoSelect(e) { const file = e.target.files[0]; if (!file) return; if (file.size > 20 * 1024 * 1024) { showNotification('Video max 20 MB', 'error'); return; } const reader = new FileReader(); reader.onload = (ev) => { App.tempVideo = ev.target.result; showNotification('Video added, type message and send'); }; reader.readAsDataURL(file); }
            
            function addUserBySearch() { 
                let query = document.getElementById('searchUserInput').value.trim().toLowerCase(); 
                if (!query) { showNotification('Enter username', 'error'); return; } 
                if (!query.startsWith('@')) query = '@' + query; 
                if (query === 'yolk') { showNotification('System chat', 'error'); return; } 
                
                let mainUser = findMainUsername(query);
                if (!mainUser) {
                    if (App.users[query]) mainUser = query;
                }
                
                if (!mainUser || !App.users[mainUser]) { showNotification('User not found', 'error'); return; } 
                if (mainUser === App.currentUser) { showNotification('This is you', 'error'); return; } 
                if (!canUserMessage(App.currentUser, mainUser)) { showNotification('User does not accept new messages', 'error'); return; } 
                ensureChat(App.currentUser, mainUser); 
                App.activeChat = mainUser; 
                localStorage.setItem('yolk_active_chat', mainUser); 
                if (window.innerWidth < 768) App.sidebarOpen = false; 
                document.getElementById('searchUserInput').value = ''; 
                render(); 
                showNotification(`Chat with ${getDisplayName(mainUser)} created`); 
            }
            
            window.deleteChat = function(chat, event) { event.stopPropagation(); if (!confirm(`Delete chat with ${getDisplayName(chat)}?`)) return; const user = App.currentUser; const chatId = [user, chat].sort().join('_'); if (App.chats[chatId]) delete App.chats[chatId]; if (App.activeChat === chat) { App.activeChat = 'saved'; localStorage.setItem('yolk_active_chat', 'saved'); } saveToSupabase(); render(); showNotification('Chat deleted'); };
            
            window.deleteMessage = function(chatPartner, idx) { const from = App.currentUser; try { if (chatPartner === 'saved') { const msgs = App.savedMessages[from]; if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveSavedMessages(); showNotification('Deleted'); renderMessages('saved'); } } else if (chatPartner === 'yolk') { showNotification('Cannot delete system messages', 'error'); return; } else { const chatId = [from, chatPartner].sort().join('_'); const msgs = App.chats[chatId]?.messages; if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveToSupabase(); showNotification('Deleted'); renderMessages(chatPartner); } } } catch (error) { console.error('Delete error:', error); showNotification('Delete error', 'error'); } };
            
            window.openImageModal = function(src) { const modalHtml = `<div class="modal-overlay" id="imageModal" onclick="this.remove()"><div style="max-width:90%; max-height:90%; display:flex; justify-content:center; align-items:center;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); };

            function updateStreak(chatPartner) {
                const user = App.currentUser;
                if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk') return 0;
                const chatId = [user, chatPartner].sort().join('_');
                const today = new Date().toDateString();
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toDateString();
                if (!App.streaks[chatId]) {
                    App.streaks[chatId] = { streak: 0, lastMessageDate: null, lastUpdateDate: null, users: {} };
                }
                [user, chatPartner].forEach(u => {
                    if (!App.streaks[chatId].users[u]) App.streaks[chatId].users[u] = { lastMessageDate: null, streak: 0 };
                });
                const userData = App.streaks[chatId].users[user];
                const partnerData = App.streaks[chatId].users[chatPartner];
                userData.lastMessageDate = today;
                const partnerWroteToday = partnerData.lastMessageDate === today;
                if (partnerWroteToday) {
                    const lastCommonDay = App.streaks[chatId].lastMessageDate;
                    if (lastCommonDay === yesterdayStr) {
                        App.streaks[chatId].streak++;
                        userData.streak = App.streaks[chatId].streak;
                        partnerData.streak = App.streaks[chatId].streak;
                    } else if (lastCommonDay !== today) {
                        App.streaks[chatId].streak = 1;
                        userData.streak = 1;
                        partnerData.streak = 1;
                    } else {
                        userData.streak = App.streaks[chatId].streak;
                        partnerData.streak = App.streaks[chatId].streak;
                    }
                    App.streaks[chatId].lastMessageDate = today;
                    App.streaks[chatId].lastUpdateDate = today;
                } else {
                    const currentStreak = App.streaks[chatId].streak;
                    userData.streak = currentStreak;
                    partnerData.streak = currentStreak;
                }
                const lastUpdate = App.streaks[chatId].lastUpdateDate;
                if (lastUpdate && lastUpdate !== today && lastUpdate !== yesterdayStr) {
                    App.streaks[chatId].streak = 0;
                    userData.streak = 0;
                    partnerData.streak = 0;
                    App.streaks[chatId].lastMessageDate = null;
                }
                saveStreaks();
                return App.streaks[chatId].streak;
            }

            function getStreak(chatPartner) {
                const user = App.currentUser;
                if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk') return 0;
                const chatId = [user, chatPartner].sort().join('_');
                const today = new Date().toDateString();
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toDateString();
                if (!App.streaks[chatId]) return 0;
                const streakData = App.streaks[chatId];
                const lastUpdate = streakData.lastUpdateDate;
                if (lastUpdate && lastUpdate !== today && lastUpdate !== yesterdayStr) {
                    if (streakData.streak > 0) {
                        streakData.streak = 0;
                        if (streakData.users[user]) streakData.users[user].streak = 0;
                        if (streakData.users[chatPartner]) streakData.users[chatPartner].streak = 0;
                        saveStreaks();
                    }
                    return 0;
                }
                return streakData.streak || 0;
            }

            function saveStreaks() {
                localStorage.setItem('yolk_streaks', JSON.stringify(App.streaks));
                if (App.dataLoaded) saveToSupabase();
            }

            function loadStreaks() {
                const saved = localStorage.getItem('yolk_streaks');
                if (saved) { try { App.streaks = JSON.parse(saved); } catch(e) { App.streaks = {}; } } else { App.streaks = {}; }
            }

            function openAdminPanel() {
                const usersList = Object.keys(App.users).filter(u => !App.systemBots.includes(u));
                const modalHtml = `
                    <div class="modal-overlay" id="adminModalOverlay">
                        <div class="profile-modal" style="max-width: 500px;">
                            <h3>👑 ADMIN PANEL (@durov)</h3>
                            <div class="admin-give-form">
                                <h4>🎁 GIVE ITEM</h4>
                                <div class="input-group">
                                    <label>USER</label>
                                    <select id="adminTargetUser">
                                        <option value="">Select user</option>
                                        ${usersList.map(u => `<option value="${u}">${u} (${getDisplayName(u)})</option>`).join('')}
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label>ITEM TYPE</label>
                                    <select id="adminItemType">
                                        <option value="yc">YC (currency)</option>
                                        <option value="status">STATUS ALBUMEN</option>
                                        <option value="verified">VERIFIED STATUS</option>
                                    </select>
                                </div>
                                <div id="adminYcAmount" class="input-group">
                                    <label>AMOUNT YC</label>
                                    <input type="number" id="adminYcValue" value="100" min="1">
                                </div>
                                <button class="profile-btn" id="adminGiveBtn">✅ GIVE</button>
                            </div>
                            <div class="profile-actions">
                                <button class="profile-btn secondary" id="closeAdminModal">CLOSE</button>
                            </div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                const itemType = document.getElementById('adminItemType');
                const ycDiv = document.getElementById('adminYcAmount');
                itemType.addEventListener('change', () => {
                    ycDiv.classList.remove('hidden');
                    if (itemType.value === 'yc') ycDiv.classList.remove('hidden');
                    else if (itemType.value === 'status') ycDiv.classList.add('hidden');
                    else if (itemType.value === 'verified') ycDiv.classList.add('hidden');
                });
                document.getElementById('adminGiveBtn').addEventListener('click', () => {
                    const targetUser = document.getElementById('adminTargetUser').value;
                    const type = document.getElementById('adminItemType').value;
                    if (!targetUser) { showNotification('Select user', 'error'); return; }
                    if (!App.users[targetUser]) { showNotification('User not found', 'error'); return; }
                    if (type === 'yc') {
                        const amount = parseInt(document.getElementById('adminYcValue').value);
                        if (isNaN(amount) || amount <= 0) { showNotification('Enter valid amount', 'error'); return; }
                        App.users[targetUser].stars = (App.users[targetUser].stars || 0) + amount;
                        showNotification(`✅ Gave ${amount} YC to ${getDisplayName(targetUser)}`);
                    } else if (type === 'status') {
                        App.users[targetUser].status = 'ALBUMEN';
                        showNotification(`✨ STATUS ALBUMEN given to ${getDisplayName(targetUser)}! ✨`);
                        updateUserInterface();
                        if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'yolk') renderMessages(App.activeChat);
                        updateChatList();
                    } else if (type === 'verified') {
                        App.users[targetUser].verified = true;
                        showNotification(`✅ VERIFIED given to ${getDisplayName(targetUser)}!`);
                        updateUserInterface();
                        if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'yolk') renderMessages(App.activeChat);
                        updateChatList();
                    }
                    saveToSupabase();
                    updateUserInterface();
                    document.getElementById('adminModalOverlay').remove();
                });
                document.getElementById('closeAdminModal').addEventListener('click', () => {
                    document.getElementById('adminModalOverlay').remove();
                });
            }

            function initBots() { App.systemBots = []; saveToSupabase(); }

            // === INITIALIZATION ===
            window.addEventListener('load', () => { 
                loadingStartTime = Date.now();
                initBots(); 
                loadFromSupabase(); 
                subscribeToAppState();
                loadTheme(); 
            });
        })();
    </script>
</body>
