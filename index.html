<div id="app"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    // 🔥 ВАШ КОНФИГ FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDHddUllNs1CllRVOoR8MDP9qo3bfZnqM4",
        authDomain: "quick-sms-772c4.firebaseapp.com",
        databaseURL: "https://quick-sms-772c4-default-rtdb.firebaseio.com",
        projectId: "quick-sms-772c4",
        storageBucket: "quick-sms-772c4.firebasestorage.app",
        messagingSenderId: "722370764251",
        appId: "1:722370764251:web:1f93437108ee3d54f15bfe",
        measurementId: "G-WH8RF3FK57"
    };

    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    (function() {
        const App = {
            users: {},
            chats: {},
            currentUser: null,
            activeChat: null,
            blocked: {},
            channels: {},
            pinnedChats: [],
            botState: {},
            promoCodes: { 'durovcrow': 1000, 'durovsnow': 'verified' },
            sidebarOpen: false,
            dataLoaded: false,
            tempPhoto: null,
            emailCodes: {} // Хранилище кодов подтверждения email
        };

        App.systemBots = ['@game_bot', '@ggsuw'];

        // Генерация случайного кода
        function generateCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // Отправка кода на email (имитация)
        function sendEmailCode(email, code) {
            console.log(`📧 Код подтверждения для ${email}: ${code}`);
            showNotification(`Код отправлен на ${email} (в консоли: ${code})`, 'success');
            
            // В реальном проекте здесь был бы запрос к серверу для отправки email
            // Сейчас просто сохраняем код в App.emailCodes
            App.emailCodes[email] = {
                code: code,
                timestamp: Date.now(),
                verified: false
            };
            
            // Автоматически удаляем код через 10 минут
            setTimeout(() => {
                if (App.emailCodes[email] && !App.emailCodes[email].verified) {
                    delete App.emailCodes[email];
                }
            }, 600000);
        }

        // Проверка кода
        function verifyEmailCode(email, code) {
            const data = App.emailCodes[email];
            if (!data) {
                showNotification('Код не найден или истек', 'error');
                return false;
            }
            
            if (data.code === code && (Date.now() - data.timestamp) < 600000) {
                data.verified = true;
                delete App.emailCodes[email]; // Очищаем после успешной верификации
                return true;
            }
            
            showNotification('Неверный код', 'error');
            return false;
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification' + (type === 'error' ? ' error' : '');
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading-screen';
            loadingDiv.id = 'loadingScreen';
            loadingDiv.innerHTML = '<div class="loading-spinner"></div><div>quick-sms</div>';
            document.body.appendChild(loadingDiv);
        }

        function hideLoading() {
            const loading = document.getElementById('loadingScreen');
            if (loading) loading.remove();
        }

        function loadFromFirebase() {
            console.log('🔄 Загружаем данные...');
            
            App.dataLoaded = true;
            
            const savedUser = localStorage.getItem('quick_current_user');
            const savedChat = localStorage.getItem('quick_active_chat');
            
            const cachedData = localStorage.getItem('quick_cache');
            if (cachedData) {
                try {
                    const cache = JSON.parse(cachedData);
                    if (cache.users) App.users = cache.users;
                    if (cache.chats) App.chats = cache.chats;
                    console.log('📦 Загружено из кэша');
                } catch(e) {}
            }
            
            if (savedUser && App.users[savedUser]) {
                App.currentUser = savedUser;
                App.activeChat = savedChat;
                render();
            } else {
                render();
            }
            
            database.ref().get()
                .then((snapshot) => {
                    console.log('✅ Получены свежие данные из Firebase');
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        let changed = false;
                        
                        if (data.users) {
                            App.users = data.users;
                            changed = true;
                        }
                        if (data.chats) {
                            App.chats = data.chats;
                            changed = true;
                        }
                        if (data.blocked) App.blocked = data.blocked;
                        if (data.channels) App.channels = data.channels;
                        if (data.pinnedChats) App.pinnedChats = data.pinnedChats;
                        
                        if (changed) {
                            localStorage.setItem('quick_cache', JSON.stringify({
                                users: App.users,
                                chats: App.chats,
                                blocked: App.blocked,
                                channels: App.channels,
                                pinnedChats: App.pinnedChats
                            }));
                            
                            if (App.currentUser) {
                                updateChatList();
                                if (App.activeChat) loadMessages(App.activeChat);
                            }
                        }
                    }
                })
                .catch(error => {
                    console.error('❌ Ошибка Firebase:', error);
                });
        }

        function saveToFirebase() {
            if (!App.dataLoaded) return;
            
            database.ref().set({
                users: App.users,
                chats: App.chats,
                blocked: App.blocked,
                channels: App.channels,
                pinnedChats: App.pinnedChats
            }).then(() => {
                console.log('💾 Сохранено в Firebase');
                localStorage.setItem('quick_cache', JSON.stringify({
                    users: App.users,
                    chats: App.chats,
                    blocked: App.blocked,
                    channels: App.channels,
                    pinnedChats: App.pinnedChats
                }));
            }).catch(error => {
                console.error('❌ Ошибка сохранения:', error);
                showNotification('Ошибка сохранения', 'error');
            });
        }

        function ensureChat(userA, userB) {
            if (!userA || !userB || userA === userB) return;
            const id1 = [userA, userB].sort().join('_');
            if (!App.chats[id1]) {
                App.chats[id1] = { user1: userA, user2: userB, messages: [] };
                saveToFirebase();
            }
        }

        function isValidUsername(str) {
            return /^[a-zA-Z]{4,}$/.test(str);
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function initUserStars(user) {
            if (App.users[user].stars === undefined) App.users[user].stars = 0;
            if (!App.users[user].gifts) App.users[user].gifts = [];
            if (App.users[user].bio === undefined) App.users[user].bio = '';
            if (App.users[user].verified === undefined) App.users[user].verified = false;
            if (App.users[user].email === undefined) App.users[user].email = '';
            if (App.users[user].emailVerified === undefined) App.users[user].emailVerified = false;
        }

        function isBot(username) {
            return App.systemBots.includes(username) || (App.users[username] && App.users[username].isBot);
        }

        function updateChatList() {
            const chatsContainer = document.getElementById('chatsList');
            if (!chatsContainer || !App.currentUser) return;
            
            let chatsList = getChatListForUser(App.currentUser);
            let html = '';
            chatsList.forEach(chat => {
                html += renderChatItem(chat, chat === App.activeChat, App.currentUser);
            });
            chatsContainer.innerHTML = html;
        }

        function loadMessages(chatPartner) {
            const messagesContainer = document.getElementById('messageList');
            if (!messagesContainer) return;
            
            let messages = [];
            if (chatPartner === 'saved') {
                const savedChat = App.chats[App.currentUser + '_saved'];
                messages = savedChat ? savedChat.messages : [];
            } else if (App.channels[chatPartner]) {
                messages = App.channels[chatPartner].messages || [];
            } else {
                const chatId = [App.currentUser, chatPartner].sort().join('_');
                const chat = App.chats[chatId];
                messages = chat ? chat.messages : [];
            }
            
            let html = '';
            if (messages && messages.length > 0) {
                messages.forEach((msg, idx) => {
                    html += renderMessage(msg, idx, App.currentUser, chatPartner);
                });
            } else {
                html = '<div style="text-align:center; color:#666; margin-top:20px; padding:20px;">Нет сообщений</div>';
            }
            
            messagesContainer.innerHTML = html;
            
            // Прокрутка вниз
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
        }

        function render() {
            const root = document.getElementById('app');
            if (!App.dataLoaded) {
                return;
            }
            
            if (!App.currentUser) {
                root.innerHTML = renderAuth();
                attachAuthEvents();
            } else {
                initUserStars(App.currentUser);
                root.innerHTML = renderMain();
                attachMainEvents();
                
                if (App.activeChat) {
                    setTimeout(() => loadMessages(App.activeChat), 200);
                }
            }
        }

        function renderAuth() {

                <div class="auth-box">
                    <h2>quick-sms</h2>
                    <div id="authForms">
                        <div id="loginForm">
                            <div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="loginUsername" type="text" placeholder="только англ буквы, минимум 4"></div>
                            <div class="input-group"><label>ПАРОЛЬ</label><input id="loginPassword" type="password" placeholder="••••••"></div>
                            <button class="btn" id="loginBtn">ВОЙТИ</button>
                        </div>
                        <div class="auth-switch">
                            <button class="btn btn-secondary" id="showRegisterBtn">СОЗДАТЬ</button>
                        </div>
                    </div>
                    <div id="registerForm" style="display: none;">
                        <div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="regUsername" type="text" placeholder="jake"></div>
                        <div class="input-group"><label>ПАРОЛЬ</label><input id="regPassword" type="password" placeholder="••••••"></div>
                        <button class="btn" id="registerBtn">СОЗДАТЬ</button>

                    <div id="authError" class="auth-error"></div>
                </div>
            </div>`;
        }

        function attachAuthEvents() {
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');
            const errorDiv = document.getElementById('authError');

            document.getElementById('showRegisterBtn')?.addEventListener('click', () => {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
            });
            
            document.getElementById('showLoginBtn')?.addEventListener('click', () => {
                regForm.style.display = 'none';
                loginForm.style.display = 'block';
            });

            document.getElementById('loginBtn')?.addEventListener('click', () => {
                let username = document.getElementById('loginUsername').value.trim();
                const pass = document.getElementById('loginPassword').value.trim();
                if (!isValidUsername(username)) { errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ, МИНИМУМ 4'; return; }
                const clean = '@' + username;
                if (!App.users[clean] || App.users[clean].password !== pass) {
                    errorDiv.innerText = '! НЕВЕРНЫЙ ЛОГИН ИЛИ ПАРОЛЬ';
                    return;
                }
                App.currentUser = clean;
                localStorage.setItem('quick_current_user', clean);
                render();
            });

            document.getElementById('registerBtn')?.addEventListener('click', () => {
                let username = document.getElementById('regUsername').value.trim();
                const pass = document.getElementById('regPassword').value.trim();
                if (!isValidUsername(username)) { errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ, МИНИМУМ 4'; return; }
                if (!pass) { errorDiv.innerText = '! ВВЕДИТЕ ПАРОЛЬ'; return; }
                const clean = '@' + username;
                if (App.users[clean] || App.systemBots.includes(clean)) { errorDiv.innerText = '! УЖЕ ЕСТЬ'; return; }
                
                App.users[clean] = { 
                    password: pass, 
                    avatar: null, 
                    stars: 0, 
                    gifts: [], 
                    bio: '', 
                    verified: false,
                    email: '',
                    emailVerified: false
                };
                App.currentUser = clean;
                
                if (!App.chats[clean + '_saved']) {
                    App.chats[clean + '_saved'] = { user1: clean, user2: 'saved', messages: [] };
                }
                if (!App.blocked[clean]) App.blocked[clean] = [];
                
                localStorage.setItem('quick_current_user', clean);
                saveToFirebase();
                render();
            });
        }

        function renderMain() {
            const user = App.currentUser;
            let chatsList = getChatListForUser(user);
            if (!chatsList.includes('saved')) chatsList.unshift('saved');
            
            Object.keys(App.channels).forEach(channelName => {
                if (!chatsList.includes(channelName)) chatsList.push(channelName);
            });
            
            const pinned = App.pinnedChats.filter(p => chatsList.includes(p));
            const unpinned = chatsList.filter(c => !App.pinnedChats.includes(c) && c !== 'saved');
            const saved = chatsList.includes('saved') ? ['saved'] : [];
            chatsList = [...saved, ...pinned, ...unpinned];
            
            let chatPartner = App.activeChat || (chatsList.length > 1 ? chatsList[1] : 'saved');
            if (!chatsList.includes(chatPartner)) chatPartner = 'saved';
            App.activeChat = chatPartner;
            localStorage.setItem('quick_active_chat', chatPartner);
            
            const userData = App.users[user] || {};
            const isChatBot = isBot(chatPartner);
            const isChannel = App.channels[chatPartner] ? true : false;
            const canWrite = !isChatBot && !(isChannel && App.channels[chatPartner]?.owner !== user && chatPartner !== 'saved');

            return `<div class="main-container">
                <div class="sidebar ${App.sidebarOpen ? 'open' : ''}">
                    <div class="user-profile" id="openProfileBtn">
                        <div class="avatar" id="sidebarAvatar">
                            ${userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : (user[1] ? user[1].toUpperCase() : '?')}
                        </div>
                        <div>
                            <span class="username-display">${user}${userData.verified ? ' ✅' : ''}</span>
                            ${userData.emailVerified ? '<div class="email-badge">📧 подтвержден</div>' : ''}
                            <div class="star-balance">⭐️ ${userData.stars || 0}</div>
                        </div>
                    </div>
                    <div class="search-add">
                        <input type="text" placeholder="ПОИСК @юзернейм" id="searchUserInput">
                        <button class="icon-btn" id="addUserBtn">+</button>
                    </div>
                    <div class="chats-list" id="chatsList">
                        ${chatsList.map(u => renderChatItem(u, u === chatPartner, user)).join('')}
                    </div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <div class="chat-header-info">
                            <button class="back-btn ${window.innerWidth < 768 ? 'visible' : ''}" id="backBtn">←</button>
                            <strong>${chatPartner === 'saved' ? '📎 ИЗБРАННОЕ' : chatPartner}${App.users[chatPartner]?.verified ? ' ✅' : ''}</strong>
                            ${isChannel ? `<small style="color:#666;">👥 ${App.channels[chatPartner]?.subscribers?.length || 0}</small>` : ''}
                        </div>
                        <div class="chat-actions">
                            ${isChannel && chatPartner !== 'saved' ? 
                                `<button class="tiny-btn" id="subscribeBtn">${App.channels[chatPartner]?.subscribers?.includes?.(user) ? '🔕' : '🔔'}</button>` : ''}
                            ${chatPartner !== 'saved' && !isChannel && !isChatBot ? 
                                `<button class="tiny-btn" id="giftBtn">🎁</button>` : ''}
                            <button class="tiny-btn" id="logoutBtn">🚪</button>
                        </div>
                    </div>
                    <div class="messages-container" id="messageList"></div>
                    ${canWrite ? `
                    <div class="input-area">
                        <input type="text" id="messageText" placeholder="${isChannel ? 'ПОСТ' : 'СМС...'}" autofocus>
                        <label for="fileUpload" class="file-label">📷</label>
                        <input type="file" id="fileUpload" accept="image/*">
                        <button class="send-btn" id="sendMsgBtn">➤</button>
                    </div>
                    ` : ''}
                </div>
            </div>`;
        }

        function renderChatItem(u, active, currentUser) {
            const name = u === 'saved' ? '📎 ИЗБРАННОЕ' : u;
            const isPinned = App.pinnedChats.includes(u);
            let avatarHtml = '<div class="chat-avatar" onclick="openProfileModal(\'' + u + '\')">📁</div>';
            
            if (u !== 'saved') {
                if (App.channels[u]) {
                    avatarHtml = '<div class="chat-avatar">📢</div>';
                } else {
                    const avatarUrl = App.users[u]?.avatar;
                    avatarHtml = avatarUrl ? 
                        `<div class="chat-avatar" onclick="openProfileModal('${u}')"><img src="${avatarUrl}" class="chat-avatar-img"></div>` : 
                        `<div class="chat-avatar" onclick="openProfileModal('${u}')">${u[1] || '@'}</div>`;
                }
            }
            
            return `<div class="chat-item ${active ? 'active' : ''} ${isPinned ? 'pinned' : ''}" data-chat="${u}">
                ${avatarHtml}
                <div style="flex:1; color:#000000;">
                    ${name}${App.users[u]?.verified ? ' ✅' : ''}
                    ${App.users[u]?.emailVerified ? ' 📧' : ''}
                </div>
                ${u !== 'saved' ? `
                    <span class="pin-icon" onclick="togglePinChat('${u}', event)">📌</span>
                    <span class="delete-chat-icon" onclick="deleteChat('${u}', event)">🗑️</span>
                ` : ''}
            </div>`;
        }

        function renderMessage(msg, idx, currentUser, chatPartner) {
            const isMe = msg.from === currentUser;
            const mediaHtml = msg.photo ? `<img src="${msg.photo}" class="media-preview">` : '';
            const isGift = msg.gift ? true : false;
            const isGame = msg.game ? true : false;
            const canDelete = (isMe || (App.channels[chatPartner] && App.channels[chatPartner]?.owner === currentUser));
            
            let senderName = msg.from;
            let verifiedBadge = App.users[msg.from]?.verified ? ' ✅' : '';
            let emailBadge = App.users[msg.from]?.emailVerified ? ' 📧' : '';
            
            return `<div class="message ${isMe ? 'me' : ''} ${isGift ? 'gift-message' : ''} ${isGame ? 'game-message' : ''}">
                ${!isMe ? `<small><span class="message-username" onclick="openProfileModal('${msg.from}')">${senderName}${verifiedBadge}${emailBadge}</span></small><br>` : ''}
                <div style="color:#000000;">${msg.text || ''}${mediaHtml}</div>
                <div class="time">${new Date(msg.time).toLocaleTimeString().slice(0,5)}</div>
                ${canDelete ? `<div class="msg-actions"><button onclick="deleteMessage(${idx})">УДАЛИТЬ</button></div>` : ''}
            </div>`;
        }

        function getChatListForUser(user) {
            let set = new Set(['saved']);
            Object.keys(App.chats).forEach(key => {
                const c = App.chats[key];
                if (c.user1 === user && c.user2 !== 'saved') set.add(c.user2);
                if (c.user2 === user && c.user1 !== 'saved') set.add(c.user1);
            });
            return Array.from(set);
        }

        function attachMainEvents() {
            // Прикрепляем события ко всем элементам чата
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.pin-icon') || e.target.closest('.delete-chat-icon')) return;
                    
                    const chatId = e.currentTarget.dataset.chat;
                    
                    if (App.activeChat === chatId) {
                        if (window.innerWidth < 768) {
                            App.sidebarOpen = false;
                            document.querySelector('.sidebar').classList.remove('open');
                        }
                        return;
                    }
                    
                    App.activeChat = chatId;
                    
                    if (window.innerWidth < 768) {
                        App.sidebarOpen = false;
                        document.querySelector('.sidebar').classList.remove('open');
                    }
                    
                    localStorage.setItem('quick_active_chat', App.activeChat);
                    
                    document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                    
                    loadMessages(App.activeChat);
                    render(); // Перерендерим чтобы обновить поле ввода
                });
            });

            const backBtn = document.getElementById('backBtn');
            if (backBtn) {
                backBtn.addEventListener('click', () => {
                    App.sidebarOpen = true;
                    document.querySelector('.sidebar').classList.add('open');
                });
            }

            const openProfileBtn = document.getElementById('openProfileBtn');
            if (openProfileBtn) {
                openProfileBtn.addEventListener('click', () => openProfileModal(App.currentUser));
            }
            
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    App.currentUser = null;
                    App.activeChat = null;
                    localStorage.removeItem('quick_current_user');
                    localStorage.removeItem('quick_active_chat');
                    render();
                });
            }
            
            const giftBtn = document.getElementById('giftBtn');
            if (giftBtn) {
                giftBtn.addEventListener('click', openGiftMenu);
            }
            
            const subscribeBtn = document.getElementById('subscribeBtn');
            if (subscribeBtn) {
                subscribeBtn.addEventListener('click', toggleSubscribe);
            }
            
            const sendBtn = document.getElementById('sendMsgBtn');
            if (sendBtn) {
                sendBtn.addEventListener('click', sendMessage);
            }
            
            const fileUpload = document.getElementById('fileUpload');
            if (fileUpload) {
                fileUpload.addEventListener('change', handleFileSelect);
            }
            
            const addUserBtn = document.getElementById('addUserBtn');
            if (addUserBtn) {
                addUserBtn.addEventListener('click', addUserBySearch);
            }
            
            const messageText = document.getElementById('messageText');
            if (messageText) {
                messageText.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        sendMessage();
                    }
                });
            }
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                App.tempPhoto = ev.target.result;
                sendMessage();
            };
            reader.readAsDataURL(file);
        }

        function sendMessage() {
            const textInput = document.getElementById('messageText');
            const text = textInput ? textInput.value.trim() : '';
            
            if (!text && !App.tempPhoto) {
                showNotification('Введите сообщение', 'error');
                return;
            }
            
            const from = App.currentUser;
            const to = App.activeChat;
            
            if (!to) {
                showNotification('Выберите чат', 'error');
                return;
            }
            
            console.log('Отправка сообщения:', { from, to, text, photo: App.tempPhoto });
            
            try {
                // Создаем сообщение
                const message = { 
                    from, 
                    text: text || '', 
                    time: Date.now(), 
                    photo: App.tempPhoto || null,
                    gift: false,
                    game: false
                };
                
                if (to === 'saved') {
                    const chatKey = from + '_saved';
                    if (!App.chats[chatKey]) {
                        App.chats[chatKey] = { user1: from, user2: 'saved', messages: [] };
                    }
                    App.chats[chatKey].messages.push(message);
                    console.log('Сохранено в избранное');
                } else if (App.channels[to]) {
                    if (App.channels[to].owner !== from) {
                        showNotification('Только владелец может писать в канал', 'error');
                        return;
                    }
                    if (!App.channels[to].messages) App.channels[to].messages = [];
                    App.channels[to].messages.push({ ...message, from: to });
                    console.log('Сохранено в канал');
                } else {
                    const chatId = [from, to].sort().join('_');
                    if (!App.chats[chatId]) {
                        App.chats[chatId] = { user1: from, user2: to, messages: [] };
                    }
                    App.chats[chatId].messages.push(message);
                    console.log('Сохранено в чат');
                }
                
                // Очищаем поля
                if (textInput) textInput.value = '';
                App.tempPhoto = null;
                const fileInput = document.getElementById('fileUpload');
                if (fileInput) fileInput.value = '';
                
                // Сохраняем и обновляем
                saveToFirebase();
                loadMessages(to);
                updateChatList();
                
                showNotification('Сообщение отправлено');
                
            } catch (error) {
                console.error('Ошибка отправки:', error);
                showNotification('Ошибка отправки: ' + error.message, 'error');
            }
        }

        function deleteMessage(idx) {
            const from = App.currentUser; 
            const to = App.activeChat;
            let msgArray;
            
            try {
                if (to === 'saved') {
                    msgArray = App.chats[from+'_saved'].messages;
                } else if (App.channels[to]) {
                    if (App.channels[to].owner !== from) {
                        showNotification('Только владелец может удалять сообщения', 'error');
                        return;
                    }
                    msgArray = App.channels[to].messages;
                } else {
                    const chatId = [from, to].sort().join('_');
                    msgArray = App.chats[chatId].messages;
                }
                
                if (!msgArray || idx >= msgArray.length) {
                    showNotification('Сообщение не найдено', 'error');
                    return;
                }
                
                msgArray.splice(idx, 1);
                
                saveToFirebase();
                loadMessages(to);
                showNotification('Сообщение удалено');
                
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showNotification('Ошибка удаления', 'error');
            }
        }

        function addUserBySearch() {
            let query = document.getElementById('searchUserInput').value.trim();
            if (!query) {
                showNotification('Введите имя пользователя', 'error');
                return;
            }
            
            if (!query.startsWith('@')) {
                query = '@' + query;
            }
            
            console.log('Поиск пользователя:', query);
            
            if (App.systemBots.includes(query) || (App.users[query] && App.users[query].isBot)) {
                App.activeChat = query;
                localStorage.setItem('quick_active_chat', query);
                
                const chatId = [App.currentUser, query].sort().join('_');
                if (!App.chats[chatId]) {
                    App.chats[chatId] = { user1: App.currentUser, user2: query, messages: [] };
                    saveToFirebase();
                }
                
                if (window.innerWidth < 768) App.sidebarOpen = false;
                document.getElementById('searchUserInput').value = '';
                updateChatList();
                loadMessages(query);
                render();
                showNotification(`Чат с ${query} открыт`);
                return;
            }
            
            if (App.channels[query]) {
                App.activeChat = query;
                localStorage.setItem('quick_active_chat', query);
                if (window.innerWidth < 768) App.sidebarOpen = false;
                document.getElementById('searchUserInput').value = '';
                updateChatList();
                loadMessages(query);
                render();
                showNotification(`Канал ${query} открыт`);
                return;
            }
            
            if (!App.users[query]) { 
                showNotification('Пользователь не найден', 'error');
                return; 
            }
            if (query === App.currentUser) { 
                showNotification('Это вы', 'error');
                return; 
            }
            
            const chatId = [App.currentUser, query].sort().join('_');
            
            if (!App.chats[chatId]) {
                App.chats[chatId] = { 
                    user1: App.currentUser, 
                    user2: query, 
                    messages: [] 
                };
            }
            
            App.activeChat = query;
            localStorage.setItem('quick_active_chat', query);
            
            if (window.innerWidth < 768) {
                App.sidebarOpen = false;
            }
            
            document.getElementById('searchUserInput').value = '';
            updateChatList();
            loadMessages(query);
            saveToFirebase();
            render();
            showNotification(`Чат с ${query} создан`);
        }

        function toggleSubscribe() {
            const user = App.currentUser;
            const channel = App.activeChat;
            if (!App.channels[channel]) return;
            
            if (!App.channels[channel].subscribers) App.channels[channel].subscribers = [];
            if (!App.channels[channel].subscribers.includes(user)) {
                App.channels[channel].subscribers.push(user);
                showNotification('Вы подписались на канал');
            } else {
                App.channels[channel].subscribers = App.channels[channel].subscribers.filter(s => s !== user);
                showNotification('Вы отписались от канала');
            }
            saveToFirebase();
            updateChatList();
            render();
        }

        function togglePinChat(chat, event) {
            event.stopPropagation();
            if (App.pinnedChats.includes(chat)) {
                App.pinnedChats = App.pinnedChats.filter(c => c !== chat);
                showNotification('Чат откреплен');
            } else {
                if (App.pinnedChats.length >= 3) {
                    showNotification('Максимум 3 закрепленных чата', 'error');
                    return;
                }
                App.pinnedChats.push(chat);
                showNotification('Чат закреплен');
            }
            saveToFirebase();
            updateChatList();
        }

        function deleteChat(chat, event) {
            event.stopPropagation();
            if (!confirm(`Удалить чат ${chat}?`)) return;
            
            const user = App.currentUser;
            const chatId = [user, chat].sort().join('_');
            if (App.chats[chatId]) {
                delete App.chats[chatId];
            }
            
            if (App.pinnedChats.includes(chat)) {
                App.pinnedChats = App.pinnedChats.filter(c => c !== chat);
            }
            
            if (App.activeChat === chat) {
                App.activeChat = 'saved';
                localStorage.setItem('quick_active_chat', 'saved');
                loadMessages('saved');
            }
            
            saveToFirebase();
            updateChatList();
            render();
            showNotification('Чат удален');
        }

        function handleBotCommand(botName, cmd) {
            if (botName === '@game_bot' && cmd === 'slots') {
                const chatId = [App.currentUser, botName].sort().join('_');
                ensureChat(App.currentUser, botName);
                
                const price = 5;
                if (App.users[App.currentUser].stars < price) {
                    if (!App.chats[chatId]) App.chats[chatId] = { messages: [] };
                    App.chats[chatId].messages.push({
                        from: botName,
                        text: '❌ НЕДОСТАТОЧНО ⭐️ (НУЖНО 5)',
                        time: Date.now(),
                        game: true
                    });
                    showNotification('Недостаточно звезд', 'error');
                } else {
                    App.users[App.currentUser].stars -= price;
                    
                    const symbols = ['🔥', '🌊', '🍭', '🍬', '⭐️', '7'];
                    const roll1 = symbols[Math.floor(Math.random() * symbols.length)];
                    const roll2 = symbols[Math.floor(Math.random() * symbols.length)];
                    const roll3 = symbols[Math.floor(Math.random() * symbols.length)];
                    
                    let win = 0;
                    if (roll1 === roll2 && roll2 === roll3) {
                        win = 15;
                        App.users[App.currentUser].stars += win;
                        showNotification(`Вы выиграли ${win}⭐️!`);
                    }
                    
                    const result = win > 0 
                        ? `🎉 ВЫИГРЫШ ${win}⭐️!` 
                        : '😢 НИЧЕГО НЕТ';
                    
                    if (!App.chats[chatId]) App.chats[chatId] = { messages: [] };
                    App.chats[chatId].messages.push({
                        from: botName,
                        text: `🎰 [ ${roll1} | ${roll2} | ${roll3} ]\n${result}`,
                        time: Date.now(),
                        game: true
                    });
                }
                
                saveToFirebase();
                loadMessages(botName);
            }
        }

        function openGiftMenu() {
            const user = App.currentUser;
            const target = App.activeChat;
            const gifts = App.users[user].gifts || [];
            
            if (gifts.length === 0) {
                showNotification('У вас нет подарков', 'error');
                return;
            }
            
            const giftList = gifts.map(g => 
                `<div class="gift-item" onclick="sendGiftToUser('${target}', '${g}')">${g}</div>`
            ).join('');
            
            const modalHtml = `<div class="modal-overlay" id="giftModalOverlay">
                <div class="profile-modal">
                    <h3>🎁 ВЫБЕРИТЕ ПОДАРОК</h3>
                    <div class="gifts-collection">
                        ${giftList}
                    </div>
                    <div class="profile-actions">
                        <button class="profile-btn secondary" id="closeGiftModal">ОТМЕНА</button>
                    </div>
                </div>
            </div>`;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            document.getElementById('closeGiftModal').addEventListener('click', () => {
                document.getElementById('giftModalOverlay').remove();
            });
        }

        window.sendGiftToUser = function(toUser, giftEmoji) {
            document.getElementById('giftModalOverlay')?.remove();
            
            const fromUser = App.currentUser;
            const userGifts = App.users[fromUser].gifts || [];
            
            // Проверяем, есть ли еще подарок
            if (!userGifts.includes(giftEmoji)) {
                showNotification('Подарок не найден', 'error');
                return;
            }
            
            // Удаляем подарок у отправителя
            App.users[fromUser].gifts = userGifts.filter(g => g !== giftEmoji);
            
            // Добавляем подарок получателю
            if (!App.users[toUser].gifts) App.users[toUser].gifts = [];
            App.users[toUser].gifts.push(giftEmoji);
            
            // Создаем сообщение о подарке
            const chatId = [fromUser, toUser].sort().join('_');
            if (!App.chats[chatId]) {
                App.chats[chatId] = { user1: fromUser, user2: toUser, messages: [] };
            }
            
            App.chats[chatId].messages.push({
                from: fromUser,
                text: `🎁 ПОДАРОК ${giftEmoji} ОТ ${fromUser}`,
                time: Date.now(),
                gift: true
            });
            
            // Сохраняем изменения
            saveToFirebase();
            
            // Обновляем отображение
            if (App.activeChat === toUser) loadMessages(toUser);
            
            showNotification(`Подарок ${giftEmoji} отправлен ${toUser}!`);
        };

        function openProfileModal(username) {
            const userData = App.users[username] || { 
                avatar: null, 
                password: '', 
                stars: 0, 
                gifts: [], 
                bio: '', 
                verified: false,
                email: '',
                emailVerified: false 
            };
            const isOwn = (username === App.currentUser);
            const isBotUser = App.systemBots.includes(username);
            
            const giftsList = (userData.gifts || []).map(g => `<div class="gift-item">${g}</div>`).join('');
            
            const modalHtml = `<div class="modal-overlay" id="profileModalOverlay">
                <div class="profile-modal">
                    <h3>${isOwn ? 'МОЙ ПРОФИЛЬ' : 'ПРОФИЛЬ ' + username}${userData.verified ? ' ✅' : ''}</h3>
                    
                    <div class="profile-avatar-section">
                        <img src="${userData.avatar || 'https://via.placeholder.com/100?text='+username[1]}" class="profile-avatar-preview">
                        ${isOwn && !isBotUser ? `
                        <div class="profile-input-group">
                            <label>ССЫЛКА НА АВАТАР</label>
                            <input type="text" id="modalAvatarInput" value="${userData.avatar || ''}">
                        </div>` : ''}
                    </div>
                    
                    <div class="profile-input-group">
                        <label>ЮЗЕРНЕЙМ</label>
                        <input type="text" value="${username}" disabled>
                    </div>

                    ${isOwn && !isBotUser ? `
                    <div class="profile-input-group">
                        <label>ПАРОЛЬ</label>
                        <input type="text" id="modalPasswordInput" value="${userData.password || ''}">
                    </div>
                    
                    <div class="profile-input-group">
                        <label>EMAIL</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="email" id="modalEmailInput" value="${userData.email || ''}" placeholder="your@email.com">
                            ${!userData.emailVerified ? `
                                <button class="tiny-btn" id="sendVerificationCodeBtn" style="white-space: nowrap;">📧 КОД</button>
                            ` : ''}
                        </div>
                        ${userData.emailVerified ? 
                            '<div class="email-verified">✓ EMAIL ПОДТВЕРЖДЕН</div>' : 
                            userData.email ? '<div class="email-unverified">✗ НЕ ПОДТВЕРЖДЕН</div>' : ''
                        }
                    </div>

                    <div id="verificationSection" class="profile-input-group hidden">
                        <label>ВВЕДИТЕ КОД</label>
                        <div class="verification-code-input">
                            <input type="text" id="verificationCodeInput" maxlength="6" placeholder="000000">
                            <button class="tiny-btn" id="verifyCodeBtn">✓</button>
                        </div>
                    </div>
                    ` : ''}

                    ${!isBotUser ? `
                    <div class="profile-input-group">
                        <label>ОПИСАНИЕ</label>
                        ${isOwn ? 
                            `<textarea id="modalBioInput" maxlength="50">${userData.bio || ''}</textarea>` :
                            `<div class="profile-password-row">${userData.bio || '—'}</div>`
                        }
                    </div>

                    <div class="star-balance-large">⭐️ ${userData.stars || 0} ЗВЕЗД</div>

                    <div class="tabs">
                        <div class="tab active" data-tab="gifts">ПОДАРКИ</div>
                        ${isOwn ? '<div class="tab" data-tab="shop">МАГАЗИН</div>' : ''}
                        ${isOwn ? '<div class="tab" data-tab="channel">КАНАЛ</div>' : ''}
                    </div>

                    <div id="tabGifts" class="tab-content">
                        <div class="gifts-collection">
                            ${giftsList || 'НЕТ ПОДАРКОВ'}
                        </div>
                    </div>

                    ${isOwn ? `
                    <div id="tabShop" class="tab-content hidden">
                        <div class="shop-section">
                            <h4>КУПИТЬ ПОДАРКИ</h4>
                            ${[
                                { emoji: '🔥', price: 15 },
                                { emoji: '🌊', price: 15 },
                                { emoji: '🍭', price: 25 },
                                { emoji: '🍬', price: 25 }
                            ].map(item => `
                                <div class="shop-item">
                                    <span>${item.emoji} ${item.price}⭐️</span>
                                    <button class="buy-gift-btn" data-gift="${item.emoji}" data-price="${item.price}">КУПИТЬ</button>
                                </div>
                            `).join('')}
                            
                            <h4>ПРОМОКОД</h4>
                            <div class="promo-section">
                                <input type="text" id="promoCodeInput" placeholder="ВВЕДИТЕ ПРОМОКОД">
                                <button class="profile-btn" id="activatePromoBtn">АКТИВИРОВАТЬ</button>
                            </div>
                        </div>
                    </div>
                    
                    <div id="tabChannel" class="tab-content hidden">
                        <div class="shop-section">
                            <h4>СОЗДАТЬ КАНАЛ (450⭐️)</h4>
                            <div class="profile-input-group">
                                <input type="text" id="channelNameInput" placeholder="@channel">
                            </div>
                            <div class="profile-input-group">
                                <textarea id="channelDescInput" placeholder="Описание..."></textarea>
                            </div>
                            <button class="profile-btn" id="createChannelBtn">СОЗДАТЬ</button>
                        </div>
                    </div>
                    ` : ''}
                    ` : ''}

                    <div class="profile-actions">
                        ${isOwn && !isBotUser ? '<button class="profile-btn" id="saveProfileModalBtn">СОХРАНИТЬ</button>' : ''}
                        <button class="profile-btn secondary" id="closeProfileModalBtn">ЗАКРЫТЬ</button>
                    </div>
                </div>
            </div>`;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            if (isOwn && !isBotUser) {
                // Обработчики вкладок
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                        e.target.classList.add('active');
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                        if (e.target.dataset.tab === 'gifts') document.getElementById('tabGifts').classList.remove('hidden');
                        if (e.target.dataset.tab === 'shop') document.getElementById('tabShop').classList.remove('hidden');
                        if (e.target.dataset.tab === 'channel') document.getElementById('tabChannel').classList.remove('hidden');
                    });
                });

                // Обработчик отправки кода на email
                document.getElementById('sendVerificationCodeBtn')?.addEventListener('click', () => {
                    const email = document.getElementById('modalEmailInput').value.trim();
                    
                    if (!email) {
                        showNotification('Введите email', 'error');
                        return;
                    }
                    
                    if (!isValidEmail(email)) {
                        showNotification('Неверный формат email', 'error');
                        return;
                    }
                    
                    const code = generateCode();
                    sendEmailCode(email, code);
                    
                    // Показываем поле для ввода кода
                    document.getElementById('verificationSection').classList.remove('hidden');
                });

                // Обработчик проверки кода
                document.getElementById('verifyCodeBtn')?.addEventListener('click', () => {
                    const email = document.getElementById('modalEmailInput').value.trim();
                    const code = document.getElementById('verificationCodeInput').value.trim();
                    
                    if (verifyEmailCode(email, code)) {
                        App.users[App.currentUser].emailVerified = true;
                        showNotification('Email подтвержден!');
                        document.getElementById('verificationSection').classList.add('hidden');
                        document.getElementById('profileModalOverlay').remove();
                        openProfileModal(App.currentUser);
                    }
                });

                // Обработчики покупки подарков
                document.querySelectorAll('.buy-gift-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const gift = e.target.dataset.gift;
                        const price = parseInt(e.target.dataset.price);
                        const user = App.currentUser;
                        
                        if (App.users[user].stars >= price) {
                            App.users[user].stars -= price;
                            if (!App.users[user].gifts) App.users[user].gifts = [];
                            App.users[user].gifts.push(gift);
                            saveToFirebase();
                            document.getElementById('profileModalOverlay').remove();
                            openProfileModal(user);
                            showNotification(`Куплен подарок ${gift}`);
                        } else {
                            showNotification('Недостаточно ⭐️', 'error');
                        }
                    });
                });

                // Обработчик промокодов
                document.getElementById('activatePromoBtn')?.addEventListener('click', () => {
                    const code = document.getElementById('promoCodeInput').value.trim().toLowerCase();
                    
                    if (App.promoCodes[code] !== undefined) {
                        if (code === 'durovsnow') {
                            App.users[App.currentUser].verified = true;
                            showNotification('✅ ВЫ ПОЛУЧИЛИ СИНЮЮ ГАЛОЧКУ!');
                        } else {
                            App.users[App.currentUser].stars += App.promoCodes[code];
                            showNotification(`+${App.promoCodes[code]}⭐️`);
                        }
                        
                        saveToFirebase();
                        document.getElementById('profileModalOverlay').remove();
                        openProfileModal(App.currentUser);
                    } else {
                        showNotification('! НЕВЕРНЫЙ КОД', 'error');
                    }
                });

                // Обработчик создания канала
                document.getElementById('createChannelBtn')?.addEventListener('click', () => {
                    const channelName = document.getElementById('channelNameInput').value.trim();
                    const channelDesc = document.getElementById('channelDescInput').value.trim();
                    
                    if (!channelName) { showNotification('! ВВЕДИТЕ НАЗВАНИЕ', 'error'); return; }
                    if (App.users[channelName] || App.channels[channelName]) { 
                        showNotification('! ЗАНЯТО', 'error');
                        return; 
                    }
                    
                    if (App.users[App.currentUser].stars < 450) {
                        showNotification('! НУЖНО 450⭐️', 'error');
                        return;
                    }
                    
                    App.users[App.currentUser].stars -= 450;
                    App.channels[channelName] = {
                        name: channelName,
                        owner: App.currentUser,
                        description: channelDesc,
                        avatar: null,
                        subscribers: [App.currentUser],
                        messages: []
                    };
                    
                    saveToFirebase();
                    showNotification(`✅ КАНАЛ ${channelName} СОЗДАН`);
                    document.getElementById('profileModalOverlay').remove();
                    App.activeChat = channelName;
                    localStorage.setItem('quick_active_chat', channelName);
                    render();
                });

                // Обработчик сохранения профиля
                document.getElementById('saveProfileModalBtn')?.addEventListener('click', () => {
                    const newAvatar = document.getElementById('modalAvatarInput')?.value.trim();
                    const newPassword = document.getElementById('modalPasswordInput')?.value.trim();
                    const newBio = document.getElementById('modalBioInput')?.value.trim().slice(0, 50);
                    const newEmail = document.getElementById('modalEmailInput')?.value.trim();
                    
                    if (newAvatar) App.users[App.currentUser].avatar = newAvatar;
                    if (newPassword) App.users[App.currentUser].password = newPassword;
                    if (newBio !== undefined) App.users[App.currentUser].bio = newBio;
                    
                    // Если email изменился, сбрасываем подтверждение
                    if (newEmail && newEmail !== App.users[App.currentUser].email) {
                        App.users[App.currentUser].email = newEmail;
                        App.users[App.currentUser].emailVerified = false;
                    }
                    
                    saveToFirebase();
                    document.getElementById('profileModalOverlay').remove();
                    render();
                    showNotification('Профиль сохранен');
                });
            }
            
            document.getElementById('closeProfileModalBtn').addEventListener('click', () => {
                document.getElementById('profileModalOverlay').remove();
            });
        }

        function openChannelViewModal(channelName) {
            const channel = App.channels[channelName];
            if (!channel) return;
            
            const modalHtml = `<div class="modal-overlay" id="profileModalOverlay">
                <div class="profile-modal">
                    <h3>📢 КАНАЛ ${channelName}</h3>
                    
                    <div class="profile-avatar-section">
                        <img src="${channel.avatar || 'https://via.placeholder.com/100?text=📢'}" class="profile-avatar-preview">
                    </div>
                    
                    <div class="profile-input-group">
                        <label>ВЛАДЕЛЕЦ</label>
                        <input type="text" value="${channel.owner}" disabled>
                    </div>
                    
                    <div class="profile-input-group">
                        <label>ОПИСАНИЕ</label>
                        <div class="profile-password-row">${channel.description || '—'}</div>
                    </div>
                    
                    <div class="star-balance-large">👥 ${channel.subscribers?.length || 0} ПОДПИСЧИКОВ</div>

                    <div class="profile-actions">
                        <button class="profile-btn secondary" id="closeProfileModalBtn">ЗАКРЫТЬ</button>
                    </div>
                </div>
            </div>`;
            
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            document.getElementById('closeProfileModalBtn').addEventListener('click', () => {
                document.getElementById('profileModalOverlay').remove();
            });
        }

        window.openProfileModal = openProfileModal;
        window.openChannelProfile = openChannelViewModal;
        window.handleBotCommand = handleBotCommand;
        window.togglePinChat = togglePinChat;
        window.deleteChat = deleteChat;
        window.deleteMessage = deleteMessage;
        window.sendGiftToUser = sendGiftToUser;

        function initBots() {
            App.systemBots.forEach(bot => {
                if (!App.users[bot]) {
                    App.users[bot] = { 
                        password: 'bot', 
                        avatar: null, 
                        stars: 0, 
                        gifts: [], 
                        bio: 'Я бот',
                        isBot: true,
                        verified: true,
                        email: 'bot@quick-sms.com',
                        emailVerified: true
                    };
                }
            });
            saveToFirebase();
        }

        window.addEventListener('load', () => {
            showLoading();
            initBots();
            loadFromFirebase();
            setTimeout(hideLoading, 1000);
        });
    })();
</script>
</body>
</html>
