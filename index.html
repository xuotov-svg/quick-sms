    <style>

            display: flex; 
            flex-direction: column;

        /* Нижняя навигация */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 20px;

            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 20;
            flex-shrink: 0;

        .nav-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);

            font-weight: 600;
            color: #888;
            transition: all 0.2s;

            border-color: var(--accent);

        /* Лента */
        .feed-container {
            flex: 1;
            overflow-y: auto;

            flex-direction: column;
            gap: 12px;
        }
        
        .create-post-area {
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 8px;
        }
        
        .create-post-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            resize: none;
            min-height: 80px;

        .create-post-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;

        .create-post-media {
            display: flex;

        .media-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);

            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;

            filter: grayscale(0.6);

        .post-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: var(--accent);
            filter: grayscale(0.6);
        }
        
        .feed-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .feed-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;

        .post-actions {

        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(5, 5, 5, 0.85); }

        .message.me { align-self: flex-end; background: rgba(30, 42, 58, 0.85); border: 1px solid rgba(212, 175, 55, 0.3); }
        
        .gold-name { background: linear-gradient(135deg, #ffd700, #ffb347); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; }
        .ruby-name { background: linear-gradient(135deg, #ff4444, #ff6666); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; }
        .emerald-name { background: linear-gradient(135deg, #44ff44, #66ff66); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; }
        .amethyst-name { background: linear-gradient(135deg, #aa66ff, #cc88ff); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; }
        
        .input-area { display: flex; gap: 8px; padding: 12px; background: rgba(10, 10, 15, 0.85); border-top: 1px solid rgba(255,255,255,0.08); }
        .input-area input[type="text"] { flex: 2; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; padding: 12px 16px; color: #ffffff; }
        .send-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid rgba(255,255,255,0.15); width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(8px); }
        .profile-modal { background: rgba(15, 15, 20, 0.95); border-radius: 24px; width: 90%; max-width: 400px; padding: 24px; color: #ffffff; max-height: 80vh; overflow-y: auto; }
        
        .notification { position: fixed; top: 20px; right: 20px; background: #1a1a1a; color: #ffffff; padding: 12px 24px; border-radius: 16px; z-index: 10000; animation: slideIn 0.3s ease; }
        .notification.error { background: #ff4444; }
        
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>

<body>
    <div id="app"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // ========== FIREBASE ==========
        const firebaseConfig = { apiKey: "AIzaSyDHddUllNs1CllRVOoR8MDP9qo3bfZnqM4", authDomain: "quick-sms-772c4.firebaseapp.com", databaseURL: "https://quick-sms-772c4-default-rtdb.firebaseio.com", projectId: "quick-sms-772c4", storageBucket: "quick-sms-772c4.firebasestorage.app", messagingSenderId: "722370764251", appId: "1:722370764251:web:1f93437108ee3d54f15bfe" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        const ADMIN_USER = '@durov';
        const TON_ADDRESS = 'UQAR2F00H7mfSjtFwX9eXr_Qu1Vg8M3PKj4_bNyY5dC2niez';
        
        const App = { 
            users: {}, chats: {}, currentUser: null, activeChat: null, 
            blocked: {}, channels: {}, sidebarOpen: false, dataLoaded: false,
            savedMessages: {}, tapBalances: {}, tapUpgrades: {}, yolkChatMessages: {},
            userListeners: {}, streaks: {}, privacySettings: {},
            // НОВЫЕ ПОЛЯ ДЛЯ ЛЕНТЫ
            posts: {},           // { postId: { author, text, photo, video, time, likes: {} } }
            activeTab: 'chats',  // 'chats' или 'feed'
            feedTab: 'recommended', // 'recommended' или 'my'
            tempPostPhoto: null,
            tempPostVideo: null
        };
        
        App.systemBots = ['@game_bot', '@tap_bot', '@random_bot'];
        App.gameSymbols = ['🐣', '🛩️', '7️⃣', '🍳', '🥚', '🔥', '🌊', '🍭', '🍬'];
        
        const tapUpgradeLevels = [{ cost: 0, reward: 1, nextCost: 10, name: "Базовый" }, { cost: 10, reward: 2, nextCost: 100, name: "Уровень 2" }, { cost: 100, reward: 4, nextCost: 1000, name: "Уровень 3" }, { cost: 1000, reward: 8, nextCost: 10000, name: "Уровень 4" }, { cost: 10000, reward: 500, nextCost: null, name: "МАКСИМУМ!" }];

        // ========== СТАТУСЫ ==========
        const STATUS_TYPES = {
            GOLD: { name: 'GOLD', class: 'gold-name', color: '#ffd700' },
            RUBY: { name: 'RUBY', class: 'ruby-name', color: '#ff4444' },
            EMERALD: { name: 'EMERALD', class: 'emerald-name', color: '#44ff44' },
            AMETHYST: { name: 'AMETHYST', class: 'amethyst-name', color: '#aa66ff' }
        };
        
        function getUserStatus(username) {
            const user = App.users[username];
            if (!user) return null;
            if (user.status === 'RUBY') return STATUS_TYPES.RUBY;
            if (user.status === 'EMERALD') return STATUS_TYPES.EMERALD;
            if (user.status === 'AMETHYST') return STATUS_TYPES.AMETHYST;
            if (user.status === 'GOLD') return STATUS_TYPES.GOLD;
            return null;
        }
        
        function formatUserNameWithStatus(username) {
            const status = getUserStatus(username);
            if (status) return `<span class="${status.class}">${username}</span>`;
            return username;
        }

        // ========== ФУНКЦИИ ДЛЯ ЛЕНТЫ (ПОСТЫ) ==========
        
        function createPost() {
            const textInput = document.getElementById('postTextInput');
            const text = textInput ? textInput.value.trim() : '';
            
            if (!text && !App.tempPostPhoto && !App.tempPostVideo) {
                showNotification('Напишите что-нибудь или добавьте медиа', 'error');
                return;
            }
            
            const postId = Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            
            App.posts[postId] = {
                id: postId,
                author: App.currentUser,
                text: text || '',
                time: Date.now(),
                photo: App.tempPostPhoto || null,
                video: App.tempPostVideo || null,
                likes: {}
            };
            
            if (textInput) textInput.value = '';
            App.tempPostPhoto = null;
            App.tempPostVideo = null;
            
            savePostsToFirebase();
            showNotification('Пост опубликован! ✅');
            renderFeed();
        }
        
        function deletePost(postId) {
            const post = App.posts[postId];
            if (!post || post.author !== App.currentUser) {
                showNotification('Нельзя удалить этот пост', 'error');
                return;
            }
            
            if (confirm('Удалить пост?')) {
                delete App.posts[postId];
                savePostsToFirebase();
                showNotification('Пост удалён');
                renderFeed();
            }
        }
        
        function likePost(postId) {
            const post = App.posts[postId];
            if (!post) return;
            
            if (!post.likes) post.likes = {};
            
            if (post.likes[App.currentUser]) {
                delete post.likes[App.currentUser];
            } else {
                post.likes[App.currentUser] = true;
            }
            
            savePostsToFirebase();
            renderFeed();
        }
        
        function renderFeed() {
            const feedContainer = document.getElementById('feedContainer');
            if (!feedContainer) return;
            
            let postsArray = Object.values(App.posts);
            postsArray.sort((a, b) => b.time - a.time);
            
            if (App.feedTab === 'my') {
                postsArray = postsArray.filter(p => p.author === App.currentUser);
            }
            
            if (postsArray.length === 0) {
                feedContainer.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">📭 Нет постов</div>';
                return;
            }
            
            let html = '';
            for (let post of postsArray) {
                const isMyPost = post.author === App.currentUser;
                const likesCount = post.likes ? Object.keys(post.likes).length : 0;
                const userLiked = post.likes && post.likes[App.currentUser];
                const authorData = App.users[post.author] || {};
                const statusClass = getUserStatus(post.author)?.class || '';
                const avatarHtml = authorData.avatar ? `<img src="${authorData.avatar}" style="width:100%; height:100%; object-fit:cover;">` : (post.author[1] || '👤');
                
                let mediaHtml = '';
                if (post.photo) {
                    mediaHtml = `<div class="post-media"><img src="${post.photo}" onclick="window.openImageModal('${post.photo}')" style="cursor:pointer;"></div>`;
                } else if (post.video) {
                    mediaHtml = `<div class="post-media"><video controls src="${post.video}"></video></div>`;
                }
                
                html += `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar" onclick="window.openProfileModal('${post.author}')">${avatarHtml}</div>
                            <div class="post-author">
                                <div class="post-author-name">
                                    <span class="${statusClass}">${post.author}</span>
                                    ${authorData.verified ? '<span class="verified-icon" style="display:inline-block;width:16px;height:16px;background-image:url(\'data:image/svg+xml;utf8,<svg xmlns=\\\"http://www.w3.org/2000/svg\\\" viewBox=\\\"0 0 24 24\\\"><path fill=\\\"#389df2\\\" d=\\\"M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z\\\"/><path fill=\\\"white\\\" d=\\\"M9.5 12.5L11.5 14.5L15.5 9.5\\\" stroke=\\\"white\\\" stroke-width=\\\"2\\\"/></svg>\'); background-size:contain;"></span>' : ''}
                                </div>
                                <div class="post-time">${new Date(post.time).toLocaleString()}</div>
                            </div>
                            ${isMyPost ? `<button class="post-delete-btn" onclick="window.deletePost('${post.id}')">🗑️</button>` : ''}
                        </div>
                        ${post.text ? `<div class="post-text">${escapeHtml(post.text)}</div>` : ''}
                        ${mediaHtml}
                        <div class="post-actions">
                            <button class="post-like-btn ${userLiked ? 'liked' : ''}" onclick="window.likePost('${post.id}')">
                                ❤️ <span>${likesCount}</span>
                            </button>
                        </div>
                    </div>
                `;
            }
            
            feedContainer.innerHTML = html;
        }
        
        function handlePostFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                compressImage(ev.target.result, 800, 800, 0.6, (compressed) => {
                    App.tempPostPhoto = compressed;
                    showNotification('Фото добавлено к посту');
                });
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        }
        
        function handlePostVideoSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 20 * 1024 * 1024) {
                showNotification('Видео не более 20 МБ', 'error');
                return;
            }
            const reader = new FileReader();
            reader.onload = (ev) => {
                App.tempPostVideo = ev.target.result;
                showNotification('Видео добавлено к посту');
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        }
        
        function savePostsToFirebase() {
            localStorage.setItem('yolk_posts', JSON.stringify(App.posts));
            if (App.dataLoaded) {
                database.ref('posts').set(App.posts).catch(e => console.error(e));
            }
        }
        
        function loadPosts() {
            const saved = localStorage.getItem('yolk_posts');
            if (saved) {
                try { App.posts = JSON.parse(saved); } catch(e) { App.posts = {}; }
            } else { App.posts = {}; }
        }

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) {
            const img = new Image();
            img.onload = () => {
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = dataUrl;
        }
        
        function generateId() { return Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
        function isValidUsername(str) { return /^[a-z0-9]{4,15}$/.test(str); }
        function isUserOnline(username) { const lastSeen = App.users[username]?.lastSeen; if (!lastSeen) return false; return (Date.now() - lastSeen) < 300000; }
        
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = 'notification' + (type === 'error' ? ' error' : '');
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        function updateUserInterface() {
            const userData = App.users[App.currentUser];
            if (!userData) return;
            const starBalanceElements = document.querySelectorAll('.star-balance');
            starBalanceElements.forEach(el => {
                el.innerHTML = `<span class="yc-currency"></span> ${userData.stars || 0} YC`;
            });
        }
        
        function saveToFirebase() {
            if (!App.dataLoaded) return;
            const firebaseData = { users: App.users, chats: App.chats, blocked: App.blocked, channels: App.channels, tapBalances: App.tapBalances, tapUpgrades: App.tapUpgrades, yolkChatMessages: App.yolkChatMessages, streaks: App.streaks, privacySettings: App.privacySettings, posts: App.posts };
            database.ref().set(firebaseData).catch(error => console.error('Ошибка сохранения:', error));
        }
        
        function openProfileModal(username) {
            const userData = App.users[username] || {};
            const modalHtml = `<div class="modal-overlay" id="profileModalOverlay"><div class="profile-modal"><h3>ПРОФИЛЬ ${username}</h3><div class="profile-input-group"><label>ОПИСАНИЕ</label><div>${userData.bio || '—'}</div></div><div class="profile-input-group"><label>ВАЛЮТА</label><div>${userData.stars || 0} YC</div></div><div class="profile-actions"><button class="profile-btn secondary" id="closeProfileModalBtn">ЗАКРЫТЬ</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('closeProfileModalBtn')?.addEventListener('click', () => document.getElementById('profileModalOverlay')?.remove());
        }
        
        window.openProfileModal = openProfileModal;
        window.openImageModal = function(src) {
            const modalHtml = `<div class="modal-overlay" id="imageModal" onclick="this.remove()"><div style="max-width:90%; max-height:90%; display:flex; justify-content:center; align-items:center;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        };
        window.deletePost = deletePost;
        window.likePost = likePost;

        // ========== ОТРИСОВКА ГЛАВНОГО ЭКРАНА ==========
        function render() {
            const root = document.getElementById('app');
            if (!App.dataLoaded) {
                root.innerHTML = '<div class="loading-screen"><div class="loading-spinner"></div></div>';
                return;
            }
            if (!App.currentUser) {
                root.innerHTML = renderAuth();
                attachAuthEvents();
            } else {
                root.innerHTML = renderMain();
                setTimeout(() => {
                    attachMainEvents();
                    if (App.activeTab === 'chats' && App.activeChat) loadMessages(App.activeChat);
                    if (App.activeTab === 'feed') renderFeed();
                    updateChatList();
                    updateUserInterface();
                }, 100);
            }
        }
        
        function renderAuth() {
            return `<div class="auth-container"><div class="auth-box"><h2>Yolkapp</h2><div id="authForms"><div id="loginForm"><div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="loginUsername" type="text" placeholder="только англ буквы и цифры, 4-15 символов"></div><div class="input-group"><label>ПАРОЛЬ</label><input id="loginPassword" type="password" placeholder="только англ буквы и цифры"></div><button class="btn" id="loginBtn">ВОЙТИ</button></div><div class="auth-switch"><button class="btn btn-secondary" id="showRegisterBtn">СОЗДАТЬ</button></div></div><div id="registerForm" style="display: none;"><div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="regUsername" type="text" placeholder="только англ буквы и цифры, 4-15 символов"></div><div class="input-group"><label>ПАРОЛЬ</label><input id="regPassword" type="password" placeholder="только англ буквы и цифры"></div><button class="btn" id="registerBtn">СОЗДАТЬ</button><div class="auth-switch"><button class="btn btn-secondary" id="showLoginBtn">← НАЗАД</button></div></div><div id="authError" class="auth-error"></div></div></div>`;
        }
        
        function renderMain() {
            const userData = App.users[App.currentUser] || {};
            const isFeed = App.activeTab === 'feed';
            
            return `
                <div class="main-container" style="display:flex; flex-direction:column; height:100%;">
                    <div class="sidebar ${App.sidebarOpen ? 'open' : ''}">
                        <div class="user-profile" id="openProfileBtn">
                            <div class="avatar">${userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : (App.currentUser[1] ? App.currentUser[1].toUpperCase() : '?')}</div>
                            <div><div class="username-display">${formatUserNameWithStatus(App.currentUser)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div><div class="star-balance"><span class="yc-currency"></span> ${userData.stars || 0} YC</div></div>
                        </div>
                        <div class="search-add"><input type="text" placeholder="ПОИСК @юзернейм" id="searchUserInput"><button class="icon-btn" id="addUserBtn">+</button></div>
                        <div class="chats-list" id="chatsList"></div>
                    </div>
                    
                    <div class="chat-area" style="flex:1; display:flex; flex-direction:column;">
                        ${!isFeed ? `
                            <div class="chat-header">
                                <div class="chat-header-info">
                                    <button class="back-btn ${window.innerWidth < 768 ? 'visible' : ''}" id="backBtn">←</button>
                                    <strong>${App.activeChat === 'saved' ? 'ИЗБРАННОЕ' : (App.activeChat === 'yolk' ? 'YOLK' : (App.activeChat || 'ЧАТЫ'))}</strong>
                                </div>
                            </div>
                            <div class="messages-container" id="messageList"></div>
                            <div class="input-area">
                                <input type="text" id="messageText" placeholder="СООБЩЕНИЕ..." autofocus>
                                <label for="fileUpload" class="file-label">📷</label>
                                <label for="videoUpload" class="file-label">🎥</label>
                                <input type="file" id="fileUpload" accept="image/*" style="display:none">
                                <input type="file" id="videoUpload" accept="video/*" style="display:none">
                                <button class="send-btn" id="sendMsgBtn">➤</button>
                            </div>
                        ` : `
                            <div class="feed-container" id="feedContainer" style="flex:1; overflow-y:auto; padding:12px;">
                                <div class="create-post-area">
                                    <textarea class="create-post-input" id="postTextInput" placeholder="Что нового? 🥚" rows="2"></textarea>
                                    <div class="create-post-actions">
                                        <div class="create-post-media">
                                            <label class="media-btn" for="postFileUpload">📷 Фото</label>
                                            <label class="media-btn" for="postVideoUpload">🎥 Видео</label>
                                        </div>
                                        <button class="post-btn" id="createPostBtn">ОПУБЛИКОВАТЬ</button>
                                    </div>
                                    <input type="file" id="postFileUpload" accept="image/*" style="display:none">
                                    <input type="file" id="postVideoUpload" accept="video/*" style="display:none">
                                </div>
                                <div class="feed-tabs">
                                    <div class="feed-tab ${App.feedTab === 'recommended' ? 'active' : ''}" data-feed-tab="recommended">📰 РЕКОМЕНДАЦИИ</div>
                                    <div class="feed-tab ${App.feedTab === 'my' ? 'active' : ''}" data-feed-tab="my">📝 МОИ ПОСТЫ</div>
                                </div>
                                <div id="postsList"></div>
                            </div>
                        `}
                    </div>
                    
                    <div class="bottom-nav">
                        <button class="nav-btn ${!isFeed ? 'active' : ''}" data-nav="chats">💬 ЧАТЫ</button>
                        <button class="nav-btn ${isFeed ? 'active' : ''}" data-nav="feed">📰 ЛЕНТА</button>
                    </div>
                </div>
            `;
        }
        
        function attachAuthEvents() {
            const loginForm = document.getElementById('loginForm');
            const regForm = document.getElementById('registerForm');
            const errorDiv = document.getElementById('authError');
            
            document.getElementById('showRegisterBtn')?.addEventListener('click', () => { loginForm.style.display = 'none'; regForm.style.display = 'block'; });
            document.getElementById('showLoginBtn')?.addEventListener('click', () => { regForm.style.display = 'none'; loginForm.style.display = 'block'; });
            
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                let username = document.getElementById('loginUsername').value.trim().toLowerCase();
                const pass = document.getElementById('loginPassword').value.trim();
                if (!isValidUsername(username)) { errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ И ЦИФРЫ, 4-15 СИМВОЛОВ'; return; }
                const clean = '@' + username;
                if (!App.users[clean] || App.users[clean].password !== pass) { errorDiv.innerText = '! НЕВЕРНЫЙ ЛОГИН ИЛИ ПАРОЛЬ'; return; }
                App.currentUser = clean;
                localStorage.setItem('yolk_current_user', clean);
                App.activeTab = 'chats';
                App.activeChat = 'saved';
                render();
            });
            
            document.getElementById('registerBtn')?.addEventListener('click', () => {
                let username = document.getElementById('regUsername').value.trim().toLowerCase();
                const pass = document.getElementById('regPassword').value.trim();
                if (!isValidUsername(username)) { errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ И ЦИФРЫ, 4-15 СИМВОЛОВ'; return; }
                if (!pass) { errorDiv.innerText = '! ВВЕДИТЕ ПАРОЛЬ'; return; }
                const clean = '@' + username;
                if (App.users[clean] || App.systemBots.includes(clean)) { errorDiv.innerText = '! УЖЕ ЕСТЬ'; return; }
                const newUser = { password: pass, avatar: null, banner: null, stars: 10, gifts: [], nfts: [], bio: '', verified: false, status: null, age: 14, twoFA: false, lastSeen: Date.now(), chatWallpaper: '' };
                database.ref('users/' + clean).set(newUser).then(() => {
                    App.users[clean] = newUser;
                    App.currentUser = clean;
                    App.activeTab = 'chats';
                    App.activeChat = 'saved';
                    localStorage.setItem('yolk_current_user', clean);
                    saveToFirebase();
                    render();
                    showNotification('✅ Аккаунт создан!');
                }).catch((err) => { console.error(err); errorDiv.innerText = '! Ошибка сервера'; });
            });
        }
        
        function attachMainEvents() {
            // Навигация
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const tab = e.target.dataset.nav;
                    if (tab === 'chats') {
                        App.activeTab = 'chats';
                        if (!App.activeChat) App.activeChat = 'saved';
                    } else if (tab === 'feed') {
                        App.activeTab = 'feed';
                    }
                    render();
                });
            });
            
            // Кнопка назад
            const backBtn = document.getElementById('backBtn');
            if (backBtn) backBtn.addEventListener('click', () => { App.sidebarOpen = true; document.querySelector('.sidebar')?.classList.add('open'); });
            
            // Профиль
            const openProfileBtn = document.getElementById('openProfileBtn');
            if (openProfileBtn) openProfileBtn.addEventListener('click', () => openProfileModal(App.currentUser));
            
            // Поиск и добавление
            const addUserBtn = document.getElementById('addUserBtn');
            if (addUserBtn) addUserBtn.addEventListener('click', addUserBySearch);
            
            // Отправка сообщения
            const sendBtn = document.getElementById('sendMsgBtn');
            if (sendBtn) sendBtn.addEventListener('click', sendMessage);
            const messageText = document.getElementById('messageText');
            if (messageText) messageText.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
            
            // Файлы для чата
            const fileUpload = document.getElementById('fileUpload');
            const videoUpload = document.getElementById('videoUpload');
            if (fileUpload) fileUpload.addEventListener('change', handleFileSelect);
            if (videoUpload) videoUpload.addEventListener('change', handleVideoSelect);
            
            // Посты
            const createPostBtn = document.getElementById('createPostBtn');
            if (createPostBtn) createPostBtn.addEventListener('click', createPost);
            
            const postFileUpload = document.getElementById('postFileUpload');
            const postVideoUpload = document.getElementById('postVideoUpload');
            if (postFileUpload) postFileUpload.addEventListener('change', handlePostFileSelect);
            if (postVideoUpload) postVideoUpload.addEventListener('change', handlePostVideoSelect);
            
            // Вкладки ленты
            document.querySelectorAll('.feed-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    App.feedTab = e.target.dataset.feedTab;
                    renderFeed();
                    document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                });
            });
        }
        
        function sendMessage() {
            const textInput = document.getElementById('messageText');
            const text = textInput ? textInput.value.trim() : '';
            if (!text && !App.tempPhoto && !App.tempVideo) return;
            
            const from = App.currentUser;
            const to = App.activeChat;
            if (!to || to === 'yolk') return;
            
            const message = { from, text: text || '', time: Date.now(), photo: App.tempPhoto || null, video: App.tempVideo || null, isVideo: !!App.tempVideo };
            
            if (to === 'saved') {
                if (!App.savedMessages[from]) App.savedMessages[from] = [];
                App.savedMessages[from].push(message);
                saveSavedMessages();
                renderMessages('saved');
            } else {
                const chatId = [from, to].sort().join('_');
                if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] };
                App.chats[chatId].messages.push(message);
                saveToFirebase();
                renderMessages(to);
            }
            
            if (textInput) textInput.value = '';
            App.tempPhoto = null;
            App.tempVideo = null;
            if (document.getElementById('fileUpload')) document.getElementById('fileUpload').value = '';
            if (document.getElementById('videoUpload')) document.getElementById('videoUpload').value = '';
            updateChatList();
            playHappySound();
        }
        
        function playHappySound() { try { const audio = new Audio('data:audio/wav;base64,U3RlYWx0aCBTb3VuZA=='); audio.volume = 0.2; audio.play().catch(()=>{}); } catch(e) {} }
        
        function renderMessages(chatPartner) {
            const container = document.getElementById('messageList');
            if (!container) return;
            let messages = [];
            if (chatPartner === 'saved') messages = App.savedMessages[App.currentUser] || [];
            else {
                const chatId = [App.currentUser, chatPartner].sort().join('_');
                const chat = App.chats[chatId];
                messages = chat ? chat.messages : [];
            }
            let html = '';
            messages.forEach((msg, idx) => {
                const isMe = msg.from === App.currentUser;
                let mediaHtml = '';
                if (msg.photo) {
                    if (msg.isVideo) mediaHtml = `<video controls class="media-preview"><source src="${msg.photo}" type="video/mp4"></video>`;
                    else mediaHtml = `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`;
                }
                html += `<div class="message ${isMe ? 'me' : ''}"><div class="message-text">${escapeHtml(msg.text)}</div>${mediaHtml}<div class="time">${new Date(msg.time).toLocaleTimeString().slice(0,5)}</div></div>`;
            });
            if (html === '') html = '<div style="text-align:center; color:#888; padding:20px;">Нет сообщений</div>';
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }
        
        function updateChatList() {
            const container = document.getElementById('chatsList');
            if (!container) return;
            let chats = new Set(['saved']);
            Object.keys(App.chats || {}).forEach(key => {
                const c = App.chats[key];
                if (c.user1 === App.currentUser && c.user2 !== 'saved') chats.add(c.user2);
                if (c.user2 === App.currentUser && c.user1 !== 'saved') chats.add(c.user1);
            });
            let html = '';
            for (let chat of chats) {
                const isActive = chat === App.activeChat;
                const avatarHtml = `<div class="chat-avatar">${chat[1] || '💬'}</div>`;
                html += `<div class="chat-item ${isActive ? 'active' : ''}" data-chat="${chat}">${avatarHtml}<div style="flex:1;"><div class="username-display">${chat}</div></div></div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', () => {
                    const chatId = el.dataset.chat;
                    App.activeChat = chatId;
                    App.activeTab = 'chats';
                    if (window.innerWidth < 768) document.querySelector('.sidebar')?.classList.remove('open');
                    render();
                });
            });
        }
        
        function addUserBySearch() {
            let query = document.getElementById('searchUserInput').value.trim().toLowerCase();
            if (!query) return;
            if (!query.startsWith('@')) query = '@' + query;
            if (!App.users[query] && !App.systemBots.includes(query)) {
                showNotification('Пользователь не найден', 'error');
                return;
            }
            if (query === App.currentUser) { showNotification('Это вы', 'error'); return; }
            const chatId = [App.currentUser, query].sort().join('_');
            if (!App.chats[chatId]) App.chats[chatId] = { user1: App.currentUser, user2: query, messages: [] };
            App.activeChat = query;
            App.activeTab = 'chats';
            saveToFirebase();
            render();
            document.getElementById('searchUserInput').value = '';
        }
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { compressImage(ev.target.result, 800, 800, 0.6, (compressed) => { App.tempPhoto = compressed; sendMessage(); }); };
            reader.readAsDataURL(file);
        }
        
        function handleVideoSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 20 * 1024 * 1024) { showNotification('Видео не более 20 МБ', 'error'); return; }
            const reader = new FileReader();
            reader.onload = (ev) => { App.tempVideo = ev.target.result; sendMessage(); };
            reader.readAsDataURL(file);
        }
        
        function saveSavedMessages() { if (App.currentUser) localStorage.setItem('yolk_saved_' + App.currentUser, JSON.stringify(App.savedMessages[App.currentUser] || [])); }
        
        function loadFromFirebase() {
            database.ref().get().then(snapshot => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.users) App.users = data.users;
                    if (data.chats) App.chats = data.chats;
                    if (data.posts) App.posts = data.posts;
                    if (data.tapBalances) App.tapBalances = data.tapBalances;
                    if (data.tapUpgrades) App.tapUpgrades = data.tapUpgrades;
                    if (data.yolkChatMessages) App.yolkChatMessages = data.yolkChatMessages;
                    if (data.streaks) App.streaks = data.streaks;
                    if (data.privacySettings) App.privacySettings = data.privacySettings;
                }
                const savedUser = localStorage.getItem('yolk_current_user');
                if (savedUser && App.users[savedUser]) {
                    App.currentUser = savedUser;
                    App.activeChat = localStorage.getItem('yolk_active_chat') || 'saved';
                    App.activeTab = 'chats';
                    loadPosts();
                    loadSavedMessages();
                }
                App.dataLoaded = true;
                render();
            }).catch(() => { App.dataLoaded = true; render(); });
        }
        
        // Инициализация ботов
        function initBots() {
            App.systemBots.forEach(bot => {
                if (!App.users[bot]) App.users[bot] = { password: 'bot', avatar: null, banner: null, stars: 0, gifts: [], nfts: [], bio: '🤖 Бот', isBot: true, verified: true, status: 'GOLD', age: 99, twoFA: false, lastSeen: Date.now(), chatWallpaper: '' };
            });
        }
        
        initBots();
        loadFromFirebase();
    </script>
</body>
</html>
