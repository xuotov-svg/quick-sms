    <style>

        /* ОСТАЛЬНЫЕ СТИЛИ */

        .message { max-width: 85%; padding: 10px 14px; border-radius: 16px; background: rgba(240, 240, 240, 0.95); color: #000000; align-self: flex-start; word-break: break-word; border: 1px solid #000000; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; animation: fadeIn 0.2s ease; backdrop-filter: blur(4px); }
        .message.me { align-self: flex-end; background: rgba(230, 243, 255, 0.95); border: 1px solid #000000; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .gold-name { background: linear-gradient(135deg, #ffd700, #ffb347, #ff8c00); background-clip: text; -webkit-background-clip: text; color: transparent; animation: goldGlow 1.5s infinite; font-weight: bold; display: inline-block; }
        .ruby-name { background: linear-gradient(135deg, #ff4444, #ff6666, #ff8888); background-clip: text; -webkit-background-clip: text; color: transparent; animation: rubyGlow 1.5s infinite; font-weight: bold; display: inline-block; }
        .emerald-name { background: linear-gradient(135deg, #44ff44, #66ff66, #88ff88); background-clip: text; -webkit-background-clip: text; color: transparent; animation: emeraldGlow 1.5s infinite; font-weight: bold; display: inline-block; }
        .amethyst-name { background: linear-gradient(135deg, #aa66ff, #cc88ff, #eeaaff); background-clip: text; -webkit-background-clip: text; color: transparent; animation: amethystGlow 1.5s infinite; font-weight: bold; display: inline-block; }
        .verified-icon { display: inline-block; width: 18px; height: 18px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#389df2"/><stop offset="100%" stop-color="#1a73e8"/></linearGradient></defs><path fill="url(%23grad)" d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/><path fill="white" d="M9.5 12.5L11.5 14.5L15.5 9.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'); background-size: contain; background-repeat: no-repeat; vertical-align: middle; margin-left: 4px; }
        .yc-currency { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: white; border-radius: 50%; position: relative; margin-right: 2px; }
        .yc-currency::before { content: ""; position: absolute; width: 14px; height: 14px; background: #d4af37; border-radius: 50%; }
        .yc-currency::after { content: "YC"; position: absolute; font-size: 8px; font-weight: bold; color: white; text-shadow: 0 0 1px rgba(0,0,0,0.3); }
        .star-balance, .star-balance-large { display: inline-flex; align-items: center; gap: 4px; }
        .star-balance-large { font-size: 24px; background: #f0f0f0; padding: 12px; border-radius: 8px; justify-content: center; border: 1px solid #000000; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #000000; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); transition: transform 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        .sidebar.open { transform: translateX(0); }
        @media (min-width: 768px) { .sidebar { position: relative; transform: translateX(0); width: 300px; } .back-btn { display: none !important; } }
        .user-profile { padding: 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #000000; background: #f0f0f0; cursor: pointer; }
        .avatar { width: 48px; height: 48px; background: var(--accent-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000000; font-weight: 500; border: 2px solid #000000; overflow: hidden; flex-shrink: 0; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .chat-header { padding: 12px 16px; background: white; border-bottom: 2px solid #000000; display: flex; justify-content: space-between; align-items: center; color: #000000; }
        .chat-header-info { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .subscribers-count { font-size: 12px; color: #666; margin-top: 2px; }
        .back-btn { background: none; border: 1px solid #000000; color: #000000; font-size: 24px; cursor: pointer; margin-right: 10px; display: none; width: 40px; height: 40px; border-radius: 8px; }
        .back-btn.visible { display: block; }
        .input-area { display: flex; gap: 8px; padding: 12px; background: rgba(255, 255, 255, 0.95); border-top: 2px solid #000000; align-items: center; flex-wrap: wrap; z-index: 2; position: relative; }
        .input-area input[type="text"] { flex: 2; min-width: 120px; background: #ffffff; border: 1px solid #000000; border-radius: 20px; padding: 12px 16px; color: #000000; outline: none; font-size: 14px; }
        .send-btn { background: var(--accent); border: 1px solid #000000; width: 44px; height: 44px; border-radius: 50%; color: #000000; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 3000; animation: fadeIn 0.2s ease; }
        .profile-modal { background: white; border-radius: 16px; width: 90%; max-width: 400px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); border: 2px solid #000000; color: #000000; max-height: 80vh; overflow-y: auto; }
        .chat-item { padding: 12px 16px; border-radius: 8px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer; background: white; border: 1px solid transparent; }
        .chat-item.active { background: var(--accent-soft); border: 2px solid #000000; }
        .chat-avatar { width: 40px; height: 40px; background: var(--accent-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; border: 2px solid #000000; }
        .tiny-btn { background: #f0f0f0; border: 1px solid #000000; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; color: #000000; }
        .subscribe-btn { background: #ff4444; border: 1px solid #000000; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; color: white; }
        .unsubscribe-btn { background: #e0e0e0; border: 1px solid #000000; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; color: #000000; }
        .streak-badge { display: inline-flex; align-items: center; gap: 2px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 20px; font-size: 10px; font-weight: bold; color: #ff8c00; margin-left: 6px; animation: flameFlicker 1s infinite; }
        @keyframes flameFlicker { 0% { text-shadow: 0 0 2px #ff6b00; } 50% { text-shadow: 0 0 8px #ff4500; } 100% { text-shadow: 0 0 2px #ff6b00; } }
        .profile-avatar-overlay { position: relative; bottom: -40px; left: 20px; z-index: 10; margin-bottom: 20px; }
        .avatar-large { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
        .banner-container { width: 100%; height: 150px; border-radius: 16px; overflow: hidden; border: 2px solid #000000; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .notification { position: fixed; top: 20px; right: 20px; background: #4CAF50; color: white; padding: 12px 24px; border-radius: 8px; z-index: 10000; animation: slideIn 0.3s ease; border: 1px solid #000000; }
        .notification.error { background: #ff4444; }
        .hidden { display: none; }
    </style>

<body>
    <div id="app"></div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // ========== FIREBASE ==========
        const firebaseConfig = { apiKey: "AIzaSyDHddUllNs1CllRVOoR8MDP9qo3bfZnqM4", authDomain: "quick-sms-772c4.firebaseapp.com", databaseURL: "https://quick-sms-772c4-default-rtdb.firebaseio.com", projectId: "quick-sms-772c4", storageBucket: "quick-sms-772c4.firebasestorage.app", messagingSenderId: "722370764251", appId: "1:722370764251:web:1f93437108ee3d54f15bfe" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        const ADMIN_USER = '@durov';
        const TON_ADDRESS = 'UQAR2F00H7mfSjtFwX9eXr_Qu1Vg8M3PKj4_bNyY5dC2niez';
        
        const App = { users: {}, chats: {}, currentUser: null, activeChat: null, blocked: {}, channels: {}, sidebarOpen: false, dataLoaded: false, savedMessages: {}, tapBalances: {}, tapUpgrades: {}, yolkChatMessages: {}, userListeners: {}, streaks: {}, privacySettings: {}, stories: {} };
        App.systemBots = ['@game_bot', '@tap_bot', '@random_bot'];
        App.gameSymbols = ['🐣', '🛩️', '7️⃣', '🍳', '🥚', '🔥', '🌊', '🍭', '🍬'];
        const tapUpgradeLevels = [{ cost: 0, reward: 1, nextCost: 10, name: "Базовый" }, { cost: 10, reward: 2, nextCost: 100, name: "Уровень 2" }, { cost: 100, reward: 4, nextCost: 1000, name: "Уровень 3" }, { cost: 1000, reward: 8, nextCost: 10000, name: "Уровень 4" }, { cost: 10000, reward: 500, nextCost: null, name: "МАКСИМУМ!" }];

        // ========== СТАТУСЫ ==========
        const STATUS_TYPES = {
            GOLD: { name: 'GOLD', class: 'gold-name', messageClass: '', color: '#ffd700' },
            RUBY: { name: 'RUBY', class: 'ruby-name', messageClass: '', color: '#ff4444' },
            EMERALD: { name: 'EMERALD', class: 'emerald-name', messageClass: '', color: '#44ff44' },
            AMETHYST: { name: 'AMETHYST', class: 'amethyst-name', messageClass: '', color: '#aa66ff' }
        };
        
        function getUserStatus(username) {
            const user = App.users[username];
            if (!user) return null;
            if (user.status === 'RUBY') return STATUS_TYPES.RUBY;
            if (user.status === 'EMERALD') return STATUS_TYPES.EMERALD;
            if (user.status === 'AMETHYST') return STATUS_TYPES.AMETHYST;
            if (user.status === 'GOLD') return STATUS_TYPES.GOLD;
            return null;
        }
        
        function formatUserNameWithStatus(username) {
            const status = getUserStatus(username);
            if (status) {
                return `<span class="${status.class}">${username}</span>`;
            }
            return username;
        }
        
        function getSubscribersEnding(count) {
            if (count % 10 === 1 && count % 100 !== 11) return '';
            if (count % 10 >= 2 && count % 10 <= 4 && (count % 100 < 10 || count % 100 >= 20)) return 'а';
            return 'ов';
        }

        // ========== ПРИВАТНОСТЬ ==========
        function canUserMessage(fromUser, toUser) {
            if (fromUser === toUser) return true;
            if (App.systemBots.includes(toUser)) return true;
            if (App.channels[toUser]) return true;
            const privacy = App.privacySettings[toUser];
            if (!privacy || !privacy.blockNewMessages) return true;
            const chatId = [fromUser, toUser].sort().join('_');
            const chat = App.chats[chatId];
            if (chat && chat.messages && chat.messages.length > 0) return true;
            return false;
        }

        // ========== СИСТЕМА STREAK ==========
        function updateStreak(chatPartner) {
            const user = App.currentUser;
            if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk' || App.systemBots.includes(chatPartner) || App.channels[chatPartner]) return 0;
            const chatId = [user, chatPartner].sort().join('_');
            const today = new Date().toDateString();
            if (!App.streaks[chatId]) App.streaks[chatId] = { streak: 0, lastMessageDate: null, users: {} };
            if (!App.streaks[chatId].users[user]) App.streaks[chatId].users[user] = { lastMessageDate: null };
            if (!App.streaks[chatId].users[chatPartner]) App.streaks[chatId].users[chatPartner] = { lastMessageDate: null };
            App.streaks[chatId].users[user].lastMessageDate = today;
            const user1Date = App.streaks[chatId].users[user].lastMessageDate;
            const user2Date = App.streaks[chatId].users[chatPartner].lastMessageDate;
            if (user1Date === today && user2Date === today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toDateString();
                if (App.streaks[chatId].lastMessageDate === yesterdayStr) App.streaks[chatId].streak++;
                else if (App.streaks[chatId].lastMessageDate !== today) App.streaks[chatId].streak = 1;
                App.streaks[chatId].lastMessageDate = today;
            } else {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toDateString();
                if (App.streaks[chatId].lastMessageDate !== today && App.streaks[chatId].lastMessageDate !== yesterdayStr) {
                    App.streaks[chatId].streak = 0;
                    App.streaks[chatId].lastMessageDate = null;
                }
            }
            saveStreaks();
            return App.streaks[chatId].streak;
        }
        
        function getStreak(chatPartner) {
            const user = App.currentUser;
            if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk' || App.systemBots.includes(chatPartner) || App.channels[chatPartner]) return 0;
            const chatId = [user, chatPartner].sort().join('_');
            return App.streaks[chatId]?.streak || 0;
        }
        
        function saveStreaks() {
            localStorage.setItem('yolk_streaks', JSON.stringify(App.streaks));
            if (App.dataLoaded) database.ref('streaks').set(App.streaks).catch(e => console.error(e));
        }
        
        function loadStreaks() {
            const saved = localStorage.getItem('yolk_streaks');
            if (saved) { try { App.streaks = JSON.parse(saved); } catch(e) { App.streaks = {}; } }
            else { App.streaks = {}; }
        }

        // ========== СТОРИС (HISTORIES) ==========
        function addStory(mediaData, type) {
            const story = {
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                media: mediaData,
                type: type,
                time: Date.now(),
                reactions: {},
                views: []
            };
            if (!App.stories[App.currentUser]) App.stories[App.currentUser] = [];
            App.stories[App.currentUser].push(story);
            saveStories();
            showNotification('История добавлена! Она будет доступна 24 часа');
            render();
        }
        
        function getActiveStories(username) {
            const stories = App.stories[username] || [];
            const now = Date.now();
            const activeStories = stories.filter(s => (now - s.time) < 24 * 60 * 60 * 1000);
            if (activeStories.length !== stories.length) {
                App.stories[username] = activeStories;
                saveStories();
            }
            return activeStories;
        }
        
        function hasUnviewedStory(username, currentUser) {
            const stories = getActiveStories(username);
            if (stories.length === 0) return false;
            const lastViewed = localStorage.getItem(`story_viewed_${username}_${currentUser}`);
            return stories.some(s => s.time > (lastViewed || 0));
        }
        
        function viewStory(username, storyId) {
            const story = App.stories[username]?.find(s => s.id === storyId);
            if (story && !story.views.includes(App.currentUser)) {
                story.views.push(App.currentUser);
                saveStories();
            }
            localStorage.setItem(`story_viewed_${username}_${App.currentUser}`, Date.now().toString());
        }
        
        function reactToStory(username, storyId, emoji) {
            const story = App.stories[username]?.find(s => s.id === storyId);
            if (story) {
                if (!story.reactions[emoji]) story.reactions[emoji] = [];
                if (!story.reactions[emoji].includes(App.currentUser)) {
                    story.reactions[emoji].push(App.currentUser);
                    saveStories();
                    showNotification(`Вы поставили ${emoji} на историю`);
                }
            }
        }
        
        function saveStories() {
            localStorage.setItem('yolk_stories', JSON.stringify(App.stories));
            if (App.dataLoaded) database.ref('stories').set(App.stories).catch(e => console.error(e));
        }
        
        function loadStories() {
            const saved = localStorage.getItem('yolk_stories');
            if (saved) { try { App.stories = JSON.parse(saved); } catch(e) { App.stories = {}; } }
            else { App.stories = {}; }
        }
        
        function openStoryViewer(username) {
            const stories = getActiveStories(username);
            if (stories.length === 0) {
                showNotification('Нет активных историй', 'error');
                return;
            }
            let currentIndex = 0;
            let progressInterval = null;
            
            function showStory(index) {
                if (index >= stories.length) {
                    closeViewer();
                    return;
                }
                const story = stories[index];
                viewStory(username, story.id);
                
                const modalHtml = `
                    <div class="story-viewer-modal" id="storyViewerModal">
                        <div class="story-progress-bar"><div class="story-progress-fill" id="storyProgressFill"></div></div>
                        <div class="story-viewer-header">

                        <button class="story-reaction-btn" id="storyReactionBtn">❤️</button>
                        <div class="story-reaction-picker hidden" id="storyReactionPicker">
                            <span>❤️</span><span>🔥</span><span>😂</span><span>😮</span><span>😢</span><span>👍</span>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
                
                const progressFill = document.getElementById('storyProgressFill');
                const closeBtn = document.getElementById('storyCloseBtn');
                const reactionBtn = document.getElementById('storyReactionBtn');
                const reactionPicker = document.getElementById('storyReactionPicker');
                const content = document.getElementById('storyViewerContent');
                
                let progress = 0;
                if (progressInterval) clearInterval(progressInterval);
                progressInterval = setInterval(() => {
                    progress += 2;
                    if (progressFill) progressFill.style.width = progress + '%';
                    if (progress >= 100) {
                        clearInterval(progressInterval);
                        document.getElementById('storyViewerModal')?.remove();
                        showStory(index + 1);
                    }
                }, 50);
                
                closeBtn.onclick = () => closeViewer();
                reactionBtn.onclick = (e) => {
                    e.stopPropagation();
                    reactionPicker.classList.toggle('hidden');
                };
                
                reactionPicker.querySelectorAll('span').forEach(emojiSpan => {
                    emojiSpan.onclick = (e) => {
                        e.stopPropagation();
                        reactToStory(username, story.id, emojiSpan.innerText);
                        reactionPicker.classList.add('hidden');
                        reactionBtn.innerHTML = emojiSpan.innerText;
                    };
                });
                
                content.onclick = (e) => {
                    if (e.target === content) {
                        clearInterval(progressInterval);
                        document.getElementById('storyViewerModal')?.remove();
                        showStory(index + 1);
                    }
                };
                
                const modal = document.getElementById('storyViewerModal');
                modal.onclick = (e) => {
                    if (e.target === modal) {
                        clearInterval(progressInterval);
                        modal.remove();
                        closeViewer();
                    }
                };
            }
            
            function closeViewer() {
                if (progressInterval) clearInterval(progressInterval);
                document.getElementById('storyViewerModal')?.remove();
            }
            
            showStory(0);
        }

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function formatLastSeen(lastSeen, chatPartner) {
            if (chatPartner === 'saved' || chatPartner === 'yolk') return '';
            if (!lastSeen) return 'очень давно';
            const now = Date.now();
            const diff = now - lastSeen;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (minutes < 1) return 'только что';
            if (minutes < 5) return `${minutes} мин назад`;
            if (minutes < 15) return '5 мин назад';
            if (minutes < 30) return '15 мин назад';
            if (minutes < 60) return '30 мин назад';
            if (hours < 2) return '1 час назад';
            if (hours < 5) return `${hours} часа назад`;
            if (hours < 24) return `${hours} часов назад`;
            if (days === 1) return '1 день назад';
            if (days < 5) return `${days} дня назад`;
            return `${days} дней назад`;
        }
        
        function showNotification(message, type = 'success') { 
            const notification = document.createElement('div'); 
            notification.className = 'notification' + (type === 'error' ? ' error' : ''); 
            notification.textContent = message; 
            document.body.appendChild(notification); 
            setTimeout(() => notification.remove(), 3000); 
        }
        
        function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) { 
            const img = new Image(); 
            img.onload = () => { 
                let width = img.width; let height = img.height; 
                if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; } 
                if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; } 
                const canvas = document.createElement('canvas'); 
                canvas.width = width; canvas.height = height; 
                const ctx = canvas.getContext('2d'); 
                ctx.drawImage(img, 0, 0, width, height); 
                const compressedDataUrl = canvas.toDataURL('image/jpeg', quality); 
                callback(compressedDataUrl); 
            }; 
            img.src = dataUrl; 
        }

            const firebaseData = { users: App.users, chats: App.chats, blocked: App.blocked, channels: App.channels, tapBalances: App.tapBalances, tapUpgrades: App.tapUpgrades, yolkChatMessages: App.yolkChatMessages, streaks: App.streaks, privacySettings: App.privacySettings, stories: App.stories };

        function ensureChat(userA, userB) { 
            if (!userA || !userB || userA === userB || userB === 'saved' || userB === 'yolk' || App.channels[userB]) return;

            if (!App.chats[chatId]) { App.chats[chatId] = { user1: userA, user2: userB, messages: [] }; saveToFirebase(); } 
            return chatId; 
        }

        async function createNft(grid, owner) {
            if (!App.users[owner]) return false;
            if (App.users[owner].stars < 50) { showNotification('Недостаточно YC (нужно 50)', 'error'); return false; }
            const nftObj = { grid: grid, createdAt: Date.now() };
            if (!App.users[owner].nfts) App.users[owner].nfts = [];
            App.users[owner].nfts.push(nftObj);
            App.users[owner].stars -= 50;
            saveToFirebase();
            updateUserInterface();
            showNotification('Открытка создана!');
            return true;
        }
        
        function openNftCreator() { 
            if (App.users[App.currentUser].stars < 50) { showNotification('Не хватает 50 YC для создания открытки', 'error'); return; } 
            const modalHtml = `<div class="modal-overlay" id="nftCreatorModal"><div class="profile-modal" style="max-width: 500px;"><h3>🎨 СОЗДАТЬ ОТКРЫТКУ (10x10)</h3><div class="pixel-canvas" id="pixelCanvas" style="display: grid; grid-template-columns: repeat(10, 30px); grid-template-rows: repeat(10, 30px); gap: 1px; background: #ccc;"></div><div class="color-palette" id="colorPalette"></div><button class="create-nft-btn" id="confirmCreateNftBtn">СОЗДАТЬ (50 YC)</button><div class="profile-actions"><button class="profile-btn secondary" id="closeNftCreator">ОТМЕНА</button></div></div></div>`; 
            document.body.insertAdjacentHTML('beforeend', modalHtml); 
            let grid = Array(10).fill().map(() => Array(10).fill('#ffffff')); 
            let currentColor = '#000000'; 
            const canvasDiv = document.getElementById('pixelCanvas'); 
            const paletteDiv = document.getElementById('colorPalette'); 
            const colors = ['#000000', '#ffffff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#800080']; 
            colors.forEach(col => { 
                const btn = document.createElement('div'); 
                btn.className = `color-option ${col === currentColor ? 'active' : ''}`; 
                btn.style.backgroundColor = col; 
                btn.addEventListener('click', () => { currentColor = col; document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active')); btn.classList.add('active'); });

                canvasDiv.innerHTML = '';

                    for (let j = 0; j < 10; j++) {

                        pixel.className = 'pixel'; 
                        pixel.style.backgroundColor = grid[i][j]; 
                        pixel.style.width = '30px'; 
                        pixel.style.height = '30px'; 
                        pixel.addEventListener('click', () => { grid[i][j] = currentColor; renderCanvas(); }); 
                        canvasDiv.appendChild(pixel); 
                    }

            document.getElementById('closeNftCreator').addEventListener('click', () => { document.getElementById('nftCreatorModal').remove(); }); 
        }

            if (isOwn) {

        // ========== РЕНДЕР И ОСНОВНЫЕ ФУНКЦИИ ==========
        function render() { 
            const root = document.getElementById('app'); 
            if (!App.dataLoaded) { root.innerHTML = '<div class="loading-screen"><div class="loading-spinner"></div></div>'; return; } 
            if (!App.currentUser) { root.innerHTML = renderAuth(); attachAuthEvents(); } 
            else { root.innerHTML = renderMain(); setTimeout(() => { attachMainEvents(); if (App.activeChat) loadMessages(App.activeChat); updateChatList(); updateSidebarUser(); }, 100); } 
        }
        
        function renderAuth() { 
            return `<div class="auth-container"><div class="auth-box"><h2>Yolkapp</h2><div id="authForms"><div id="loginForm"><div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="loginUsername" type="text" placeholder="только англ буквы и цифры, 4-15 символов"></div><div class="input-group"><label>ПАРОЛЬ</label><input id="loginPassword" type="password" placeholder="только англ буквы и цифры"></div><button class="btn" id="loginBtn">ВОЙТИ</button></div><div class="auth-switch"><button class="btn btn-secondary" id="showRegisterBtn">СОЗДАТЬ</button></div></div><div id="registerForm" style="display: none;"><div class="input-group"><label>ЮЗЕРНЕЙМ</label><input id="regUsername" type="text" placeholder="только англ буквы и цифры, 4-15 символов"></div><div class="input-group"><label>ПАРОЛЬ</label><input id="regPassword" type="password" placeholder="только англ буквы и цифры"></div><button class="btn" id="registerBtn">СОЗДАТЬ</button><div class="auth-switch"><button class="btn btn-secondary" id="showLoginBtn">← НАЗАД</button></div></div><div id="authError" class="auth-error"></div></div></div>`; 
        }

            const regForm = document.getElementById('registerForm');

            document.getElementById('showRegisterBtn')?.addEventListener('click', () => { loginForm.style.display = 'none'; regForm.style.display = 'block'; });

                const clean = '@' + username; 
                if (!App.users[clean] || App.users[clean].password !== pass) { errorDiv.innerText = '! НЕВЕРНЫЙ ЛОГИН ИЛИ ПАРОЛЬ'; return; } 
                App.currentUser = clean; 
                localStorage.setItem('yolk_current_user', clean); 
                loadSavedMessages(); 
                loadTapBalances(); 
                loadYolkChatMessages();

                loadStories(); 
                setupUserListener(clean); 
                if (App.lastSeenInterval) clearInterval(App.lastSeenInterval);

                render(); 
            }); 
            document.getElementById('registerBtn')?.addEventListener('click', () => { 
                let username = document.getElementById('regUsername').value.trim().toLowerCase(); 
                const pass = document.getElementById('regPassword').value.trim(); 
                if (!isValidUsername(username)) { errorDiv.innerText = '! ТОЛЬКО АНГЛ БУКВЫ И ЦИФРЫ, 4-15 СИМВОЛОВ'; return; } 
                if (!pass) { errorDiv.innerText = '! ВВЕДИТЕ ПАРОЛЬ'; return; } 
                const clean = '@' + username; 
                if (App.users[clean] || App.systemBots.includes(clean)) { errorDiv.innerText = '! УЖЕ ЕСТЬ'; return; } 
                const newUser = { password: pass, avatar: null, banner: null, stars: 0, gifts: [], nfts: [], bio: '', verified: false, status: null, age: 14, twoFA: false, lastSeen: Date.now(), chatWallpaper: '' }; 
                database.ref('users/' + clean).set(newUser).then(() => { 
                    App.users[clean] = newUser; 
                    App.currentUser = clean; 
                    App.savedMessages[clean] = []; 
                    saveSavedMessages();

                    saveToFirebase(); 
                    setupUserListener(clean); 
                    render(); 
                    showNotification('✅ Аккаунт создан!'); 
                }).catch((err) => { console.error('❌ Ошибка сохранения пользователя:', err); errorDiv.innerText = '! Ошибка сервера, попробуйте позже'; }); 
            }); 
        }
        
        function renderMain() {
            const user = App.currentUser;
            const userData = App.users[user] || {};
            const chatPartner = App.activeChat || 'saved';
            const isChannel = App.channels[chatPartner] ? true : false;
            const isYolk = chatPartner === 'yolk';
            const isBotChat = App.systemBots.includes(chatPartner);
            const canWrite = canUserMessage(user, chatPartner) || chatPartner === 'saved' || isChannel || isBotChat || chatPartner === 'yolk';
            const isSubscribed = isChannel && App.channels[chatPartner]?.subscribers?.includes(user);
            const isOwner = isChannel && App.channels[chatPartner]?.owner === user;
            const showInputArea = !isYolk && canWrite && !isChannel;
            const channelSubscribersCount = isChannel ? (App.channels[chatPartner]?.subscribers?.length || 0) : 0;
            
            return `<div class="main-container"><div class="sidebar ${App.sidebarOpen ? 'open' : ''}"><div class="user-profile" id="openProfileBtn"><div class="avatar">${userData.avatar ? `<img src="${userData.avatar}" class="avatar-img">` : (user[1] ? user[1].toUpperCase() : '?')}</div><div><div class="username-display">${formatUserNameWithStatus(user)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div>${userData.age ? `<div class="age-badge">${userData.age} лет</div>` : ''}<div class="star-balance"><span class="yc-currency"></span> ${userData.stars || 0} YC</div></div></div><div class="search-add"><input type="text" placeholder="ПОИСК @юзернейм" id="searchUserInput"><button class="icon-btn" id="addUserBtn">+</button></div><div class="chats-list" id="chatsList"></div></div><div class="chat-area">${renderStories()}<div class="chat-header"><div class="chat-header-info"><button class="back-btn ${window.innerWidth < 768 ? 'visible' : ''}" id="backBtn">←</button><strong>${isChannel ? formatUserNameWithStatus(chatPartner) : formatUserNameWithStatus(chatPartner === 'saved' ? 'ИЗБРАННОЕ' : (chatPartner === 'yolk' ? 'YOLK' : chatPartner))}${!isChannel && App.users[chatPartner]?.verified ? '<span class="verified-icon"></span>' : ''}</strong>${isChannel ? `<div class="subscribers-count">👥 ${channelSubscribersCount} подписчик${getSubscribersEnding(channelSubscribersCount)}</div>` : ''}</div><div class="chat-actions">${chatPartner !== 'saved' && chatPartner !== 'yolk' && !isBotChat && !isChannel ? `<button class="tiny-btn" id="viewProfileBtn">👤</button>` : ''}${isChannel ? `<button class="${isSubscribed ? 'unsubscribe-btn' : 'subscribe-btn'}" id="subscribeBtn">${isSubscribed ? 'ОТПИСАТЬСЯ' : 'ПОДПИСАТЬСЯ'}</button>` : ''}${chatPartner !== 'saved' && chatPartner !== 'yolk' && !isChannel && !App.systemBots.includes(chatPartner) && canWrite ? `<button class="tiny-btn" id="giftBtn">🎁</button>` : ''}</div></div><div class="messages-container" id="messageList"></div>${!isYolk ? (showInputArea ? `<div class="input-area"><input type="text" id="messageText" placeholder="${chatPartner === 'saved' ? 'ЗАМЕТКА...' : 'СООБЩЕНИЕ...'}" autofocus><label for="fileUpload" class="file-label">📷</label><label for="videoUpload" class="file-label">🎥</label><input type="file" id="fileUpload" accept="image/*"><input type="file" id="videoUpload" accept="video/*"><button class="send-btn" id="sendMsgBtn">➤</button></div>` : (isChannel ? (isOwner ? `<div class="input-area"><input type="text" id="messageText" placeholder="ПОСТ..." autofocus><label for="fileUpload" class="file-label">📷</label><label for="videoUpload" class="file-label">🎥</label><input type="file" id="fileUpload" accept="image/*"><input type="file" id="videoUpload" accept="video/*"><button class="send-btn" id="sendMsgBtn">➤</button></div>` : `<div class="input-area" style="justify-content:center; color:#666;"><small>Только владелец канала может писать</small></div>`) : `<div class="input-area" style="justify-content:center;"><div class="blocked-message">🔒 ЭТОМУ ЧЕЛОВЕКУ НЕЛЬЗЯ ПИСАТЬ</div></div>`)) : '<div class="input-area" style="justify-content:center; color:#666;"><small>Это системный чат, отправлять сообщения нельзя</small></div>'}</div></div>`;
        }
        
        function attachMainEvents() { 
            const backBtn = document.getElementById('backBtn'); 
            if (backBtn) backBtn.addEventListener('click', () => { App.sidebarOpen = true; document.querySelector('.sidebar').classList.add('open'); }); 
            const openProfileBtn = document.getElementById('openProfileBtn'); 
            if (openProfileBtn) openProfileBtn.addEventListener('click', () => openProfileModal(App.currentUser)); 
            const viewProfileBtn = document.getElementById('viewProfileBtn'); 
            if (viewProfileBtn) viewProfileBtn.addEventListener('click', () => { if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'yolk' && !App.systemBots.includes(App.activeChat) && !App.channels[App.activeChat]) { openProfileModal(App.activeChat); } else if (App.channels[App.activeChat]) { openChannelModal(App.activeChat); } }); 
            const giftBtn = document.getElementById('giftBtn'); 
            if (giftBtn) giftBtn.addEventListener('click', () => openGiftMenu()); 
            const subscribeBtn = document.getElementById('subscribeBtn'); 
            if (subscribeBtn) subscribeBtn.addEventListener('click', toggleSubscribe); 
            const sendBtn = document.getElementById('sendMsgBtn'); 
            if (sendBtn) sendBtn.addEventListener('click', sendMessage); 
            const fileUpload = document.getElementById('fileUpload'); 
            const videoUpload = document.getElementById('videoUpload'); 
            if (fileUpload) fileUpload.addEventListener('change', handleFileSelect); 
            if (videoUpload) videoUpload.addEventListener('change', handleVideoSelect); 
            const addUserBtn = document.getElementById('addUserBtn'); 
            if (addUserBtn) addUserBtn.addEventListener('click', addUserBySearch); 
            const messageText = document.getElementById('messageText'); 
            if (messageText) messageText.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } }); 
        }
        
        function sendMessage() { 
            const textInput = document.getElementById('messageText'); 
            const text = textInput ? textInput.value.trim() : ''; 
            if (!text && !App.tempPhoto && !App.tempVideo) { showNotification('Введите сообщение или выберите файл', 'error'); return; } 
            const from = App.currentUser; 
            const to = App.activeChat; 
            if (!to || to === 'yolk') { showNotification('Сюда нельзя писать', 'error'); return; } 
            if (!canUserMessage(from, to) && !App.channels[to]) { showNotification('Вы не можете писать этому пользователю', 'error'); return; } 
            if (App.channels[to] && App.channels[to].owner !== from) { showNotification('Только владелец канала может писать', 'error'); return; } 
            try { 
                let mediaData = null; 
                let isVideoMsg = false; 
                if (App.tempVideo) { mediaData = App.tempVideo; isVideoMsg = true; } 
                else if (App.tempPhoto) { mediaData = App.tempPhoto; } 
                const message = { from, text: text || '', time: Date.now(), photo: mediaData, gift: false, isVideo: isVideoMsg }; 
                if (to === 'saved') { 
                    if (!App.savedMessages[from]) App.savedMessages[from] = []; 
                    App.savedMessages[from].push(message); 
                    saveSavedMessages(); 
                    showNotification('Сохранено в избранное'); 
                    renderMessages('saved'); 
                } else if (App.channels[to]) { 
                    if (!App.channels[to].messages) App.channels[to].messages = []; 
                    App.channels[to].messages.push(message); 
                    saveToFirebase(); 
                    renderMessages(to); 
                } else { 
                    const chatId = [from, to].sort().join('_'); 
                    if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] }; 
                    App.chats[chatId].messages.push(message); 
                    saveToFirebase(); 
                    renderMessages(to); 
                    updateStreak(to); 
                } 
                if (textInput) textInput.value = ''; 
                App.tempPhoto = null; 
                App.tempVideo = null; 
                const fileInput = document.getElementById('fileUpload'); 
                const videoInput = document.getElementById('videoUpload'); 
                if (fileInput) fileInput.value = ''; 
                if (videoInput) videoInput.value = ''; 
                updateChatList(); 
            } catch (error) { console.error('Ошибка отправки:', error); showNotification('Ошибка отправки', 'error'); } 
        }
        
        function renderMessages(chatPartner) { 
            const messagesContainer = document.getElementById('messageList'); 
            if (!messagesContainer) return; 
            let messages = []; 
            if (chatPartner === 'saved') messages = App.savedMessages[App.currentUser] || []; 
            else if (chatPartner === 'yolk') messages = App.yolkChatMessages[App.currentUser] || []; 
            else if (App.channels[chatPartner]) messages = App.channels[chatPartner].messages || []; 
            else { const chatId = [App.currentUser, chatPartner].sort().join('_'); const chat = App.chats[chatId]; messages = chat ? chat.messages : []; } 
            let html = ''; 
            if (messages && messages.length > 0) messages.forEach((msg, idx) => { html += renderMessage(msg, idx, App.currentUser, chatPartner); }); 
            else html = '<div style="text-align:center; color:#666; margin-top:20px; padding:20px;">Нет сообщений</div>'; 
            messagesContainer.innerHTML = html; 
            setTimeout(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 100); 
            if (!App.channels[chatPartner]) updateChatHeaderStatus(chatPartner); 
        }
        
        function renderMessage(msg, idx, currentUser, chatPartner) { 
            const isMe = msg.from === currentUser || (chatPartner === 'saved' && msg.from === currentUser); 
            const isChannel = App.channels[chatPartner] ? true : false; 
            const isGift = msg.gift ? true : false; 
            const isBotMsg = App.systemBots.includes(msg.from); 
            const isSystem = msg.from === 'SYSTEM'; 
            const fromUserStatusClass = getUserStatus(msg.from)?.class || ''; 
            let canDelete = false; 
            if (isChannel) canDelete = App.channels[chatPartner]?.owner === currentUser; 
            else if (chatPartner === 'saved') canDelete = true; 
            else if (chatPartner === 'yolk') canDelete = false; 
            else if (App.systemBots.includes(chatPartner)) canDelete = false; 
            else canDelete = isMe; 
            let mediaHtml = ''; 
            if (msg.photo) { 
                if (msg.isVideo) { mediaHtml = `<video controls class="media-preview"><source src="${msg.photo}" type="video/mp4"></video>`; } 
                else { mediaHtml = `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`; } 
            } 
            const likesCount = msg.likes ? Object.keys(msg.likes).length : 0; 
            const userLiked = msg.likes && msg.likes[currentUser]; 
            let messageText = msg.text || ''; 
            if (isGift && messageText.startsWith('🎁 ')) messageText = messageText.substring(2); 
            let buttonsHtml = ''; 
            if (isBotMsg && msg.buttons && msg.buttons.length > 0) buttonsHtml = `<div class="inline-buttons">${msg.buttons.map(btn => `<button class="inline-btn" onclick="window.sendBotCommand('${chatPartner}', '${btn}')">${btn}</button>`).join('')}</div>`; 
            const displayName = fromUserStatusClass ? `<span class="${fromUserStatusClass}">${msg.from}</span>` : msg.from; 
            const messageClass = isMe ? 'me' : ''; 
            return `<div class="message ${messageClass} ${isGift ? 'gift-message' : ''} ${isBotMsg ? 'bot-message' : ''} ${isSystem ? 'system-message' : ''}">${!isMe && !isSystem ? `<small><span class="message-username" onclick="window.openProfileModal('${msg.from}')">${displayName}${App.users[msg.from]?.verified ? '<span class="verified-icon"></span>' : ''}</span></small><br>` : ''}${isSystem ? `<small>🔔 СИСТЕМА</small><br>` : ''}<div class="message-text">${messageText}</div>${mediaHtml}${buttonsHtml}<div class="time">${new Date(msg.time).toLocaleTimeString().slice(0, 5)}</div><div style="display: flex; justify-content: space-between; margin-top: 4px;">${(isChannel) ? `<button class="like-btn ${userLiked ? 'liked' : ''}" onclick="window.toggleLike('${chatPartner}', ${idx}, event)">❤️ <span>${likesCount}</span></button>` : '<div></div>'}${canDelete ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">УДАЛИТЬ</button></div>` : ''}</div></div>`; 
        }
        
        function updateChatList() { 
            const chatsContainer = document.getElementById('chatsList'); 
            if (!chatsContainer || !App.currentUser) return; 
            let chatsList = getChatListForUser(App.currentUser); 
            const saved = chatsList.includes('saved') ? ['saved'] : []; 
            const yolk = chatsList.includes('yolk') ? ['yolk'] : []; 
            const other = chatsList.filter(c => c !== 'saved' && c !== 'yolk'); 
            const orderedList = [...saved, ...yolk, ...other]; 
            let html = ''; 
            orderedList.forEach(chat => { html += renderChatItem(chat, chat === App.activeChat, App.currentUser); }); 
            chatsContainer.innerHTML = html; 
            document.querySelectorAll('.chat-item').forEach(el => { el.addEventListener('click', (e) => { if (e.target.closest('.delete-chat-icon')) return; const chatId = el.dataset.chat; App.activeChat = chatId; localStorage.setItem('yolk_active_chat', chatId); if (window.innerWidth < 768) { App.sidebarOpen = false; document.querySelector('.sidebar').classList.remove('open'); } document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); render(); }); }); 
        }
        
        function renderChatItem(u, active, currentUser) { 
            let name = u === 'saved' ? 'ИЗБРАННОЕ' : (u === 'yolk' ? 'YOLK' : u); 
            let avatarHtml = '<div class="chat-avatar">📁</div>'; 
            if (u === 'yolk') avatarHtml = '<div class="chat-avatar">🥚</div>'; 
            else if (u !== 'saved') { 
                if (App.channels[u]) { 
                    const channelAvatar = App.channels[u]?.avatar; 
                    const subsCount = App.channels[u]?.subscribers?.length || 0;
                    avatarHtml = channelAvatar ? `<div class="chat-avatar"><img src="${channelAvatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"></div>` : '<div class="chat-avatar">📢</div>'; 
                } else if (App.systemBots.includes(u)) { 
                    if (u === '@game_bot') avatarHtml = '<div class="chat-avatar">🎰</div>'; 
                    else if (u === '@tap_bot') avatarHtml = '<div class="chat-avatar">👆</div>'; 
                    else if (u === '@random_bot') avatarHtml = '<div class="chat-avatar">🎲</div>'; 
                    else avatarHtml = '<div class="chat-avatar">🤖</div>'; 
                } else { 
                    const avatarUrl = App.users[u]?.avatar; 
                    avatarHtml = avatarUrl ? `<div class="chat-avatar"><img src="${avatarUrl}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;"></div>` : `<div class="chat-avatar">${u[1] || '@'}</div>`; 
                } 
            } 
            const userData = App.users[u] || {}; 
            const displayName = formatUserNameWithStatus(name); 
            const streak = getStreak(u); 
            const streakHtml = streak > 0 && !App.channels[u] ? `<span class="streak-badge" style="font-size:10px; padding:1px 4px; margin-left:5px;">🔥${streak}</span>` : ''; 
            let infoHtml = '';
            if (App.channels[u]) {
                const subsCount = App.channels[u]?.subscribers?.length || 0;
                infoHtml = `<div style="font-size: 10px; color: #666;">👥 ${subsCount} подписчик${getSubscribersEnding(subsCount)}</div>`;
            } else if (userData.age && !App.systemBots.includes(u)) {
                infoHtml = `<div style="font-size: 10px; color: #666;">${userData.age} лет</div>`;
            }
            return `<div class="chat-item ${active ? 'active' : ''}" data-chat="${u}">${avatarHtml}<div style="flex:1;"><div class="username-display" style="display: flex; align-items: center; gap: 2px; flex-wrap: wrap;">${displayName}${!App.channels[u] && userData.verified ? '<span class="verified-icon"></span>' : ''}${streakHtml}</div>${infoHtml}</div>${u !== 'saved' && u !== 'yolk' ? `<span class="delete-chat-icon" onclick="window.deleteChat('${u}', event)">🗑️</span>` : ''}</div>`; 
        }
        
        function getChatListForUser(user) { 
            let set = new Set(['saved', 'yolk']); 
            Object.keys(App.chats || {}).forEach(key => { const c = App.chats[key]; if (c) { if (c.user1 === user && c.user2 !== 'saved') set.add(c.user2); if (c.user2 === user && c.user1 !== 'saved') set.add(c.user1); } }); 
            Object.keys(App.channels || {}).forEach(channel => { if (App.channels[channel].subscribers?.includes(user)) set.add(channel); }); 
            return Array.from(set); 
        }
        
        function loadMessages(chatPartner) { 
            if (chatPartner === 'saved' || chatPartner === 'yolk') { renderMessages(chatPartner); return; } 
            if (chatPartner === '@game_bot' || chatPartner === '@tap_bot' || chatPartner === '@random_bot') { renderMessages(chatPartner); return; } 
            if (App.channels[chatPartner]) { renderMessages(chatPartner); return; } 
            const chatId = [App.currentUser, chatPartner].sort().join('_'); 
            setupRealtimeListener(chatId, chatPartner); 
            renderMessages(chatPartner); 
            setupUserListener(chatPartner); 
            updateChatHeaderStatus(chatPartner); 
        }
        
        function setupRealtimeListener(chatId, chatPartner) { 
            const chatRef = database.ref('chats/' + chatId); 
            chatRef.on('value', (snapshot) => { const data = snapshot.val(); if (data) { if (!App.chats[chatId]) App.chats[chatId] = data; else App.chats[chatId].messages = data.messages || []; if (App.activeChat === chatPartner) { renderMessages(chatPartner); } } }); 
        }
        
        function setupUserListener(username) { 
            if (App.userListeners[username]) return; 
            const userRef = database.ref('users/' + username); 
            userRef.on('value', (snapshot) => { const userData = snapshot.val(); if (userData) { App.users[username] = { ...App.users[username], ...userData }; if (username === App.currentUser) { updateUserInterface(); updateSidebarUser(); } if (App.activeChat === username) { updateChatHeaderStatus(username); } } }); 
            App.userListeners[username] = true; 
        }
        
        function updateLastSeen(username) { if (App.users[username] && username === App.currentUser) { App.users[username].lastSeen = Date.now(); database.ref('users/' + username + '/lastSeen').set(Date.now()); } }
        
        function loadSavedMessages() { if (!App.currentUser) return; const saved = localStorage.getItem('yolk_saved_' + App.currentUser); if (saved) { try { App.savedMessages[App.currentUser] = JSON.parse(saved); } catch(e) { App.savedMessages[App.currentUser] = []; } } else { App.savedMessages[App.currentUser] = []; } }
        
        function saveSavedMessages() { if (App.currentUser) { localStorage.setItem('yolk_saved_' + App.currentUser, JSON.stringify(App.savedMessages[App.currentUser] || [])); } }
        
        function loadTapBalances() { const balances = localStorage.getItem('yolk_tap_balances'); if (balances) { try { App.tapBalances = JSON.parse(balances); } catch(e) { App.tapBalances = {}; } } else { App.tapBalances = {}; } const upgrades = localStorage.getItem('yolk_tap_upgrades'); if (upgrades) { try { App.tapUpgrades = JSON.parse(upgrades); } catch(e) { App.tapUpgrades = {}; } } else { App.tapUpgrades = {}; } }
        
        function loadYolkChatMessages() { const saved = localStorage.getItem('yolk_chat_messages'); if (saved) { try { App.yolkChatMessages = JSON.parse(saved); } catch(e) { App.yolkChatMessages = {}; } } else { App.yolkChatMessages = {}; } }
        
        function saveYolkChatMessages() { localStorage.setItem('yolk_chat_messages', JSON.stringify(App.yolkChatMessages)); if (App.dataLoaded) { database.ref('yolkChatMessages').set(App.yolkChatMessages).catch(e => console.error(e)); } }
        
        function handleFileSelect(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { compressImage(ev.target.result, 800, 800, 0.6, (compressed) => { App.tempPhoto = compressed; sendMessage(); }); }; reader.readAsDataURL(file); }
        
        function handleVideoSelect(e) { const file = e.target.files[0]; if (!file) return; if (file.size > 20 * 1024 * 1024) { showNotification('Видео не более 20 МБ', 'error'); return; } const reader = new FileReader(); reader.onload = (ev) => { App.tempVideo = ev.target.result; sendMessage(true); }; reader.readAsDataURL(file); }
        
        function addUserBySearch() { 
            let query = document.getElementById('searchUserInput').value.trim().toLowerCase(); 
            if (!query) { showNotification('Введите имя пользователя', 'error'); return; } 
            if (!query.startsWith('@')) query = '@' + query; 
            if (query === 'yolk') { showNotification('Это системный чат', 'error'); return; } 
            if (App.systemBots.includes(query)) { 
                if (!canUserMessage(App.currentUser, query)) { showNotification('Вы не можете писать этому боту', 'error'); return; } 
                ensureChat(App.currentUser, query); 
                App.activeChat = query; 
                localStorage.setItem('yolk_active_chat', query); 
                if (window.innerWidth < 768) App.sidebarOpen = false; 
                document.getElementById('searchUserInput').value = ''; 
                render(); 
                return; 
            } 
            if (App.channels[query]) { 
                if (!App.channels[query].subscribers) App.channels[query].subscribers = []; 
                if (!App.channels[query].subscribers.includes(App.currentUser)) { 
                    App.channels[query].subscribers.push(App.currentUser); 
                    saveToFirebase(); 
                } 
                App.activeChat = query; 
                localStorage.setItem('yolk_active_chat', query); 
                if (window.innerWidth < 768) App.sidebarOpen = false; 
                document.getElementById('searchUserInput').value = ''; 
                render(); 
                return; 
            } 
            if (!App.users[query]) { showNotification('Пользователь не найден', 'error'); return; } 
            if (query === App.currentUser) { showNotification('Это вы', 'error'); return; } 
            if (!canUserMessage(App.currentUser, query)) { showNotification('Этот пользователь запретил писать первым', 'error'); return; } 
            ensureChat(App.currentUser, query); 
            App.activeChat = query; 
            localStorage.setItem('yolk_active_chat', query); 
            if (window.innerWidth < 768) App.sidebarOpen = false; 
            document.getElementById('searchUserInput').value = ''; 
            render(); 
            showNotification(`Чат с ${query} создан`); 
        }
        
        function toggleSubscribe() { 
            const user = App.currentUser; 
            const channel = App.activeChat; 
            if (!App.channels[channel]) return; 
            if (!App.channels[channel].subscribers) App.channels[channel].subscribers = []; 
            if (App.channels[channel].subscribers.includes(user)) { 
                App.channels[channel].subscribers = App.channels[channel].subscribers.filter(s => s !== user); 
                showNotification('Вы отписались от канала'); 
            } else { 
                App.channels[channel].subscribers.push(user); 
                showNotification('Вы подписались на канал'); 
            } 
            saveToFirebase(); 
            render(); 
        }
        
        function openGiftMenu() { 
            const target = App.activeChat; 
            if (!target || target === 'saved' || target === 'yolk' || App.channels[target]) { showNotification('Нельзя отправить подарок сюда', 'error'); return; } 
            const gifts = App.users[App.currentUser].gifts || []; 
            const giftList = gifts.map(g => `<div class="gift-item" onclick="window.sendGiftToUser('${target}', '${g}')">${g}</div>`).join(''); 
            const modalHtml = `<div class="modal-overlay" id="giftModalOverlay"><div class="profile-modal"><h3>🎁 ВЫБЕРИТЕ ПОДАРОК</h3><div id="emojiTab" class="tab-content">${giftList || 'Нет подарков'}</div><div class="profile-actions"><button class="profile-btn secondary" id="closeGiftModal">ОТМЕНА</button></div></div></div>`; 
            document.body.insertAdjacentHTML('beforeend', modalHtml); 
            document.getElementById('closeGiftModal').addEventListener('click', () => { document.getElementById('giftModalOverlay').remove(); }); 
        }
        
        window.sendGiftToUser = function(toUser, giftEmoji) { 
            const fromUser = App.currentUser; 
            const userGifts = [...(App.users[fromUser].gifts || [])];
            const hasGift = userGifts.includes(giftEmoji);
            if (!hasGift) { showNotification('У вас нет такого подарка!', 'error'); return; }
            const indexToRemove = userGifts.indexOf(giftEmoji); 
            if (indexToRemove !== -1) userGifts.splice(indexToRemove, 1); 
            App.users[fromUser].gifts = userGifts; 
            if (!App.users[toUser].gifts) App.users[toUser].gifts = []; 
            App.users[toUser].gifts.push(giftEmoji); 
            const chatId = ensureChat(fromUser, toUser); 
            if (chatId && App.chats[chatId]) { App.chats[chatId].messages.push({ from: fromUser, text: `ПОДАРОК ${giftEmoji} ОТ ${fromUser}`, time: Date.now(), gift: true }); } 
            saveToFirebase(); 
            if (App.activeChat === toUser) renderMessages(toUser); 
            updateUserInterface(); 
            const giftModal = document.getElementById('giftModalOverlay');
            if (giftModal) giftModal.remove();
            showNotification(`Подарок ${giftEmoji} отправлен ${toUser}!`); 
        };
        
        window.deleteChat = function(chat, event) { event.stopPropagation(); if (!confirm(`Удалить чат ${chat}?`)) return; const user = App.currentUser; const chatId = [user, chat].sort().join('_'); if (App.chats[chatId]) delete App.chats[chatId]; if (App.channels[chat] && App.channels[chat].subscribers) App.channels[chat].subscribers = App.channels[chat].subscribers.filter(s => s !== user); if (App.activeChat === chat) { App.activeChat = 'saved'; localStorage.setItem('yolk_active_chat', 'saved'); } saveToFirebase(); render(); showNotification('Чат удален'); };
        
        window.deleteMessage = function(chatPartner, idx) { const from = App.currentUser; try { if (chatPartner === 'saved') { const msgs = App.savedMessages[from]; if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveSavedMessages(); renderMessages('saved'); } } else if (App.channels[chatPartner]) { if (App.channels[chatPartner].owner !== from) { showNotification('Только владелец может удалять', 'error'); return; } const msgs = App.channels[chatPartner].messages; if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveToFirebase(); renderMessages(chatPartner); } } else { const chatId = [from, chatPartner].sort().join('_'); const msgs = App.chats[chatId]?.messages; if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveToFirebase(); renderMessages(chatPartner); } } } catch (error) { console.error('Ошибка удаления:', error); showNotification('Ошибка удаления', 'error'); } };
        
        window.toggleLike = function(chatPartner, messageIdx, event) { event.stopPropagation(); if (App.channels[chatPartner]) { if (!App.channels[chatPartner].messages[messageIdx]) return; const msg = App.channels[chatPartner].messages[messageIdx]; if (!msg.likes) msg.likes = {}; if (msg.likes[App.currentUser]) delete msg.likes[App.currentUser]; else msg.likes[App.currentUser] = true; saveToFirebase(); renderMessages(chatPartner); } };
        
        window.openImageModal = function(src) { const modalHtml = `<div class="modal-overlay" id="imageModal" onclick="this.remove()"><div style="max-width:90%; max-height:90%; display:flex; justify-content:center; align-items:center;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); };
        
        function updateChatHeaderStatus(username) { 
            if (App.channels[username]) return;
            const headerInfo = document.querySelector('.chat-header-info'); 
            if (!headerInfo) return; 
            const existingStatus = headerInfo.querySelector('.chat-user-status'); 
            if (existingStatus) existingStatus.remove(); 
            const existingStreak = headerInfo.querySelector('.streak-badge');
            if (existingStreak) existingStreak.remove();
            const existingNameStrong = headerInfo.querySelector('strong'); 
            if (existingNameStrong) { 
                existingNameStrong.innerHTML = formatUserNameWithStatus(username) + (App.users[username]?.verified ? '<span class="verified-icon"></span>' : '');
            } 
            const streak = getStreak(username);
            if (streak > 0) {
                const streakDiv = document.createElement('span');
                streakDiv.className = 'streak-badge';
                streakDiv.innerHTML = `🔥 ${streak}`;
                existingNameStrong?.appendChild(streakDiv);
            }
            if (username === 'saved' || username === 'yolk') return;
            const isOnline = isUserOnline(username); 
            const lastSeenText = formatLastSeen(App.users[username]?.lastSeen, username); 
            const statusDiv = document.createElement('div'); 
            statusDiv.className = 'chat-user-status' + (isOnline ? '' : ' offline'); 
            statusDiv.textContent = isOnline ? 'в сети' : `был(а) ${lastSeenText}`; 
            headerInfo.appendChild(statusDiv); 
        }
        
        function loadPrivacySettings() { const saved = localStorage.getItem('yolk_privacy'); if (saved) { try { App.privacySettings = JSON.parse(saved); } catch(e) { App.privacySettings = {}; } } else { App.privacySettings = {}; } }
        
        function initBots() { App.systemBots.forEach(bot => { if (!App.users[bot]) App.users[bot] = { password: 'bot', avatar: null, banner: null, stars: 0, gifts: [], nfts: [], bio: bot === '@game_bot' ? '🎰 Игровой автомат!' : (bot === '@tap_bot' ? '👆 Тапай!' : '🎲 Загадай число от 0 до 10!'), isBot: true, verified: true, status: 'GOLD', age: 99, twoFA: false, lastSeen: Date.now(), chatWallpaper: '' }; }); saveToFirebase(); }
        
        function loadFromFirebase() { 
            console.log('🔄 Загрузка данных из Firebase...'); 
            try { 
                database.ref().get().then(snapshot => { 
                    if (snapshot.exists()) { 
                        const data = snapshot.val(); 
                        if (data.users) App.users = data.users; 
                        if (data.chats) App.chats = data.chats; 
                        if (data.blocked) App.blocked = data.blocked; 
                        if (data.channels) App.channels = data.channels; 
                        if (data.tapBalances) App.tapBalances = data.tapBalances; 
                        if (data.tapUpgrades) App.tapUpgrades = data.tapUpgrades; 
                        if (data.yolkChatMessages) App.yolkChatMessages = data.yolkChatMessages; 
                        if (data.streaks) App.streaks = data.streaks; 
                        if (data.privacySettings) App.privacySettings = data.privacySettings; 
                        if (data.stories) App.stories = data.stories; 
                        localStorage.setItem('yolk_cache', JSON.stringify({ users: App.users, chats: App.chats, blocked: App.blocked, channels: App.channels })); 
                    } 
                    const savedUser = localStorage.getItem('yolk_current_user'); 
                    const savedChat = localStorage.getItem('yolk_active_chat'); 
                    if (savedUser && App.users[savedUser]) { 
                        App.currentUser = savedUser; 
                        App.activeChat = savedChat && (savedChat === 'saved' || savedChat === 'yolk' || App.users[savedChat] || App.channels[savedChat]) ? savedChat : 'saved'; 
                        loadSavedMessages(); 
                        loadTapBalances(); 
                        loadYolkChatMessages(); 
                        loadStreaks(); 
                        loadPrivacySettings(); 
                        loadStories(); 
                        setupUserListener(App.currentUser); 
                        if (App.lastSeenInterval) clearInterval(App.lastSeenInterval); 
                        App.lastSeenInterval = setInterval(() => { updateLastSeen(App.currentUser); }, 30000); 
                        updateLastSeen(App.currentUser); 
                    } 
                    App.dataLoaded = true; 
                    render(); 
                }).catch(error => { console.error('❌ Ошибка Firebase:', error); const cachedData = localStorage.getItem('yolk_cache'); if (cachedData) { try { const cache = JSON.parse(cachedData); if (cache.users) App.users = cache.users; if (cache.chats) App.chats = cache.chats; if (cache.blocked) App.blocked = cache.blocked; if (cache.channels) App.channels = cache.channels; } catch(e) { } } const savedUser = localStorage.getItem('yolk_current_user'); if (savedUser && App.users[savedUser]) { App.currentUser = savedUser; App.activeChat = localStorage.getItem('yolk_active_chat') || 'saved'; loadSavedMessages(); loadTapBalances(); loadYolkChatMessages(); loadStreaks(); loadPrivacySettings(); loadStories(); setupUserListener(App.currentUser); } App.dataLoaded = true; render(); }); 
            } catch (error) { console.error('❌ Ошибка Firebase:', error); } 
        }
        
        window.addEventListener('load', () => { initBots(); loadFromFirebase(); });
        
        window.openProfileModal = openProfileModal;
        window.sendBotCommand = function(botName, command) {};
        window.openImageModal = openImageModal;
    </script>
</body>
</html>
