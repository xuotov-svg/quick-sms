<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/logo.jpg">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        :root {
            --bg: #0a0a0a;
            --bg-panel: #0f0f0f;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --soft: #1a1a1a;
            --border: #2a2a2a;
            --accent: #d4af37;
            --accent-soft: #2a2418;
            --message-me: #1e2a3a;
            --message-other: #1a1a1a;
            --header: #0a0a0a;
            --shadow: rgba(0, 0, 0, 0.5);
            --danger: #ff4444;
            --success: #4CAF50;
            --input-bg: rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(10, 10, 15, 0.75);
            --glass-border: rgba(255, 255, 255, 0.10);
            --hover-bg: rgba(212, 175, 55, 0.18);
            --hover-border: rgba(212, 175, 55, 0.45);
        }
        body.light-theme {
            --bg: #ffffff;
            --bg-panel: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --soft: #e9ecef;
            --border: #dee2e6;
            --accent: #b8860b;
            --accent-soft: #fff3cd;
            --message-me: #e3f2fd;
            --message-other: #f1f3f4;
            --header: #ffffff;
            --shadow: rgba(0, 0, 0, 0.08);
            --input-bg: rgba(0, 0, 0, 0.03);
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(184, 134, 11, 0.10);
            --hover-border: rgba(184, 134, 11, 0.30);
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            padding: 0;
            margin: 0;
            transition: background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        #app {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            background: var(--bg-panel);
            box-shadow: 0 0 30px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            position: relative;
            z-index: 1;
            transition: background 0.2s ease;
        }
        .chat-area,
        .sidebar,
        .chat-header,
        .input-area,
        .auth-box,
        .profile-modal,
        .message,
        .chat-item,
        .search-add,
        .feed-container,
        .post-card,
        .comments-modal {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .chat-item:hover,
        .chat-item.active,
        .btn:hover,
        .icon-btn:hover,
        .send-btn:hover,
        .profile-btn:hover,
        .tab:hover,
        .nav-item:hover,
        .nav-item.active {
            background: var(--hover-bg);
            border-color: var(--hover-border);
            box-shadow: 0 0 24px rgba(212, 175, 55, 0.25);
        }
        .chat-area,
        .feed-container {
            background-color: transparent !important;
            position: relative;
        }
        body:not(.light-theme) .chat-area,
        body:not(.light-theme) .feed-container {
            background-color: #050505 !important;
        }
        body.light-theme .chat-area,
        body.light-theme .feed-container {
            background-color: #ffffff !important;
        }
        .verified-icon {
            display: none;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: transparent;
            position: relative;
            z-index: 1;
        }
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--message-other);
            color: var(--text);
            align-self: flex-start;
            word-break: break-word;
            border: 1px solid var(--glass-border);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        .message.me {
            align-self: flex-end;
            background: var(--message-me);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.6);
            }
            50% {
                box-shadow: 0 0 0 14px rgba(255, 68, 68, 0);
            }
        }
        .message-text {
            color: var(--text);
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
            color: var(--text-secondary);
        }
        .message small {
            color: var(--text-secondary);
        }
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--message-other);
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 8px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 13px;
        }
        .typing-dots {
            display: flex;
            gap: 3px;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(1) {
            animation-delay: 0s;
        }
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes typingBounce {
            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }
        .loading-text {
            color: var(--text);
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 4px;
        }
        .loading-dots {
            display: inline-block;
        }
        .loading-dots span {
            animation: dotPulse 1.4s ease-in-out infinite;
            display: inline-block;
        }
        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes dotPulse {
            0%,
            100% {
                opacity: 0.3;
                transform: translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-5px);
            }
        }
        body.light-theme .icon-btn,
        body.light-theme .send-btn,
        body.light-theme .file-label,
        body.light-theme .tiny-btn,
        body.light-theme .profile-btn,
        body.light-theme .subscribe-btn,
        body.light-theme .unsubscribe-btn,
        body.light-theme .like-btn,
        body.light-theme .dislike-btn,
        body.light-theme .settings-icon,
        body.light-theme .delete-chat-icon,
        body.light-theme .tab,
        body.light-theme .msg-actions button,
        body.light-theme .back-btn,
        body.light-theme .change-username-btn,
        body.light-theme .toggle-password,
        body.light-theme .resend-link,
        body.light-theme .close-btn,
        body.light-theme .nav-item,
        body.light-theme .post-like,
        body.light-theme .post-dislike,
        body.light-theme .post-comment,
        body.light-theme .post-delete,
        body.light-theme .create-post-btn,
        body.light-theme .feed-filter-btn {
            filter: none !important;
        }
        .icon-btn,
        .send-btn,
        .file-label,
        .tiny-btn,
        .profile-btn,
        .subscribe-btn,
        .unsubscribe-btn,
        .like-btn,
        .dislike-btn,
        .settings-icon,
        .delete-chat-icon,
        .tab,
        .msg-actions button,
        .back-btn,
        .create-nft-btn,
        .change-username-btn,
        .toggle-password,
        .resend-link,
        .close-btn,
        .nav-item,
        .post-like,
        .post-dislike,
        .post-comment,
        .post-delete,
        .create-post-btn {
            transition: all 0.2s ease;
        }
        .icon-btn:hover,
        .send-btn:hover,
        .file-label:hover,
        .tiny-btn:hover,
        .profile-btn:hover,
        .btn:hover,
        .subscribe-btn:hover,
        .unsubscribe-btn:hover,
        .like-btn:hover,
        .dislike-btn:hover,
        .settings-icon:hover,
        .delete-chat-icon:hover,
        .tab:hover,
        .msg-actions button:hover,
        .nav-item:hover,
        .post-like:hover,
        .post-dislike:hover,
        .post-comment:hover,
        .post-delete:hover,
        .create-post-btn:hover {
            filter: brightness(1.05);
        }
        .tab.active,
        .btn:active,
        .icon-btn:active,
        .send-btn:active,
        .nav-item.active {
            color: var(--accent);
        }
        .profile-banner-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }
        .banner-container {
            width: 100%;
            height: 150px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .banner-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .banner-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 14px;
        }
        body.light-theme .banner-placeholder {
            background: #f0f0f0;
            color: #aaa;
        }
        body.light-theme .banner-container {
            background: #f0f0f0;
        }
        .profile-avatar-overlay {
            position: absolute;
            bottom: -40px;
            left: 20px;
            z-index: 10;
        }
        .profile-avatar-overlay .avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--text);
            overflow: hidden;
            box-shadow: 0 4px 20px var(--shadow);
        }
        body.light-theme .profile-avatar-overlay .avatar-large {
            background: #e0e0e0;
        }
        .profile-avatar-overlay .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-name-section {
            margin-top: 50px;
            padding-left: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .settings-icon {
            cursor: pointer;
            font-size: 24px;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
            background: none;
            border: none;
            color: var(--text);
        }
        .settings-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(90deg);
        }
        .settings-icon-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            cursor: pointer;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .toggle-switch .toggle-label {
            font-size: 14px;
            color: var(--text);
        }
        .toggle-switch .toggle-checkbox {
            width: 40px;
            height: 20px;
            background: #2a2a2a;
            border-radius: 20px;
            position: relative;
            transition: 0.2s;
            border: 1px solid var(--glass-border);
        }
        .toggle-switch .toggle-checkbox::after {
            content: "";
            width: 16px;
            height: 16px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 2px;
            transition: 0.2s;
        }
        .toggle-switch.active .toggle-checkbox {
            background: var(--accent);
        }
        .toggle-switch.active .toggle-checkbox::after {
            left: 20px;
        }
        .auth-container,
        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .auth-container {
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0a 70%);
            justify-content: center;
            align-items: center;
        }
        .auth-box {
            max-width: 380px;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(30px);
            padding: 36px 28px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            width: 92%;
            animation: fadeIn 0.4s ease;
            text-align: center;
        }
        .auth-box h2 {
            color: var(--accent);
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 30px;
            letter-spacing: 2px;
        }
        .auth-subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }
        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        .btn {
            background: var(--accent);
            color: #000000;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--glass-border);
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .auth-error {
            color: #ff6666;
            margin-top: 12px;
            font-size: 14px;
            text-align: center;
            font-weight: bold;
        }
        .auth-switch {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        .main-container {
            flex-direction: row;
            position: relative;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 10;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            position: relative;
            z-index: 5;
            width: 100%;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: #6b7280;
            font-size: 24px;
            cursor: pointer;
            margin-right: 10px;
            display: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
        }
        .back-btn.visible {
            display: block;
        }
        .back-btn:hover {
            background: var(--hover-bg);
        }
        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 300px;
            }
            .back-btn {
                display: none !important;
            }
            .bottom-nav {
                display: flex !important;
            }
            .bottom-nav .nav-chats {
                display: none;
            }
        }
        .user-profile {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--glass-border);
            background: var(--glass-bg);
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--text);
            font-weight: 500;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }
        .username-display {
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 2px;
            flex-wrap: wrap;
        }
        .search-add {
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            gap: 8px;
            background: var(--glass-bg);
        }
        .search-add input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 15px;
            color: var(--text);
            outline: none;
        }
        .search-add input::placeholder {
            color: var(--text-secondary);
        }
        .icon-btn {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--glass-border);
            color: #6b7280;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: rgba(212, 175, 55, 0.3);
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item {
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: var(--text);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            transition: all 0.2s;
        }
        .chat-item.active {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--accent);
        }
        .chat-avatar {
            width: 40px;
            height: 40px;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--glass-border);
            color: var(--text);
        }
        .chat-avatar-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .delete-chat-icon {
            margin-left: auto;
            color: #6b7280;
            font-size: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
        }
        .delete-chat-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
        .delete-chat-icon:hover {
            opacity: 0.8;
        }
        .chat-header {
            padding: 12px 16px;
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text);
        }
        .chat-header-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }
        .chat-header-info strong {
            color: var(--text);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .chat-user-status {
            font-size: 11px;
            color: #4CAF50;
            font-weight: normal;
            margin-top: 2px;
        }
        .chat-user-status.offline {
            color: #888;
        }
        .chat-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .tiny-btn {
            background: rgba(255, 255, 255, 0.1);

            function renderVoiceMessagePlayer(voiceData, duration, msgId) { const playerId = 'voice_player_' + msgId; const secs = duration || 1; const bars = 15; let barHtml = ''; for (let i = 0; i < bars; i++) { const h = 4 + Math.sin((i / bars) * Math.PI) * 16 + Math.random() * 8;
                    barHtml += `<div class="bar" style="height:${h}px;"></div>`; } return `
                <div class="voice-message-player" id="${playerId}">
                    <button class="voice-play-btn" data-player="${playerId}" data-audio="${voiceData.replace(/"/g,'&quot;')}" onclick="window.toggleVoicePlayback(this)" title="Play">
                        <img src="${ICONS.PLAY}" class="play-pause-icon" data-player="${playerId}">
                    </button>
                    <div class="voice-waveform">${barHtml}</div>
                    <span class="voice-duration">${secs}s</span>
                </div>`; }

            window.toggleVoicePlayback = function(btn) { const playerId = btn.dataset.player; const audioData = btn.dataset.audio; const icon = btn.querySelector('.play-pause-icon'); const playerEl = document.getElementById(playerId); if (App.voicePlaybackId === playerId && App.currentVoiceAudio && !App.currentVoiceAudio.paused) { App.currentVoiceAudio.pause();
                    icon.src = ICONS.PLAY;
                    App.voicePlaybackId = null;
                    App.currentVoiceAudio = null; return; } if (App.currentVoiceAudio) { App.currentVoiceAudio.pause(); const prevIcon = document.querySelector(`.play-pause-icon[data-player="${App.voicePlaybackId}"]`); if (prevIcon) prevIcon.src = ICONS.PLAY; } const audio = new Audio(audioData);
                App.currentVoiceAudio = audio;
                App.voicePlaybackId = playerId;
                icon.src = ICONS.PAUSE;
                audio.onended = () => { icon.src = ICONS.PLAY;
                    App.voicePlaybackId = null;
                    App.currentVoiceAudio = null; };
                audio.onerror = () => { icon.src = ICONS.PLAY;
                    App.voicePlaybackId = null;
                    App.currentVoiceAudio = null;
                    showNotification('Playback error', 'error'); };
                audio.play().catch(() => { icon.src = ICONS.PLAY;
                    App.voicePlaybackId = null;
                    App.currentVoiceAudio = null; }); };

            window.stopAllVoicePlayback = function() { if (App.currentVoiceAudio) { App.currentVoiceAudio.pause();
                    App.currentVoiceAudio = null; } if (App.voicePlaybackId) { const icon = document.querySelector(`.play-pause-icon[data-player="${App.voicePlaybackId}"]`); if (icon) icon.src = ICONS.PLAY;
                    App.voicePlaybackId = null; } };

            // ==================== РЕНДЕР ОСНОВНОЙ ====================
            function render() { const root = document.getElementById('app'); if (!App.dataLoaded) { root.innerHTML = `<div class="loading-screen" id="loadingScreen"><div class="loading-text">YOLKAPP<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div></div></div>`; return; } const ls = document.getElementById('loadingScreen'); if (ls) { ls.classList.add('hide'); const remaining = Math.max(0, MIN_LOADING_TIME - (Date.now() - loadingStartTime));
                    setTimeout(() => { if (!App.currentUser) { root.innerHTML = renderAuth();
                            attachAuthEvents(); } else { root.innerHTML = renderMain();
                            setTimeout(() => { attachMainEvents(); if (App.activeTab === 'chats' && App.activeChat) renderMessages(App.activeChat); else if (App.activeTab === 'feed') initFeed();
                                updateChatList();
                                updateSidebarUser();
                                applyWallpaper();
                                applyWallpaperToFeed(); }, 100); } }, remaining); } else { if (!App.currentUser) { root.innerHTML = renderAuth();
                        attachAuthEvents(); } else { root.innerHTML = renderMain();
                        setTimeout(() => { attachMainEvents(); if (App.activeTab === 'chats' && App.activeChat) renderMessages(App.activeChat); else if (App.activeTab === 'feed') initFeed();
                            updateChatList();
                            updateSidebarUser();
                            applyWallpaper();
                            applyWallpaperToFeed(); }, 100); } } }

            function renderAuth() { return `<div class="auth-container"><div class="auth-box"><h2>Yolkapp</h2><div class="auth-subtitle">Sign in to continue</div><div id="authForms"><div id="loginForm"><div class="input-group"><label>Username</label><input id="loginUsername" placeholder="lowercase, 3-9 chars"></div><div class="input-group"><label>Email</label><input id="loginEmail" type="email" placeholder="example@mail.com"></div><div class="input-group"><label>Password</label><input id="loginPassword" type="password" placeholder="Latin letters/digits"></div><button class="btn" id="loginBtn">Login</button></div><div class="auth-switch" id="showRegisterLink" style="color:var(--accent); cursor:pointer;">Don't have an account? Sign up</div><div id="registerForm" style="display:none;"><div class="input-group"><label>Username</label><input id="regUsername" placeholder="lowercase, 3-9 chars"></div><div class="input-group"><label>Email</label><input id="regEmail" type="email" placeholder="example@mail.com"></div><div class="input-group"><label>Password</label><input id="regPassword" type="password" placeholder="Latin letters/digits"></div><button class="btn" id="registerBtn">Sign up</button><div class="auth-switch"><button class="btn btn-secondary" id="showLoginBtn">← Back</button></div></div><div id="authError" class="auth-error"></div></div></div></div>`; }

            function attachAuthEvents() { const errorDiv = document.getElementById('authError');
                document.getElementById('showRegisterLink')?.addEventListener('click', () => { document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('registerForm').style.display = 'block'; });
                document.getElementById('showLoginBtn')?.addEventListener('click', () => { document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'block'; });
                document.getElementById('loginBtn')?.addEventListener('click', () => { let username = document.getElementById('loginUsername').value.trim().toLowerCase(); const email = document.getElementById('loginEmail').value.trim(),
                        pass = document.getElementById('loginPassword').value.trim(); if (!isValidUsername(username)) { errorDiv.innerText = 'Invalid username (3-9 lowercase letters/digits)'; return; } if (!email || !/^\S+@\S+\.\S+$/.test(email)) { errorDiv.innerText = 'Valid email required'; return; } const clean = '@' + username; let main = findMainUsername(clean) || (App.users[clean] ? clean : null); if (!main || !App.users[main] || App.users[main].password !== pass || (App.users[main].email && App.users[main].email.toLowerCase() !== email.toLowerCase())) { errorDiv.innerText = 'Invalid credentials'; return; }
                    App.currentUser = main;
                    App.activeTab = 'feed';
                    App.activeChat = null;
                    setCookie('yolk_current_user', main, 365);
                    setCookie('yolk_active_tab', 'feed', 365);
                    eraseCookie('yolk_active_chat');
                    loadPrivacySettings(); if (App.lastSeenInterval) clearInterval(App.lastSeenInterval);
                    App.lastSeenInterval = setInterval(() => updateLastSeen(main), 30000);
                    updateLastSeen(main);
                    render(); });
                document.getElementById('registerBtn')?.addEventListener('click', () => { let username = document.getElementById('regUsername').value.trim().toLowerCase(); const email = document.getElementById('regEmail').value.trim(),
                        pass = document.getElementById('regPassword').value.trim(); if (!isValidUsername(username)) { errorDiv.innerText = 'Invalid username (3-9 lowercase letters/digits)'; return; } if (!email || !/^\S+@\S+\.\S+$/.test(email)) { errorDiv.innerText = 'Valid email required'; return; } if (!pass) { errorDiv.innerText = 'Enter password'; return; } if (!isValidPassword(pass)) { errorDiv.innerText = 'Password Latin letters/digits only'; return; } const clean = '@' + username; if (App.users[clean] || findMainUsername(clean)) { errorDiv.innerText = 'Username taken'; return; } if (isEmailTaken(email)) { errorDiv.innerText = 'Email already used'; return; } const newUser = { password: pass, avatar: null, banner: null, badge: null, lastSeen: Date.now(), chatWallpaper: '', followers: [], following: [], additionalUsernames: [], displayName: username, email: email };
                    App.users[clean] = newUser;
                    App.currentUser = clean;
                    App.activeTab = 'feed';
                    App.activeChat = null;
                    setCookie('yolk_current_user', clean, 365);
                    setCookie('yolk_active_tab', 'feed', 365);
                    eraseCookie('yolk_active_chat');
                    saveToSupabase().then(() => { render();
                        showNotification('Account created!'); }).catch(() => { errorDiv.innerText = 'Server error'; }); }); }

            function renderMain() { const isChatsActive = App.activeTab === 'chats'; const chatTitle = formatUserNameWithBadge(App.activeChat); const chatIsBot = App.activeChat ? isBot(App.activeChat) : false; return `
                <div class="main-container">
                    ${isChatsActive ? `
                    <div class="sidebar ${App.sidebarOpen?'open':''}">
                        <div class="search-add"><input type="text" placeholder="@username" id="searchUserInput"><button class="icon-btn" id="addUserBtn">+</button></div>
                        <div class="chats-list" id="chatsList"></div>
                    </div>
                    <div class="chat-area">
                        <div class="chat-header"><div class="chat-header-info"><button class="back-btn ${window.innerWidth<768?'visible':''}" id="backBtn">←</button><strong>${chatTitle}</strong></div><div class="chat-actions">${!chatIsBot ? `<button class="tiny-btn" id="viewProfileBtn">Profile</button><img src="${ICONS.NICKNAME_BTN}" class="nickname-btn-icon" id="setNicknameBtn" title="Set local nickname">` : '<span style="font-size:11px;color:var(--text-secondary);">🤖 Bot</span>'}</div></div>
                        <div class="messages-container" id="messageList"></div>
                        <div class="input-area">
                            <label for="mediaUploadSingle" style="cursor:pointer;"><img src="${ICONS.MEDIA_BTN}" class="media-btn-icon"></label>
                            <input type="file" id="mediaUploadSingle" accept="image/*,video/*" style="display:none;">
                            <input type="text" id="messageText" placeholder="Message..." autofocus>
                            <button class="voice-btn" id="voiceMsgBtn" title="Hold to record voice"><img src="${ICONS.VOICE_BTN}" alt="Voice"></button>
                            <button class="send-btn" id="sendMsgBtn">➤</button>
                        </div>
                    </div>
                    ` : `
                    <div class="feed-container">
                        <div class="feed-filters">
                            <button class="feed-filter-btn active" id="filterAllBtn">All posts</button>
                            <button class="feed-filter-btn" id="filterLikedBtn">Liked</button>
                            <button class="feed-filter-btn" id="filterMyBtn">My</button>
                        </div>
                        <div id="feedPostsContainer"></div>
                    </div>
                    <button class="create-post-btn" id="createPostBtn">+</button>
                    `}
                </div>
                <div class="bottom-nav">
                    <div class="nav-item ${App.activeTab==='feed'?'active':''}" data-tab="feed"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v1.png"></div>
                    <div class="nav-item nav-chats ${App.activeTab==='chats'?'active':''}" data-tab="chats"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v2.png"></div>
                    <div class="nav-item" id="settingsTab"><img src="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/v4.png"></div>
                </div>`; }

            function attachMainEvents() {
                document.getElementById('backBtn')?.addEventListener('click', () => { App.sidebarOpen = true;
                    document.querySelector('.sidebar').classList.add('open'); });
                document.getElementById('viewProfileBtn')?.addEventListener('click', () => { if (App.activeChat && !isBot(App.activeChat)) openProfileModal(App.activeChat); });
                document.getElementById('sendMsgBtn')?.addEventListener('click', sendMessage);
                document.getElementById('mediaUploadSingle')?.addEventListener('change', handleMediaSelect);
                document.getElementById('addUserBtn')?.addEventListener('click', addUserBySearch);
                document.getElementById('messageText')?.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault();
                        sendMessage(); } });
                document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', (e) => { const tab = item.dataset.tab; if (tab === 'chats') { App.activeTab = 'chats';
                        setCookie('yolk_active_tab', 'chats', 365); if (window.innerWidth < 768) App.sidebarOpen = false;
                        render(); } else if (tab === 'feed') { App.activeTab = 'feed';
                        setCookie('yolk_active_tab', 'feed', 365);
                        render();
                        setTimeout(() => initFeed(), 50); } }));
                document.getElementById('settingsTab')?.addEventListener('click', openProfileSettings);
                document.getElementById('createPostBtn')?.addEventListener('click', openCreatePostModal);
                document.getElementById('filterAllBtn')?.addEventListener('click', () => { App.feedFilter = 'all';
                    initFeed(); });
                document.getElementById('filterLikedBtn')?.addEventListener('click', () => { App.feedFilter = 'liked';
                    initFeed(); });
                document.getElementById('filterMyBtn')?.addEventListener('click', () => { App.feedFilter = 'my';
                    initFeed(); }); const setNickBtn = document.getElementById('setNicknameBtn'); if (setNickBtn) { setNickBtn.addEventListener('click', () => { if (!App.activeChat || isBot(App.activeChat)) { showNotification('Cannot set nickname for bots', 'error'); return; } const currentNick = (App.localNicknames[App.activeChat]?.[App.currentUser]) || ''; const modalHtml = `
                    <div class="modal-overlay" id="nicknameModal">
                        <div class="profile-modal" style="max-width:340px;">
                            <h3>Local nickname</h3>
                            <div style="color:var(--text-secondary); margin-bottom:12px;">Set a custom name for <b>${getDisplayName(App.activeChat)}</b> (visible only to you)</div>
                            <div class="profile-input-group"><label>Nickname</label><input type="text" id="newNicknameInput" value="${currentNick}" placeholder="Enter name" maxlength="20"></div>
                            <div class="profile-actions">
                                <button class="profile-btn" id="saveNicknameBtn">Save</button>
                                <button class="profile-btn secondary" id="closeNicknameModal">Cancel</button>
                                ${currentNick ? '<button class="profile-btn warning" id="removeNicknameBtn">Remove</button>' : ''}
                            </div>
                        </div>
                    </div>`;
                        document.body.insertAdjacentHTML('beforeend', modalHtml);
                        document.getElementById('saveNicknameBtn').addEventListener('click', () => { const val = document.getElementById('newNicknameInput').value.trim(); if (!App.localNicknames[App.activeChat]) App.localNicknames[App.activeChat] = {}; if (val) App.localNicknames[App.activeChat][App.currentUser] = val; else delete App.localNicknames[App.activeChat][App.currentUser];
                            saveToSupabase();
                            document.getElementById('nicknameModal').remove();
                            render();
                            showNotification('Nickname saved'); });
                        document.getElementById('closeNicknameModal').addEventListener('click', () => document.getElementById('nicknameModal').remove()); const remBtn = document.getElementById('removeNicknameBtn'); if (remBtn) remBtn.addEventListener('click', () => { if (App.localNicknames[App.activeChat]) delete App.localNicknames[App.activeChat][App.currentUser];
                            saveToSupabase();
                            document.getElementById('nicknameModal').remove();
                            render();
                            showNotification('Nickname removed'); }); }); } const voiceBtn = document.getElementById('voiceMsgBtn'); if (voiceBtn) { voiceBtn.addEventListener('mousedown', (e) => { e.preventDefault();
                        startVoiceRecording(); });
                    voiceBtn.addEventListener('mouseup', (e) => { e.preventDefault();
                        stopVoiceRecording(); });
                    voiceBtn.addEventListener('mouseleave', () => { if (App.isRecording) stopVoiceRecording(); });
                    voiceBtn.addEventListener('touchstart', (e) => { e.preventDefault();
                        startVoiceRecording(); }, { passive: false });
                    voiceBtn.addEventListener('touchend', (e) => { e.preventDefault();
                        stopVoiceRecording(); });
                    voiceBtn.addEventListener('touchcancel', () => { if (App.isRecording) stopVoiceRecording(); });
                    voiceBtn.addEventListener('touchmove', (e) => { const touch = e.touches[0]; if (touch) { const rect = voiceBtn.getBoundingClientRect(); if (touch.clientX < rect.left - 30 || touch.clientX > rect.right + 30 || touch.clientY < rect.top - 30 || touch.clientY > rect.bottom + 30) { if (App.isRecording) stopVoiceRecording(); } } }); } }

            function sendMessage() { const text = document.getElementById('messageText')?.value.trim() || ''; if (!text && !App.tempPhoto && !App.tempVideo) { showNotification('Empty message', 'error'); return; } const to = App.activeChat; if (!to) return; if (to === CLICK_BOT_USERNAME) { handleBotCommand(text);
                    document.getElementById('messageText').value = '';
                    App.tempPhoto = null;
                    App.tempVideo = null;
                    document.getElementById('mediaUploadSingle').value = ''; return; } if (!canUserMessage(App.currentUser, to)) { showNotification('Cannot message', 'error'); return; } let media = null,
                    isVid = false; if (App.tempVideo) { media = App.tempVideo;
                    isVid = true; } else if (App.tempPhoto) { media = App.tempPhoto; } const msg = { from: App.currentUser, text, time: Date.now(), photo: media, isVideo: isVid, isVoice: false, voiceData: null, likes: {}, dislikes: {} }; const chatId = [App.currentUser, to].sort().join('_'); if (!App.chats[chatId]) App.chats[chatId] = { user1: App.currentUser, user2: to, messages: [] };
                App.chats[chatId].messages.push(msg);
                saveToSupabase();
                renderMessages(to);
                playHappySound();
                document.getElementById('messageText').value = '';
                App.tempPhoto = null;
                App.tempVideo = null;
                document.getElementById('mediaUploadSingle').value = '';
                updateChatList(); }

            function renderMessages(partner) { const container = document.getElementById('messageList'); if (!container) return; const chatId = [App.currentUser, partner].sort().join('_'); const msgs = App.chats[chatId]?.messages || []; if (partner === CLICK_BOT_USERNAME && msgs.length === 0) { handleBotCommand('!start'); }
                window.stopAllVoicePlayback();
                container.innerHTML = msgs.length ? msgs.map((m, i) => renderMessage(m, i, App.currentUser, partner)).join('') : '<div style="text-align:center; color:var(--text-secondary); margin-top:20px;">No messages</div>';
                setTimeout(() => container.scrollTop = container.scrollHeight, 100);
                updateChatHeaderStatus(partner); }

            function renderMessage(msg, idx, curr, partner) { const isMe = msg.from === curr; const fromDisplay = msg.from === 'SYSTEM' ? 'SYSTEM' : formatUserNameWithBadge(msg.from); const isBotMsg = isBot(msg.from); const voiceHtml = msg.isVoice && msg.voiceData ? renderVoiceMessagePlayer(msg.voiceData, msg.voiceDuration || 1, msg.from + '_' + idx) : ''; const mediaHtml = !msg.isVoice && msg.photo ? (msg.isVideo ? `<video controls class="media-preview" src="${msg.photo}"></video>` : `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`) : ''; const textHtml = msg.text ? msg.text.replace(/\n/g, '<br>') : ''; const canClickUsername = !isBotMsg;
                return `<div class="message ${isMe?'me':''} ${msg.from==='SYSTEM'?'system-message':''}">
                    ${!isMe && msg.from!=='SYSTEM' ? `<small><span class="message-username" ${canClickUsername?`onclick="openProfileModal('${msg.from}')"`:''} style="${canClickUsername?'':'cursor:default;text-decoration:none;'}">${fromDisplay}</span></small><br>` : ''}
                    ${msg.from==='SYSTEM' ? '<small>🔔 SYSTEM</small><br>' : ''}
                    <div class="message-text">${textHtml}</div>${mediaHtml}${voiceHtml}
                    <div class="time">${new Date(msg.time).toLocaleString()}</div>
                    ${isMe && msg.from !== CLICK_BOT_USERNAME ? `<div class="msg-actions"><button onclick="window.deleteMessage('${partner}',${idx})">Delete</button></div>` : ''}
                </div>`; }

            function updateChatList() { const container = document.getElementById('chatsList'); if (!container) return; const list = getChatListForUser(App.currentUser);
                container.innerHTML = list.map(u => renderChatItem(u, u === App.activeChat)).join('');
                document.querySelectorAll('.chat-item').forEach(el => { el.addEventListener('click', (e) => { if (e.target.closest('.delete-chat-icon')) return; const chatId = el.dataset.chat; if (App.activeChat === chatId) { if (window.innerWidth < 768) { App.sidebarOpen = false;
                            document.querySelector('.sidebar').classList.remove('open'); } return; }
                        App.activeChat = chatId;
                        setCookie('yolk_active_chat', chatId, 365); if (window.innerWidth < 768) { App.sidebarOpen = false;
                            document.querySelector('.sidebar').classList.remove('open'); }
                        window.stopAllVoicePlayback();
                        render(); }); }); }

            function renderChatItem(u, active) { const av = App.users[u]?.avatar; return `<div class="chat-item ${active?'active':''}" data-chat="${u}">
                    <div class="chat-avatar">${av ? `<img src="${av}" class="chat-avatar-img">` : `<img src="${DEFAULT_AVATAR}" class="chat-avatar-img">`}</div>
                    <div style="flex:1;"><div class="username-display">${formatUserNameWithBadge(u)}</div></div>
                    <span class="delete-chat-icon" onclick="window.deleteChat('${u}', event)"><img src="${ICONS.DELETE}" style="width:20px;"></span>
                </div>`; }

            function getChatListForUser(user) { const set = new Set();
                Object.keys(App.chats || {}).forEach(k => { const c = App.chats[k]; if (c) { if (c.user1 === user) set.add(c.user2); if (c.user2 === user) set.add(c.user1); } }); return Array.from(set); }

            function handleMediaSelect(e) { const file = e.target.files[0]; if (!file) return; if (file.type.startsWith('image/')) { const reader = new FileReader();
                    reader.onload = ev => compressImage(ev.target.result, 800, 800, 0.6, c => { App.tempPhoto = c;
                        App.tempVideo = null;
                        showNotification('Photo added'); });
                    reader.readAsDataURL(file); } else if (file.type.startsWith('video/')) { if (file.size > 20 * 1024 * 1024) { showNotification('Max 20MB', 'error'); return; } const reader = new FileReader();
                    reader.onload = ev => { App.tempVideo = ev.target.result;
                        App.tempPhoto = null;
                        showNotification('Video added'); };
                    reader.readAsDataURL(file); } }

            function addUserBySearch() { let q = document.getElementById('searchUserInput').value.trim().toLowerCase(); if (!q) return showNotification('Enter username', 'error'); if (!q.startsWith('@')) q = '@' + q; const main = findMainUsername(q) || (App.users[q] ? q : null); if (!main) return showNotification('User not found', 'error'); if (main === App.currentUser) return showNotification('That is you', 'error'); if (!canUserMessage(App.currentUser, main)) return showNotification('Stranger messages blocked', 'error');
                ensureChat(App.currentUser, main);
                App.activeChat = main;
                setCookie('yolk_active_chat', main, 365); if (window.innerWidth < 768) App.sidebarOpen = false;
                document.getElementById('searchUserInput').value = '';
                render();
                showNotification(`Chat with ${getDisplayName(main)} created`); }
            window.deleteChat = function(chat, event) { event.stopPropagation(); if (!confirm(`Delete chat with ${getDisplayName(chat)}?`)) return; const chatId = [App.currentUser, chat].sort().join('_'); if (App.chats[chatId]) delete App.chats[chatId]; if (App.activeChat === chat) { App.activeChat = null;
                    eraseCookie('yolk_active_chat'); }
                window.stopAllVoicePlayback();
                saveToSupabase();
                render();
                showNotification('Chat deleted'); };
            window.deleteMessage = function(partner, idx) { const chatId = [App.currentUser, partner].sort().join('_'); const msgs = App.chats[chatId]?.messages; if (msgs?.[idx]) { msgs.splice(idx, 1);
                    saveToSupabase();
                    window.stopAllVoicePlayback();
                    renderMessages(partner);
                    showNotification('Deleted'); } };
            window.openImageModal = function(src) { const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.onclick = () => modal.remove();
                modal.innerHTML = `<div style="max-width:90%; max-height:90%;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div>`;
                document.body.appendChild(modal); };

            function updateChatHeaderStatus(username) { const headerInfo = document.querySelector('.chat-header-info'); if (!headerInfo) return; const existing = headerInfo.querySelector('.chat-user-status'); if (existing) existing.remove(); const strong = headerInfo.querySelector('strong'); if (strong) strong.innerHTML = formatUserNameWithBadge(username); if (isBot(username)) { const div = document.createElement('div');
                    div.className = 'chat-user-status';
                    div.textContent = 'online';
                    headerInfo.appendChild(div); return; } const online = isUserOnline(username); const div = document.createElement('div');
                div.className = 'chat-user-status' + (online ? '' : ' offline');
                div.textContent = online ? 'online' : `last seen ${formatLastSeen(App.users[username]?.lastSeen)}`;
                headerInfo.appendChild(div); }

            window.addEventListener('load', () => { loadingStartTime = Date.now();
                loadFromSupabase();
                subscribeToAppState();
                loadTheme(); });
        })();
    </script>
</body>
</html>
