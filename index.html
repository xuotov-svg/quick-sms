<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yolkapp · messenger</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-tertiary: #1a1a1a;
            --bg-chat: #0c0c0c;
            --bg-message-me: #2a2a2a;
            --bg-message-other: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent: #d4af37;
            --accent-hover: #e6c556;
            --danger: #ff4444;
            --success: #4caf50;
            --border: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, Helvetica, Arial, sans-serif;
        }

        #app {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            background: var(--bg-primary);
            overflow: hidden;
            position: relative;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideInRight {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* STATUS STYLES */
        .gold-name { background: linear-gradient(135deg, #ffd700, #ffb347); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; }
        .ruby-name { background: linear-gradient(135deg, #ff4444, #ff6666); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; }
        .emerald-name { background: linear-gradient(135deg, #44ff44, #66ff66); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; }
        .amethyst-name { background: linear-gradient(135deg, #aa66ff, #cc88ff); background-clip: text; -webkit-background-clip: text; color: transparent; font-weight: bold; }

        /* MAIN CONTAINER */
        .main-container {
            display: flex;
            height: 100%;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            transform: translateX(-100%);
        }
        .sidebar.open {
            transform: translateX(0);
        }
        @media (min-width: 768px) {
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 300px;
            }
            .back-btn {
                display: none !important;
            }
        }

        /* USER PROFILE */
        .user-profile {
            padding: 20px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            background: var(--bg-tertiary);
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            overflow: hidden;
            flex-shrink: 0;
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-info {
            flex: 1;
        }
        .username-display {
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            color: var(--text-primary);
        }
        .verified-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23389df2" d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/><path fill="white" d="M9.5 12.5L11.5 14.5L15.5 9.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>');
            background-size: contain;
        }
        .age-badge {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .star-balance {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
            margin-top: 4px;
        }
        .yc-currency {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border-radius: 50%;
            position: relative;
        }
        .yc-currency::after {
            content: "YC";
            font-size: 7px;
            font-weight: bold;
            color: #000;
        }

        /* SEARCH */
        .search-add {
            padding: 12px;
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }
        .search-add input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }
        .search-add input:focus {
            border-color: var(--accent);
        }
        .icon-btn {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CHATS LIST */
        .chats-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .chat-item {
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.1s;
        }
        .chat-item:hover {
            background: var(--bg-tertiary);
        }
        .chat-item.active {
            background: rgba(212, 175, 55, 0.15);
            border-left: 3px solid var(--accent);
        }
        .chat-avatar {
            width: 44px;
            height: 44px;
            background: var(--bg-tertiary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .chat-avatar-img, .channel-avatar-small {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-info {
            flex: 1;
        }
        .chat-name {
            font-weight: 500;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            color: var(--text-primary);
        }
        .chat-subscribers {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .streak-badge {
            font-size: 10px;
            background: rgba(255, 107, 0, 0.2);
            padding: 2px 6px;
            border-radius: 20px;
            color: #ff8c00;
        }
        .delete-chat-icon {
            color: var(--danger);
            font-size: 14px;
            opacity: 0.5;
            cursor: pointer;
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            position: relative;
        }
        .chat-header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }
        .back-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: none;
        }
        .back-btn.visible {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-header-info strong {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            color: var(--text-primary);
        }
        .chat-user-status {
            font-size: 11px;
            color: var(--success);
            margin-top: 2px;
        }
        .chat-user-status.offline {
            color: var(--text-secondary);
        }
        .chat-actions {
            display: flex;
            gap: 8px;
        }
        .tiny-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-primary);
        }
        .subscribe-btn {
            background: var(--success);
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }
        .unsubscribe-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        /* MESSAGES */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 18px;
            background: var(--bg-message-other);
            color: var(--text-primary);
            align-self: flex-start;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }
        .message.me {
            align-self: flex-end;
            background: var(--bg-message-me);
        }
        .message.gift-message {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--accent);
        }
        .message.bot-message {
            background: #2a2418;
        }
        .message.system-message {
            background: rgba(100, 100, 100, 0.3);
            font-style: italic;
            text-align: center;
            max-width: 90%;
            align-self: center;
        }
        .message-username {
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--accent);
        }
        .message-text {
            font-size: 14px;
            line-height: 1.4;
            color: var(--text-primary);
        }
        .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
            color: var(--text-secondary);
        }
        .media-preview {
            max-width: 180px;
            max-height: 180px;
            border-radius: 12px;
            margin-top: 6px;
            cursor: pointer;
        }
        .inline-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .inline-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-primary);
        }
        .like-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }
        .like-btn.liked {
            color: var(--danger);
        }
        .msg-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .msg-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 10px;
            cursor: pointer;
        }

        /* INPUT AREA */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            align-items: center;
        }
        .input-area input[type="text"] {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }
        .input-area input[type="text"]:focus {
            border-color: var(--accent);
        }
        .file-label {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-primary);
        }
        .send-btn {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input[type="file"] {
            display: none;
        }

        /* AUTH */
        .auth-container {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 20px;
        }
        .auth-box {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            border: 1px solid var(--border);
        }
        .auth-box h2 {
            font-size: 28px;
            color: var(--accent);
            margin-bottom: 24px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .btn {
            background: var(--accent);
            border: none;
            padding: 12px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            color: #000;
            margin-top: 8px;
        }
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        .auth-switch {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }
        .auth-error {
            color: var(--danger);
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
        }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.2s ease;
        }
        .profile-modal {
            background: var(--bg-secondary);
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
            border: 1px solid var(--border);
        }
        .profile-modal h3 {
            font-size: 20px;
            margin-bottom: 16px;
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .profile-banner-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        .banner-container {
            width: 100%;
            height: 100px;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-tertiary);
        }
        .banner-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-avatar-overlay {
            position: absolute;
            bottom: -35px;
            left: 16px;
        }
        .avatar-large {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--accent), #ffb347);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 3px solid var(--bg-secondary);
            overflow: hidden;
        }
        .profile-name-section {
            margin-top: 45px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile-input-group {
            margin-bottom: 14px;
        }
        .profile-input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 12px;
        }
        .profile-input-group input, .profile-input-group textarea, .profile-input-group div {
            width: 100%;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .star-balance-large {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-tertiary);
            padding: 10px;
            border-radius: 12px;
            color: var(--accent);
        }
        .profile-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .profile-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 24px;
            cursor: pointer;
            font-weight: 500;
            text-align: center;
            color: var(--text-primary);
        }
        .profile-btn.logout {
            background: var(--danger);
            color: white;
            border: none;
        }
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            background: var(--bg-tertiary);
            padding: 4px;
            border-radius: 30px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .tab.active {
            background: var(--accent);
            color: #000;
        }
        .shop-section {
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .shop-section h4 {
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 14px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }
        .shop-item:last-child {
            border-bottom: none;
        }
        .shop-item span {
            color: var(--text-primary);
            font-size: 13px;
        }
        .shop-item button {
            background: var(--accent);
            border: none;
            padding: 5px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
        }
        .gifts-collection, .nft-collection {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .gift-item {
            background: var(--bg-tertiary);
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
        }
        .nft-item {
            width: 50px;
            height: 50px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 3000;
            animation: fadeIn 0.3s ease;
            border: 1px solid var(--accent);
            font-size: 13px;
            white-space: nowrap;
        }
        .notification.error {
            border-color: var(--danger);
        }
        .loading-screen {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Pixel Canvas */
        .pixel-canvas {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 1px;
            background: #333;
            margin-bottom: 16px;
        }
        .pixel {
            aspect-ratio: 1;
            cursor: pointer;
        }
        .color-palette {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 2px solid var(--border);
            cursor: pointer;

            if (chatPartner === 'saved' || chatPartner === 'yolk') return '';

            const now = Date.now();
            const diff = now - lastSeen;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (minutes < 1) return 'только что';
            if (minutes < 5) return `${minutes} мин назад`;
            if (minutes < 15) return '5 мин назад';
            if (minutes < 30) return '15 мин назад';

            if (hours < 24) return `${hours} часов назад`;

            return `${days} дней назад`;

        function showConfetti() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '9999';
            document.body.appendChild(canvas);
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 6 + 3,
                    color: `hsl(${Math.random() * 60 + 40}, 100%, 60%)`,
                    speed: Math.random() * 2 + 1
                });
            }
            let animation;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let allDead = true;
                for (let p of particles) {
                    p.y += p.speed;
                    if (p.y < canvas.height + p.size) allDead = false;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
                if (allDead) {
                    cancelAnimationFrame(animation);
                    canvas.remove();
                } else {
                    animation = requestAnimationFrame(animate);
                }
            }
            animate();
            setTimeout(() => {
                cancelAnimationFrame(animation);
                canvas.remove();
            }, 2000);
        }

        function compressImage(dataUrl, maxWidth, maxHeight, quality, callback) {
            const img = new Image();
            img.onload = () => {
                let width = img.width;
                let height = img.height;
                if (width > maxWidth) {
                    height = (height * maxWidth) / width;
                    width = maxWidth;
                }
                if (height > maxHeight) {
                    width = (width * maxHeight) / height;
                    height = maxHeight;
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                callback(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = dataUrl;
        }

                if (App.tempVideo) { mediaData = App.tempVideo; isVideoMsg = true; }
                else if (App.tempPhoto) mediaData = App.tempPhoto;
                const message = { from, text: text || '', time: Date.now(), photo: mediaData, gift: false, isVideo: isVideoMsg };
                
                if (to === 'saved') {
                    if (!App.savedMessages[from]) App.savedMessages[from] = [];
                    App.savedMessages[from].push(message);
                    saveSavedMessages();
                    renderMessages('saved');
                    playHappySound();
                } else if (App.channels[to]) {
                    if (!App.channels[to].messages) App.channels[to].messages = [];
                    App.channels[to].messages.push(message);
                    saveToFirebase();
                    renderMessages(to);
                    playHappySound();
                } else if (App.systemBots.includes(to)) {
                    let response;
                    if (to === '@game_bot') response = handleGameBot({ text: text }, from);
                    else if (to === '@tap_bot') response = handleTapBot({ text: text }, from);
                    else if (to === '@random_bot') response = handleRandomBot({ text: text }, from);
                    if (response) {
                        const botMessage = { from: to, text: response.text, time: Date.now(), buttons: response.buttons };
                        const chatId = [from, to].sort().join('_');
                        if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] };
                        App.chats[chatId].messages.push(botMessage);
                        saveToFirebase();
                        renderMessages(to);
                        playHappySound();
                    }
                } else {
                    const chatId = [from, to].sort().join('_');
                    if (!App.chats[chatId]) App.chats[chatId] = { user1: from, user2: to, messages: [] };
                    App.chats[chatId].messages.push(message);
                    saveToFirebase();
                    renderMessages(to);
                    playHappySound();
                    updateStreak(to);
                }
                if (textInput) textInput.value = '';
                App.tempPhoto = null;
                App.tempVideo = null;
                document.getElementById('fileUpload').value = '';
                document.getElementById('videoUpload').value = '';
                updateChatList();
            } catch (error) { console.error(error); }
        }
        
        function renderMessages(chatPartner) {
            const messagesContainer = document.getElementById('messageList');
            if (!messagesContainer) return;
            let messages = [];
            if (chatPartner === 'saved') messages = App.savedMessages[App.currentUser] || [];
            else if (chatPartner === 'yolk') messages = App.yolkChatMessages[App.currentUser] || [];
            else if (App.channels[chatPartner]) messages = App.channels[chatPartner].messages || [];
            else {
                const chatId = [App.currentUser, chatPartner].sort().join('_');
                messages = App.chats[chatId]?.messages || [];
            }
            let html = '';
            if (messages.length > 0) {
                messages.forEach((msg, idx) => {
                    html += renderMessage(msg, idx, App.currentUser, chatPartner);
                });
            } else {
                if (chatPartner === '@game_bot') {
                    const botMsg = handleGameBot({ text: '' }, App.currentUser);
                    html = renderMessage({ from: '@game_bot', text: botMsg.text, time: Date.now(), buttons: botMsg.buttons }, 0, App.currentUser, chatPartner);
                } else if (chatPartner === '@tap_bot') {
                    const botMsg = handleTapBot({ text: '' }, App.currentUser);
                    html = renderMessage({ from: '@tap_bot', text: botMsg.text, time: Date.now(), buttons: botMsg.buttons }, 0, App.currentUser, chatPartner);
                } else if (chatPartner === '@random_bot') {
                    const botMsg = handleRandomBot({ text: '' }, App.currentUser);
                    html = renderMessage({ from: '@random_bot', text: botMsg.text, time: Date.now(), buttons: botMsg.buttons }, 0, App.currentUser, chatPartner);
                } else if (chatPartner === 'yolk') {
                    html = '<div style="text-align:center; color:var(--text-secondary); margin-top:40px;">🥚 Коды для входа</div>';
                } else {
                    html = '<div style="text-align:center; color:var(--text-secondary); margin-top:40px;">💬 Нет сообщений</div>';
                }
            }
            messagesContainer.innerHTML = html;
            setTimeout(() => { messagesContainer.scrollTop = messagesContainer.scrollHeight; }, 100);
            if (!App.channels[chatPartner]) updateChatHeaderStatus(chatPartner);
        }
        
        function renderMessage(msg, idx, currentUser, chatPartner) {
            const isMe = msg.from === currentUser || (chatPartner === 'saved' && msg.from === currentUser);
            const isChannel = App.channels[chatPartner] ? true : false;
            const isGift = msg.gift ? true : false;
            const isBotMsg = App.systemBots.includes(msg.from);
            const isSystem = msg.from === 'SYSTEM';
            const fromUserStatusClass = getUserStatus(msg.from)?.class || '';
            let canDelete = false;
            if (isChannel) canDelete = App.channels[chatPartner]?.owner === currentUser;
            else if (chatPartner === 'saved') canDelete = true;
            else if (chatPartner === 'yolk') canDelete = false;
            else if (App.systemBots.includes(chatPartner)) canDelete = false;
            else canDelete = isMe;
            let mediaHtml = '';
            if (msg.photo) {
                if (msg.isVideo) {
                    mediaHtml = `<video controls class="media-preview"><source src="${msg.photo}" type="video/mp4"></video>`;
                } else {
                    mediaHtml = `<img src="${msg.photo}" class="media-preview" onclick="window.openImageModal('${msg.photo}')">`;
                }
            }
            const likesCount = msg.likes ? Object.keys(msg.likes).length : 0;
            const userLiked = msg.likes && msg.likes[currentUser];
            let messageText = msg.text || '';
            let buttonsHtml = '';
            if (isBotMsg && msg.buttons && msg.buttons.length > 0) {
                buttonsHtml = `<div class="inline-buttons">${msg.buttons.map(btn => `<button class="inline-btn" onclick="window.sendBotCommand('${chatPartner}', '${btn}')">${btn}</button>`).join('')}</div>`;
            }
            const displayName = fromUserStatusClass ? `<span class="${fromUserStatusClass}">${msg.from}</span>` : msg.from;
            const messageClass = isMe ? 'me' : '';
            return `<div class="message ${messageClass} ${isGift ? 'gift-message' : ''} ${isBotMsg ? 'bot-message' : ''} ${isSystem ? 'system-message' : ''}">
                        ${!isMe && !isSystem ? `<small><span class="message-username" onclick="window.openProfileModal('${msg.from}')">${displayName}${App.users[msg.from]?.verified ? '<span class="verified-icon"></span>' : ''}</span></small><br>` : ''}
                        ${isSystem ? `<small>СИСТЕМА</small><br>` : ''}
                        <div class="message-text">${messageText}</div>
                        ${mediaHtml}
                        ${buttonsHtml}
                        <div class="time">${new Date(msg.time).toLocaleTimeString().slice(0, 5)}</div>
                        <div style="display: flex; justify-content: space-between; margin-top: 4px;">
                            ${isChannel ? `<button class="like-btn ${userLiked ? 'liked' : ''}" onclick="window.toggleLike('${chatPartner}', ${idx}, event)">❤️ <span>${likesCount}</span></button>` : '<div></div>'}
                            ${canDelete ? `<div class="msg-actions"><button onclick="window.deleteMessage('${chatPartner}', ${idx})">Удалить</button></div>` : ''}
                        </div>
                    </div>`;
        }
        
        function updateChatList() {
            const chatsContainer = document.getElementById('chatsList');
            if (!chatsContainer || !App.currentUser) return;
            let chatsList = getChatListForUser(App.currentUser);
            const saved = chatsList.includes('saved') ? ['saved'] : [];
            const yolk = chatsList.includes('yolk') ? ['yolk'] : [];
            const other = chatsList.filter(c => c !== 'saved' && c !== 'yolk');
            const orderedList = [...saved, ...yolk, ...other];
            let html = '';
            orderedList.forEach(chat => { html += renderChatItem(chat, chat === App.activeChat, App.currentUser); });
            chatsContainer.innerHTML = html;
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-chat-icon')) return;
                    const chatId = el.dataset.chat;
                    if (App.activeChat === chatId) {
                        if (window.innerWidth < 768) { App.sidebarOpen = false; document.getElementById('sidebar')?.classList.remove('open'); }
                        return;
                    }
                    App.activeChat = chatId;
                    localStorage.setItem('yolk_active_chat', chatId);
                    if (window.innerWidth < 768) { App.sidebarOpen = false; document.getElementById('sidebar')?.classList.remove('open'); }
                    document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
                    el.classList.add('active');
                    render();
                });
            });
        }
        
        function renderChatItem(u, active, currentUser) {
            let name = u === 'saved' ? '📁 ИЗБРАННОЕ' : (u === 'yolk' ? '🥚 YOLK' : u);
            let avatarHtml = '<div class="chat-avatar">📁</div>';
            if (u === 'yolk') avatarHtml = '<div class="chat-avatar">🥚</div>';
            else if (u !== 'saved') {
                if (App.channels[u]) {
                    avatarHtml = App.channels[u]?.avatar ? `<div class="chat-avatar"><img src="${App.channels[u].avatar}" class="channel-avatar-small"></div>` : '<div class="chat-avatar">📢</div>';
                } else if (App.systemBots.includes(u)) {
                    if (u === '@game_bot') avatarHtml = '<div class="chat-avatar">🎰</div>';
                    else if (u === '@tap_bot') avatarHtml = '<div class="chat-avatar">👆</div>';
                    else if (u === '@random_bot') avatarHtml = '<div class="chat-avatar">🎲</div>';
                    else avatarHtml = '<div class="chat-avatar">🤖</div>';
                } else {
                    const avatarUrl = App.users[u]?.avatar;
                    avatarHtml = avatarUrl ? `<div class="chat-avatar"><img src="${avatarUrl}" class="chat-avatar-img"></div>` : `<div class="chat-avatar">${u[1] || '@'}</div>`;
                }
            }
            const userData = App.users[u] || {};
            const displayName = formatUserNameWithStatus(name);
            const streak = getStreak(u);
            const streakHtml = streak > 0 && !App.channels[u] ? `<span class="streak-badge">🔥${streak}</span>` : '';
            let subscribersHtml = '';
            if (App.channels[u]) {
                subscribersHtml = `<div class="chat-subscribers">👥 ${App.channels[u]?.subscribers?.length || 0} подписчиков</div>`;
            } else if (userData.age) {
                subscribersHtml = `<div class="chat-subscribers">${userData.age} лет</div>`;
            }
            return `<div class="chat-item ${active ? 'active' : ''}" data-chat="${u}">
                        ${avatarHtml}
                        <div class="chat-info">
                            <div class="chat-name">${displayName}${!App.channels[u] && userData.verified ? '<span class="verified-icon"></span>' : ''}${streakHtml}</div>
                            ${subscribersHtml}
                        </div>
                        ${u !== 'saved' && u !== 'yolk' ? `<span class="delete-chat-icon" onclick="window.deleteChat('${u}', event)">🗑️</span>` : ''}
                    </div>`;
        }
        
        function getChatListForUser(user) {
            let set = new Set(['saved', 'yolk']);
            Object.keys(App.chats || {}).forEach(key => {
                const c = App.chats[key];
                if (c) {
                    if (c.user1 === user && c.user2 !== 'saved') set.add(c.user2);
                    if (c.user2 === user && c.user1 !== 'saved') set.add(c.user1);
                }
            });
            Object.keys(App.channels || {}).forEach(channel => {
                if (App.channels[channel].subscribers?.includes(user)) set.add(channel);
            });
            return Array.from(set);
        }
        
        function updateChatHeaderStatus(username) {
            if (App.channels[username]) return;
            const statusDiv = document.getElementById('chatUserStatus');
            if (!statusDiv) return;
            if (username === 'saved' || username === 'yolk') { statusDiv.textContent = ''; return; }
            const isOnline = isUserOnline(username);
            const lastSeenText = formatLastSeen(App.users[username]?.lastSeen, username);
            statusDiv.textContent = isOnline ? 'в сети' : `был(а) ${lastSeenText}`;
            statusDiv.className = 'chat-user-status' + (isOnline ? '' : ' offline');
        }
        
        function loadMessages(chatPartner) {
            if (chatPartner === 'saved' || chatPartner === 'yolk') { renderMessages(chatPartner); return; }
            if (App.systemBots.includes(chatPartner)) { renderMessages(chatPartner); return; }
            if (App.channels[chatPartner]) { renderMessages(chatPartner); return; }
            const chatId = [App.currentUser, chatPartner].sort().join('_');
            setupRealtimeListener(chatId, chatPartner);
            renderMessages(chatPartner);
            setupUserListener(chatPartner);
            updateChatHeaderStatus(chatPartner);
        }
        
        function setupRealtimeListener(chatId, chatPartner) {
            database.ref('chats/' + chatId).on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    if (!App.chats[chatId]) App.chats[chatId] = data;
                    else App.chats[chatId].messages = data.messages || [];
                    if (App.activeChat === chatPartner) renderMessages(chatPartner);
                }
            });
        }
        
        function setupUserListener(username) {
            if (App.userListeners[username]) return;
            database.ref('users/' + username).on('value', (snapshot) => {
                const userData = snapshot.val();
                if (userData) {
                    App.users[username] = { ...App.users[username], ...userData };
                    if (username === App.currentUser) { updateUserInterface(); updateSidebarUser(); applyWallpaper(); }
                    if (App.activeChat === username) updateChatHeaderStatus(username);
                }
            });
            App.userListeners[username] = true;
        }
        
        function updateLastSeen(username) {
            if (username === App.currentUser) {
                database.ref('users/' + username + '/lastSeen').set(Date.now());
            }
        }
        
        function loadSavedMessages() {
            if (!App.currentUser) return;
            const saved = localStorage.getItem('yolk_saved_' + App.currentUser);
            if (saved) { try { App.savedMessages[App.currentUser] = JSON.parse(saved); } catch(e) { App.savedMessages[App.currentUser] = []; } }
            else { App.savedMessages[App.currentUser] = []; }
        }
        
        function saveSavedMessages() {
            if (App.currentUser) localStorage.setItem('yolk_saved_' + App.currentUser, JSON.stringify(App.savedMessages[App.currentUser] || []));
        }
        
        function loadTapBalances() {
            const balances = localStorage.getItem('yolk_tap_balances');

            const upgrades = localStorage.getItem('yolk_tap_upgrades');
            if (upgrades) { try { App.tapUpgrades = JSON.parse(upgrades); } catch(e) { App.tapUpgrades = {}; } }
            else { App.tapUpgrades = {}; }

        function loadYolkChatMessages() {
            const saved = localStorage.getItem('yolk_chat_messages');
            if (saved) { try { App.yolkChatMessages = JSON.parse(saved); } catch(e) { App.yolkChatMessages = {}; } }
            else { App.yolkChatMessages = {}; }
        }
        
        function saveYolkChatMessages() {
            localStorage.setItem('yolk_chat_messages', JSON.stringify(App.yolkChatMessages));
        }
        
        function loadPrivacySettings() {
            const saved = localStorage.getItem('yolk_privacy');
            if (saved) { try { App.privacySettings = JSON.parse(saved); } catch(e) { App.privacySettings = {}; } }
            else { App.privacySettings = {}; }

        // ========== БОТЫ ==========
        function handleGameBot(message, fromUser) {
            const isSpin = message.text && message.text.includes('КРУТИТЬ');
            if (isSpin) {
                if (App.users[fromUser].stars < 5) return { text: `❌ Нужно 5 YC\nБаланс: ${App.users[fromUser].stars} YC`, buttons: ['КРУТИТЬ (5 YC)'] };
                App.users[fromUser].stars -= 5;
                const results = [];
                for (let i = 0; i < 3; i++) results.push(App.gameSymbols[Math.floor(Math.random() * App.gameSymbols.length)]);
                let win = 0;
                if (results[0] === results[1] && results[1] === results[2]) { win = 10; App.users[fromUser].stars += win; }
                saveToFirebase();
                updateUserInterface();
                const resultText = `[${results[0]}] [${results[1]}] [${results[2]}]`;
                if (win > 0) return { text: `${resultText}\n✨ ВЫИГРЫШ! +${win} YC ✨\nБаланс: ${App.users[fromUser].stars} YC`, buttons: ['КРУТИТЬ (5 YC)'] };
                else return { text: `${resultText}\n😢 ПРОИГРЫШ\nБаланс: ${App.users[fromUser].stars} YC`, buttons: ['КРУТИТЬ (5 YC)'] };
            }
            return { text: `🎰 ИГРОВОЙ АВТОМАТ 🎰\n\n[?][?][?]\n\nПравила: 3 одинаковых = +10 YC\nСтоимость: 5 YC\nБаланс: ${App.users[fromUser].stars} YC`, buttons: ['КРУТИТЬ (5 YC)'] };
        }
        
        function handleTapBot(message, fromUser) {
            if (!App.tapBalances[fromUser]) App.tapBalances[fromUser] = 0;
            if (!App.tapUpgrades[fromUser]) App.tapUpgrades[fromUser] = 0;
            const level = App.tapUpgrades[fromUser] || 0;
            const reward = tapUpgradeLevels[level].reward;
            const nextCost = tapUpgradeLevels[level].nextCost;
            if (message.text && message.text.includes('ТАПНУТЬ')) {
                App.tapBalances[fromUser] += reward;
                saveTapBalances();
                return { text: `👆 +${reward} 💲\n💰 Баланс: ${App.tapBalances[fromUser]} 💲`, buttons: ['ТАПНУТЬ', nextCost ? `ПРОКАЧАТЬ (${nextCost}💲)` : 'МАКСИМУМ'] };
            }
            if (message.text && message.text.includes('ПРОКАЧАТЬ')) {
                if (nextCost && App.tapBalances[fromUser] >= nextCost) {
                    App.tapBalances[fromUser] -= nextCost;
                    App.tapUpgrades[fromUser] = level + 1;
                    saveTapBalances();
                    const newReward = tapUpgradeLevels[level + 1].reward;
                    return { text: `✨ ПРОКАЧКА! +${newReward} 💲/клик\n💰 Баланс: ${App.tapBalances[fromUser]} 💲`, buttons: ['ТАПНУТЬ', tapUpgradeLevels[level + 1].nextCost ? `ПРОКАЧАТЬ (${tapUpgradeLevels[level + 1].nextCost}💲)` : 'МАКСИМУМ'] };
                } else {
                    return { text: `❌ Нужно ${nextCost} 💲\n💰 Баланс: ${App.tapBalances[fromUser]} 💲`, buttons: ['ТАПНУТЬ', nextCost ? `ПРОКАЧАТЬ (${nextCost}💲)` : 'МАКСИМУМ'] };
                }
            }
            return { text: `🤖 TAP БОТ 🤖\n💰 Баланс: ${App.tapBalances[fromUser]} 💲\n📈 За клик: +${reward} 💲`, buttons: ['ТАПНУТЬ', nextCost ? `ПРОКАЧАТЬ (${nextCost}💲)` : 'МАКСИМУМ'] };
        }
        
        function handleRandomBot(message, fromUser) {
            if (message.text && message.text.includes('от 0 до 10')) {
                const random = Math.floor(Math.random() * 11);
                return { text: `🎲 ${random}`, buttons: ['от 0 до 10'] };
            }
            return { text: `🎲 RANDOM БОТ\nСлучайное число от 0 до 10`, buttons: ['от 0 до 10'] };
        }
        
        function saveTapBalances() {
            localStorage.setItem('yolk_tap_balances', JSON.stringify(App.tapBalances));
            localStorage.setItem('yolk_tap_upgrades', JSON.stringify(App.tapUpgrades));
        }
        
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                compressImage(ev.target.result, 800, 800, 0.6, (compressed) => {
                    App.tempPhoto = compressed;
                    sendMessage();
                });
            };
            reader.readAsDataURL(file);
        }
        
        function handleVideoSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 20 * 1024 * 1024) { showNotification('Видео до 20 МБ', 'error'); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
                App.tempVideo = ev.target.result;
                sendMessage();
            };
            reader.readAsDataURL(file);
        }
        
        function addUserBySearch() {
            let query = document.getElementById('searchUserInput').value.trim().toLowerCase();
            if (!query) { showNotification('Введите имя', 'error'); return; }
            if (!query.startsWith('@')) query = '@' + query;
            if (query === 'yolk') { showNotification('Системный чат', 'error'); return; }
            if (App.systemBots.includes(query)) {
                ensureChat(App.currentUser, query);
                App.activeChat = query;
                localStorage.setItem('yolk_active_chat', query);
                if (window.innerWidth < 768) App.sidebarOpen = false;
                document.getElementById('searchUserInput').value = '';
                render();
                return;
            }
            if (App.channels[query]) {
                if (!App.channels[query].subscribers) App.channels[query].subscribers = [];
                if (!App.channels[query].subscribers.includes(App.currentUser)) {
                    App.channels[query].subscribers.push(App.currentUser);
                    saveToFirebase();
                }
                App.activeChat = query;
                localStorage.setItem('yolk_active_chat', query);
                if (window.innerWidth < 768) App.sidebarOpen = false;
                document.getElementById('searchUserInput').value = '';
                render();
                return;
            }
            if (!App.users[query]) { showNotification('Пользователь не найден', 'error'); return; }
            if (query === App.currentUser) { showNotification('Это вы', 'error'); return; }
            if (!canUserMessage(App.currentUser, query)) { showNotification('Пользователь запретил писать', 'error'); return; }
            ensureChat(App.currentUser, query);
            App.activeChat = query;
            localStorage.setItem('yolk_active_chat', query);
            if (window.innerWidth < 768) App.sidebarOpen = false;
            document.getElementById('searchUserInput').value = '';
            render();
            showNotification(`Чат с ${query} создан`);
        }
        
        function toggleSubscribe() {
            const channel = App.activeChat;
            if (!App.channels[channel]) return;
            if (!App.channels[channel].subscribers) App.channels[channel].subscribers = [];
            if (App.channels[channel].subscribers.includes(App.currentUser)) {
                App.channels[channel].subscribers = App.channels[channel].subscribers.filter(s => s !== App.currentUser);
                showNotification('Вы отписались');
            } else {
                App.channels[channel].subscribers.push(App.currentUser);
                showNotification('Вы подписались');
            }
            saveToFirebase();
            render();
        }

        function openChannelModal(channelName) {
            const channel = App.channels[channelName];
            if (!channel) return;
            const isOwner = channel.owner === App.currentUser;
            const modalHtml = `<div class="modal-overlay" id="channelModal"><div class="profile-modal"><h3>📢 ${channelName}</h3><div style="text-align:center;"><div class="avatar-large" style="margin:0 auto;">${channel.avatar ? `<img src="${channel.avatar}" style="width:100%;height:100%;object-fit:cover;">` : '📢'}</div></div><div class="profile-name-section" style="margin-top:20px;"><div class="username-display">${formatUserNameWithStatus(channelName)}</div><div>👥 ${channel.subscribers?.length || 0} подписчиков</div><div>👑 Владелец: ${channel.owner}</div></div>${!isOwner ? `<div class="profile-actions"><button class="${channel.subscribers?.includes(App.currentUser) ? 'unsubscribe-btn' : 'subscribe-btn'}" id="channelSubscribeBtn">${channel.subscribers?.includes(App.currentUser) ? 'ОТПИСАТЬСЯ' : 'ПОДПИСАТЬСЯ'}</button></div>` : ''}<div class="profile-actions"><button class="profile-btn secondary" id="closeChannelModal">ЗАКРЫТЬ</button></div></div></div>`;

                if (!channel.subscribers) channel.subscribers = [];
                if (channel.subscribers.includes(App.currentUser)) {
                    channel.subscribers = channel.subscribers.filter(s => s !== App.currentUser);
                    showNotification('Отписались');
                } else {
                    channel.subscribers.push(App.currentUser);
                    showNotification('Подписались');
                }

                document.getElementById('channelModal').remove();
                render();
            });
            document.getElementById('closeChannelModal')?.addEventListener('click', () => { document.getElementById('channelModal').remove(); });

        function createChannel() {
            if (App.users[App.currentUser].stars < 50) {
                showNotification('Нужно 50 YC', 'error');
                return;
            }
            const modalHtml = `<div class="modal-overlay" id="createChannelModal"><div class="profile-modal"><h3>СОЗДАНИЕ КАНАЛА</h3><div class="profile-input-group"><label>@имя канала</label><input type="text" id="channelUsername" placeholder="mychannel"></div><div class="profile-actions"><button class="profile-btn" id="confirmCreateChannelBtn">СОЗДАТЬ (50 YC)</button><button class="profile-btn secondary" id="closeChannelCreateBtn">ОТМЕНА</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('confirmCreateChannelBtn').addEventListener('click', () => {
                let name = document.getElementById('channelUsername').value.trim().toLowerCase();
                if (!name || !/^[a-z0-9]{4,15}$/.test(name)) {
                    showNotification('4-15 англ букв/цифр', 'error');
                    return;
                }
                const fullName = '@' + name;
                if (App.channels[fullName]) { showNotification('Канал существует', 'error'); return; }
                App.users[App.currentUser].stars -= 50;
                App.channels[fullName] = { name: fullName, owner: App.currentUser, subscribers: [App.currentUser], messages: [], avatar: null, createdAt: Date.now() };
                saveToFirebase();
                updateUserInterface();
                document.getElementById('createChannelModal').remove();
                showNotification(`Канал ${fullName} создан!`);
                render();
            });
            document.getElementById('closeChannelCreateBtn').addEventListener('click', () => { document.getElementById('createChannelModal').remove(); });
        }
        
        function openNftCreator() {
            if (App.users[App.currentUser].stars < 50) { showNotification('Нужно 50 YC', 'error'); return; }
            let grid = Array(10).fill().map(() => Array(10).fill('#ffffff'));
            let currentColor = '#000000';
            const modalHtml = `<div class="modal-overlay" id="nftModal"><div class="profile-modal"><h3>🎨 СОЗДАТЬ ОТКРЫТКУ</h3><div class="pixel-canvas" id="pixelCanvas" style="display:grid;grid-template-columns:repeat(10,1fr);gap:1px;background:#333;"></div><div class="color-palette" id="colorPalette"></div><button class="create-nft-btn" id="confirmNftBtn">СОЗДАТЬ (50 YC)</button><div class="profile-actions"><button class="profile-btn secondary" id="closeNftModal">ОТМЕНА</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const canvasDiv = document.getElementById('pixelCanvas');
            const paletteDiv = document.getElementById('colorPalette');
            const colors = ['#000000', '#ffffff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500'];
            colors.forEach(col => {
                const btn = document.createElement('div');
                btn.className = `color-option ${col === currentColor ? 'active' : ''}`;
                btn.style.backgroundColor = col;
                btn.addEventListener('click', () => {
                    currentColor = col;
                    document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                });
                paletteDiv.appendChild(btn);
            });
            function renderCanvas() {
                canvasDiv.innerHTML = '';
                for (let i = 0; i < 10; i++) {
                    for (let j = 0; j < 10; j++) {
                        const pixel = document.createElement('div');
                        pixel.className = 'pixel';
                        pixel.style.backgroundColor = grid[i][j];
                        pixel.addEventListener('click', () => { grid[i][j] = currentColor; renderCanvas(); });
                        canvasDiv.appendChild(pixel);
                    }
                }
            }
            renderCanvas();
            document.getElementById('confirmNftBtn').addEventListener('click', () => {
                if (!App.users[App.currentUser].nfts) App.users[App.currentUser].nfts = [];
                App.users[App.currentUser].nfts.push({ grid: grid, createdAt: Date.now() });
                App.users[App.currentUser].stars -= 50;
                saveToFirebase();
                updateUserInterface();
                document.getElementById('nftModal').remove();
                showNotification('Открытка создана!');
            });
            document.getElementById('closeNftModal').addEventListener('click', () => { document.getElementById('nftModal').remove(); });
        }
        
        function openGiftMenu() {
            const target = App.activeChat;
            if (!target || target === 'saved' || target === 'yolk' || App.channels[target]) {
                showNotification('Нельзя отправить подарок сюда', 'error');
                return;
            }
            const gifts = App.users[App.currentUser].gifts || [];
            const nfts = App.users[App.currentUser].nfts || [];
            const giftList = gifts.map(g => `<div class="gift-item" onclick="window.sendGiftToUser('${target}', '${g}')">${g}</div>`).join('');
            const nftListHtml = nfts.length > 0 ? `<div class="nft-collection">${nfts.map((nft, idx) => {
                const canvas = document.createElement('canvas');
                canvas.width = 40; canvas.height = 40;
                const ctx = canvas.getContext('2d');
                for (let i = 0; i < 10; i++) for (let j = 0; j < 10; j++) ctx.fillStyle = nft.grid[i][j], ctx.fillRect(j * 4, i * 4, 4, 4);
                return `<div class="nft-item" data-nft-index="${idx}"><img src="${canvas.toDataURL()}" style="width:100%;height:100%;"></div>`;
            }).join('')}</div>` : '<div>Нет открыток</div>';
            const modalHtml = `<div class="modal-overlay" id="giftModal"><div class="profile-modal"><h3>🎁 ОТПРАВИТЬ ПОДАРОК</h3><div class="tabs"><div class="tab active" data-tab="emoji">ПОДАРКИ</div><div class="tab" data-tab="nft">ОТКРЫТКИ</div></div><div id="emojiTab" class="tab-content">${giftList || 'Нет подарков'}</div><div id="nftTab" class="tab-content hidden">${nftListHtml}</div><div class="profile-actions"><button class="profile-btn secondary" id="closeGiftModal">ОТМЕНА</button></div></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);

                    document.getElementById('nftTab').classList.toggle('hidden', tab.dataset.tab !== 'nft');
                });
            });
            document.querySelectorAll('.nft-item').forEach(el => {
                el.addEventListener('click', () => {
                    const idx = parseInt(el.dataset.nftIndex);
                    const nft = nfts[idx];
                    if (!nft) return;
                    App.users[App.currentUser].nfts.splice(idx, 1);
                    if (!App.users[target].nfts) App.users[target].nfts = [];
                    App.users[target].nfts.push(nft);
                    const chatId = ensureChat(App.currentUser, target);
                    if (chatId && App.chats[chatId]) {
                        App.chats[chatId].messages.push({ from: App.currentUser, text: `🎨 ОТКРЫТКА ОТ ${App.currentUser}`, time: Date.now(), gift: true, nftData: nft });
                    }
                    saveToFirebase();
                    showConfetti();
                    playHappySound();
                    if (App.activeChat === target) renderMessages(target);
                    updateUserInterface();
                    document.getElementById('giftModal').remove();
                    showNotification(`Открытка подарена ${target}!`);
                });
            });
            document.getElementById('closeGiftModal').addEventListener('click', () => { document.getElementById('giftModal').remove(); });
        }
        
        window.sendGiftToUser = function(toUser, giftEmoji) {
            const fromUser = App.currentUser;
            const userGifts = [...(App.users[fromUser].gifts || [])];
            const index = userGifts.indexOf(giftEmoji);
            if (index === -1) { showNotification('Нет такого подарка', 'error'); return; }
            userGifts.splice(index, 1);
            App.users[fromUser].gifts = userGifts;
            if (!App.users[toUser].gifts) App.users[toUser].gifts = [];
            App.users[toUser].gifts.push(giftEmoji);
            const chatId = ensureChat(fromUser, toUser);
            if (chatId && App.chats[chatId]) {
                App.chats[chatId].messages.push({ from: fromUser, text: `🎁 ПОДАРОК ${giftEmoji} ОТ ${fromUser}`, time: Date.now(), gift: true });
                showConfetti();
                playHappySound();
            }
            saveToFirebase();
            if (App.activeChat === toUser) renderMessages(toUser);
            updateUserInterface();
            document.getElementById('giftModal')?.remove();
            showNotification(`Подарок ${giftEmoji} отправлен ${toUser}!`);
        };
        
        window.openImageModal = function(src) {
            const modal = `<div class="modal-overlay" onclick="this.remove()"><div style="max-width:90%;max-height:90%;"><img src="${src}" style="max-width:100%;max-height:100%;border-radius:16px;"></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modal);
        };
        window.deleteChat = function(chat, event) {
            event.stopPropagation();
            if (!confirm(`Удалить чат ${chat}?`)) return;
            const chatId = [App.currentUser, chat].sort().join('_');
            if (App.chats[chatId]) delete App.chats[chatId];
            if (App.channels[chat] && App.channels[chat].subscribers) {
                App.channels[chat].subscribers = App.channels[chat].subscribers.filter(s => s !== App.currentUser);
            }
            if (App.activeChat === chat) { App.activeChat = 'saved'; localStorage.setItem('yolk_active_chat', 'saved'); }
            saveToFirebase();
            render();
            showNotification('Чат удален');
        };
        window.deleteMessage = function(chatPartner, idx) {
            try {
                if (chatPartner === 'saved') {
                    App.savedMessages[App.currentUser]?.splice(idx, 1);
                    saveSavedMessages();
                    renderMessages('saved');
                } else if (App.channels[chatPartner]) {
                    if (App.channels[chatPartner].owner !== App.currentUser) return;
                    App.channels[chatPartner].messages?.splice(idx, 1);
                    saveToFirebase();
                    renderMessages(chatPartner);
                } else {
                    const chatId = [App.currentUser, chatPartner].sort().join('_');
                    App.chats[chatId]?.messages?.splice(idx, 1);
                    saveToFirebase();
                    renderMessages(chatPartner);
                }
                showNotification('Удалено');
            } catch(e) { showNotification('Ошибка', 'error'); }
        };
        window.toggleLike = function(chatPartner, idx, event) {
            event.stopPropagation();
            if (App.channels[chatPartner]?.messages[idx]) {
                const msg = App.channels[chatPartner].messages[idx];
                if (!msg.likes) msg.likes = {};
                if (msg.likes[App.currentUser]) delete msg.likes[App.currentUser];
                else msg.likes[App.currentUser] = true;
                saveToFirebase();
                renderMessages(chatPartner);
            }
        };
        window.sendBotCommand = function(botName, command) {
            let response;
            if (botName === '@game_bot') response = handleGameBot({ text: command }, App.currentUser);
            else if (botName === '@tap_bot') response = handleTapBot({ text: command }, App.currentUser);
            else if (botName === '@random_bot') response = handleRandomBot({ text: command }, App.currentUser);
            if (response) {
                const botMessage = { from: botName, text: response.text, time: Date.now(), buttons: response.buttons };
                const chatId = [App.currentUser, botName].sort().join('_');
                if (!App.chats[chatId]) App.chats[chatId] = { user1: App.currentUser, user2: botName, messages: [] };
                App.chats[chatId].messages.push(botMessage);
                saveToFirebase();
                renderMessages(botName);
            }
        };
        
        function initBots() {
            App.systemBots.forEach(bot => {
                if (!App.users[bot]) {
                    App.users[bot] = { password: 'bot', stars: 0, gifts: [], nfts: [], bio: 'Bot', verified: true, status: 'GOLD', age: 99, lastSeen: Date.now() };
                }
            });
        }
        
        function loadFromFirebase() {
            database.ref().get().then(snapshot => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    if (data.users) App.users = data.users;
                    if (data.chats) App.chats = data.chats;
                    if (data.channels) App.channels = data.channels;
                    if (data.tapBalances) App.tapBalances = data.tapBalances;
                    if (data.tapUpgrades) App.tapUpgrades = data.tapUpgrades;
                    if (data.yolkChatMessages) App.yolkChatMessages = data.yolkChatMessages;
                    if (data.streaks) App.streaks = data.streaks;
                    if (data.privacySettings) App.privacySettings = data.privacySettings;
                }
                const savedUser = localStorage.getItem('yolk_current_user');
                const savedChat = localStorage.getItem('yolk_active_chat');
                if (savedUser && App.users[savedUser]) {
                    App.currentUser = savedUser;
                    App.activeChat = savedChat && (savedChat === 'saved' || savedChat === 'yolk' || App.users[savedChat] || App.channels[savedChat]) ? savedChat : 'saved';
                    loadSavedMessages();
                    loadTapBalances();
                    loadYolkChatMessages();
                    loadStreaks();
                    loadPrivacySettings();
                    setupUserListener(App.currentUser);
                    setInterval(() => updateLastSeen(App.currentUser), 30000);
                }
                App.dataLoaded = true;
                render();
            }).catch(() => {
                const savedUser = localStorage.getItem('yolk_current_user');
                if (savedUser && App.users[savedUser]) {
                    App.currentUser = savedUser;
                    App.activeChat = localStorage.getItem('yolk_active_chat') || 'saved';
                    loadSavedMessages();
                    loadTapBalances();
                    loadYolkChatMessages();
                    loadStreaks();
                    loadPrivacySettings();
                }
                App.dataLoaded = true;
                render();
            });
        }
        
        window.addEventListener('load', () => {
            initBots();
            loadFromFirebase();
        });
    </script>
</body>
</html>
