<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp</title>
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/yolk6767.jpg">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        :root {
            --bg: #0a0a0a;
            --bg-panel: #0f0f0f;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --soft: #1a1a1a;
            --border: #2a2a2a;
            --accent: #d4af37;
            --accent-soft: #2a2418;
            --message-me: #1e2a3a;
            --message-other: #1a1a1a;
            --header: #0a0a0a;
            --shadow: rgba(0,0,0,0.5);
            --danger: #ff4444;
            --success: #4CAF50;
            --input-bg: rgba(0,0,0,0.5);
            --glass-bg: rgba(10, 10, 15, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(212, 175, 55, 0.15);
            --hover-border: rgba(212, 175, 55, 0.4);
        }
        
        body.light-theme {
            --bg: #ffffff;
            --bg-panel: #f8f9fa;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --soft: #e9ecef;
            --border: #dee2e6;
            --accent: #b8860b;
            --accent-soft: #fff3cd;
            --message-me: #e3f2fd;
            --message-other: #f1f3f4;
            --header: #ffffff;
            --shadow: rgba(0,0,0,0.08);
            --input-bg: rgba(0,0,0,0.03);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(184, 134, 11, 0.08);
            --hover-border: rgba(184, 134, 11, 0.25);
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            padding: 0;
            margin: 0;
            transition: background 0.2s ease;
        }
        
        #app {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            background: var(--bg-panel);
            box-shadow: 0 0 20px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            position: relative;
            z-index: 1;
            transition: background 0.2s ease;
        }
        
        .chat-area,
        .sidebar,
        .chat-header,
        .input-area,
        .auth-box,
        .profile-modal,
        .message,
        .chat-item,
        .user-profile,
        .search-add,
        .two-factor-box,
        .shop-section,
        .nft-collection,
        .feed-container,
        .post-card,
        .comments-modal {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        
        .chat-item:hover,
        .chat-item.active,
        .btn:hover,
        .icon-btn:hover,
        .send-btn:hover,
        .profile-btn:hover,
        .tab:hover,
        .tab.active,
        .nav-item:hover,
        .nav-item.active {
            background: var(--hover-bg);
            border-color: var(--hover-border);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        
        .chat-area, .feed-container {
            background-color: transparent !important;
            position: relative;
        }
        
        body:not(.light-theme) .chat-area,
        body:not(.light-theme) .feed-container {
            background-color: #0a0a0a !important;
        }
        
        body.light-theme .chat-area,
        body.light-theme .feed-container {
            background-color: #ffffff !important;
        }
        
        .yc-currency {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background-image: url('https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/wpzqwSbImbdyjUJ2s0oSvqLdaEE6_dmPD-8nhrp7NeMfIbWcP8KWCEuET5rKHB4FzkmtnwvQzrzI-T-931kLpPBv.png');
            background-size: cover;
            background-position: center;
            margin-right: 4px;
            position: relative;
        }
        
        .star-balance-large .yc-currency {
            width: 28px;
            height: 28px;
        }
        
        .verified-icon {
            display: inline-block;
            width: 18px;
            height: 18px;
            background: #389df2;
            border-radius: 50%;
            color: white;
            text-align: center;
            line-height: 18px;
            font-size: 12px;
            margin-left: 4px;
            font-weight: bold;
        }
        .verified-icon::before {
            content: "✓";
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: transparent;
            position: relative;
            z-index: 1;
        }
        
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--message-other);
            color: var(--text);
            align-self: flex-start;
            word-break: break-word;
            border: 1px solid var(--glass-border);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        
        .message.me {
            align-self: flex-end;
            background: var(--message-me);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @keyframes albumenCharGlow {
            0% { text-shadow: 0 0 0 #0066cc; color: #0066cc; opacity: 0.8; }
            15% { text-shadow: 0 0 8px #88ccff, 0 0 3px #aaddff; color: #3399ff; opacity: 1; }
            30% { text-shadow: 0 0 12px #88ccff, 0 0 5px #66bbff; color: #0066cc; opacity: 1; }
            50% { text-shadow: 0 0 5px #88ccff; color: #2277dd; opacity: 0.9; }
            100% { text-shadow: 0 0 0 #0066cc; color: #0066cc; opacity: 0.8; }
        }
        
        .albumen-name {
            font-weight: bold;
            display: inline-flex;
            flex-wrap: wrap;
        }
        
        .albumen-char {
            display: inline-block;
            animation: albumenCharGlow 3s ease-in-out infinite;
        }
        
        .message-text { color: var(--text); }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; color: var(--text-secondary); }
        .message small { color: var(--text-secondary); }
        
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--message-other);
            border-radius: 18px;
            width: fit-content;
            margin-bottom: 8px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 13px;
        }
        .typing-dots { display: flex; gap: 3px; }
        .typing-dots span {
            width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        
        .loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        .loading-screen.hide {
            opacity: 0;
            pointer-events: none;
        }
        .loading-text {
            color: var(--text);
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 4px;
        }
        .loading-dots {
            display: inline-block;
        }
        .loading-dots span {
            animation: dotPulse 1.4s ease-in-out infinite;
            display: inline-block;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-5px); }
        }
        
        body.light-theme .icon-btn,
        body.light-theme .send-btn,
        body.light-theme .file-label,
        body.light-theme .tiny-btn,
        body.light-theme .inline-btn,
        body.light-theme .profile-btn,
        body.light-theme .btn,
        body.light-theme .subscribe-btn,
        body.light-theme .unsubscribe-btn,
        body.light-theme .like-btn,
        body.light-theme .dislike-btn,
        body.light-theme .settings-icon,
        body.light-theme .delete-chat-icon,
        body.light-theme .tab,
        body.light-theme .nft-item,
        body.light-theme .msg-actions button,
        body.light-theme .back-btn,
        body.light-theme .create-nft-btn,
        body.light-theme .change-username-btn,
        body.light-theme .toggle-password,
        body.light-theme .resend-link,
        body.light-theme .shop-item button,
        body.light-theme .close-btn,
        body.light-theme .nav-item,
        body.light-theme .post-like,
        body.light-theme .post-dislike,
        body.light-theme .post-comment,
        body.light-theme .post-delete,
        body.light-theme .create-post-btn {
            filter: none !important;
        }
        
        .icon-btn,
        .send-btn,
        .file-label,
        .tiny-btn,
        .inline-btn,
        .profile-btn,
        .subscribe-btn,
        .unsubscribe-btn,
        .like-btn,
        .dislike-btn,
        .settings-icon,
        .delete-chat-icon,
        .tab,
        .nft-item,
        .msg-actions button,
        .back-btn,
        .create-nft-btn,
        .change-username-btn,
        .toggle-password,
        .resend-link,
        .shop-item button,
        .close-btn,
        .nav-item,
        .post-like,
        .post-dislike,
        .post-comment,
        .post-delete,
        .create-post-btn {
            transition: all 0.2s ease;
        }
        
        .icon-btn:hover,
        .send-btn:hover,
        .file-label:hover,
        .tiny-btn:hover,
        .inline-btn:hover,
        .profile-btn:hover,
        .btn:hover,
        .subscribe-btn:hover,
        .unsubscribe-btn:hover,
        .like-btn:hover,
        .dislike-btn:hover,
        .settings-icon:hover,
        .delete-chat-icon:hover,
        .tab:hover,
        .nft-item:hover,
        .msg-actions button:hover,
        .shop-item button:hover,
        .nav-item:hover,
        .post-like:hover,
        .post-dislike:hover,
        .post-comment:hover,
        .post-delete:hover,
        .create-post-btn:hover {
            filter: brightness(1.05);
        }
        
        .tab.active,
        .btn:active,
        .icon-btn:active,
        .send-btn:active,
        .nav-item.active {
            color: var(--accent);
        }
        
        .star-balance, .star-balance-large { display: inline-flex; align-items: center; gap: 4px; color: var(--text); }
        .star-balance-large { font-size: 24px; background: var(--glass-bg); padding: 12px; border-radius: 16px; justify-content: center; border: 1px solid var(--glass-border); backdrop-filter: blur(8px); }
        
        .profile-banner-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .banner-container { width: 100%; height: 150px; border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .banner-image { width: 100%; height: 100%; object-fit: cover; }
        .banner-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; }
        body.light-theme .banner-placeholder { background: #f0f0f0; color: #aaa; }
        body.light-theme .banner-container { background: #f0f0f0; }
        
        .profile-avatar-overlay { position: absolute; bottom: -40px; left: 20px; z-index: 10; }
        .profile-avatar-overlay .avatar-large { width: 100px; height: 100px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--text); overflow: hidden; box-shadow: 0 4px 20px var(--shadow); }
        body.light-theme .profile-avatar-overlay .avatar-large { background: #e0e0e0; }
        .profile-avatar-overlay .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-name-section { margin-top: 50px; padding-left: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 4px; }
        
        .settings-icon { cursor: pointer; font-size: 24px; padding: 8px; border-radius: 50%; transition: 0.2s; background: none; border: none; color: var(--text); }
        .settings-icon:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
        .settings-icon-img { width: 28px; height: 28px; object-fit: contain; cursor: pointer; }
        
        .toggle-switch { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle-switch .toggle-label { font-size: 14px; color: var(--text); }
        .toggle-switch .toggle-checkbox { width: 40px; height: 20px; background: #2a2a2a; border-radius: 20px; position: relative; transition: 0.2s; border: 1px solid var(--glass-border); }
        .toggle-switch .toggle-checkbox::after { content: ""; width: 16px; height: 16px; background: #ffffff; border-radius: 50%; position: absolute; top: 1px; left: 2px; transition: 0.2s; }
        .toggle-switch.active .toggle-checkbox { background: var(--accent); }
        .toggle-switch.active .toggle-checkbox::after { left: 20px; }
        
        .auth-container, .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .auth-box { max-width: 400px; margin: auto; background: var(--glass-bg); padding: 30px 24px; border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px var(--shadow); width: 90%; animation: fadeIn 0.3s ease; }
        .auth-box h2 { color: var(--accent); margin-bottom: 16px; font-weight: 500; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text); font-size: 15px; outline: none; transition: all 0.2s; }
        .input-group input:focus, .input-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2); }
        
        .btn { background: var(--accent); color: #000000; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; margin-top: 8px; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--glass-border); }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .auth-error { color: #ff6666; margin-top: 12px; font-size: 14px; text-align: center; font-weight: bold; }
        .auth-switch { margin-top: 20px; display: flex; gap: 10px; }
        
        .two-factor-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 10000; animation: fadeIn 0.3s ease; backdrop-filter: blur(8px); }
        .two-factor-box { background: var(--glass-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--glass-border); max-width: 400px; width: 90%; text-align: center; }
        .two-factor-box h3 { color: var(--accent); margin-bottom: 20px; }
        .two-factor-box p { margin-bottom: 20px; color: var(--text); }
        .code-input { font-size: 24px; letter-spacing: 10px; text-align: center; padding: 15px; border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 20px; width: 100%; background: var(--input-bg); color: var(--text); }
        .resend-link { color: var(--accent); cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
        
        .main-container { flex-direction: row; position: relative; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--glass-bg); position: relative; z-index: 5; width: 100%; }
        
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #6b7280; font-size: 24px; cursor: pointer; margin-right: 10px; display: none; width: 40px; height: 40px; border-radius: 12px; }
        .back-btn.visible { display: block; }
        .back-btn:hover { background: var(--hover-bg); }
        
        @media (min-width: 768px) { .sidebar { position: relative; transform: translateX(0); width: 300px; } .back-btn { display: none !important; } }
        
        .user-profile { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); background: var(--glass-bg); cursor: pointer; }
        .avatar { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text); font-weight: 500; overflow: hidden; flex-shrink: 0; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .username-display { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 2px; flex-wrap: wrap; }
        .age-badge { display: inline-block; margin-left: 5px; color: var(--text-secondary); font-size: 12px; }
        
        .search-add { padding: 12px; border-bottom: 1px solid var(--glass-border); display: flex; gap: 8px; background: var(--glass-bg); }
        .search-add input { flex: 1; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 15px; color: var(--text); outline: none; }
        .search-add input::placeholder { color: var(--text-secondary); }
        
        .icon-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--glass-border); color: #6b7280; width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { background: rgba(212, 175, 55, 0.3); }
        
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item { padding: 12px 16px; border-radius: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); background: var(--glass-bg); border: 1px solid var(--glass-border); transition: all 0.2s; }
        .chat-item:hover { background: var(--hover-bg); border-color: var(--hover-border); }
        .chat-item.active { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--accent); }
        
        .chat-avatar { width: 40px; height: 40px; background: rgba(212, 175, 55, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--glass-border); color: var(--text); }
        .chat-avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .delete-chat-icon { margin-left: auto; color: #6b7280; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; }
        .delete-chat-icon img { width: 20px; height: 20px; object-fit: contain; }
        .delete-chat-icon:hover { opacity: 0.8; }
        
        .chat-header { padding: 12px 16px; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .chat-header-info { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .chat-header-info strong { color: var(--text); font-size: 16px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .chat-user-status { font-size: 11px; color: #4CAF50; font-weight: normal; margin-top: 2px; }
        .chat-user-status.offline { color: #888; }
        
        .chat-actions { display: flex; gap: 8px; align-items: center; }
        .tiny-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #6b7280; font-weight: 500; }
        .tiny-btn:hover { background: rgba(212, 175, 55, 0.2); }
        
        .subscribe-btn { background: #DBBA00; border: none; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #000000; font-weight: 500; }
        .subscribe-btn:hover { filter: brightness(1.1); }
        .unsubscribe-btn { background: #818181; border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #ffffff; font-weight: 500; }

            function formatLastSeen(lastSeen, chatPartner) {
                if (chatPartner === 'saved' || chatPartner === 'yolk') return '';
                if (!lastSeen) return 'очень давно';
                const now = Date.now();
                const diff = now - lastSeen;
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);
                if (minutes < 1) return 'только что';
                if (minutes < 5) return `${minutes} мин назад`;
                if (minutes < 15) return '5 мин назад';
                if (minutes < 30) return '15 мин назад';
                if (minutes < 60) return '30 мин назад';
                if (hours < 2) return '1 час назад';
                if (hours < 5) return `${hours} часа назад`;
                if (hours < 24) return `${hours} часов назад`;
                if (days === 1) return '1 день назад';
                if (days < 5) return `${days} дня назад`;
                return `${days} дней назад`;
            }

            function ensureChat(userA, userB) { if (!userA || !userB || userA === userB || userB === 'saved' || userB === 'yolk') return; const chatId = [userA, userB].sort().join('_'); if (!App.chats[chatId]) { App.chats[chatId] = { user1: userA, user2: userB, messages: [] }; saveToSupabase(); } return chatId; }

            async function createNft(grid, owner) {
                if (!App.users[owner]) return false;
                if (App.users[owner].stars < 50) { showNotification('Недостаточно YC (нужно 50)', 'error'); return false; }
                const nftObj = { grid: grid, createdAt: Date.now() };
                if (!App.users[owner].nfts) App.users[owner].nfts = [];
                App.users[owner].nfts.push(nftObj);
                App.users[owner].stars -= 50;
                saveToSupabase();
                updateUserInterface();
                showNotification('Открытка создана!');
                return true;
            }
            
            function openNftCreator() { 
                if (App.users[App.currentUser].stars < 50) { showNotification('Не хватает 50 YC для создания открытки', 'error'); return; } 
                const modalHtml = `<div class="modal-overlay" id="nftCreatorModal"><div class="profile-modal" style="max-width: 500px;"><h3>🎨 СОЗДАТЬ ОТКРЫТКУ (10x10)</h3><div class="pixel-canvas" id="pixelCanvas" style="display: grid; grid-template-columns: repeat(10, 30px); grid-template-rows: repeat(10, 30px); gap: 1px; background: #2a2a2a;"></div><div class="color-palette" id="colorPalette"></div><button class="create-nft-btn" id="confirmCreateNftBtn">СОЗДАТЬ (50 YC)</button><div class="profile-actions"><button class="profile-btn secondary" id="closeNftCreator">ОТМЕНА</button></div></div></div>`; 
                document.body.insertAdjacentHTML('beforeend', modalHtml); 
                let grid = Array(10).fill().map(() => Array(10).fill('#ffffff')); 
                let currentColor = '#000000'; 
                const canvasDiv = document.getElementById('pixelCanvas'); 
                const paletteDiv = document.getElementById('colorPalette'); 
                const colors = ['#000000', '#ffffff', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffa500', '#800080']; 
                colors.forEach(col => { 
                    const btn = document.createElement('div'); 
                    btn.className = `color-option ${col === currentColor ? 'active' : ''}`; 
                    btn.style.backgroundColor = col; 
                    btn.addEventListener('click', () => { currentColor = col; document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active')); btn.classList.add('active'); }); 
                    paletteDiv.appendChild(btn); 
                }); 
                function renderCanvas() { 
                    canvasDiv.innerHTML = ''; 
                    for (let i = 0; i < 10; i++) { 
                        for (let j = 0; j < 10; j++) { 
                            const pixel = document.createElement('div'); 
                            pixel.className = 'pixel'; 
                            pixel.style.backgroundColor = grid[i][j]; 
                            pixel.style.width = '30px'; 
                            pixel.style.height = '30px'; 
                            pixel.addEventListener('click', () => { grid[i][j] = currentColor; renderCanvas(); }); 
                            canvasDiv.appendChild(pixel); 
                        } 
                    } 
                } 
                renderCanvas(); 
                document.getElementById('confirmCreateNftBtn').addEventListener('click', async () => { 
                    const success = await createNft(grid, App.currentUser); 
                    if (success) document.getElementById('nftCreatorModal').remove(); 
                }); 
                document.getElementById('closeNftCreator').addEventListener('click', () => { document.getElementById('nftCreatorModal').remove(); }); 
            }

            function openGiftMenu() { 
                const target = App.activeChat; 
                if (!target || target === 'saved' || target === 'yolk') { 
                    showNotification('Нельзя отправить открытку сюда', 'error');

                const nftListHtml = hasNfts ? `<div class="nft-collection" style="margin-top:10px;">${nfts.map((nft, idx) => {

                    canvas.height = 48;

                    return `<div class="nft-item" data-nft-index="${idx}"><img src="${canvas.toDataURL()}" style="width:100%; height:100%; image-rendering: crisp-edges;"></div>`; 
                }).join('')}</div>` : '<div>Нет открыток для подарка</div>'; 
                const modalHtml = `<div class="modal-overlay" id="giftModalOverlay"><div class="profile-modal"><h3>🎁 ВЫБЕРИТЕ ОТКРЫТКУ</h3><div id="nftTab">${nftListHtml}</div><div class="profile-actions"><button class="profile-btn secondary" id="closeGiftModal">ОТМЕНА</button></div></div></div>`;

                            const idx = parseInt(el.dataset.nftIndex);

                            App.users[fromUser].nfts.splice(idx, 1);

                            App.users[toUser].nfts.push(nft);

                            if (!App.chats[chatId]) App.chats[chatId] = { user1: fromUser, user2: toUser, messages: [] }; 
                            App.chats[chatId].messages.push({ from: fromUser, text: `ОТКРЫТКА 🖼️ ОТ ${getDisplayName(fromUser)}`, time: Date.now(), gift: true, nftData: nft });

                    document.getElementById('giftModalOverlay').remove(); 
                });

            function ensureUserFollowData(username) {
                if (!App.users[username]) return;
                if (!App.users[username].followers) App.users[username].followers = [];
                if (!App.users[username].following) App.users[username].following = [];
            }
            
            function isFollowing(currentUser, targetUser) {
                if (currentUser === targetUser) return false;
                ensureUserFollowData(currentUser);
                ensureUserFollowData(targetUser);
                return App.users[currentUser].following.includes(targetUser);
            }
            
            function subscribeToUser(currentUser, targetUser) {
                if (currentUser === targetUser) {
                    showNotification('Нельзя подписаться на самого себя', 'error');
                    return false;
                }
                ensureUserFollowData(currentUser);
                ensureUserFollowData(targetUser);
                if (App.users[currentUser].following.includes(targetUser)) {
                    showNotification('Вы уже подписаны', 'error');
                    return false;
                }
                App.users[currentUser].following.push(targetUser);
                App.users[targetUser].followers.push(currentUser);
                saveToSupabase();
                showNotification(`Вы подписались на ${getDisplayName(targetUser)}`);
                return true;
            }
            
            function unsubscribeFromUser(currentUser, targetUser) {
                ensureUserFollowData(currentUser);
                ensureUserFollowData(targetUser);
                const idxFollowing = App.users[currentUser].following.indexOf(targetUser);
                if (idxFollowing !== -1) App.users[currentUser].following.splice(idxFollowing, 1);
                const idxFollower = App.users[targetUser].followers.indexOf(currentUser);
                if (idxFollower !== -1) App.users[targetUser].followers.splice(idxFollower, 1);
                saveToSupabase();
                showNotification(`Вы отписались от ${getDisplayName(targetUser)}`);
                return true;
            }
            
            function formatSubscribers(count) {
                if (count % 10 === 1 && count % 100 !== 11) return `${count} подписчик`;
                if ([2,3,4].includes(count % 10) && ![12,13,14].includes(count % 100)) return `${count} подписчика`;
                return `${count} подписчиков`;
            }
            
            function toggleFeedSubscription(postId, author) {
                if (author === App.currentUser) return;
                const isCurrentlySubscribed = isFollowing(App.currentUser, author);
                if (isCurrentlySubscribed) {
                    unsubscribeFromUser(App.currentUser, author);
                } else {
                    subscribeToUser(App.currentUser, author);
                }
                const postCard = document.querySelector(`.post-card[data-post-id="${postId}"]`);
                if (postCard) {

                        btn.className = newSubStatus ? 'unsubscribe-btn' : 'subscribe-btn';
                    }
                }
            }

                    const requestId = generateId(); 
                    if (!App.donationRequests) App.donationRequests = {};
                    App.donationRequests[requestId] = { id: requestId, user: App.currentUser, username: comment, yc: pack.yc, ton: pack.ton, txid: txid, status: 'pending', createdAt: Date.now(), statusType: pack.status || null }; 
                    saveToSupabase(); 
                    document.getElementById('donationModalOverlay')?.remove(); 
                    showNotification(`✅ Заявка отправлена! Ожидайте начисления. ID: ${requestId.slice(-6)}`); 
                }); 
                document.getElementById('closeDonationModal')?.addEventListener('click', () => { document.getElementById('donationModalOverlay')?.remove(); }); 
            }
            
            window.confirmDonation = function(requestId) { 
                const request = App.donationRequests[requestId]; 
                if (!request || request.status !== 'pending') return; 
                const targetUser = request.user; 
                if (App.users[targetUser]) { 
                    if (request.statusType) { 
                        App.users[targetUser].status = request.statusType; 
                        showNotification(`✨ СТАТУС ${request.statusType} активирован для ${request.username}! ✨`); 
                        updateUserInterface(); 
                        if (App.activeChat && App.activeChat !== 'saved' && App.activeChat !== 'yolk') { 
                            renderMessages(App.activeChat); 
                            updateChatList(); 
                        } 
                    } else { 
                        App.users[targetUser].stars = (App.users[targetUser].stars || 0) + request.yc; 
                        showNotification(`✅ Начислено ${request.yc} YC пользователю ${request.username}`); 
                        updateUserInterface(); 
                    } 
                    request.status = 'completed'; 
                    request.completedAt = Date.now(); 
                    saveToSupabase(); 
                    if (!App.yolkChatMessages[targetUser]) App.yolkChatMessages[targetUser] = []; 
                    let messageText = request.statusType ? `✨ Вы получили СТАТУС ${request.statusType} НАВСЕГДА! ✨` : `✅ Пополнение баланса!\n💰 +${request.yc} YC\nСпасибо за поддержку!`; 
                    App.yolkChatMessages[targetUser].push({ from: 'SYSTEM', text: messageText, time: Date.now() }); 
                    saveToSupabase(); 
                    if (App.currentUser === ADMIN_USER) { 
                        document.getElementById('adminModalOverlay')?.remove(); 
                        openAdminPanel(); 
                    } 
                } 
            };

                delete App.donationRequests[requestId];

            let feedPage = 0;
