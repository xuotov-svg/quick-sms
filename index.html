<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Yolkapp</title>
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/xuotov-svg/quick-sms/main/yolk6767.jpg">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    :root {
      --bg: #0a0a0a;
      --bg-panel: #0f0f0f;
      --text: #ffffff;
      --text-secondary: #cccccc;
      --soft: #1a1a1a;
      --border: #2a2a2a;
      --accent: #d4af37;
      --accent-soft: #2a2418;
      --message-me: #1e2a3a;
      --message-other: #1a1a1a;
      --header: #0a0a0a;
      --shadow: rgba(0, 0, 0, 0.5);
      --danger: #ff4444;
      --success: #4CAF50;
      --input-bg: rgba(0, 0, 0, 0.5);
      --glass-bg: rgba(10, 10, 15, 0.75);
      --glass-border: rgba(255, 255, 255, 0.10);
      --hover-bg: rgba(212, 175, 55, 0.18);
      --hover-border: rgba(212, 175, 55, 0.45);
      --feed-like-bg: rgba(212, 175, 55, 0.12);
      --feed-like-border: rgba(212, 175, 55, 0.25);
      --feed-delete-bg: rgba(255, 68, 68, 0.12);
      --feed-delete-border: rgba(255, 68, 68, 0.3);
    }
    body.light-theme {
      --bg: #ffffff;
      --bg-panel: #f8f9fa;
      --text: #1a1a1a;
      --text-secondary: #4a4a4a;
      --soft: #e9ecef;
      --border: #dee2e6;
      --accent: #b8860b;
      --accent-soft: #fff3cd;
      --message-me: #e3f2fd;
      --message-other: #f1f3f4;
      --header: #ffffff;
      --shadow: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(0, 0, 0, 0.03);
      --glass-bg: rgba(255, 255, 255, 0.92);
      --glass-border: rgba(0, 0, 0, 0.1);
      --hover-bg: rgba(184, 134, 11, 0.10);
      --hover-border: rgba(184, 134, 11, 0.30);
      --feed-like-bg: rgba(184, 134, 11, 0.08);
      --feed-like-border: rgba(184, 134, 11, 0.25);
      --feed-delete-bg: rgba(220, 53, 69, 0.08);
      --feed-delete-border: rgba(220, 53, 69, 0.25);
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg);
      padding: 0;
      margin: 0;
      transition: background 0.2s ease;
      position: relative;
    }
    #app {
      width: 100%;
      max-width: 100%;
      height: 100vh;
      max-height: 100vh;
      background: var(--bg-panel);
      box-shadow: 0 0 30px var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: none;
      position: relative;
      z-index: 1;
      transition: background 0.2s ease;
    }
    .chat-area,
    .sidebar,
    .chat-header,
    .input-area,
    .auth-box,
    .profile-modal,
    .message,
    .chat-item,
    .search-add,
    .feed-container,
    .post-card,
    .comments-modal {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px var(--shadow);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .chat-item:hover,
    .chat-item.active,
    .btn:hover,
    .icon-btn:hover,
    .send-btn:hover,
    .profile-btn:hover,
    .tab:hover,
    .nav-item:hover,
    .nav-item.active {
      background: var(--hover-bg);
      border-color: var(--hover-border);
      box-shadow: 0 0 24px rgba(212, 175, 55, 0.25);
    }
    .chat-area,
    .feed-container {
      background-color: transparent !important;
      position: relative;
    }
    body:not(.light-theme) .chat-area,
    body:not(.light-theme) .feed-container {
      background-color: #050505 !important;
    }
    body.light-theme .chat-area,
    body.light-theme .feed-container {
      background-color: #ffffff !important;
    }
    .verified-icon {
      display: none;
    }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: transparent;
      position: relative;
      z-index: 1;
    }
    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 18px;
      background: var(--message-other);
      color: var(--text);
      align-self: flex-start;
      word-break: break-word;
      border: 1px solid var(--glass-border);
      box-shadow: 0 2px 8px var(--shadow);
      position: relative;
      animation: fadeIn 0.2s ease;
    }
    .message.me {
      align-self: flex-end;
      background: var(--message-me);
      border: 1px solid rgba(212, 175, 55, 0.3);
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .message-text {
      color: var(--text);
    }
    .message .time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
      color: var(--text-secondary);
    }
    .message small {
      color: var(--text-secondary);
    }
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--message-other);
      border-radius: 18px;
      width: fit-content;
      margin-bottom: 8px;
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      font-size: 13px;
    }
    .typing-dots {
      display: flex;
      gap: 3px;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }
    .typing-dots span:nth-child(1) {
      animation-delay: 0s;
    }
    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }
    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes typingBounce {
      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.4;
      }
      30% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    .loading-screen.hide {
      opacity: 0;
      pointer-events: none;
    }
    .loading-text {
      color: var(--text);
      font-size: 32px;
      font-weight: 500;
      letter-spacing: 4px;
    }
    .loading-dots {
      display: inline-block;
    }
    .loading-dots span {
      animation: dotPulse 1.4s ease-in-out infinite;
      display: inline-block;
    }
    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }
    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }
    @keyframes dotPulse {
      0%,
      100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      50% {
        opacity: 1;
        transform: translateY(-5px);
      }
    }
    .icon-btn,
    .send-btn,
    .file-label,
    .tiny-btn,
    .profile-btn,
    .subscribe-btn,
    .unsubscribe-btn,
    .like-btn,
    .dislike-btn,
    .settings-icon,
    .delete-chat-icon,
    .tab,
    .msg-actions button,
    .back-btn,
    .change-username-btn,
    .toggle-password,
    .resend-link,
    .close-btn,
    .nav-item,
    .post-like,
    .post-dislike,
    .post-comment,
    .post-delete,
    .create-post-btn {
      transition: all 0.2s ease;
    }
    .icon-btn:hover,
    .send-btn:hover,
    .file-label:hover,
    .tiny-btn:hover,
    .profile-btn:hover,
    .btn:hover,
    .subscribe-btn:hover,
    .unsubscribe-btn:hover,
    .like-btn:hover,
    .dislike-btn:hover,
    .settings-icon:hover,
    .delete-chat-icon:hover,
    .tab:hover,
    .msg-actions button:hover,
    .nav-item:hover,
    .post-like:hover,
    .post-dislike:hover,
    .post-comment:hover,
    .post-delete:hover,
    .create-post-btn:hover {
      filter: brightness(1.05);
    }
    .tab.active,
    .btn:active,
    .icon-btn:active,
    .send-btn:active,
    .nav-item.active {
      color: var(--accent);
    }
    .profile-banner-wrapper {
      position: relative;
      width: 100%;
      margin-bottom: 20px;
    }
    .banner-container {
      width: 100%;
      height: 150px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }
    .banner-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .banner-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 14px;
    }
    body.light-theme .banner-placeholder {
      background: #f0f0f0;
      color: #aaa;
    }
    body.light-theme .banner-container {
      background: #f0f0f0;
    }
    .profile-avatar-overlay {
      position: absolute;
      bottom: -40px;
      left: 20px;
      z-index: 10;
    }
    .profile-avatar-overlay .avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: var(--text);
      overflow: hidden;
      box-shadow: 0 4px 20px var(--shadow);
    }
    body.light-theme .profile-avatar-overlay .avatar-large {
      background: #e0e0e0;
    }
    .profile-avatar-overlay .avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .profile-name-section {
      margin-top: 50px;
      padding-left: 20px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .settings-icon {
      cursor: pointer;
      font-size: 24px;
      padding: 8px;
      border-radius: 50%;
      transition: 0.2s;
      background: none;
      border: none;
      color: var(--text);
    }
    .settings-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: rotate(90deg);
    }
    .settings-icon-img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      cursor: pointer;
    }
    .toggle-switch {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }
    .toggle-switch .toggle-label {
      font-size: 14px;
      color: var(--text);
    }
    .toggle-switch .toggle-checkbox {
      width: 40px;
      height: 20px;
      background: #2a2a2a;
      border-radius: 20px;
      position: relative;
      transition: 0.2s;
      border: 1px solid var(--glass-border);
    }
    .toggle-switch .toggle-checkbox::after {
      content: "";
      width: 16px;
      height: 16px;
      background: #ffffff;
      border-radius: 50%;
      position: absolute;
      top: 1px;
      left: 2px;
      transition: 0.2s;
    }
    .toggle-switch.active .toggle-checkbox {
      background: var(--accent);
    }
    .toggle-switch.active .toggle-checkbox::after {
      left: 20px;
    }
    .auth-container,
    .main-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .auth-container {
      background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0a 70%);
      justify-content: center;
      align-items: center;
    }
    .auth-box {
      max-width: 380px;
      background: rgba(20, 20, 30, 0.9);
      backdrop-filter: blur(30px);
      padding: 36px 28px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
      width: 92%;
      animation: fadeIn 0.4s ease;
      text-align: center;
    }
    .auth-box h2 {
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 30px;
      letter-spacing: 2px;
    }
    .auth-subtitle {
      color: var(--text-secondary);
      margin-bottom: 30px;
      font-size: 14px;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
    }
    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }
    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
    }
    .btn {
      background: var(--accent);
      color: #000000;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid var(--glass-border);
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .auth-error {
      color: #ff6666;
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      font-weight: bold;
    }
    .auth-switch {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    .main-container {
      flex-direction: row;
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 280px;
      background: var(--glass-bg);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 10;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--glass-bg);
      position: relative;
      z-index: 5;
      width: 100%;
    }
    .back-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      color: #6b7280;
      font-size: 24px;
      cursor: pointer;
      margin-right: 10px;
      display: none;
      width: 40px;
      height: 40px;
      border-radius: 12px;
    }
    .back-btn.visible {
      display: block;
    }
    .back-btn:hover {
      background: var(--hover-bg);
    }
    @media (min-width: 768px) {
      .sidebar {
        position: relative;
        transform: translateX(0);
        width: 300px;
      }
      .back-btn {
        display: none !important;
      }
      .bottom-nav {
        display: flex !important;
      }
      .bottom-nav .nav-chats {
        display: none;
      }
    }
    .user-profile {
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-bg);
    }
    .avatar {
      width: 48px;
      height: 48px;
      background: rgba(212, 175, 55, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--text);
      font-weight: 500;
      overflow: hidden;
      flex-shrink: 0;
    }
    .avatar-img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    .username-display {
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 2px;
      flex-wrap: wrap;
    }
    .search-add {
      padding: 12px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      gap: 8px;
      background: var(--glass-bg);
    }
    .search-add input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 10px 15px;
      color: var(--text);
      outline: none;
    }
    .search-add input::placeholder {
      color: var(--text-secondary);
    }
    .icon-btn {
      background: rgba(212, 175, 55, 0.2);
      border: 1px solid var(--glass-border);
      color: #6b7280;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: rgba(212, 175, 55, 0.3);
    }
    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .chat-item {
      padding: 12px 16px;
      border-radius: 16px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      color: var(--text);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      transition: all 0.2s;
    }
    .chat-item.active {
      background: rgba(212, 175, 55, 0.2);
      border: 1px solid var(--accent);
    }
    .chat-avatar {
      width: 40px;
      height: 40px;
      background: rgba(212, 175, 55, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--glass-border);
      color: var(--text);
    }
    .chat-avatar-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }
    .delete-chat-icon {
      margin-left: auto;
      color: #6b7280;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
    }
    .delete-chat-icon img {
      width: 20px;
      height: 20px;
      object-fit: contain;
    }
    .delete-chat-icon:hover {
      opacity: 0.8;
    }
    .chat-header {
      padding: 12px 16px;
      background: var(--glass-bg);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text);
    }
    .chat-header-info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    .chat-header-info strong {
      color: var(--text);
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .chat-user-status {
      font-size: 11px;
      color: #4CAF50;
      font-weight: normal;
      margin-top: 2px;
    }
    .chat-user-status.offline {
      color: #888;
    }
    .chat-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .tiny-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      color: #6b7280;
      font-weight: 500;
    }
    .tiny-btn:hover {
      background: rgba(212, 175, 55, 0.2);
    }
    .subscribe-btn {
      background: #DBBA00;
      border: none;
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      color: #000000;
      font-weight: 500;
    }
    .subscribe-btn:hover {
      filter: brightness(1.1);
    }
    .unsubscribe-btn {
      background: #818181;
      border: 1px solid var(--glass-border);
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
