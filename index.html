<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yolkapp · Liquid Glass</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23d4af37' stroke='%23000' stroke-width='3'/%3E%3Ccircle cx='50' cy='45' r='12' fill='%23fff5e0' stroke='%23000' stroke-width='2'/%3E%3Ccircle cx='44' cy='42' r='2' fill='%23000'/%3E%3Ccircle cx='56' cy='42' r='2' fill='%23000'/%3E%3Cpath d='M45 52 Q50 58 55 52' stroke='%23000' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        /* Базовые переменные (тёмная тема по умолчанию) */
        :root {
            --bg: #0a0a0a;
            --bg-panel: #0f0f0f;
            --text: #ffffff;
            --text-secondary: #cccccc;
            --soft: #1a1a1a;
            --border: #2a2a2a;
            --accent: #d4af37;
            --accent-soft: #2a2418;
            --message-me: #1e2a3a;
            --message-other: #1a1a1a;
            --header: #0a0a0a;
            --shadow: rgba(0,0,0,0.5);
            --danger: #ff4444;
            --success: #4CAF50;
            --input-bg: rgba(0,0,0,0.5);
            --glass-bg: rgba(10, 10, 15, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --hover-bg: rgba(212, 175, 55, 0.15);
            --hover-border: rgba(212, 175, 55, 0.4);
        }
        
        /* Светлая тема */
        body.light-theme {
            --bg: #f5f5f7;
            --bg-panel: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #4a4a4a;
            --soft: #e0e0e0;
            --border: #cccccc;
            --accent: #b8860b;
            --accent-soft: #f0e6d2;
            --message-me: #e3f2fd;
            --message-other: #f5f5f5;
            --header: #ffffff;
            --shadow: rgba(0,0,0,0.1);
            --input-bg: rgba(255,255,255,0.8);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.1);
            --hover-bg: rgba(184, 134, 11, 0.1);
            --hover-border: rgba(184, 134, 11, 0.3);
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            padding: 0;
            margin: 0;
            transition: background 0.2s ease;
        }
        
        #app {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            max-height: 100vh;
            background: var(--bg-panel);
            box-shadow: 0 0 20px var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            position: relative;
            z-index: 1;
            transition: background 0.2s ease;
        }
        
        /* Эффект жидкого стекла для всех элементов */
        .chat-area,
        .sidebar,
        .chat-header,
        .input-area,
        .auth-box,
        .profile-modal,
        .message,
        .chat-item,
        .user-profile,
        .search-add,
        .two-factor-box,
        .shop-section,
        .gifts-collection,
        .nft-collection,
        .feed-container,
        .post-card,
        .comments-modal {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px var(--shadow);
            transition: background 0.2s ease, border-color 0.2s ease;
        }
        
        /* Дополнительный эффект свечения для активных элементов */
        .chat-item:hover,
        .chat-item.active,
        .btn:hover,
        .icon-btn:hover,
        .send-btn:hover,
        .profile-btn:hover,
        .tab:hover,
        .tab.active,
        .nav-item:hover,
        .nav-item.active {
            background: var(--hover-bg);
            border-color: var(--hover-border);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        
        .chat-area {
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.3s ease;
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: rgba(5, 5, 5, 0.85);
        }
        
        body.light-theme .chat-area {
            background-color: rgba(255, 255, 255, 0.95);
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: transparent;
            position: relative;
            z-index: 1;
        }
        
        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 18px;
            background: var(--message-other);
            color: var(--text);
            align-self: flex-start;
            word-break: break-word;
            border: 1px solid var(--glass-border);
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
            animation: fadeIn 0.2s ease;
        }
        
        .message.me {
            align-self: flex-end;
            background: var(--message-me);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes goldGlow { 0% { text-shadow: 0 0 0 #ffd700; } 50% { text-shadow: 0 0 5px #ffd700; } 100% { text-shadow: 0 0 0 #ffd700; } }
        @keyframes rubyGlow { 0% { text-shadow: 0 0 0 #ff4444; } 50% { text-shadow: 0 0 5px #ff4444; } 100% { text-shadow: 0 0 0 #ff4444; } }
        @keyframes emeraldGlow { 0% { text-shadow: 0 0 0 #44ff44; } 50% { text-shadow: 0 0 5px #44ff44; } 100% { text-shadow: 0 0 0 #44ff44; } }
        @keyframes amethystGlow { 0% { text-shadow: 0 0 0 #aa66ff; } 50% { text-shadow: 0 0 5px #aa66ff; } 100% { text-shadow: 0 0 0 #aa66ff; } }
        
        .gold-name { background: linear-gradient(135deg, #ffd700, #ffb347); background-clip: text; -webkit-background-clip: text; color: transparent; animation: goldGlow 1.5s infinite; font-weight: bold; }
        .ruby-name { background: linear-gradient(135deg, #ff4444, #ff6666); background-clip: text; -webkit-background-clip: text; color: transparent; animation: rubyGlow 1.5s infinite; font-weight: bold; }
        .emerald-name { background: linear-gradient(135deg, #44ff44, #66ff66); background-clip: text; -webkit-background-clip: text; color: transparent; animation: emeraldGlow 1.5s infinite; font-weight: bold; }
        .amethyst-name { background: linear-gradient(135deg, #aa66ff, #cc88ff); background-clip: text; -webkit-background-clip: text; color: transparent; animation: amethystGlow 1.5s infinite; font-weight: bold; }
        
        .message-text { color: var(--text); }
        .message .time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; color: var(--text-secondary); }
        .message small { color: var(--text-secondary); }
        
        .verified-icon { display: inline-block; width: 18px; height: 18px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#389df2"/><stop offset="100%" stop-color="#1a73e8"/></linearGradient></defs><path fill="url(%23grad)" d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/><path fill="white" d="M9.5 12.5L11.5 14.5L15.5 9.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'); background-size: contain; background-repeat: no-repeat; vertical-align: middle; margin-left: 4px; }
        
        /* ========== ВСЕ КНОПКИ С ЭМОДЗИ - ТЕМНО-СЕРЫЕ ========== */
        .icon-btn,
        .send-btn,
        .file-label,
        .tiny-btn,
        .inline-btn,
        .profile-btn,
        .btn,
        .subscribe-btn,
        .unsubscribe-btn,
        .like-btn,
        .settings-icon,
        .delete-chat-icon,
        .tab,
        .gift-item,
        .nft-item,
        .msg-actions button,
        .back-btn,
        .create-nft-btn,
        .change-username-btn,
        .toggle-password,
        .resend-link,
        .shop-item button,
        .close-btn,
        .nav-item,
        .post-like,
        .post-dislike,
        .post-comment,
        .post-delete,
        .create-post-btn {
            filter: grayscale(0.6) brightness(0.7);
            transition: all 0.2s ease;
        }
        
        body.light-theme .icon-btn,
        body.light-theme .send-btn,
        body.light-theme .file-label,
        body.light-theme .tiny-btn,
        body.light-theme .inline-btn,
        body.light-theme .profile-btn,
        body.light-theme .btn,
        body.light-theme .subscribe-btn,
        body.light-theme .unsubscribe-btn,
        body.light-theme .like-btn,
        body.light-theme .settings-icon,
        body.light-theme .delete-chat-icon,
        body.light-theme .tab,
        body.light-theme .gift-item,
        body.light-theme .nft-item,
        body.light-theme .msg-actions button,
        body.light-theme .back-btn,
        body.light-theme .create-nft-btn,
        body.light-theme .change-username-btn,
        body.light-theme .toggle-password,
        body.light-theme .resend-link,
        body.light-theme .shop-item button,
        body.light-theme .close-btn,
        body.light-theme .nav-item,
        body.light-theme .post-like,
        body.light-theme .post-dislike,
        body.light-theme .post-comment,
        body.light-theme .post-delete,
        body.light-theme .create-post-btn {
            filter: grayscale(0.3) brightness(0.9);
        }
        
        .icon-btn:hover,
        .send-btn:hover,
        .file-label:hover,
        .tiny-btn:hover,
        .inline-btn:hover,
        .profile-btn:hover,
        .btn:hover,
        .subscribe-btn:hover,
        .unsubscribe-btn:hover,
        .like-btn:hover,
        .settings-icon:hover,
        .delete-chat-icon:hover,
        .tab:hover,
        .gift-item:hover,
        .nft-item:hover,
        .msg-actions button:hover,
        .shop-item button:hover,
        .nav-item:hover,
        .post-like:hover,
        .post-dislike:hover,
        .post-comment:hover,
        .post-delete:hover,
        .create-post-btn:hover {
            filter: grayscale(0.3) brightness(0.85);
        }
        
        .tab.active,
        .btn:active,
        .icon-btn:active,
        .send-btn:active,
        .nav-item.active {
            filter: grayscale(0) brightness(1);
            color: var(--accent);
        }
        
        .yc-currency { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; background: #2a2a2a; border-radius: 50%; position: relative; margin-right: 2px; filter: grayscale(0.5); }
        .yc-currency::before { content: ""; position: absolute; width: 14px; height: 14px; background: #d4af37; border-radius: 50%; filter: grayscale(0.3); }
        .yc-currency::after { content: "YC"; position: absolute; font-size: 8px; font-weight: bold; color: #ffffff; text-shadow: 0 0 1px rgba(0,0,0,0.3); }
        
        .star-balance, .star-balance-large { display: inline-flex; align-items: center; gap: 4px; color: var(--text); }
        .star-balance-large { font-size: 24px; background: var(--glass-bg); padding: 12px; border-radius: 16px; justify-content: center; border: 1px solid var(--glass-border); backdrop-filter: blur(8px); }
        
        .profile-banner-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .banner-container { width: 100%; height: 150px; border-radius: 20px; overflow: hidden; border: 1px solid var(--glass-border); background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        .banner-image { width: 100%; height: 100%; object-fit: cover; }
        .banner-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); display: flex; align-items: center; justify-content: center; color: #888; font-size: 14px; }
        
        .profile-avatar-overlay { position: absolute; bottom: -40px; left: 20px; z-index: 10; }
        .profile-avatar-overlay .avatar-large { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--accent); background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--text); overflow: hidden; box-shadow: 0 4px 20px var(--shadow); }
        .profile-avatar-overlay .avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile-name-section { margin-top: 50px; padding-left: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; padding-right: 20px; }
        
        .settings-icon { cursor: pointer; font-size: 24px; padding: 8px; border-radius: 50%; transition: 0.2s; background: none; border: none; color: var(--text); }
        .settings-icon:hover { background: rgba(255,255,255,0.1); transform: rotate(90deg); }
        
        .toggle-switch { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toggle-switch .toggle-label { font-size: 14px; color: var(--text); }
        .toggle-switch .toggle-checkbox { width: 40px; height: 20px; background: #2a2a2a; border-radius: 20px; position: relative; transition: 0.2s; border: 1px solid var(--glass-border); }
        .toggle-switch .toggle-checkbox::after { content: ""; width: 16px; height: 16px; background: #ffffff; border-radius: 50%; position: absolute; top: 1px; left: 2px; transition: 0.2s; }
        .toggle-switch.active .toggle-checkbox { background: var(--accent); }
        .toggle-switch.active .toggle-checkbox::after { left: 20px; }
        
        .auth-container, .main-container { width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; }
        .auth-box { max-width: 400px; margin: auto; background: var(--glass-bg); padding: 30px 24px; border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 8px 32px var(--shadow); width: 90%; animation: fadeIn 0.3s ease; }
        .auth-box h2 { color: var(--accent); margin-bottom: 16px; font-weight: 500; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text); font-size: 15px; outline: none; transition: all 0.2s; }
        .input-group input:focus, .input-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2); }
        
        .btn { background: var(--accent); color: #000000; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; margin-top: 8px; filter: grayscale(0.3); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--glass-border); filter: grayscale(0.5); }
        .btn:hover { transform: translateY(-2px); filter: grayscale(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .auth-error { color: #ff6666; margin-top: 12px; font-size: 14px; text-align: center; font-weight: bold; }
        .auth-switch { margin-top: 20px; display: flex; gap: 10px; }
        
        .two-factor-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 10000; animation: fadeIn 0.3s ease; backdrop-filter: blur(8px); }
        .two-factor-box { background: var(--glass-bg); padding: 30px; border-radius: 24px; border: 1px solid var(--glass-border); max-width: 400px; width: 90%; text-align: center; }
        .two-factor-box h3 { color: var(--accent); margin-bottom: 20px; }
        .two-factor-box p { margin-bottom: 20px; color: var(--text); }
        .code-input { font-size: 24px; letter-spacing: 10px; text-align: center; padding: 15px; border: 1px solid var(--glass-border); border-radius: 12px; margin-bottom: 20px; width: 100%; background: var(--input-bg); color: var(--text); }
        .resend-link { color: var(--accent); cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; filter: grayscale(0.5); }
        
        .main-container { flex-direction: row; position: relative; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: var(--glass-bg); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; transform: translateX(-100%); transition: transform 0.3s ease; }
        .sidebar.open { transform: translateX(0); }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--glass-bg); position: relative; z-index: 5; width: 100%; }
        
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #6b7280; font-size: 24px; cursor: pointer; margin-right: 10px; display: none; width: 40px; height: 40px; border-radius: 12px; filter: grayscale(0.6); }
        .back-btn.visible { display: block; }
        .back-btn:hover { filter: grayscale(0.2); }
        
        @media (min-width: 768px) { .sidebar { position: relative; transform: translateX(0); width: 300px; } .back-btn { display: none !important; } }
        
        .user-profile { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); background: var(--glass-bg); cursor: pointer; }
        .avatar { width: 48px; height: 48px; background: rgba(212, 175, 55, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--text); font-weight: 500; border: 2px solid var(--accent); overflow: hidden; flex-shrink: 0; }
        .avatar-img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .username-display { font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 2px; flex-wrap: wrap; }
        .age-badge { display: inline-block; margin-left: 5px; color: var(--text-secondary); font-size: 12px; }
        .star-balance { display: flex; align-items: center; gap: 4px; color: var(--text); font-weight: 600; margin-top: 4px; }
        
        .search-add { padding: 12px; border-bottom: 1px solid var(--glass-border); display: flex; gap: 8px; background: var(--glass-bg); }
        .search-add input { flex: 1; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px 15px; color: var(--text); outline: none; }
        .search-add input::placeholder { color: var(--text-secondary); }
        
        .icon-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--glass-border); color: #6b7280; width: 40px; height: 40px; border-radius: 12px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; filter: grayscale(0.6) brightness(0.7); }
        .icon-btn:hover { background: rgba(212, 175, 55, 0.3); filter: grayscale(0.3) brightness(0.85); }
        
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item { padding: 12px 16px; border-radius: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); background: var(--glass-bg); border: 1px solid var(--glass-border); transition: all 0.2s; }
        .chat-item:hover { background: var(--hover-bg); border-color: var(--hover-border); }
        .chat-item.active { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--accent); }
        
        .chat-avatar { width: 40px; height: 40px; background: rgba(212, 175, 55, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--glass-border); color: var(--text); }
        .chat-avatar-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .delete-chat-icon { margin-left: auto; color: #6b7280; font-size: 14px; cursor: pointer; filter: grayscale(0.6); }
        .delete-chat-icon:hover { color: #ff6666; filter: grayscale(0); }
        
        .chat-header { padding: 12px 16px; background: var(--glass-bg); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .chat-header-info { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; }
        .chat-header-info strong { color: var(--text); font-size: 16px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .chat-user-status { font-size: 11px; color: #4CAF50; font-weight: normal; margin-top: 2px; }
        .chat-user-status.offline { color: #888; }
        
        .chat-actions { display: flex; gap: 8px; align-items: center; }
        .tiny-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #6b7280; font-weight: 500; filter: grayscale(0.6) brightness(0.7); }
        .tiny-btn:hover { background: rgba(212, 175, 55, 0.2); filter: grayscale(0.3) brightness(0.85); }
        
        .subscribe-btn { background: #ff4444; border: none; padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #ffffff; font-weight: 500; filter: grayscale(0.3); }
        .subscribe-btn:hover { filter: grayscale(0); }
        .unsubscribe-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 12px; cursor: pointer; font-size: 12px; color: #6b7280; font-weight: 500; filter: grayscale(0.6); }
        .unsubscribe-btn:hover { background: rgba(212, 175, 55, 0.2); filter: grayscale(0.3); }

        // ========== СИСТЕМА STREAK ==========
        function updateStreak(chatPartner) {
            const user = App.currentUser;
            if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk' || 
                App.channels[chatPartner]) return 0;
            
            const chatId = [user, chatPartner].sort().join('_');
            const today = new Date().toDateString();
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();
            
            if (!App.streaks[chatId]) {
                App.streaks[chatId] = {
                    streak: 0,
                    lastMessageDate: null,
                    lastUpdateDate: null,
                    users: {}
                };
            }
            
            [user, chatPartner].forEach(u => {
                if (!App.streaks[chatId].users[u]) {
                    App.streaks[chatId].users[u] = {
                        lastMessageDate: null,
                        streak: 0
                    };
                }
            });
            
            const userData = App.streaks[chatId].users[user];
            const partnerData = App.streaks[chatId].users[chatPartner];
            
            userData.lastMessageDate = today;
            
            const partnerWroteToday = partnerData.lastMessageDate === today;
            
            if (partnerWroteToday) {
                const lastCommonDay = App.streaks[chatId].lastMessageDate;
                
                if (lastCommonDay === yesterdayStr) {
                    App.streaks[chatId].streak++;
                    userData.streak = App.streaks[chatId].streak;
                    partnerData.streak = App.streaks[chatId].streak;
                } else if (lastCommonDay !== today) {
                    App.streaks[chatId].streak = 1;
                    userData.streak = 1;
                    partnerData.streak = 1;
                } else {
                    userData.streak = App.streaks[chatId].streak;
                    partnerData.streak = App.streaks[chatId].streak;
                }
                
                App.streaks[chatId].lastMessageDate = today;
                App.streaks[chatId].lastUpdateDate = today;
            } else {
                const currentStreak = App.streaks[chatId].streak;
                userData.streak = currentStreak;
                partnerData.streak = currentStreak;
            }
            
            const lastUpdate = App.streaks[chatId].lastUpdateDate;
            if (lastUpdate && lastUpdate !== today && lastUpdate !== yesterdayStr) {
                App.streaks[chatId].streak = 0;
                userData.streak = 0;
                partnerData.streak = 0;
                App.streaks[chatId].lastMessageDate = null;
            }
            
            saveStreaks();
            return App.streaks[chatId].streak;
        }
        
        function getStreak(chatPartner) {
            const user = App.currentUser;
            if (!user || !chatPartner || chatPartner === 'saved' || chatPartner === 'yolk' || 
                App.channels[chatPartner]) return 0;
            
            const chatId = [user, chatPartner].sort().join('_');
            const today = new Date().toDateString();
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toDateString();
            
            if (!App.streaks[chatId]) return 0;
            
            const streakData = App.streaks[chatId];
            const lastUpdate = streakData.lastUpdateDate;
            
            if (lastUpdate && lastUpdate !== today && lastUpdate !== yesterdayStr) {
                if (streakData.streak > 0) {
                    streakData.streak = 0;
                    if (streakData.users[user]) streakData.users[user].streak = 0;
                    if (streakData.users[chatPartner]) streakData.users[chatPartner].streak = 0;
                    saveStreaks();
                }
                return 0;
            }
            
            return streakData.streak || 0;
        }
        
        function saveStreaks() {
            localStorage.setItem('yolk_streaks', JSON.stringify(App.streaks));
            if (App.dataLoaded) {
                database.ref('streaks').set(App.streaks).catch(e => console.error(e));
            }
        }
        
        function loadStreaks() {
            const saved = localStorage.getItem('yolk_streaks');
            if (saved) {
                try {
                    App.streaks = JSON.parse(saved);
                } catch(e) {
                    App.streaks = {};
                }
            } else {
                App.streaks = {};
            }
        }
        
        function getStreakForDisplay(chatPartner) {
            const streak = getStreak(chatPartner);
            return streak > 0 ? streak : 0;
        }
        
        function syncStreak(chatPartner) {
            const user = App.currentUser;
            if (!user || !chatPartner) return;
            const chatId = [user, chatPartner].sort().join('_');
            if (!App.streaks[chatId]) return;
            const streakData = App.streaks[chatId];
            const userStreak = streakData.users[user]?.streak || 0;
            const partnerStreak = streakData.users[chatPartner]?.streak || 0;
            const commonStreak = streakData.streak || 0;
            const maxStreak = Math.max(userStreak, partnerStreak, commonStreak);
            streakData.streak = maxStreak;
            if (streakData.users[user]) streakData.users[user].streak = maxStreak;
            if (streakData.users[chatPartner]) streakData.users[chatPartner].streak = maxStreak;
            saveStreaks();
        }

        function formatLastSeen(lastSeen, chatPartner) {
            if (chatPartner === 'saved' || chatPartner === 'yolk') return '';
            if (!lastSeen) return 'очень давно';
            const now = Date.now();
            const diff = now - lastSeen;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (minutes < 1) return 'только что';
            if (minutes < 5) return `${minutes} мин назад`;
            if (minutes < 15) return '5 мин назад';
            if (minutes < 30) return '15 мин назад';
            if (minutes < 60) return '30 мин назад';
            if (hours < 2) return '1 час назад';
            if (hours < 5) return `${hours} часа назад`;
            if (hours < 24) return `${hours} часов назад`;
            if (days === 1) return '1 день назад';
            if (days < 5) return `${days} дня назад`;
            return `${days} дней назад`;
        }

        window.sendGiftToUser = function(toUser, giftEmoji) { 
            const fromUser = App.currentUser; 
            const userGifts = [...(App.users[fromUser].gifts || [])];

            if (!hasGift) {

            const indexToRemove = userGifts.indexOf(giftEmoji); 
            if (indexToRemove !== -1) userGifts.splice(indexToRemove, 1); 
            App.users[fromUser].gifts = userGifts; 
            if (!App.users[toUser].gifts) App.users[toUser].gifts = []; 
            App.users[toUser].gifts.push(giftEmoji); 
            const chatId = ensureChat(fromUser, toUser); 
            if (chatId && App.chats[chatId]) {

        // ========== СМЕНА ЮЗЕРНЕЙМА ==========
        function changeUsername(newUsername) {
            const oldUsername = App.currentUser;
            const newName = '@' + newUsername.toLowerCase();
            
            if (!isValidUsername(newUsername)) {
                showNotification('Юзернейм должен содержать только англ буквы и цифры (4-15 символов)', 'error');
                return false;
            }
            
            if (App.users[newName]) {
                showNotification('Пользователь с таким именем уже существует', 'error');
                return false;
            }
            
            if (App.systemBots.includes(newName)) {
                showNotification('Это имя занято системой', 'error');
                return false;
            }
            
            if (App.users[oldUsername].stars < 1500) {
                showNotification('Недостаточно YC! Нужно 1500 YC для смены имени', 'error');
                return false;
            }
            
            App.users[oldUsername].stars -= 1500;
            
            const userData = { ...App.users[oldUsername] };
            delete userData.password;
            
            App.users[newName] = { ...userData, password: App.users[oldUsername].password };
            
            const oldChats = Object.keys(App.chats);
            for (let chatId of oldChats) {
                const chat = App.chats[chatId];
                if (chat.user1 === oldUsername || chat.user2 === oldUsername) {
                    const newUser1 = chat.user1 === oldUsername ? newName : chat.user1;
                    const newUser2 = chat.user2 === oldUsername ? newName : chat.user2;
                    const newChatId = [newUser1, newUser2].sort().join('_');
                    App.chats[newChatId] = { ...chat, user1: newUser1, user2: newUser2 };
                    delete App.chats[chatId];
                }
            }
            
            if (App.savedMessages[oldUsername]) {
                App.savedMessages[newName] = App.savedMessages[oldUsername];
                delete App.savedMessages[oldUsername];
                saveSavedMessages();
            }
            
            if (App.yolkChatMessages[oldUsername]) {
                App.yolkChatMessages[newName] = App.yolkChatMessages[oldUsername];
                delete App.yolkChatMessages[oldUsername];
                saveYolkChatMessages();
            }
            
            for (let channelId in App.channels) {
                const channel = App.channels[channelId];
                if (channel.owner === oldUsername) {
                    channel.owner = newName;
                }
                if (channel.subscribers) {
                    const index = channel.subscribers.indexOf(oldUsername);
                    if (index !== -1) channel.subscribers[index] = newName;
                }
            }
            
            delete App.users[oldUsername];
            App.currentUser = newName;
            localStorage.setItem('yolk_current_user', newName);
            
            saveToFirebase();
            updateUserInterface();
            render();
            showNotification(`✅ Имя успешно изменено на ${newName}! Снято 1500 YC`);
            return true;
        }

                            App.users[user].stars -= price;

                            updateUserInterface();
                            document.getElementById('profileModalOverlay').remove();
                            openProfileModal(user);

                        const emoji = e.target.dataset.emoji;
                        const ton = parseFloat(e.target.dataset.ton);

                document.querySelectorAll('.status-donate-btn').forEach(btn => {

                    });
                });
                
                document.getElementById('createNftBtn')?.addEventListener('click', () => {
                    document.getElementById('profileModalOverlay').remove();
                    openNftCreator();
                });
                
                document.getElementById('closeProfileModalBtn').addEventListener('click', () => {
                    document.getElementById('profileModalOverlay').remove();
                });
                
                if (isAdmin) {
                    setTimeout(() => {
                        const adminBtn = document.createElement('button');
                        adminBtn.className = 'profile-btn';
                        adminBtn.style.background = '#ff9800';
                        adminBtn.style.color = '#000000';
                        adminBtn.style.border = '1px solid rgba(255,255,255,0.2)';
                        adminBtn.textContent = '👑 АДМИН-ПАНЕЛЬ';
                        adminBtn.onclick = () => {
                            document.getElementById('profileModalOverlay')?.remove();
                            openAdminPanel();

                        const actionsDiv = document.querySelector('#profileModalOverlay .profile-actions');
                        if (actionsDiv && !document.querySelector('#adminPanelBtn')) {
                            adminBtn.id = 'adminPanelBtn';
                            actionsDiv.insertBefore(adminBtn, actionsDiv.firstChild);

                    }, 100);
                }
                return;
            }
            
            const modalHtml = `<div class="modal-overlay" id="profileModalOverlay"><div class="profile-modal"><h3>ПРОФИЛЬ ${username}${userData.verified ? '<span class="verified-icon" style="width:22px;height:22px;"></span>' : ''}</h3><div class="profile-banner-wrapper"><div class="banner-container">${userData.banner ? `<img src="${userData.banner}" class="banner-image">` : '<div class="banner-placeholder">Нет баннера</div>'}</div><div class="profile-avatar-overlay"><div class="avatar-large">${userData.avatar ? `<img src="${userData.avatar}">` : '🍳'}</div></div></div><div class="profile-name-section"><div class="username-display" style="font-size:20px;">${formatUserNameWithStatus(username)}${userData.verified ? '<span class="verified-icon"></span>' : ''}</div></div><div class="profile-input-group"><label>ОПИСАНИЕ</label><div>${userData.bio || '—'}</div></div><div class="profile-input-group"><label>ВОЗРАСТ</label><div>${userData.age || 14} лет</div></div><div class="profile-input-group"><span class="currency-label">ВАЛЮТА</span><div class="star-balance-large"><span class="yc-currency"></span> ${userData.stars || 0} YC</div></div><div class="profile-input-group"><label>ПОДАРКИ</label><div class="gifts-collection">${giftsList || 'НЕТ ПОДАРКОВ'}</div></div><div class="profile-input-group"><label>ОТКРЫТКИ</label><div class="nft-collection">${nftsList || 'НЕТ ОТКРЫТОК'}</div></div><div class="profile-actions"><button class="profile-btn secondary" id="closeProfileModalBtn">ЗАКРЫТЬ</button></div></div></div>`; 
            document.body.insertAdjacentHTML('beforeend', modalHtml); 
            document.getElementById('closeProfileModalBtn').addEventListener('click', () => { document.getElementById('profileModalOverlay').remove(); });

        // ========== ДОНАТ ==========
        function openDonationModal(pack) { 
            const modalHtml = `<div class="modal-overlay" id="donationModalOverlay"><div class="profile-modal"><h3>💸 ПОПОЛНЕНИЕ YC</h3><div class="qr-code" id="donationQrCode"></div><div class="profile-input-group"><label>📤 АДРЕС КОШЕЛЬКА TON</label><input type="text" value="${TON_ADDRESS}" readonly onclick="this.select();document.execCommand('copy');showNotification('Адрес скопирован!')"></div><div class="profile-input-group"><label>💰 СУММА</label><input type="text" value="${pack.ton} TON" readonly></div><div class="profile-input-group"><label>📝 ВАШ ЮЗЕРНЕЙМ (обязательно!)</label><input type="text" id="donationComment" placeholder="Например: @durov" value="${App.currentUser}"></div><div class="profile-input-group"><label>🔗 TXID (хеш транзакции)</label><input type="text" id="donationTxid" placeholder="Вставьте TXID из TON Keeper"></div><div class="profile-actions"><button class="profile-btn" id="submitDonationBtn">✅ Я ОТПРАВИЛ TON</button><button class="profile-btn secondary" id="closeDonationModal">ОТМЕНА</button></div><small style="display:block; text-align:center; margin-top:12px;">⚠️ В комментарии к переводу ОБЯЗАТЕЛЬНО укажите свой юзернейм с @</small></div></div>`; 
            document.body.insertAdjacentHTML('beforeend', modalHtml); 
            setTimeout(() => { const qrDiv = document.getElementById('donationQrCode'); if (qrDiv) { qrDiv.innerHTML = ''; new QRCode(qrDiv, { text: TON_ADDRESS, width: 200, height: 200 }); } }, 100); 
            document.getElementById('submitDonationBtn')?.addEventListener('click', () => { 
                const txid = document.getElementById('donationTxid')?.value.trim(); 
                const comment = document.getElementById('donationComment')?.value.trim(); 
                if (!txid) { showNotification('Введите TXID транзакции', 'error'); return; } 
                if (!comment || !comment.startsWith('@')) { showNotification('Укажите ваш юзернейм с @ в комментарии', 'error'); return; } 
                const requestId = generateId(); 
                if (!App.donationRequests) App.donationRequests = {};
                App.donationRequests[requestId] = { id: requestId, user: App.currentUser, username: comment, yc: pack.yc, ton: pack.ton, txid: txid, status: 'pending', createdAt: Date.now(), giftEmoji: pack.giftEmoji || null, statusType: pack.status || null }; 
                saveToFirebase(); 
                document.getElementById('donationModalOverlay')?.remove(); 
                showNotification(`✅ Заявка отправлена! Ожидайте начисления. ID: ${requestId.slice(-6)}`); 
            }); 
            document.getElementById('closeDonationModal')?.addEventListener('click', () => { document.getElementById('donationModalOverlay')?.remove(); }); 
        }
        
        window.confirmDonation = function(requestId) { 
            const request = App.donationRequests[requestId]; 
            if (!request || request.status !== 'pending') return; 
            const targetUser = request.user; 
            if (App.users[targetUser]) { 
                if (request.statusType) { 
                    App.users[targetUser].status = request.statusType; 
                    showNotification(`✨ СТАТУС ${request.statusType} активирован для ${request.username}! ✨`); 
                    updateUserInterface(); 
                    if (App.activeChat && App.activeChat !== 'saved' && !App.channels[App.activeChat]) { 
                        renderMessages(App.activeChat); 
                        updateChatList(); 
                    } 
                } else if (request.giftEmoji) { 
                    if (!App.users[targetUser].gifts) App.users[targetUser].gifts = []; 
                    App.users[targetUser].gifts.push(request.giftEmoji); 
                    showNotification(`✅ Подарок ${request.giftEmoji} отправлен ${request.username}`); 
                    updateUserInterface(); 
                } else { 
                    App.users[targetUser].stars = (App.users[targetUser].stars || 0) + request.yc; 
                    showNotification(`✅ Начислено ${request.yc} YC пользователю ${request.username}`); 
                    updateUserInterface(); 
                } 
                request.status = 'completed'; 
                request.completedAt = Date.now(); 
                saveToFirebase(); 
                if (!App.yolkChatMessages[targetUser]) App.yolkChatMessages[targetUser] = []; 
                let messageText = request.statusType ? `✨ Вы получили СТАТУС ${request.statusType} НАВСЕГДА! ✨` : (request.giftEmoji ? `🎁 Вам отправили подарок ${request.giftEmoji}!` : `✅ Пополнение баланса!\n💰 +${request.yc} YC\nСпасибо за поддержку!`); 
                App.yolkChatMessages[targetUser].push({ from: 'SYSTEM', text: messageText, time: Date.now() }); 
                saveToFirebase(); 
                if (App.currentUser === ADMIN_USER) { 
                    document.getElementById('adminModalOverlay')?.remove(); 
                    openAdminPanel(); 
                } 
            } 
        };
        
        window.cancelDonation = function(requestId) { 
            if (!confirm('Вы уверены, что хотите отменить эту заявку?')) return; 
            const request = App.donationRequests[requestId]; 
            if (!request || request.status !== 'pending') return; 
            delete App.donationRequests[requestId]; 
            saveToFirebase(); 
            showNotification(`❌ Заявка отменена`); 
            if (App.currentUser === ADMIN_USER) { 
                document.getElementById('adminModalOverlay')?.remove(); 
                openAdminPanel(); 
            } 
        };

        // ========== ОБНОВЛЕНИЕ СТАТУСА В ЧАТЕ ==========
        function updateChatHeaderStatus(username) { 
            if (App.channels[username]) return;
            const headerInfo = document.querySelector('.chat-header-info'); 
            if (!headerInfo) return; 
            const existingStatus = headerInfo.querySelector('.chat-user-status'); 
            if (existingStatus) existingStatus.remove(); 
            const existingStreak = headerInfo.querySelector('.streak-badge');
            if (existingStreak) existingStreak.remove();
            
            const existingNameStrong = headerInfo.querySelector('strong'); 
            if (existingNameStrong) { 
                existingNameStrong.innerHTML = formatUserNameWithStatus(username) + (App.users[username]?.verified ? '<span class="verified-icon"></span>' : '');
            } 
            
            const streak = getStreak(username);
            if (streak > 0) {
                const streakDiv = document.createElement('span');
                streakDiv.className = 'streak-badge';
                streakDiv.innerHTML = `🔥 ${streak}`;
                existingNameStrong?.appendChild(streakDiv);
            }
            
            if (username === 'saved' || username === 'yolk') return;
            
            const isOnline = isUserOnline(username); 
            const lastSeenText = formatLastSeen(App.users[username]?.lastSeen, username); 
            const statusDiv = document.createElement('div'); 
            statusDiv.className = 'chat-user-status' + (isOnline ? '' : ' offline'); 
            statusDiv.textContent = isOnline ? 'в сети' : `был(а) ${lastSeenText}`; 
            headerInfo.appendChild(statusDiv); 
        }

        // ========== ФУНКЦИИ ЛЕНТЫ ==========
        function createPost(text, media, isVideo) {
            if (!text.trim() && !media) {
                showNotification('Напишите текст или прикрепите медиа', 'error');
                return;
            }
            const post = {
                id: generateId(),
                author: App.currentUser,
                text: text.trim(),
                media: media || null,
                isVideo: isVideo || false,
                time: Date.now(),
                likes: {},
                dislikes: {},
                comments: []
            };
            App.posts.unshift(post);
            saveToFirebase();
            renderFeed();
            showNotification('Пост опубликован!');
            App.tempPostPhoto = null;
            App.tempPostVideo = null;
        }
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function renderFeed() {
            const feedContainer = document.getElementById('feedContainer');
            if (!feedContainer) return;
            
            const scrollPos = feedContainer.scrollTop;
            
            if (App.posts.length === 0) {
                feedContainer.innerHTML = '<div style="text-align:center; color: var(--text-secondary); padding:40px;">Здесь пока нет постов. Нажмите + чтобы создать первый!</div>';
                return;
            }
            let html = '';
            const shuffledPosts = shuffleArray([...App.posts]);
            shuffledPosts.forEach(post => {
                const author = App.users[post.author] || {};
                const avatarHtml = author.avatar ? `<img src="${author.avatar}" class="post-avatar-img">` : (post.author[1] || '?');
                const mediaHtml = post.media ? (post.isVideo ? `<video controls class="post-media" src="${post.media}"></video>` : `<img src="${post.media}" class="post-media" onclick="window.openImageModal('${post.media}')">`) : '';
                const likesCount = Object.keys(post.likes || {}).length;
                const dislikesCount = Object.keys(post.dislikes || {}).length;
                const userLiked = post.likes && post.likes[App.currentUser];
                const userDisliked = post.dislikes && post.dislikes[App.currentUser];
                const isOwner = post.author === App.currentUser;
                const date = new Date(post.time).toLocaleString();
                html += `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header" onclick="openProfileModal('${post.author}')">
                            <div class="post-avatar">${avatarHtml}</div>
                            <div>
                                <div class="post-author">${formatUserNameWithStatus(post.author)}${author.verified ? '<span class="verified-icon"></span>' : ''}</div>
                                <div class="post-time">${date}</div>
                            </div>
                        </div>
                        <div class="post-text">${post.text.replace(/\n/g, '<br>')}</div>
                        ${mediaHtml}
                        <div class="post-stats">
                            <button class="post-like ${userLiked ? 'active' : ''}" onclick="toggleLikePost('${post.id}')">👍 <span>${likesCount}</span></button>
                            <button class="post-dislike ${userDisliked ? 'active' : ''}" onclick="toggleDislikePost('${post.id}')">👎 <span>${dislikesCount}</span></button>
                            <button class="post-comment" onclick="openCommentsModal('${post.id}')">💬 <span>${post.comments?.length || 0}</span></button>
                            ${isOwner ? `<button class="post-delete" onclick="deletePost('${post.id}')">🗑️ УДАЛИТЬ</button>` : ''}
                        </div>
                    </div>
                `;
            });
            feedContainer.innerHTML = html;
            if (scrollPos > 0) {
                feedContainer.scrollTop = scrollPos;
            }
        }
        
        function updatePostStats(postId) {
            const post = App.posts.find(p => p.id === postId);
            if (!post) return;
            const postCard = document.querySelector(`.post-card[data-post-id="${postId}"]`);
            if (!postCard) return;
            
            const likesCount = Object.keys(post.likes || {}).length;
            const dislikesCount = Object.keys(post.dislikes || {}).length;
            const userLiked = post.likes && post.likes[App.currentUser];
            const userDisliked = post.dislikes && post.dislikes[App.currentUser];
            
            const likeBtn = postCard.querySelector('.post-like');
            const dislikeBtn = postCard.querySelector('.post-dislike');
            const commentBtn = postCard.querySelector('.post-comment');
            
            if (likeBtn) {
                likeBtn.classList.toggle('active', userLiked);
                const likeSpan = likeBtn.querySelector('span');
                if (likeSpan) likeSpan.textContent = likesCount;
            }
            if (dislikeBtn) {
                dislikeBtn.classList.toggle('active', userDisliked);
                const dislikeSpan = dislikeBtn.querySelector('span');
                if (dislikeSpan) dislikeSpan.textContent = dislikesCount;
            }
            if (commentBtn) {
                const commentSpan = commentBtn.querySelector('span');
                if (commentSpan) commentSpan.textContent = post.comments?.length || 0;
            }
        }
        
        function toggleLikePost(postId) {
            const post = App.posts.find(p => p.id === postId);
            if (!post) return;
            if (!post.likes) post.likes = {};
            if (!post.dislikes) post.dislikes = {};
            const user = App.currentUser;
            if (post.likes[user]) {
                delete post.likes[user];
            } else {
                if (post.dislikes[user]) delete post.dislikes[user];
                post.likes[user] = true;
            }
            saveToFirebase();
            updatePostStats(postId);
        }
        
        function toggleDislikePost(postId) {
            const post = App.posts.find(p => p.id === postId);
            if (!post) return;
            if (!post.likes) post.likes = {};
            if (!post.dislikes) post.dislikes = {};
            const user = App.currentUser;
            if (post.dislikes[user]) {
                delete post.dislikes[user];
            } else {
                if (post.likes[user]) delete post.likes[user];
                post.dislikes[user] = true;
            }
            saveToFirebase();
            updatePostStats(postId);
        }
        
        function openCommentsModal(postId) {
            const post = App.posts.find(p => p.id === postId);
            if (!post) return;
            const modalHtml = `
                <div class="modal-overlay" id="commentsModal">
                    <div class="comments-modal">
                        <h3 style="color: var(--text);">💬 Комментарии</h3>
                        <div id="commentsList" style="max-height: 300px; overflow-y: auto;">
                            ${post.comments?.map(c => `
                                <div class="comment-item">
                                    <div class="comment-author" style="color: var(--accent); cursor: pointer;" onclick="openProfileModal('${c.author}')">${formatUserNameWithStatus(c.author)}</div>
                                    <div class="comment-text" style="color: var(--text);">${c.text}</div>
                                    <div class="comment-time" style="color: var(--text-secondary); font-size: 10px;">${new Date(c.time).toLocaleString()}</div>
                                </div>
                            `).join('') || '<div style="color: var(--text-secondary); text-align: center;">Нет комментариев</div>'}
                        </div>
                        <div class="add-comment" style="display: flex; gap: 8px; margin-top: 16px;">
                            <input type="text" id="newCommentText" placeholder="Напишите комментарий..." style="flex: 1; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 10px 14px; color: var(--text); outline: none;">
                            <button class="profile-btn" id="submitCommentBtn" style="margin: 0; padding: 8px 16px;">Отправить</button>
                        </div>
                        <div class="profile-actions" style="margin-top:12px;">
                            <button class="profile-btn secondary" id="closeCommentsModal">Закрыть</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            
            const commentInput = document.getElementById('newCommentText');
            if (commentInput) {
                commentInput.style.color = 'var(--text)';
                commentInput.placeholder = 'Напишите комментарий...';
            }
            
            document.getElementById('submitCommentBtn').addEventListener('click', () => {
                const text = document.getElementById('newCommentText').value.trim();
                if (!text) return;
                if (!post.comments) post.comments = [];
                post.comments.push({
                    author: App.currentUser,
                    text: text,
                    time: Date.now()
                });
                saveToFirebase();
                document.getElementById('commentsModal').remove();
                updatePostStats(postId);
                showNotification('Комментарий добавлен');
            });
            document.getElementById('closeCommentsModal').addEventListener('click', () => {
                document.getElementById('commentsModal').remove();
            });
        }
        
        function deletePost(postId) {
            if (!confirm('Удалить пост?')) return;
            const index = App.posts.findIndex(p => p.id === postId);
            if (index !== -1 && App.posts[index].author === App.currentUser) {
                App.posts.splice(index, 1);
                saveToFirebase();
                renderFeed();
                showNotification('Пост удален');
            } else {
                showNotification('Нет прав для удаления', 'error');
            }
        }
        
        function openCreatePostModal() {
            const modalHtml = `
                <div class="modal-overlay" id="createPostModal">
                    <div class="profile-modal">
                        <h3>📝 СОЗДАТЬ ПОСТ</h3>
                        <div class="profile-input-group">
                            <label>ТЕКСТ (обязательно)</label>
                            <textarea id="postText" rows="3" placeholder="Что нового?"></textarea>
                        </div>
                        <div class="profile-input-group">
                            <label>ПРИКРЕПИТЬ ФОТО ИЛИ ВИДЕО (необязательно)</label>
                            <input type="file" id="postMediaFile" accept="image/*,video/*">
                        </div>
                        <div class="profile-actions">
                            <button class="profile-btn" id="confirmCreatePostBtn">ОПУБЛИКОВАТЬ</button>
                            <button class="profile-btn secondary" id="closeCreatePostModal">ОТМЕНА</button>
                        </div>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            let tempMedia = null, isVideo = false;
            document.getElementById('postMediaFile').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        compressImage(ev.target.result, 800, 800, 0.7, (compressed) => {
                            tempMedia = compressed;
                            isVideo = false;
                        });
                    };
                    reader.readAsDataURL(file);
                } else if (file.type.startsWith('video/')) {
                    if (file.size > 20 * 1024 * 1024) {
                        showNotification('Видео не более 20 МБ', 'error');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        tempMedia = ev.target.result;
                        isVideo = true;
                    };
                    reader.readAsDataURL(file);
                }
            });
            document.getElementById('confirmCreatePostBtn').addEventListener('click', () => {
                const text = document.getElementById('postText').value.trim();
                if (!text && !tempMedia) {
                    showNotification('Введите текст или прикрепите медиа', 'error');
                    return;
                }
                createPost(text, tempMedia, isVideo);
                document.getElementById('createPostModal').remove();
            });
            document.getElementById('closeCreatePostModal').addEventListener('click', () => {
                document.getElementById('createPostModal').remove();
            });
        }

        function send2FACode(username) { const code = Math.floor(100000 + Math.random() * 900000).toString(); const pendingCode = { code: code, username: username, timestamp: Date.now() }; localStorage.setItem('pending_2fa_' + username, JSON.stringify(pendingCode)); if (!App.yolkChatMessages[username]) App.yolkChatMessages[username] = []; App.yolkChatMessages[username].push({ from: 'SYSTEM', text: `🔐 Код подтверждения: ${code}\nВведите этот код для входа в аккаунт ${username}\nКод действителен 5 минут.`, time: Date.now(), isCode: true }); saveYolkChatMessages(); return pendingCode; }
        function verify2FACode(username, inputCode) { const saved = localStorage.getItem('pending_2fa_' + username); if (!saved) return false; const pending = JSON.parse(saved); if (pending.code === inputCode && (Date.now() - pending.timestamp) < 300000) { localStorage.removeItem('pending_2fa_' + username); return true; } return false; }
        function saveYolkChatMessages() { localStorage.setItem('yolk_chat_messages', JSON.stringify(App.yolkChatMessages)); if (App.dataLoaded) { database.ref('yolkChatMessages').set(App.yolkChatMessages).catch(e => console.error(e)); } }
        function handleFileSelect(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { compressImage(ev.target.result, 800, 800, 0.6, (compressed) => { App.tempPhoto = compressed; sendMessage(); }); }; reader.readAsDataURL(file); }
        function handleVideoSelect(e) { const file = e.target.files[0]; if (!file) return; if (file.size > 20 * 1024 * 1024) { showNotification('Видео не более 20 МБ', 'error'); return; } const reader = new FileReader(); reader.onload = (ev) => { App.tempVideo = ev.target.result; sendMessage(true); }; reader.readAsDataURL(file); }
        function addUserBySearch() { let query = document.getElementById('searchUserInput').value.trim().toLowerCase(); if (!query) { showNotification('Введите имя пользователя', 'error'); return; } if (!query.startsWith('@')) query = '@' + query; if (query === 'yolk') { showNotification('Это системный чат', 'error'); return; } if (App.channels[query]) { if (!App.channels[query].subscribers) App.channels[query].subscribers = []; if (!App.channels[query].subscribers.includes(App.currentUser)) { App.channels[query].subscribers.push(App.currentUser); saveToFirebase(); } App.activeChat = query; localStorage.setItem('yolk_active_chat', query); if (window.innerWidth < 768) App.sidebarOpen = false; document.getElementById('searchUserInput').value = ''; render(); return; } if (!App.users[query]) { showNotification('Пользователь не найден', 'error'); return; } if (query === App.currentUser) { showNotification('Это вы', 'error'); return; } if (!canUserMessage(App.currentUser, query)) { showNotification('Этот пользователь запретил писать первым', 'error'); return; } ensureChat(App.currentUser, query); App.activeChat = query; localStorage.setItem('yolk_active_chat', query); if (window.innerWidth < 768) App.sidebarOpen = false; document.getElementById('searchUserInput').value = ''; render(); showNotification(`Чат с ${query} создан`); }
        window.deleteChat = function(chat, event) { event.stopPropagation(); if (!confirm(`Удалить чат ${chat}?`)) return; const user = App.currentUser; const chatId = [user, chat].sort().join('_'); if (App.chats[chatId]) delete App.chats[chatId]; if (App.channels[chat] && App.channels[chat].subscribers) App.channels[chat].subscribers = App.channels[chat].subscribers.filter(s => s !== user); if (App.activeChat === chat) { App.activeChat = 'saved'; localStorage.setItem('yolk_active_chat', 'saved'); } saveToFirebase(); render(); showNotification('Чат удален'); };
        window.deleteMessage = function(chatPartner, idx) { const from = App.currentUser; try { if (chatPartner === 'saved') { const msgs = App.savedMessages[from]; if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveSavedMessages(); showNotification('Удалено'); renderMessages('saved'); } } else if (chatPartner === 'yolk') { showNotification('Нельзя удалять системные сообщения', 'error'); return; } else if (App.channels[chatPartner]) { if (App.channels[chatPartner].owner !== from) { showNotification('Только владелец может удалять', 'error'); return; } const msgs = App.channels[chatPartner].messages; if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveToFirebase(); showNotification('Удалено'); renderMessages(chatPartner); } } else { const chatId = [from, chatPartner].sort().join('_'); const msgs = App.chats[chatId]?.messages; if (msgs && msgs[idx]) { msgs.splice(idx, 1); saveToFirebase(); showNotification('Удалено'); renderMessages(chatPartner); } } } catch (error) { console.error('Ошибка удаления:', error); showNotification('Ошибка удаления', 'error'); } };
        window.toggleLike = function(chatPartner, messageIdx, event) { event.stopPropagation(); if (App.channels[chatPartner]) { if (!App.channels[chatPartner].messages[messageIdx]) return; const msg = App.channels[chatPartner].messages[messageIdx]; if (!msg.likes) msg.likes = {}; if (msg.likes[App.currentUser]) delete msg.likes[App.currentUser]; else msg.likes[App.currentUser] = true; saveToFirebase(); renderMessages(chatPartner); } };
        window.openImageModal = function(src) { const modalHtml = `<div class="modal-overlay" id="imageModal" onclick="this.remove()"><div style="max-width:90%; max-height:90%; display:flex; justify-content:center; align-items:center;"><img src="${src}" style="max-width:100%; max-height:100%; border-radius:12px;"></div></div>`; document.body.insertAdjacentHTML('beforeend', modalHtml); };
        function initBots() { App.systemBots = []; saveToFirebase(); }
        function loadFromFirebase() { console.log('🔄 Загрузка данных из Firebase...'); try { database.ref().get().then(snapshot => { if (snapshot.exists()) { const data = snapshot.val(); if (data.users) App.users = data.users; if (data.chats) App.chats = data.chats; if (data.blocked) App.blocked = data.blocked; if (data.channels) App.channels = data.channels; if (data.yolkChatMessages) App.yolkChatMessages = data.yolkChatMessages; if (data.streaks) App.streaks = data.streaks; if (data.privacySettings) App.privacySettings = data.privacySettings; if (data.posts) App.posts = data.posts; localStorage.setItem('yolk_cache', JSON.stringify({ users: App.users, chats: App.chats, blocked: App.blocked, channels: App.channels })); if (data.yolkChatMessages) saveYolkChatMessages(); if (data.streaks) saveStreaks(); if (data.privacySettings) savePrivacySettings(); } else { console.log('⚠️ База данных пуста'); } const savedUser = localStorage.getItem('yolk_current_user'); const savedChat = localStorage.getItem('yolk_active_chat'); if (savedUser && App.users[savedUser]) { App.currentUser = savedUser; App.activeChat = savedChat && (savedChat === 'saved' || savedChat === 'yolk' || App.users[savedChat] || App.channels[savedChat]) ? savedChat : 'saved'; loadSavedMessages(); loadYolkChatMessages(); loadStreaks(); loadPrivacySettings(); setupUserListener(App.currentUser); if (App.lastSeenInterval) clearInterval(App.lastSeenInterval); App.lastSeenInterval = setInterval(() => { updateLastSeen(App.currentUser); }, 30000); updateLastSeen(App.currentUser); } App.dataLoaded = true; render(); }).catch(error => { console.error('❌ Ошибка Firebase:', error); const cachedData = localStorage.getItem('yolk_cache'); if (cachedData) { try { const cache = JSON.parse(cachedData); if (cache.users) App.users = cache.users; if (cache.chats) App.chats = cache.chats; if (cache.blocked) App.blocked = cache.blocked; if (cache.channels) App.channels = cache.channels; console.log('📦 Загружено из кэша:', Object.keys(App.users).length); } catch(e) { } } const savedUser = localStorage.getItem('yolk_current_user'); if (savedUser && App.users[savedUser]) { App.currentUser = savedUser; App.activeChat = localStorage.getItem('yolk_active_chat') || 'saved'; loadSavedMessages(); loadYolkChatMessages(); loadStreaks(); loadPrivacySettings(); setupUserListener(App.currentUser); } App.dataLoaded = true; render(); }); } catch (error) { console.error('❌ Ошибка Firebase:', error); } }
        window.addEventListener('load', () => { initBots(); loadFromFirebase(); loadTheme(); });
    </script>
